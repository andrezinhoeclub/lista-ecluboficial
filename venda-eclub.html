<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>E-CLUB | Checkout PIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-sm glass p-8 rounded-[2.5rem] text-center shadow-2xl">
        <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-12 mx-auto mb-8">
        
        <div id="etapa-venda">
            <h1 class="text-xl font-black uppercase italic text-yellow-500 mb-6">Venda Rápida PIX</h1>
            <div class="space-y-4 text-white">
                <input type="password" id="apiKey" placeholder="COLE SUA API KEY DO ASAAS" class="w-full p-4 bg-black border border-zinc-800 rounded-2xl text-[10px] text-yellow-500 font-mono text-white">
                <input type="text" id="nome" placeholder="NOME DO CLIENTE" class="w-full p-4 bg-zinc-900 border border-zinc-800 rounded-2xl font-bold uppercase text-xs text-white">
                <input type="number" id="valor" placeholder="VALOR (EX: 2.00)" class="w-full p-4 bg-zinc-900 border border-zinc-800 rounded-2xl font-bold text-xs text-white">
                <button onclick="gerarPix()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl hover:scale-105 transition-all">Gerar QR Code</button>
            </div>
        </div>

        <div id="etapa-qrcode" class="hidden space-y-6">
            <p class="text-[10px] font-black text-zinc-500 uppercase">Escaneie para Pagar</p>
            <div class="bg-white p-4 rounded-3xl inline-block shadow-inner">
                <img id="imgQrCode" class="w-48 h-48">
            </div>
            <div class="text-left space-y-2">
                <p class="text-[9px] font-black text-zinc-600 uppercase">Pix Copia e Cola:</p>
                <textarea id="payload" readonly class="w-full p-4 bg-black border border-zinc-800 rounded-xl text-[9px] font-mono text-zinc-400 h-24 select-all"></textarea>
                <button onclick="copiar()" class="w-full py-3 bg-zinc-800 rounded-xl text-[10px] font-black uppercase">Copiar Código</button>
                <button onclick="location.reload()" class="w-full py-2 text-[10px] font-bold text-zinc-600 uppercase mt-4">Novo Teste</button>
            </div>
        </div>
    </div>

    <script>
        async function gerarPix() {
            const key = document.getElementById('apiKey').value;
            const val = document.getElementById('valor').value;
            const nom = document.getElementById('nome').value;
            const btn = document.getElementById('btnAcao');

            if(!key || !val || !nom) return alert("Preencha tudo!");

            btn.innerText = "PROCESSANDO...";
            btn.disabled = true;

            const proxy = "https://cors-anywhere.herokuapp.com/";
            const base = "https://www.asaas.com/api/v3";

            try {
                // 1. Cria a cobrança
                const res = await fetch(proxy + base + "/payments", {
                    method: 'POST',
                    headers: { 'access_token': key, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        billingType: "PIX",
                        customer: "cus_000005232490", // Cliente padrão para teste
                        value: val,
                        dueDate: new Date().toISOString().split('T')[0],
                        description: "E-CLUB | " + nom
                    })
                });

                const payment = await res.json();

                if(payment.id) {
                    // 2. Busca o QR Code gerado
                    const resQr = await fetch(proxy + base + `/payments/${payment.id}/pixQrCode`, {
                        headers: { 'access_token': key }
                    });
                    const qrData = await resQr.json();

                    document.getElementById('imgQrCode').src = `data:image/png;base64,${qrData.encodedImage}`;
                    document.getElementById('payload').value = qrData.payload;
                    document.getElementById('etapa-venda').classList.add('hidden');
                    document.getElementById('etapa-qrcode').classList.remove('hidden');
                } else {
                    alert("Erro: " + (payment.errors ? payment.errors[0].description : "Verifique sua Key"));
                }
            } catch (e) {
                alert("Ative o proxy em: https://cors-anywhere.herokuapp.com/corsdemo");
            }
            btn.innerText = "Gerar QR Code";
            btn.disabled = false;
        }

        function copiar() {
            document.getElementById('payload').select();
            document.execCommand('copy');
            alert("Copiado!");
        }
    </script>
</body>
</html>
