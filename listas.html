<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <title>E-CLUB | Reservas VIP ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050508; color: #fff; min-height: 100vh; background-image: radial-gradient(circle at top right, #1a1025 0%, #050508 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-lista { background: #eab308; color: #000; font-weight: 900; }
        .btn-pix-main { background: linear-gradient(135deg, #00bfa5 0%, #00d1b2 100%); color: #fff; font-weight: 900; }
        .btn-camarote { background: linear-gradient(135deg, #a855f7 0%, #c084fc 100%); color: #fff; font-weight: 900; }
        .site-input { background: #0f0f15 !important; border: 1px solid #27273a !important; color: #fff !important; outline: none; transition: 0.3s; }
        .banner-img { width: 100%; height: auto; display: block; opacity: 1; border-radius: 2.5rem 2.5rem 0 0; }
        .btn-sel { background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .btn-sel.active { border-color: #eab308; background: rgba(234, 179, 8, 0.05); box-shadow: 0 0 20px rgba(234, 179, 8, 0.1); }
        .btn-sel-pix.active { border-color: #00f5d4; background: rgba(0, 245, 212, 0.05); }
        .cam-livre { border-color: #22c55e; background: rgba(34, 197, 94, 0.1); cursor: pointer; }
        .cam-vendido { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .cam-aguardando { border-color: #eab308; background: rgba(234, 179, 8, 0.1); opacity: 0.7; cursor: not-allowed; }
        .cam-selecionado { border-color: #a855f7 !important; background: rgba(168, 85, 247, 0.2) !important; box-shadow: 0 0 20px rgba(168,85,247,0.4); }
        
        @keyframes scaleUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .success-anim { animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div class="max-w-md w-full">
        <header class="flex flex-col items-center justify-center py-6">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16">
            <h2 id="header-aniv" class="text-fuchsia-400 font-black uppercase italic mt-4 text-xl tracking-widest hidden text-center leading-tight"></h2>
        </header>
        
        <div id="listaEventos" class="space-y-10"></div>

        <footer class="mt-12 mb-8 flex flex-col items-center gap-8">
            <div class="flex gap-3 w-full">
                <a href="https://api.whatsapp.com/send?phone=5541995040506" target="_blank" class="flex-1 glass p-3 rounded-2xl flex flex-col items-center justify-center gap-2 hover:bg-green-500/10 border border-transparent transition-all group">
                    <span class="text-2xl">💬</span>
                    <span class="text-[8px] font-black uppercase tracking-widest text-zinc-400 group-hover:text-green-400">WhatsApp</span>
                </a>
                <a href="https://www.instagram.com/eclubswingdance/" target="_blank" class="flex-1 glass p-3 rounded-2xl flex flex-col items-center justify-center gap-2 hover:bg-fuchsia-500/10 border border-transparent transition-all group">
                    <span class="text-2xl">📸</span>
                    <span class="text-[8px] font-black uppercase tracking-widest text-zinc-400 group-hover:text-fuchsia-400">Instagram</span>
                </a>
            </div>
            <div class="text-center opacity-30">
                <p class="text-[8px] font-black uppercase tracking-widest text-zinc-500">⚡ DESENVOLVIDO POR ANDREZINHO E-CLUB</p>
            </div>
        </footer>
    </div>

    <div id="modalForm" class="hidden fixed inset-0 z-[999] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4 text-white overflow-y-auto">
        <div class="w-full max-w-sm bg-[#0d0d14] border border-white/10 p-6 md:p-8 rounded-[2.5rem] text-center shadow-2xl relative my-auto mt-10 mb-10">
            <h2 id="modal-titulo" class="font-black uppercase italic mb-6 tracking-tighter text-xl">🔥 NOME NA LISTA</h2>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="selecionarTipo('CASAL')" id="btn-casal" class="btn-sel p-4 rounded-3xl flex flex-col items-center justify-center">
                    <span class="text-[10px] font-black uppercase opacity-60">👫 Casal</span>
                    <span id="v-modal-casal" class="text-xs font-black">---</span>
                </button>
                <button onclick="selecionarTipo('SOLTEIRO')" id="btn-solteiro" class="btn-sel p-4 rounded-3xl flex flex-col items-center justify-center">
                    <span class="text-[10px] font-black uppercase opacity-60">👤 Solteiro</span>
                    <span id="v-modal-solteiro" class="text-xs font-black">---</span>
                </button>
            </div>
            <div class="space-y-3 text-left">
                <input type="text" id="nome-cliente" placeholder="NOME COMPLETO" class="w-full site-input p-4 rounded-2xl font-bold text-xs uppercase text-white">
                <input type="tel" id="tel-cliente" oninput="maskTel(this)" placeholder="(41) 99999-9999" class="w-full site-input p-4 rounded-2xl font-bold text-xs text-white">
                <div id="campos-pix" class="hidden space-y-3">
                    <input type="email" id="email-cliente" placeholder="SEU E-MAIL" class="w-full site-input p-4 rounded-2xl font-bold text-xs text-white lowercase">
                    <input type="tel" id="cpf-cliente" oninput="maskCPF(this)" placeholder="SEU CPF" class="w-full site-input p-4 rounded-2xl font-bold text-xs text-white">
                </div>
                <button onclick="processarFinalizacao()" id="btn-final-acao" class="w-full py-5 rounded-2xl uppercase text-xs font-black mt-2 shadow-xl transition-all">Confirmar Presença</button>
            </div>
            <button onclick="fecharModal()" class="w-full text-zinc-600 uppercase text-[9px] font-black mt-6 tracking-widest italic">Voltar</button>
        </div>
    </div>

    <div id="modalCamarote" class="hidden fixed inset-0 z-[999] bg-black/95 backdrop-blur-xl flex flex-col items-center justify-center p-4 text-white overflow-y-auto">
        <div class="w-full max-w-sm bg-[#0d0d14] border border-purple-500/30 p-6 md:p-8 rounded-[2.5rem] shadow-2xl relative my-auto mt-10 mb-10">
            <h2 class="text-purple-400 font-black uppercase italic mb-6 text-xl text-center">💎 CAMAROTES VIP</h2>
            
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/camarotes.png" class="w-full h-auto object-contain rounded-xl mb-6">
            
            <div id="grid-camarotes-venda" class="grid grid-cols-2 gap-3 mb-6"></div>
            <div id="form-camarote" class="space-y-3 hidden">
                <div class="bg-purple-900/20 p-4 rounded-2xl border border-purple-500/30 text-center mb-4">
                    <p class="text-[10px] text-purple-300 font-black uppercase" id="cam-selecionado-nome">CAMAROTE X</p>
                    <p class="text-xl font-black text-white" id="cam-selecionado-valor">R$ 0,00</p>
                </div>
                <input type="text" id="nome-camarote" placeholder="NOME DO TITULAR" class="w-full site-input p-4 rounded-2xl font-bold text-xs uppercase text-white">
                <input type="tel" id="tel-camarote" oninput="maskTel(this)" placeholder="(41) 99999-9999" class="w-full site-input p-4 rounded-2xl font-bold text-xs text-white">
                <input type="email" id="email-camarote" placeholder="SEU E-MAIL" class="w-full site-input p-4 rounded-2xl font-bold text-xs text-white lowercase">
                <input type="tel" id="cpf-camarote" oninput="maskCPF(this)" placeholder="SEU CPF" class="w-full site-input p-4 rounded-2xl font-bold text-xs text-white">
                <button onclick="processarPixCamarote()" id="btn-final-camarote" class="w-full btn-camarote py-5 rounded-2xl uppercase text-xs font-black shadow-xl">Garantir Camarote ⚡</button>
            </div>
            <button onclick="fecharModalCamarote()" class="w-full text-zinc-600 uppercase text-[9px] font-black mt-6 tracking-widest italic text-center">Voltar</button>
        </div>
    </div>

    <div id="modalQrCode" class="hidden fixed inset-0 z-[1000] bg-black/95 backdrop-blur-xl flex flex-col items-center justify-center p-4">
        <div id="box-qrcode" class="w-full max-w-sm bg-[#0d0d14] border border-[#00f5d4]/30 p-8 rounded-[2.5rem] text-center">
            <h2 class="text-[#00f5d4] font-black uppercase italic mb-6 text-2xl">PIX GERADO</h2>
            <div class="bg-white p-4 rounded-3xl mx-auto inline-block mb-6 shadow-xl"><img id="img-qrcode" src="" class="w-48 h-48 object-contain"></div>
            <div class="flex gap-2 mb-6">
                <input type="text" id="chave-copia-cola" readonly class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-xl text-zinc-400 text-[9px] font-mono outline-none">
                <button onclick="copiarChavePix()" class="bg-[#00f5d4] text-black px-4 rounded-xl font-black text-[10px]">Copiar</button>
            </div>
            <p class="text-[9px] text-yellow-500 font-black uppercase italic mb-6 animate-pulse">⏳ Aguardando pagamento...</p>
            <button onclick="fecharModalQrCode()" class="w-full border border-zinc-800 text-zinc-400 py-4 rounded-2xl uppercase text-[10px] font-black">Voltar</button>
        </div>
        <div id="box-sucesso" class="hidden w-full max-w-sm bg-[#0d0d14] border border-green-500/50 p-10 rounded-[2.5rem] text-center success-anim">
            <div class="text-5xl mb-6">✅</div>
            <h2 class="text-green-500 font-black uppercase italic mb-2 text-3xl">PAGO!</h2>
            <p class="text-white text-[10px] font-bold uppercase mb-8">Sua entrada foi confirmada com sucesso.</p>
            <button onclick="location.reload()" class="w-full bg-green-600 text-white py-5 rounded-2xl uppercase text-xs font-black shadow-xl">Concluir</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", authDomain: "teste-de-reserva.firebaseapp.com", projectId: "teste-de-reserva", storageBucket: "teste-de-reserva.appspot.com", messagingSenderId: "163395694876", appId: "1:163395694876:web:8b1116a0483af951548ad9" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const URL_FUNCAO = 'https://us-central1-teste-de-reserva.cloudfunctions.net/gerarPagamento';

        const urlParams = new URLSearchParams(window.location.search);
        let globalPromoter = urlParams.get('ref') || "site_direto";
        let globalAniversariante = ""; let eventoFixo = null; let eventosCache = []; let eventoAtivo = null; let tipoAtivo = null; let eFluxoPix = false;
        let unsubscribeCamarotes = null; let numCamaroteSelecionado = null; let unsubscribePagamento = null;

        const formatarMoeda = (v) => v ? "R$ " + String(v).toUpperCase().replace("R$", "").trim() : "PORTARIA";

        async function validarDuplicidade(telefone, nomeEvento) {
            const q = query(collection(db, "lista_eventos"), where("evento", "==", nomeEvento), where("tel", "==", telefone));
            const snap = await getDocs(q);
            if (!snap.empty) {
                const ativos = snap.docs.filter(d => {
                    const data = d.data();
                    if (data.pago === true || data.metodo === 'portaria') return true;
                    return ((new Date() - new Date(data.data_reserva)) / 60000) < 10;
                });
                return ativos.length > 0;
            }
            return false;
        }

        async function carregarPagina() {
            const anivId = urlParams.get('id');
            if (anivId) {
                const anivSnap = await getDoc(doc(db, "links_aniversario", anivId));
                if (anivSnap.exists()) {
                    const d = anivSnap.data();
                    globalPromoter = d.promoter || "site_direto";
                    globalAniversariante = d.aniversariante;
                    eventoFixo = d.festa;
                }
            }

            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            const hojeStr = new Date().toLocaleDateString('en-CA');
            eventosCache = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(ev => ev.data >= hojeStr).sort((a, b) => a.data.localeCompare(b.data));
            if (eventoFixo) eventosCache = eventosCache.filter(e => e.nome === eventoFixo);

            const container = document.getElementById('listaEventos');
            container.innerHTML = eventosCache.map(ev => {
                const temPixAtivo = (ev.ant_casal && parseFloat(ev.ant_casal.toString().replace(',','.')) > 0) || (ev.ant_solteiro && parseFloat(ev.ant_solteiro.toString().replace(',','.')) > 0);
                let temCamaroteAtivo = false;
                for(let i=1; i<=8; i++) { if(ev[`cam${i}_ativo`] && ev[`v_cam${i}`] && parseFloat(ev[`v_cam${i}`].toString().replace(',','.')) > 0) temCamaroteAtivo = true; }

                let renderHtml = '';

                if (globalAniversariante) {
                    renderHtml = `
                    <div class="glass overflow-hidden rounded-[2.5rem] border-fuchsia-500/20 border shadow-[0_0_30px_rgba(217,70,239,0.15)]">
                        <div class="bg-fuchsia-900/20 p-10 flex flex-col items-center justify-center text-center border-b border-fuchsia-500/20">
                            <span class="text-6xl mb-4 block drop-shadow-[0_0_15px_rgba(217,70,239,0.5)]">🎉</span>
                            <h3 class="text-[9px] font-black text-fuchsia-400 uppercase tracking-[0.2em] mb-1">CONVITE VIP ESPECIAL</h3>
                            <p class="text-2xl font-black uppercase text-white italic tracking-tighter">${globalAniversariante}</p>
                        </div>
                        <div class="p-8">
                            <h3 class="text-lg font-black uppercase italic text-zinc-400 mb-6 text-center tracking-tighter">EVENTO:<br><span class="text-white text-xl">${ev.nome}</span></h3>
                            <button onclick="iniciarFluxo('${ev.id}', false)" class="w-full btn-lista py-5 rounded-2xl text-xs font-black italic transition-all active:scale-95">🎁 COLOCAR NOME NA LISTA</button>
                        </div>
                    </div>`;
                } else {
                    const topoCardHTML = ev.imagem ? `<img src="${ev.imagem}" class="banner-img">` : `<div class="h-40 bg-zinc-900 flex items-center justify-center text-zinc-700 font-black uppercase tracking-tighter italic text-xl">E-CLUB</div>`;
                    
                    renderHtml = `
                    <div class="glass overflow-hidden rounded-[2.5rem] border-white/5 shadow-2xl">
                        ${topoCardHTML}
                        <div class="p-8">
                            <h3 class="text-2xl font-black uppercase italic mb-6 text-center text-white tracking-tighter">${ev.nome}</h3>
                            <button onclick="iniciarFluxo('${ev.id}', false)" class="w-full btn-lista py-5 rounded-2xl text-xs font-black mb-3 italic transition-all active:scale-95">📝 NOME NA LISTA</button>
                            <div class="grid grid-cols-2 gap-3">
                                ${temPixAtivo ? `<button onclick="iniciarFluxo('${ev.id}', true)" class="w-full btn-pix-main py-4 rounded-2xl text-[10px] font-black italic transition-all active:scale-95">⚡ PIX ANTECIPADO</button>` : `<div class="bg-zinc-900/50 rounded-2xl py-4 flex items-center justify-center opacity-30 border border-white/5"><span class="text-[9px] font-black italic uppercase">S/ PIX</span></div>`}
                                ${temCamaroteAtivo ? `<button onclick="iniciarFluxoCamarote('${ev.id}')" class="w-full btn-camarote py-4 rounded-2xl text-[10px] font-black italic transition-all active:scale-95">💎 CAMAROTE</button>` : `<div class="bg-zinc-900/50 rounded-2xl py-4 flex items-center justify-center opacity-30 border border-white/5"><span class="text-[9px] font-black italic uppercase">S/ CAM</span></div>`}
                            </div>
                        </div>
                    </div>`;
                }

                return renderHtml;
            }).join('');
        }

        window.iniciarFluxo = (id, isPix) => {
            eventoAtivo = eventosCache.find(e => e.id === id); eFluxoPix = isPix;
            document.getElementById('modal-titulo').innerText = isPix ? "⚡ PIX ANTECIPADO" : (globalAniversariante ? "🎉 LISTA VIP" : "🔥 NOME NA LISTA");
            const pCasal = isPix ? (eventoAtivo.ant_casal || eventoAtivo.valor_casal) : (globalAniversariante ? (eventoAtivo.desc_casal || eventoAtivo.valor_casal) : eventoAtivo.valor_casal);
            const pSolt = isPix ? (eventoAtivo.ant_solteiro || eventoAtivo.valor_solteiro) : (globalAniversariante ? (eventoAtivo.desc_solteiro || eventoAtivo.valor_solteiro) : eventoAtivo.valor_solteiro);
            document.getElementById('v-modal-casal').innerText = formatarMoeda(pCasal);
            document.getElementById('v-modal-solteiro').innerText = formatarMoeda(pSolt);
            document.getElementById('campos-pix').className = isPix ? "space-y-3" : "hidden";
            document.getElementById('modalForm').classList.remove('hidden');
        };

        window.selecionarTipo = (tipo) => {
            tipoAtivo = tipo;
            document.getElementById('btn-casal').className = `btn-sel p-4 rounded-3xl flex flex-col items-center ${tipo==='CASAL'?'active':''}`;
            document.getElementById('btn-solteiro').className = `btn-sel p-4 rounded-3xl flex flex-col items-center ${tipo==='SOLTEIRO'?'active':''}`;
        };

        window.processarFinalizacao = async () => {
            const n = document.getElementById('nome-cliente').value.trim().toUpperCase();
            const t = document.getElementById('tel-cliente').value.trim();
            const cpf = document.getElementById('cpf-cliente').value.trim();
            if (!n || t.length < 14 || !tipoAtivo) return alert("Preencha todos os campos!");
            const btn = document.getElementById('btn-final-acao'); btn.disabled = true; btn.innerText = "PROCESSANDO...";
            try {
                const jaExiste = await validarDuplicidade(t, eventoAtivo.nome);
                if (jaExiste) throw new Error("Você já possui uma reserva ativa para este evento!");
                const valorRef = tipoAtivo === 'CASAL' ? (eFluxoPix ? eventoAtivo.ant_casal : eventoAtivo.valor_casal) : (eFluxoPix ? eventoAtivo.ant_solteiro : eventoAtivo.valor_solteiro);
                const docRef = await addDoc(collection(db, "lista_eventos"), { nome: n, tel: t, cpf: cpf, evento: eventoAtivo.nome, tipo_entrada: tipoAtivo, promoter: globalPromoter, aniversariante: globalAniversariante, data_reserva: new Date().toISOString(), entrou: false, pago: false, metodo: eFluxoPix ? 'pix_antecipado' : 'portaria', valor_pago: valorRef || "" });
                if (eFluxoPix) {
                    const resp = await fetch(URL_FUNCAO, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ valor: String(valorRef).replace('R$', '').replace(',', '.').trim(), titulo: `PISTA: ${eventoAtivo.nome}`, reservaId: docRef.id, nome: n, email: document.getElementById('email-cliente').value, cpf: cpf }) });
                    const data = await resp.json();
                    if (data.sucesso) abrirTelaQR(data.qr_code_base64, data.qr_code_copia_cola, docRef.id);
                } else { alert("Confirmado na lista! ✨"); location.reload(); }
            } catch (e) { alert("⚠️ " + e.message); btn.innerText = "Confirmar Presença"; btn.disabled = false; }
        };

        window.iniciarFluxoCamarote = (id) => {
            eventoAtivo = eventosCache.find(e => e.id === id);
            const q = query(collection(db, "lista_eventos"), where("evento", "==", eventoAtivo.nome));
            unsubscribeCamarotes = onSnapshot(q, (snap) => {
                const reservas = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const grid = document.getElementById('grid-camarotes-venda'); grid.innerHTML = '';
                for(let i=1; i<=8; i++) {
                    if(eventoAtivo[`cam${i}_ativo`] && parseFloat(eventoAtivo[`v_cam${i}`]) > 0) {
                        const resCam = reservas.filter(r => { const ent = String(r.tipo_entrada).toUpperCase().trim(); return ent === `CAMAROTE ${i}` || ent === `CAMAROTE 0${i}`; });
                        let status = 'livre', classCor = 'cam-livre', icone = '✅';
                        if (resCam.some(r => r.pago === true || r.cortesia === true)) { status = 'vendido'; classCor = 'cam-vendido'; icone = '🔒'; }
                        else if (resCam.some(r => r.data_reserva && ((new Date() - new Date(r.data_reserva)) / 60000) < 10)) { status = 'aguardando'; classCor = 'cam-aguardando'; icone = '⏳'; }
                        grid.innerHTML += `<button onclick="selecionarCamarote(${i}, '${status}', '${eventoAtivo[`v_cam${i}`]}')" class="${classCor} border p-4 rounded-2xl flex flex-col items-center transition-all"><span class="text-[10px] font-black uppercase">Cam 0${i}</span><span class="text-xs font-bold">${formatarMoeda(eventoAtivo[`v_cam${i}`])}</span><span class="text-[8px] font-black uppercase mt-1">${icone} ${status}</span></button>`;
                    }
                }
            });
            document.getElementById('modalCamarote').classList.remove('hidden');
        };

        window.selecionarCamarote = (num, status, valor) => {
            if(status !== 'livre') return; numCamaroteSelecionado = num;
            document.getElementById('cam-selecionado-nome').innerText = `CAMAROTE 0${num}`;
            document.getElementById('cam-selecionado-valor').innerText = formatarMoeda(valor);
            document.getElementById('form-camarote').classList.remove('hidden');
        };

        window.processarPixCamarote = async () => {
            const n = document.getElementById('nome-camarote').value.trim().toUpperCase();
            const t = document.getElementById('tel-camarote').value.trim();
            const em = document.getElementById('email-camarote').value.trim();
            const cpf = document.getElementById('cpf-camarote').value.trim();
            if(!n || t.length < 14 || !em || cpf.length < 14) return alert("Preencha todos os campos!");
            const btn = document.getElementById('btn-final-camarote'); btn.disabled = true; btn.innerText = "VALIDANDO...";
            try {
                const jaExiste = await validarDuplicidade(t, eventoAtivo.nome);
                if (jaExiste) throw new Error("Você já possui uma reserva ativa para este evento!");
                const docRef = await addDoc(collection(db, "lista_eventos"), { nome: n, tel: t, cpf: cpf, evento: eventoAtivo.nome, tipo_entrada: `CAMAROTE ${numCamaroteSelecionado}`, promoter: globalPromoter, data_reserva: new Date().toISOString(), entrou: false, pago: false, metodo: 'pix_antecipado', valor_pago: eventoAtivo[`v_cam${numCamaroteSelecionado}`] });
                const resp = await fetch(URL_FUNCAO, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ valor: String(eventoAtivo[`v_cam${numCamaroteSelecionado}`]).replace('R$', '').replace(',', '.').trim(), titulo: `CAMAROTE 0${numCamaroteSelecionado}`, reservaId: docRef.id, nome: n, email: em, cpf: cpf }) });
                const data = await resp.json();
                if (data.sucesso) abrirTelaQR(data.qr_code_base64, data.qr_code_copia_cola, docRef.id);
            } catch (e) { alert("⚠️ " + e.message); btn.disabled = false; btn.innerText = "Garantir Camarote"; }
        };

        window.abrirTelaQR = (base64, copiaCola, reservaId) => {
            document.getElementById('img-qrcode').src = `data:image/jpeg;base64,${base64}`;
            document.getElementById('chave-copia-cola').value = copiaCola;
            document.getElementById('modalForm').classList.add('hidden');
            document.getElementById('modalCamarote').classList.add('hidden');
            document.getElementById('modalQrCode').classList.remove('hidden');
            unsubscribePagamento = onSnapshot(doc(db, "lista_eventos", reservaId), (ds) => { if (ds.exists() && ds.data().pago) { document.getElementById('box-qrcode').classList.add('hidden'); document.getElementById('box-sucesso').classList.remove('hidden'); } });
        };

        window.fecharModal = () => document.getElementById('modalForm').classList.add('hidden');
        window.fecharModalCamarote = () => { if(unsubscribeCamarotes) unsubscribeCamarotes(); document.getElementById('modalCamarote').classList.add('hidden'); };
        window.fecharModalQrCode = () => { location.reload(); };
        window.copiarChavePix = () => { const c = document.getElementById('chave-copia-cola'); c.select(); document.execCommand('copy'); alert("Copiado!"); };
        window.maskTel = (i) => { let v = i.value.replace(/\D/g, "").substring(0, 11); if (v.length > 0) v = "(" + v; if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3); if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10); i.value = v; };
        window.maskCPF = (i) => { let v = i.value.replace(/\D/g, "").substring(0, 11); if (v.length > 3) v = v.substring(0, 3) + "." + v.substring(3); if (v.length > 7) v = v.substring(0, 7) + "." + v.substring(7); if (v.length > 11) v = v.substring(0, 11) + "-" + v.substring(11); i.value = v; };

        carregarPagina();
    </script>
</body>
</html>
