<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Area do Promoter ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050508; color: #fff; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-gradient { background: linear-gradient(135deg, #eab308 0%, #a16207 100%); }
        .purple-gradient { background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%); }
    </style>
</head>
<body class="p-6 md:p-12 pb-32">

    <div id="telaLogin" class="fixed inset-0 z-50 bg-[#050508] flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass p-10 rounded-[3rem] text-center border-sky-500/20 border shadow-2xl">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-3xl font-black mb-8 uppercase italic tracking-tighter">PROMOTER <span class="text-sky-400">ACCESS</span></h1>
            <input type="text" id="usuario" placeholder="USUÁRIO" class="w-full p-5 rounded-2xl bg-black border border-zinc-800 text-center font-bold uppercase text-xs mb-4">
            <div id="campo-senha" class="hidden">
                <input type="password" id="senha" placeholder="DIGITE SUA SENHA" class="w-full p-5 rounded-2xl bg-black border border-zinc-800 text-center font-bold uppercase text-xs mb-4">
            </div>
            <button onclick="prosseguirLogin()" id="btnAcao" class="w-full purple-gradient text-white font-black py-5 rounded-2xl uppercase text-xs shadow-xl">CONTINUAR</button>
        </div>
    </div>

    <div id="painel" class="hidden max-w-md mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <p class="text-sky-400 text-[10px] font-black uppercase tracking-[0.3em] mb-1 italic">E-CLUB OFFICIAL</p>
                <h1 id="nomeHeader" class="text-4xl font-black uppercase italic leading-none">---</h1>
            </div>
            <button onclick="location.reload()" class="bg-red-900/20 text-red-500 border border-red-900/30 px-6 py-2 rounded-2xl font-black text-[10px] uppercase italic">Sair</button>
        </header>

        <section class="space-y-6">
            <h3 class="text-[11px] font-black uppercase text-sky-400 mb-4 tracking-[0.2em] italic">📈 PERFORMANCE REALTIME</h3>
            <div id="listaPerformance" class="space-y-4"></div>
        </section>

        <footer id="navAcoes" class="fixed bottom-0 left-0 w-full p-6 bg-black/90 backdrop-blur-xl border-t border-white/5 z-40">
            <div class="max-w-md mx-auto flex gap-3">
                <button onclick="abrirLink()" class="flex-grow gold-gradient text-black font-black py-6 rounded-2xl uppercase text-[10px] tracking-widest shadow-xl">ABRIR MEU LINK</button>
                <button onclick="copiarLink()" class="gold-gradient text-black font-black px-6 rounded-2xl text-lg flex items-center justify-center">📋</button>
            </div>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let logado = ""; let reservas = []; let eventos = []; let dadosPromoter = null;

        window.prosseguirLogin = async () => {
            const u = document.getElementById('usuario').value.trim().toLowerCase();
            const s = document.getElementById('senha').value.trim();
            const btn = document.getElementById('btnAcao');

            if (!logado) {
                const snap = await getDoc(doc(db, "promoters", u));
                if (snap.exists()) {
                    logado = u; dadosPromoter = snap.data();
                    document.getElementById('campo-senha').classList.remove('hidden');
                    document.getElementById('usuario').readOnly = true;
                    btn.innerText = "ENTRAR NO PAINEL";
                } else { alert("Usuário não encontrado"); }
            } else {
                if (dadosPromoter.senha === s) {
                    document.getElementById('telaLogin').style.display = 'none';
                    document.getElementById('painel').classList.remove('hidden');
                    document.getElementById('nomeHeader').innerText = logado.toUpperCase();
                    iniciarSistema();
                } else { alert("Senha incorreta"); }
            }
        };

        function iniciarSistema() {
            if (dadosPromoter.tipo === "visualizar") document.getElementById('navAcoes').style.display = 'none';

            // ATUALIZAÇÃO EM TEMPO REAL DAS RESERVAS
            onSnapshot(collection(db, "lista_eventos"), (snap) => {
                reservas = snap.docs.map(d => d.data());
                renderPerformance();
            });

            // ATUALIZAÇÃO EM TEMPO REAL DOS EVENTOS
            onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snap) => {
                eventos = snap.docs.map(d => d.data()).sort((a,b) => new Date(a.data) - new Date(b.data));
                renderPerformance();
            });
        }

        function renderPerformance() {
            const container = document.getElementById('listaPerformance');
            if (eventos.length === 0) return;

            container.innerHTML = eventos.map(ev => {
                // FILTRO MATADOR: Resolve o problema de não somar reservas
                const minhas = reservas.filter(r => 
                    r.evento === ev.nome && 
                    (r.promoter || '').toLowerCase().trim() === logado.toLowerCase().trim()
                ).length;

                const geral = reservas.filter(r => r.evento === ev.nome).length;

                return `
                <div class="glass p-8 rounded-[2.5rem] border-l-4 border-sky-500 flex justify-between items-center mb-4">
                    <div class="text-left"><h4 class="text-[13px] font-black uppercase italic leading-tight">${ev.nome}</h4><p class="text-[9px] text-zinc-500 font-bold mt-2">${ev.data.split('-').reverse().join('/')}</p></div>
                    <div class="flex gap-8 text-right">
                        <div><p class="text-3xl font-black text-sky-400 leading-none">${minhas}</p><p class="text-[7px] text-sky-500 font-black mt-2">MINHAS</p></div>
                        <div class="border-l border-white/5 pl-8"><p class="text-3xl font-black text-white/20 leading-none">${geral}</p><p class="text-[7px] text-white/10 font-black mt-2">GERAL</p></div>
                    </div>
                </div>`;
            }).join('');
        }

        window.abrirLink = () => { window.open(`https://andrezinhoeclub.github.io/lista-ecluboficial/listas.html?ref=${logado}`, '_blank'); };
        window.copiarLink = () => { navigator.clipboard.writeText(`https://andrezinhoeclub.github.io/lista-ecluboficial/listas.html?ref=${logado}`).then(() => alert("Copiado!")); };
    </script>
</body>
</html>
