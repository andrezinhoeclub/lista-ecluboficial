<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <title>E-CLUB | Reservas e Listas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.96); }
        .festa-card { background: #000; border: 1px solid #1a1a1a; border-radius: 2.5rem; overflow: hidden; margin-bottom: 2rem; }
        .banner-img { width: 100%; height: auto; display: block; background: #0a0a0a; }
        .type-btn { background: #111; border: 1px solid #27272a; color: white; transition: 0.3s; }
        .type-btn.active { background: #eab308; border-color: #eab308; color: black; font-weight: 900; }
        .site-input { background: #000 !important; border: 1px solid #27272a !important; color: white !important; }
        .site-input:focus { border-color: #eab308 !important; outline: none; }
        
        /* Estilo Especial de Aniversário */
        .aniv-card { background: linear-gradient(145deg, #1a1033 0%, #000 100%); border: 2px solid #9333ea; }
        .purple-glow { text-shadow: 0 0 15px rgba(147, 51, 234, 0.6); }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <div class="max-w-md mx-auto w-full flex-grow">
        <header class="flex justify-center py-10">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-16 w-auto">
        </header>

        <div id="listaEventos" class="space-y-8">
            <div class="animate-pulse text-center py-20 text-zinc-800 font-black uppercase text-[10px]">Sincronizando Agenda...</div>
        </div>

        <footer class="mt-16 mb-12 border-t border-zinc-900 pt-10 text-center">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <a href="https://wa.me/5541995040506" target="_blank" class="bg-[#25D366] p-5 rounded-2xl text-black font-black uppercase text-[11px] btn-action text-center">WhatsApp</a>
                <a href="https://www.instagram.com/eclubswingdance/" target="_blank" class="bg-gradient-to-r from-orange-500 via-red-500 to-purple-600 p-5 rounded-2xl text-white font-black uppercase text-[11px] btn-action text-center">Instagram</a>
            </div>
            <div class="border-2 border-yellow-500 p-8 rounded-[2.5rem]">
                <p class="text-[9px] text-yellow-500 font-black uppercase mb-2 tracking-widest">Localização</p>
                <p class="text-sm font-black italic text-white mb-1">Rua Albino Kaminski, 645 - Bairro Alto</p>
                <p class="text-[10px] text-zinc-500 font-bold uppercase">Curitiba - PR</p>
            </div>
        </footer>
    </div>

    <div id="telaSucesso" class="hidden fixed inset-0 bg-black/98 z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-6 text-4xl text-white">✓</div>
        <h2 class="text-2xl font-black uppercase italic mb-2 text-white">Confirmado!</h2>
        <p class="text-zinc-400 text-xs font-bold uppercase px-4">Seu nome está na lista da E-CLUB!</p>
        <button onclick="location.reload()" class="w-full max-w-xs bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px] mt-10 btn-action">Nova Reserva</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const refPromoter = params.get('ref') || "direto";
        const nomeAniv = params.get('aniv');
        const festaFixa = params.get('festa');

        window.mascaraTelefone = (input) => {
            let v = input.value.replace(/\D/g, "");
            if (v.length > 11) v = v.substring(0, 11);
            if (v.length > 0) v = "(" + v;
            if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            input.value = v;
        };

        async function carregarAgenda() {
            const container = document.getElementById('listaEventos');
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            const hoje = new Date().toLocaleDateString('en-CA');
            
            let eventos = [];
            snap.forEach(doc => {
                const d = doc.data();
                if (!d.data || d.data >= hoje) eventos.push({ id: doc.id, ...d });
            });
            eventos.sort((a,b) => new Date(a.data) - new Date(b.data));

            if (festaFixa && nomeAniv) {
                eventos = eventos.filter(ev => ev.nome === decodeURIComponent(festaFixa));
            }

            container.innerHTML = '';
            eventos.forEach(ev => {
                const card = document.createElement('div');
                // Aplica estilo diferente se for Aniversário
                card.className = nomeAniv ? "festa-card aniv-card" : "festa-card";
                
                const vC = nomeAniv ? (ev.desc_casal || '0,00') : (ev.valor_casal || '0,00');
                const vS = nomeAniv ? (ev.desc_solteiro || '0,00') : (ev.valor_solteiro || '0,00');

                card.innerHTML = `
                    ${!nomeAniv ? `<img src="${ev.imagem}" class="banner-img">` : ''}
                    
                    <div class="p-8 text-center">
                        ${nomeAniv ? `
                            <div class="mb-6">
                                <p class="text-purple-400 font-black uppercase text-[10px] tracking-[0.4em] mb-2">Convite Especial</p>
                                <h3 class="text-3xl font-black uppercase italic text-white purple-glow leading-tight">${decodeURIComponent(nomeAniv)}</h3>
                                <p class="text-zinc-500 text-[11px] font-bold mt-4 px-6 uppercase italic leading-relaxed">
                                    "Comemore comigo na E-CLUB! Coloque seu nome na lista e garanta seu valor especial."
                                </p>
                            </div>
                        ` : `
                            <p class="text-[9px] text-yellow-500 font-black uppercase tracking-widest mb-1">${ev.data.split('-').reverse().join('/')}</p>
                            <h3 class="text-2xl font-black uppercase italic leading-tight mb-8">${ev.nome}</h3>
                        `}
                        
                        <div id="btn-init-${ev.id}">
                            <button onclick="iniciarReserva('${ev.id}')" class="w-full ${nomeAniv ? 'bg-purple-600' : 'bg-yellow-500'} text-white font-black py-5 rounded-2xl uppercase text-xs btn-action shadow-lg">
                                ${nomeAniv ? 'Garantir meu lugar na lista' : 'Colocar nome na lista'}
                            </button>
                        </div>

                        <div id="step-reserva-${ev.id}" class="hidden space-y-6 pt-6 border-t border-white/10 mt-6">
                            <div class="grid grid-cols-2 gap-3">
                                <button id="btn-casal-${ev.id}" onclick="selecionarTipo('${ev.id}', 'CASAL', '${vC}')" class="type-btn p-5 rounded-2xl text-[10px] font-black uppercase">Casal</button>
                                <button id="btn-solteiro-${ev.id}" onclick="selecionarTipo('${ev.id}', 'SOLTEIRO', '${vS}')" class="type-btn p-5 rounded-2xl text-[10px] font-black uppercase">Solteiro</button>
                            </div>

                            <div id="form-${ev.id}" class="hidden space-y-4 text-left">
                                <div class="bg-white/5 p-4 rounded-2xl text-center border border-white/10">
                                    <p class="text-[8px] text-zinc-500 uppercase font-black">Valor na Lista (${nomeAniv ? 'Desconto' : 'Normal'})</p>
                                    <p id="valor-display-${ev.id}" class="text-2xl font-black text-white italic">R$ 0,00</p>
                                </div>
                                <input type="text" id="nome-${ev.id}" placeholder="NOME COMPLETO" class="w-full site-input p-5 rounded-2xl font-bold text-xs uppercase">
                                <input type="tel" id="tel-${ev.id}" oninput="mascaraTelefone(this)" placeholder="(DDD) 00000-0000" class="w-full site-input p-5 rounded-2xl font-bold text-xs">
                                <button onclick="enviarReserva('${ev.id}', '${ev.nome}')" id="btn-final-${ev.id}" class="w-full bg-white text-black font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest btn-action">Confirmar Presença</button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.iniciarReserva = (id) => {
            document.getElementById('btn-init-'+id).classList.add('hidden');
            document.getElementById('step-reserva-'+id).classList.remove('hidden');
        };

        window.selecionarTipo = (id, tipo, valor) => {
            document.getElementById('btn-casal-'+id).classList.remove('active');
            document.getElementById('btn-solteiro-'+id).classList.remove('active');
            document.getElementById('btn-'+tipo.toLowerCase()+'-'+id).classList.add('active');
            
            document.getElementById('valor-display-'+id).innerText = "R$ " + valor;
            document.getElementById('form-'+id).classList.remove('hidden');
            document.getElementById('form-'+id).setAttribute('data-tipo', tipo);
        };

        window.enviarReserva = async (id, nomeFesta) => {
            const nome = document.getElementById('nome-'+id).value.trim();
            const tel = document.getElementById('tel-'+id).value.trim();
            const tipo = document.getElementById('form-'+id).getAttribute('data-tipo');
            const btn = document.getElementById('btn-final-'+id);

            if (!nome || tel.length < 14) return alert("Preencha nome e telefone corretamente.");
            btn.disabled = true;
            btn.innerText = "SINCRONIZANDO...";

            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: nome.toUpperCase(),
                    telefone: tel,
                    evento: nomeFesta,
                    tipo_entrada: tipo,
                    promoter: refPromoter.toLowerCase(),
                    aniversariante: nomeAniv ? nomeAniv.toUpperCase() : "",
                    tipo_lista: nomeAniv ? "ANIVERSARIO" : "NORMAL",
                    entrou: false,
                    data_reserva: new Date().toISOString()
                });
                document.getElementById('telaSucesso').classList.remove('hidden');
            } catch (e) { alert("Erro ao enviar."); btn.disabled = false; }
        };

        carregarAgenda();
    </script>
</body>
</html>
