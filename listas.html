<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Lista de Convidados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #000); 
            background-attachment: fixed;
            color: #fff; min-height: 100vh; 
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-gradient { background: linear-gradient(135deg, #eab308 0%, #a16207 100%); }
        .purple-badge { background: rgba(147, 51, 234, 0.15); border: 1px solid rgba(147, 51, 234, 0.3); }
        input, select { background: #0a0a0a !important; border: 1px solid #1f1f1f !important; color: #fff !important; }
        input:focus { border-color: #eab308 !important; outline: none; }
        .banner-img { width: 100%; border-radius: 1.5rem; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 1.5rem; display: none; }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen space-y-6">

    <div class="w-full max-w-md glass p-8 md:p-10 rounded-[3rem] shadow-2xl border border-white/5 mt-4">
        <div class="text-center mb-6">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 mx-auto mb-6">
            
            <div id="layoutAniversario" class="hidden mb-4">
                <p class="text-purple-400 font-black uppercase italic text-[10px] tracking-[0.3em] mb-2">Lista de Aniversário</p>
                <h1 id="nomeAniv" class="text-2xl font-black uppercase text-white tracking-tighter">---</h1>
            </div>
        </div>

        <img id="bannerEvento" src="" alt="Banner Evento" class="banner-img">

        <div id="boxValores" class="hidden mb-6 p-4 rounded-2xl bg-white/5 border border-white/10 flex justify-around items-center">
            <div class="text-center">
                <p class="text-[8px] font-black uppercase text-zinc-500">Casal</p>
                <p id="vCasal" class="text-lg font-black text-white">---</p>
            </div>
            <div class="h-8 w-[1px] bg-white/10"></div>
            <div class="text-center">
                <p class="text-[8px] font-black uppercase text-zinc-500">Solteiro</p>
                <p id="vSolteiro" class="text-lg font-black text-white">---</p>
            </div>
        </div>

        <form id="formReserva" class="space-y-4">
            <select id="listaEventos" class="w-full p-5 rounded-2xl font-bold uppercase text-xs outline-none" required onchange="atualizarInfoEvento()">
                <option value="">Carregando eventos...</option>
            </select>

            <select id="tipoEntrada" class="w-full p-5 rounded-2xl font-bold uppercase text-xs outline-none" required>
                <option value="">COMO VOCÊ VAI ENTRAR?</option>
                <option value="CASAL">CASAL</option>
                <option value="SOLTEIRO">SOLTEIRO(A)</option>
            </select>

            <div class="space-y-4">
                <input type="text" id="nomeCliente" placeholder="SEU NOME COMPLETO" class="w-full p-5 rounded-2xl font-bold uppercase text-xs" required>
                <input type="tel" id="telCliente" placeholder="WHATSAPP (DDD + NÚMERO)" class="w-full p-5 rounded-2xl font-bold uppercase text-xs" required>
            </div>

            <button type="submit" id="btnEnviar" class="w-full gold-gradient text-black font-black py-6 rounded-2xl uppercase text-xs shadow-xl mt-4 tracking-widest transition-transform active:scale-95">
                Confirmar na Lista
            </button>
        </form>

        <div id="msgSucesso" class="hidden text-center mt-8 p-6 bg-green-500/10 border border-green-500/20 rounded-3xl">
            <p class="text-green-500 font-black uppercase text-xs">✅ Nome Confirmado!</p>
            <p class="text-zinc-400 text-[10px] mt-2 uppercase font-bold italic">Desconto aplicado na portaria.</p>
        </div>
    </div>

    <footer class="w-full max-w-md text-center space-y-4 pb-10">
        <div class="flex justify-center gap-6 text-xl">
            <a href="https://www.instagram.com/eclubswingdance/" target="_blank" class="text-white hover:text-yellow-500"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/5541995040506" target="_blank" class="text-white hover:text-yellow-500"><i class="fab fa-whatsapp"></i></a>
        </div>
        <p class="text-[10px] font-bold text-zinc-500">Rua Albino Kaminski, 645 - Bairro Alto, Curitiba</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const refPromoter = params.get('ref') || "direto";
        const nomeAniv = params.get('aniv');
        const festaFixa = params.get('festa');
        let eventosAtivos = [];

        async function inicializar() {
            const select = document.getElementById('listaEventos');
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            
            eventosAtivos = snap.docs.map(d => d.data());
            select.innerHTML = '';
            
            if (festaFixa && nomeAniv) {
                document.getElementById('layoutAniversario').classList.remove('hidden');
                document.getElementById('nomeAniv').innerText = decodeURIComponent(nomeAniv);
                select.innerHTML = `<option value="${decodeURIComponent(festaFixa)}" selected>${decodeURIComponent(festaFixa)}</option>`;
                select.style.display = 'none';
                atualizarInfoEvento();
            } else {
                select.innerHTML = '<option value="">SELECIONE O EVENTO</option>';
                eventosAtivos.forEach(ev => {
                    select.innerHTML += `<option value="${ev.nome}">${ev.nome}</option>`;
                });
            }
        }

        window.atualizarInfoEvento = function() {
            const nomeSelecionado = document.getElementById('listaEventos').value;
            const banner = document.getElementById('bannerEvento');
            const box = document.getElementById('boxValores');
            const ev = eventosAtivos.find(e => e.nome === nomeSelecionado);

            if (ev) {
                // Banner
                if (ev.imagem) {
                    banner.src = ev.imagem;
                    banner.style.display = 'block';
                } else { banner.style.display = 'none'; }

                // Valores (Checa se é aniversário para mostrar desconto ou valor normal)
                box.classList.remove('hidden');
                box.classList.toggle('purple-badge', !!nomeAniv);
                
                if (nomeAniv) {
                    document.getElementById('vCasal').innerText = "R$ " + (ev.desc_casal || "--");
                    document.getElementById('vSolteiro').innerText = "R$ " + (ev.desc_solteiro || "--");
                } else {
                    document.getElementById('vCasal').innerText = "R$ " + (ev.valor_casal || "--");
                    document.getElementById('vSolteiro').innerText = "R$ " + (ev.valor_solteiro || "--");
                }
            } else {
                banner.style.display = 'none';
                box.classList.add('hidden');
            }
        }

        document.getElementById('formReserva').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: document.getElementById('nomeCliente').value.toUpperCase().trim(),
                    telefone: document.getElementById('telCliente').value.trim(),
                    evento: document.getElementById('listaEventos').value,
                    tipo_entrada: document.getElementById('tipoEntrada').value,
                    promoter: refPromoter.toLowerCase(),
                    aniversariante: nomeAniv ? nomeAniv.toUpperCase() : "",
                    tipo_lista: nomeAniv ? "ANIVERSARIO" : "NORMAL",
                    entrou: false,
                    data_reserva: new Date().toISOString()
                });

                document.getElementById('formReserva').classList.add('hidden');
                document.getElementById('msgSucesso').classList.remove('hidden');
                setTimeout(() => location.reload(), 4000);
            } catch (err) { alert("Erro!"); btn.disabled = false; }
        });

        inicializar();
    </script>
</body>
</html>
