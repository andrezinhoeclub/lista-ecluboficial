<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <title>E-CLUB | Reservas e Listas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.96); }
        .festa-card { background: #000; border: 1px solid rgba(255,255,255,0.1); border-radius: 2.5rem; overflow: hidden; margin-bottom: 2rem; }
        .img-banner { width: 100%; display: block; object-fit: cover; }
        .btn-lista { background: #eab308; color: #000; font-weight: 900; text-transform: uppercase; }
        .btn-secundario { background: #111; border: 1px solid #27272a; color: #fff; font-weight: 800; text-transform: uppercase; font-size: 10px; }
        .site-input { background: #000 !important; border: 1px solid #27272a !important; color: white !important; }
        .site-input:disabled { opacity: 0.2; cursor: not-allowed; }
        .glass-modal { background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        
        .modal-scroll { max-height: 90vh; overflow-y: auto; scrollbar-width: none; }
        .modal-scroll::-webkit-scrollbar { display: none; }

        .btn-tipo { background: #0c0c0e; border: 1px solid #27272a; transition: 0.3s; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100px; padding: 10px; }
        .btn-tipo.active { border-color: #eab308; background: rgba(234, 179, 8, 0.1); }
        
        .btn-retornar { background: #1a1a1a; border: 1px solid #333; color: #a1a1aa; font-weight: 900; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <div class="max-w-md mx-auto w-full flex-grow text-white">
        <header class="flex justify-center py-10 text-white">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-16 w-auto">
        </header>
        <div id="listaEventos" class="space-y-8 text-white">
            <div class="animate-pulse text-center py-20 text-zinc-800 font-black uppercase text-[10px]">Filtrando eventos ativos...</div>
        </div>
    </div>

    <div id="modalForm" class="hidden fixed inset-0 z-50 glass-modal flex items-center justify-center p-6 text-white text-white">
        <div class="modal-scroll w-full max-w-sm bg-[#121214] border border-white/10 p-8 rounded-[3rem] text-center shadow-2xl text-white">
            <h2 id="modal-titulo" class="text-yellow-500 font-black uppercase italic mb-2 tracking-widest text-sm text-white text-white">Reserva de Lista</h2>
            <p id="modal-subtitulo" class="text-zinc-500 text-[9px] font-bold uppercase mb-8 text-white text-white">Escolha Casal ou Solteiro para liberar</p>
            
            <div class="space-y-4 text-left text-white text-white">
                <div class="grid grid-cols-2 gap-3 mb-4 text-white">
                    <button onclick="setTipo('CASAL')" id="btn-tipo-casal" class="btn-tipo rounded-2xl text-white">
                        <span class="text-[9px] font-black uppercase text-zinc-500 mb-2 text-white">Casal</span>
                        <span id="preco-casal-modal" class="text-[11px] font-black italic text-white uppercase text-center leading-tight">---</span>
                    </button>
                    <button onclick="setTipo('SOLTEIRO')" id="btn-tipo-solteiro" class="btn-tipo rounded-2xl text-white text-white">
                        <span class="text-[9px] font-black uppercase text-zinc-500 mb-2 text-white">Solteiro</span>
                        <span id="preco-solteiro-modal" class="text-[11px] font-black italic text-white uppercase text-center leading-tight">---</span>
                    </button>
                </div>

                <input type="text" id="nome-cliente" disabled placeholder="NOME COMPLETO" class="w-full site-input p-5 rounded-2xl font-bold text-xs uppercase text-white">
                <input type="tel" id="tel-cliente" disabled oninput="mascaraTelefone(this)" placeholder="(41) 99999-9999" class="w-full site-input p-5 rounded-2xl font-bold text-xs text-white">
                
                <button onclick="finalizarPedido()" id="btn-confirmar" disabled class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest btn-action shadow-xl mt-4 disabled:opacity-20">Confirmar Presença</button>
                
                <button onclick="fecharModal()" class="w-full btn-retornar py-4 rounded-2xl uppercase text-[10px] tracking-widest mt-2 btn-action">
                    Retornar para Eventos
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let eventosCache = [];
        let eventoAtivo = null;
        let tipoAtivo = '';
        const params = new URLSearchParams(window.location.search);
        let nomeAniv = params.get('aniv') || "";
        let idLink = params.get('id');

        const formatarValor = (v) => {
            if(!v || v === "") return "VALOR NA PORTARIA";
            return v.toString().toUpperCase();
        };

        async function carregarPagina() {
            if (idLink) {
                const docAniv = await getDoc(doc(db, "links_aniversario", idLink));
                if (docAniv.exists()) { nomeAniv = docAniv.data().aniversariante; }
            }

            // Pega a data de hoje no formato YYYY-MM-DD
            const agora = new Date();
            const hojeStr = agora.toISOString().split('T')[0];

            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            
            eventosCache = [];
            snap.forEach(d => {
                const ev = { id: d.id, ...d.data() };
                // Só adiciona se a data do evento for hoje ou no futuro
                if (ev.data >= hojeStr) {
                    eventosCache.push(ev);
                }
            });

            const container = document.getElementById('listaEventos');
            container.innerHTML = '';

            // Ordena por data (mais próxima primeiro)
            eventosCache.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                const card = document.createElement('div');
                card.className = "festa-card";
                card.innerHTML = `
                    ${ev.imagem ? `<img src="${ev.imagem}" class="img-banner">` : ''}
                    <div class="p-8 text-center text-white">
                        <p class="text-[10px] text-yellow-500 font-black uppercase tracking-widest mb-2 text-white">${ev.data.split('-').reverse().join('/')}</p>
                        <h3 class="text-3xl font-black uppercase italic leading-tight mb-8 text-white">${ev.nome}</h3>
                        <div class="space-y-3">
                            <button onclick="abrirFluxo('${ev.id}')" class="w-full btn-lista py-5 rounded-2xl btn-action text-sm">Nome na Lista</button>
                            <div class="grid grid-cols-1">
                                <a href="https://wa.me/5541995040506?text=Olá, gostaria de reservar um camarote para a festa ${ev.nome}" target="_blank" class="btn-secundario py-4 rounded-2xl text-center btn-action text-white">Reservar Camarote</a>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            if (eventosCache.length === 0) {
                container.innerHTML = '<p class="text-center py-20 text-zinc-500 font-bold uppercase text-xs">Nenhum evento disponível no momento.</p>';
            }
        }

        window.abrirFluxo = (id) => {
            eventoAtivo = eventosCache.find(e => e.id === id);
            
            let vC, vS;
            if (nomeAniv !== "") {
                vC = eventoAtivo.desc_casal;
                vS = eventoAtivo.desc_solteiro;
                document.getElementById('modal-titulo').innerText = 'Lista VIP';
            } else {
                vC = eventoAtivo.valor_casal;
                vS = eventoAtivo.valor_solteiro;
                document.getElementById('modal-titulo').innerText = 'Reserva de Lista';
            }

            document.getElementById('preco-casal-modal').innerText = formatarValor(vC);
            document.getElementById('preco-solteiro-modal').innerText = formatarValor(vS);
            document.getElementById('modalForm').classList.remove('hidden');
            
            document.getElementById('nome-cliente').value = "";
            document.getElementById('tel-cliente').value = "";
            document.getElementById('nome-cliente').disabled = true;
            document.getElementById('tel-cliente').disabled = true;
            document.getElementById('btn-confirmar').disabled = true;
            document.getElementById('btn-tipo-casal').classList.remove('active');
            document.getElementById('btn-tipo-solteiro').classList.remove('active');
        };

        window.setTipo = (tipo) => {
            tipoAtivo = tipo;
            document.getElementById('btn-tipo-casal').classList.toggle('active', tipo === 'CASAL');
            document.getElementById('btn-tipo-solteiro').classList.toggle('active', tipo === 'SOLTEIRO');
            document.getElementById('nome-cliente').disabled = false;
            document.getElementById('tel-cliente').disabled = false;
            document.getElementById('btn-confirmar').disabled = false;
        };

        window.finalizarPedido = async () => {
            const n = document.getElementById('nome-cliente').value.trim();
            const t = document.getElementById('tel-cliente').value.trim();
            if (!n || t.length < 14) return alert("Preencha os dados corretamente.");

            const btn = document.getElementById('btn-confirmar');
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: n.toUpperCase(), tel: t, evento: eventoAtivo.nome,
                    tipo_entrada: tipoAtivo, categoria: "LISTA",
                    aniversariante: nomeAniv.toUpperCase(),
                    data_reserva: new Date().toISOString()
                });
                alert("Confirmado! Seu nome está na lista.");
                location.reload();
            } catch (e) { 
                alert("Erro ao enviar."); 
                btn.innerText = "Confirmar Presença";
                btn.disabled = false;
            }
        };

        window.fecharModal = () => document.getElementById('modalForm').classList.add('hidden');
        window.mascaraTelefone = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v;
            if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            i.value = v;
        };

        carregarPagina();
    </script>
</body>
</html>
