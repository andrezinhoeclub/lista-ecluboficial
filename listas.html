<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Lista de Convidados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #000); 
            background-attachment: fixed;
            color: #fff; 
            min-height: 100vh; 
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-gradient { background: linear-gradient(135deg, #eab308 0%, #a16207 100%); }
        input, select { background: #0a0a0a !important; border: 1px solid #1f1f1f !important; color: #fff !important; }
        input:focus { border-color: #eab308 !important; outline: none; }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md glass p-10 rounded-[3rem] shadow-2xl border border-white/5">
        <div class="text-center mb-10">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-12 mx-auto mb-8">
            
            <div id="headerAniversario" class="hidden mb-6">
                <p class="text-yellow-500 font-black uppercase italic text-[10px] tracking-[0.3em] mb-2">Lista de Convidados</p>
                <h1 id="nomeAniv" class="text-3xl font-black uppercase leading-none tracking-tighter text-white">---</h1>
            </div>

            <div id="infoFesta">
                <h2 id="tituloEvento" class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.3em]">Escolha sua Festa</h2>
            </div>
        </div>

        <form id="formReserva" class="space-y-4">
            <select id="listaEventos" class="w-full p-5 rounded-2xl font-bold uppercase text-xs outline-none" required>
                <option value="">Carregando eventos...</option>
            </select>

            <div class="space-y-4 pt-2">
                <input type="text" id="nomeCliente" placeholder="SEU NOME COMPLETO" class="w-full p-5 rounded-2xl font-bold uppercase text-xs" required>
                <input type="tel" id="telCliente" placeholder="WHATSAPP (COM DDD)" class="w-full p-5 rounded-2xl font-bold uppercase text-xs" required>
            </div>

            <button type="submit" id="btnEnviar" class="w-full gold-gradient text-black font-black py-6 rounded-2xl uppercase text-xs shadow-xl mt-6 tracking-widest transition-transform active:scale-95">
                Confirmar na Lista
            </button>
        </form>

        <div id="msgSucesso" class="hidden text-center mt-8 p-6 bg-green-500/10 border border-green-500/20 rounded-3xl">
            <p class="text-green-500 font-black uppercase text-xs">✅ Confirmado com Sucesso!</p>
            <p class="text-zinc-400 text-[10px] mt-2 uppercase font-bold">Aguardamos você na E-CLUB</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Capturar parâmetros da URL para automação
        const params = new URLSearchParams(window.location.search);
        const refPromoter = params.get('ref') || "DIRETO";
        const nomeAniv = params.get('aniv');
        const festaFixa = params.get('festa');

        async function inicializar() {
            const select = document.getElementById('listaEventos');
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            
            select.innerHTML = '';
            
            // SE FOR LINK DE ANIVERSÁRIO GERADO PELO PROMOTER
            if (festaFixa && nomeAniv) {
                document.getElementById('headerAniversario').classList.remove('hidden');
                document.getElementById('nomeAniv').innerText = "ANIVERSÁRIO " + decodeURIComponent(nomeAniv);
                document.getElementById('tituloEvento').innerText = "EVENTO: " + decodeURIComponent(festaFixa);
                document.getElementById('tituloEvento').classList.add('text-yellow-500/50');
                
                // Trava a escolha da festa
                select.classList.add('hidden');
                select.innerHTML = `<option value="${decodeURIComponent(festaFixa)}" selected>${decodeURIComponent(festaFixa)}</option>`;
            } else {
                // FLUXO NORMAL DE LISTA
                select.innerHTML = '<option value="">SELECIONE O EVENTO</option>';
                snap.forEach(doc => {
                    const ev = doc.data();
                    select.innerHTML += `<option value="${ev.nome}">${ev.nome}</option>`;
                });
            }
        }

        document.getElementById('formReserva').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";

            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: document.getElementById('nomeCliente').value.toUpperCase().trim(),
                    telefone: document.getElementById('telCliente').value.trim(),
                    evento: document.getElementById('listaEventos').value,
                    promoter: refPromoter.toLowerCase(),
                    aniversariante: nomeAniv ? nomeAniv.toUpperCase() : "",
                    tipo: nomeAniv ? "ANIVERSARIO" : "NORMAL",
                    entrou: false,
                    data_reserva: new Date().toISOString()
                });

                document.getElementById('formReserva').classList.add('hidden');
                document.getElementById('msgSucesso').classList.remove('hidden');
                
                // Recarrega após 4 segundos para nova reserva se necessário
                setTimeout(() => location.reload(), 4000);

            } catch (err) {
                console.error(err);
                alert("Erro ao enviar. Tente novamente.");
                btn.disabled = false;
                btn.innerText = "Confirmar na Lista";
            }
        });

        inicializar();
    </script>
</body>
</html>
