<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <title>E-CLUB | Checkout de Ingressos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.96); }
        .tab-btn { background: #111; border: 1px solid #27272a; color: #52525b; transition: 0.3s; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .tab-btn.active { background: #eab308; border-color: #eab308; color: black; box-shadow: 0 0 15px rgba(234,179,8,0.3); }
        .card-ingresso { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 2rem; transition: 0.3s; }
        .card-ingresso.selected { border-color: #eab308; background: rgba(234,179,8,0.05); }
        .site-input { background: #000 !important; border: 1px solid #27272a !important; color: white !important; }
        .site-input:focus { border-color: #eab308 !important; outline: none; }
        .glass-modal { background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <div class="max-w-md mx-auto w-full flex-grow">
        <header class="flex justify-center py-8">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-14 w-auto">
        </header>

        <div class="grid grid-cols-3 gap-2 mb-8">
            <button onclick="mudarAba('antecipado')" id="tab-antecipado" class="tab-btn p-4 rounded-2xl active">Antecipado</button>
            <button onclick="mudarAba('reserva')" id="tab-reserva" class="tab-btn p-4 rounded-2xl">Lista</button>
            <button onclick="mudarAba('aniversario')" id="tab-aniversario" class="tab-btn p-4 rounded-2xl">Aniv</button>
        </div>

        <div id="listaEventos" class="space-y-6">
            </div>

        <div id="form-final" class="hidden mt-10 space-y-4 border-t border-zinc-900 pt-10">
            <h3 class="text-center text-yellow-500 font-black uppercase italic text-sm mb-6">Finalizar Inscrição</h3>
            <input type="text" id="nome-cliente" placeholder="NOME COMPLETO" class="w-full site-input p-5 rounded-2xl font-bold text-xs uppercase">
            <input type="tel" id="tel-cliente" oninput="mascaraTelefone(this)" placeholder="(41) 99999-9999" class="w-full site-input p-5 rounded-2xl font-bold text-xs">
            
            <div id="info-pagamento" class="bg-zinc-900/50 p-6 rounded-3xl text-center border border-white/5">
                <p class="text-[9px] text-zinc-500 uppercase font-black mb-1">Total a pagar agora</p>
                <p id="total-display" class="text-3xl font-black text-white italic">R$ 0,00</p>
            </div>

            <button onclick="processarPedido()" id="btn-finalizar" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-[11px] tracking-widest btn-action shadow-xl">
                Gerar PIX e Confirmar
            </button>
        </div>
    </div>

    <div id="modalPix" class="hidden fixed inset-0 z-[60] glass-modal flex items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm bg-zinc-900 border border-white/10 p-8 rounded-[3rem]">
            <h2 class="text-yellow-500 font-black uppercase italic mb-2 tracking-widest text-sm">Pagamento PIX</h2>
            <div class="bg-white p-4 rounded-3xl inline-block mb-6 mt-4">
                <img id="imgQrCode" class="w-48 h-48 mx-auto" src="">
            </div>
            <textarea id="payloadPix" readonly class="w-full p-4 bg-black border border-zinc-800 rounded-xl text-[9px] font-mono text-zinc-400 h-20 mb-4 resize-none select-all"></textarea>
            <button onclick="copiarPix()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl uppercase text-xs mb-4">Copiar Código</button>
            <button onclick="confirmarPedidoNoFirebase()" class="w-full text-zinc-500 font-bold uppercase text-[9px] tracking-widest py-2">Já paguei / Concluir</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let abaAtual = 'antecipado';
        let eventoSelecionado = null;
        let tipoIngressoSelecionado = null;
        let valorSelecionado = 0;
        let eventosCache = [];

        window.mudarAba = (aba) => {
            abaAtual = aba;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+aba).classList.add('active');
            renderizarCards();
            document.getElementById('form-final').classList.add('hidden');
        };

        async function carregarEventos() {
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            eventosCache = [];
            snap.forEach(d => eventosCache.push({ id: d.id, ...d.data() }));
            renderizarCards();
        }

        function renderizarCards() {
            const container = document.getElementById('listaEventos');
            container.innerHTML = '';

            eventosCache.forEach(ev => {
                let vCasal, vSolteiro;
                
                if (abaAtual === 'antecipado') {
                    vCasal = ev.valor_antecipado_casal || 0;
                    vSolteiro = ev.valor_antecipado_solteiro || 0;
                } else if (abaAtual === 'reserva') {
                    vCasal = ev.valor_casal || 0;
                    vSolteiro = ev.valor_solteiro || 0;
                } else {
                    vCasal = ev.desc_casal || 0;
                    vSolteiro = ev.desc_solteiro || 0;
                }

                const html = `
                    <div class="space-y-4">
                        <div class="text-center mb-4">
                            <h2 class="text-lg font-black uppercase italic">${ev.nome}</h2>
                            <p class="text-[10px] text-zinc-500 font-bold uppercase">${ev.data.split('-').reverse().join('/')}</p>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div onclick="selecionarIngresso('${ev.id}', 'CASAL', ${vCasal})" class="card-ingresso p-6 text-center cursor-pointer btn-action">
                                <p class="text-[8px] text-zinc-500 font-black uppercase mb-1">Casal</p>
                                <p class="text-xl font-black italic">R$ ${vCasal}</p>
                            </div>
                            <div onclick="selecionarIngresso('${ev.id}', 'SOLTEIRO', ${vSolteiro})" class="card-ingresso p-6 text-center cursor-pointer btn-action">
                                <p class="text-[8px] text-zinc-500 font-black uppercase mb-1">Solteiro</p>
                                <p class="text-xl font-black italic">R$ ${vSolteiro}</p>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        window.selecionarIngresso = (evId, tipo, valor) => {
            eventoSelecionado = eventosCache.find(e => e.id === evId);
            tipoIngressoSelecionado = tipo;
            valorSelecionado = valor;

            document.getElementById('total-display').innerText = `R$ ${valor.toFixed(2).replace('.', ',')}`;
            document.getElementById('form-final').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };

        window.processarPedido = async () => {
            const nome = document.getElementById('nome-cliente').value.trim();
            const tel = document.getElementById('tel-cliente').value.trim();
            const btn = document.getElementById('btn-finalizar');

            if (!nome || tel.length < 14) return alert("Preencha nome e telefone corretamente.");

            btn.innerText = "GERANDO PIX...";
            btn.disabled = true;

            // Chamar a função do Asaas (Como configurado anteriormente)
            // Aqui você deve inserir a lógica de fetch para a API do Asaas que enviamos antes
            // Para teste, simularemos a abertura do modal
            alert("Gerando PIX para: " + tipoIngressoSelecionado + " - Valor: R$ " + valorSelecionado);
            document.getElementById('modalPix').classList.remove('hidden');
            btn.innerText = "Gerar PIX e Confirmar";
            btn.disabled = false;
        };

        window.confirmarPedidoNoFirebase = async () => {
            const nome = document.getElementById('nome-cliente').value.toUpperCase();
            const tel = document.getElementById('tel-cliente').value;

            await addDoc(collection(db, "lista_eventos"), {
                nome,
                tel,
                evento: eventoSelecionado.nome,
                tipo_entrada: tipoIngressoSelecionado,
                categoria: abaAtual.toUpperCase(),
                valor: valorSelecionado,
                pago: abaAtual === 'antecipado', // Se for antecipado, marca como aguardando confirmação pix
                data_reserva: new Date().toISOString()
            });

            document.getElementById('modalPix').classList.add('hidden');
            alert("RESERVA ENVIADA COM SUCESSO!");
            location.reload();
        };

        window.mascaraTelefone = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v;
            if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            i.value = v;
        };

        carregarEventos();
    </script>
</body>
</html>
