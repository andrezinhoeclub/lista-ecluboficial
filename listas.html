<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <title>E-CLUB | Lista Oficial ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --neon-purple: #a855f7; --eclub-gold: #eab308; }
        body { font-family: 'Inter', sans-serif; background: #050508; color: #fff; background-image: radial-gradient(circle at top right, #1a1025 0%, #050508 100%); min-height: 100vh; }
        .festa-card { background: rgba(15, 15, 20, 0.6); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 3.5rem; overflow: hidden; backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin-bottom: 2rem; }
        .btn-lista { background: linear-gradient(135deg, var(--eclub-gold) 0%, #fbbf24 100%); color: #000; font-weight: 900; }
        .site-input { background: #0f0f15 !important; border: 1px solid #27273a !important; color: #fff !important; }
        .btn-tipo.active { border-color: var(--neon-purple); background: rgba(168, 85, 247, 0.05); }
    </style>
</head>
<body class="p-6 flex flex-col">
    <div class="max-w-md mx-auto w-full flex-grow text-white">
        <header class="flex justify-center py-12">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16">
        </header>
        
        <div id="avisoLista" class="hidden mb-8 p-4 rounded-3xl bg-purple-500/10 border border-purple-500/30 text-center">
            <p class="text-[10px] uppercase font-black tracking-widest text-purple-400">✨ Você está no link de:</p>
            <p id="nomeAnivDestaque" class="text-xl font-black uppercase text-white leading-tight"></p>
        </div>

        <div id="listaEventos" class="space-y-8"></div>
    </div>

    <div id="modalForm" class="hidden fixed inset-0 z-[9999] bg-black/95 backdrop-blur-xl flex items-center justify-center p-6 text-white">
        <div class="w-full max-w-sm bg-[#0d0d14] border border-white/10 p-10 rounded-[4rem] text-center shadow-2xl">
            <h2 id="modal-titulo" class="text-yellow-500 font-black uppercase italic mb-1 tracking-widest text-base">Reserva E-Club</h2>
            <p id="subtituloModal" class="text-zinc-500 text-[10px] font-bold uppercase mb-8">Preencha os dados abaixo</p>
            
            <div class="space-y-6 text-left">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <button onclick="setTipo('CASAL')" id="btn-tipo-casal" class="p-6 bg-[#13131c] border border-[#27273a] rounded-[2.5rem] flex flex-col items-center gap-1">
                        <span class="text-[10px] font-black uppercase text-zinc-500">👫 Casal</span>
                        <span id="preco-casal-modal" class="font-black text-white text-xs">---</span>
                    </button>
                    <button onclick="setTipo('SOLTEIRO')" id="btn-tipo-solteiro" class="p-6 bg-[#13131c] border border-[#27273a] rounded-[2.5rem] flex flex-col items-center gap-1">
                        <span class="text-[10px] font-black uppercase text-zinc-500">👤 Solteiro</span>
                        <span id="preco-solteiro-modal" class="font-black text-white text-xs">---</span>
                    </button>
                </div>
                <div id="campos-cliente" class="space-y-4 opacity-10 pointer-events-none transition-all duration-500">
                    <input type="text" id="nome-cliente" placeholder="NOME COMPLETO" class="w-full site-input p-6 rounded-3xl font-bold text-xs uppercase text-white">
                    <input type="tel" id="tel-cliente" oninput="mask(this)" placeholder="(41) 99999-9999" class="w-full site-input p-6 rounded-3xl font-bold text-xs text-white">
                </div>
                <button onclick="finalizarPedido()" id="btn-confirmar" disabled class="w-full btn-lista py-6 rounded-3xl uppercase text-xs font-black tracking-widest disabled:opacity-5">Confirmar Presença ✨</button>
                <button onclick="fecharModal()" class="w-full text-zinc-600 uppercase text-[10px] font-black tracking-widest pt-4 text-center">Voltar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // VARIÁVEIS DE ESTADO GLOBAIS
        let RASTREIO = {
            promoter: "direto",
            aniversariante: ""
        };

        const urlParams = new URLSearchParams(window.location.search);
        const refUrl = urlParams.get('ref');
        const idAnivUrl = urlParams.get('id');

        let eventosCache = []; let eventoAtivo = null; let tipoAtivo = '';

        async function carregarPagina() {
            // 1. LIMPA TUDO ANTES DE COMEÇAR
            sessionStorage.clear();

            // 2. BUSCA DADOS DE ANIVERSÁRIO SE EXISTIR ID
            if (idAnivUrl) {
                try {
                    const snapA = await getDoc(doc(db, "links_aniversario", idAnivUrl));
                    if (snapA.exists()) {
                        const d = snapA.data();
                        RASTREIO.promoter = d.promoter.toLowerCase().trim();
                        RASTREIO.aniversariante = d.aniversariante.toUpperCase().trim();
                        
                        // Mostra o aviso visual para o cliente
                        document.getElementById('avisoLista').classList.remove('hidden');
                        document.getElementById('nomeAnivDestaque').innerText = RASTREIO.aniversariante;
                    }
                } catch (e) { console.error("Erro no rastreio"); }
            } else if (refUrl) {
                RASTREIO.promoter = refUrl.toLowerCase().trim();
            }

            // 3. CARREGA EVENTOS
            const agora = new Date().toISOString().split('T')[0];
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            eventosCache = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(ev => ev.data >= agora);

            const container = document.getElementById('listaEventos');
            container.innerHTML = '';
            eventosCache.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                container.innerHTML += `
                    <div class="festa-card text-white">
                        ${ev.imagem ? `<img src="${ev.imagem}" class="w-full h-48 object-cover border-b border-white/5">` : ''}
                        <div class="p-8 text-center">
                            <div class="inline-block px-4 py-1 rounded-full bg-purple-500/10 border border-purple-500/20 mb-4">
                                <p class="text-[10px] text-purple-400 font-black uppercase tracking-widest italic">${ev.data.split('-').reverse().join('/')}</p>
                            </div>
                            <h3 class="text-2xl font-black uppercase italic leading-tight mb-8">${ev.nome}</h3>
                            <button onclick="abrirFluxo('${ev.id}')" class="w-full btn-lista py-5 rounded-[2rem] text-sm italic">🚀 QUERO MEU NOME NA LISTA</button>
                        </div>
                    </div>`;
            });
        }

        window.abrirFluxo = (id) => {
            eventoAtivo = eventosCache.find(e => e.id === id);
            const isAniv = RASTREIO.aniversariante !== "";
            const vC = isAniv ? eventoAtivo.desc_casal : eventoAtivo.valor_casal;
            const vS = isAniv ? eventoAtivo.desc_solteiro : eventoAtivo.valor_solteiro;
            
            document.getElementById('modal-titulo').innerText = isAniv ? '🎉 Lista VIP' : '🔥 Nome na Lista';
            document.getElementById('subtituloModal').innerText = isAniv ? 'Convidados de ' + RASTREIO.aniversariante : 'Preencha os dados abaixo';
            document.getElementById('preco-casal-modal').innerText = vC ? "R$ " + vC : "PORTARIA";
            document.getElementById('preco-solteiro-modal').innerText = vS ? "R$ " + vS : "PORTARIA";
            document.getElementById('modalForm').classList.remove('hidden');
        };

        window.setTipo = (tipo) => {
            tipoAtivo = tipo;
            document.getElementById('btn-tipo-casal').classList.toggle('active', tipo === 'CASAL');
            document.getElementById('btn-tipo-solteiro').classList.toggle('active', tipo === 'SOLTEIRO');
            document.getElementById('campos-cliente').classList.remove('opacity-10', 'pointer-events-none');
            document.getElementById('btn-confirmar').disabled = false;
        };

        window.finalizarPedido = async () => {
            const n = document.getElementById('nome-cliente').value.trim().toUpperCase();
            const t = document.getElementById('tel-cliente').value.trim();
            if (!n || t.length < 14) return alert("Preencha nome e celular corretamente!");
            
            const btn = document.getElementById('btn-confirmar');
            btn.innerText = "GRAVANDO..."; btn.disabled = true;

            try {
                // GRAVAÇÃO USANDO O OBJETO GLOBAL RASTREIO (GARANTE O NOME DA MARIA)
                await addDoc(collection(db, "lista_eventos"), {
                    nome: n,
                    tel: t,
                    evento: eventoAtivo.nome,
                    tipo_entrada: tipoAtivo,
                    categoria: "LISTA",
                    promoter: RASTREIO.promoter, 
                    aniversariante: RASTREIO.aniversariante,
                    data_reserva: new Date().toISOString(),
                    entrou: false
                });
                
                alert("SUCESSO! Seu nome está confirmado na lista: " + eventoAtivo.nome + " ✨");
                location.reload();
            } catch (e) { 
                alert("Erro ao enviar. Tente novamente."); 
                btn.disabled = false; 
            }
        };

        window.fecharModal = () => document.getElementById('modalForm').classList.add('hidden');
        window.mask = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v;
            if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            i.value = v;
        };
        
        carregarPagina();
    </script>
</body>
</html>
