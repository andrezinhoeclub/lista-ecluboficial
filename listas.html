<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <title>E-CLUB | Garanta sua Diversão ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --neon-purple: #a855f7;
            --neon-blue: #38bdf8;
            --eclub-gold: #eab308;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050508; 
            color: #fff; 
            background-image: radial-gradient(circle at top right, #1a1025 0%, #050508 100%);
        }

        .btn-action { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-action:active { transform: scale(0.95); }

        /* Festa Card com muito mais vida */
        .festa-card { 
            background: rgba(15, 15, 20, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.03); 
            border-radius: 3rem; 
            overflow: hidden; 
            margin-bottom: 2.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: 0.3s;
        }
        .festa-card:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.1);
        }

        .img-banner { 
            width: 100%; 
            display: block; 
            object-fit: cover; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            filter: saturate(1.2);
        }

        /* Botões Vibrantes */
        .btn-lista { 
            background: linear-gradient(135deg, var(--eclub-gold) 0%, #fbbf24 100%); 
            color: #000; 
            font-weight: 900; 
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(234, 179, 8, 0.2);
        }
        .btn-lista:hover {
            box-shadow: 0 15px 30px rgba(234, 179, 8, 0.4);
            transform: translateY(-2px);
        }

        .btn-secundario { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 11px; 
        }
        .btn-secundario:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--neon-blue);
        }

        /* Inputs Modernos */
        .site-input { 
            background: #0f0f15 !important; 
            border: 1px solid #27273a !important; 
            color: #fff !important; 
            outline: none; 
        }
        .site-input:focus { 
            border-color: var(--neon-purple) !important; 
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
        }

        .glass-modal { background: rgba(5, 5, 10, 0.98); backdrop-filter: blur(20px); }

        /* Seleção de Tipo com Cores */
        .btn-tipo { 
            background: #13131c; 
            border: 1px solid #27273a; 
            transition: 0.3s; 
            min-height: 100px;
        }
        .btn-tipo.active { 
            border-color: var(--neon-purple); 
            background: rgba(168, 85, 247, 0.05); 
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.15); 
        }
        .btn-tipo.active .val-txt { color: var(--neon-purple); font-size: 16px; }

        .footer-link { 
            color: #71717a; 
            transition: 0.3s; 
            font-size: 11px; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
        }
        .footer-link:hover { color: var(--eclub-gold); }
    </style>
</head>
<body class="p-6 flex flex-col min-h-screen">

    <div class="max-w-md mx-auto w-full flex-grow text-white">
        <header class="flex justify-center py-12">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-16 w-auto drop-shadow-[0_0_15px_rgba(255,255,255,0.1)]">
        </header>

        <div id="listaEventos" class="space-y-10">
            <div class="text-center py-20">
                <div class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-purple-500 rounded-full mb-4"></div>
                <p class="text-zinc-500 font-black uppercase text-[10px] tracking-widest">Preparando a festa...</p>
            </div>
        </div>
    </div>

    <footer class="max-w-md mx-auto w-full pt-16 pb-12 text-center space-y-10">
        <div class="flex justify-center gap-12">
            <a href="https://instagram.com/andrezinhoeclub" target="_blank" class="footer-link flex flex-col items-center gap-2">
                <span class="text-xl">📸</span> Instagram
            </a>
            <a href="https://wa.me/5541995040506" target="_blank" class="footer-link flex flex-col items-center gap-2">
                <span class="text-xl">💬</span> WhatsApp
            </a>
        </div>
        
        <a href="https://www.google.com/maps/search/?api=1&query=E-CLUB+Curitiba" target="_blank" class="block group p-8 rounded-[2.5rem] bg-white/[0.02] border border-white/5">
            <p class="text-sky-400 font-black text-[9px] uppercase tracking-[0.3em] mb-3">📍 Como Chegar</p>
            <p class="text-zinc-400 font-bold text-xs uppercase italic group-hover:text-white transition-colors">Curitiba - PR</p>
        </a>

        <div class="pt-4 opacity-30 text-[8px] font-black uppercase tracking-[0.5em] text-purple-400">
            E-CLUB DIGITAL EXPERIENCE
        </div>
    </footer>

    <div id="modalForm" class="hidden fixed inset-0 z-50 glass-modal flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-[#0d0d14] border border-white/5 p-8 rounded-[3.5rem] text-center shadow-2xl">
            <div class="w-12 h-1 bg-gradient-to-r from-transparent via-purple-500 to-transparent mx-auto mb-6"></div>
            
            <h2 id="modal-titulo" class="text-yellow-500 font-black uppercase italic mb-1 tracking-widest text-sm">Lista E-Club</h2>
            <p id="modal-subtitulo" class="text-zinc-500 text-[9px] font-bold uppercase mb-8 tracking-tighter">Escolha o seu tipo de entrada</p>
            
            <div class="space-y-5 text-left">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <button onclick="setTipo('CASAL')" id="btn-tipo-casal" class="btn-tipo rounded-[2rem] text-white flex flex-col gap-1">
                        <span class="text-[9px] font-black uppercase text-zinc-500">👫 Casal</span>
                        <span id="preco-casal-modal" class="val-txt font-black text-white">---</span>
                    </button>
                    <button onclick="setTipo('SOLTEIRO')" id="btn-tipo-solteiro" class="btn-tipo rounded-[2rem] text-white flex flex-col gap-1">
                        <span class="text-[9px] font-black uppercase text-zinc-500">👤 Solteiro</span>
                        <span id="preco-solteiro-modal" class="val-txt font-black text-white">---</span>
                    </button>
                </div>

                <div id="campos-cliente" class="space-y-3 opacity-20 pointer-events-none transition-all duration-500">
                    <input type="text" id="nome-cliente" placeholder="NOME COMPLETO" class="w-full site-input p-5 rounded-2xl font-bold text-[11px] uppercase">
                    <input type="tel" id="tel-cliente" oninput="mascaraTelefone(this)" placeholder="(41) 99999-9999" class="w-full site-input p-5 rounded-2xl font-bold text-[11px]">
                </div>
                
                <div class="pt-4 space-y-3">
                    <button onclick="finalizarPedido()" id="btn-confirmar" disabled class="w-full btn-lista py-5 rounded-2xl uppercase text-[11px] tracking-widest btn-action disabled:opacity-5">Confirmar Presença ✨</button>
                    <button onclick="fecharModal()" class="w-full py-4 text-zinc-600 uppercase text-[10px] font-black tracking-widest hover:text-white transition-colors">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let eventosCache = [];
        let eventoAtivo = null;
        let tipoAtivo = '';
        const params = new URLSearchParams(window.location.search);
        let nomeAniv = params.get('aniv') || "";
        let idLink = params.get('id');

        const formatarValor = (v) => {
            if(!v || v === "") return "PORTARIA";
            return "R$ " + v.toString().toUpperCase();
        };

        async function carregarPagina() {
            if (idLink) {
                try {
                    const docAniv = await getDoc(doc(db, "links_aniversario", idLink));
                    if (docAniv.exists()) { nomeAniv = docAniv.data().aniversariante; }
                } catch(e) {}
            }
            const agora = new Date().toISOString().split('T')[0];
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            eventosCache = [];
            snap.forEach(d => {
                const ev = { id: d.id, ...d.data() };
                if (ev.data >= agora) { eventosCache.push(ev); }
            });

            const container = document.getElementById('listaEventos');
            container.innerHTML = '';
            eventosCache.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                const card = document.createElement('div');
                card.className = "festa-card";
                card.innerHTML = `
                    ${ev.imagem ? `<img src="${ev.imagem}" class="img-banner">` : ''}
                    <div class="p-10 text-center">
                        <div class="inline-block px-4 py-1 rounded-full bg-purple-500/10 border border-purple-500/20 mb-4">
                            <p class="text-[10px] text-purple-400 font-black uppercase tracking-[0.2em] italic">${ev.data.split('-').reverse().join('/')}</p>
                        </div>
                        <h3 class="text-3xl font-black uppercase italic leading-tight mb-8 tracking-tighter text-white">${ev.nome}</h3>
                        <div class="space-y-4">
                            <button onclick="abrirFluxo('${ev.id}')" class="w-full btn-lista py-5 rounded-[1.5rem] btn-action text-[12px] italic">🚀 QUERO IR NESSA</button>
                            <a href="https://wa.me/5541995040506?text=Quero reservar camarote para ${ev.nome}" target="_blank" class="w-full inline-block btn-secundario py-5 rounded-[1.5rem] text-center btn-action italic tracking-widest">👑 Reservar Camarote</a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            if (eventosCache.length === 0) container.innerHTML = '<p class="text-center py-20 text-zinc-500 font-black uppercase text-xs tracking-widest italic">Aguarde as próximas festas... 🎧</p>';
        }

        window.abrirFluxo = (id) => {
            eventoAtivo = eventosCache.find(e => e.id === id);
            let vC, vS;
            if (nomeAniv !== "") {
                vC = eventoAtivo.desc_casal; vS = eventoAtivo.desc_solteiro;
                document.getElementById('modal-titulo').innerText = '🎉 Lista Especial';
            } else {
                vC = eventoAtivo.valor_casal; vS = eventoAtivo.valor_solteiro;
                document.getElementById('modal-titulo').innerText = '🔥 Nome na Lista';
            }
            document.getElementById('preco-casal-modal').innerText = formatarValor(vC);
            document.getElementById('preco-solteiro-modal').innerText = formatarValor(vS);
            document.getElementById('modalForm').classList.remove('hidden');
        };

        window.setTipo = (tipo) => {
            tipoAtivo = tipo;
            document.getElementById('btn-tipo-casal').classList.toggle('active', tipo === 'CASAL');
            document.getElementById('btn-tipo-solteiro').classList.toggle('active', tipo === 'SOLTEIRO');
            
            const campos = document.getElementById('campos-cliente');
            campos.classList.remove('opacity-20', 'pointer-events-none');
            document.getElementById('nome-cliente').focus();
            document.getElementById('btn-confirmar').disabled = false;
        };

        window.finalizarPedido = async () => {
            const n = document.getElementById('nome-cliente').value.trim();
            const t = document.getElementById('tel-cliente').value.trim();
            if (!n || t.length < 14) return alert("Preencha seu nome e celular!");
            const btn = document.getElementById('btn-confirmar');
            btn.innerText = "SINCROZINANDO..."; btn.disabled = true;
            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: n.toUpperCase(), tel: t, evento: eventoAtivo.nome,
                    tipo_entrada: tipoAtivo, categoria: "LISTA",
                    aniversariante: nomeAniv.toUpperCase(), 
                    data_reserva: new Date().toISOString(),
                    entrou: false
                });
                alert("PRONTO! Nome garantido na portaria. 🕺"); 
                location.reload();
            } catch (e) { alert("Erro ao enviar. Tente novamente."); btn.innerText = "Confirmar Presença ✨"; btn.disabled = false; }
        };

        window.fecharModal = () => document.getElementById('modalForm').classList.add('hidden');

        window.mascaraTelefone = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v;
            if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            i.value = v;
        };
        carregarPagina();
    </script>
</body>
</html>
