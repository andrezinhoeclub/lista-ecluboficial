<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <title>E-CLUB | Reservas e Listas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.96); }
        .festa-card { background: #000; border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; overflow: hidden; margin-bottom: 2rem; }
        .btn-lista { background: #eab308; color: #000; font-weight: 900; text-transform: uppercase; }
        .btn-secundario { background: #111; border: 1px solid #27272a; color: #fff; font-weight: 800; text-transform: uppercase; font-size: 10px; }
        .site-input { background: #0c0c0e !important; border: 1px solid #27272a !important; color: white !important; }
        .site-input:focus { border-color: #eab308 !important; }
        .glass-modal { background: rgba(0,0,0,0.92); backdrop-filter: blur(8px); }
        
        /* Modal Compacto e Moderno */
        .modal-container { 
            max-height: 95vh; 
            overflow-y: auto; 
            scrollbar-width: none; 
        }
        .modal-container::-webkit-scrollbar { display: none; }

        .btn-tipo { 
            background: #0c0c0e; 
            border: 1px solid #27272a; 
            transition: 0.3s; 
            min-height: 80px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            padding: 0.75rem;
        }
        .btn-tipo.active { border-color: #eab308; background: rgba(234, 179, 8, 0.05); }
        .btn-tipo span { line-height: 1.1; }
        
        .btn-retornar { 
            background: linear-gradient(180deg, #1a1a1a 0%, #111 100%);
            border: 1px solid #333; 
            color: #888; 
            font-weight: 700; 
        }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <div class="max-w-md mx-auto w-full flex-grow">
        <header class="flex justify-center py-8">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-14 w-auto">
        </header>
        <div id="listaEventos" class="space-y-6">
            <div class="animate-pulse text-center py-20 text-zinc-800 font-black uppercase text-[10px]">Sincronizando...</div>
        </div>
    </div>

    <div id="modalForm" class="hidden fixed inset-0 z-50 glass-modal flex items-center justify-center p-4">
        <div class="modal-container w-full max-w-sm bg-[#0f0f11] border border-white/10 p-6 rounded-[2.5rem] shadow-2xl">
            <h2 id="modal-titulo" class="text-yellow-500 font-black uppercase italic mb-1 tracking-widest text-xs text-center">Reserva de Lista</h2>
            <p id="modal-subtitulo" class="text-zinc-500 text-[9px] font-bold uppercase mb-6 text-center italic">Escolha o tipo e preencha os dados</p>
            
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <button onclick="setTipo('CASAL')" id="btn-tipo-casal" class="btn-tipo rounded-2xl">
                        <span class="text-[8px] font-black uppercase text-zinc-600 mb-1">Casal</span>
                        <span id="preco-casal-modal" class="text-[10px] font-black italic text-white uppercase text-center">---</span>
                    </button>
                    <button onclick="setTipo('SOLTEIRO')" id="btn-tipo-solteiro" class="btn-tipo rounded-2xl">
                        <span class="text-[8px] font-black uppercase text-zinc-600 mb-1">Solteiro</span>
                        <span id="preco-solteiro-modal" class="text-[10px] font-black italic text-white uppercase text-center">---</span>
                    </button>
                </div>

                <div class="space-y-2">
                    <input type="text" id="nome-cliente" disabled placeholder="NOME COMPLETO" class="w-full site-input p-4 rounded-xl font-bold text-[10px] uppercase">
                    <input type="tel" id="tel-cliente" disabled oninput="mascaraTelefone(this)" placeholder="(41) 99999-9999" class="w-full site-input p-4 rounded-xl font-bold text-[10px]">
                </div>
                
                <div class="pt-2 space-y-2">
                    <button onclick="finalizarPedido()" id="btn-confirmar" disabled class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl uppercase text-[10px] tracking-widest btn-action disabled:opacity-20">Confirmar Presença</button>
                    <button onclick="fecharModal()" class="w-full btn-retornar py-3 rounded-xl uppercase text-[9px] tracking-widest btn-action">Retornar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let eventosCache = [];
        let eventoAtivo = null;
        let tipoAtivo = '';
        const params = new URLSearchParams(window.location.search);
        let nomeAniv = params.get('aniv') || "";
        let idLink = params.get('id');

        const formatarValor = (v) => {
            if(!v || v === "") return "VALOR NA PORTARIA";
            return v.toString().toUpperCase();
        };

        async function carregarPagina() {
            if (idLink) {
                const docAniv = await getDoc(doc(db, "links_aniversario", idLink));
                if (docAniv.exists()) { nomeAniv = docAniv.data().aniversariante; }
            }
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            eventosCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            const container = document.getElementById('listaEventos');
            container.innerHTML = '';

            eventosCache.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                const card = document.createElement('div');
                card.className = "festa-card";
                card.innerHTML = `
                    ${ev.imagem ? `<img src="${ev.imagem}" class="img-banner h-48">` : ''}
                    <div class="p-6 text-center text-white">
                        <p class="text-[9px] text-yellow-500 font-black uppercase tracking-widest mb-1">${ev.data.split('-').reverse().join('/')}</p>
                        <h3 class="text-2xl font-black uppercase italic leading-tight mb-6">${ev.nome}</h3>
                        <div class="space-y-2">
                            <button onclick="abrirFluxo('${ev.id}')" class="w-full btn-lista py-4 rounded-xl btn-action text-xs">Nome na Lista</button>
                            <a href="https://wa.me/5541995040506?text=Olá, gostaria de reservar um camarote para a festa ${ev.nome}" target="_blank" class="w-full inline-block btn-secundario py-3 rounded-xl text-center btn-action">Camarotes</a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.abrirFluxo = (id) => {
            eventoAtivo = eventosCache.find(e => e.id === id);
            
            let vC, vS;
            if (nomeAniv !== "") {
                vC = eventoAtivo.desc_casal;
                vS = eventoAtivo.desc_solteiro;
                document.getElementById('modal-titulo').innerText = 'Lista VIP';
            } else {
                vC = eventoAtivo.valor_casal;
                vS = eventoAtivo.valor_solteiro;
                document.getElementById('modal-titulo').innerText = 'Reserva de Lista';
            }

            document.getElementById('preco-casal-modal').innerText = formatarValor(vC);
            document.getElementById('preco-solteiro-modal').innerText = formatarValor(vS);
            document.getElementById('modalForm').classList.remove('hidden');
            
            document.getElementById('nome-cliente').value = "";
            document.getElementById('tel-cliente').value = "";
            document.getElementById('nome-cliente').disabled = true;
            document.getElementById('tel-cliente').disabled = true;
            document.getElementById('btn-confirmar').disabled = true;
            document.getElementById('btn-tipo-casal').classList.remove('active');
            document.getElementById('btn-tipo-solteiro').classList.remove('active');
        };

        window.setTipo = (tipo) => {
            tipoAtivo = tipo;
            document.getElementById('btn-tipo-casal').classList.toggle('active', tipo === 'CASAL');
            document.getElementById('btn-tipo-solteiro').classList.toggle('active', tipo === 'SOLTEIRO');
            document.getElementById('nome-cliente').disabled = false;
            document.getElementById('tel-cliente').disabled = false;
            document.getElementById('btn-confirmar').disabled = false;
        };

        window.finalizarPedido = async () => {
            const n = document.getElementById('nome-cliente').value.trim();
            const t = document.getElementById('tel-cliente').value.trim();
            if (!n || t.length < 14) return alert("Dados incompletos!");

            const btn = document.getElementById('btn-confirmar');
            btn.innerText = "PROCESSANDO...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: n.toUpperCase(), tel: t, evento: eventoAtivo.nome,
                    tipo_entrada: tipoAtivo, categoria: "LISTA",
                    aniversariante: nomeAniv.toUpperCase(),
                    data_reserva: new Date().toISOString()
                });
                alert("Sucesso! Nome confirmado.");
                location.reload();
            } catch (e) { 
                alert("Erro. Tente novamente."); 
                btn.innerText = "Confirmar Presença";
                btn.disabled = false;
            }
        };

        window.fecharModal = () => document.getElementById('modalForm').classList.add('hidden');
        window.mascaraTelefone = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v;
            if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            i.value = v;
        };

        carregarPagina();
    </script>
</body>
</html>
