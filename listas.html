<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <title>E-CLUB | Reservas VIP ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050508; color: #fff; min-height: 100vh; background-image: radial-gradient(circle at top right, #1a1025 0%, #050508 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-lista { background: #eab308; color: #000; font-weight: 900; }
        .btn-pix-main { background: linear-gradient(135deg, #00bfa5 0%, #00d1b2 100%); color: #fff; font-weight: 900; }
        .btn-camarote { background: linear-gradient(135deg, #a855f7 0%, #c084fc 100%); color: #fff; font-weight: 900; }
        .site-input { background: #0f0f15 !important; border: 1px solid #27273a !important; color: #fff !important; outline: none; transition: 0.3s; }
        .banner-img { width: 100%; height: auto; display: block; opacity: 1; border-radius: 2rem 2rem 0 0; }
        .btn-sel { background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .btn-sel.active { border-color: #eab308; background: rgba(234, 179, 8, 0.05); box-shadow: 0 0 20px rgba(234, 179, 8, 0.1); }
        .btn-sel-pix.active { border-color: #00f5d4; background: rgba(0, 245, 212, 0.05); }
        .cam-livre { border-color: #22c55e; background: rgba(34, 197, 94, 0.1); cursor: pointer; }
        .cam-livre:hover { background: rgba(34, 197, 94, 0.2); }
        .cam-aguardando { border-color: #eab308; background: rgba(234, 179, 8, 0.1); opacity: 0.7; cursor: not-allowed; }
        .cam-vendido { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .cam-selecionado { border-color: #a855f7 !important; background: rgba(168, 85, 247, 0.2) !important; box-shadow: 0 0 20px rgba(168,85,247,0.4); }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div class="max-w-md w-full">
        <header class="flex flex-col items-center justify-center py-6">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16">
            <h2 id="header-aniv" class="text-fuchsia-400 font-black uppercase italic mt-4 text-xl tracking-widest hidden text-center leading-tight"></h2>
        </header>
        
        <div id="listaEventos" class="space-y-10"></div>

        <footer class="mt-12 mb-8 flex flex-col items-center gap-8">
            <div class="flex gap-3 w-full">
                <a href="https://api.whatsapp.com/send?phone=554195040506" target="_blank" class="flex-1 glass p-3 rounded-2xl flex flex-col items-center justify-center gap-2 hover:bg-green-500/10 border border-transparent hover:border-green-500/30 transition-all group">
                    <span class="text-2xl group-hover:scale-110 transition-transform">💬</span>
                    <span class="text-[8px] font-black uppercase tracking-widest text-zinc-400 group-hover:text-green-400">WhatsApp</span>
                </a>
                <a href="https://www.instagram.com/eclubswingdance/" target="_blank" class="flex-1 glass p-3 rounded-2xl flex flex-col items-center justify-center gap-2 hover:bg-fuchsia-500/10 border border-transparent hover:border-fuchsia-500/30 transition-all group">
                    <span class="text-2xl group-hover:scale-110 transition-transform">📸</span>
                    <span class="text-[8px] font-black uppercase tracking-widest text-zinc-400 group-hover:text-fuchsia-400">Instagram</span>
                </a>
                <a href="https://www.google.com/maps/search/?api=1&query=Rua+Anibal+Goulart+Maia+Filho+81" target="_blank" class="flex-1 glass p-3 rounded-2xl flex flex-col items-center justify-center gap-2 hover:bg-blue-500/10 border border-transparent hover:border-blue-500/30 transition-all group">
                    <span class="text-2xl group-hover:scale-110 transition-transform">📍</span>
                    <span class="text-[8px] font-black uppercase tracking-widest text-zinc-400 group-hover:text-blue-400 text-center leading-tight">Como<br>Chegar</span>
                </a>
            </div>
            <div class="text-center opacity-30 hover:opacity-100 transition-opacity duration-500">
                <p class="text-[8px] font-black uppercase tracking-widest text-zinc-500">⚡ SISTEMA DESENVOLVIDO POR</p>
                <a href="https://api.whatsapp.com/send?phone=5541995906901" target="_blank" class="text-[9px] font-black uppercase tracking-widest text-yellow-500 hover:text-yellow-400 mt-1 block">ANDREZINHO E-CLUB | WHATSAPP</a>
            </div>
        </footer>
    </div>

    <div id="modalForm" class="hidden fixed inset-0 z-[999] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4 text-white">
        <div class="w-full max-w-sm bg-[#0d0d14] border border-white/10 p-6 md:p-8 rounded-[2.5rem] text-center shadow-2xl relative">
            <h2 id="modal-titulo" class="font-black uppercase italic mb-1 tracking-tighter text-xl text-center">🔥 NOME NA LISTA</h2>
            <p id="modal-subtitulo" class="text-zinc-500 text-[9px] font-bold uppercase mb-6 tracking-widest italic text-center">Selecione uma opção abaixo</p>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="selecionarTipo('CASAL')" id="btn-casal" class="btn-sel p-4 rounded-3xl flex flex-col items-center justify-center gap-1">
                    <span class="text-[10px] font-black uppercase opacity-60">👫 Casal</span>
                    <span id="v-modal-casal" class="text-xs font-black italic text-white leading-tight">---</span>
                </button>
                <button onclick="selecionarTipo('SOLTEIRO')" id="btn-solteiro" class="btn-sel p-4 rounded-3xl flex flex-col items-center justify-center gap-1">
                    <span class="text-[10px] font-black uppercase opacity-60">👤 Solteiro</span>
                    <span id="v-modal-solteiro" class="text-xs font-black italic text-white leading-tight">---</span>
                </button>
            </div>
            <div class="space-y-3">
                <input type="text" id="nome-cliente" placeholder="NOME COMPLETO" class="w-full site-input p-4 rounded-2xl font-bold text-xs uppercase text-white">
                <input type="tel" id="tel-cliente" oninput="mask(this)" placeholder="(41) 99999-9999" class="w-full site-input p-4 rounded-2xl font-bold text-xs text-white">
                <button onclick="processarFinalizacao()" id="btn-final-acao" class="w-full py-5 rounded-2xl uppercase text-xs font-black mt-2 shadow-xl transition-all">Confirmar Presença</button>
            </div>
            <button onclick="fecharModal()" class="w-full text-zinc-600 uppercase text-[9px] font-black mt-6 tracking-widest italic">Voltar</button>
        </div>
    </div>

    <div id="modalCamarote" class="hidden fixed inset-0 z-[999] bg-black/95 backdrop-blur-xl flex flex-col items-center justify-center p-4 text-white overflow-y-auto">
        <div class="w-full max-w-sm bg-[#0d0d14] border border-purple-500/30 p-6 md:p-8 rounded-[2.5rem] shadow-2xl relative my-auto mt-10 mb-10">
            <h2 class="text-purple-400 font-black uppercase italic mb-1 tracking-tighter text-xl text-center">💎 CAMAROTES VIP</h2>
            <p class="text-zinc-500 text-[9px] font-bold uppercase mb-4 tracking-widest italic text-center">Escolha o seu espaço no mapa</p>
            <div class="w-full h-32 bg-zinc-900 rounded-2xl mb-4 border border-white/10 flex items-center justify-center overflow-hidden relative">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" onerror="this.style.display='none'" class="h-20 opacity-30 object-contain">
                <span class="text-zinc-500 font-black text-[10px] uppercase absolute tracking-widest">MAPA DO CLUBE</span>
            </div>
            <div class="flex justify-center gap-4 mb-6 text-[8px] font-black uppercase tracking-widest text-zinc-400">
                <div class="flex items-center gap-1"><div class="w-2 h-2 rounded-full bg-green-500"></div>Livre</div>
                <div class="flex items-center gap-1"><div class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></div>Aguardando</div>
                <div class="flex items-center gap-1"><div class="w-2 h-2 rounded-full bg-red-500"></div>Vendido</div>
            </div>
            <div id="grid-camarotes-venda" class="grid grid-cols-2 gap-3 mb-6"></div>
            <div id="form-camarote" class="space-y-3 hidden">
                <div class="bg-purple-900/20 p-4 rounded-2xl border border-purple-500/30 text-center mb-4 shadow-[0_0_15px_rgba(168,85,247,0.1)]">
                    <p class="text-[10px] text-purple-300 font-black uppercase tracking-widest" id="cam-selecionado-nome">CAMAROTE X</p>
                    <p class="text-[9px] text-zinc-400 font-bold uppercase mt-1" id="cam-selecionado-obs">Benefícios</p>
                    <p class="text-xl text-white font-black mt-2" id="cam-selecionado-valor">R$ 0,00</p>
                </div>
                <input type="text" id="nome-camarote" placeholder="NOME DO TITULAR" class="w-full site-input p-4 rounded-2xl font-bold text-xs uppercase text-white">
                <input type="tel" id="tel-camarote" oninput="mask(this)" placeholder="(41) 99999-9999" class="w-full site-input p-4 rounded-2xl font-bold text-xs text-white">
                <button onclick="processarPixCamarote()" id="btn-final-camarote" class="w-full btn-camarote py-5 rounded-2xl uppercase text-xs font-black mt-2 shadow-xl transition-all active:scale-95">Garantir Camarote ⚡</button>
            </div>
            <button onclick="fecharModalCamarote()" class="w-full text-zinc-600 uppercase text-[9px] font-black mt-6 tracking-widest italic text-center">Voltar para Eventos</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", authDomain: "teste-de-reserva.firebaseapp.com", projectId: "teste-de-reserva", storageBucket: "teste-de-reserva.appspot.com", messagingSenderId: "163395694876", appId: "1:163395694876:web:8b1116a0483af951548ad9" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const URL_FUNCAO = 'https://us-central1-teste-de-reserva.cloudfunctions.net/gerarPagamento';

        const urlParams = new URLSearchParams(window.location.search);
        const anivId = urlParams.get('id'); 
        const refPromoter = urlParams.get('ref');

        let globalPromoter = refPromoter ? refPromoter : "site_direto";
        let globalAniversariante = "";
        let eventoFixo = null;

        let eventosCache = []; let eventoAtivo = null; let tipoAtivo = null; let eFluxoPix = false;
        let unsubscribeCamarotes = null; let numCamaroteSelecionado = null; let processoDePagamentoAberto = false;

        const formatarMoeda = (v) => v ? "R$ " + String(v).toUpperCase().replace("R$", "").trim() : "PORTARIA";

        async function carregarPagina() {
            try {
                if (anivId) {
                    const anivSnap = await getDoc(doc(db, "links_aniversario", anivId));
                    if (anivSnap.exists()) {
                        const d = anivSnap.data();
                        globalPromoter = d.promoter || "site_direto";
                        globalAniversariante = d.aniversariante;
                        eventoFixo = d.festa;

                        const cabecalho = document.getElementById('header-aniv');
                        cabecalho.innerHTML = `🎂 ANIVERSÁRIO DE<br>${globalAniversariante}`;
                        cabecalho.classList.remove('hidden');
                    }
                }

                const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
                const agora = new Date();
                const hojeStr = agora.toLocaleDateString('en-CA'); 
                
                eventosCache = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(ev => ev.data >= hojeStr).sort((a, b) => a.data.localeCompare(b.data));
                
                if (eventoFixo) {
                    eventosCache = eventosCache.filter(e => e.nome === eventoFixo);
                }

                const container = document.getElementById('listaEventos');
                if (eventosCache.length === 0) { container.innerHTML = `<div class="p-20 text-center opacity-30 font-black text-xs italic uppercase">Nenhum evento disponível</div>`; return; }
                
                container.innerHTML = eventosCache.map(ev => {
                    let temCamaroteAtivo = false;
                    for(let i=1; i<=8; i++) { if(ev[`cam${i}_ativo`]) temCamaroteAtivo = true; }

                    const txtBotaoLista = globalAniversariante ? "🎉 NOME NA LISTA VIP" : "📝 NOME NA LISTA";

                    let botoesAcao = `
                        <button onclick="iniciarFluxo('${ev.id}', false)" class="w-full btn-lista py-5 rounded-2xl text-xs italic font-black transition-all active:scale-95 mb-3">${txtBotaoLista}</button>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <button onclick="iniciarFluxo('${ev.id}', true)" class="w-full btn-pix-main py-4 rounded-2xl text-[10px] sm:text-xs italic font-black transition-all active:scale-95">⚡ PIX ANTECIPADO</button>
                            ${temCamaroteAtivo ? `<button onclick="iniciarFluxoCamarote('${ev.id}')" class="w-full btn-camarote py-4 rounded-2xl text-[10px] sm:text-xs italic font-black transition-all active:scale-95 shadow-[0_0_15px_rgba(168,85,247,0.3)]">💎 CAMAROTE</button>` : `<div class="bg-zinc-900 border border-zinc-800 rounded-2xl py-4 flex items-center justify-center"><span class="text-[9px] text-zinc-600 font-bold uppercase italic">S/ Camarote</span></div>`}
                        </div>
                    `;

                    return `
                    <div class="glass overflow-hidden rounded-[2.5rem] border-white/5 shadow-2xl">
                        ${ev.imagem ? `<img src="${ev.imagem}" class="banner-img">` : `<div class="h-40 bg-zinc-900 flex items-center justify-center text-zinc-700 font-black uppercase tracking-tighter italic text-xl">E-CLUB</div>`}
                        <div class="p-8">
                            <h3 class="text-2xl font-black uppercase italic mb-6 text-white tracking-tighter text-center">${ev.nome}</h3>
                            <div>${botoesAcao}</div>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) { console.error(err); }
        }

        window.iniciarFluxo = (id, isPix) => {
            eventoAtivo = eventosCache.find(e => e.id === id); 
            
            // 👇 BLOQUEIO DE HORÁRIOS AQUI 👇
            const [ano, mes, dia] = eventoAtivo.data.split('-');
            const agora = new Date();
            
            if (isPix) {
                // Limite PIX: 21:59:59 do dia do evento
                const limitePix = new Date(ano, mes - 1, dia, 21, 59, 59);
                if (agora > limitePix) return alert("⚠️ As vendas antecipadas via PIX encerraram às 21:59h de hoje!");
            } else {
                // Limite Lista: 23:59:59 do dia do evento (Meia-noite)
                const limiteLista = new Date(ano, mes - 1, dia, 23, 59, 59);
                if (agora > limiteLista) return alert("⚠️ A lista para este evento encerrou à meia-noite!");
            }

            eFluxoPix = isPix; tipoAtivo = null; 
            const titulo = document.getElementById('modal-titulo');
            
            titulo.innerText = isPix ? "⚡ PIX ANTECIPADO" : (globalAniversariante ? "🎉 LISTA VIP" : "🔥 NOME NA LISTA");
            titulo.className = isPix ? "text-[#00f5d4] font-black uppercase italic mb-1 tracking-tighter text-xl text-center" : (globalAniversariante ? "text-fuchsia-400 font-black uppercase italic mb-1 tracking-tighter text-xl text-center" : "text-yellow-500 font-black uppercase italic mb-1 tracking-tighter text-xl text-center");
            
            const usaDescontoVIP = (!isPix && globalAniversariante);
            
            const precoCasalMostrado = usaDescontoVIP ? (eventoAtivo.desc_casal || eventoAtivo.valor_casal) : (isPix ? (eventoAtivo.ant_casal || eventoAtivo.valor_casal) : eventoAtivo.valor_casal);
            const precoSolteiroMostrado = usaDescontoVIP ? (eventoAtivo.desc_solteiro || eventoAtivo.valor_solteiro) : (isPix ? (eventoAtivo.ant_solteiro || eventoAtivo.valor_solteiro) : eventoAtivo.valor_solteiro);

            document.getElementById('v-modal-casal').innerText = formatarMoeda(precoCasalMostrado);
            document.getElementById('v-modal-solteiro').innerText = formatarMoeda(precoSolteiroMostrado);

            document.getElementById('btn-casal').classList.remove('active', 'btn-sel-pix'); document.getElementById('btn-solteiro').classList.remove('active', 'btn-sel-pix');
            
            const iNome = document.getElementById('nome-cliente'); const iTel = document.getElementById('tel-cliente'); const btnFinal = document.getElementById('btn-final-acao');
            iNome.value = ''; iTel.value = ''; iNome.disabled = true; iTel.disabled = true;
            iNome.classList.add('opacity-30', 'cursor-not-allowed'); iTel.classList.add('opacity-30', 'cursor-not-allowed');
            btnFinal.innerText = eFluxoPix ? "Pagar com PIX ⚡" : "Confirmar Presença ✨";
            btnFinal.className = (eFluxoPix ? "w-full btn-pix-main" : "w-full btn-lista") + " py-5 rounded-2xl uppercase text-xs font-black mt-2 shadow-xl opacity-30 cursor-not-allowed transition-all";
            btnFinal.disabled = true;
            document.getElementById('modalForm').classList.remove('hidden');
        };

        window.selecionarTipo = (tipo) => {
            tipoAtivo = tipo; 
            const bCasal = document.getElementById('btn-casal'); const bSolteiro = document.getElementById('btn-solteiro');
            bCasal.classList.remove('active', 'btn-sel-pix'); bSolteiro.classList.remove('active', 'btn-sel-pix');
            const btnAlvo = tipo === 'CASAL' ? bCasal : bSolteiro;
            btnAlvo.classList.add('active'); if (eFluxoPix) btnAlvo.classList.add('btn-sel-pix');
            
            const iNome = document.getElementById('nome-cliente'); const iTel = document.getElementById('tel-cliente'); const btnFinal = document.getElementById('btn-final-acao');
            iNome.disabled = false; iTel.disabled = false; iNome.classList.remove('opacity-30', 'cursor-not-allowed'); iTel.classList.remove('opacity-30', 'cursor-not-allowed');
            btnFinal.disabled = false; btnFinal.className = (eFluxoPix ? "w-full btn-pix-main" : "w-full btn-lista") + " py-5 rounded-2xl uppercase text-xs font-black mt-2 shadow-xl transition-all active:scale-95";
        };

        window.processarFinalizacao = async () => {
            if (!tipoAtivo) return alert("Selecione se é Casal ou Solteiro!");
            const n = document.getElementById('nome-cliente').value.trim().toUpperCase(); const t = document.getElementById('tel-cliente').value.trim();
            if (!n || t.length < 14) return alert("Preencha Nome e Telefone!");
            const btn = document.getElementById('btn-final-acao'); const originalText = btn.innerText; btn.innerText = "PROCESSANDO..."; btn.disabled = true;
            
            try {
                const snapDuplicidade = await getDocs(query(collection(db, "lista_eventos"), where("tel", "==", t)));
                let deveBloquear = false; let msgErro = "";
                for (let docSnap of snapDuplicidade.docs) {
                    let ex = docSnap.data();
                    if (ex.evento === eventoAtivo.nome) {
                        if (ex.pago === true) { deveBloquear = true; msgErro = "Você já possui uma entrada confirmada para este evento!"; break; }
                        if (ex.metodo === 'portaria') { deveBloquear = true; msgErro = "Seu nome já está na lista!"; break; }
                        if (ex.metodo === 'pix_antecipado') {
                            const diffMinutos = (new Date() - new Date(ex.data_reserva)) / 60000;
                            if (diffMinutos < 5) { deveBloquear = true; msgErro = `Aguarde ${Math.ceil(5 - diffMinutos)} minuto(s) para nova tentativa.`; break; } 
                            else { await deleteDoc(docSnap.ref); }
                        }
                    }
                }
                if (deveBloquear) throw new Error(msgErro);

                const usaDescontoVIP = (!eFluxoPix && globalAniversariante);
                let valorParaSalvar = null;

                if (eFluxoPix) {
                    valorParaSalvar = tipoAtivo === 'CASAL' ? (eventoAtivo.ant_casal || eventoAtivo.valor_casal) : (eventoAtivo.ant_solteiro || eventoAtivo.valor_solteiro);
                } else if (usaDescontoVIP) {
                    valorParaSalvar = tipoAtivo === 'CASAL' ? (eventoAtivo.desc_casal || eventoAtivo.valor_casal) : (eventoAtivo.desc_solteiro || eventoAtivo.valor_solteiro);
                }

                const docRef = await addDoc(collection(db, "lista_eventos"), { 
                    nome: n, 
                    tel: t, 
                    evento: eventoAtivo.nome, 
                    tipo_entrada: tipoAtivo, 
                    promoter: globalPromoter, 
                    aniversariante: globalAniversariante, 
                    data_reserva: new Date().toISOString(), 
                    entrou: false, 
                    pago: false, 
                    metodo: eFluxoPix ? 'pix_antecipado' : 'portaria',
                    valor_pago: valorParaSalvar
                });

                if (eFluxoPix) {
                    const valorLimpo = String(valorParaSalvar).replace('R$', '').replace(/\s/g, '').replace(',', '.');
                    const resp = await fetch(URL_FUNCAO, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ valor: valorLimpo, titulo: `E-CLUB PISTA: ${eventoAtivo.nome}`, reservaId: docRef.id }) });
                    const data = await resp.json(); if (data.url) { window.open(data.url, '_blank'); alert("Finalize o Pix na nova aba!"); fecharModal(); } else throw new Error("Erro ao gerar Pix.");
                } else { alert("Confirmado na lista! ✨"); location.reload(); }
            } catch (e) { alert("🔴 " + e.message); } finally { btn.disabled = false; btn.innerText = originalText; }
        };

        window.fecharModal = () => document.getElementById('modalForm').classList.add('hidden');

        window.iniciarFluxoCamarote = (id) => {
            eventoAtivo = eventosCache.find(e => e.id === id); 
            
            // 👇 BLOQUEIO DE HORÁRIO DE CAMAROTE AQUI 👇
            const [ano, mes, dia] = eventoAtivo.data.split('-');
            const agora = new Date();
            const limitePix = new Date(ano, mes - 1, dia, 21, 59, 59);
            
            if (agora > limitePix) return alert("⚠️ As vendas de Camarote via PIX encerraram às 21:59h de hoje!");

            numCamaroteSelecionado = null; processoDePagamentoAberto = false;
            document.getElementById('form-camarote').classList.add('hidden'); document.getElementById('modalCamarote').classList.remove('hidden');
            const q = query(collection(db, "lista_eventos"), where("evento", "==", eventoAtivo.nome));
            if(unsubscribeCamarotes) unsubscribeCamarotes(); 
            unsubscribeCamarotes = onSnapshot(q, (snap) => { const reservas = snap.docs.map(d => ({id: d.id, ...d.data()})); renderizarMapaCamarotes(reservas); });
        };
        
        function renderizarMapaCamarotes(reservas) {
            const grid = document.getElementById('grid-camarotes-venda'); grid.innerHTML = '';
            for(let i=1; i<=8; i++) {
                if(eventoAtivo[`cam${i}_ativo`]) {
                    const preco = eventoAtivo[`v_cam${i}`] || 'Consulte'; const obs = eventoAtivo[`obs_cam${i}`] || 'Espaço Exclusivo';
                    let status = 'livre'; let classCor = 'cam-livre'; let icone = '✅';
                    const resCam = reservas.filter(r => r.tipo_entrada === `CAMAROTE ${i}`);
                    
                    if (resCam.some(r => r.pago === true || r.cortesia === true)) { 
                        status = 'vendido'; classCor = 'cam-vendido'; icone = '🔒'; 
                    } else {
                        const pendentes = resCam.filter(r => r.pago === false && !r.cortesia);
                        const temPendente = pendentes.some(r => r.data_reserva && ((new Date() - new Date(r.data_reserva)) / 60000) < 5);
                        if(temPendente) { status = 'aguardando'; classCor = 'cam-aguardando'; icone = '⏳'; }
                    }
                    
                    if (numCamaroteSelecionado === i && status !== 'livre' && processoDePagamentoAberto === false) {
                        numCamaroteSelecionado = null; document.getElementById('form-camarote').classList.add('hidden');
                        alert(`Oops! Alguém reservou o Camarote 0${i}. Escolha outro!`);
                    }
                    const isSelecionado = (numCamaroteSelecionado === i) ? 'cam-selecionado' : '';
                    grid.innerHTML += `<div onclick="selecionarCamarote(${i}, '${status}')" class="border p-3 rounded-2xl flex flex-col items-center justify-center transition-all ${classCor} ${isSelecionado}"><span class="text-[10px] font-black uppercase text-zinc-300 mb-1">Cam 0${i}</span><span class="text-xs font-black text-white">${formatarMoeda(preco)}</span><span class="text-[8px] font-bold text-purple-300 uppercase mt-1 mb-1 text-center truncate w-full">${obs}</span><span class="text-[8px] font-bold text-zinc-400 uppercase mt-auto text-center leading-tight truncate w-full">${icone} ${status}</span></div>`;
                }
            }
        }
        
        window.selecionarCamarote = (num, status) => {
            if (status !== 'livre') return; numCamaroteSelecionado = num;
            const eventTrigger = new Event('refreshGrid'); document.dispatchEvent(eventTrigger);
            document.getElementById('cam-selecionado-nome').innerText = `CAMAROTE 0${num}`; document.getElementById('cam-selecionado-obs').innerText = eventoAtivo[`obs_cam${num}`] || 'Espaço Exclusivo'; document.getElementById('cam-selecionado-valor').innerText = formatarMoeda(eventoAtivo[`v_cam${num}`]);
            document.getElementById('nome-camarote').value = ''; document.getElementById('tel-camarote').value = ''; document.getElementById('form-camarote').classList.remove('hidden'); document.getElementById('form-camarote').scrollIntoView({ behavior: 'smooth', block: 'end' });
        };
        
        document.addEventListener('refreshGrid', () => {
            const boxes = document.getElementById('grid-camarotes-venda').children;
            for(let i=0; i<boxes.length; i++) { if (boxes[i].innerText.includes(`CAM 0${numCamaroteSelecionado}`)) { boxes[i].classList.add('cam-selecionado'); } else { boxes[i].classList.remove('cam-selecionado'); } }
        });
        
        window.processarPixCamarote = async () => {
            if (!numCamaroteSelecionado) return alert("Selecione um camarote no mapa!");
            const n = document.getElementById('nome-camarote').value.trim().toUpperCase(); const t = document.getElementById('tel-camarote').value.trim();
            if (!n || t.length < 14) return alert("Preencha Nome e Telefone!");
            const btn = document.getElementById('btn-final-camarote'); const originalText = btn.innerText; btn.innerText = "GARANTINDO... ⚡"; btn.disabled = true; processoDePagamentoAberto = true; 
            try {
                const checkFinal = await getDocs(query(collection(db, "lista_eventos"), where("evento", "==", eventoAtivo.nome), where("tipo_entrada", "==", `CAMAROTE ${numCamaroteSelecionado}`)));
                let alguemRoubou = false;
                checkFinal.forEach(docSnap => {
                    const ex = docSnap.data();
                    if (ex.pago === true || ex.cortesia === true) { alguemRoubou = true; } 
                    else if (ex.pago === false && !ex.cortesia) {
                        if (ex.data_reserva && ((new Date() - new Date(ex.data_reserva)) / 60000) < 5) { alguemRoubou = true; } 
                        else { deleteDoc(docSnap.ref); }
                    }
                });
                
                if (alguemRoubou) throw new Error("Alguém acabou de garantir este Camarote. Escolha outro!");
                
                const camaroteGarantido = numCamaroteSelecionado; numCamaroteSelecionado = null; 
                const docRef = await addDoc(collection(db, "lista_eventos"), { nome: n, tel: t, evento: eventoAtivo.nome, tipo_entrada: `CAMAROTE ${camaroteGarantido}`, promoter: globalPromoter, data_reserva: new Date().toISOString(), entrou: false, pago: false, metodo: 'pix_antecipado', valor_pago: eventoAtivo[`v_cam${camaroteGarantido}`] });
                const valorLimpo = String(eventoAtivo[`v_cam${camaroteGarantido}`]).replace('R$', '').replace(/\s/g, '').replace(',', '.');
                const resp = await fetch(URL_FUNCAO, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ valor: valorLimpo, titulo: `CAMAROTE 0${camaroteGarantido} - ${eventoAtivo.nome}`, reservaId: docRef.id }) });
                if (!resp.ok) throw new Error("Erro na Função Pix.");
                const data = await resp.json();
                if (data.url) { window.open(data.url, '_blank'); alert("✅ Link VIP gerado! Finalize o Pix na aba que abriu."); fecharModalCamarote(); } else { throw new Error("Falha ao gerar link."); }
            } catch (e) { alert("🔴 " + e.message); processoDePagamentoAberto = false; } finally { btn.disabled = false; btn.innerText = originalText; }
        };
        
        window.fecharModalCamarote = () => { if(unsubscribeCamarotes) unsubscribeCamarotes(); numCamaroteSelecionado = null; processoDePagamentoAberto = false; document.getElementById('modalCamarote').classList.add('hidden'); };
        window.mask = (i) => { let v = i.value.replace(/\D/g, "").substring(0, 11); if (v.length > 0) v = "(" + v; if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3); if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10); i.value = v; };
        
        carregarPagina();
    </script>
</body>
</html>
