<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <title>E-CLUB | Reservas e Listas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.96); }
        
        /* Estilo dos Cards conforme sua imagem */
        .festa-card { background: #000; border: 1px solid #1a1a1a; border-radius: 2.5rem; overflow: hidden; margin-bottom: 2rem; padding: 2rem; }
        
        /* Botão Amarelo Principal (Lista) */
        .btn-lista { background: #eab308; color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; }
        
        /* Botões Secundários (Lado a Lado) */
        .btn-secundario { background: #111; border: 1px solid #27272a; color: #fff; font-weight: 800; text-transform: uppercase; font-size: 10px; }
        .btn-secundario:hover { border-color: #eab308; color: #eab308; }

        .site-input { background: #000 !important; border: 1px solid #27272a !important; color: white !important; }
        .site-input:focus { border-color: #eab308 !important; outline: none; }
        .glass-modal { background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <div class="max-w-md mx-auto w-full flex-grow">
        <header class="flex justify-center py-10">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-16 w-auto">
        </header>

        <div id="listaEventos" class="space-y-8">
            <div class="animate-pulse text-center py-20 text-zinc-800 font-black uppercase text-[10px]">Carregando eventos...</div>
        </div>

        <footer class="mt-16 mb-12 border-t border-zinc-900 pt-10 text-center">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <a href="https://wa.me/5541995040506" target="_blank" class="bg-[#25D366] p-5 rounded-2xl text-black font-black uppercase text-[11px] btn-action text-center">WhatsApp</a>
                <a href="https://www.instagram.com/eclubswingdance/" target="_blank" class="bg-gradient-to-r from-orange-500 via-red-500 to-purple-600 p-5 rounded-2xl text-white font-black uppercase text-[11px] btn-action text-center">Instagram</a>
            </div>
            <div class="border-2 border-yellow-500 p-8 rounded-[2.5rem]">
                <p class="text-[9px] text-yellow-500 font-black uppercase mb-2 tracking-widest text-white">Onde Estamos</p>
                <p class="text-sm font-black italic text-white mb-1 leading-tight text-white">Rua Albino Kaminski, 645 - Bairro Alto</p>
                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-tighter text-white">Curitiba - PR</p>
            </div>
        </footer>
    </div>

    <div id="modalForm" class="hidden fixed inset-0 z-50 glass-modal flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-zinc-900 border border-white/10 p-8 rounded-[3rem] text-center">
            <h2 id="modal-titulo" class="text-yellow-500 font-black uppercase italic mb-2 tracking-widest text-sm text-white">Reserva</h2>
            <p id="modal-subtitulo" class="text-zinc-500 text-[9px] font-bold uppercase mb-8 text-white">Selecione o tipo e preencha seus dados</p>
            
            <div class="space-y-4 text-left">
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button onclick="setTipo('CASAL')" id="btn-tipo-casal" class="btn-secundario py-4 rounded-xl">Casal</button>
                    <button onclick="setTipo('SOLTEIRO')" id="btn-tipo-solteiro" class="btn-secundario py-4 rounded-xl">Solteiro</button>
                </div>

                <div class="bg-black/40 p-4 rounded-2xl text-center border border-white/5 mb-4">
                    <p id="label-valor" class="text-[8px] text-zinc-500 uppercase font-black">Valor do Ingresso</p>
                    <p id="total-display" class="text-2xl font-black text-white italic">Selecione o tipo</p>
                </div>

                <input type="text" id="nome-cliente" placeholder="NOME COMPLETO" class="w-full site-input p-5 rounded-2xl font-bold text-xs uppercase text-white">
                <input type="tel" id="tel-cliente" oninput="mascaraTelefone(this)" placeholder="(41) 99999-9999" class="w-full site-input p-5 rounded-2xl font-bold text-xs text-white">
                
                <button onclick="finalizarPedido()" id="btn-confirmar" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest btn-action shadow-xl mt-4">Confirmar</button>
                <button onclick="fecharModal()" class="w-full text-zinc-600 font-bold uppercase text-[9px] mt-2">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let eventoAtivo = null;
        let modoAtivo = ''; // 'LISTA' ou 'ANTECIPADO'
        let tipoAtivo = ''; // 'CASAL' ou 'SOLTEIRO'

        const params = new URLSearchParams(window.location.search);
        let refPromoter = params.get('ref') || "direto";

        async function carregarEventos() {
            const container = document.getElementById('listaEventos');
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            const hoje = new Date().toLocaleDateString('en-CA');
            
            container.innerHTML = '';
            snap.forEach(d => {
                const ev = { id: d.id, ...d.data() };
                if (ev.data >= hoje) {
                    const card = document.createElement('div');
                    card.className = "festa-card text-center";
                    card.innerHTML = `
                        <p class="text-[10px] text-yellow-500 font-black uppercase tracking-[0.3em] mb-2 leading-none">${ev.data.split('-').reverse().join('/')}</p>
                        <h3 class="text-3xl font-black uppercase italic leading-tight mb-8 text-white">${ev.nome}</h3>
                        
                        <div class="space-y-3">
                            <button onclick="abrirFluxo('${ev.id}', 'LISTA')" class="w-full btn-lista py-5 rounded-2xl btn-action text-sm">
                                Colocar nome na lista
                            </button>
                            
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="abrirFluxo('${ev.id}', 'ANTECIPADO')" class="btn-secundario py-4 rounded-2xl btn-action">
                                    Venda Antecipada
                                </button>
                                <button class="btn-secundario py-4 rounded-2xl opacity-40 cursor-not-allowed">
                                    Camarote
                                </button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
        }

        window.abrirFluxo = async (id, modo) => {
            const snap = await getDocs(query(collection(db, "eventos")));
            eventoAtivo = null;
            snap.forEach(d => { if(d.id === id) eventoAtivo = {id: d.id, ...d.data()} });
            
            modoAtivo = modo;
            tipoAtivo = '';
            
            document.getElementById('modal-titulo').innerText = modo === 'LISTA' ? 'Reserva de Lista' : 'Venda Antecipada PIX';
            document.getElementById('total-display').innerText = 'Selecione o tipo';
            
            // Reset visual dos botões de tipo
            document.getElementById('btn-tipo-casal').className = "btn-secundario py-4 rounded-xl";
            document.getElementById('btn-tipo-solteiro').className = "btn-secundario py-4 rounded-xl";
            
            document.getElementById('modalForm').classList.remove('hidden');
        };

        window.setTipo = (tipo) => {
            tipoAtivo = tipo;
            let valor = 0;
            
            if (modoAtivo === 'LISTA') {
                valor = tipo === 'CASAL' ? (eventoAtivo.valor_casal || "---") : (eventoAtivo.valor_solteiro || "---");
            } else {
                valor = tipo === 'CASAL' ? (eventoAtivo.valor_antecipado_casal || "---") : (eventoAtivo.valor_antecipado_solteiro || "---");
            }

            document.getElementById('total-display').innerText = `R$ ${valor}`;
            
            // Destaque visual
            document.getElementById('btn-tipo-casal').className = tipo === 'CASAL' ? "btn-lista py-4 rounded-xl" : "btn-secundario py-4 rounded-xl";
            document.getElementById('btn-tipo-solteiro').className = tipo === 'SOLTEIRO' ? "btn-lista py-4 rounded-xl" : "btn-secundario py-4 rounded-xl";
        };

        window.finalizarPedido = async () => {
            const nome = document.getElementById('nome-cliente').value.trim();
            const tel = document.getElementById('tel-cliente').value.trim();
            
            if (!nome || tel.length < 14 || !tipoAtivo) return alert("Preencha nome, telefone e selecione o tipo.");

            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: nome.toUpperCase(),
                    tel: tel,
                    evento: eventoAtivo.nome,
                    tipo_entrada: tipoAtivo,
                    categoria: modoAtivo,
                    promoter: refPromoter.toLowerCase(),
                    pago: false,
                    data_reserva: new Date().toISOString()
                });

                alert("Confirmado! Seu nome está na lista.");
                location.reload();
            } catch (e) {
                alert("Erro ao enviar. Tente novamente.");
            }
        };

        window.fecharModal = () => document.getElementById('modalForm').classList.add('hidden');

        window.mascaraTelefone = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v;
            if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            i.value = v;
        };

        carregarEventos();
    </script>
</body>
</html>
