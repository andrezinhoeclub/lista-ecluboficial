<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <title>E-CLUB | Reservas ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050508; color: #fff; min-height: 100vh; background-image: radial-gradient(circle at top right, #1a1025 0%, #050508 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-lista { background: #eab308; color: #000; font-weight: 900; }
        .site-input { background: #0f0f15 !important; border: 1px solid #27273a !important; color: #fff !important; outline: none; transition: 0.3s; }
        .site-input:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-sel { background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .btn-sel.active { border-color: #eab308; background: rgba(234, 179, 8, 0.05); box-shadow: 0 0 20px rgba(234, 179, 8, 0.1); }
        .banner-img { width: 100%; height: auto; display: block; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div class="max-w-md w-full">
        <header class="flex justify-center py-6">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16">
        </header>
        <div id="listaEventos" class="space-y-10"></div>
    </div>

    <div id="modalForm" class="hidden fixed inset-0 z-[999] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4 text-white">
        <div class="w-full max-w-sm glass p-10 rounded-[3rem] text-center border-sky-500/20 border shadow-2xl relative">
            <h2 class="text-yellow-500 font-black uppercase italic mb-1 tracking-tighter text-xl">🔥 NOME NA LISTA</h2>
            <p class="text-zinc-500 text-[9px] font-bold uppercase mb-6 tracking-widest italic">Escolha uma opção para liberar os campos</p>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="selecionarTipo('CASAL')" id="btn-casal" class="btn-sel p-4 rounded-3xl flex flex-col items-center justify-center gap-1">
                    <span class="text-[10px] font-black uppercase opacity-60">👫 Casal</span>
                    <span id="v-modal-casal" class="text-xs font-black italic text-white leading-tight">---</span>
                </button>
                <button onclick="selecionarTipo('SOLTEIRO')" id="btn-solteiro" class="btn-sel p-4 rounded-3xl flex flex-col items-center justify-center gap-1">
                    <span class="text-[10px] font-black uppercase opacity-60">👤 Solteiro</span>
                    <span id="v-modal-solteiro" class="text-xs font-black italic text-white leading-tight">---</span>
                </button>
            </div>
            <div class="space-y-3 text-left">
                <input type="text" id="nome-cliente" placeholder="NOME COMPLETO" class="w-full site-input p-4 rounded-2xl font-bold text-xs uppercase" disabled>
                <input type="tel" id="tel-cliente" oninput="mask(this)" placeholder="(41) 99999-9999" class="w-full site-input p-4 rounded-2xl font-bold text-xs" disabled>
                <button onclick="processarFinalizacao()" id="btn-final-acao" class="w-full btn-lista py-5 rounded-2xl uppercase text-xs font-black mt-2 shadow-xl" disabled>Confirmar Presença ✨</button>
            </div>
            <button onclick="fecharModal()" class="w-full text-zinc-600 uppercase text-[9px] font-black mt-6 italic">Voltar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", authDomain: "teste-de-reserva.firebaseapp.com", projectId: "teste-de-reserva", storageBucket: "teste-de-reserva.firebasestorage.app", messagingSenderId: "163395694876", appId: "1:163395694876:web:8b1116a0483af951548ad9" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const refPromoter = (params.get('p') || params.get('ref') || "direto").toLowerCase().trim();

        let eventosCache = []; let eventoAtivo = null; let tipoAtivo = null;

        async function carregarPagina() {
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            
            // FILTRO DE DATA: Pega apenas de hoje em diante
            const hoje = new Date();
            hoje.setHours(0, 0, 0, 0);
            const hojeStr = hoje.toISOString().split('T')[0];

            eventosCache = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                .filter(ev => ev.data >= hojeStr) // Filtra eventos passados
                .sort((a, b) => a.data.localeCompare(b.data));

            const container = document.getElementById('listaEventos');
            if (eventosCache.length === 0) {
                container.innerHTML = `<div class="p-20 text-center opacity-30 font-black text-xs italic uppercase">Nenhum evento disponível</div>`;
                return;
            }

            container.innerHTML = eventosCache.map(ev => `
                <div class="glass overflow-hidden rounded-[2.5rem] border-white/5 shadow-2xl">
                    <img src="${ev.imagem || ''}" class="banner-img">
                    <div class="p-8 text-center">
                        <h3 class="text-2xl font-black uppercase italic mb-6 text-white">${ev.nome}</h3>
                        <button onclick="iniciarFluxo('${ev.id}')" class="w-full btn-lista py-5 rounded-2xl text-xs font-black">📝 COLOCAR NOME NA LISTA</button>
                    </div>
                </div>`).join('');
        }

        window.iniciarFluxo = (id) => {
            eventoAtivo = eventosCache.find(e => e.id === id);
            document.getElementById('v-modal-casal').innerText = eventoAtivo.valor_casal || "PORTARIA";
            document.getElementById('v-modal-solteiro').innerText = eventoAtivo.valor_solteiro || "PORTARIA";
            document.getElementById('modalForm').classList.remove('hidden');
        };

        window.selecionarTipo = (tipo) => {
            tipoAtivo = tipo;
            document.getElementById('btn-casal').classList.toggle('active', tipo === 'CASAL');
            document.getElementById('btn-solteiro').classList.toggle('active', tipo === 'SOLTEIRO');
            document.getElementById('nome-cliente').disabled = false;
            document.getElementById('tel-cliente').disabled = false;
            document.getElementById('btn-final-acao').disabled = false;
        };

        window.processarFinalizacao = async () => {
            const n = document.getElementById('nome-cliente').value.trim().toUpperCase();
            const t = document.getElementById('tel-cliente').value.trim();
            const tLimpo = t.replace(/\D/g, "");
            const btn = document.getElementById('btn-final-acao');
            btn.innerText = "VERIFICANDO..."; btn.disabled = true;

            try {
                const q = query(collection(db, "lista_eventos"), where("evento", "==", eventoAtivo.nome));
                const snap = await getDocs(q);
                let jaExiste = false;
                snap.forEach(d => { if (d.data().tel.replace(/\D/g, "") === tLimpo) jaExiste = true; });

                if (jaExiste) {
                    alert("🚨 ESTE NÚMERO JÁ ESTÁ NA LISTA DESTE EVENTO!");
                    btn.innerText = "Confirmar Presença ✨"; btn.disabled = false;
                    return;
                }

                await addDoc(collection(db, "lista_eventos"), { nome: n, tel: t, evento: eventoAtivo.nome, tipo_entrada: tipoAtivo, promoter: refPromoter, data_reserva: new Date().toISOString(), entrou: false });
                alert("Confirmado!"); location.reload();
            } catch (e) { alert("Erro!"); btn.disabled = false; }
        };

        window.fecharModal = () => document.getElementById('modalForm').classList.add('hidden');
        window.mask = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v; if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3); if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            i.value = v;
        };
        carregarPagina();
    </script>
</body>
</html>
