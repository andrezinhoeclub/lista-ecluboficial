<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <title>E-CLUB | Reservas e Listas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.96); }
        .festa-card { background: #000; border: 1px solid rgba(255,255,255,0.1); border-radius: 2.5rem; overflow: hidden; margin-bottom: 2rem; }
        .festa-content { padding: 2rem; }
        .img-banner { width: 100%; display: block; object-fit: cover; }
        .btn-lista { background: #eab308; color: #000; font-weight: 900; text-transform: uppercase; }
        .btn-secundario { background: #111; border: 1px solid #27272a; color: #fff; font-weight: 800; text-transform: uppercase; font-size: 10px; }
        .site-input { background: #000 !important; border: 1px solid #27272a !important; color: white !important; }
        .site-input:disabled { opacity: 0.2; cursor: not-allowed; border-color: #111 !important; }
        .glass-modal { background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .btn-tipo { background: #0c0c0e; border: 1px solid #27272a; transition: 0.3s; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-tipo.active { border-color: #eab308; background: rgba(234, 179, 8, 0.1); }
        .btn-tipo.active .t-label, .btn-tipo.active .t-sub { color: #eab308; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <div class="max-w-md mx-auto w-full flex-grow">
        <header class="flex justify-center py-10">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-16 w-auto">
        </header>

        <div id="listaEventos" class="space-y-8">
            <div class="animate-pulse text-center py-20 text-zinc-800 font-black uppercase text-[10px]">Carregando...</div>
        </div>

        <footer class="mt-16 mb-12 border-t border-zinc-900 pt-10 text-center">
            <div class="grid grid-cols-2 gap-4 mb-8">
                <a href="https://wa.me/5541995040506" target="_blank" class="bg-[#25D366] p-5 rounded-2xl text-black font-black uppercase text-[11px] btn-action text-center">WhatsApp</a>
                <a href="https://www.instagram.com/eclubswingdance/" target="_blank" class="bg-gradient-to-r from-orange-500 via-red-500 to-purple-600 p-5 rounded-2xl text-white font-black uppercase text-[11px] btn-action text-center">Instagram</a>
            </div>
        </footer>
    </div>

    <div id="modalForm" class="hidden fixed inset-0 z-50 glass-modal flex items-center justify-center p-6 text-white text-white">
        <div class="w-full max-w-sm bg-[#121214] border border-white/10 p-8 rounded-[3rem] text-center text-white text-white">
            <h2 id="modal-titulo" class="text-yellow-500 font-black uppercase italic mb-2 tracking-widest text-sm text-white">Reserva</h2>
            <p id="modal-subtitulo" class="text-zinc-500 text-[9px] font-bold uppercase mb-8 text-white text-white text-white">Escolha Casal ou Solteiro para liberar os campos</p>
            
            <div class="space-y-4 text-left text-white text-white">
                <div class="grid grid-cols-2 gap-3 mb-4 text-white">
                    <button onclick="setTipo('CASAL')" id="btn-tipo-casal" class="btn-tipo p-5 rounded-2xl text-white">
                        <span class="t-label text-[9px] font-black uppercase text-zinc-500 mb-1 text-white">Casal</span>
                        <span id="preco-casal-modal" class="text-lg font-black italic text-white text-white">R$ 0,00</span>
                        <span class="t-sub text-[8px] font-black uppercase text-zinc-600 mt-1">Sem consumação</span>
                    </button>
                    <button onclick="setTipo('SOLTEIRO')" id="btn-tipo-solteiro" class="btn-tipo p-5 rounded-2xl text-white">
                        <span class="t-label text-[9px] font-black uppercase text-zinc-500 mb-1 text-white">Solteiro</span>
                        <span id="preco-solteiro-modal" class="text-lg font-black italic text-white text-white">R$ 0,00</span>
                        <span class="t-sub text-[8px] font-black uppercase text-zinc-600 mt-1">Sem consumação</span>
                    </button>
                </div>

                <input type="text" id="nome-cliente" disabled placeholder="NOME COMPLETO" class="w-full site-input p-5 rounded-2xl font-bold text-xs uppercase text-white">
                <input type="tel" id="tel-cliente" disabled oninput="mascaraTelefone(this)" placeholder="(41) 99999-9999" class="w-full site-input p-5 rounded-2xl font-bold text-xs text-white">
                
                <button onclick="finalizarPedido()" id="btn-confirmar" disabled class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest btn-action shadow-xl mt-4 disabled:opacity-20 text-white">Confirmar</button>
                <button onclick="fecharModal()" class="w-full text-zinc-600 font-bold uppercase text-[9px] mt-2 text-white text-white">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let eventoAtivo = null;
        let modoAtivo = ''; let tipoAtivo = '';
        let eventosCache = [];
        const params = new URLSearchParams(window.location.search);
        const idLink = params.get('id');
        let refPromoter = params.get('ref') || "direto";
        let nomeAniv = params.get('aniv');
        let festaFixa = params.get('festa');

        const formatarMoeda = (valor) => {
            if (!valor || valor === "" || valor === "0") return "R$ 0,00";
            let n = parseFloat(valor.toString().replace(',', '.'));
            return isNaN(n) ? "R$ 0,00" : n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        };

        async function carregarPagina() {
            if (idLink) {
                const docAniv = await getDoc(doc(db, "links_aniversario", idLink));
                if (docAniv.exists()) {
                    const d = docAniv.data();
                    nomeAniv = d.aniversariante;
                    festaFixa = d.festa;
                    refPromoter = d.promoter;
                }
            }

            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            const hoje = new Date().toLocaleDateString('en-CA');
            
            eventosCache = [];
            snap.forEach(d => {
                const ev = { id: d.id, ...d.data() };
                if (ev.data >= hoje) eventosCache.push(ev);
            });

            if (festaFixa) eventosCache = eventosCache.filter(ev => ev.nome === festaFixa);

            const container = document.getElementById('listaEventos');
            container.innerHTML = '';

            eventosCache.forEach(ev => {
                const card = document.createElement('div');
                card.className = "festa-card";
                card.innerHTML = `
                    ${ev.imagem ? `<img src="${ev.imagem}" class="img-banner">` : ''}
                    <div class="festa-content text-center">
                        <p class="text-[10px] text-yellow-500 font-black uppercase tracking-[0.3em] mb-2 leading-none">${ev.data.split('-').reverse().join('/')}</p>
                        <h3 class="text-3xl font-black uppercase italic leading-tight mb-8 text-white">${ev.nome}</h3>
                        ${nomeAniv ? `<p class="text-[10px] text-purple-400 font-black uppercase mb-6 italic tracking-widest">CONVITE VIP: ${nomeAniv}</p>` : ''}
                        <div class="space-y-3">
                            <button onclick="abrirFluxo('${ev.id}', 'LISTA')" class="w-full btn-lista py-5 rounded-2xl btn-action text-sm">Colocar nome na lista</button>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="abrirFluxo('${ev.id}', 'ANTECIPADO')" class="btn-secundario py-4 rounded-2xl btn-action text-white">Venda Antecipada</button>
                                <button class="btn-secundario py-4 rounded-2xl opacity-40 cursor-not-allowed text-white">Camarote</button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.abrirFluxo = (id, modo) => {
            eventoAtivo = eventosCache.find(e => e.id === id);
            modoAtivo = modo; tipoAtivo = '';
            
            let vC, vS;
            if (modo === 'LISTA') {
                // LÓGICA CORRIGIDA: Usa desc_casal se houver aniversariante
                vC = nomeAniv ? eventoAtivo.desc_casal : eventoAtivo.valor_casal;
                vS = nomeAniv ? eventoAtivo.desc_solteiro : eventoAtivo.valor_solteiro;
                document.getElementById('modal-titulo').innerText = nomeAniv ? 'Lista de Aniversário' : 'Reserva de Lista';
            } else {
                vC = eventoAtivo.valor_antecipado_casal;
                vS = eventoAtivo.valor_antecipado_solteiro;
                document.getElementById('modal-titulo').innerText = 'Venda Antecipada PIX';
            }

            document.getElementById('preco-casal-modal').innerText = formatarMoeda(vC);
            document.getElementById('preco-solteiro-modal').innerText = formatarMoeda(vS);
            
            // Reset modal e trava campos
            document.getElementById('nome-cliente').value = "";
            document.getElementById('tel-cliente').value = "";
            document.getElementById('nome-cliente').disabled = true;
            document.getElementById('tel-cliente').disabled = true;
            document.getElementById('btn-confirmar').disabled = true;
            document.getElementById('btn-tipo-casal').classList.remove('active');
            document.getElementById('btn-tipo-solteiro').classList.remove('active');
            
            document.getElementById('modalForm').classList.remove('hidden');
        };

        window.setTipo = (tipo) => {
            tipoAtivo = tipo;
            document.getElementById('btn-tipo-casal').classList.remove('active');
            document.getElementById('btn-tipo-solteiro').classList.remove('active');
            document.getElementById('btn-tipo-' + tipo.toLowerCase()).classList.add('active');
            
            // Libera campos após seleção
            document.getElementById('nome-cliente').disabled = false;
            document.getElementById('tel-cliente').disabled = false;
            document.getElementById('btn-confirmar').disabled = false;
            document.getElementById('nome-cliente').focus();
        };

        window.finalizarPedido = async () => {
            const n = document.getElementById('nome-cliente').value.trim();
            const t = document.getElementById('tel-cliente').value.trim();
            if (!n || t.length < 14) return alert("Preencha nome e telefone.");

            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: n.toUpperCase(), tel: t, evento: eventoAtivo.nome,
                    tipo_entrada: tipoAtivo, categoria: modoAtivo,
                    promoter: refPromoter.toLowerCase(),
                    aniversariante: nomeAniv ? nomeAniv.toUpperCase() : "",
                    pago: false, data_reserva: new Date().toISOString()
                });
                alert("Confirmado! Nome na lista.");
                location.reload();
            } catch (e) { alert("Erro ao enviar."); }
        };

        window.fecharModal = () => document.getElementById('modalForm').classList.add('hidden');
        window.mascaraTelefone = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v;
            if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            i.value = v;
        };

        carregarPagina();
    </script>
</body>
</html>
