<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Confirmar Nome na Lista ✨</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050508; color: #fff; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-gradient { background: linear-gradient(135deg, #eab308 0%, #a16207 100%); }
        input, select { background: rgba(0,0,0,0.5) !important; color: white !important; border: 1px solid #333 !important; }
        input:focus { border-color: #eab308 !important; }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center">

    <div class="w-full max-w-md glass p-10 rounded-[3rem] text-center border-white/5 shadow-2xl">
        <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
        
        <div id="loading" class="py-10">
            <p class="text-zinc-500 font-black uppercase text-xs animate-pulse italic">Carregando convite...</p>
        </div>

        <div id="form-container" class="hidden">
            <h1 class="text-3xl font-black mb-2 uppercase italic tracking-tighter">NOME NA <span class="text-yellow-500">LISTA</span></h1>
            <p id="info-promoter" class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-8">CONVITE OFICIAL</p>

            <form id="formReserva" class="space-y-4 text-left">
                <div>
                    <label class="text-[10px] font-black text-zinc-500 uppercase ml-1">Selecione o Evento</label>
                    <select id="evento" class="w-full p-5 rounded-2xl outline-none font-bold uppercase text-xs mt-1" required></select>
                </div>

                <div>
                    <label class="text-[10px] font-black text-zinc-500 uppercase ml-1">Seu Nome Completo</label>
                    <input type="text" id="nome" placeholder="EX: ANDRÉ SILVA" class="w-full p-5 rounded-2xl outline-none font-bold uppercase text-xs mt-1" required>
                </div>

                <div>
                    <label class="text-[10px] font-black text-zinc-500 uppercase ml-1">Seu WhatsApp</label>
                    <input type="tel" id="tel" oninput="mask(this)" placeholder="(41) 99999-9999" class="w-full p-5 rounded-2xl outline-none font-bold text-xs mt-1" required>
                </div>

                <button type="submit" id="btnEnviar" class="w-full gold-gradient text-black font-black py-6 rounded-2xl uppercase text-xs shadow-xl tracking-widest active:scale-95 transition-all mt-4">
                    CONFIRMAR NA LISTA ✨
                </button>
            </form>
        </div>

        <div id="sucesso" class="hidden py-10">
            <div class="w-20 h-20 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">✓</div>
            <h2 class="text-2xl font-black uppercase italic">Confirmado!</h2>
            <p class="text-zinc-500 text-xs font-bold mt-2 uppercase">Seu nome já está na portaria.</p>
            <button onclick="location.reload()" class="mt-8 text-zinc-600 font-black uppercase text-[10px]">Fazer outro cadastro</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const refPromoter = params.get('p') || params.get('ref') || "DIRETO";

        async function carregarEventos() {
            const q = query(collection(db, "eventos"), where("ativo", "==", true));
            const snap = await getDocs(q);
            const select = document.getElementById('evento');
            
            if (snap.empty) {
                document.getElementById('loading').innerHTML = "<p class='text-red-500 font-black'>NENHUM EVENTO DISPONÍVEL</p>";
                return;
            }

            select.innerHTML = snap.docs.map(d => `<option value="${d.data().nome}">${d.data().nome}</option>`).join('');
            document.getElementById('info-promoter').innerText = "CONVITE POR: " + refPromoter.toUpperCase();
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('form-container').classList.remove('hidden');
        }

        document.getElementById('formReserva').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            const nome = document.getElementById('nome').value.trim().toUpperCase();
            const telRaw = document.getElementById('tel').value.replace(/\D/g, ""); // Apenas números
            const evento = document.getElementById('evento').value;

            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            try {
                // --- TRAVA DE DUPLICIDADE ---
                const qBusca = query(
                    collection(db, "lista_eventos"), 
                    where("evento", "==", evento), 
                    where("tel", "==", document.getElementById('tel').value) // Comparação exata como salva
                );
                
                const snapCheck = await getDocs(qBusca);

                if (!snapCheck.empty) {
                    const existente = snapCheck.docs[0].data();
                    const ondeReserva = existente.promoter === "DIRETO" ? "pelo LINK OFICIAL DA CASA" : `através do promoter ${existente.promoter.toUpperCase()}`;
                    
                    alert(`🚨 OPS! Este número já está cadastrado para o evento "${evento}" ${ondeReserva}.\n\nNão é necessário cadastrar novamente.`);
                    btn.innerText = "NÚMERO JÁ CADASTRADO";
                    return;
                }

                // Se não achou duplicado, salva normal
                await addDoc(collection(db, "lista_eventos"), {
                    nome,
                    tel: document.getElementById('tel').value,
                    evento,
                    promoter: refPromoter.toUpperCase(),
                    data_reserva: new Date().toISOString(),
                    entrou: false
                });

                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('sucesso').classList.remove('hidden');

            } catch (error) {
                alert("Erro ao processar. Tente novamente.");
                console.error(error);
            } finally {
                if (btn.innerText !== "NÚMERO JÁ CADASTRADO") {
                    btn.innerText = "CONFIRMAR NA LISTA ✨";
                    btn.disabled = false;
                }
            }
        };

        window.mask = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v;
            if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            i.value = v;
        };

        carregarEventos();
    </script>
</body>
</html>
