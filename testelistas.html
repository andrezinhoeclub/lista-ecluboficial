<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <title>E-CLUB | Reservas & Pix ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050508; color: #fff; min-height: 100vh; background-image: radial-gradient(circle at top right, #1a1025 0%, #050508 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-lista { background: #eab308; color: #000; font-weight: 900; transition: 0.3s; }
        .btn-pix-main { background: linear-gradient(135deg, #00bfa5 0%, #00d1b2 100%); color: #fff; font-weight: 900; box-shadow: 0 10px 25px rgba(0, 191, 165, 0.2); }
        .site-input { background: #0f0f15 !important; border: 1px solid #27273a !important; color: #fff !important; outline: none; }
        .btn-tipo.active { border-color: #00f5d4; background: rgba(0, 191, 165, 0.1); box-shadow: 0 0 20px rgba(0, 191, 165, 0.2); }
        .banner-img { width: 100%; height: 220px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-6 flex flex-col items-center">
    
    <div class="max-w-md w-full">
        <header class="flex justify-center py-10">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16">
        </header>

        <div id="listaEventos" class="space-y-10">
            <div class="text-center py-20 opacity-20 font-black uppercase italic tracking-widest text-xs">Sincronizando festas...</div>
        </div>
    </div>

    <div id="modalForm" class="hidden fixed inset-0 z-[999] bg-black/95 backdrop-blur-xl flex items-center justify-center p-6 text-white">
        <div class="w-full max-w-sm bg-[#0d0d14] border border-white/10 p-10 rounded-[3.5rem] text-center shadow-2xl relative">
            
            <h2 id="modal-titulo" class="text-yellow-500 font-black uppercase italic mb-2 tracking-tighter text-xl">Reserva E-Club</h2>
            <p id="modal-subtitulo" class="text-zinc-500 text-[10px] font-bold uppercase mb-8 tracking-widest">Selecione uma opção</p>

            <div id="etapa-tipo" class="grid grid-cols-1 gap-4 mb-8">
                <button onclick="selecionarTipo('CASAL')" id="sel-casal" class="p-6 bg-[#13131c] border border-white/5 rounded-[2.5rem] flex items-center justify-between hover:scale-[1.02] transition-all">
                    <div class="text-left">
                        <span class="text-[10px] font-black uppercase text-zinc-500 block">👫 Casal</span>
                        <span id="label-tipo-casal" class="text-[9px] font-bold text-zinc-400">Pagar no Local</span>
                    </div>
                    <span id="v-modal-casal" class="text-xl font-black italic">---</span>
                </button>

                <button onclick="selecionarTipo('SOLTEIRO')" id="sel-solteiro" class="p-6 bg-[#13131c] border border-white/5 rounded-[2.5rem] flex items-center justify-between hover:scale-[1.02] transition-all">
                    <div class="text-left">
                        <span class="text-[10px] font-black uppercase text-zinc-500 block">👤 Solteiro</span>
                        <span id="label-tipo-solteiro" class="text-[9px] font-bold text-zinc-400">Sem Consumação</span>
                    </div>
                    <span id="v-modal-solteiro" class="text-xl font-black italic">---</span>
                </button>
            </div>

            <div id="etapa-dados" class="hidden space-y-4">
                <input type="text" id="nome-cliente" placeholder="NOME COMPLETO" class="w-full site-input p-6 rounded-3xl font-bold text-xs uppercase text-white">
                <input type="tel" id="tel-cliente" oninput="mask(this)" placeholder="(41) 99999-9999" class="w-full site-input p-6 rounded-3xl font-bold text-xs text-white">
                
                <button onclick="processarFinalizacao()" id="btn-final-acao" class="w-full btn-lista py-6 rounded-3xl uppercase text-xs font-black mt-4 shadow-xl active:scale-95 transition-all">
                    Confirmar Reserva ✨
                </button>
            </div>

            <button onclick="fecharModal()" class="w-full text-zinc-600 uppercase text-[10px] font-black mt-6 tracking-widest">Voltar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let RASTREIO = { promoter: "direto", aniversariante: "" };
        let eventosCache = []; let eventoAtivo = null; let tipoAtivo = '';
        let eFluxoPix = false;

        async function carregarPagina() {
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            eventosCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            const container = document.getElementById('listaEventos');
            container.innerHTML = eventosCache.length ? '' : '<p class="text-center opacity-30 uppercase text-[10px] font-black py-20">Nenhuma festa disponível</p>';

            eventosCache.forEach(ev => {
                container.innerHTML += `
                    <div class="glass overflow-hidden rounded-[3.5rem] mb-10 border-white/5 relative group">
                        
                        ${ev.imagem ? `<img src="${ev.imagem}" class="banner-img opacity-80 group-hover:opacity-100 transition duration-700">` : `<div class="banner-img bg-zinc-900 flex items-center justify-center text-zinc-700 font-bold uppercase text-[10px]">E-CLUB Oficial</div>`}

                        <div class="p-8">
                            <h3 class="text-2xl font-black uppercase italic mb-8 tracking-tighter text-white leading-tight">${ev.nome}</h3>
                            
                            <div class="space-y-4">
                                <button onclick="iniciarFluxo('${ev.id}', false)" class="w-full btn-lista py-6 rounded-3xl text-sm italic font-black active:scale-95 transition-all flex items-center justify-center gap-3">
                                    📝 COLOCAR NOME NA LISTA
                                </button>
                                
                                <button onclick="iniciarFluxo('${ev.id}', true)" class="w-full btn-pix-main py-6 rounded-3xl text-sm italic font-black active:scale-95 transition-all flex items-center justify-center gap-3">
                                    ⚡ PIX ANTECIPADO (DESCONTO)
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        window.iniciarFluxo = (id, isPix) => {
            eventoAtivo = eventosCache.find(e => e.id === id);
            eFluxoPix = isPix;
            
            // Reset modal
            document.getElementById('etapa-tipo').classList.remove('hidden');
            document.getElementById('etapa-dados').classList.add('hidden');
            document.getElementById('modal-titulo').innerText = isPix ? "Pix Antecipado" : "Lista E-Club";
            document.getElementById('modal-titulo').className = isPix ? "text-[#00f5d4] font-black uppercase italic mb-2 tracking-tighter text-xl" : "text-yellow-500 font-black uppercase italic mb-2 tracking-tighter text-xl";
            document.getElementById('modal-subtitulo').innerText = isPix ? "Escolha o Desconto PIX" : "Escolha sua Categoria";

            // Preços
            if (isPix) {
                document.getElementById('v-modal-casal').innerText = "R$ " + (eventoAtivo.ant_casal || "---");
                document.getElementById('v-modal-solteiro').innerText = "R$ " + (eventoAtivo.ant_solteiro || "---");
                document.getElementById('label-tipo-casal').innerText = "Vantagem Fila VIP";
                document.getElementById('label-tipo-solteiro').innerText = "Sem Consumação";
            } else {
                document.getElementById('v-modal-casal').innerText = "R$ " + (eventoAtivo.valor_casal || "---");
                document.getElementById('v-modal-solteiro').innerText = "R$ " + (eventoAtivo.valor_solteiro || "---");
                document.getElementById('label-tipo-casal').innerText = "Pagar no Local";
                document.getElementById('label-tipo-solteiro').innerText = "Pagar no Local";
            }

            document.getElementById('modalForm').classList.remove('hidden');
        };

        window.selecionarTipo = (tipo) => {
            tipoAtivo = tipo;
            document.getElementById('etapa-tipo').classList.add('hidden');
            document.getElementById('etapa-dados').classList.remove('hidden');
            document.getElementById('modal-subtitulo').innerText = "Dados para " + tipo;
            document.getElementById('btn-final-acao').innerText = eFluxoPix ? "Pagar com PIX ⚡" : "Confirmar Presença ✨";
            document.getElementById('btn-final-acao').className = eFluxoPix ? "w-full btn-pix-main py-6 rounded-3xl uppercase text-xs font-black mt-4 shadow-xl active:scale-95 transition-all" : "w-full btn-lista py-6 rounded-3xl uppercase text-xs font-black mt-4 shadow-xl active:scale-95 transition-all";
        };

        window.processarFinalizacao = async () => {
            const n = document.getElementById('nome-cliente').value.trim().toUpperCase();
            const t = document.getElementById('tel-cliente').value.trim();
            if (!n || t.length < 14) return alert("Preencha Nome e Telefone!");

            const btn = document.getElementById('btn-final-acao');
            const originalText = btn.innerText;
            btn.innerText = "PROCESSANDO..."; btn.disabled = true;

            try {
                const docRef = await addDoc(collection(db, "lista_eventos"), {
                    nome: n, tel: t, evento: eventoAtivo.nome, tipo_entrada: tipoAtivo,
                    promoter: RASTREIO.promoter, data_reserva: new Date().toISOString(), 
                    entrou: false, pago: false
                });

                if (eFluxoPix) {
                    const linkPag = tipoAtivo === 'CASAL' ? eventoAtivo.link_pag_casal : eventoAtivo.link_pag_solteiro;
                    if (linkPag) {
                        window.location.href = linkPag + "&external_reference=" + docRef.id;
                    } else {
                        alert("Erro: Link de pagamento não configurado.");
                        location.reload();
                    }
                } else {
                    alert("Sucesso! Nome confirmado na lista.");
                    location.reload();
                }
            } catch (e) { alert("Erro de conexão."); btn.disabled = false; btn.innerText = originalText; }
        };

        window.fecharModal = () => { document.getElementById('modalForm').classList.add('hidden'); };
        window.mask = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v;
            if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            i.value = v;
        };

        carregarPagina();
    </script>
</body>
</html>
