<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <title>E-CLUB | Reservas & Pix ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050508; color: #fff; min-height: 100vh; background-image: radial-gradient(circle at top right, #1a1025 0%, #050508 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-lista { background: #eab308; color: #000; font-weight: 900; }
        .btn-pix-main { background: linear-gradient(135deg, #00bfa5 0%, #00d1b2 100%); color: #fff; font-weight: 900; }
        .site-input { background: #0f0f15 !important; border: 1px solid #27273a !important; color: #fff !important; outline: none; }
        .banner-img { width: 100%; height: auto; display: block; opacity: 1; }
        .btn-sel { background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .btn-sel.active { border-color: #eab308; background: rgba(234, 179, 8, 0.05); box-shadow: 0 0 20px rgba(234, 179, 8, 0.1); }
        .btn-sel-pix.active { border-color: #00f5d4; background: rgba(0, 245, 212, 0.05); }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div class="max-w-md w-full">
        <header class="flex justify-center py-6"><img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16"></header>
        <div id="listaEventos" class="space-y-10"></div>
    </div>

    <div id="modalForm" class="hidden fixed inset-0 z-[999] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4 text-white">
        <div class="w-full max-w-sm glass border border-white/10 p-8 rounded-[2.5rem] text-center shadow-2xl relative">
            <h2 id="modal-titulo" class="font-black uppercase italic mb-1 tracking-tighter text-xl">🔥 NOME NA LISTA</h2>
            <div class="grid grid-cols-2 gap-3 my-6">
                <button onclick="selecionarTipo('CASAL')" id="btn-casal" class="btn-sel p-4 rounded-3xl flex flex-col items-center">
                    <span class="text-[10px] font-black uppercase opacity-60">👫 Casal</span>
                    <span id="v-modal-casal" class="text-xs font-black italic">---</span>
                </button>
                <button onclick="selecionarTipo('SOLTEIRO')" id="btn-solteiro" class="btn-sel p-4 rounded-3xl flex flex-col items-center">
                    <span class="text-[10px] font-black uppercase opacity-60">👤 Solteiro</span>
                    <span id="v-modal-solteiro" class="text-xs font-black italic">---</span>
                </button>
            </div>
            <div class="space-y-3">
                <input type="text" id="nome-cliente" placeholder="NOME COMPLETO" class="w-full site-input p-4 rounded-2xl font-bold text-xs uppercase text-white">
                <input type="tel" id="tel-cliente" oninput="mask(this)" placeholder="(41) 99999-9999" class="w-full site-input p-4 rounded-2xl font-bold text-xs text-white">
                <button onclick="processarFinalizacao()" id="btn-final-acao" class="w-full py-5 rounded-2xl uppercase text-xs font-black mt-2 shadow-xl">Confirmar</button>
            </div>
            <button onclick="fecharModal()" class="w-full text-zinc-600 uppercase text-[9px] font-black mt-6 tracking-widest italic">Voltar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let eventosCache = []; let eventoAtivo = null; let tipoAtivo = 'CASAL'; let eFluxoPix = false;

        async function carregarPagina() {
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            const hojeStr = new Date().toLocaleDateString('en-CA'); 
            eventosCache = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(ev => ev.data >= hojeStr).sort((a, b) => a.data.localeCompare(b.data));
            document.getElementById('listaEventos').innerHTML = eventosCache.map(ev => `
                <div class="glass overflow-hidden rounded-[2.5rem] border-white/5 shadow-2xl">
                    <img src="${ev.imagem || ''}" class="banner-img">
                    <div class="p-8">
                        <h3 class="text-2xl font-black uppercase italic mb-6 text-white tracking-tighter">${ev.nome}</h3>
                        <div class="space-y-4">
                            <button onclick="iniciarFluxo('${ev.id}', false)" class="w-full btn-lista py-5 rounded-2xl text-xs italic font-black">📝 NOME NA LISTA</button>
                            <button onclick="iniciarFluxo('${ev.id}', true)" class="w-full btn-pix-main py-5 rounded-2xl text-xs italic font-black">⚡ PIX ANTECIPADO</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        window.iniciarFluxo = (id, isPix) => {
            eventoAtivo = eventosCache.find(e => e.id === id); eFluxoPix = isPix;
            document.getElementById('modal-titulo').innerText = isPix ? "⚡ PIX ANTECIPADO" : "🔥 NOME NA LISTA";
            document.getElementById('v-modal-casal').innerText = isPix ? (eventoAtivo.ant_casal || "---") : (eventoAtivo.valor_casal || "FREE");
            document.getElementById('v-modal-solteiro').innerText = isPix ? (eventoAtivo.ant_solteiro || "---") : (eventoAtivo.valor_solteiro || "FREE");
            selecionarTipo('CASAL'); document.getElementById('modalForm').classList.remove('hidden');
        };

        window.selecionarTipo = (tipo) => {
            tipoAtivo = tipo;
            document.getElementById('btn-casal').classList.toggle('active', tipo === 'CASAL');
            document.getElementById('btn-solteiro').classList.toggle('active', tipo === 'SOLTEIRO');
            const btn = document.getElementById('btn-final-acao');
            btn.innerText = eFluxoPix ? "Pagar com PIX ⚡" : "Confirmar Presença ✨";
            btn.className = eFluxoPix ? "w-full btn-pix-main py-5 rounded-2xl uppercase text-xs font-black mt-2 shadow-xl" : "w-full btn-lista py-5 rounded-2xl uppercase text-xs font-black mt-2 shadow-xl";
        };

        window.processarFinalizacao = async () => {
            const n = document.getElementById('nome-cliente').value.trim().toUpperCase();
            const t = document.getElementById('tel-cliente').value.trim();
            if (!n || t.length < 14) return alert("Preencha Nome e Telefone!");
            const btn = document.getElementById('btn-final-acao'); btn.innerText = "PROCESSANDO..."; btn.disabled = true;

            try {
                const docRef = await addDoc(collection(db, "lista_eventos"), {
                    cliente: n, telefone: t, evento: eventoAtivo.nome, data_evento: eventoAtivo.data,
                    tipo: tipoAtivo, promoter: "site_direto", data_reserva: new Date().toISOString(), entrou: false, pago: false, metodo: eFluxoPix ? 'pix_antecipado' : 'portaria'
                });

                if (eFluxoPix) {
                    const vRaw = tipoAtivo === 'CASAL' ? (eventoAtivo.ant_casal || eventoAtivo.valor_casal) : (eventoAtivo.ant_solteiro || eventoAtivo.valor_solteiro);
                    const vLimpo = String(vRaw).replace('R$', '').replace(/\s/g, '').replace(',', '.');
                    
                    const response = await fetch('https://us-central1-teste-de-reserva.cloudfunctions.net/gerarPagamento', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ valor: vLimpo, titulo: `E-CLUB: ${eventoAtivo.nome} (${tipoAtivo})`, reservaId: docRef.id })
                    });
                    const data = await response.json();
                    if (data.url) window.location.href = data.url; else throw new Error();
                } else {
                    alert("Confirmado na lista! ✨"); location.reload();
                }
            } catch (e) { alert("Erro ao processar! Verifique se a função está pública."); btn.disabled = false; btn.innerText = "Tentar Novamente"; }
        };

        window.fecharModal = () => document.getElementById('modalForm').classList.add('hidden');
        window.mask = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v; if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10); i.value = v;
        };
        carregarPagina();
    </script>
</body>
</html>
