<!DOCTYPE html>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050508; color: #fff; min-height: 100vh; background-image: radial-gradient(circle at top right, #1a1025 0%, #050508 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-lista { background: #eab308; color: #000; font-weight: 900; }
        .btn-pix-main { background: linear-gradient(135deg, #00bfa5 0%, #00d1b2 100%); color: #fff; font-weight: 900; }
        .btn-camarote { background: linear-gradient(135deg, #a855f7 0%, #c084fc 100%); color: #fff; font-weight: 900; }
        .site-input { background: #0f0f15 !important; border: 1px solid #27273a !important; color: #fff !important; outline: none; transition: 0.3s; }
        .banner-img { width: 100%; height: auto; display: block; opacity: 1; border-radius: 2.5rem 2.5rem 0 0; }
        .btn-sel { background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .btn-sel.active { border-color: #eab308; background: rgba(234, 179, 8, 0.05); box-shadow: 0 0 20px rgba(234, 179, 8, 0.1); }
        .btn-sel-pix.active { border-color: #00f5d4; background: rgba(0, 245, 212, 0.05); }
        .cam-livre { border-color: #22c55e; background: rgba(34, 197, 94, 0.1); cursor: pointer; }
        .cam-vendido { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .cam-aguardando { border-color: #eab308; background: rgba(234, 179, 8, 0.1); opacity: 0.7; cursor: not-allowed; }
        .cam-selecionado { border-color: #a855f7 !important; background: rgba(168, 85, 247, 0.2) !important; box-shadow: 0 0 20px rgba(168,85,247,0.4); }
        @keyframes scaleUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .success-anim { animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div id="toast-aviso" class="fixed top-4 left-1/2 -translate-x-1/2 z-[10001] text-white font-black text-[10px] uppercase tracking-widest px-6 py-4 rounded-2xl shadow-2xl transition-all duration-300 transform -translate-y-32 opacity-0 flex items-center gap-3 w-[90%] max-w-sm pointer-events-none">
        <span id="toast-icon" class="text-lg">⚠️</span>
        <span id="toast-msg">Mensagem de erro</span>

    <div class="max-w-md w-full">
        <header class="flex flex-col items-center justify-center py-6">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16">
            <h2 id="header-aniv" class="text-fuchsia-400 font-black uppercase italic mt-4 text-xl tracking-widest hidden text-center leading-tight"></h2>
        </header>
        
        <div id="listaEventos" class="space-y-10"></div>

        <footer class="mt-12 mb-8 flex flex-col items-center gap-8">
            <div class="flex gap-3 w-full">
                <a href="https://api.whatsapp.com/send?phone=5541995040506" target="_blank" class="flex-1 glass p-3 rounded-2xl flex flex-col items-center justify-center gap-2 hover:bg-green-500/10 border border-transparent transition-all group">
                    <span class="text-2xl">💬</span>
                    <span class="text-[8px] font-black uppercase tracking-widest text-zinc-400 group-hover:text-green-400">WhatsApp</span>
                </a>
                <a href="https://www.instagram.com/eclubswingdance/" target="_blank" class="flex-1 glass p-3 rounded-2xl flex flex-col items-center justify-center gap-2 hover:bg-fuchsia-500/10 border border-transparent transition-all group">
                    <span class="text-2xl">📸</span>
                    <span class="text-[8px] font-black uppercase tracking-widest text-zinc-400 group-hover:text-fuchsia-400">Instagram</span>
                </a>
                <a href="https://www.google.com/maps/search/?api=1&query=R.+Aníbal+Goularte+Maia+Filho,+81+-+Bairro+Alto,+Curitiba+-+PR,+82820-480" target="_blank" class="flex-1 glass p-3 rounded-2xl flex flex-col items-center justify-center gap-2 hover:bg-blue-500/10 border border-transparent transition-all group">
                    <span class="text-2xl">📍</span>
                    <span class="text-[8px] font-black uppercase tracking-widest text-zinc-400 group-hover:text-blue-400">Chegar</span>
                </a>
            </div>
            <div class="text-center opacity-40 hover:opacity-100 transition-all">
                <a href="https://www.instagram.com/andrezinhoeclub/" target="_blank" class="inline-flex flex-col items-center justify-center gap-1 group">
                    <span class="text-[9px] font-black uppercase tracking-widest text-zinc-500 group-hover:text-sky-400 transition-colors">⚡ DESENVOLVIDO POR ANDREZINHO E-CLUB</span>
                </a>
            </div>
        </footer>
    </div>

    <div id="modalForm" class="hidden fixed inset-0 z-[999] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4 text-white overflow-y-auto">
        <div class="w-full max-w-sm bg-[#0d0d14] border border-white/10 p-6 md:p-8 rounded-[2.5rem] text-center shadow-2xl relative my-auto mt-10 mb-10">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-12 mx-auto mb-6">
            <h2 id="modal-titulo" class="font-black uppercase italic mb-6 tracking-tighter text-xl">🔥 NOME NA LISTA</h2>
            <div id="grid-botoes-tipo" class="grid grid-cols-2 gap-2 mb-6">
                <button onclick="selecionarTipo('CASAL')" id="btn-casal" class="btn-sel p-3 rounded-2xl flex flex-col items-center justify-center text-center">
                    <span id="titulo-btn-casal" class="text-[9px] font-black uppercase opacity-80 leading-tight">👫 Casal</span>
                    <span id="v-modal-casal" class="text-xs font-black mt-1">---</span>
                </button>
                <button onclick="selecionarTipo('CASAL CONSUMAÇÃO')" id="btn-casal-cons" class="hidden btn-sel p-3 rounded-2xl flex flex-col items-center justify-center text-center">
                    <span id="titulo-btn-casal-cons" class="text-[9px] font-black uppercase text-fuchsia-400 leading-tight">🍹 Casal</span>
                    <span id="v-modal-casal-cons" class="text-xs font-black mt-1">---</span>
                </button>
                <button onclick="selecionarTipo('SOLTEIRO')" id="btn-solteiro" class="btn-sel p-3 rounded-2xl flex flex-col items-center justify-center text-center">
                    <span id="titulo-btn-solteiro" class="text-[9px] font-black uppercase opacity-80 leading-tight">👤 Solteiro</span>
                    <span id="v-modal-solteiro" class="text-xs font-black mt-1">---</span>
                </button>
            </div>
            <div class="space-y-3 text-left">
                <input type="text" id="nome-cliente" placeholder="NOME COMPLETO" class="w-full site-input p-4 rounded-2xl font-bold text-xs uppercase text-white">
                <input type="tel" id="tel-cliente" oninput="maskTel(this)" placeholder="(41) 99999-9999" class="w-full site-input p-4 rounded-2xl font-bold text-xs text-white">
                <div id="campos-pix" class="hidden space-y-3">
                    <input type="email" id="email-cliente" placeholder="SEU E-MAIL" class="w-full site-input p-4 rounded-2xl font-bold text-xs text-white lowercase">
                    <input type="tel" id="cpf-cliente" oninput="maskCPF(this)" placeholder="SEU CPF" class="w-full site-input p-4 rounded-2xl font-bold text-xs text-white">
                </div>
                <button onclick="processarFinalizacao()" id="btn-final-acao" class="w-full py-5 rounded-2xl uppercase text-xs font-black mt-2 shadow-xl transition-all">Confirmar Presença</button>
            </div>
            <button onclick="fecharModal()" class="w-full text-zinc-600 uppercase text-[9px] font-black mt-6 tracking-widest italic">Voltar</button>
        </div>
    </div>

    <!-- Os outros modais (Camarote, QrCode) continuam iguais ao seu original... -->

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, doc, getDoc, limit, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", authDomain: "teste-de-reserva.firebaseapp.com", projectId: "teste-de-reserva", storageBucket: "teste-de-reserva.appspot.com", messagingSenderId: "163395694876", appId: "1:163395694876:web:8b1116a0483af951548ad9" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let globalPromoter = new URLSearchParams(window.location.search).get('ref') || "site_direto";
        let globalAniversariante = ""; let eventosCache = []; let eventoAtivo = null; let tipoAtivo = null; let eFluxoPix = false;

        const formatarMoeda = (v) => v ? "R$ " + String(v).toUpperCase().replace("R$", "").trim() : "PORTARIA";

        // --- NOVA FUNÇÃO: VERIFICAR HISTÓRICO DE QUINTA/SEXTA (FIDELIDADE) ---
        async function verificarFidelidade(telefone) {
            // Só faz sentido verificar se for status VIP/Aniversário
            if (!globalAniversariante) return false;

            const agora = new Date();
            // Pega a data de 3 dias atrás (se hoje for sábado, pega quinta e sexta)
            const tresDiasAtras = new Date();
            tresDiasAtras.setDate(agora.getDate() - 3);
            const isoCorte = tresDiasAtras.toISOString();

            const q = query(
                collection(db, "lista_eventos"), 
                where("tel", "==", telefone),
                where("entrou", "==", true),
                where("data_entrada", ">=", isoCorte),
                limit(1)
            );
            
            const snap = await getDocs(q);
            return !snap.empty;
        }

        window.processarFinalizacao = async () => {
            const n = document.getElementById('nome-cliente').value.trim().toUpperCase();
            const t = document.getElementById('tel-cliente').value.trim();
            const em = document.getElementById('email-cliente').value.trim();
            const cpf = document.getElementById('cpf-cliente').value.trim();
            
            if (!tipoAtivo) return mostrarAviso("Selecione o tipo de ingresso!");
            if (!n) return mostrarAviso("Faltou preencher o Nome!");
            if (t.replace(/\D/g, '').length < 11) return mostrarAviso("Telefone incompleto!");
            
            const btn = document.getElementById('btn-final-acao'); btn.disabled = true; btn.innerText = "PROCESSANDO...";
            
            try {
                // 1. Verifica se já tem reserva hoje
                const snapJaExiste = await getDocs(query(collection(db, "lista_eventos"), where("evento", "==", eventoAtivo.nome), where("tel", "==", t)));
                if (!snapJaExiste.empty) throw new Error("Você já possui uma reserva ativa!");

                // 2. LÓGICA DE FIDELIDADE (QUINTA/SEXTA)
                let valorFinal;
                let isFidelidade = false;

                if (globalAniversariante) {
                    const veioNaSemana = await verificarFidelidade(t);
                    if (veioNaSemana) {
                        const aplicar = confirm("⚡ CLIENTE FIDELIDADE!\nEste cliente esteve presente na Quinta ou Sexta.\nDeseja aplicar o desconto especial de Sábado?");
                        if (aplicar) {
                            isFidelidade = true;
                            // Puxa os valores de fidelidade que você vai criar na Dashboard
                            valorFinal = (tipoAtivo === 'SOLTEIRO') ? (eventoAtivo.valor_recorrente_solteiro || "FREE") : (eventoAtivo.valor_recorrente_casal || "FREE");
                        }
                    }
                }

                // Se não for fidelidade, pega o valor normal
                if (!isFidelidade) {
                    if (tipoAtivo === 'CASAL') valorFinal = eFluxoPix ? eventoAtivo.ant_casal : (globalAniversariante ? eventoAtivo.desc_casal : eventoAtivo.valor_casal);
                    else if (tipoAtivo === 'SOLTEIRO') valorFinal = eFluxoPix ? eventoAtivo.ant_solteiro : (globalAniversariante ? eventoAtivo.desc_solteiro : eventoAtivo.valor_solteiro);
                    else valorFinal = eFluxoPix ? eventoAtivo.ant_casal_cons : eventoAtivo.valor_casal_cons;
                }

                await addDoc(collection(db, "lista_eventos"), { 
                    nome: n, tel: t, cpf: cpf, evento: eventoAtivo.nome, 
                    tipo_entrada: isFidelidade ? (tipoAtivo + " FIDELIDADE") : tipoAtivo, 
                    promoter: globalPromoter, aniversariante: globalAniversariante, 
                    data_reserva: new Date().toISOString(), entrou: false, pago: false, 
                    metodo: eFluxoPix ? 'pix_antecipado' : 'portaria', valor_pago: valorFinal || "" 
                });

                mostrarAviso(isFidelidade ? "Confirmado com Desconto Fidelidade! 🏆" : "Confirmado na lista! ✨", true);
                setTimeout(() => { location.reload(); }, 2000);

            } catch (e) { mostrarAviso(e.message); btn.disabled = false; btn.innerText = "Confirmar Presença"; }
        };

        // ... Resto das funções de carregarPagina, mascaras, etc (iguais ao seu sistema) ...
        
        async function carregarPagina() {
            const anivId = new URLSearchParams(window.location.search).get('id');
            if (anivId) {
                const anivSnap = await getDoc(doc(db, "links_aniversario", anivId));
                if (anivSnap.exists()) {
                    const d = anivSnap.data(); globalPromoter = d.promoter || "site_direto";
                    globalAniversariante = d.aniversariante;
                }
            }
            // ... (Lógica de carregar eventos e prazos de 22h/23:59 que já fizemos)
        }
        
        carregarPagina();
    </script>
</body>
</html>
