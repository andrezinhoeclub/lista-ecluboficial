<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>E-CLUB | Teste de Reservas PIX ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050508; color: #fff; min-height: 100vh; background-image: radial-gradient(circle at top right, #1a1025 0%, #050508 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-lista { background: #eab308; color: #000; font-weight: 900; transition: 0.3s; }
        .site-input { background: #0f0f15 !important; border: 1px solid #27273a !important; color: #fff !important; outline: none; }
        .btn-tipo.active { border-color: #a855f7; background: rgba(168, 85, 247, 0.1); box-shadow: 0 0 20px rgba(168, 85, 247, 0.2); }
        .btn-pix { background: #00bfa5; color: #fff; font-weight: 900; box-shadow: 0 4px 20px rgba(0, 191, 165, 0.3); }
        .promo-tag { background: #00bfa5; color: #000; font-size: 9px; font-weight: 900; padding: 2px 8px; border-radius: 4px; position: absolute; top: -10px; right: 10px; text-transform: uppercase; }
    </style>
</head>
<body class="p-6 flex flex-col items-center">
    
    <div class="max-w-md w-full">
        <header class="flex justify-center py-10">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16">
        </header>

        <div id="listaEventos" class="space-y-6">
            <div class="text-center py-20 opacity-20 font-black uppercase italic tracking-widest">Carregando festas...</div>
        </div>
    </div>

    <div id="modalForm" class="hidden fixed inset-0 z-[999] bg-black/95 backdrop-blur-xl flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-[#0d0d14] border border-white/10 p-10 rounded-[3.5rem] text-center shadow-2xl relative">
            
            <div id="etapa-dados">
                <h2 class="text-yellow-500 font-black uppercase italic mb-2 tracking-tighter text-xl">Reserva Oficial</h2>
                <p class="text-zinc-500 text-[10px] font-bold uppercase mb-8 tracking-widest">Escolha sua categoria</p>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <button onclick="setTipo('CASAL')" id="btn-tipo-casal" class="p-6 bg-[#13131c] border border-white/5 rounded-[2rem] relative transition-all">
                        <span class="text-[9px] font-black uppercase text-zinc-500 block mb-1">👫 Casal</span>
                        <span id="preco-casal-lista" class="font-black text-white text-sm">---</span>
                    </button>
                    <button onclick="setTipo('SOLTEIRO')" id="btn-tipo-solteiro" class="p-6 bg-[#13131c] border border-white/5 rounded-[2rem] relative transition-all">
                        <span class="text-[9px] font-black uppercase text-zinc-500 block mb-1">👤 Solteiro</span>
                        <span id="preco-solteiro-lista" class="font-black text-white text-sm">---</span>
                    </button>
                </div>

                <div id="campos-cliente" class="space-y-4 opacity-10 pointer-events-none transition-all duration-500">
                    <input type="text" id="nome-cliente" placeholder="NOME COMPLETO" class="w-full site-input p-6 rounded-3xl font-bold text-xs uppercase">
                    <input type="tel" id="tel-cliente" oninput="mask(this)" placeholder="(41) 99999-9999" class="w-full site-input p-6 rounded-3xl font-bold text-xs">
                </div>

                <button onclick="finalizarPedido()" id="btn-confirmar" disabled class="w-full btn-lista py-6 rounded-3xl uppercase text-xs font-black mt-8 shadow-xl">Confirmar Presença ✨</button>
                <button onclick="fecharModal()" class="w-full text-zinc-600 uppercase text-[10px] font-black mt-4">Cancelar</button>
            </div>

            <div id="etapa-pagamento" class="hidden space-y-8 animate-in fade-in zoom-in duration-300">
                <div>
                    <div class="h-20 w-20 bg-green-500/10 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl border border-green-500/20">✓</div>
                    <h3 class="text-2xl font-black uppercase italic text-white leading-none">NOME NA LISTA!</h3>
                    <p class="text-zinc-500 text-[10px] font-bold mt-3 uppercase tracking-widest">Economize agora com o PIX</p>
                </div>

                <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/5 relative">
                    <span class="promo-tag">Oferta Exclusiva</span>
                    <p class="text-[9px] text-zinc-500 font-black uppercase mb-2">Valor Antecipado</p>
                    <p id="preco-pix-promo" class="text-5xl font-black text-green-500 italic tracking-tighter">R$ ---</p>
                    <p id="comparativo-preco" class="text-[10px] text-zinc-400 mt-2 font-bold">Ao invés de R$ --- na porta</p>
                </div>

                <div class="space-y-3">
                    <button id="btn-ir-pagamento" class="w-full btn-pix py-6 rounded-3xl uppercase text-xs font-black tracking-widest active:scale-95 transition-all">Pagar via PIX (Fila VIP) ⚡</button>
                    <button onclick="location.reload()" class="w-full text-zinc-600 uppercase text-[9px] font-black py-2 tracking-widest">Pagar valor cheio no local</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let RASTREIO = { promoter: "direto", aniversariante: "" };
        let eventosCache = []; let eventoAtivo = null; let tipoAtivo = '';

        async function carregarPagina() {
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            eventosCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            const container = document.getElementById('listaEventos');
            container.innerHTML = eventosCache.length ? '' : '<p class="text-center opacity-30">Nenhum evento ativo.</p>';

            eventosCache.forEach(ev => {
                container.innerHTML += `
                    <div class="glass p-8 rounded-[3rem] text-center shadow-xl border-white/5">
                        <h3 class="text-2xl font-black uppercase italic mb-8 tracking-tighter">${ev.nome}</h3>
                        <button onclick="abrirFluxo('${ev.id}')" class="w-full btn-lista py-6 rounded-3xl text-sm italic active:scale-95 transition-all">🚀 QUERO MEU NOME NA LISTA</button>
                    </div>`;
            });
        }

        window.abrirFluxo = (id) => {
            eventoAtivo = eventosCache.find(e => e.id === id);
            document.getElementById('preco-casal-lista').innerText = "R$ " + (eventoAtivo.valor_casal || "---");
            document.getElementById('preco-solteiro-lista').innerText = "R$ " + (eventoAtivo.valor_solteiro || "---");
            document.getElementById('modalForm').classList.remove('hidden');
        };

        window.setTipo = (tipo) => {
            tipoAtivo = tipo;
            document.getElementById('btn-tipo-casal').classList.toggle('active', tipo === 'CASAL');
            document.getElementById('btn-tipo-solteiro').classList.toggle('active', tipo === 'SOLTEIRO');
            document.getElementById('campos-cliente').classList.remove('opacity-10', 'pointer-events-none');
            document.getElementById('btn-confirmar').disabled = false;
        };

        window.finalizarPedido = async () => {
            const n = document.getElementById('nome-cliente').value.trim().toUpperCase();
            const t = document.getElementById('tel-cliente').value.trim();
            if (!n || t.length < 14) return alert("Preencha todos os dados!");

            const btn = document.getElementById('btn-confirmar');
            btn.innerText = "GRAVANDO..."; btn.disabled = true;

            try {
                const docRef = await addDoc(collection(db, "lista_eventos"), {
                    nome: n, tel: t, evento: eventoAtivo.nome, tipo_entrada: tipoAtivo,
                    promoter: RASTREIO.promoter, data_reserva: new Date().toISOString(), 
                    entrou: false, pago: false
                });

                const linkPag = tipoAtivo === 'CASAL' ? eventoAtivo.link_pag_casal : eventoAtivo.link_pag_solteiro;
                const precoLista = tipoAtivo === 'CASAL' ? eventoAtivo.valor_casal : eventoAtivo.valor_solteiro;
                const precoPromo = tipoAtivo === 'CASAL' ? eventoAtivo.ant_casal : eventoAtivo.ant_solteiro;

                if (linkPag && precoPromo) {
                    document.getElementById('etapa-dados').classList.add('hidden');
                    document.getElementById('etapa-pagamento').classList.remove('hidden');
                    document.getElementById('preco-pix-promo').innerText = "R$ " + precoPromo;
                    document.getElementById('comparativo-preco').innerText = `Ao invés de R$ ${precoLista} na lista`;
                    
                    document.getElementById('btn-ir-pagamento').onclick = () => {
                        window.location.href = linkPag + "&external_reference=" + docRef.id;
                    };
                } else {
                    alert("Sucesso! Nome confirmado na lista.");
                    location.reload();
                }
            } catch (e) {
                alert("Erro ao salvar reserva.");
                btn.disabled = false;
                btn.innerText = "Confirmar Presença ✨";
            }
        };

        window.fecharModal = () => {
            document.getElementById('modalForm').classList.add('hidden');
            location.reload();
        };

        window.mask = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v;
            if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            i.value = v;
        };

        carregarPagina();
    </script>
</body>
</html>
