<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <title>E-CLUB | Reservas & Pix ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: #050508; 
            color: #fff; 
            min-height: 100vh; 
            background-image: radial-gradient(circle at top right, #1a1025 0%, #050508 100%); 
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-lista { background: #eab308; color: #000; font-weight: 900; transition: 0.3s; }
        .btn-pix-main { background: linear-gradient(135deg, #00bfa5 0%, #00d1b2 100%); color: #fff; font-weight: 900; box-shadow: 0 10px 25px rgba(0, 191, 165, 0.2); }
        .site-input { background: #0f0f15 !important; border: 1px solid #27273a !important; color: #fff !important; outline: none; }
        
        /* IMAGENS GRANDES E INTEIRAS */
        .banner-img { 
            width: 100%; 
            height: auto; 
            display: block;
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            opacity: 1;
        }
        
        .btn-sel { background: #13131c; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    
    <div class="max-w-md w-full">
        <header class="flex justify-center py-10">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-20">
        </header>

        <div id="listaEventos" class="space-y-12"></div>
    </div>

    <div id="modalForm" class="hidden fixed inset-0 z-[999] bg-black/95 backdrop-blur-xl flex items-center justify-center p-6 text-white">
        <div class="w-full max-w-sm bg-[#0d0d14] border border-white/10 p-10 rounded-[3.5rem] text-center shadow-2xl relative">
            <h2 id="modal-titulo" class="font-black uppercase italic mb-2 tracking-tighter text-xl text-yellow-500 text-center">Reserva E-Club</h2>
            <p id="modal-subtitulo" class="text-zinc-500 text-[10px] font-bold uppercase mb-8 tracking-widest italic text-center text-center">Escolha sua opção</p>

            <div id="etapa-tipo" class="grid grid-cols-1 gap-4 mb-8">
                <button onclick="selecionarTipo('CASAL')" class="btn-sel p-6 rounded-[2.5rem] flex items-center justify-between">
                    <div class="text-left">
                        <span class="text-[10px] font-black uppercase text-zinc-500 block">👫 Casal</span>
                        <span id="label-tipo-casal" class="text-[9px] font-bold text-zinc-400">---</span>
                    </div>
                    <span id="v-modal-casal" class="text-xl font-black italic">---</span>
                </button>
                <button onclick="selecionarTipo('SOLTEIRO')" class="btn-sel p-6 rounded-[2.5rem] flex items-center justify-between">
                    <div class="text-left">
                        <span class="text-[10px] font-black uppercase text-zinc-500 block">👤 Solteiro</span>
                        <span id="label-tipo-solteiro" class="text-[9px] font-bold text-zinc-400">---</span>
                    </div>
                    <span id="v-modal-solteiro" class="text-xl font-black italic">---</span>
                </button>
            </div>

            <div id="etapa-dados" class="hidden space-y-4">
                <input type="text" id="nome-cliente" placeholder="NOME COMPLETO" class="w-full site-input p-6 rounded-3xl font-bold text-xs uppercase text-white">
                <input type="tel" id="tel-cliente" oninput="mask(this)" placeholder="(41) 99999-9999" class="w-full site-input p-6 rounded-3xl font-bold text-xs text-white">
                <button onclick="processarFinalizacao()" id="btn-final-acao" class="w-full py-6 rounded-3xl uppercase text-xs font-black mt-4 shadow-xl">Confirmar</button>
            </div>
            <button onclick="fecharModal()" class="w-full text-zinc-600 uppercase text-[10px] font-black mt-6 tracking-widest italic">Voltar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let eventosCache = []; let eventoAtivo = null; let tipoAtivo = ''; let eFluxoPix = false;

        const formatarMoeda = (v) => v ? "R$ " + String(v).toUpperCase().replace("R$", "").trim() : "PORTARIA";

        async function carregarPagina() {
            // Busca apenas eventos marcados como ativos
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            
            // Lógica de Data: Pega o dia de hoje no fuso local (YYYY-MM-DD)
            const agora = new Date();
            const hojeStr = agora.toLocaleDateString('en-CA'); 

            // Filtra para mostrar apenas eventos de hoje ou do futuro
            eventosCache = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                .filter(ev => ev.data >= hojeStr) // Mantém o evento até 23:59 do dia dele
                .sort((a, b) => a.data.localeCompare(b.data)); // Ordena pela data mais próxima

            const container = document.getElementById('listaEventos');
            
            if (eventosCache.length === 0) {
                container.innerHTML = `<div class="p-20 text-center opacity-30 font-black text-xs italic uppercase tracking-widest">Nenhum evento disponível</div>`;
                return;
            }

            container.innerHTML = eventosCache.map(ev => `
                <div class="glass overflow-hidden rounded-[2.5rem] border-white/5 shadow-2xl">
                    ${ev.imagem ? `<img src="${ev.imagem}" class="banner-img">` : `<div class="h-40 bg-zinc-900 flex items-center justify-center text-zinc-700 font-black">E-CLUB</div>`}
                    <div class="p-8">
                        <h3 class="text-2xl font-black uppercase italic mb-6 text-white tracking-tighter">${ev.nome}</h3>
                        <div class="space-y-4">
                            <button onclick="iniciarFluxo('${ev.id}', false)" class="w-full btn-lista py-6 rounded-3xl text-sm italic font-black">📝 NOME NA LISTA</button>
                            <button onclick="iniciarFluxo('${ev.id}', true)" class="w-full btn-pix-main py-6 rounded-3xl text-sm italic font-black">⚡ PIX ANTECIPADO</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        window.iniciarFluxo = (id, isPix) => {
            eventoAtivo = eventosCache.find(e => e.id === id);
            eFluxoPix = isPix;
            document.getElementById('etapa-tipo').classList.remove('hidden');
            document.getElementById('etapa-dados').classList.add('hidden');
            const titulo = document.getElementById('modal-titulo');
            titulo.innerText = isPix ? "Pix Antecipado" : "Lista E-Club";
            titulo.className = isPix ? "text-[#00f5d4] font-black uppercase italic mb-2 tracking-tighter text-xl text-center" : "text-yellow-500 font-black uppercase italic mb-2 tracking-tighter text-xl text-center";

            document.getElementById('v-modal-casal').innerText = formatarMoeda(isPix ? eventoAtivo.ant_casal : eventoAtivo.valor_casal);
            document.getElementById('v-modal-solteiro').innerText = formatarMoeda(isPix ? eventoAtivo.ant_solteiro : eventoAtivo.valor_solteiro);
            document.getElementById('modalForm').classList.remove('hidden');
        };

        window.selecionarTipo = (tipo) => {
            tipoAtivo = tipo;
            document.getElementById('etapa-tipo').classList.add('hidden');
            document.getElementById('etapa-dados').classList.remove('hidden');
            const btn = document.getElementById('btn-final-acao');
            btn.innerText = eFluxoPix ? "Pagar com PIX ⚡" : "Confirmar Presença ✨";
            btn.className = eFluxoPix ? "w-full btn-pix-main py-6 rounded-3xl uppercase text-xs font-black mt-4" : "w-full btn-lista py-6 rounded-3xl uppercase text-xs font-black mt-4";
        };

        window.processarFinalizacao = async () => {
            const n = document.getElementById('nome-cliente').value.trim().toUpperCase();
            const t = document.getElementById('tel-cliente').value.trim();
            if (!n || t.length < 14) return alert("Preencha Nome e Telefone!");
            
            const btn = document.getElementById('btn-final-acao');
            btn.innerText = "PROCESSANDO..."; btn.disabled = true;

            try {
                const docRef = await addDoc(collection(db, "lista_eventos"), {
                    nome: n, tel: t, evento: eventoAtivo.nome, tipo_entrada: tipoAtivo,
                    promoter: "direto", data_reserva: new Date().toISOString(), entrou: false, pago: false
                });

                if (eFluxoPix) {
                    const linkPag = tipoAtivo === 'CASAL' ? eventoAtivo.link_pag_casal : eventoAtivo.link_pag_solteiro;
                    window.location.href = linkPag + "?external_reference=" + docRef.id;
                } else {
                    alert("Confirmado!"); location.reload();
                }
            } catch (e) { alert("Erro!"); btn.disabled = false; btn.innerText = "Tentar Novamente"; }
        };

        window.fecharModal = () => document.getElementById('modalForm').classList.add('hidden');
        window.mask = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v;
            if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            i.value = v;
        };
        carregarPagina();
    </script>
</body>
</html>
