<script type="module">
    // Função principal de reserva (Vinculada ao seu botão de confirmar)
    window.finalizarReserva = async function() {
        const btn = document.getElementById('btn-confirmar');
        
        // 1. Coleta os dados do formulário
        const nomeCliente = document.getElementById('input-nome')?.value.trim();
        const telefoneCliente = document.getElementById('input-tel')?.value.trim();
        const tipoSel = document.querySelector('input[name="tipo"]:checked');
        const pagSel = document.querySelector('input[name="pagamento"]:checked');

        // 2. Validação: impede o envio se faltar informação
        if (!nomeCliente || !telefoneCliente || !tipoSel || !pagSel) {
            alert("Por favor, preencha todos os campos antes de confirmar.");
            return;
        }

        const tipoIngresso = tipoSel.value;
        const metodoPagamento = pagSel.value;

        // Feedback visual: desativa o botão para evitar cliques duplos
        const textoOriginal = btn.innerText;
        btn.innerText = "PROCESSANDO...";
        btn.disabled = true;

        try {
            // 3. Salva a reserva no Firebase (Firestore)
            // Certifique-se que 'db', 'collection' e 'addDoc' estão disponíveis no seu código
            const docRef = await addDoc(collection(db, "lista_eventos"), {
                cliente: nomeCliente,
                telefone: telefoneCliente,
                evento: eventoAtivo.nome,
                data_evento: eventoAtivo.data,
                tipo: tipoIngresso,
                promoter: promoterNome.toUpperCase(),
                metodo: metodoPagamento,
                pago: false,
                data_reserva: new Date().toISOString()
            });

            // 4. Lógica específica para o PIX ANTECIPADO
            if (metodoPagamento === 'pix_antecipado') {
                
                // Busca o valor na Dashboard e formata (Ex: de "R$ 50,00" para 50.00)
                const valorRaw = tipoIngresso === 'CASAL' ? eventoAtivo.ant_casal : eventoAtivo.ant_solteiro;
                const valorLimpo = valorRaw.replace('R$', '').replace(/\s/g, '').replace(',', '.');

                // URL da sua Cloud Function (A "ponte" com o Mercado Pago)
                const URL_PROJETO = 'https://us-central1-teste-de-reserva.cloudfunctions.net/gerarPagamento';

                const response = await fetch(URL_PROJETO, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        valor: valorLimpo,
                        titulo: `RESERVA: ${eventoAtivo.nome} (${tipoIngresso})`,
                        reservaId: docRef.id
                    })
                });

                const data = await response.json();

                if (data.url) {
                    // Redireciona o cliente para o Checkout oficial do Mercado Pago
                    window.location.href = data.url;
                } else {
                    throw new Error("Não foi possível gerar o link de pagamento.");
                }

            } else {
                // 5. Fluxo para pagamento na Portaria
                alert("Reserva concluída com sucesso! Seu nome está na lista.");
                window.location.href = "sucesso_lista.html";
            }

        } catch (error) {
            console.error("Erro no processo:", error);
            alert("Ocorreu um erro ao processar sua reserva. Tente novamente.");
            btn.innerText = textoOriginal;
            btn.disabled = false;
        }
    };
</script>
