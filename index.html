<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclub - Official Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.96); }
        .tipo-btn-active { background-color: #eab308 !important; color: black !important; border-color: #eab308 !important; }
        .festa-card { background: #111113; border: 1px solid #27272a; border-radius: 2.5rem; overflow: hidden; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen p-4 flex flex-col">

    <div class="max-w-md mx-auto w-full flex-grow text-white">
        <header class="flex justify-center mb-10 py-8">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Eclub Logo" class="h-20 w-auto object-contain">
        </header>

        <div id="listaEventos" class="space-y-12"></div>
    </div>

    <div id="telaPix" class="hidden fixed inset-0 bg-black/98 z-50 flex flex-col items-center justify-center p-8 text-center overflow-y-auto">
        <h2 class="text-yellow-500 text-2xl font-black uppercase italic mb-6">Pagamento via Pix</h2>
        <div class="bg-white p-4 rounded-[2rem] mb-6">
            <img id="qrCodeImg" src="" class="w-64 h-64 mx-auto">
        </div>
        <textarea id="pixCopyPaste" readonly class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl text-[9px] text-zinc-300 mb-6 h-20 outline-none"></textarea>
        <button onclick="copiarPix()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase text-[10px] mb-4 btn-action">Copiar Código Pix</button>
        <button onclick="location.reload()" class="mt-8 text-zinc-600 text-[9px] font-black uppercase">Cancelar e Sair</button>
    </div>

    <div id="telaSucesso" class="hidden fixed inset-0 bg-black/98 z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-6 text-3xl">✓</div>
        <h2 class="text-2xl font-black uppercase italic mb-2">Confirmado!</h2>
        <p class="text-zinc-500 text-xs font-bold uppercase">Seu nome foi enviado para a lista.</p>
        <button onclick="location.reload()" class="w-full max-w-xs bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px] mt-10 btn-action">Voltar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function carregarAgenda() {
            const q = query(collection(db, "eventos"), where("ativo", "==", true));
            const snap = await getDocs(q);
            const container = document.getElementById('listaEventos');
            container.innerHTML = '';

            snap.forEach(doc => {
                const ev = doc.data();
                const card = document.createElement('div');
                card.className = "festa-card shadow-xl mb-10";
                card.innerHTML = `
                    <div class="relative h-64">
                        <img src="${ev.imagem}" class="w-full h-full object-cover">
                        <div class="absolute bottom-4 left-4"><h3 class="text-xl font-black uppercase italic">${ev.nome}</h3></div>
                    </div>
                    <div class="p-6 space-y-3">
                        <button onclick="abrirForm('${doc.id}', 'lista')" class="w-full bg-zinc-800 text-white font-black py-4 rounded-2xl uppercase text-[11px] btn-action border border-zinc-700">Nome na Lista</button>
                        <button onclick="abrirForm('${doc.id}', 'pix')" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase text-[11px] btn-action">Ingresso Antecipado (Pix)</button>
                        
                        <div id="box-${doc.id}" class="hidden space-y-6 pt-4 border-t border-zinc-800">
                            <p id="label-tipo-${doc.id}" class="text-[10px] font-black uppercase text-zinc-500 text-center"></p>
                            <div class="grid grid-cols-2 gap-3">
                                <button onclick="selecionarTipo('${doc.id}', 'casal')" id="btn-casal-${doc.id}" class="border-2 border-zinc-800 py-4 rounded-xl text-[11px] font-black uppercase">Casal</button>
                                <button onclick="selecionarTipo('${doc.id}', 'solteiro')" id="btn-solteiro-${doc.id}" class="border-2 border-zinc-800 py-4 rounded-xl text-[11px] font-black uppercase">Solteiro</button>
                            </div>

                            <div id="campos-${doc.id}" class="hidden space-y-3">
                                <div id="display-preco-${doc.id}" class="hidden bg-zinc-900 p-3 rounded-xl text-center text-yellow-500 font-black"></div>
                                <input type="text" id="nome-${doc.id}" placeholder="NOME COMPLETO" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm font-bold outline-none">
                                <input type="tel" id="tel-${doc.id}" placeholder="WHATSAPP" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm font-bold outline-none">
                                <input type="tel" id="cpf-${doc.id}" placeholder="CPF (SÓ NÚMEROS)" maxlength="11" class="hidden w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm font-bold outline-none">
                                <button onclick="finalizar('${doc.id}', '${ev.nome}')" id="btn-final-${doc.id}" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-[11px] mt-4"></button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.abrirForm = (id, modo) => {
            document.getElementById(`box-${id}`).classList.remove('hidden');
            document.getElementById(`campos-${id}`).classList.add('hidden');
            document.getElementById(`label-tipo-${id}`).innerText = modo === 'lista' ? 'Nome na Lista: Escolha o Tipo' : 'Ingresso Pix: Escolha o Tipo';
            window[`modo_${id}`] = modo;
        };

        window.selecionarTipo = (id, tipo) => {
            document.getElementById(`btn-casal-${id}`).classList.remove('tipo-btn-active');
            document.getElementById(`btn-solteiro-${id}`).classList.remove('tipo-btn-active');
            document.getElementById(`btn-${tipo}-${id}`).classList.add('tipo-btn-active');
            
            document.getElementById(`campos-${id}`).classList.remove('hidden');
            const modo = window[`modo_${id}`];
            const displayPreco = document.getElementById(`display-preco-${id}`);
            const campoCpf = document.getElementById(`cpf-${id}`);
            const btnFinal = document.getElementById(`btn-final-${id}`);

            window[`tipo_${id}`] = tipo;

            if (modo === 'pix') {
                const valor = tipo === 'casal' ? 50 : 100;
                displayPreco.innerText = `VALOR FIXO: R$ ${valor},00`;
                displayPreco.classList.remove('hidden');
                campoCpf.classList.remove('hidden');
                btnFinal.innerText = "GERAR PIX AGORA";
                window[`valor_${id}`] = valor;
            } else {
                displayPreco.classList.add('hidden');
                campoCpf.classList.add('hidden');
                btnFinal.innerText = "CONFIRMAR NA LISTA";
                window[`valor_${id}`] = 0;
            }
        };

        window.finalizar = async (id, nomeEvento) => {
            const modo = window[`modo_${id}`];
            const btn = document.getElementById(`btn-final-${id}`);
            const dados = {
                nome: document.getElementById(`nome-${id}`).value,
                tel: document.getElementById(`tel-${id}`).value,
                cpf: document.getElementById(`cpf-${id}`).value,
                tipo: window[`tipo_${id}`],
                valor: window[`valor_${id}`],
                evento: nomeEvento
            };

            if(!dados.nome) return alert("Preencha o nome");
            btn.disabled = true;

            if (modo === 'pix') {
                btn.innerText = "PROCESSANDO...";
                const response = await fetch("https://hook.us2.make.com/ge642pupzpqk7l4uoh4znggg228ynqqh", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(dados)
                });
                const res = await response.json();
                if(res.qr_code) {
                    document.getElementById('qrCodeImg').src = `data:image/png;base64,${res.qr_code_base64}`;
                    document.getElementById('pixCopyPaste').value = res.qr_code;
                    document.getElementById('telaPix').classList.remove('hidden');
                }
            } else {
                await addDoc(collection(db, "lista_eventos"), { ...dados, pago: false, data: new Date() });
                document.getElementById('telaSucesso').classList.remove('hidden');
            }
        };

        window.copiarPix = () => {
            const text = document.getElementById("pixCopyPaste");
            text.select();
            navigator.clipboard.writeText(text.value);
            alert("Pix Copiado!");
        };

        carregarAgenda();
    </script>
</body>
</html>
