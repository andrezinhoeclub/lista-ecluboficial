<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout E-Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-zinc-950 text-white flex items-center justify-center min-h-screen p-4">

    <div id="checkout-container" class="bg-zinc-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-zinc-800">
        <h1 class="text-2xl font-bold mb-6 text-center">Finalizar Pedido</h1>
        
        <form id="payment-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Nome Completo</label>
                <input type="text" id="nome" required class="w-full p-3 rounded bg-zinc-800 border border-zinc-700 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">CPF</label>
                <input type="text" id="cpf" required placeholder="000.000.000-00" class="w-full p-3 rounded bg-zinc-800 border border-zinc-700 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">E-mail</label>
                <input type="email" id="email" required class="w-full p-3 rounded bg-zinc-800 border border-zinc-700 focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit" id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200">
                Gerar PIX
            </button>
        </form>

        <div id="processing" class="hidden flex-col items-center space-y-4 py-8">
            <div class="loader"></div>
            <p class="text-lg animate-pulse">Processando seu pagamento...</p>
        </div>

        <div id="qr-container" class="hidden flex-col items-center space-y-6 py-4">
            <h2 class="text-xl font-semibold text-green-400">PIX Gerado com Sucesso!</h2>
            <div class="bg-white p-4 rounded-xl">
                <img id="qr-image" src="" alt="QR Code PIX" class="w-64 h-64">
            </div>
            <div class="w-full space-y-2">
                <p class="text-sm text-zinc-400 text-center">Copia e Cola:</p>
                <textarea id="qr-code-text" readonly class="w-full p-3 bg-zinc-800 border border-zinc-700 rounded text-xs break-all h-20 focus:outline-none"></textarea>
                <button onclick="copyPix()" class="w-full bg-zinc-700 hover:bg-zinc-600 text-white py-2 rounded font-medium">
                    Copiar Código
                </button>
            </div>
            <p class="text-xs text-zinc-500 text-center">O pagamento será confirmado automaticamente após a conclusão.</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('payment-form');
        const processing = document.getElementById('processing');
        const qrContainer = document.getElementById('qr-container');
        const btnSubmit = document.getElementById('btn-submit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Troca de telas
            form.classList.add('hidden');
            processing.classList.remove('hidden');

            const payload = {
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                email: document.getElementById('email').value,
                valor: 50.00 // Ajuste para o valor do seu ingresso
            };

            try {
                // URL do seu Webhook do Make
                const response = await fetch('https://hook.us1.make.com/sua_url_aqui', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Preenche os dados recebidos do Módulo 15 do Make
                    document.getElementById('qr-image').src = `data:image/png;base64,${data.qr_code_base64}`;
                    document.getElementById('qr-code-text').value = data.qr_code;

                    // Mostra o QR Code
                    processing.classList.add('hidden');
                    qrContainer.classList.remove('hidden');
                } else {
                    alert('Erro ao gerar PIX. Tente novamente.');
                    form.classList.remove('hidden');
                    processing.classList.add('hidden');
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro na conexão. Verifique o Make.');
                form.classList.remove('hidden');
                processing.classList.add('hidden');
            }
        });

        function copyPix() {
            const copyText = document.getElementById('qr-code-text');
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand('copy');
            alert('Código PIX copiado!');
        }
    </script>
</body>
</html>
