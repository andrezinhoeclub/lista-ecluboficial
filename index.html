<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclub - Official Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.95); }
        .fade-down { animation: fadeDown 0.3s ease-out; }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tipo-btn-active { background-color: white !important; color: black !important; border-color: white !important; }
        /* Suaviza a aparição dos campos */
        .input-group { transition: all 0.4s ease; opacity: 0; transform: translateY(-10px); display: none; }
        .input-group.show { opacity: 1; transform: translateY(0); display: block; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen p-4">

    <div class="max-w-md mx-auto">
        <header class="flex justify-center mb-10 py-8">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Eclub Logo" class="h-20 w-auto object-contain">
        </header>

        <div id="listaEventos" class="space-y-12">
            <div class="animate-pulse flex flex-col space-y-4">
                <div class="bg-zinc-900 h-80 rounded-[2.5rem]"></div>
                <div class="h-12 bg-zinc-900 rounded-2xl w-full"></div>
            </div>
        </div>

        <div id="telaSucesso" class="hidden fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-6 text-center">
            <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-6 shadow-lg shadow-green-500/20">
                <span class="text-4xl text-black font-bold">✓</span>
            </div>
            <h2 class="text-2xl font-black uppercase italic mb-2 text-white">Confirmado!</h2>
            <p class="text-zinc-400 text-sm mb-8 px-10">Seu nome foi enviado com sucesso para a portaria da Eclub.</p>
            <button onclick="fecharSucesso()" class="w-full max-w-xs bg-zinc-800 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest border border-zinc-700 text-white">Voltar para a Agenda</button>
        </div>

        <footer class="mt-20 text-center pb-12">
            <p class="text-[10px] text-zinc-700 uppercase font-black tracking-widest leading-relaxed">
                Eclub Curitiba • @eclubswingdance<br>
                Rua Des. Westphalen, 1871
            </p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const promoterRef = params.get('ref') || 'Direto';

        window.valoresEventos = {};

        async function carregarAgenda() {
            try {
                const q = query(collection(db, "eventos"), where("ativo", "==", true));
                const snap = await getDocs(q);
                const container = document.getElementById('listaEventos');
                container.innerHTML = '';

                const hoje = new Date();
                hoje.setHours(0, 0, 0, 0);

                let eventosFiltrados = [];
                snap.forEach(doc => {
                    const dataEv = doc.data();
                    const dataFesta = new Date(dataEv.data + 'T00:00:00');
                    if (dataFesta >= hoje) {
                        eventosFiltrados.push({ id: doc.id, ...dataEv, dataObj: dataFesta });
                    }
                });

                eventosFiltrados.sort((a, b) => a.dataObj - b.dataObj);

                eventosFiltrados.forEach(ev => {
                    const dataBR = ev.data.split('-').reverse().join('/');
                    window.valoresEventos[ev.id] = {
                        casal: ev.valor_casal || "Consultar portaria",
                        solteiro: ev.valor_solteiro || "Consultar portaria"
                    };

                    const card = document.createElement('div');
                    card.className = "flex flex-col mb-12 fade-down";
                    card.innerHTML = `
                        <div class="relative w-full h-80 rounded-[2.5rem] overflow-hidden border-2 border-zinc-800 shadow-2xl mb-4">
                            <img src="${ev.imagem}" class="w-full h-full object-cover" alt="${ev.nome}">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent"></div>
                            <div class="absolute bottom-6 left-6 pr-6">
                                <p class="text-[9px] text-yellow-500 font-black uppercase mb-1 tracking-widest">${dataBR} • ${ev.hora || '22:00'}</p>
                                <h3 class="text-2xl font-black uppercase italic leading-none text-white">${ev.nome}</h3>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 gap-2 px-1">
                            <button onclick="toggleForm('${ev.id}')" class="bg-yellow-500 hover:bg-yellow-600 text-black font-black py-4 rounded-2xl uppercase text-[11px] btn-action shadow-lg shadow-yellow-900/10">
                                Colocar Nome na Lista
                            </button>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="alert('Módulo de Camarotes em breve!')" class="bg-zinc-900 hover:bg-zinc-800 text-white font-black py-3.5 rounded-2xl uppercase text-[9px] border border-zinc-800 btn-action tracking-wider">Camarotes</button>
                                <button onclick="alert('Vendas em breve!')" class="bg-zinc-900 hover:bg-zinc-800 text-white font-black py-3.5 rounded-2xl uppercase text-[9px] border border-zinc-800 btn-action tracking-wider">Ingressos</button>
                            </div>
                        </div>

                        <div id="form-${ev.id}" class="hidden mt-4 p-6 bg-zinc-900 rounded-[2.5rem] border border-zinc-800 fade-down">
                            <h4 class="text-[10px] font-black uppercase text-zinc-500 mb-6 text-center tracking-[0.2em]">Selecione o seu Tipo</h4>
                            
                            <div class="grid grid-cols-2 gap-3 mb-6">
                                <button type="button" id="btn-casal-${ev.id}" onclick="selecionarTipo('${ev.id}', 'casal')" class="border border-zinc-700 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Casal</button>
                                <button type="button" id="btn-solteiro-${ev.id}" onclick="selecionarTipo('${ev.id}', 'solteiro')" class="border border-zinc-700 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Solteiro</button>
                            </div>

                            <div id="box-valor-${ev.id}" class="hidden mb-6 p-5 bg-black rounded-2xl border border-zinc-800 text-center fade-down">
                                <p class="text-[9px] text-zinc-500 uppercase font-black mb-2 tracking-widest">Valor com nome na lista</p>
                                <p id="valor-display-${ev.id}" class="text-sm font-bold text-yellow-500 uppercase leading-relaxed"></p>
                            </div>

                            <div id="campos-dados-${ev.id}" class="input-group">
                                <form onsubmit="enviarLista(event, '${ev.nome}', '${ev.id}')" class="space-y-3">
                                    <input type="hidden" id="tipo-${ev.id}" value="">
                                    <input type="text" placeholder="Seu Nome Completo" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm outline-none focus:border-yellow-500 font-bold text-white" required>
                                    <input type="tel" placeholder="Seu WhatsApp" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm outline-none focus:border-yellow-500 font-bold text-white" required>
                                    <button type="submit" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-[10px] tracking-widest mt-2 hover:bg-zinc-200 transition">Enviar Reserva</button>
                                </form>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Erro:", error);
            }
        }

        window.selecionarTipo = (id, tipo) => {
            document.getElementById(`btn-casal-${id}`).classList.remove('tipo-btn-active');
            document.getElementById(`btn-solteiro-${id}`).classList.remove('tipo-btn-active');
            document.getElementById(`btn-${tipo}-${id}`).classList.add('tipo-btn-active');

            const valorTexto = window.valoresEventos[id][tipo];

            document.getElementById(`tipo-${id}`).value = tipo;
            document.getElementById(`box-valor-${id}`).classList.remove('hidden');
            document.getElementById(`valor-display-${id}`).innerText = valorTexto;
            
            // MOSTRA OS CAMPOS DE NOME E TELEFONE
            document.getElementById(`campos-dados-${id}`).classList.add('show');
        }

        window.toggleForm = (id) => {
            const form = document.getElementById(`form-${id}`);
            const estaEscondido = form.classList.contains('hidden');
            document.querySelectorAll('[id^="form-"]').forEach(f => f.classList.add('hidden'));
            if(estaEscondido) {
                form.classList.remove('hidden');
                form.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        window.enviarLista = async (event, nomeEvento, formId) => {
            event.preventDefault();
            const tipoSelecionado = document.getElementById(`tipo-${formId}`).value;
            const inputs = event.target.querySelectorAll('input');
            const btn = event.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";
            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: inputs[1].value, 
                    telefone: inputs[2].value,
                    evento: nomeEvento,
                    tipo: tipoSelecionado,
                    promoter: promoterRef,
                    entrou: false,
                    data_cadastro: new Date()
                });
                document.getElementById('telaSucesso').classList.remove('hidden');
                document.getElementById(`form-${formId}`).classList.add('hidden');
                event.target.reset();
                // Oculta os campos novamente para a próxima vez
                document.getElementById(`campos-dados-${formId}`).classList.remove('show');
            } catch (e) {
                alert("Erro ao enviar.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar Reserva";
            }
        }

        window.fecharSucesso = () => {
            document.getElementById('telaSucesso').classList.add('hidden');
        }

        carregarAgenda();
    </script>
</body>
</html>
