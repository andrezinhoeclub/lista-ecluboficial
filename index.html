<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Reserva de Lista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #fff; 
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* AJUSTE PARA IMAGEM AMPLIADA E IMPACTANTE */
        .banner-container {
            width: 100%;
            max-width: 100%; /* Ocupa toda a largura do container pai */
            margin-bottom: 1.5rem;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover; /* Garante que preencha o espaço com qualidade */
        }

        .glass-card { 
            background: rgba(18, 18, 20, 0.8); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        input, select { 
            background: #0f0f10 !important; 
            border: 1px solid #27272a !important; 
            color: #fff !important; 
        }

        input:focus { 
            border-color: #eab308 !important; 
            outline: none; 
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.1);
        }

        /* Estilização do Scroll */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="w-full max-w-2xl mx-auto">
        
        <div class="banner-container">
            <img id="festa-banner" src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Banner Evento" class="banner-img">
        </div>

        <div class="glass-card p-8 md:p-10 rounded-[3rem] space-y-8">
            <div class="text-center">
                <h2 id="festa-nome" class="text-3xl font-black uppercase italic text-yellow-500 tracking-tighter leading-none">Carregando...</h2>
                <p id="festa-data" class="text-[11px] font-black text-zinc-500 uppercase tracking-[0.2em] mt-3">Verificando Agenda</p>
            </div>

            <form id="formReserva" class="space-y-5">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-zinc-500 ml-4 tracking-widest">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome..." class="w-full p-5 rounded-3xl font-bold text-sm" required>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-zinc-500 ml-4 tracking-widest">WhatsApp</label>
                        <input type="tel" id="tel" placeholder="(00) 00000-0000" class="w-full p-5 rounded-3xl font-bold text-sm" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase text-zinc-500 ml-4 tracking-widest">Seu Perfil</label>
                        <select id="tipo" class="w-full p-5 rounded-3xl font-bold text-sm appearance-none cursor-pointer">
                            <option value="casal">Casal</option>
                            <option value="solteiro">Solteiro</option>
                        </select>
                    </div>
                </div>

                <div id="info-valores" class="p-6 rounded-[2rem] bg-black/40 border border-zinc-800/50 flex flex-col items-center justify-center gap-2">
                    <p class="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-1">Valores com Nome na Lista:</p>
                    <div class="flex gap-6">
                        <div class="text-center">
                            <p class="text-[8px] font-black text-zinc-600 uppercase">Casal</p>
                            <p id="val-casal" class="text-sm font-black text-white">---</p>
                        </div>
                        <div class="w-px h-8 bg-zinc-800"></div>
                        <div class="text-center">
                            <p class="text-[8px] font-black text-zinc-600 uppercase">Solteiro</p>
                            <p id="val-solteiro" class="text-sm font-black text-white">---</p>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-yellow-500 text-black font-black py-6 rounded-[2rem] uppercase text-xs hover:bg-yellow-400 transition-all shadow-2xl active:scale-95">
                    Confirmar meu nome na lista
                </button>
            </form>
            
            <p class="text-[9px] text-center text-zinc-600 font-bold uppercase tracking-tighter">E-Club Oficial • Reserva Digital</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const promoterRef = urlParams.get('ref') || "Direto";

        async function carregarEvento() {
            const q = query(collection(db, "eventos"), where("ativo", "==", true));
            const snap = await getDocs(q);
            
            const eventos = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => new Date(a.data) - new Date(b.data));
            const ev = eventos[0];

            if(ev) {
                document.getElementById('festa-nome').innerText = ev.nome;
                document.getElementById('festa-data').innerText = ev.data.split('-').reverse().join('/');
                document.getElementById('val-casal').innerText = ev.valor_casal || "Consulte";
                document.getElementById('val-solteiro').innerText = ev.valor_solteiro || "Consulte";
                if(ev.imagem) document.getElementById('festa-banner').src = ev.imagem;
                
                window.eventoAtual = ev.nome;
            } else {
                document.getElementById('festa-nome').innerText = "Sem Eventos";
            }
        }

        carregarEvento();

        document.getElementById('formReserva').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dados = {
                nome: document.getElementById('nome').value.toUpperCase(),
                tel: document.getElementById('tel').value,
                tipo: document.getElementById('tipo').value,
                promoter: promoterRef,
                evento: window.eventoAtual,
                entrou: false,
                data_cadastro: new Date().toISOString()
            };

            try {
                await addDoc(collection(db, "lista_eventos"), dados);
                alert("Nome enviado com sucesso! Bom divertimento.");
                e.target.reset();
            } catch (err) { alert("Erro ao enviar. Tente novamente."); }
        });
    </script>
</body>
</html>
