<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista VIP - Eclub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-glow:active { transform: scale(0.95); }
        .glass { background: rgba(39, 39, 42, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-zinc-900 text-white font-sans min-h-screen p-4">

    <div class="max-w-md mx-auto">
        <header class="text-center mb-8 mt-4">
            <h1 class="text-4xl font-black text-yellow-500 uppercase italic leading-none tracking-tighter">Eclub</h1>
            <p class="text-[10px] tracking-[0.3em] text-zinc-500 uppercase font-bold mt-2">Booking Experience</p>
        </header>

        <div id="telaEventos" class="space-y-4">
            <h2 class="text-xs font-black text-zinc-400 uppercase tracking-widest ml-2 mb-4">Selecione o Evento</h2>
            <div id="gridEventos" class="grid gap-4">
                <p class="text-center text-zinc-600 animate-pulse">Carregando agenda...</p>
            </div>
        </div>

        <div id="telaCadastro" class="hidden animate-in fade-in duration-300">
            <button onclick="voltarParaEventos()" class="mb-6 flex items-center text-zinc-500 text-[10px] font-black uppercase tracking-widest hover:text-white transition">
                <span class="mr-2">←</span> Voltar para Eventos
            </button>

            <div class="bg-zinc-800 p-8 rounded-[2.5rem] border border-zinc-700 shadow-2xl">
                <h2 id="nomeEventoSelecionado" class="text-xl font-black text-yellow-500 uppercase italic mb-6 leading-tight"></h2>
                
                <form id="formReserva" class="space-y-4">
                    <input type="hidden" id="eventoInput">
                    
                    <div class="space-y-1">
                        <label class="text-[9px] uppercase font-black text-zinc-500 ml-2">Nome Completo</label>
                        <input type="text" id="nome" class="w-full bg-zinc-900 border border-zinc-700 p-4 rounded-2xl outline-none focus:border-yellow-500 font-bold transition" required>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[9px] uppercase font-black text-zinc-500 ml-2">WhatsApp</label>
                        <input type="tel" id="telefone" placeholder="(41) 99999-9999" class="w-full bg-zinc-900 border border-zinc-700 p-4 rounded-2xl outline-none focus:border-yellow-500 font-bold transition" required>
                    </div>

                    <button type="submit" id="btnEnviar" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black py-5 rounded-2xl uppercase transition btn-glow shadow-lg shadow-yellow-900/20 mt-4">
                        Confirmar Reserva
                    </button>
                </form>
            </div>
        </div>

        <div id="telaSucesso" class="hidden text-center py-10 animate-in zoom-in duration-300">
            <div class="w-20 h-20 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6 border border-green-500/30">
                <span class="text-4xl">✓</span>
            </div>
            <h2 class="text-2xl font-black uppercase italic mb-2">Reserva Confirmada!</h2>
            <p class="text-zinc-500 text-sm mb-8 px-6">Seu nome já foi enviado para a lista oficial da portaria.</p>
            <button onclick="novaReserva()" class="bg-zinc-800 border border-zinc-700 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-zinc-700 transition">
                Fazer outra reserva
            </button>
        </div>

        <footer class="mt-16 text-center pb-10">
            <p class="text-[9px] text-zinc-600 uppercase font-black tracking-widest">Eclub Curitiba • @eclubswingdance</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const promoterRef = params.get('ref') || 'Direto';

        async function carregarEventos() {
            const q = query(collection(db, "eventos"), where("ativo", "==", true));
            const snap = await getDocs(q);
            const grid = document.getElementById('gridEventos');
            grid.innerHTML = '';
            
            snap.forEach(doc => {
                const ev = doc.data();
                const card = document.createElement('div');
                card.className = "bg-zinc-800 p-5 rounded-3xl border border-zinc-700 flex justify-between items-center group cursor-pointer hover:border-yellow-500/50 transition shadow-xl";
                card.onclick = () => abrirCadastro(ev.nome);
                card.innerHTML = `
                    <div>
                        <p class="text-[9px] text-yellow-500 font-black uppercase tracking-tighter">${ev.data || ''}</p>
                        <h3 class="font-black uppercase italic text-lg leading-tight group-hover:text-yellow-500 transition">${ev.nome}</h3>
                    </div>
                    <span class="bg-zinc-900 p-3 rounded-2xl text-xs">→</span>
                `;
                grid.appendChild(card);
            });
        }

        window.abrirCadastro = (nome) => {
            document.getElementById('telaEventos').classList.add('hidden');
            document.getElementById('telaCadastro').classList.remove('hidden');
            document.getElementById('nomeEventoSelecionado').innerText = nome;
            document.getElementById('eventoInput').value = nome;
            window.scrollTo(0,0);
        }

        window.voltarParaEventos = () => {
            document.getElementById('telaCadastro').classList.add('hidden');
            document.getElementById('telaSucesso').classList.add('hidden');
            document.getElementById('telaEventos').classList.remove('hidden');
            document.getElementById('formReserva').reset();
        }

        window.novaReserva = () => {
            voltarParaEventos();
        }

        document.getElementById('formReserva').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";

            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: document.getElementById('nome').value,
                    telefone: document.getElementById('telefone').value,
                    evento: document.getElementById('eventoInput').value,
                    promoter: promoterRef,
                    entrou: false,
                    data_cadastro: new Date()
                });

                document.getElementById('telaCadastro').classList.add('hidden');
                document.getElementById('telaSucesso').classList.remove('hidden');
                document.getElementById('formReserva').reset();
            } catch (error) {
                alert("Erro ao salvar reserva. Tente novamente.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirmar Reserva";
            }
        });

        carregarEventos();
    </script>
</body>
</html>
