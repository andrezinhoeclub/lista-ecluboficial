<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista VIP - Eclub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-glow:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-zinc-900 text-white font-sans min-h-screen">

    <div class="max-w-md mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black text-yellow-500 uppercase italic leading-none">Eclub</h1>
            <p class="text-[10px] tracking-[0.2em] text-zinc-500 uppercase font-bold">Lista de Reservas</p>
        </header>

        <div id="statusEnvio" class="hidden mb-6 p-4 rounded-2xl border text-center animate-bounce">
            <p id="textoStatus" class="font-black uppercase text-sm"></p>
        </div>

        <form id="formReserva" class="space-y-4 bg-zinc-800 p-6 rounded-3xl border border-zinc-700 shadow-2xl">
            <div>
                <label class="text-[10px] uppercase font-black text-zinc-500 ml-2">Evento Selecionado</label>
                <select id="evento" class="w-full bg-zinc-900 border border-zinc-700 p-4 rounded-2xl outline-none focus:border-yellow-500 font-bold text-sm" required>
                    <option value="">Carregando eventos...</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="nome" placeholder="Seu Nome" class="bg-zinc-900 border border-zinc-700 p-4 rounded-2xl outline-none focus:border-yellow-500 text-sm" required>
                <input type="tel" id="telefone" placeholder="WhatsApp" class="bg-zinc-900 border border-zinc-700 p-4 rounded-2xl outline-none focus:border-yellow-500 text-sm" required>
            </div>

            <button type="submit" id="btnEnviar" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black py-5 rounded-2xl uppercase transition btn-glow shadow-lg shadow-yellow-900/20">
                Confirmar na Lista
            </button>
        </form>

        <footer class="mt-10 text-center">
            <p class="text-[9px] text-zinc-600 uppercase font-bold">Eclub Curitiba • @eclubswingdance</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // PEGAR PROMOTER PELA URL
        const params = new URLSearchParams(window.location.search);
        const promoterRef = params.get('ref') || 'Direto';

        // CARREGAR EVENTOS ATIVOS
        async function carregarEventos() {
            const q = query(collection(db, "eventos"), where("ativo", "==", true));
            const snap = await getDocs(q);
            const select = document.getElementById('evento');
            select.innerHTML = '<option value="">Escolha a Festa...</option>';
            snap.forEach(doc => {
                select.innerHTML += `<option value="${doc.data().nome}">${doc.data().nome}</option>`;
            });
        }
        carregarEventos();

        // ENVIAR RESERVA
        document.getElementById('formReserva').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            const statusDiv = document.getElementById('statusEnvio');
            const textoStatus = document.getElementById('textoStatus');

            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: document.getElementById('nome').value,
                    telefone: document.getElementById('telefone').value,
                    evento: document.getElementById('evento').value,
                    promoter: promoterRef,
                    entrou: false,
                    data_cadastro: new Date()
                });

                // SUCESSO
                statusDiv.className = "mb-6 p-4 rounded-2xl border border-green-500 bg-green-500/10 text-green-500 text-center animate-bounce";
                textoStatus.innerText = "✅ Sucesso! Seu nome está na lista.";
                statusDiv.classList.remove('hidden');

                // LIMPAR CAMPOS
                document.getElementById('formReserva').reset();
                
            } catch (error) {
                statusDiv.className = "mb-6 p-4 rounded-2xl border border-red-500 bg-red-500/10 text-red-500 text-center";
                textoStatus.innerText = "❌ Erro ao enviar. Tente novamente.";
                statusDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirmar na Lista";
                
                // ESCONDER MENSAGEM APÓS 5 SEGUNDOS
                setTimeout(() => { statusDiv.classList.add('hidden'); }, 5000);
            }
        });
    </script>
</body>
</html>
