<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista VIP - Eclub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-glow:active { transform: scale(0.95); }
        .transition-all { transition: all 0.3s ease; }
        /* Animação suave entre telas */
        .fade-in { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-zinc-900 text-white font-sans min-h-screen p-4 flex flex-col">

    <div class="max-w-md mx-auto w-full flex-grow">
        <header class="text-center mb-10 mt-6 fade-in">
            <h1 class="text-5xl font-black text-yellow-500 uppercase italic leading-none tracking-tighter">Eclub</h1>
            <p class="text-[10px] tracking-[0.3em] text-zinc-500 uppercase font-bold mt-2">Booking Experience</p>
        </header>

        <div id="telaEventos" class="space-y-6 fade-in">
            <h2 class="text-xs font-black text-zinc-400 uppercase tracking-widest ml-2 mb-4">Agenda da Semana</h2>
            <div id="gridEventos" class="grid gap-6">
                <div class="animate-pulse bg-zinc-800 rounded-3xl h-40 border border-zinc-700"></div>
            </div>
        </div>

        <div id="telaCadastro" class="hidden fade-in">
            <button onclick="voltarParaEventos()" class="mb-6 flex items-center text-zinc-500 text-[10px] font-black uppercase tracking-widest hover:text-white transition">
                <span class="mr-2 text-base">←</span> Voltar para a Agenda
            </button>

            <div id="bannerCadastro" class="w-full h-40 rounded-3xl bg-cover bg-center mb-6 border-2 border-zinc-700 shadow-xl"></div>

            <div class="bg-zinc-800 p-8 rounded-[2.5rem] border border-zinc-700 shadow-2xl">
                <h2 id="nomeEventoSelecionado" class="text-2xl font-black text-yellow-500 uppercase italic mb-2 leading-tight"></h2>
                <p id="infoPrecoSelecionado" class="text-xs text-zinc-400 mb-8 font-bold uppercase"></p>
                
                <form id="formReserva" class="space-y-5">
                    <input type="hidden" id="eventoInput">
                    
                    <div class="space-y-1.5">
                        <label class="text-[9px] uppercase font-black text-zinc-500 ml-3">Seu Nome Completo (para a portaria)</label>
                        <input type="text" id="nome" placeholder="Ex: João Silva" class="w-full bg-zinc-900 border border-zinc-700 p-5 rounded-2xl outline-none focus:border-yellow-500 font-bold text-sm transition" required>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[9px] uppercase font-black text-zinc-500 ml-3">Seu WhatsApp</label>
                        <input type="tel" id="telefone" placeholder="(41) 99999-9999" class="w-full bg-zinc-900 border border-zinc-700 p-5 rounded-2xl outline-none focus:border-yellow-500 font-bold text-sm transition" required>
                    </div>

                    <button type="submit" id="btnEnviar" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black py-5 rounded-2xl uppercase transition btn-glow shadow-lg shadow-yellow-900/20 mt-6 text-sm">
                        Confirmar na Lista VIP
                    </button>
                </form>
            </div>
        </div>

        <div id="telaSucesso" class="hidden text-center py-16 fade-in">
            <div class="w-24 h-24 bg-green-500/10 text-green-500 rounded-full flex items-center justify-center mx-auto mb-8 border-2 border-green-500/30 shadow-lg shadow-green-900/10 animate-pulse">
                <span class="text-5xl">✓</span>
            </div>
            <h2 class="text-3xl font-black uppercase italic mb-3 leading-none">Reserva Confirmada!</h2>
            <p class="text-zinc-500 text-sm mb-12 px-6 max-w-xs mx-auto">Seu nome já foi enviado para a portaria da Eclub. Apresente seu documento na entrada.</p>
            <button onclick="novaReserva()" class="bg-zinc-800 border-2 border-zinc-700 px-10 py-5 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-zinc-700 hover:border-zinc-600 transition shadow-xl">
                Voltar para a Agenda de Festas
            </button>
        </div>
    </div>

    <footer class="mt-20 text-center pb-8 border-t border-zinc-800 pt-8 w-full max-w-md mx-auto fade-in">
        <p class="text-[10px] text-zinc-600 uppercase font-black tracking-widest leading-relaxed">
            Eclub Curitiba • Swing & Dance Club<br>
            Rua Desembargador Westphalen, 1871<br>
            @eclubswingdance
        </p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // PEGAR PROMOTER
        const params = new URLSearchParams(window.location.search);
        const promoterRef = params.get('ref') || 'Direto';

        // CARREGAR EVENTOS (COM IMAGEM E PREÇO)
        async function carregarEventos() {
            const q = query(collection(db, "eventos"), where("ativo", "==", true));
            const snap = await getDocs(q);
            const grid = document.getElementById('gridEventos');
            grid.innerHTML = '';
            
            snap.forEach(doc => {
                const ev = doc.data();
                
                // Formatação básica de data (caso exista no banco)
                const dataFormatada = ev.data ? ev.data.split('-').reverse().join('/') : '';
                
                // Formatação básica de preço
                const precoCasal = ev.valor_casal ? `Casal R$${ev.valor_casal}` : '';
                const precoSolteiro = ev.valor_solteiro ? `Solteiro R$${ev.valor_solteiro}` : '';
                const precoTexto = [precoCasal, precoSolteiro].filter(Boolean).join(' | ');

                const card = document.createElement('div');
                card.className = "relative bg-zinc-800 rounded-3xl border border-zinc-700 overflow-hidden group cursor-pointer hover:border-yellow-500/50 transition-all shadow-2xl";
                
                // Se houver imagem, usa como fundo. Senão, usa um fundo escuro.
                if (ev.imagem) {
                    card.style.backgroundImage = `url(${ev.imagem})`;
                    card.style.backgroundSize = 'cover';
                    card.style.backgroundPosition = 'center';
                }

                card.onclick = () => abrirCadastro(ev.nome, ev.imagem, precoTexto);
                card.innerHTML = `
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/70 to-transparent group-hover:from-black/90 transition-all"></div>
                    
                    <div class="relative p-6 flex flex-col justify-end h-40">
                        <p class="text-[9px] text-yellow-500 font-black uppercase tracking-tighter">${dataFormatada} ${ev.hora || ''}</p>
                        <h3 class="font-black uppercase italic text-xl leading-tight text-white mb-1 group-hover:text-yellow-500 transition-all">${ev.nome}</h3>
                        <p class="text-[10px] text-zinc-400 font-bold uppercase tracking-wide">${precoTexto}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // FLUXO DE NAVEGAÇÃO
        window.abrirCadastro = (nome, imagem, preco) => {
            // Esconde lista, mostra formulário
            document.getElementById('telaEventos').classList.add('hidden');
            document.getElementById('telaCadastro').classList.remove('hidden');
            window.scrollTo(0,0);

            // Preenche dados do evento
            document.getElementById('nomeEventoSelecionado').innerText = nome;
            document.getElementById('eventoInput').value = nome;
            document.getElementById('infoPrecoSelecionado').innerText = preco;

            // Ajusta o banner no topo do formulário
            const banner = document.getElementById('bannerCadastro');
            if (imagem) {
                banner.style.backgroundImage = `url(${imagem})`;
                banner.classList.remove('hidden');
            } else {
                banner.classList.add('hidden'); // Esconde se não tiver imagem
            }
        }

        window.voltarParaEventos = () => {
            document.getElementById('telaCadastro').classList.add('hidden');
            document.getElementById('telaSucesso').classList.add('hidden');
            document.getElementById('telaEventos').classList.remove('hidden');
            // Limpa o formulário mas mantém a lista carregada
            document.getElementById('formReserva').reset();
        }

        window.novaReserva = () => {
            voltarParaEventos();
        }

        // ENVIO DO FORMULÁRIO
        document.getElementById('formReserva').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "PROCESSANDO SUA RESERVA...";

            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: document.getElementById('nome').value,
                    telefone: document.getElementById('telefone').value,
                    evento: document.getElementById('eventoInput').value,
                    promoter: promoterRef,
                    entrou: false,
                    data_cadastro: new Date()
                });

                // Mostra tela de sucesso e esconde formulário
                document.getElementById('telaCadastro').classList.add('hidden');
                document.getElementById('telaSucesso').classList.remove('hidden');
                window.scrollTo(0,0);
                
                // Limpa os dados do cadastro anterior
                document.getElementById('formReserva').reset();

            } catch (error) {
                alert("Ops! Ocorreu um erro ao salvar sua reserva. Por favor, tente novamente ou entre em contato com a casa.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirmar na Lista VIP";
            }
        });

        // Inicialização
        carregarEventos();
    </script>
</body>
</html>
