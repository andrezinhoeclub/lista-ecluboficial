<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista VIP - Eclub Swing Dance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .radio-btn.active { background-color: #eab308; color: black; border-color: #eab308; box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }
        .fade-in { animation: fadeIn 0.5s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-zinc-900 text-white font-sans flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-zinc-800 p-8 rounded-3xl shadow-2xl border border-zinc-700">
        
        <div class="flex justify-center mb-6">
            <img src="https://raw.githubusercontent.com/andrezinhoeclub/lista-ecluboficial/main/logo-erotic.png" 
                 alt="Eclub" 
                 class="h-20 w-auto object-contain drop-shadow-[0_0_10px_rgba(234,179,8,0.3)]"
                 onerror="this.src='https://i.imgur.com/8N6OqRE.png'">
        </div>

        <h1 class="text-xl font-bold text-center mb-2 text-yellow-500 uppercase tracking-widest">Lista VIP</h1>
        
        <p id="infoEvento" class="text-center text-sm text-zinc-400 mb-6 hidden"></p>
        
        <div id="bannerContainer" class="mb-6 hidden text-center">
            <img id="eventoBanner" src="" alt="Banner" class="w-full h-auto rounded-lg border border-zinc-600 shadow-lg mx-auto">
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs mb-1 text-zinc-500 uppercase font-bold tracking-tighter">1. Escolha o Evento</label>
                <select id="evento" class="w-full bg-zinc-700 border border-zinc-600 p-3 rounded-xl focus:outline-none focus:border-yellow-500 text-white">
                    <option value="">Carregando eventos...</option>
                </select>
            </div>
            
            <div id="sessaoTipo" class="hidden fade-in">
                <label class="block text-xs mb-2 text-zinc-500 uppercase font-bold tracking-tighter">2. Você é:</label>
                <div class="flex gap-2">
                    <button type="button" id="btnCasal" class="radio-btn flex-1 bg-zinc-700 border border-zinc-600 py-3 rounded-xl text-sm font-bold transition-all">👫 Casal</button>
                    <button type="button" id="btnSolteiro" class="radio-btn flex-1 bg-zinc-700 border border-zinc-600 py-3 rounded-xl text-sm font-bold transition-all">👤 Solteiro(a)</button>
                </div>
                <input type="hidden" id="tipoPublico" value="">
            </div>

            <div id="sessaoDados" class="hidden fade-in space-y-4 pt-2 border-t border-zinc-700/50">
                <div>
                    <label class="block text-xs mb-1 text-zinc-500 uppercase font-bold tracking-tighter">3. Seus Dados</label>
                    <input type="text" id="nome" placeholder="Nome Completo" class="w-full bg-zinc-700 border border-zinc-600 p-3 rounded-xl focus:outline-none focus:border-yellow-500 text-white mb-3">
                    <input type="tel" id="telefone" placeholder="WhatsApp (DDD + Número)" class="w-full bg-zinc-700 border border-zinc-600 p-3 rounded-xl focus:outline-none focus:border-yellow-500 text-white">
                </div>

                <div id="containerPreco" class="bg-yellow-500/10 border border-yellow-500/30 p-3 rounded-xl hidden">
                    <p class="text-[10px] text-yellow-500 uppercase font-bold mb-1 text-center">Valor para <span id="labelTipo"></span> na lista:</p>
                    <p id="textoPreco" class="text-xs text-zinc-200 font-medium text-center"></p>
                </div>

                <button id="btnEnviar" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-4 rounded-xl transition duration-300 shadow-lg uppercase tracking-wider">Confirmar Nome na Lista</button>
            </div>

            <p id="mensagem" class="text-center text-sm mt-4 hidden font-bold"></p>

            <div class="pt-6 mt-6 border-t border-zinc-700 text-center space-y-3">
                <div class="text-[11px] text-zinc-500 flex flex-col items-center gap-1">
                    <a href="https://www.google.com/maps/search/?api=1&query=R.+Aníbal+Goularte+Maia+Filho,+81+-+Bairro+Alto,+Curitiba+-+PR" 
                       target="_blank" 
                       class="flex items-center gap-1 text-zinc-400 hover:text-yellow-500 transition-colors text-center px-2 italic">
                       📍 <span>R. Aníbal Goularte Maia Filho, 81 - Bairro Alto</span>
                    </a>
                    
                    <p class="flex items-center gap-1 pt-1">
                        📞 <a href="https://wa.me/5541995040506" target="_blank" class="text-yellow-500 hover:underline font-bold"> (41) 99504-0506</a>
                    </p>
                </div>
                
                <div class="flex justify-center pt-2">
                    <a href="https://www.instagram.com/eclubswingdance/" target="_blank" class="text-zinc-400 hover:text-yellow-500 transition-colors flex items-center gap-2 text-[11px] uppercase font-bold">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                        Instagram
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let eventosCache = [];

        const selectEvento = document.getElementById('evento');
        const sessaoTipo = document.getElementById('sessaoTipo');
        const sessaoDados = document.getElementById('sessaoDados');

        async function carregarEventos() {
            try {
                const q = query(collection(db, "eventos"), where("ativo", "==", true));
                const snap = await getDocs(q);
                let brutos = [];
                const hoje = new Date().toISOString().split('T')[0];
                snap.forEach(doc => { if(doc.data().data >= hoje) brutos.push(doc.data()); });
                brutos.sort((a,b) => a.data.localeCompare(b.data));
                selectEvento.innerHTML = '<option value="">Selecione a festa...</option>';
                eventosCache = brutos;
                brutos.forEach(d => { 
                    selectEvento.innerHTML += `<option value="${d.nome}">${d.nome}</option>`;
                });
            } catch (e) { selectEvento.innerHTML = '<option value="">Erro ao carregar</option>'; }
        }

        selectEvento.addEventListener('change', () => {
            if(selectEvento.value !== "") {
                sessaoTipo.classList.remove('hidden');
                trocarBanner(selectEvento.value);
            } else {
                sessaoTipo.classList.add('hidden');
                sessaoDados.classList.add('hidden');
            }
        });

        function trocarBanner(nomeEvento) {
            const ev = eventosCache.find(e => e.nome === nomeEvento);
            if(ev) {
                if(ev.imagem) { 
                    document.getElementById('eventoBanner').src = ev.imagem; 
                    document.getElementById('bannerContainer').classList.remove('hidden'); 
                }
                if(ev.data) {
                    const [a,m,d] = ev.data.split('-');
                    document.getElementById('infoEvento').innerText = `📅 ${d}/${m}/${a} às ${ev.hora}h`;
                    document.getElementById('infoEvento').classList.remove('hidden');
                }
                if(document.getElementById('tipoPublico').value) exibirPrecoFiltrado(document.getElementById('tipoPublico').value);
            }
        }

        document.getElementById('btnCasal').onclick = () => selecionarTipo('Casal');
        document.getElementById('btnSolteiro').onclick = () => selecionarTipo('Solteiro');

        function selecionarTipo(tipo) {
            document.getElementById('tipoPublico').value = tipo;
            document.getElementById('btnCasal').classList.toggle('active', tipo === 'Casal');
            document.getElementById('btnSolteiro').classList.toggle('active', tipo === 'Solteiro');
            sessaoDados.classList.remove('hidden');
            exibirPrecoFiltrado(tipo);
        }

        function exibirPrecoFiltrado(tipo) {
            const ev = eventosCache.find(e => e.nome === selectEvento.value);
            if (ev) {
                const valor = tipo === 'Casal' ? ev.valor_casal : ev.valor_solteiro;
                if (valor) {
                    document.getElementById('labelTipo').innerText = tipo;
                    document.getElementById('textoPreco').innerText = valor;
                    document.getElementById('containerPreco').classList.remove('hidden');
                } else { document.getElementById('containerPreco').classList.add('hidden'); }
            }
        }

        document.getElementById('btnEnviar').onclick = async () => {
            const evento = selectEvento.value;
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const tipo = document.getElementById('tipoPublico').value;
            const btn = document.getElementById('btnEnviar');
            const msg = document.getElementById('mensagem');
            const promoter = new URLSearchParams(window.location.search).get('ref') || "Direto";

            if(!nome || !telefone) { alert("Preencha seu nome e celular!"); return; }
            btn.disabled = true; btn.innerText = "VERIFICANDO...";

            try {
                const q = query(collection(db, "lista_eventos"), where("evento", "==", evento));
                const snap = await getDocs(q);
                let existe = false;
                snap.forEach(d => { if(d.data().telefone === telefone) existe = true; });

                if (existe) {
                    msg.innerText = "⚠️ Você já está na lista!";
                    msg.className = "text-center text-sm mt-4 font-bold text-yellow-500";
                    msg.classList.remove('hidden');
                    btn.disabled = false; btn.innerText = "Confirmar Nome na Lista";
                    return;
                }

                await addDoc(collection(db, "lista_eventos"), { 
                    evento, nome, telefone, tipo, promoter, 
                    data_cadastro: new Date(), entrou: false 
                });

                msg.innerText = "✅ Sucesso! Nome na lista.";
                msg.className = "text-center text-sm mt-4 font-bold text-green-500";
                msg.classList.remove('hidden');
                document.getElementById('nome').value = ""; document.getElementById('telefone').value = "";
            } catch (e) { msg.innerText = "❌ Erro ao enviar."; msg.classList.remove('hidden'); }
            finally { btn.disabled = false; btn.innerText = "Confirmar Nome na Lista"; }
        };

        carregarEventos();
    </script>
</body>
</html>
