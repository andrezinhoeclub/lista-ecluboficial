<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclub - Official Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.96); }
        .fade-down { animation: fadeDown 0.3s ease-out; }
        @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .festa-card { background: #111113; border: 1px solid #27272a; border-radius: 2.5rem; overflow: hidden; }
        .banner-container { background-color: #000; position: relative; width: 100%; height: 320px; display: flex; align-items: center; justify-content: center; }
        .banner-img { object-fit: contain !important; width: 100%; height: 100%; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen p-4 flex flex-col">

    <div class="max-w-md mx-auto w-full flex-grow">
        <header class="flex justify-center mb-10 py-8">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Eclub Logo" class="h-20 w-auto object-contain">
        </header>

        <div id="listaEventos" class="space-y-12">
            <div class="animate-pulse text-center py-20 text-zinc-800 font-black uppercase text-[10px]">Carregando Agenda de Reservas...</div>
        </div>

        <footer class="mt-20 mb-12 border-t border-zinc-900 pt-10 text-center text-white">
            <div class="grid grid-cols-2 gap-3 w-full px-1 mb-6">
                <a href="https://wa.me/5541995040506" target="_blank" class="bg-zinc-900/50 border border-zinc-800 flex items-center justify-center p-5 rounded-2xl btn-action text-[10px] font-black uppercase tracking-widest">WhatsApp</a>
                <a href="https://www.instagram.com/eclubswingdance/" target="_blank" class="bg-zinc-900/50 border border-zinc-800 flex items-center justify-center p-5 rounded-2xl btn-action text-[10px] font-black uppercase tracking-widest">Instagram</a>
            </div>

            <a href="https://www.google.com/maps/dir/?api=1&destination=Eclub+Curitiba+Bairro+Alto" target="_blank" class="block border-2 border-yellow-500 p-8 rounded-[2.5rem] bg-black btn-action">
                <p class="text-[9px] text-yellow-500 font-black uppercase mb-2 tracking-widest">Clique para ver a localização</p>
                <p class="text-sm font-black italic text-white mb-1">Bairro Alto, Curitiba - PR</p>
                <p class="text-[10px] text-zinc-500 font-bold uppercase underline tracking-tighter">Abrir no Google Maps ou Waze</p>
            </a>
        </footer>
    </div>

    <div id="telaSucesso" class="hidden fixed inset-0 bg-black/98 z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-16 h-16 bg-yellow-500 rounded-full flex items-center justify-center mb-6 text-2xl shadow-lg text-black">✓</div>
        <h2 class="text-xl font-black uppercase italic mb-2 text-white">Solicitado!</h2>
        <p class="text-zinc-500 text-[10px] font-bold uppercase">Seu nome foi enviado para a lista oficial.</p>
        <button onclick="location.reload()" class="w-full max-w-xs bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px] mt-10 btn-action">Voltar à Agenda</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const promoterRef = params.get('ref') || 'Direto';

        async function carregarAgenda() {
            try {
                const q = query(collection(db, "eventos"), where("ativo", "==", true));
                const snap = await getDocs(q);
                const container = document.getElementById('listaEventos');
                container.innerHTML = '';
                const hoje = new Date().toLocaleDateString('en-CA');
                
                snap.forEach(doc => {
                    const ev = doc.data();
                    if (!ev.data || ev.data >= hoje) {
                        const card = document.createElement('div');
                        card.className = "festa-card fade-down mb-6";
                        card.innerHTML = `
                            <div class="banner-container"><img src="${ev.imagem}" class="banner-img"></div>
                            <div class="p-6 space-y-3 text-center">
                                <p class="text-[9px] text-yellow-500 font-black uppercase tracking-widest">${ev.data ? ev.data.split('-').reverse().join('/') : 'DATA A DEFINIR'}</p>
                                <h3 class="text-2xl font-black uppercase italic text-white leading-tight">${ev.nome}</h3>
                                
                                <div class="flex flex-col gap-2 mt-4">
                                    <button onclick="document.getElementById('form-${ev.id}').classList.toggle('hidden')" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase text-[11px] btn-action">Colocar nome na lista</button>
                                </div>

                                <div id="form-${ev.id}" class="hidden mt-6 space-y-3 pt-6 border-t border-zinc-800 text-left">
                                    <label class="text-[9px] font-black uppercase text-zinc-500 ml-1">Dados para Reserva</label>
                                    <input type="text" id="nome-${ev.id}" placeholder="NOME COMPLETO" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-white outline-none font-bold uppercase text-xs">
                                    <input type="tel" id="tel-${ev.id}" placeholder="WHATSAPP COM DDD" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-white outline-none font-bold text-xs">
                                    
                                    <select id="tipo-${ev.id}" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-white outline-none font-bold text-xs uppercase">
                                        <option value="casal">Casal</option>
                                        <option value="solteiro">Solteiro</option>
                                    </select>

                                    <button id="btn-submit-${ev.id}" onclick="processarEnvio('${ev.nome}', '${ev.id}')" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-[10px] tracking-widest btn-action">Confirmar na Lista</button>
                                </div>
                            </div>
                        `;
                        container.appendChild(card);
                    }
                });
            } catch (e) { console.error(e); }
        }

        window.processarEnvio = async (nomeEvento, id) => {
            const btn = document.getElementById(`btn-submit-${id}`);
            const nome = document.getElementById(`nome-${id}`).value;
            const tel = document.getElementById(`tel-${id}`).value;
            const tipo = document.getElementById(`tipo-${id}`).value;

            if (!nome || !tel) return alert("Preencha Nome e WhatsApp.");
            
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            try {
                await addDoc(collection(db, "lista_eventos"), { 
                    nome, 
                    tel, 
                    tipo, 
                    evento: nomeEvento, 
                    promoter: promoterRef, 
                    status: "Reserva",
                    data_cadastro: serverTimestamp() 
                });

                document.getElementById('telaSucesso').classList.remove('hidden');
                
            } catch (e) {
                alert("Erro ao enviar. Tente novamente.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirmar na Lista";
            }
        };

        carregarAgenda();
    </script>
</body>
</html>
