<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclub - Official Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.95); }
        .fade-down { animation: fadeDown 0.3s ease-out; }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tipo-btn-active { background-color: white !important; color: black !important; border-color: white !important; }
        .input-group { transition: all 0.4s ease; opacity: 0; transform: translateY(-10px); display: none; }
        .input-group.show { opacity: 1; transform: translateY(0); display: block; }
        
        /* AJUSTE PARA IMAGEM INTEIRA */
        .banner-container { 
            background-color: #09090b; /* Fundo escuro caso a imagem seja vertical */
        }
        .banner-img {
            object-fit: contain !important; /* FAZ A IMAGEM APARECER INTEIRA */
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen p-4 flex flex-col">

    <div class="max-w-md mx-auto w-full flex-grow">
        <header class="flex justify-center mb-10 py-8">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Eclub Logo" class="h-20 w-auto object-contain">
        </header>

        <div id="listaEventos" class="space-y-12">
            <div class="animate-pulse flex flex-col space-y-4">
                <div class="bg-zinc-900 h-80 rounded-[2.5rem]"></div>
                <div class="h-12 bg-zinc-900 rounded-2xl w-full"></div>
            </div>
        </div>

        <footer class="mt-20 mb-12 border-t border-zinc-900 pt-10 text-center">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 opacity-40 grayscale mx-auto mb-6">
            <div class="grid grid-cols-2 gap-3 w-full px-1 mb-6">
                <a href="https://wa.me/5541995040506" target="_blank" class="bg-zinc-900/50 border border-zinc-800 flex items-center justify-center p-5 rounded-2xl space-x-3">
                    <span class="flex h-2 w-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></span>
                    <span class="text-[10px] font-black uppercase tracking-widest">WhatsApp</span>
                </a>
                <a href="https://www.instagram.com/eclubswingdance/" target="_blank" class="bg-zinc-900/50 border border-zinc-800 flex items-center justify-center p-5 rounded-2xl space-x-3">
                    <span class="flex h-2 w-2 rounded-full bg-pink-500 shadow-[0_0_10px_#ec4899]"></span>
                    <span class="text-[10px] font-black uppercase tracking-widest">Instagram</span>
                </a>
            </div>
            <a href="https://maps.app.goo.gl/YourMapLink" target="_blank" class="block w-full px-1">
                <div class="border-2 border-yellow-500 p-8 rounded-[2.5rem] text-center">
                    <p class="text-[9px] text-yellow-500 font-black uppercase mb-2">Localização Oficial</p>
                    <p class="text-sm font-black italic text-white">Bairro Alto, Curitiba - PR</p>
                </div>
            </a>
        </footer>
    </div>

    <div id="telaSucesso" class="hidden fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-6 text-3xl">✓</div>
        <h2 class="text-2xl font-black uppercase italic mb-2">Confirmado!</h2>
        <p class="text-zinc-500 text-xs font-bold uppercase">Sua reserva foi enviada com sucesso.</p>
        <button onclick="fecharSucesso()" class="w-full max-w-xs bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px] mt-8">Voltar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const promoterRef = params.get('ref') || 'Direto';
        window.valoresEventos = {};

        async function carregarAgenda() {
            try {
                const q = query(collection(db, "eventos"), where("ativo", "==", true));
                const snap = await getDocs(q);
                const container = document.getElementById('listaEventos');
                container.innerHTML = '';

                const agora = new Date();
                let eventosFiltrados = [];

                snap.forEach(doc => {
                    const ev = doc.data();
                    const dataEvento = new Date(ev.data + 'T23:59:59');
                    if (dataEvento >= agora) {
                        eventosFiltrados.push({ id: doc.id, ...ev });
                    }
                });

                eventosFiltrados.sort((a, b) => new Date(a.data) - new Date(b.data));

                eventosFiltrados.forEach(ev => {
                    window.valoresEventos[ev.id] = { casal: ev.valor_casal, solteiro: ev.valor_solteiro };
                    
                    const dataFim = ev.data_encerramento ? new Date(ev.data_encerramento) : new Date(ev.data + 'T23:59:59');
                    const listaAberta = agora < dataFim;

                    const card = document.createElement('div');
                    card.className = "flex flex-col mb-12 fade-down";
                    card.innerHTML = `
                        <div class="banner-container relative w-full h-80 rounded-[2.5rem] overflow-hidden border-2 border-zinc-800 shadow-2xl mb-4 flex items-center justify-center">
                            <img src="${ev.imagem}" class="banner-img">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                            <div class="absolute bottom-6 left-6">
                                <p class="text-[9px] text-yellow-500 font-black uppercase mb-1 tracking-widest">${ev.data.split('-').reverse().join('/')}</p>
                                <h3 class="text-2xl font-black uppercase italic text-white leading-none">${ev.nome}</h3>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 gap-2 px-1">
                            ${listaAberta 
                                ? `<button onclick="toggleForm('${ev.id}')" class="bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase text-[11px] btn-action shadow-lg">Colocar nome na lista</button>`
                                : `<div class="bg-zinc-900 text-zinc-600 font-black py-4 rounded-2xl uppercase text-[10px] text-center border border-zinc-800">Lista Encerrada</div>`
                            }
                        </div>

                        <div id="form-${ev.id}" class="hidden mt-4 p-6 bg-zinc-900 rounded-[2.5rem] border border-zinc-800 fade-down text-center">
                            <h4 class="text-[10px] font-black uppercase text-zinc-500 mb-6 tracking-widest">Tipo de Reserva</h4>
                            <div class="grid grid-cols-2 gap-3 mb-6">
                                <button type="button" id="btn-casal-${ev.id}" onclick="selecionarTipo('${ev.id}', 'casal')" class="border border-zinc-700 py-3 rounded-xl text-[10px] font-black uppercase">Casal</button>
                                <button type="button" id="btn-solteiro-${ev.id}" onclick="selecionarTipo('${ev.id}', 'solteiro')" class="border border-zinc-700 py-3 rounded-xl text-[10px] font-black uppercase">Solteiro</button>
                            </div>
                            <div id="box-valor-${ev.id}" class="hidden mb-6 p-5 bg-black rounded-2xl border border-zinc-800">
                                <p id="valor-display-${ev.id}" class="text-xs font-bold text-yellow-500 uppercase"></p>
                            </div>
                            <div id="campos-dados-${ev.id}" class="input-group">
                                <form onsubmit="enviarLista(event, '${ev.nome}', '${ev.id}')" class="space-y-3">
                                    <input type="hidden" id="tipo-${ev.id}">
                                    <input type="text" placeholder="Nome Completo" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm font-bold text-white outline-none focus:border-yellow-500" required>
                                    <input type="tel" placeholder="WhatsApp" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm font-bold text-white outline-none focus:border-yellow-500" required>
                                    <button type="submit" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-[10px] tracking-widest">Confirmar Reserva</button>
                                </form>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) { console.error(error); }
        }

        window.selecionarTipo = (id, tipo) => {
            document.querySelectorAll(`#form-${id} button[type="button"]`).forEach(b => b.classList.remove('tipo-btn-active'));
            document.getElementById(`btn-${tipo}-${id}`).classList.add('tipo-btn-active');
            document.getElementById(`tipo-${id}`).value = tipo;
            document.getElementById(`box-valor-${id}`).classList.remove('hidden');
            document.getElementById(`valor-display-${id}`).innerText = window.valoresEventos[id][tipo];
            document.getElementById(`campos-dados-${id}`).classList.add('show');
        }

        window.toggleForm = (id) => {
            const form = document.getElementById(`form-${id}`);
            const estaEscondido = form.classList.contains('hidden');
            document.querySelectorAll('[id^="form-"]').forEach(f => f.classList.add('hidden'));
            if(estaEscondido) form.classList.remove('hidden');
        }

        window.enviarLista = async (event, nomeEvento, formId) => {
            event.preventDefault();
            const inputs = event.target.querySelectorAll('input');
            const btn = event.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";
            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: inputs[1].value, telefone: inputs[2].value,
                    evento: nomeEvento, tipo: document.getElementById(`tipo-${formId}`).value,
                    promoter: promoterRef, entrou: false, data_cadastro: new Date()
                });
                document.getElementById('telaSucesso').classList.remove('hidden');
                document.getElementById(`form-${formId}`).classList.add('hidden');
            } catch (e) { alert("Erro ao enviar."); } finally { btn.disabled = false; btn.innerText = "Confirmar Reserva"; }
        }

        window.fecharSucesso = () => { document.getElementById('telaSucesso').classList.add('hidden'); }
        carregarAgenda();
    </script>
</body>
</html>
