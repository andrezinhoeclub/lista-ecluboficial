<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista VIP - Eclub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .radio-btn.active { background-color: #eab308; color: black; border-color: #eab308; shadow: 0 0 15px rgba(234, 179, 8, 0.3); }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-zinc-900 text-white font-sans flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-zinc-800 p-8 rounded-2xl shadow-2xl border border-zinc-700">
        <h1 class="text-2xl font-bold text-center mb-2 text-yellow-500 uppercase tracking-widest">Lista VIP Eclub</h1>
        <p id="infoEvento" class="text-center text-sm text-zinc-400 mb-6 hidden"></p>
        
        <div id="bannerContainer" class="mb-6 hidden">
            <img id="eventoBanner" src="" alt="Banner" class="w-full h-auto rounded-lg border border-zinc-600 shadow-lg">
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs mb-1 text-zinc-500 uppercase font-bold tracking-tighter">1. Escolha o Evento</label>
                <select id="evento" onchange="liberarTipo()" class="w-full bg-zinc-700 border border-zinc-600 p-3 rounded-lg focus:outline-none focus:border-yellow-500 text-white">
                    <option value="">Carregando eventos...</option>
                </select>
            </div>
            
            <div id="containerPreco" class="bg-zinc-900/50 border border-zinc-700 p-3 rounded-lg hidden">
                <p id="textoPreco" class="text-xs text-zinc-300 italic text-center"></p>
            </div>

            <div id="sessaoTipo" class="hidden fade-in">
                <label class="block text-xs mb-2 text-zinc-500 uppercase font-bold tracking-tighter">2. Você é:</label>
                <div class="flex gap-2">
                    <button type="button" onclick="liberarForm('Casal')" id="btnCasal" class="radio-btn flex-1 bg-zinc-700 border border-zinc-600 py-3 rounded-lg text-sm font-bold transition-all">👫 Casal</button>
                    <button type="button" onclick="liberarForm('Solteiro')" id="btnSolteiro" class="radio-btn flex-1 bg-zinc-700 border border-zinc-600 py-3 rounded-lg text-sm font-bold transition-all">👤 Solteiro(a)</button>
                </div>
                <input type="hidden" id="tipoPublico" value="">
            </div>

            <div id="sessaoDados" class="hidden fade-in space-y-4 pt-2 border-t border-zinc-700/50">
                <div>
                    <label class="block text-xs mb-1 text-zinc-500 uppercase font-bold tracking-tighter">3. Seus Dados</label>
                    <input type="text" id="nome" placeholder="Nome Completo" class="w-full bg-zinc-700 border border-zinc-600 p-3 rounded-lg focus:outline-none focus:border-yellow-500 text-white mb-3">
                    <input type="tel" id="telefone" placeholder="WhatsApp (DDD + Número)" class="w-full bg-zinc-700 border border-zinc-600 p-3
