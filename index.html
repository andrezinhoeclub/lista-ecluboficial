<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclub - Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.95); }
        /* Animação suave para o formulário aparecer */
        .fade-down { animation: fadeDown 0.3s ease-out; }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen p-4">

    <div class="max-w-md mx-auto">
        <header class="text-center mb-10 py-6">
            <h1 class="text-5xl font-black text-yellow-500 uppercase italic tracking-tighter">Eclub</h1>
            <p class="text-[10px] tracking-[0.3em] text-zinc-500 uppercase font-black">Official Booking</p>
        </header>

        <div id="listaEventos" class="space-y-12">
            <div class="animate-pulse flex flex-col space-y-4">
                <div class="bg-zinc-900 h-80 rounded-[2.5rem]"></div>
                <div class="h-12 bg-zinc-900 rounded-2xl w-full"></div>
            </div>
        </div>

        <div id="telaSucesso" class="hidden fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-6 text-center">
            <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-6 shadow-lg shadow-green-500/20">
                <span class="text-4xl text-black font-bold">✓</span>
            </div>
            <h2 class="text-2xl font-black uppercase italic mb-2 text-white">Confirmado!</h2>
            <p class="text-zinc-400 text-sm mb-8">Seu nome foi enviado com sucesso para a portaria da Eclub.</p>
            <button onclick="fecharSucesso()" class="w-full max-w-xs bg-zinc-800 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest border border-zinc-700 text-white">Voltar para a Agenda</button>
        </div>

        <footer class="mt-20 text-center pb-12">
            <p class="text-[10px] text-zinc-700 uppercase font-black tracking-widest leading-relaxed">
                Eclub Curitiba • @eclubswingdance<br>
                Rua Des. Westphalen, 1871
            </p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const promoterRef = params.get('ref') || 'Direto';

        async function carregarAgenda() {
            try {
                // Consulta limpa para evitar travamento de índice no Firebase
                const q = query(collection(db, "eventos"), where("ativo", "==", true));
                const snap = await getDocs(q);
                const container = document.getElementById('listaEventos');
                container.innerHTML = '';

                if (snap.empty) {
                    container.innerHTML = '<p class="text-center text-zinc-600 uppercase font-bold text-xs mt-10">Nenhuma festa disponível no momento.</p>';
                    return;
                }

                snap.forEach(doc => {
                    const ev = doc.data();
                    const card = document.createElement('div');
                    card.className = "flex flex-col mb-12 fade-down";

                    card.innerHTML = `
                        <div class="relative w-full h-80 rounded-[2.5rem] overflow-hidden border-2 border-zinc-800 shadow-2xl mb-4">
                            <img src="${ev.imagem}" class="w-full h-full object-cover" alt="${ev.nome}" onerror="this.src='https://via.placeholder.com/400x600?text=Eclub'">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent"></div>
                            <div class="absolute bottom-6 left-6 pr-6">
                                <p class="text-[9px] text-yellow-500 font-black uppercase mb-1 tracking-widest">${ev.data || ''} • ${ev.hora || '22:00'}</p>
                                <h3 class="text-2xl font-black uppercase italic leading-none text-white">${ev.nome}</h3>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 gap-2 px-1">
                            <button onclick="toggleForm('${doc.id}')" class="bg-yellow-500 hover:bg-yellow-600 text-black font-black py-4 rounded-2xl uppercase text-[11px] btn-action shadow-lg shadow-yellow-900/10">
                                Colocar Nome na Lista
                            </button>
                            
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="alert('Módulo de Camarotes em breve!')" class="bg-zinc-900 hover:bg-zinc-800 text-white font-black py-3.5 rounded-2xl uppercase text-[9px] border border-zinc-800 btn-action tracking-wider">
                                    Camarotes
                                </button>
                                <button onclick="alert('Vendas em breve!')" class="bg-zinc-900 hover:bg-zinc-800 text-white font-black py-3.5 rounded-2xl uppercase text-[9px] border border-zinc-800 btn-action tracking-wider">
                                    Ingressos
                                </button>
                            </div>
                        </div>

                        <div id="form-${doc.id}" class="hidden mt-4 p-6 bg-zinc-900 rounded-[2rem] border border-zinc-800 fade-down">
                            <h4 class="text-[10px] font-black uppercase text-zinc-500 mb-5 text-center tracking-[0.2em]">Cadastro de Lista VIP</h4>
                            <form onsubmit="enviarLista(event, '${ev.nome}', '${doc.id}')" class="space-y-3">
                                <input type="text" placeholder="Seu Nome Completo" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm outline-none focus:border-yellow-500 font-bold text-white" required>
                                <input type="tel" placeholder="Seu WhatsApp" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm outline-none focus:border-yellow-500 font-bold text-white" required>
                                <button type="submit" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-[10px] tracking-widest mt-2 hover:bg-zinc-200 transition">Enviar Reserva</button>
                            </form>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Erro:", error);
                document.getElementById('listaEventos').innerHTML = '<p class="text-center text-red-500 font-bold uppercase text-[10px]">Erro ao conectar com o servidor.</p>';
            }
        }

        window.toggleForm = (id) => {
            const form = document.getElementById(`form-${id}`);
            const estaEscondido = form.classList.contains('hidden');
            
            // Fecha todos os outros formulários para não poluir a tela
            document.querySelectorAll('[id^="form-"]').forEach(f => f.classList.add('hidden'));
            
            if(estaEscondido) {
                form.classList.remove('hidden');
                form.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        window.enviarLista = async (event, nomeEvento, formId) => {
            event.preventDefault();
            const inputs = event.target.querySelectorAll('input');
            const btn = event.target.querySelector('button');
            
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: inputs[0].value,
                    telefone: inputs[1].value,
                    evento: nomeEvento,
                    promoter: promoterRef,
                    entrou: false,
                    data_cadastro: new Date()
                });

                document.getElementById('telaSucesso').classList.remove('hidden');
                document.getElementById(`form-${formId}`).classList.add('hidden');
                event.target.reset();
            } catch (e) {
                alert("Erro ao enviar. Tente novamente.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar Reserva";
            }
        }

        window.fecharSucesso = () => {
            document.getElementById('telaSucesso').classList.add('hidden');
        }

        carregarAgenda();
    </script>
</body>
</html>
