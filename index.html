<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclub - Official Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.96); }
        .fade-down { animation: fadeDown 0.3s ease-out; }
        @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .festa-card { background: #111113; border: 1px solid #27272a; border-radius: 2.5rem; overflow: hidden; }
        .banner-container { background-color: #000; position: relative; width: 100%; height: 320px; display: flex; align-items: center; justify-content: center; }
        .banner-img { object-fit: contain !important; width: 100%; height: 100%; }
        
        .btn-whatsapp { background: #25D366; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .btn-instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); box-shadow: 0 4px 15px rgba(220, 39, 67, 0.3); }
        
        .option-card { background: #000; border: 1px solid #27272a; transition: all 0.3s ease; }
        .option-card.active { border-color: #eab308; background: #131316; box-shadow: inset 0 0 10px rgba(234, 179, 8, 0.1); }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen p-4 flex flex-col">

    <div class="max-w-md mx-auto w-full flex-grow">
        <header class="flex justify-center mb-10 py-8">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Eclub Logo" class="h-20 w-auto object-contain">
        </header>

        <div id="listaEventos" class="space-y-12">
            <div class="animate-pulse text-center py-20 text-zinc-800 font-black uppercase text-[10px]">Carregando Agenda de Reservas...</div>
        </div>

        <footer class="mt-20 mb-12 border-t border-zinc-900 pt-10 text-center text-white">
            <div class="grid grid-cols-2 gap-4 w-full px-1 mb-8">
                <a href="https://wa.me/5541995040506" target="_blank" class="btn-whatsapp flex items-center justify-center p-5 rounded-2xl btn-action text-[11px] font-black uppercase tracking-widest text-black">WhatsApp</a>
                <a href="https://www.instagram.com/eclubswingdance/" target="_blank" class="btn-instagram flex items-center justify-center p-5 rounded-2xl btn-action text-[11px] font-black uppercase tracking-widest text-white">Instagram</a>
            </div>

            <a href="https://www.google.com/maps/dir/?api=1&destination=Eclub+Curitiba" target="_blank" class="block border-2 border-yellow-500 p-8 rounded-[2.5rem] bg-black btn-action">
                <p class="text-[9px] text-yellow-500 font-black uppercase mb-2 tracking-widest">Clique para ver a localização</p>
                <p class="text-sm font-black italic text-white mb-1">Bairro Alto, Curitiba - PR</p>
                <p class="text-[10px] text-zinc-500 font-bold uppercase underline tracking-tighter">Abrir no Google Maps ou Waze</p>
            </a>
        </footer>
    </div>

    <div id="telaSucesso" class="hidden fixed inset-0 bg-black/98 z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-6 text-4xl shadow-lg text-white">✓</div>
        <h2 class="text-2xl font-black uppercase italic mb-2 text-white">Sucesso!</h2>
        <p class="text-zinc-400 text-xs font-bold uppercase px-4 leading-relaxed">Sua reserva foi confirmada na lista da Eclub. Te esperamos!</p>
        <button onclick="location.reload()" class="w-full max-w-xs bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px] mt-10 btn-action shadow-xl">Voltar à Agenda</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const promoterRef = params.get('ref') || 'Direto';

        async function carregarAgenda() {
            try {
                const q = query(collection(db, "eventos"), where("ativo", "==", true));
                const snap = await getDocs(q);
                const container = document.getElementById('listaEventos');
                container.innerHTML = '';
                const hoje = new Date().toLocaleDateString('en-CA');
                
                snap.forEach(doc => {
                    const ev = doc.data();
                    if (!ev.data || ev.data >= hoje) {
                        const card = document.createElement('div');
                        card.className = "festa-card fade-down mb-6";
                        
                        const valorC = ev.valor_casal ? `R$ ${ev.valor_casal}` : 'Consulte';
                        const valorS = ev.valor_solteiro ? `R$ ${ev.valor_solteiro}` : 'Consulte';

                        card.innerHTML = `
                            <div class="banner-container"><img src="${ev.imagem}" class="banner-img"></div>
                            <div class="p-6 space-y-3 text-center">
                                <p class="text-[9px] text-yellow-500 font-black uppercase tracking-widest">${ev.data ? ev.data.split('-').reverse().join('/') : 'DATA A DEFINIR'}</p>
                                <h3 class="text-2xl font-black uppercase italic text-white leading-tight">${ev.nome}</h3>
                                
                                <button id="btn-abrir-${doc.id}" onclick="document.getElementById('step-1-${doc.id}').classList.remove('hidden'); this.classList.add('hidden')" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase text-[11px] btn-action mt-4">Colocar nome na lista</button>

                                <div id="step-1-${doc.id}" class="hidden pt-6 border-t border-zinc-800 mt-4 space-y-6">
                                    <p class="text-[10px] font-black uppercase text-zinc-500 tracking-widest">Escolha seu perfil:</p>
                                    <div class="grid grid-cols-2 gap-3">
                                        <button onclick="selecionarTipo('${doc.id}', 'casal')" class="option-card p-5 rounded-2xl text-center btn-action" id="opt-casal-${doc.id}">
                                            <span class="block text-sm font-black uppercase text-white mb-1">Casal</span>
                                            <span class="block text-[10px] font-bold text-zinc-500 uppercase tracking-tighter">${valorC}</span>
                                        </button>
                                        <button onclick="selecionarTipo('${doc.id}', 'solteiro')" class="option-card p-5 rounded-2xl text-center btn-action" id="opt-solteiro-${doc.id}">
                                            <span class="block text-sm font-black uppercase text-white mb-1">Solteiro</span>
                                            <span class="block text-[10px] font-bold text-zinc-500 uppercase tracking-tighter">${valorS}</span>
                                        </button>
                                    </div>

                                    <div id="step-2-${doc.id}" class="hidden space-y-3 pt-2 text-left animate-fade-in">
                                        <div class="h-px bg-zinc-900 w-full my-4"></div>
                                        <label class="text-[9px] font-black uppercase text-yellow-500 ml-1">Preencha seus dados:</label>
                                        <input type="text" id="nome-${doc.id}" placeholder="NOME COMPLETO" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-white outline-none font-bold uppercase text-xs">
                                        <input type="tel" id="tel-${doc.id}" placeholder="WHATSAPP (DDD + NÚMERO)" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-white outline-none font-bold text-xs">
                                        <button id="btn-submit-${doc.id}" onclick="processarEnvio('${ev.nome}', '${doc.id}')" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-[10px] tracking-widest btn-action mt-2 shadow-lg">Confirmar Reserva</button>
                                    </div>
                                </div>
                            </div>
                        `;
                        container.appendChild(card);
                    }
                });
            } catch (e) { console.error(e); }
        }

        window.selecionarTipo = (id, tipo) => {
            document.getElementById(`opt-casal-${id}`).classList.remove('active');
            document.getElementById(`opt-solteiro-${id}`).classList.remove('active');
            document.getElementById(`opt-${tipo}-${id}`).classList.add('active');
            
            const step2 = document.getElementById(`step-2-${id}`);
            step2.classList.remove('hidden');
            step2.setAttribute('data-tipo-selecionado', tipo);
            
            // Centraliza o formulário na tela
            setTimeout(() => {
                step2.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        };

        window.processarEnvio = async (nomeEvento, id) => {
            const step2 = document.getElementById(`step-2-${id}`);
            const btn = document.getElementById(`btn-submit-${id}`);
            const nome = document.getElementById(`nome-${id}`).value;
            const tel = document.getElementById(`tel-${id}`).value;
            const tipo = step2.getAttribute('data-tipo-selecionado');

            if (!nome || !tel) return alert("Por favor, preencha todos os campos.");
            
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            try {
                await addDoc(collection(db, "lista_eventos"), { 
                    nome, tel, tipo, evento: nomeEvento, promoter: promoterRef, status: "Lista", data_cadastro: serverTimestamp() 
                });
                document.getElementById('telaSucesso').classList.remove('hidden');
            } catch (e) {
                alert("Erro ao enviar. Tente novamente.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirmar Reserva";
            }
        };

        carregarAgenda();
    </script>
</body>
</html>
