<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista VIP - Eclub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .radio-btn.active { background-color: #eab308; color: black; border-color: #eab308; box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #conteudoPrincipal { display: none; }
    </style>
</head>
<body class="bg-zinc-900 text-white font-sans flex items-center justify-center min-h-screen p-4">

    <div id="telaCarregando" class="text-center">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-yellow-500 mx-auto mb-4"></div>
        <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest text-white">Validando...</p>
    </div>

    <div id="telaErro" class="hidden text-center p-10 bg-zinc-800 rounded-3xl border border-red-900/50 shadow-2xl max-w-sm fade-in">
        <div class="text-red-500 text-5xl mb-4">⚠️</div>
        <h2 class="text-red-500 font-black text-xl mb-2 uppercase italic">Link Inválido</h2>
        <p class="text-zinc-400 text-xs leading-relaxed">Solicite um link oficial com sua promoter.</p>
    </div>

    <div id="conteudoPrincipal" class="w-full max-w-md bg-zinc-800 p-8 rounded-3xl shadow-2xl border border-zinc-700 fade-in">
        
        <div class="flex justify-center mb-6">
            <img src="https://raw.githubusercontent.com/andrezinhoeclub/lista-ecluboficial/main/logo-erotic.png" class="h-16 object-contain">
        </div>

        <div id="containerBanner" class="mb-6 hidden">
            <img id="imgBanner" src="" class="w-full h-auto rounded-2xl border border-zinc-600 shadow-lg object-cover max-h-64">
        </div>

        <h1 class="text-xl font-black text-center mb-2 text-yellow-500 uppercase tracking-widest italic">Lista VIP</h1>
        <p id="infoEvento" class="text-center text-[11px] text-zinc-400 mb-6 bg-zinc-900/80 py-3 rounded-xl border border-zinc-700/50 hidden font-bold"></p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-[10px] mb-1 text-zinc-500 uppercase font-black ml-1">1. Escolha a Festa</label>
                <select id="evento" class="w-full bg-zinc-700 border border-zinc-600 p-4 rounded-2xl text-white outline-none focus:border-yellow-500 text-sm font-bold">
                    <option value="">Carregando...</option>
                </select>
            </div>
            
            <div id="sessaoTipo" class="hidden fade-in">
                <label class="block text-[10px] mb-2 text-zinc-500 uppercase font-black ml-1">2. Perfil</label>
                <div class="flex gap-2">
                    <button type="button" id="btnCasal" class="radio-btn flex-1 bg-zinc-700 border border-zinc-600 py-4 rounded-2xl text-xs font-black transition-all uppercase italic">👫 Casal</button>
                    <button type="button" id="btnSolteiro" class="radio-btn flex-1 bg-zinc-700 border border-zinc-600 py-4 rounded-2xl text-xs font-black transition-all uppercase italic">👤 Solteiro</button>
                </div>
                <input type="hidden" id="tipoPublico" value="">
            </div>

            <div id="sessaoDados" class="hidden fade-in space-y-4 pt-2">
                <div id="containerPreco" class="bg-yellow-500/10 border border-yellow-500/30 p-4 rounded-2xl hidden text-center">
                    <p id="textoPreco" class="text-xs text-yellow-500 font-black uppercase tracking-tighter"></p>
                </div>

                <div>
                    <label class="block text-[10px] mb-1 text-zinc-500 uppercase font-black ml-1">3. Identificação</label>
                    <input type="text" id="nome" placeholder="Nome Completo" class="w-full bg-zinc-700 border border-zinc-600 p-4 rounded-2xl mb-3 text-sm outline-none focus:border-yellow-500 font-bold">
                    <input type="tel" id="telefone" placeholder="WhatsApp com DDD" class="w-full bg-zinc-700 border border-zinc-600 p-4 rounded-2xl text-sm outline-none focus:border-yellow-500 font-bold">
                </div>

                <button id="btnEnviar" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black py-5 rounded-2xl transition shadow-lg uppercase text-sm tracking-widest italic">Confirmar na Lista</button>
            </div>

            <p id="mensagem" class="text-center text-sm mt-4 hidden font-black italic"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, query, where, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let eventosCache = [];

        async function validarEIniciar() {
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');

            if (!ref) { mostrarErro(); return; }

            try {
                const promoterRef = doc(db, "promoters", ref.toLowerCase());
                const promoterSnap = await getDoc(promoterRef);

                if (promoterSnap.exists()) {
                    document.getElementById('telaCarregando').style.display = 'none';
                    document.getElementById('conteudoPrincipal').style.display = 'block';
                    carregarEventos();
                } else { mostrarErro(); }
            } catch (error) { mostrarErro(); }
        }

        function mostrarErro() {
            document.getElementById('telaCarregando').style.display = 'none';
            document.getElementById('telaErro').classList.remove('hidden');
        }

        async function carregarEventos() {
            const selectEvento = document.getElementById('evento');
            try {
                const q = query(collection(db, "eventos"), where("ativo", "==", true));
                const snap = await getDocs(q);
                let brutos = [];
                const hoje = new Date(); hoje.setHours(0,0,0,0);

                snap.forEach(doc => { 
                    const d = doc.data();
                    const dataEvento = new Date(d.data + "T00:00:00");
                    if(dataEvento >= hoje) brutos.push(d); 
                });

                brutos.sort((a,b) => a.data.localeCompare(b.data));
                selectEvento.innerHTML = '<option value="">Selecione...</option>';
                eventosCache = brutos;
                brutos.forEach(d => { 
                    selectEvento.innerHTML += `<option value="${d.nome}">${d.nome}</option>`;
                });
            } catch (e) { selectEvento.innerHTML = '<option value="">Erro ao carregar</option>'; }
        }

        document.getElementById('evento').addEventListener('change', (e) => {
            const nomeEvento = e.target.value;
            if(nomeEvento) {
                document.getElementById('sessaoTipo').classList.remove('hidden');
                const ev = eventosCache.find(ev => ev.nome === nomeEvento);
                if(ev) {
                    // MOSTRAR BANNER
                    const banner = document.getElementById('imgBanner');
                    const container = document.getElementById('containerBanner');
                    if(ev.imagem && ev.imagem.trim() !== "") {
                        banner.src = ev.imagem;
                        container.classList.remove('hidden');
                    } else {
                        container.classList.add('hidden');
                    }

                    // MOSTRAR DATA
                    const [a,m,d] = ev.data.split('-');
                    document.getElementById('infoEvento').innerText = `FESTA: ${d}/${m}/${a} às ${ev.hora || '22:00'}h`;
                    document.getElementById('infoEvento').classList.remove('hidden');
                }
            } else {
                document.getElementById('containerBanner').classList.add('hidden');
                document.getElementById('sessaoTipo').classList.add('hidden');
                document.getElementById('sessaoDados').classList.add('hidden');
            }
        });

        document.getElementById('btnCasal').onclick = () => selecionarPerfil('Casal');
        document.getElementById('btnSolteiro').onclick = () => selecionarPerfil('Solteiro');

        function selecionarPerfil(tipo) {
            document.getElementById('tipoPublico').value = tipo;
            document.getElementById('btnCasal').classList.toggle('active', tipo === 'Casal');
            document.getElementById('btnSolteiro').classList.toggle('active', tipo === 'Solteiro');
            document.getElementById('sessaoDados').classList.remove('hidden');
            
            const ev = eventosCache.find(e => e.nome === document.getElementById('evento').value);
            if(ev) {
                const preco = tipo === 'Casal' ? ev.valor_casal : ev.valor_solteiro;
                if(preco) {
                    document.getElementById('textoPreco').innerText = `${tipo}: ${preco}`;
                    document.getElementById('containerPreco').classList.remove('hidden');
                } else {
                    document.getElementById('containerPreco').classList.add('hidden');
                }
            }
        }

        document.getElementById('btnEnviar').onclick = async () => {
            const btn = document.getElementById('btnEnviar');
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const ref = new URLSearchParams(window.location.search).get('ref');

            if(!nome || !telefone) return alert("Preencha seu nome e WhatsApp!");
            
            btn.disabled = true; btn.innerText = "GRAVANDO...";
            
            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome, telefone, 
                    evento: document.getElementById('evento').value,
                    tipo: document.getElementById('tipoPublico').value,
                    promoter: ref,
                    entrou: false,
                    data_cadastro: new Date()
                });
                document.getElementById('mensagem').innerText = "✅ NOME NA LISTA COM SUCESSO!";
                document.getElementById('mensagem').className = "text-center text-sm mt-4 font-black text-green-500 italic";
                document.getElementById('mensagem').classList.remove('hidden');
                document.getElementById('nome').value = ""; document.getElementById('telefone').value = "";
            } catch(e) { alert("Erro ao salvar."); }
            finally { btn.disabled = false; btn.innerText = "Confirmar na Lista"; }
        };

        validarEIniciar();
    </script>
</body>
</html>
