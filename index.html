<script type="module">
    // ... (mantenha seu firebaseConfig e imports)

    window.enviarParaLista = async function() {
        const evento = document.getElementById('evento').value;
        const nome = document.getElementById('nome').value;
        const telefone = document.getElementById('telefone').value;
        const btn = document.getElementById('btnEnviar');
        const msg = document.getElementById('mensagem');

        // BUSCA O PROMOTER NO LINK (ex: ?ref=bruna)
        const urlParams = new URLSearchParams(window.location.search);
        const promoterRef = urlParams.get('ref') || "Direto"; 

        if(!nome || !telefone || !evento) { alert("Preencha tudo!"); return; }
        btn.disabled = true;

        try {
            // TRAVA DE DUPLICIDADE
            const q = query(collection(db, "lista_eventos"), where("evento", "==", evento));
            const snap = await getDocs(q);
            let jaExiste = false;
            snap.forEach(doc => { if(doc.data().telefone === telefone) jaExiste = true; });

            if (jaExiste) {
                msg.innerText = "⚠️ Você já está na lista!";
                msg.className = "text-center text-sm mt-4 font-bold text-yellow-500";
                msg.classList.remove('hidden');
                btn.disabled = false;
                return;
            }

            // SALVA COM O NOME DO PROMOTER
            await addDoc(collection(db, "lista_eventos"), {
                evento, 
                nome, 
                telefone, 
                promoter: promoterRef, // Aqui salva quem trouxe
                data_cadastro: new Date(), 
                entrou: false
            });

            msg.innerText = "✅ Sucesso! Nome na lista.";
            msg.className = "text-center text-sm mt-4 font-bold text-green-500";
            msg.classList.remove('hidden');
            document.getElementById('nome').value = "";
            document.getElementById('telefone').value = "";
        } catch (e) {
            msg.innerText = "❌ Erro ao enviar.";
            msg.classList.remove('hidden');
        } finally { btn.disabled = false; }
    }
    // ...
</script>
