<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclub - Official Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.96); }
        .fade-down { animation: fadeDown 0.3s ease-out; }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tipo-btn-active { background-color: #eab308 !important; color: black !important; border-color: #eab308 !important; }
        .input-group { transition: all 0.4s ease; opacity: 0; transform: translateY(-10px); display: none; }
        .input-group.show { opacity: 1; transform: translateY(0); display: block; }
        .festa-card { background: #111113; border: 1px solid #27272a; border-radius: 2.5rem; overflow: hidden; }
        .banner-container { background-color: #000; position: relative; width: 100%; height: 320px; display: flex; align-items: center; justify-content: center; }
        .banner-img { object-fit: contain !important; width: 100%; height: 100%; }
        .btn-outline-gold { background-color: transparent; border: 2px solid #eab308; color: #eab308; font-weight: 900; text-transform: uppercase; font-size: 10px; border-radius: 1rem; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen p-4 flex flex-col">

    <div class="max-w-md mx-auto w-full flex-grow">
        <header class="flex justify-center mb-10 py-8">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Eclub Logo" class="h-20 w-auto object-contain">
        </header>

        <div id="listaEventos" class="space-y-12">
            <div class="animate-pulse flex flex-col space-y-4 text-center py-20 text-zinc-800 font-black uppercase text-[10px]">Carregando Agenda...</div>
        </div>

        <footer class="mt-20 mb-12 border-t border-zinc-900 pt-10 text-center">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 opacity-40 grayscale mx-auto mb-6">
            <div class="border-2 border-yellow-500 p-8 rounded-[2.5rem] text-center bg-black">
                <p class="text-[9px] text-yellow-500 font-black uppercase mb-2 tracking-widest">Localização Oficial</p>
                <p class="text-sm font-black italic text-white leading-tight">Bairro Alto, Curitiba - PR</p>
            </div>
        </footer>
    </div>

    <div id="telaPix" class="hidden fixed inset-0 bg-black/98 z-50 flex flex-col items-center justify-center p-8 text-center overflow-y-auto">
        <h2 class="text-yellow-500 text-2xl font-black uppercase italic mb-6">Pagamento via Pix</h2>
        <div class="bg-white p-4 rounded-[2rem] mb-6 shadow-[0_0_30px_rgba(234,179,8,0.3)]">
            <img id="qrCodeImg" src="" class="w-64 h-64 mx-auto">
        </div>
        <p class="text-[10px] text-zinc-500 font-black uppercase mb-4 tracking-widest">Use o código Copia e Cola abaixo:</p>
        <textarea id="pixCopyPaste" readonly onclick="this.select()" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl text-[9px] text-zinc-300 font-mono mb-6 h-20 outline-none"></textarea>
        
        <button onclick="copiarPix()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase text-[10px] mb-4 btn-action">Copiar Código Pix</button>
        <div class="flex items-center justify-center space-x-2 mt-4">
            <span class="flex h-2 w-2 rounded-full bg-yellow-500 animate-ping"></span>
            <p class="text-[10px] text-zinc-400 font-bold uppercase">Aguardando confirmação...</p>
        </div>
        <button onclick="location.reload()" class="mt-8 text-zinc-600 text-[9px] font-black uppercase border-b border-zinc-800">Cancelar e Sair</button>
    </div>

    <div id="telaSucesso" class="hidden fixed inset-0 bg-black/98 z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-6 text-3xl shadow-lg shadow-green-900/50">✓</div>
        <h2 class="text-2xl font-black uppercase italic mb-2">Pix Recebido!</h2>
        <p class="text-zinc-500 text-xs font-bold uppercase">Seu nome já está na lista oficial.</p>
        <button onclick="location.reload()" class="w-full max-w-xs bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px] mt-10 btn-action tracking-widest">Finalizar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const promoterRef = params.get('ref') || 'Direto';
        window.valoresEventos = {};

        async function carregarAgenda() {
            try {
                const q = query(collection(db, "eventos"), where("ativo", "==", true));
                const snap = await getDocs(q);
                const container = document.getElementById('listaEventos');
                container.innerHTML = '';
                const agora = new Date();
                let eventos = [];
                snap.forEach(doc => {
                    const ev = doc.data();
                    if (new Date(ev.data + 'T23:59:59') >= agora) eventos.push({ id: doc.id, ...ev });
                });
                eventos.sort((a, b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                    window.valoresEventos[ev.id] = { casal: ev.valor_casal || "", solteiro: ev.valor_solteiro || "" };
                    const dataFim = ev.data_encerramento ? new Date(ev.data_encerramento) : new Date(ev.data + 'T23:59:59');
                    const listaAberta = agora < dataFim;
                    const card = document.createElement('div');
                    card.className = "festa-card fade-down shadow-xl mb-6";
                    card.innerHTML = `
                        <div class="banner-container">
                            <img src="${ev.imagem}" class="banner-img">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent"></div>
                            <div class="absolute bottom-6 left-6">
                                <p class="text-[9px] text-yellow-500 font-black uppercase mb-1 tracking-widest">${ev.data.split('-').reverse().join('/')}</p>
                                <h3 class="text-2xl font-black uppercase italic text-white leading-none">${ev.nome}</h3>
                            </div>
                        </div>
                        <div class="p-6 space-y-3">
                            ${listaAberta 
                                ? `<button onclick="toggleForm('${ev.id}')" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase text-[11px] btn-action">Comprar Ingressos / Lista VIP</button>`
                                : `<div class="w-full bg-zinc-900 text-zinc-600 font-black py-4 rounded-2xl uppercase text-[10px] text-center border border-zinc-800 tracking-widest">Lista Encerrada</div>`
                            }
                            <div class="grid grid-cols-2 gap-3 pt-1">
                                <button onclick="window.open('https://wa.me/5541995040506')" class="btn-outline-gold py-3.5 btn-action">Camarotes</button>
                                <button onclick="window.open('https://wa.me/5541995040506')" class="btn-outline-gold py-3.5 btn-action">Dúvidas</button>
                            </div>
                        </div>
                        <div id="form-${ev.id}" class="hidden p-8 bg-black/50 border-t border-zinc-800 text-center">
                            <h4 class="text-[10px] font-black uppercase text-zinc-500 mb-6 tracking-widest text-white">Tipo de Reserva</h4>
                            <div class="grid grid-cols-2 gap-3 mb-6">
                                <button type="button" id="btn-casal-${ev.id}" onclick="selecionarTipo('${ev.id}', 'casal')" class="border-2 border-yellow-500 py-4 rounded-xl text-[11px] font-black uppercase text-white">Casal</button>
                                <button type="button" id="btn-solteiro-${ev.id}" onclick="selecionarTipo('${ev.id}', 'solteiro')" class="border-2 border-yellow-500 py-4 rounded-xl text-[11px] font-black uppercase text-white">Solteiro</button>
                            </div>
                            <div id="box-valor-${ev.id}" class="hidden mb-6 p-5 bg-black rounded-2xl border border-zinc-800">
                                <p id="valor-display-${ev.id}" class="text-xs font-bold text-yellow-500 uppercase tracking-wider text-white"></p>
                            </div>
                            <div id="campos-dados-${ev.id}" class="input-group">
                                <form onsubmit="iniciarPagamento(event, '${ev.nome}', '${ev.id}')" class="space-y-3 text-left">
                                    <input type="hidden" id="tipo-${ev.id}">
                                    <label class="text-[8px] font-black uppercase text-zinc-500 ml-2">Nome Completo</label>
                                    <input type="text" id="nome-${ev.id}" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm font-bold text-white outline-none focus:border-yellow-500" required>
                                    <label class="text-[8px] font-black uppercase text-zinc-500 ml-2">WhatsApp</label>
                                    <input type="tel" id="tel-${ev.id}" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm font-bold text-white outline-none focus:border-yellow-500" required>
                                    <label class="text-[8px] font-black uppercase text-zinc-500 ml-2">CPF (Apenas números)</label>
                                    <input type="tel" id="cpf-${ev.id}" maxlength="11" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm font-bold text-white outline-none focus:border-yellow-500" required>
                                    <button type="submit" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-[10px] tracking-widest btn-action mt-4">Pagar e Confirmar</button>
                                </form>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) { console.error(error); }
        }

        window.iniciarPagamento = async (event, nomeEvento, formId) => {
            event.preventDefault();
            const btn = event.target.querySelector('button');
            const nome = document.getElementById(`nome-${formId}`).value;
            const tel = document.getElementById(`tel-${formId}`).value;
            const cpf = document.getElementById(`cpf-${formId}`).value;
            const tipo = document.getElementById(`tipo-${formId}`).value;
            const valor = window.valoresEventos[formId][tipo];

            btn.disabled = true;
            btn.innerText = "GERANDO PIX...";

            try {
                const response = await fetch("https://hook.us2.make.com/2djhpt94eflckf7fbjekvthkiessthoi", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ nome, tel, cpf, valor, nomeEvento, tipo, promoter: promoterRef })
                });

                const data = await response.json();

                if(data.qr_code) {
                    document.getElementById('qrCodeImg').src = `data:image/png;base64,${data.qr_code_base64}`;
                    document.getElementById('pixCopyPaste').value = data.qr_code;
                    document.getElementById('telaPix').classList.remove('hidden');
                    escutarPagamento(data.id_reserva); 
                }
            } catch (e) { alert("Erro ao gerar Pix. Verifique sua conexão."); btn.disabled = false; btn.innerText = "Pagar e Confirmar"; }
        }

        function escutarPagamento(idReserva) {
            onSnapshot(collection(db, "lista_eventos"), (snap) => {
                snap.forEach(doc => {
                    if(doc.id === idReserva && doc.data().pago === true) {
                        document.getElementById('telaPix').classList.add('hidden');
                        document.getElementById('telaSucesso').classList.remove('hidden');
                    }
                });
            });
        }

        window.copiarPix = () => {
            const copyText = document.getElementById("pixCopyPaste");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert("Código Pix Copiado!");
        }

        window.selecionarTipo = (id, tipo) => {
            document.querySelectorAll(`#form-${id} button[type="button"]`).forEach(b => b.classList.remove('tipo-btn-active'));
            document.getElementById(`btn-${tipo}-${id}`).classList.add('tipo-btn-active');
            document.getElementById(`tipo-${id}`).value = tipo;
            document.getElementById(`box-valor-${id}`).classList.remove('hidden');
            document.getElementById(`valor-display-${id}`).innerText = window.valoresEventos[id][tipo];
            document.getElementById(`campos-dados-${id}`).classList.add('show');
        }

        window.toggleForm = (id) => {
            const form = document.getElementById(`form-${id}`);
            const estaEscondido = form.classList.contains('hidden');
            document.querySelectorAll('[id^="form-"]').forEach(f => f.classList.add('hidden'));
            if(estaEscondido) form.classList.remove('hidden');
        }

        carregarAgenda();
    </script>
</body>
</html>
