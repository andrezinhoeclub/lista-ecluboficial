<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclub - Official Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.96); }
        .fade-down { animation: fadeDown 0.3s ease-out; }
        @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .tipo-btn-active { background-color: #eab308 !important; color: black !important; border-color: #eab308 !important; }
        .input-group { transition: all 0.4s ease; opacity: 0; transform: translateY(0); display: block; }
        .festa-card { background: #111113; border: 1px solid #27272a; border-radius: 2.5rem; overflow: hidden; }
        .banner-container { background-color: #000; position: relative; width: 100%; height: 320px; display: flex; align-items: center; justify-content: center; }
      .banner-img { object-fit: contain !important; width: 100%; height: 100%; }
        /* Ajuste para o QR Code não ficar cortado ou com bordas estranhas */
        #qrCodeImg { 
            display: block;
            margin-left: auto;
            margin-right: auto;
            max-width: 100%;
            height: auto;
            border-radius: 1rem;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen p-4 flex flex-col">

    <div class="max-w-md mx-auto w-full flex-grow">
        <header class="flex justify-center mb-10 py-8">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Eclub Logo" class="h-20 w-auto object-contain">
        </header>

        <div id="listaEventos" class="space-y-12">
            <div class="animate-pulse flex flex-col space-y-4 text-center py-20 text-zinc-800 font-black uppercase text-[10px]">Carregando Agenda...</div>
        </div>

        <footer class="mt-20 mb-12 border-t border-zinc-900 pt-10 text-center text-white">
            <div class="grid grid-cols-2 gap-3 w-full px-1 mb-6">
                <a href="https://wa.me/5541995040506" target="_blank" class="bg-zinc-900/50 border border-zinc-800 flex items-center justify-center p-5 rounded-2xl space-x-3 btn-action">
                    <span class="text-[10px] font-black uppercase tracking-widest text-white text-center">WhatsApp</span>
                </a>
                <a href="https://www.instagram.com/eclubswingdance/" target="_blank" class="bg-zinc-900/50 border border-zinc-800 flex items-center justify-center p-5 rounded-2xl space-x-3 btn-action">
                    <span class="text-[10px] font-black uppercase tracking-widest text-white text-center">Instagram</span>
                </a>
            </div>
            <div class="border-2 border-yellow-500 p-8 rounded-[2.5rem] text-center bg-black">
                <p class="text-[9px] text-yellow-500 font-black uppercase mb-2 tracking-widest">Localização Oficial</p>
                <p class="text-sm font-black italic leading-tight">Bairro Alto, Curitiba - PR</p>
            </div>
        </footer>
    </div>

    <div id="telaPix" class="hidden fixed inset-0 bg-black/98 z-50 flex flex-col items-center justify-center p-8 text-center overflow-y-auto">
        <h2 class="text-yellow-500 text-2xl font-black uppercase italic mb-6">Pagamento via Pix</h2>
        <div class="bg-white p-4 rounded-[2rem] mb-6">
            <img id="qrCodeImg" src="" class="w-64 h-64 mx-auto text-black">
        </div>
        <textarea id="pixCopyPaste" readonly class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl text-[9px] text-zinc-300 font-mono mb-6 h-20 outline-none text-center"></textarea>
        <button id="btnCopiar" onclick="copiarPix()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase text-[10px] mb-4 btn-action">Copiar Código Pix</button>
        <button onclick="location.reload()" class="mt-8 text-zinc-600 text-[9px] font-black uppercase border-b border-zinc-800">Cancelar e Sair</button>
    </div>

    <div id="telaSucesso" class="hidden fixed inset-0 bg-black/98 z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-6 text-3xl shadow-lg">✓</div>
        <h2 class="text-2xl font-black uppercase italic mb-2">Enviado!</h2>
        <p class="text-zinc-500 text-xs font-bold uppercase">Sua reserva foi concluída com sucesso.</p>
        <button onclick="location.reload()" class="w-full max-w-xs bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px] mt-10 btn-action">Voltar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const promoterRef = params.get('ref') || 'Direto';

        async function carregarAgenda() {
            try {
                const q = query(collection(db, "eventos"), where("ativo", "==", true));
                const snap = await getDocs(q);
                const container = document.getElementById('listaEventos');
                container.innerHTML = '';
                const hoje = new Date().toLocaleDateString('en-CA');
                
                snap.forEach(doc => {
                    const ev = doc.data();
                    if (!ev.data || ev.data >= hoje) {
                        const card = document.createElement('div');
                        card.className = "festa-card fade-down mb-6";
                        card.innerHTML = `
                            <div class="banner-container"><img src="${ev.imagem}" class="banner-img"></div>
                            <div class="p-6 space-y-3 text-center">
                                <p class="text-[9px] text-yellow-500 font-black uppercase tracking-widest">${ev.data ? ev.data.split('-').reverse().join('/') : 'DATA A DEFINIR'}</p>
                                <h3 class="text-2xl font-black uppercase italic text-white leading-tight">${ev.nome}</h3>
                                <div class="flex flex-col gap-2 mt-4">
                                    <button onclick="abrirForm('${ev.id}', 'lista', '${ev.nome}')" class="w-full bg-zinc-800 text-white font-black py-4 rounded-2xl uppercase text-[11px] btn-action border border-zinc-700">Colocar nome na lista</button>
                                    <button onclick="abrirForm('${ev.id}', 'pix', '${ev.nome}')" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase text-[11px] btn-action">Comprar Antecipado (Pix)</button>
                                </div>
                                <div id="form-${ev.id}" class="hidden mt-6 space-y-3 pt-6 border-t border-zinc-800">
                                    <input type="text" id="nome-${ev.id}" placeholder="NOME COMPLETO" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-white outline-none font-bold uppercase text-xs">
                                    <input type="tel" id="tel-${ev.id}" placeholder="WHATSAPP" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-white outline-none font-bold text-xs">
                                    <input type="tel" id="cpf-${ev.id}" placeholder="CPF (PARA PIX)" maxlength="11" class="hidden w-full bg-black border border-zinc-800 p-4 rounded-xl text-white outline-none font-bold text-xs">
                                    <select id="tipo-${ev.id}" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-white outline-none font-bold text-xs uppercase">
                                        <option value="casal">Casal</option>
                                        <option value="solteiro">Solteiro</option>
                                    </select>
                                    <button id="btn-submit-${ev.id}" onclick="processarEnvio('${ev.nome}', '${ev.id}')" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-[10px] tracking-widest btn-action">Confirmar</button>
                                </div>
                            </div>
                        `;
                        container.appendChild(card);
                    }
                });
            } catch (e) { console.error(e); }
        }

        window.abrirForm = (id, modo, nomeEvento) => {
            document.getElementById(`form-${id}`).classList.remove('hidden');
            const campoCpf = document.getElementById(`cpf-${id}`);
            const btn = document.getElementById(`btn-submit-${id}`);
            btn.setAttribute('data-modo', modo);
            if (modo === 'pix') {
                campoCpf.classList.remove('hidden');
                btn.innerText = "GERAR PIX E PAGAR";
            } else {
                campoCpf.classList.add('hidden');
                btn.innerText = "CONFIRMAR NA LISTA";
            }
        };

        window.processarEnvio = async (nomeEvento, id) => {
            const btn = document.getElementById(`btn-submit-${id}`);
            const modo = btn.getAttribute('data-modo');
            const nome = document.getElementById(`nome-${id}`).value;
            const tel = document.getElementById(`tel-${id}`).value;
            const cpf = document.getElementById(`cpf-${id}`).value;
            const tipo = document.getElementById(`tipo-${id}`).value;

            if (!nome || !tel) return alert("Preencha nome e WhatsApp!");
            
            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";

            try {
                if (modo === 'pix') {
                    const response = await fetch("https://hook.us2.make.com/ge642pupzpqk7l4uoh4znggg228ynqqh", {
                        method: "POST",
                        body: JSON.stringify({ nome, tel, cpf, tipo, evento: nomeEvento, promoter: promoterRef })
                    });

                    // Lendo como texto primeiro para evitar erro de JSON
                    const textData = await response.text();
                    const data = JSON.parse(textData);

                    if (data && data.qr_code_base64) {
                        document.getElementById('qrCodeImg').src = `data:image/png;base64,${data.qr_code_base64}`;
                        document.getElementById('pixCopyPaste').value = data.qr_code;
                        document.getElementById('telaPix').classList.remove('hidden');
                        btn.innerText = "PIX GERADO!";
                    } else {
                        alert("Ocorreu uma falha na geração do QR Code. Tente novamente.");
                    }
                } else {
                    await addDoc(collection(db, "lista_eventos"), { 
                        nome, tel, tipo, evento: nomeEvento, promoter: promoterRef, pago: false, data_cadastro: serverTimestamp() 
                    });
                    document.getElementById('telaSucesso').classList.remove('hidden');
                }
            } catch (e) {
                console.error(e);
                alert("Erro ao receber o Pix. Mas não se preocupe, verifique seu WhatsApp em instantes.");
            } finally {
                btn.disabled = false;
                if(modo !== 'pix') btn.innerText = "CONFIRMAR NA LISTA";
            }
        };

        window.copiarPix = () => {
            const copyText = document.getElementById("pixCopyPaste");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            document.getElementById("btnCopiar").innerText = "COPIADO!";
            setTimeout(() => { document.getElementById("btnCopiar").innerText = "COPIAR CÓDIGO PIX"; }, 2000);
        };

        carregarAgenda();
    </script>
</body>
</html>
