<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclub - Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen p-4">

    <div class="max-w-md mx-auto">
        <header class="text-center mb-10 py-6">
            <h1 class="text-5xl font-black text-yellow-500 uppercase italic tracking-tighter">Eclub</h1>
            <p class="text-[10px] tracking-[0.3em] text-zinc-500 uppercase font-black">Official Booking</p>
        </header>

        <div id="listaEventos" class="space-y-12">
            <div class="animate-pulse flex flex-col space-y-4">
                <div class="bg-zinc-900 h-64 rounded-3xl"></div>
                <div class="h-12 bg-zinc-900 rounded-xl w-full"></div>
            </div>
        </div>

        <div id="telaSucesso" class="hidden fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-6 text-center">
            <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-6 shadow-lg shadow-green-500/20">
                <span class="text-4xl text-black font-bold">✓</span>
            </div>
            <h2 class="text-2xl font-black uppercase italic mb-2">Confirmado!</h2>
            <p class="text-zinc-400 text-sm mb-8">Seu nome foi enviado com sucesso para a portaria.</p>
            <button onclick="fecharSucesso()" class="w-full max-w-xs bg-zinc-800 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest border border-zinc-700">Voltar</button>
        </div>

        <footer class="mt-20 text-center pb-12 opacity-30">
            <p class="text-[9px] uppercase font-black tracking-widest">Eclub Curitiba</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const promoterRef = params.get('ref') || 'Direto';

        async function carregarAgenda() {
            const q = query(collection(db, "eventos"), where("ativo", "==", true), orderBy("data", "asc"));
            const snap = await getDocs(q);
            const container = document.getElementById('listaEventos');
            container.innerHTML = '';

            snap.forEach(doc => {
                const ev = doc.data();
                const eventCard = document.createElement('div');
                eventCard.className = "group flex flex-col";

                eventCard.innerHTML = `
                    <div class="relative w-full h-80 rounded-[2.5rem] overflow-hidden border-2 border-zinc-800 shadow-2xl mb-4">
                        <img src="${ev.imagem}" class="w-full h-full object-cover" alt="${ev.nome}">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                        <div class="absolute bottom-6 left-6">
                            <p class="text-[10px] text-yellow-500 font-black uppercase mb-1">${ev.data} • ${ev.hora}</p>
                            <h3 class="text-2xl font-black uppercase italic leading-none">${ev.nome}</h3>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 gap-2 px-1">
                        <button onclick="toggleForm('${doc.id}')" class="bg-yellow-500 hover:bg-yellow-600 text-black font-black py-4 rounded-2xl uppercase text-[11px] btn-action shadow-lg shadow-yellow-900/10">
                            Colocar Nome na Lista
                        </button>
                        
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="alert('Módulo de Camarotes em breve!')" class="bg-zinc-800 hover:bg-zinc-700 text-white font-black py-3 rounded-2xl uppercase text-[9px] border border-zinc-700 btn-action">
                                Reservar Camarote
                            </button>
                            <button onclick="alert('Vendas de ingressos em breve!')" class="bg-zinc-800 hover:bg-zinc-700 text-white font-black py-3 rounded-2xl uppercase text-[9px] border border-zinc-700 btn-action">
                                Comprar Ingresso
                            </button>
                        </div>
                    </div>

                    <div id="form-${doc.id}" class="hidden mt-4 p-6 bg-zinc-900 rounded-3xl border border-zinc-800 animate-in slide-in-from-top duration-300">
                        <h4 class="text-xs font-black uppercase text-zinc-400 mb-4 text-center">Cadastro Lista VIP</h4>
                        <form onsubmit="enviarLista(event, '${ev.nome}', '${doc.id}')" class="space-y-3">
                            <input type="text" placeholder="Seu Nome Completo" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm outline-none focus:border-yellow-500 font-bold" required>
                            <input type="tel" placeholder="Seu WhatsApp" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-sm outline-none focus:border-yellow-500 font-bold" required>
                            <button type="submit" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-[10px] tracking-widest mt-2">Enviar Agora</button>
                        </form>
                    </div>
                `;
                container.appendChild(eventCard);
            });
        }

        window.toggleForm = (id) => {
            const form = document.getElementById(`form-${id}`);
            const estaEscondido = form.classList.contains('hidden');
            
            // Fecha todos os outros formulários abertos antes de abrir o novo
            document.querySelectorAll('[id^="form-"]').forEach(f => f.classList.add('hidden'));
            
            if(estaEscondido) {
                form.classList.remove('hidden');
                form.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        window.enviarLista = async (event, nomeEvento, formId) => {
            event.preventDefault();
            const inputs = event.target.querySelectorAll('input');
            const btn = event.target.querySelector('button');
            
            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";

            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: inputs[0].value,
                    telefone: inputs[1].value,
                    evento: nomeEvento,
                    promoter: promoterRef,
                    entrou: false,
                    data_cadastro: new Date()
                });

                document.getElementById('telaSucesso').classList.remove('hidden');
                document.getElementById(`form-${formId}`).classList.add('hidden');
                event.target.reset();
            } catch (e) {
                alert("Erro ao enviar. Tente novamente.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar Agora";
            }
        }

        window.fecharSucesso = () => {
            document.getElementById('telaSucesso').classList.add('hidden');
        }

        carregarAgenda();
    </script>
</body>
</html>
