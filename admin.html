<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria - Eclub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white font-sans p-4">

    <div class="max-w-2xl mx-auto">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700 text-center">
                <p class="text-zinc-400 text-xs uppercase mb-1">Total Reservas</p>
                <p id="totalReservas" class="text-white font-bold text-2xl">0</p>
            </div>
            <div class="bg-green-900/30 p-4 rounded-xl border border-green-800 text-center">
                <p class="text-green-400 text-xs uppercase mb-1">Check-ins Realizados</p>
                <p id="totalCheckins" class="text-green-500 font-bold text-2xl">0</p>
            </div>
        </div>

        <h1 class="text-center text-yellow-500 font-bold uppercase tracking-widest mb-4">Portaria Eclub</h1>

        <div class="mb-6">
            <input type="text" id="busca" onkeyup="filtrarLista()" placeholder="Pesquisar nome ou celular..." 
                class="w-full bg-zinc-800 border border-zinc-700 p-4 rounded-xl focus:outline-none focus:border-yellow-500 text-white shadow-lg">
        </div>

        <p id="dataAtual" class="text-zinc-500 text-sm mb-4 italic text-center"></p>

        <div id="listaClientes" class="space-y-3">
            <p class="text-center text-zinc-500">Carregando lista...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const hojeISO = new Date().toISOString().split('T')[0];
        document.getElementById('dataAtual').innerText = "Eventos de hoje: " + new Date().toLocaleDateString('pt-br');

        // FUNÇÃO DE CHECK-IN (AGORA SÓ MARCA)
        window.darCheckIn = async function(id) {
            const clienteRef = doc(db, "lista_eventos", id);
            try { 
                await updateDoc(clienteRef, { entrou: true }); 
            } catch (e) { 
                alert("Erro ao processar check-in!"); 
            }
        };

        async function carregarPortaria() {
            const container = document.getElementById('listaClientes');
            
            // 1. Pega eventos de hoje
            const qEventos = query(collection(db, "eventos"), where("data", "==", hojeISO));
            const snapEventos = await getDocs(qEventos);
            const nomesEventosHoje = [];
            snapEventos.forEach(doc => nomesEventosHoje.push(doc.data().nome));

            if (nomesEventosHoje.length === 0) {
                container.innerHTML = '<p class="text-center text-zinc-500 py-10">Sem eventos para hoje.</p>';
                return;
            }

            // 2. Escuta a lista em tempo real
            const qLista = query(collection(db, "lista_eventos"), where("evento", "in", nomesEventosHoje));

            onSnapshot(qLista, (snapshot) => {
                container.innerHTML = '';
                let total = 0;
                let checkins = 0;

                snapshot.forEach((doc) => {
                    const item = doc.data();
                    const id = doc.id;
                    const entrou = item.entrou || false;
                    
                    total++;
                    if(entrou) checkins++;

                    const div = document.createElement('div');
                    div.className = `cliente-item p-4 rounded-xl border transition-all ${entrou ? 'bg-green-900/10 border-green-800/50' : 'bg-zinc-800 border-zinc-700'}`;
                    div.setAttribute('data-busca', `${item.nome} ${item.telefone}`.toLowerCase());

                    div.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div class="${entrou ? 'opacity-50' : ''}">
                                <p class="font-bold text-lg ${entrou ? 'text-green-500' : 'text-white'}">
                                    ${entrou ? '✅ ' : ''}${item.nome}
                                </p>
                                <p class="text-sm text-zinc-400">${item.telefone} | ${item.evento}</p>
                            </div>
                            <div>
                                ${entrou 
                                    ? '<span class="text-green-500 font-bold text-xs uppercase mr-2 tracking-tighter">Na Casa</span>' 
                                    : `<button onclick="darCheckIn('${id}')" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-4 rounded-lg text-xs uppercase shadow-md transition-all active:scale-95">Check-in</button>`
                                }
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });
                
                document.getElementById('totalReservas').innerText = total;
                document.getElementById('totalCheckins').innerText = checkins;
                filtrarLista();
            });
        }

        window.filtrarLista = function() {
            const termo = document.getElementById('busca').value.toLowerCase();
            const itens = document.querySelectorAll('.cliente-item');
            itens.forEach(item => {
                const texto = item.getAttribute('data-busca');
                item.style.display = texto.includes(termo) ? 'block' : 'none';
            });
        };

        carregarPortaria();
    </script>
</body>
</html>
