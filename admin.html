<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria - Eclub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white font-sans p-4">
    <div class="max-w-2xl mx-auto">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700 text-center text-zinc-400">Reservas: <span id="tot" class="text-white font-bold">0</span></div>
            <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700 text-center text-zinc-400">Check-ins: <span id="chk" class="text-green-500 font-bold">0</span></div>
        </div>
        <input type="text" id="busca" onkeyup="filtrar()" placeholder="Pesquisar..." class="w-full bg-zinc-800 border border-zinc-700 p-4 rounded-xl mb-6 text-white outline-none focus:border-yellow-500">
        <div id="lista" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.darCheckIn = async (id) => {
            await updateDoc(doc(db, "lista_eventos", id), { entrou: true });
        };

        async function iniciar() {
            const hoje = new Date().toISOString().split('T')[0];
            const qE = query(collection(db, "eventos"), where("data", "==", hoje));
            const snapE = await getDocs(qE);
            const evs = []; snapE.forEach(d => evs.push(d.data().nome));

            if(evs.length === 0) { document.getElementById('lista').innerHTML = '<p class="text-center text-zinc-500">Nenhum evento hoje.</p>'; return; }

            onSnapshot(query(collection(db, "lista_eventos"), where("evento", "in", evs)), (snap) => {
                const list = document.getElementById('lista');
                list.innerHTML = '';
                let t = 0, c = 0;
                snap.forEach(d => {
                    const i = d.data(); t++; if(i.entrou) c++;
                    const div = document.createElement('div');
                    div.className = `item p-4 rounded-xl border ${i.entrou ? 'bg-green-900/10 border-green-800/40 opacity-60' : 'bg-zinc-800 border-zinc-700'}`;
                    div.setAttribute('data-s', `${i.nome} ${i.telefone}`.toLowerCase());
                    div.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="font-bold ${i.entrou ? 'text-green-500' : 'text-white'}">${i.nome}</p>
                                <p class="text-xs text-zinc-400">${i.telefone}</p>
                                <p class="text-[10px] mt-1 uppercase font-bold text-yellow-500">Promoter: ${i.promoter || 'Direto'}</p>
                            </div>
                            ${i.entrou ? '<span class="text-green-500 text-[10px] font-bold">NA CASA</span>' : `<button onclick="darCheckIn('${d.id}')" class="bg-yellow-500 text-black px-3 py-2 rounded-lg text-[10px] font-bold">CONFIRMAR</button>`}
                        </div>`;
                    list.appendChild(div);
                });
                document.getElementById('tot').innerText = t; document.getElementById('chk').innerText = c;
                filtrar();
            });
        }

        window.filtrar = () => {
            const val = document.getElementById('busca').value.toLowerCase();
            document.querySelectorAll('.item').forEach(i => i.style.display = i.getAttribute('data-s').includes(val) ? 'block' : 'none');
        };
        iniciar();
    </script>
</body>
</html>
