<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclub - Portaria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-glass { background: #18181b; border: 1px solid #27272a; }
        .btn-checkin { transition: all 0.2s ease; }
        .btn-checkin:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen p-4">

    <div class="max-w-md mx-auto">
        <header class="flex justify-center mb-10 py-6">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Eclub Logo" class="h-16 w-auto object-contain">
        </header>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="card-glass p-6 rounded-[2rem] text-center">
                <p class="text-[9px] text-zinc-500 font-black uppercase tracking-widest mb-1">Reservas</p>
                <p id="countReservas" class="text-3xl font-black italic text-white">0%</p>
            </div>
            <div class="card-glass p-6 rounded-[2rem] text-center">
                <p class="text-[9px] text-zinc-500 font-black uppercase tracking-widest mb-1">Na Casa</p>
                <p id="countNaCasa" class="text-3xl font-black italic text-yellow-500">0%</p>
            </div>
        </div>

        <div class="relative mb-8">
            <input type="text" id="inputBusca" placeholder="Pesquisar nome ou celular..." class="w-full bg-zinc-900 border border-zinc-800 p-5 rounded-2xl outline-none focus:border-yellow-500 font-bold text-sm transition">
            <span class="absolute right-5 top-5 opacity-30">🔍</span>
        </div>

        <div id="listaPortaria" class="space-y-4">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function carregarPortaria() {
            const q = query(collection(db, "lista_eventos"), orderBy("data_cadastro", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('listaPortaria');
                const busca = document.getElementById('inputBusca').value.toLowerCase();
                container.innerHTML = '';
                
                let reservas = 0;
                let naCasa = 0;

                snapshot.forEach((d) => {
                    const res = d.data();
                    const id = d.id;

                    reservas++;
                    if (res.entrou) naCasa++;

                    // Filtro de busca
                    if (res.nome.toLowerCase().includes(busca) || res.telefone.includes(busca)) {
                        const card = document.createElement('div');
                        card.className = `card-glass p-6 rounded-[2rem] flex justify-between items-center ${res.entrou ? 'opacity-40 border-green-500/50' : ''}`;
                        
                        card.innerHTML = `
                            <div>
                                <div class="flex items-center space-x-2 mb-1">
                                    <span class="bg-yellow-500 text-black text-[8px] font-black px-2 py-0.5 rounded uppercase">${res.tipo}</span>
                                    <h3 class="font-black uppercase italic text-sm text-white">${res.nome}</h3>
                                </div>
                                <p class="text-[10px] text-zinc-500 font-bold">${res.telefone}</p>
                                <p class="text-[9px] text-yellow-500/50 font-black uppercase mt-1">P: ${res.promoter} | ${res.evento}</p>
                            </div>
                            
                            <button onclick="fazerCheckin('${id}', ${res.entrou})" class="btn-checkin ${res.entrou ? 'bg-zinc-800 text-zinc-500' : 'bg-yellow-500 text-black'} font-black px-6 py-3 rounded-xl text-[10px] uppercase">
                                ${res.entrou ? 'OK' : 'Check-in'}
                            </button>
                        `;
                        container.appendChild(card);
                    }
                });

                // Atualiza métricas com %
                document.getElementById('countReservas').innerText = reservas + '%';
                document.getElementById('countNaCasa').innerText = naCasa + '%';
            });
        }

        window.fazerCheckin = async (id, statusAtual) => {
            const confirmacao = statusAtual ? "Remover check-in deste cliente?" : "Confirmar entrada do cliente?";
            if(confirm(confirmacao)) {
                await updateDoc(doc(db, "lista_eventos", id), { entrou: !statusAtual });
            }
        }

        document.getElementById('inputBusca').addEventListener('input', carregarPortaria);
        carregarAgenda(); // Inicia
        carregarPortaria();
    </script>
</body>
</html>
