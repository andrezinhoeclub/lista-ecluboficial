<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria - Erotic Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div id="loginBox" class="w-full max-w-sm bg-zinc-800 p-8 rounded-2xl shadow-2xl border border-zinc-700">
        <div class="flex justify-center mb-6">
            <img src="https://raw.githubusercontent.com/andrezinhoeclub/lista-ecluboficial/main/logo-erotic.png" class="h-16 w-auto" onerror="this.src='https://i.imgur.com/8N6OqRE.png'">
        </div>
        <h1 class="text-xl font-bold text-center mb-6 text-yellow-500 uppercase tracking-widest">Acesso Portaria</h1>
        <div class="space-y-4">
            <div>
                <label class="block text-xs mb-1 text-zinc-400 uppercase font-bold">Usuário</label>
                <input type="text" id="user" class="w-full bg-zinc-700 border border-zinc-600 p-3 rounded-lg focus:outline-none focus:border-yellow-500 text-white">
            </div>
            <div>
                <label class="block text-xs mb-1 text-zinc-400 uppercase font-bold">Senha</label>
                <input type="password" id="pass" class="w-full bg-zinc-700 border border-zinc-600 p-3 rounded-lg focus:outline-none focus:border-yellow-500 text-white">
            </div>
            <button onclick="fazerLogin()" id="btnLogin" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-lg transition uppercase tracking-wider">Entrar</button>
            <p id="erroLogin" class="text-red-500 text-xs text-center hidden font-bold italic"></p>
        </div>
    </div>

    <div id="painelPortaria" class="w-full max-w-2xl mx-auto hidden self-start pt-4">
        <div class="flex justify-center mb-6">
            <img src="https://raw.githubusercontent.com/andrezinhoeclub/lista-ecluboficial/main/logo-erotic.png" class="h-20 w-auto drop-shadow-[0_0_15px_rgba(234,179,8,0.4)]">
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6 text-center">
            <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700 shadow-xl">
                <p class="text-zinc-500 text-[10px] uppercase font-bold">Reservas</p>
                <p id="tot" class="text-white text-3xl font-black">0</p>
            </div>
            <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700 shadow-xl">
                <p class="text-zinc-500 text-[10px] uppercase font-bold">Na Casa</p>
                <p id="chk" class="text-yellow-500 text-3xl font-black">0</p>
            </div>
        </div>

        <div class="relative mb-8 text-center">
            <input type="text" id="busca" onkeyup="filtrar()" placeholder="Pesquisar nome ou celular..." class="w-full bg-zinc-800 border-2 border-zinc-700 p-4 rounded-2xl text-white outline-none focus:border-yellow-500 shadow-2xl pl-12 text-left">
            <span class="absolute left-4 top-5 text-zinc-500">🔍</span>
        </div>
        
        <div id="lista" class="space-y-4 pb-24 text-center text-zinc-600">Carregando portaria...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, where, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FUNÇÃO DE LOGIN
        window.fazerLogin = async function() {
            const usuario = document.getElementById('user').value.trim();
            const senhaDigitada = document.getElementById('pass').value.trim();
            const btn = document.getElementById('btnLogin');
            const erro = document.getElementById('erroLogin');

            if(!usuario || !senhaDigitada) return;
            btn.innerText = "VERIFICANDO...";
            erro.classList.add('hidden');
            
            try {
                // O usuario digitado deve ser o ID do documento na coleção 'usuarios'
                const userRef = doc(db, "usuarios", usuario);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    const dados = userSnap.data();
                    if (String(dados.senha) === String(senhaDigitada)) {
                        document.getElementById('loginBox').classList.add('hidden');
                        document.body.classList.remove('items-center', 'justify-center');
                        document.getElementById('painelPortaria').classList.remove('hidden');
                        iniciarPortaria();
                    } else {
                        erro.innerText = "Senha incorreta!";
                        erro.classList.remove('hidden');
                        btn.innerText = "Entrar";
                    }
                } else {
                    erro.innerText = "Usuário não encontrado!";
                    erro.classList.remove('hidden');
                    btn.innerText = "Entrar";
                }
            } catch (e) {
                console.error(e);
                alert("Erro ao conectar ao Firebase. Verifique as Regras de Segurança.");
                btn.innerText = "Entrar";
            }
        }

        window.darCheckIn = async (id) => {
            const ref = doc(db, "lista_eventos", id);
            try {
                await updateDoc(ref, { entrou: true });
            } catch (e) {
                alert("Erro ao confirmar.");
            }
        };

        async function iniciarPortaria() {
            const hoje = new Date().toLocaleDateString('en-CA'); // Pega data AAAA-MM-DD
            
            const qE = query(collection(db, "eventos"), where("data", "==", hoje));
            const snapE = await getDocs(qE);
            const evsHoje = [];
            snapE.forEach(d => evsHoje.push(d.data().nome));

            const listContainer = document.getElementById('lista');
            if(evsHoje.length === 0) {
                listContainer.innerHTML = '<p class="py-10 italic">Nenhum evento para hoje ('+hoje+').</p>';
                return;
            }

            const qLista = query(collection(db, "lista_eventos"), where("evento", "in", evsHoje));

            onSnapshot(qLista, (snap) => {
                listContainer.innerHTML = '';
                let total = 0, checkins = 0;
                snap.forEach(d => {
                    const data = d.data();
                    total++; if(data.entrou) checkins++;
                    const isCasal = data.tipo === 'Casal';
                    const itemDiv = document.createElement('div');
                    itemDiv.className = `item p-5 rounded-2xl border-2 text-left transition-all ${data.entrou ? 'bg-zinc-900 border-yellow-900/30 opacity-50' : 'bg-zinc-800 border-zinc-700 shadow-lg'}`;
                    itemDiv.setAttribute('data-search', `${data.nome} ${data.telefone}`.toLowerCase());
                    itemDiv.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[9px] px-2 py-0.5 rounded-md font-black uppercase tracking-tighter ${isCasal ? 'bg-yellow-600 text-black' : 'bg-zinc-600 text-zinc-100'}">
                                        ${data.tipo || 'N/A'}
                                    </span>
                                    <p class="font-bold text-base ${data.entrou ? 'text-zinc-500' : 'text-white'} uppercase">${data.nome}</p>
                                </div>
                                <p class="text-[11px] text-zinc-400 font-medium">${data.telefone}</p>
                                <div class="flex gap-2 mt-2">
                                    <span class="text-[9px] font-bold text-yellow-500 uppercase">P: ${data.promoter || 'Direto'}</span>
                                    <span class="text-[9px] font-bold text-zinc-600 uppercase tracking-widest">| ${data.evento}</span>
                                </div>
                            </div>
                            <div class="ml-4">
                                ${data.entrou ? '<span class="text-yellow-600 text-[10px] font-black border border-yellow-600/30 px-3 py-1.5 rounded-lg">NA CASA</span>' : `<button onclick="darCheckIn('${d.id}')" class="bg-yellow-500 hover:bg-yellow-600 text-black px-5 py-2.5 rounded-xl text-[11px] font-black">CHECK-IN</button>`}
                            </div>
                        </div>`;
                    listContainer.appendChild(itemDiv);
                });
                document.getElementById('tot').innerText = total;
                document.getElementById('chk').innerText = checkins;
                filtrar();
            });
        }

        window.filtrar = () => {
            const busca = document.getElementById('busca').value.toLowerCase();
            document.querySelectorAll('.item').forEach(i => i.style.display = i.getAttribute('data-search').includes(busca) ? 'block' : 'none');
        };
    </script>
</body>
</html>
