<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria - Eclub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white font-sans p-4">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold text-center mb-6 text-yellow-500 uppercase tracking-widest">Portaria Eclub</h1>

        <div class="mb-6">
            <input type="text" id="busca" onkeyup="filtrarLista()" placeholder="Pesquisar por nome ou celular..." 
                class="w-full bg-zinc-800 border border-zinc-700 p-4 rounded-xl focus:outline-none focus:border-yellow-500 text-white shadow-lg">
        </div>

        <div id="listaClientes" class="space-y-3">
            <p class="text-center text-zinc-500">Carregando lista...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FUNÇÃO PARA DAR CHECK-IN
        window.darCheckIn = async function(id, statusAtual) {
            const clienteRef = doc(db, "lista_eventos", id);
            try {
                await updateDoc(clienteRef, { entrou: !statusAtual });
            } catch (e) {
                alert("Erro ao atualizar check-in");
            }
        };

        // ESCUTA A LISTA EM TEMPO REAL
        function carregarLista() {
            const container = document.getElementById('listaClientes');
            const q = query(collection(db, "lista_eventos"), orderBy("data_cadastro", "desc"));

            onSnapshot(q, (snapshot) => {
                container.innerHTML = '';
                if (snapshot.empty) {
                    container.innerHTML = '<p class="text-center text-zinc-500">Nenhum nome na lista ainda.</p>';
                    return;
                }

                snapshot.forEach((doc) => {
                    const item = doc.data();
                    const id = doc.id;
                    const entrou = item.entrou || false;

                    const div = document.createElement('div');
                    div.className = `cliente-item p-4 rounded-xl border transition-all ${entrou ? 'bg-green-900/20 border-green-800 opacity-60' : 'bg-zinc-800 border-zinc-700'}`;
                    // Guardamos os dados de busca dentro do elemento para o filtro funcionar
                    div.setAttribute('data-busca', `${item.nome} ${item.telefone}`.toLowerCase());

                    div.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="font-bold text-lg ${entrou ? 'line-through text-green-500' : 'text-white'}">${item.nome}</p>
                                <p class="text-sm text-zinc-400">${item.telefone} | <span class="text-yellow-500/70">${item.evento}</span></p>
                            </div>
                            <button onclick="darCheckIn('${id}', ${entrou})" 
                                class="ml-4 px-4 py-2 rounded-lg font-bold text-xs uppercase transition ${entrou ? 'bg-green-600 text-white' : 'bg-zinc-700 text-zinc-300 hover:bg-yellow-500 hover:text-black'}">
                                ${entrou ? 'Check-out' : 'Check-in'}
                            </button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            });
        }

        // FUNÇÃO DE BUSCA INSTANTÂNEA
        window.filtrarLista = function() {
            const termo = document.getElementById('busca').value.toLowerCase();
            const itens = document.querySelectorAll('.cliente-item');

            itens.forEach(item => {
                const texto = item.getAttribute('data-busca');
                if (texto.includes(termo)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        };

        carregarLista();
    </script>
</body>
</html>
