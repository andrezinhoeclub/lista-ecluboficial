<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria - Eclub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white font-sans p-4">
    <div class="max-w-2xl mx-auto">
        <div class="grid grid-cols-2 gap-4 mb-6 text-xs uppercase font-bold tracking-tighter text-center">
            <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700">
                <p class="text-zinc-500 mb-1">Reservas</p>
                <p id="tot" class="text-white text-2xl">0</p>
            </div>
            <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700">
                <p class="text-zinc-500 mb-1">Na Casa</p>
                <p id="chk" class="text-green-500 text-2xl">0</p>
            </div>
        </div>

        <input type="text" id="busca" onkeyup="filtrar()" placeholder="Pesquisar por nome ou celular..." class="w-full bg-zinc-800 border border-zinc-700 p-4 rounded-xl mb-6 text-white outline-none focus:border-yellow-500 shadow-lg">
        
        <div id="lista" class="space-y-3 pb-20">
            <p class="text-center text-zinc-600">Carregando lista de hoje...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Função de Check-in
        window.darCheckIn = async (id) => {
            const ref = doc(db, "lista_eventos", id);
            try {
                await updateDoc(ref, { entrou: true });
            } catch (e) {
                alert("Erro ao confirmar entrada.");
            }
        };

        async function iniciarPortaria() {
            const hoje = new Date().toISOString().split('T')[0];
            
            // 1. Identifica eventos de hoje
            const qE = query(collection(db, "eventos"), where("data", "==", hoje));
            const snapE = await getDocs(qE);
            const evsHoje = [];
            snapE.forEach(d => evsHoje.push(d.data().nome));

            if(evsHoje.length === 0) {
                document.getElementById('lista').innerHTML = '<p class="text-center text-zinc-500 py-10 italic underline">Nenhum evento para hoje no sistema.</p>';
                return;
            }

            // 2. Escuta os nomes na lista para os eventos de hoje
            const qLista = query(collection(db, "lista_eventos"), where("evento", "in", evsHoje));

            onSnapshot(qLista, (snap) => {
                const listContainer = document.getElementById('lista');
                listContainer.innerHTML = '';
                let total = 0, checkins = 0;

                snap.forEach(d => {
                    const data = d.data();
                    total++;
                    if(data.entrou) checkins++;

                    const itemDiv = document.createElement('div');
                    const isCasal = data.tipo === 'Casal';
                    
                    itemDiv.className = `item p-4 rounded-xl border transition-all ${data.entrou ? 'bg-green-900/10 border-green-800/40 opacity-60' : 'bg-zinc-800 border-zinc-700 shadow-md'}`;
                    itemDiv.setAttribute('data-search', `${data.nome} ${data.telefone}`.toLowerCase());

                    itemDiv.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[9px] px-2 py-0.5 rounded-full font-black uppercase tracking-tighter ${isCasal ? 'bg-blue-600 text-white' : 'bg-zinc-600 text-zinc-100'}">
                                        ${data.tipo || 'Padrão'}
                                    </span>
                                    <p class="font-bold text-sm ${data.entrou ? 'text-green-500' : 'text-white'}">${data.nome}</p>
                                </div>
                                <p class="text-[11px] text-zinc-400 font-medium">${data.telefone}</p>
                                <div class="flex gap-2 mt-1">
                                    <span class="text-[9px] font-bold text-yellow-500/80 uppercase">P: ${data.promoter || 'Direto'}</span>
                                    <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">| ${data.evento}</span>
                                </div>
                            </div>
                            <div class="ml-4">
                                ${data.entrou 
                                    ? '<span class="text-green-500 text-[10px] font-black border border-green-500/30 px-2 py-1 rounded">CHECK OK</span>' 
                                    : `<button onclick="darCheckIn('${d.id}')" class="bg-yellow-500 hover:bg-yellow-600 text-black px-4 py-2 rounded-lg text-[10px] font-black shadow-lg transition-transform active:scale-95">CONFIRMAR</button>`
                                }
                            </div>
                        </div>
                    `;
                    listContainer.appendChild(itemDiv);
                });

                document.getElementById('tot').innerText = total;
                document.getElementById('chk').innerText = checkins;
                filtrar(); // Reaplica busca caso o segurança esteja digitando
            });
        }

        window.filtrar = () => {
            const busca = document.getElementById('busca').value.toLowerCase();
            document.querySelectorAll('.item').forEach(i => {
                i.style.display = i.getAttribute('data-search').includes(busca) ? 'block' : 'none';
            });
        };

        iniciarPortaria();
    </script>
</body>
</html>
