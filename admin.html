<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Portaria - Eclub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div id="loginBox" class="w-full max-w-sm bg-zinc-800 p-8 rounded-2xl shadow-2xl border border-zinc-700">
        <h1 class="text-2xl font-bold text-center mb-6 text-yellow-500 uppercase tracking-widest">Acesso Restrito</h1>
        <div class="space-y-4">
            <div>
                <label class="block text-sm mb-1 text-zinc-400">Usuário</label>
                <input type="text" id="user" class="w-full bg-zinc-700 border border-zinc-600 p-3 rounded-lg focus:outline-none focus:border-yellow-500">
            </div>
            <div>
                <label class="block text-sm mb-1 text-zinc-400">Senha</label>
                <input type="password" id="pass" class="w-full bg-zinc-700 border border-zinc-600 p-3 rounded-lg focus:outline-none focus:border-yellow-500">
            </div>
            <button onclick="fazerLogin()" id="btnLogin" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-lg transition uppercase">Entrar</button>
            <p id="erroLogin" class="text-red-500 text-sm text-center hidden">Usuário ou senha incorretos!</p>
        </div>
    </div>

    <div id="painelPortaria" class="w-full max-w-2xl mx-auto hidden self-start pt-4">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700 text-center">
                <p class="text-zinc-400 text-xs uppercase mb-1">Total Reservas</p>
                <p id="totalReservas" class="text-white font-bold text-2xl">0</p>
            </div>
            <div class="bg-green-900/30 p-4 rounded-xl border border-green-800 text-center">
                <p class="text-green-400 text-xs uppercase mb-1">Check-ins</p>
                <p id="totalCheckins" class="text-green-500 font-bold text-2xl">0</p>
            </div>
        </div>

        <div class="mb-6 flex gap-2">
            <input type="text" id="busca" onkeyup="filtrarLista()" placeholder="Pesquisar..." class="flex-1 bg-zinc-800 border border-zinc-700 p-4 rounded-xl focus:outline-none focus:border-yellow-500 text-white shadow-lg">
            <button onclick="location.reload()" class="bg-zinc-800 p-4 rounded-xl border border-zinc-700 text-zinc-400">🔄</button>
        </div>

        <div id="listaClientes" class="space-y-3 pb-10">
            <p class="text-center text-zinc-500">Carregando...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, where, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FUNÇÃO DE LOGIN
        window.fazerLogin = async function() {
            const usuario = document.getElementById('user').value;
            const senhaDigitada = document.getElementById('pass').value;
            const btn = document.getElementById('btnLogin');
            const erro = document.getElementById('erroLogin');

            if(!usuario || !senhaDigitada) return;

            btn.innerText = "VERIFICANDO...";
            
            try {
                const userRef = doc(db, "usuarios", usuario);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists() && userSnap.data().senha === senhaDigitada) {
                    document.getElementById('loginBox').classList.add('hidden');
                    document.body.classList.remove('items-center', 'justify-center');
                    document.getElementById('painelPortaria').classList.remove('hidden');
                    carregarPortaria();
                } else {
                    erro.classList.remove('hidden');
                    btn.innerText = "Entrar";
                }
            } catch (e) {
                console.error(e);
                alert("Erro na conexão!");
                btn.innerText = "Entrar";
            }
        }

        // LÓGICA DA PORTARIA
        window.darCheckIn = async function(id) {
            const clienteRef = doc(db, "lista_eventos", id);
            try { await updateDoc(clienteRef, { entrou: true }); } catch (e) { alert("Erro!"); }
        };

        async function carregarPortaria() {
            const hojeISO = new Date().toISOString().split('T')[0];
            const container = document.getElementById('listaClientes');
            
            const qEventos = query(collection(db, "eventos"), where("data", "==", hojeISO));
            const snapEventos = await getDocs(qEventos);
            const nomesEventosHoje = [];
            snapEventos.forEach(doc => nomesEventosHoje.push(doc.data().nome));

            if (nomesEventosHoje.length === 0) {
                container.innerHTML = '<p class="text-center text-zinc-500 py-10">Sem eventos hoje.</p>';
                return;
            }

            const qLista = query(collection(db, "lista_eventos"), where("evento", "in", nomesEventosHoje));

            onSnapshot(qLista, (snapshot) => {
                container.innerHTML = '';
                let total = 0, checkins = 0;

                snapshot.forEach((doc) => {
                    const item = doc.data();
                    const entrou = item.entrou || false;
                    total++; if(entrou) checkins++;

                    const div = document.createElement('div');
                    div.className = `cliente-item p-4 rounded-xl border mb-2 ${entrou ? 'bg-green-900/10 border-green-800/50 opacity-70' : 'bg-zinc-800 border-zinc-700'}`;
                    div.setAttribute('data-busca', `${item.nome} ${item.telefone}`.toLowerCase());

                    div.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="font-bold ${entrou ? 'text-green-500' : 'text-white'}">${entrou ? '✅ ' : ''}${item.nome}</p>
                                <p class="text-xs text-zinc-500">${item.telefone} | ${item.evento}</p>
                            </div>
                            <div>
                                ${entrou ? '<span class="text-green-500 text-[10px] font-bold uppercase">Check-in OK</span>' : `<button onclick="darCheckIn('${doc.id}')" class="bg-yellow-500 text-black font-bold py-2 px-3 rounded-lg text-[10px] uppercase">Confirmar</button>`}
                            </div>
                        </div>`;
                    container.appendChild(div);
                });
                document.getElementById('totalReservas').innerText = total;
                document.getElementById('totalCheckins').innerText = checkins;
                filtrarLista();
            });
        }

        window.filtrarLista = function() {
            const termo = document.getElementById('busca').value.toLowerCase();
            document.querySelectorAll('.cliente-item').forEach(item => {
                item.style.display = item.getAttribute('data-busca').includes(termo) ? 'block' : 'none';
            });
        };
    </script>
</body>
</html>
