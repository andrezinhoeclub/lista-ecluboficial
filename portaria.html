<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Master Portaria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow: hidden; }
        .glass { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .login-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        
        /* Card Ultra Slim e Elegante */
        .client-card { 
            background: linear-gradient(90deg, #0d0d0f 0%, #121214 100%);
            border: 1px solid #1a1a1c; 
            border-left: 5px solid #eab308;
            height: 110px; /* Altura fixa para caber vários na tela */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .client-card:hover { border-color: #eab308; transform: translateX(5px); background: #161618; }
        .client-card.entrou { opacity: 0.15 !important; filter: grayscale(1); pointer-events: none; }
        
        input { background: #000 !important; border: 1px solid #333 !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus { border-color: #eab308 !important; box-shadow: 0 0 20px rgba(234, 179, 8, 0.15); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
        
        .btn-liberar {
            background: #eab308;
            color: #000;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.2);
            transition: all 0.2s;
        }
        .btn-liberar:active { scale: 0.95; }

        @keyframes pulse-yellow { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .animate-pix { color: #22c55e; text-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
    </style>
</head>
<body class="flex h-screen">

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg">
        <div class="w-full max-w-sm p-10 glass rounded-[3rem] text-center border-yellow-500/20 border shadow-2xl">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">PORTARIA <span class="text-yellow-500">MASTER</span></h1>
            <div class="space-y-4">
                <input type="text" id="inputNomeUsuario" placeholder="LOGIN OPERADOR" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs">
                <div id="areaSenha" class="hidden">
                    <input type="password" id="senhaUsuario" placeholder="SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs mt-2 border-yellow-500/50">
                </div>
                <button onclick="verificarOuLogar()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl mt-4 active:scale-95 transition-all">ENTRAR</button>
            </div>
        </div>
    </div>

    <div id="interfacePrincipal" class="hidden flex w-full h-full">
        <aside class="w-64 h-full flex flex-col p-6 bg-black/40 border-r border-zinc-900">
            <div class="mb-10 text-center">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 mx-auto mb-2">
                <h2 class="text-yellow-500 font-black italic uppercase text-lg tracking-tighter">E-CLUB</h2>
                <p id="operadorAtivo" class="text-[8px] text-zinc-500 font-bold uppercase mt-4 border border-zinc-800 py-2 rounded-lg tracking-widest italic">---</p>
            </div>
            <div class="flex-grow overflow-y-auto">
                <h3 class="text-zinc-600 text-[8px] font-black uppercase mb-4 tracking-widest border-b border-zinc-900 pb-2">Status Eventos</h3>
                <div id="lista-eventos-sidebar" class="space-y-3"></div>
            </div>
            <button onclick="location.reload()" class="mt-6 text-zinc-700 text-[9px] font-black uppercase hover:text-white transition-colors">Logout</button>
        </aside>

        <main class="flex-grow flex flex-col">
            <header class="p-6 border-b border-zinc-900 bg-black/20">
                <div class="max-w-7xl mx-auto flex gap-6 items-center">
                    <div class="relative flex-grow">
                        <span class="absolute left-6 top-5 text-zinc-600">🔍</span>
                        <input type="text" id="input-busca" oninput="processarPesquisa()" placeholder="BUSCAR NOME, TELEFONE OU CPF..." class="w-full p-5 pl-16 rounded-2xl text-sm font-bold uppercase text-white">
                    </div>
                    <div class="text-right border-l border-zinc-800 pl-6 min-w-[120px]">
                        <p id="total-checkins" class="text-4xl font-black italic text-green-500 leading-none">0</p>
                        <p class="text-[7px] text-zinc-500 font-black uppercase tracking-widest mt-1">Check-ins</p>
                    </div>
                </div>
            </header>

            <section class="flex-grow p-6 overflow-y-auto bg-[#030303]">
                <div id="alertaModoTeste" class="bg-blue-500/10 border border-blue-500/30 text-blue-400 text-center font-black py-2 rounded-xl text-[9px] uppercase mb-4 hidden">
                    ⚠️ MODO DE TESTE ATIVO
                </div>
                <div id="container-resultados" class="max-w-7xl mx-auto space-y-3"></div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", authDomain: "teste-de-reserva.firebaseapp.com", projectId: "teste-de-reserva", storageBucket: "teste-de-reserva.firebasestorage.app", messagingSenderId: "163395694876", appId: "1:163395694876:web:8b1116a0483af951548ad9" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let bancoClientes = []; let bancoEventos = []; let operadorLogado = ""; let stepLogin = 0; let usuarioData = null;
        let isModoTeste = false;

        const getStatusTurno = (dataEvento) => {
            if (isModoTeste) return "ONLINE"; 
            const agora = new Date(); const hora = agora.getHours(); const hoje = agora.toLocaleDateString('en-CA'); 
            const ontemObj = new Date(agora); ontemObj.setDate(ontemObj.getDate() - 1); const ontemISO = ontemObj.toLocaleDateString('en-CA');
            if (hora >= 21 && dataEvento === hoje) return "ONLINE";
            if (hora < 5 && dataEvento === ontemISO) return "ONLINE";
            return "RESTRITO";
        };

        window.verificarOuLogar = async () => {
            const n = document.getElementById('inputNomeUsuario').value.trim().toLowerCase();
            const s = document.getElementById('senhaUsuario').value.trim();
            const btn = document.getElementById('btnAcao');
            if (stepLogin === 0) {
                btn.innerText = "VERIFICANDO...";
                const docSnap = await getDoc(doc(db, "configuracoes", n));
                if (docSnap.exists()) {
                    usuarioData = docSnap.data(); stepLogin = 1;
                    document.getElementById('areaSenha').classList.remove('hidden');
                    document.getElementById('inputNomeUsuario').readOnly = true;
                    btn.innerText = "AUTENTICAR";
                } else { btn.innerText = "ENTRAR"; alert("Operador não encontrado."); }
            } else {
                if (usuarioData.senha === s) {
                    operadorLogado = n;
                    document.getElementById('operadorAtivo').innerText = "OPERADOR: " + n.toUpperCase();
                    document.getElementById('telaLogin').classList.add('hidden');
                    document.getElementById('interfacePrincipal').classList.remove('hidden');
                    iniciarEscutas();
                } else { alert("Senha incorreta"); }
            }
        };

        function iniciarEscutas() {
            onSnapshot(doc(db, "configuracoes", "sistema"), (snap) => {
                isModoTeste = snap.exists() && snap.data().modo_teste === true;
                document.getElementById('alertaModoTeste').classList.toggle('hidden', !isModoTeste);
                if (bancoEventos.length > 0) { renderizarSidebar(); processarPesquisa(); }
            });
            onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snapEv) => {
                bancoEventos = snapEv.docs.map(d => ({id: d.id, ...d.data()}));
                onSnapshot(collection(db, "lista_eventos"), (snapCli) => {
                    bancoClientes = snapCli.docs.map(d => ({id: d.id, ...d.data()}));
                    const totalTurno = bancoClientes.filter(c => {
                        if (!c.entrou || !c.data_entrada) return false;
                        const hojeCheck = new Date(); const limite = new Date();
                        if (hojeCheck.getHours() < 5) limite.setDate(limite.getDate() - 1);
                        limite.setHours(21, 0, 0); return isModoTeste ? true : new Date(c.data_entrada) >= limite;
                    }).length;
                    document.getElementById('total-checkins').innerText = totalTurno;
                    renderizarSidebar(); processarPesquisa();
                });
            });
        }

        function renderizarSidebar() {
            const cont = document.getElementById('lista-eventos-sidebar'); cont.innerHTML = '';
            bancoEventos.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                const status = getStatusTurno(ev.data);
                const total = bancoClientes.filter(c => c.evento === ev.nome && (c.metodo !== 'pix_antecipado' || c.pago === true)).length;
                cont.innerHTML += `
                    <div class="p-3 rounded-xl glass border-l-2 ${status === 'ONLINE' ? 'border-l-green-500' : 'border-l-zinc-800 opacity-60'} mb-2">
                        <h4 class="text-[9px] font-black uppercase text-white truncate">${ev.nome}</h4>
                        <div class="flex justify-between items-center mt-1">
                            <span class="text-[7px] font-bold ${status === 'ONLINE' ? 'text-green-500' : 'text-zinc-600'} uppercase">${status === 'ONLINE' ? '● ONLINE' : '🔒 RESTRITO'}</span>
                            <span class="text-sm font-black text-yellow-500">${total}</span>
                        </div>
                    </div>`;
            });
        }

        window.processarPesquisa = () => {
            const busca = document.getElementById('input-busca').value.trim().toUpperCase();
            const cont = document.getElementById('container-resultados');
            if (busca.length < 2) { cont.innerHTML = ''; return; }
            
            const filtrados = bancoClientes.filter(c => {
                const evRel = bancoEventos.find(e => (e.nome || '').trim().toUpperCase() === (c.evento || '').trim().toUpperCase());
                if (!isModoTeste && (!evRel || getStatusTurno(evRel.data) !== "ONLINE")) return false;
                const n = String(c.nome ?? '').toUpperCase().includes(busca);
                const t = String(c.tel ?? '').includes(busca) || String(c.telefone ?? '').includes(busca);
                const cpf = String(c.cpf ?? '').replace(/\D/g, '').includes(busca.replace(/\D/g, ''));
                return n || t || cpf;
            });

            if (filtrados.length === 0) { cont.innerHTML = `<div class="py-20 text-center font-black uppercase text-zinc-800 italic">Nenhum cliente ativo encontrado</div>`; return; }

            cont.innerHTML = '';
            filtrados.sort((a,b) => a.entrou - b.entrou).forEach(c => {
                const ev = bancoEventos.find(e => (e.nome || '').trim().toUpperCase() === (c.evento || '').trim().toUpperCase()) || {};
                const tipoNorm = (c.tipo_entrada || '').toUpperCase().trim();
                const isCasal = tipoNorm === "CASAL" || /\s+E\s+/i.test(c.nome);
                const isDono = tipoNorm === "VIP_DONO";
                const isAniv = c.aniversariante && c.aniversariante.trim() !== "";

                let valorFinal = "PORTARIA";
                if (isDono) valorFinal = "FREE";
                else if (tipoNorm.includes("CAMAROTE")) valorFinal = "R$ " + (c.valor_pago || "---");
                else {
                    let val = isAniv ? (isCasal ? ev.desc_casal : ev.desc_solteiro) : (c.metodo === "pix_antecipado" ? (c.valor_pago || (isCasal ? ev.ant_casal : ev.ant_solteiro)) : (isCasal ? ev.valor_casal : ev.valor_solteiro));
                    valorFinal = val ? (String(val).toUpperCase().includes('R$') ? val : "R$ " + val) : "PORTARIA";
                }

                cont.innerHTML += `
                <div class="client-card p-4 rounded-[1.5rem] flex items-center justify-between ${c.entrou ? 'entrou' : ''}">
                    
                    <div class="flex flex-col justify-center min-w-[350px]">
                        <div class="flex items-center gap-3">
                            <h3 class="text-xl font-black uppercase italic tracking-tighter text-white truncate">${c.nome}</h3>
                            <span class="bg-zinc-900 text-[8px] px-2 py-0.5 rounded-md font-black text-zinc-500 uppercase">${c.promoter || 'DIRETO'}</span>
                        </div>
                        <p class="text-xl font-black text-zinc-400 font-mono tracking-tighter">${c.tel || c.telefone || ''}</p>
                    </div>

                    <div class="flex flex-col gap-1 min-w-[180px] border-l border-white/5 pl-6">
                        ${tipoNorm.includes("CAMAROTE") ? `<span class="bg-cyan-400 text-black px-2 py-0.5 rounded text-[9px] font-black uppercase text-center shadow-[0_0_10px_rgba(34,211,238,0.4)]">💎 ${tipoNorm}</span>` : ''}
                        <span class="bg-purple-900/30 text-purple-400 border border-purple-500/20 px-2 py-0.5 rounded text-[9px] font-black uppercase text-center">${isCasal ? '👫 CASAL' : '👤 SOLTEIRO'}</span>
                        ${isAniv ? `<span class="bg-fuchsia-500/10 text-fuchsia-400 px-2 py-0.5 rounded text-[8px] font-black uppercase text-center">🎉 ANIV: ${c.aniversariante}</span>` : ''}
                    </div>

                    <div class="flex items-center flex-grow justify-end gap-12 pr-6 border-r border-white/5 mr-6">
                        <div class="text-center">
                            <p class="text-[7px] text-zinc-500 font-black uppercase tracking-widest">PAGAMENTO</p>
                            <h4 class="text-xl font-black italic ${(c.metodo === 'pix_antecipado' && c.pago) ? 'text-green-500 animate-pix' : 'text-zinc-600'}">
                                ${(c.metodo === 'pix_antecipado' && c.pago) ? 'PIX PAGO' : 'PORTARIA'}
                            </h4>
                        </div>
                        <div class="text-right">
                            <p class="text-[7px] text-zinc-500 font-black uppercase tracking-widest">TOTAL A PAGAR</p>
                            <p class="text-2xl font-black italic ${isDono ? 'text-green-500' : 'text-white'} leading-none">${valorFinal}</p>
                        </div>
                    </div>

                    <div class="min-w-[160px] flex justify-end">
                        ${c.entrou ? 
                            '<span class="text-green-500 font-black uppercase text-[10px] tracking-widest">✓ CONFIRMADO</span>' : 
                            (c.metodo === 'pix_antecipado' && !c.pago ? 
                                '<span class="text-red-500 font-black uppercase text-[10px] animate-pulse">PIX PENDENTE</span>' : 
                                `<button onclick="confirmarCheckin('${c.id}')" class="btn-liberar px-8 py-3 rounded-xl font-black uppercase italic text-xs">LIBERAR</button>`)
                        }
                    </div>
                </div>`;
            });
        };

        window.confirmarCheckin = async (id) => {
            await updateDoc(doc(db, "lista_eventos", id), { entrou: true, porteiro: operadorLogado, data_entrada: new Date().toISOString() });
        };
    </script>
</body>
</html>
