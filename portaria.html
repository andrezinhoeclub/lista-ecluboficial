<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Master Portaria</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow: hidden; }
        .glass { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .login-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        
        .client-card { 
            background: #0d0d0f; 
            border: 1px solid #1a1a1c; 
            border-left: 4px solid #eab308;
            transition: all 0.2s ease;
        }
        .client-card:hover { background: #16161a; border-color: #333; }
        .client-card.entrou { opacity: 0.3 !important; filter: grayscale(1); pointer-events: none; }
        
        input { background: #000 !important; border: 1px solid #333 !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus { border-color: #eab308 !important; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        @keyframes pulse-green { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-online { animation: pulse-green 1.5s infinite; color: #22c55e; font-weight: 900; }
        
        .btn-liberar { background: #eab308; color: #000; transition: all 0.2s; }
        .btn-liberar:hover { background: #fbbf24; transform: translateY(-1px); }
    </style>
</head>
<body class="flex h-screen relative">

    <div id="toast-aviso" class="fixed top-4 left-1/2 -translate-x-1/2 z-[10001] text-white font-black text-[10px] uppercase tracking-widest px-6 py-4 rounded-2xl shadow-2xl transition-all duration-300 transform -translate-y-32 opacity-0 flex items-center gap-3 w-max max-w-sm pointer-events-none">
        <span id="toast-icon" class="text-lg">⚠️</span>
        <span id="toast-msg">Mensagem de erro</span>
    </div>

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg">
        <div class="w-full max-w-sm p-10 glass rounded-[3rem] text-center border-yellow-500/20 border shadow-2xl">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">PORTARIA <span class="text-yellow-500">MASTER</span></h1>
            <div class="space-y-4">
                <input type="text" id="inputNomeUsuario" placeholder="LOGIN OPERADOR" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs outline-none focus:border-yellow-500 transition-all">
                <div id="areaSenha" class="hidden">
                    <input type="password" id="senhaUsuario" placeholder="SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs mt-2 border-yellow-500/50 outline-none focus:border-yellow-500 transition-all">
                </div>
                <button onclick="verificarOuLogar()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl mt-4 active:scale-95 transition-all">ENTRAR</button>
            </div>
        </div>
    </div>

    <div id="interfacePrincipal" class="hidden flex w-full h-full">
        <aside class="w-72 h-full flex flex-col p-6 bg-black/40 border-r border-zinc-900">
            <div class="mb-10 text-center">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 mx-auto mb-2">
                <h2 class="text-yellow-500 font-black italic uppercase text-lg tracking-tighter">E-CLUB</h2>
                <p id="operadorAtivo" class="text-[8px] text-zinc-500 font-bold uppercase mt-4 border border-zinc-800 py-2 rounded-lg tracking-widest italic">---</p>
            </div>
            
            <div class="flex-grow overflow-y-auto">
                <h3 class="text-zinc-600 text-[8px] font-black uppercase mb-4 tracking-widest border-b border-zinc-900 pb-2">Status Eventos</h3>
                <div id="lista-eventos-sidebar" class="space-y-3"></div>
            </div>
            
            <div class="mt-6 flex flex-col gap-4 border-t border-zinc-900 pt-6">
                <!-- BOTÃO DE SAIR AGORA CHAMA UMA FUNÇÃO PARA LIMPAR A SESSÃO -->
                <button onclick="fazerLogout()" class="text-zinc-700 text-[9px] font-black uppercase hover:text-red-500 transition-colors w-full text-center">Sair do Sistema</button>
                
                <div class="text-center opacity-30 hover:opacity-100 transition-all pt-4">
                    <a href="https://www.instagram.com/andrezinhoeclub/" target="_blank" class="inline-flex flex-col items-center justify-center gap-1 group">
                        <span class="text-[8px] font-black uppercase tracking-widest text-zinc-500 group-hover:text-yellow-500 transition-colors">⚡ DESENVOLVIDO POR ANDREZINHO E-CLUB</span>
                    </a>
                </div>
            </div>
        </aside>

        <main class="flex-grow flex flex-col">
            <header class="p-6 border-b border-zinc-900 bg-black/20">
                <div class="max-w-[1400px] mx-auto flex gap-6 items-center">
                    <div class="relative flex-grow">
                        <span class="absolute left-6 top-5 text-zinc-600">🔍</span>
                        <input type="text" id="input-busca" oninput="processarPesquisa()" placeholder="BUSCAR NOME, TELEFONE OU CPF..." class="w-full p-5 pl-16 rounded-2xl text-sm font-bold uppercase text-white shadow-lg">
                    </div>
                    <div class="text-right border-l border-zinc-800 pl-6 min-w-[120px]">
                        <p id="total-checkins" class="text-4xl font-black italic text-green-500 leading-none">0</p>
                        <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest mt-1">Check-ins</p>
                    </div>
                </div>
            </header>

            <section class="flex-grow p-6 overflow-y-auto bg-[#030303]">
                <div id="alertaModoTeste" class="bg-blue-500/10 border border-blue-500/30 text-blue-400 text-center font-black py-2 rounded-xl text-[10px] uppercase mb-6 hidden">
                    ⚠️ MODO DE TESTE ATIVO - BUSCA LIBERADA PARA TODOS OS EVENTOS
                </div>
                <div id="container-resultados" class="max-w-[1400px] mx-auto space-y-3"></div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", authDomain: "teste-de-reserva.firebaseapp.com", projectId: "teste-de-reserva", storageBucket: "teste-de-reserva.firebasestorage.app", messagingSenderId: "163395694876", appId: "1:163395694876:web:8b1116a0483af951548ad9" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let bancoClientes = []; let bancoEventos = []; let operadorLogado = ""; let stepLogin = 0; let usuarioData = null;
        let isModoTeste = false; let listenerSessao = null;

        window.mostrarAviso = (msg, isSucesso = false) => {
            const toast = document.getElementById('toast-aviso');
            const bgClass = isSucesso ? 'bg-green-600' : 'bg-red-600';
            const shadowClass = isSucesso ? 'shadow-[0_0_20px_rgba(22,163,74,0.5)]' : 'shadow-[0_0_20px_rgba(220,38,38,0.5)]';
            const icon = isSucesso ? '✅' : (msg.includes('ACESSO') ? '👋' : '⚠️');
            
            toast.className = `fixed top-4 left-1/2 -translate-x-1/2 z-[10001] text-white font-black text-[10px] uppercase tracking-widest px-6 py-4 rounded-2xl transition-all duration-300 transform -translate-y-32 opacity-0 flex items-center gap-3 w-max max-w-sm pointer-events-none ${bgClass} ${shadowClass}`;
            
            document.getElementById('toast-icon').innerText = icon;
            document.getElementById('toast-msg').innerText = msg;
            
            setTimeout(() => { toast.classList.remove('-translate-y-32', 'opacity-0'); toast.classList.add('translate-y-0', 'opacity-100'); }, 10);
            setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('-translate-y-32', 'opacity-0'); }, 4000);
        };

        const getStatusTurno = (dataEvento) => {
            if (isModoTeste) return "ONLINE"; 
            const agora = new Date(); const hora = agora.getHours(); const hoje = agora.toLocaleDateString('en-CA'); 
            const ontemObj = new Date(agora); ontemObj.setDate(ontemObj.getDate() - 1); const ontemISO = ontemObj.toLocaleDateString('en-CA');
            if (hora >= 21 && dataEvento === hoje) return "ONLINE";
            if (hora < 5 && dataEvento === ontemISO) return "ONLINE";
            return "RESTRITO";
        };

        window.verificarOuLogar = async () => {
            const n = document.getElementById('inputNomeUsuario').value.trim().toLowerCase();
            const s = document.getElementById('senhaUsuario').value.trim();
            const btn = document.getElementById('btnAcao');
            const inputSenha = document.getElementById('senhaUsuario');

            if (stepLogin === 0) {
                if(!n) return mostrarAviso("Digite o login do operador!");
                
                btn.innerText = "VERIFICANDO...";
                const docSnap = await getDoc(doc(db, "configuracoes", n));
                
                if (docSnap.exists()) {
                    usuarioData = docSnap.data(); stepLogin = 1;
                    document.getElementById('areaSenha').classList.remove('hidden');
                    document.getElementById('inputNomeUsuario').readOnly = true;
                    
                    if (!usuarioData.senha) {
                        mostrarAviso("👋 PRIMEIRO ACESSO: Crie sua senha agora!", true);
                        inputSenha.placeholder = "CRIE UMA SENHA (MÍN. 6)";
                        inputSenha.style.borderColor = "#eab308";
                        btn.innerText = "SALVAR SENHA E ENTRAR";
                    } else {
                        btn.innerText = "AUTENTICAR";
                    }
                } else { 
                    btn.innerText = "ENTRAR"; 
                    mostrarAviso("Operador não encontrado."); 
                }
            } else {
                if(!s) return mostrarAviso("Digite a sua senha!");

                if (!usuarioData.senha) {
                    if (s.length < 6) return mostrarAviso("A senha deve ter no mínimo 6 caracteres.");
                    btn.innerText = "SALVANDO...";
                    await updateDoc(doc(db, "configuracoes", n), { senha: s });
                    usuarioData.senha = s;
                }

                if (usuarioData.senha === s) {
                    // ====== NOVA LÓGICA DE SESSÃO ÚNICA ======
                    const meuToken = Math.random().toString(36).substring(2) + Date.now().toString(36);
                    localStorage.setItem('sessao_eclub_master', meuToken);

                    await updateDoc(doc(db, "configuracoes", n), { 
                        ultimo_login: new Date().toISOString(),
                        token_sessao: meuToken 
                    });
                    
                    operadorLogado = n;
                    document.getElementById('operadorAtivo').innerText = "OPERADOR: " + n.toUpperCase();
                    document.getElementById('telaLogin').classList.add('hidden');
                    document.getElementById('interfacePrincipal').classList.remove('hidden');
                    
                    iniciarEscutas();
                    
                    // Fica escutando se alguém fizer login com essa conta em outro PC
                    listenerSessao = onSnapshot(doc(db, "configuracoes", n), (docSnap) => {
                        if (docSnap.exists()) {
                            const tokenBanco = docSnap.data().token_sessao;
                            const meuTokenLocal = localStorage.getItem('sessao_eclub_master');
                            // Se o token no banco mudou e não é vazio, fui derrubado!
                            if (tokenBanco && tokenBanco !== meuTokenLocal) {
                                document.getElementById('interfacePrincipal').classList.add('hidden');
                                document.getElementById('telaLogin').classList.remove('hidden');
                                
                                // Resetando formulário de login
                                stepLogin = 0;
                                document.getElementById('inputNomeUsuario').value = '';
                                document.getElementById('senhaUsuario').value = '';
                                document.getElementById('areaSenha').classList.add('hidden');
                                document.getElementById('inputNomeUsuario').readOnly = false;
                                document.getElementById('btnAcao').innerText = "ENTRAR";
                                localStorage.removeItem('sessao_eclub_master');
                                
                                // Mostra a mensagem vermelha de expulsão
                                mostrarAviso("🚨 VOCÊ FOI DESCONECTADO! O usuário foi logado em outro computador.");
                                if(listenerSessao) listenerSessao(); // Para de escutar para não bugar
                            }
                        }
                    });

                } else { 
                    mostrarAviso("Senha incorreta"); 
                    btn.innerText = "AUTENTICAR";
                }
            }
        };

        // ====== FUNÇÃO PARA SAIR E LIMPAR A SESSÃO CORRETAMENTE ======
        window.fazerLogout = async () => {
            if (operadorLogado) {
                try {
                    // Apaga o token do banco, liberando o usuário limpo
                    await updateDoc(doc(db, "configuracoes", operadorLogado), { token_sessao: "" });
                } catch(e) {}
            }
            localStorage.removeItem('sessao_eclub_master');
            location.reload();
        };

        function iniciarEscutas() {
            onSnapshot(doc(db, "configuracoes", "sistema"), (snap) => {
                isModoTeste = snap.exists() && snap.data().modo_teste === true;
                document.getElementById('alertaModoTeste').classList.toggle('hidden', !isModoTeste);
                if (bancoEventos.length > 0) { renderizarSidebar(); processarPesquisa(); }
            });
            onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snapEv) => {
                bancoEventos = snapEv.docs.map(d => ({id: d.id, ...d.data()}));
                onSnapshot(collection(db, "lista_eventos"), (snapCli) => {
                    bancoClientes = snapCli.docs.map(d => ({id: d.id, ...d.data()}));
                    
                    const totalTurno = bancoClientes.filter(c => {
                        if (!c.entrou || !c.data_entrada) return false;
                        const diffHoras = (new Date() - new Date(c.data_entrada)) / (1000 * 60 * 60);
                        return diffHoras <= 12; 
                    }).length;
                    
                    document.getElementById('total-checkins').innerText = totalTurno;
                    renderizarSidebar(); processarPesquisa();
                });
            });
        }

        function renderizarSidebar() {
            const cont = document.getElementById('lista-eventos-sidebar'); cont.innerHTML = '';
            bancoEventos.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                const status = getStatusTurno(ev.data);
                const total = bancoClientes.filter(c => c.evento === ev.nome && (c.metodo !== 'pix_antecipado' || String(c.pago) === 'true')).length;
                cont.innerHTML += `
                    <div class="p-3 rounded-xl glass border-l-2 ${status === 'ONLINE' ? 'border-l-green-500' : 'border-l-zinc-800 opacity-60'} mb-2">
                        <h4 class="text-[10px] font-black uppercase text-white truncate">${ev.nome}</h4>
                        <div class="flex justify-between items-center mt-1">
                            <span class="text-[7px] font-bold ${status === 'ONLINE' ? 'text-green-500 animate-online' : 'text-zinc-600'} uppercase">${status === 'ONLINE' ? '● ONLINE' : '🔒 RESTRITO'}</span>
                            <span class="text-sm font-black text-yellow-500">${total}</span>
                        </div>
                    </div>`;
            });
        }

        window.copiarTelefoneLimpo = (numeroRaw) => {
            if (!numeroRaw) return;
            const apenasNumeros = String(numeroRaw).replace(/\D/g, ''); 
            if (apenasNumeros.length === 0) return;

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(apenasNumeros).then(() => {
                    mostrarAviso("Telefone copiado!", true);
                }).catch(() => fallbackCopia(apenasNumeros));
            } else {
                fallbackCopia(apenasNumeros);
            }
        };

        function fallbackCopia(texto) {
            const textArea = document.createElement("textarea");
            textArea.value = texto;
            textArea.style.position = "fixed"; 
            document.body.appendChild(textArea);
            textArea.focus(); textArea.select();
            try {
                document.execCommand('copy');
                mostrarAviso("Telefone copiado!", true);
            } catch (err) {
                mostrarAviso("Erro ao copiar.");
            }
            document.body.removeChild(textArea);
        }

        window.processarPesquisa = () => {
            const buscaInput = document.getElementById('input-busca').value.trim().toUpperCase();
            const cont = document.getElementById('container-resultados');
            
            if (buscaInput.length < 2) { cont.innerHTML = ''; return; }
            
            const termosBusca = buscaInput.split(/\s+/);
            
            const filtrados = bancoClientes.filter(c => {
                const evRel = bancoEventos.find(e => (e.nome || '').trim().toUpperCase() === (c.evento || '').trim().toUpperCase());
                if (!isModoTeste && (!evRel || getStatusTurno(evRel.data) !== "ONLINE")) return false;
                
                if (c.metodo === 'pix_antecipado' && String(c.pago) !== 'true') return false;
                
                const nomeString = String(c.nome ?? '').toUpperCase();
                const telString = String(c.tel ?? '') + " " + String(c.telefone ?? '');
                const telNumeros = telString.replace(/\D/g, ''); 
                const cpfNumeros = String(c.cpf ?? '').replace(/\D/g, ''); 
                
                const todosOsDadosDoCliente = `${nomeString} ${telString} ${telNumeros} ${cpfNumeros}`;
                return termosBusca.every(termo => todosOsDadosDoCliente.includes(termo));
            });

            if (filtrados.length === 0) { cont.innerHTML = `<div class="py-20 text-center font-black uppercase text-zinc-700 text-sm">Nenhum cliente encontrado na busca</div>`; return; }

            cont.innerHTML = '';
            filtrados.sort((a,b) => a.entrou - b.entrou).forEach(c => {
                const ev = bancoEventos.find(e => (e.nome || '').trim().toUpperCase() === (c.evento || '').trim().toUpperCase()) || {};
                const tipoNorm = (c.tipo_entrada || '').toUpperCase().trim();
                const pagPorta = (c.pagamento_porta || '').toUpperCase(); 
                
                const isCasal = tipoNorm.includes("CASAL") || /\s+E\s+/i.test(c.nome);
                const isDono = tipoNorm === "VIP_DONO" || c.is_dono === true || pagPorta === "ISENTO";
                const isCortesia = c.cortesia === true;
                const isAniv = c.aniversariante && c.aniversariante.trim() !== "";
                const isPix = c.metodo === 'pix_antecipado';

                let valorFinal = "PORTARIA";
                if (isDono) { valorFinal = "FREE"; } 
                else if (tipoNorm.includes("CAMAROTE")) {
                    if (isCortesia && pagPorta && pagPorta !== "ISENTO") {
                        let val = pagPorta === "CASAL" ? ev.valor_casal : ev.valor_solteiro;
                        valorFinal = val ? (String(val).toUpperCase().includes('R$') ? val : "R$ " + val) : "PORTARIA";
                    } else { valorFinal = "R$ " + (c.valor_pago || "---"); }
                } else {
                    let val = isAniv ? (isCasal ? ev.desc_casal : ev.desc_solteiro) : (isPix ? (c.valor_pago || (isCasal ? ev.ant_casal : ev.ant_solteiro)) : (isCasal ? ev.valor_casal : ev.valor_solteiro));
                    valorFinal = val ? (String(val).toUpperCase().includes('R$') ? val : "R$ " + val) : "PORTARIA";
                }

                const textoPagamento = isPix ? 'PIX PAGO' : 'PORTARIA';
                const corPagamento = isPix ? 'text-green-500' : 'text-zinc-500';

                let tagsHTML = ''; const ehCasalFinal = isCasal || pagPorta === 'CASAL';

                if (isDono) { tagsHTML += `<span class="bg-green-900/30 text-green-400 border border-green-500/20 px-2 py-0.5 rounded text-[9px] font-black uppercase text-center">👑 DONO</span>`; } 
                else if (ehCasalFinal) { tagsHTML += `<span class="bg-fuchsia-900/30 text-fuchsia-400 border border-fuchsia-500/20 px-2 py-0.5 rounded text-[9px] font-black uppercase text-center">👫 CASAL</span>`; } 
                else { tagsHTML += `<span class="bg-blue-900/30 text-blue-400 border border-blue-500/20 px-2 py-0.5 rounded text-[9px] font-black uppercase text-center">👤 SOLTEIRO</span>`; }

                if (tipoNorm.includes("CAMAROTE")) { tagsHTML += `<span class="bg-cyan-900/30 text-cyan-400 border border-cyan-500/20 px-2 py-0.5 rounded text-[8px] font-black uppercase text-center truncate">💎 ${tipoNorm}</span>`; }

                if (!isDono) {
                    if (tipoNorm.includes("CAMAROTE")) {
                        if (isPix) { tagsHTML += `<span class="bg-emerald-900/30 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded text-[8px] font-black uppercase text-center">🍹 100% CONSUMAÇÃO</span>`; } 
                        else if (isCortesia && pagPorta && pagPorta !== 'ISENTO') { tagsHTML += `<span class="bg-purple-900/30 text-purple-400 border border-purple-500/20 px-2 py-0.5 rounded text-[8px] font-black uppercase text-center">🎁 CORTESIA</span>`; }
                    } else {
                        if (isPix) {
                            if (tipoNorm === 'CASAL CONSUMAÇÃO') { tagsHTML += `<span class="bg-emerald-900/30 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded text-[8px] font-black uppercase text-center">🍹 100% CONSUMAÇÃO</span>`; } 
                            else { tagsHTML += `<span class="bg-orange-900/30 text-orange-400 border border-orange-500/20 px-2 py-0.5 rounded text-[8px] font-black uppercase text-center">🎟️ ENTRADA SECA</span>`; }
                        }
                    }
                }

                if (isAniv) { tagsHTML += `<span class="bg-purple-900/30 text-purple-400 border border-purple-500/20 px-2 py-0.5 rounded text-[8px] font-black uppercase text-center truncate">🎉 ANIV: ${c.aniversariante}</span>`; }

                const numTel = c.tel || c.telefone || '';
                const btnCopiar = numTel ? `<button onclick="copiarTelefoneLimpo('${numTel}')" class="bg-zinc-800/80 hover:bg-zinc-700 border border-zinc-700 text-zinc-400 text-[8px] font-black uppercase px-2 py-1 rounded transition-colors active:scale-95" title="Copiar apenas os números">📋 COPIAR</button>` : '';

                cont.innerHTML += `
                <div class="client-card p-4 rounded-2xl flex items-center justify-between gap-4 ${c.entrou ? 'entrou' : ''}">
                    <div class="flex-1 min-w-[250px] max-w-[400px]">
                        <div class="flex items-center gap-2 mb-1">
                            <h3 class="text-lg font-black uppercase text-white truncate">${c.nome}</h3>
                            <span class="bg-zinc-800 text-[8px] px-2 py-0.5 rounded text-zinc-400 font-bold uppercase whitespace-nowrap">${c.promoter || 'DIRETO'}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <p class="text-sm font-mono text-zinc-500">${numTel || '---'}</p>
                            ${btnCopiar}
                        </div>
                    </div>
                    <div class="flex flex-col gap-1 w-[140px]">${tagsHTML}</div>
                    <div class="flex-1 border-l border-white/5 pl-4 flex items-center gap-4 min-w-[300px]">
                        <div class="w-[100px]">
                            <p class="text-[8px] text-zinc-600 font-bold uppercase tracking-widest mb-1">Pagamento</p>
                            <p class="text-xs font-black ${corPagamento}">${textoPagamento}</p>
                        </div>
                        <div class="flex-1 pr-4">
                            <p class="text-[8px] text-zinc-600 font-bold uppercase tracking-widest mb-1">Info / Total</p>
                            <p class="text-sm font-bold ${isDono ? 'text-green-500' : 'text-yellow-500'} leading-tight uppercase break-words whitespace-normal">${valorFinal}</p>
                        </div>
                    </div>
                    <div class="w-[130px] flex justify-end shrink-0 border-l border-white/5 pl-4">
                        ${c.entrou ? '<span class="text-green-500 font-black uppercase text-[10px]">✓ OK</span>' : `<button onclick="confirmarCheckin('${c.id}', '${numTel}')" class="btn-liberar px-6 py-3 rounded-xl font-black uppercase text-xs w-full">LIBERAR</button>`}
                    </div>
                </div>`;
            });
        };

        window.confirmarCheckin = async (id, telefone) => {
            try {
                let copiouSucesso = false;
                if (telefone) {
                    const apenasNumeros = String(telefone).replace(/\D/g, '');
                    if (apenasNumeros.length > 0) {
                        try {
                            if (navigator.clipboard && window.isSecureContext) { await navigator.clipboard.writeText(apenasNumeros); copiouSucesso = true; } 
                            else {
                                const textArea = document.createElement("textarea"); textArea.value = apenasNumeros; textArea.style.position = "fixed"; document.body.appendChild(textArea);
                                textArea.focus(); textArea.select(); document.execCommand('copy'); document.body.removeChild(textArea); copiouSucesso = true;
                            }
                        } catch (err) {}
                    }
                }

                await updateDoc(doc(db, "lista_eventos", id), { entrou: true, porteiro: operadorLogado, data_entrada: new Date().toISOString() });
                
                if (copiouSucesso) { mostrarAviso("CHECK-IN OK E TELEFONE COPIADO!", true); } 
                else { mostrarAviso("Check-in confirmado!", true); }
                
                const campoBusca = document.getElementById('input-busca');
                campoBusca.value = ''; processarPesquisa(); campoBusca.focus(); 
            } catch(e) { mostrarAviso("Erro ao confirmar check-in."); }
        };
    </script>
</body>
</html>
