<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-title" content="Portaria E-CLUB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <link rel="apple-touch-icon" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <link rel="manifest" href="manifest.json">
    
    <title>E-CLUB | Portaria Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow: hidden; }
        .glass { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .login-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .client-card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .client-card.entrou { opacity: 0.2 !important; filter: grayscale(1); pointer-events: none; }
        input { background: #000 !important; border: 1px solid #333 !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus { border-color: #eab308 !important; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
        .badge-casal { background: #eab308; color: #000; }
        .badge-solteiro { background: #3b82f6; color: #fff; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .btn-copy { background: rgba(255,255,255,0.05); transition: 0.2s; }
        .btn-copy:hover { background: rgba(255,255,255,0.2); color: #eab308; }
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .animate-free { animation: pulse-green 1.5s infinite; color: #22c55e; font-weight: 900; }
    </style>
</head>
<body class="flex h-screen">

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg text-white">
        <div class="w-full max-w-sm p-10 glass rounded-[3rem] text-center border-yellow-500/20 border">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">PORTARIA <span class="text-yellow-500">E-CLUB</span></h1>
            <div class="space-y-4">
                <input type="text" id="inputNomeUsuario" placeholder="USUÁRIO" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs text-white">
                <div id="areaSenha" class="hidden">
                    <input type="password" id="senhaUsuario" placeholder="SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs mt-2 border-yellow-500/50 text-white text-white">
                </div>
                <button onclick="verificarOuLogar()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl mt-4">ENTRAR</button>
            </div>
        </div>
    </div>

    <div id="interfacePrincipal" class="hidden flex w-full h-full text-white">
        <aside class="w-80 h-full flex flex-col p-6 bg-black/50 border-r border-zinc-900">
            <div class="mb-10 text-center">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 mx-auto mb-2">
                <h2 class="text-yellow-500 font-black italic uppercase text-lg tracking-tighter">E-CLUB</h2>
                <p id="operadorAtivo" class="text-[9px] text-zinc-500 font-bold uppercase mt-2 border border-zinc-800 py-1 rounded-lg italic text-white text-white text-white">---</p>
            </div>
            <div class="flex-grow overflow-y-auto">
                <h3 class="text-zinc-600 text-[9px] font-black uppercase mb-4 tracking-[0.2em]">Monitor de Eventos</h3>
                <div id="lista-eventos-sidebar" class="space-y-3"></div>
            </div>
            <button onclick="location.reload()" class="mt-6 text-zinc-700 text-[9px] font-black uppercase hover:text-white transition-colors text-white text-white text-white">Sair</button>
        </aside>

        <main class="flex-grow flex flex-col">
            <header class="p-8 border-b border-zinc-900 bg-black/20 text-white">
                <div class="max-w-5xl mx-auto flex gap-8 items-center text-white">
                    <div class="relative flex-grow">
                        <span class="absolute left-6 top-5 text-zinc-600">🔍</span>
                        <input type="text" id="input-busca" oninput="processarPesquisa()" placeholder="PESQUISAR CLIENTE..." class="w-full p-6 pl-14 rounded-[2rem] text-sm font-bold uppercase text-white">
                    </div>
                    <div class="text-right border-l border-zinc-800 pl-8 min-w-[120px]">
                        <p id="total-checkins" class="text-4xl font-black italic leading-none text-green-500">0</p>
                        <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest mt-2 text-white">Check-ins Hoje</p>
                    </div>
                </div>
            </header>
            <section class="flex-grow p-8 overflow-y-auto bg-[#030303]">
                <div id="container-resultados" class="max-w-5xl mx-auto text-white"></div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('service-worker.js'); }

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let bancoClientes = []; let bancoEventos = []; let operadorLogado = ""; let stepLogin = 0; let usuarioData = null;

        window.verificarOuLogar = async () => {
            const n = document.getElementById('inputNomeUsuario').value.trim().toLowerCase();
            const s = document.getElementById('senhaUsuario').value.trim();
            if (stepLogin === 0) {
                const docSnap = await getDoc(doc(db, "configuracoes", n));
                if (docSnap.exists()) {
                    usuarioData = docSnap.data();
                    stepLogin = 1;
                    document.getElementById('areaSenha').classList.remove('hidden');
                    document.getElementById('inputNomeUsuario').readOnly = true;
                    document.getElementById('btnAcao').innerText = "ENTRAR";
                }
            } else {
                if (usuarioData.senha === s) logarSucesso(n);
            }
        };

        function logarSucesso(n) {
            operadorLogado = n;
            document.getElementById('operadorAtivo').innerText = "OPERADOR: " + n.toUpperCase();
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('interfacePrincipal').classList.remove('hidden');
            iniciarEscutas();
        }

        const obterStatusEvento = (dataEvento) => {
            const agora = new Date();
            const festa = new Date(dataEvento + "T21:00:00");
            const limite = new Date(festa);
            limite.setHours(limite.getHours() + 8); 
            
            if (agora >= festa && agora <= limite) return "LIBERADO";
            if (agora < festa) return "BLOQUEADO";
            return "ENCERRADO";
        };

        function iniciarEscutas() {
            onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snapEv) => {
                bancoEventos = snapEv.docs.map(d => ({id: d.id, ...d.data()})).filter(ev => {
                    return obterStatusEvento(ev.data) !== "ENCERRADO";
                });

                onSnapshot(collection(db, "lista_eventos"), (snapCli) => {
                    bancoClientes = snapCli.docs.map(d => ({id: d.id, ...d.data()}));
                    document.getElementById('total-checkins').innerText = bancoClientes.filter(c => c.entrou && bancoEventos.some(e => e.nome === c.evento)).length;
                    processarPesquisa();
                    renderizarSidebar();
                });
            });
        }

        function renderizarSidebar() {
            const cont = document.getElementById('lista-eventos-sidebar');
            cont.innerHTML = '';
            if(bancoEventos.length === 0) {
                cont.innerHTML = '<p class="text-[10px] text-zinc-600 font-bold uppercase italic mt-4 text-white">Nenhum evento ativo.</p>';
                return;
            }
            bancoEventos.forEach(ev => {
                const totalReservas = bancoClientes.filter(c => c.evento === ev.nome).length;
                const status = obterStatusEvento(ev.data);
                const isLiberado = status === "LIBERADO";
                
                cont.innerHTML += `
                    <div class="p-4 rounded-2xl glass border-l-4 ${isLiberado ? 'border-l-green-500 shadow-[0_0_15px_rgba(34,197,94,0.1)]' : 'border-l-zinc-700'} mb-2 text-white">
                        <h4 class="text-[10px] font-black uppercase text-white truncate text-white">${ev.nome}</h4>
                        <div class="flex justify-between items-end mt-2 text-white">
                            <span class="text-[8px] font-bold ${isLiberado ? 'text-green-500' : 'text-zinc-500'} uppercase">
                                ${isLiberado ? '● LIBERADO' : '🔒 BLOQUEADO'}
                            </span>
                            <div class="text-right text-white">
                                <p class="text-[7px] text-zinc-500 font-black uppercase leading-none">Reservas</p>
                                <p class="text-lg font-black ${isLiberado ? 'text-yellow-500' : 'text-zinc-400'}">${totalReservas}</p>
                            </div>
                        </div>
                        ${!isLiberado ? '<p class="text-[7px] text-zinc-600 font-bold uppercase mt-1 italic text-center">Acesso às 21:00h</p>' : ''}
                    </div>`;
            });
        }

        window.processarPesquisa = () => {
            const busca = document.getElementById('input-busca').value.trim().toUpperCase();
            const cont = document.getElementById('container-resultados');
            if (busca.length < 2) { cont.innerHTML = ''; return; }
            
            const filtrados = bancoClientes.filter(c => {
                const evRel = bancoEventos.find(e => e.nome === c.evento);
                if (!evRel) return false;
                
                const status = obterStatusEvento(evRel.data);
                const termo = (c.nome && c.nome.toUpperCase().includes(busca)) || (c.tel && c.tel.includes(busca));
                return status === "LIBERADO" && termo;
            });

            cont.innerHTML = filtrados.length === 0 ? '<div class="py-40 text-center font-black uppercase text-zinc-800 italic">Pesquise por nome ou celular (apenas eventos liberados)</div>' : '';
            
            filtrados.sort((a,b) => a.entrou - b.entrou).forEach(c => {
                const ev = bancoEventos.find(e => e.nome === c.evento) || {};
                const isAnivPai = (c.tipo === "ANIVERSARIANTE_FREE");
                const isConviteAniv = (c.tipo === "ANIVERSARIO" || c.tipo_lista === "ANIVERSARIO");
                const isCasal = c.tipo_entrada === "CASAL";
                let valorTexto = ""; let corValor = "text-yellow-500";

                if (isAnivPai) { valorTexto = "FREE (ANIVERSARIANTE)"; corValor = "animate-free"; } 
                else {
                    let v = isConviteAniv ? (isCasal ? ev.desc_casal : ev.desc_solteiro) : (isCasal ? ev.valor_casal : ev.valor_solteiro);
                    valorTexto = "R$ " + (v || "---");
                }
                const badge = isCasal ? 'badge-casal' : (c.tipo_entrada === "ANIVERSARIANTE" ? 'bg-purple-600 text-white' : 'badge-solteiro');

                const div = document.createElement('div');
                div.className = `client-card p-8 rounded-[2.5rem] mb-4 ${c.entrou ? 'entrou' : ''}`;
                div.innerHTML = `
                    <div class="flex flex-col gap-4 text-white">
                        <div class="flex justify-between items-center text-white">
                            <div class="flex items-center gap-4 text-white">
                                <h3 class="text-2xl font-black uppercase italic text-white leading-none text-white">${c.nome}</h3>
                                <div class="flex items-center bg-zinc-900/50 rounded-xl px-3 py-2 gap-3 border border-white/5 text-white">
                                    <p class="text-lg font-bold text-zinc-400 font-mono italic tracking-tighter leading-none text-white">${c.tel || ''}</p>
                                    <button onclick="copiarTexto('${c.tel}')" class="btn-copy p-1.5 rounded-lg text-zinc-500 hover:text-yellow-500 transition-all text-white"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" /></svg></button>
                                </div>
                            </div>
                            <div>${c.entrou ? '<span class="text-green-500 font-black italic uppercase text-sm tracking-widest bg-green-500/10 px-4 py-2 rounded-xl">✓ OK</span>' : `<button onclick="confirmarCheckin('${c.id}')" class="bg-yellow-500 text-black px-12 py-5 rounded-2xl font-black uppercase italic text-sm hover:scale-105 transition-all shadow-[0_0_20px_rgba(234,179,8,0.3)]">LIBERAR</button>`}</div>
                        </div>
                        <div class="h-[1px] bg-zinc-900 w-full"></div>
                        <div class="flex flex-wrap items-center gap-6 text-white">
                            <span class="text-xs text-zinc-400 font-black uppercase italic text-white">${c.promoter || 'DIRETO'}</span>
                            <span class="px-4 py-1.5 ${badge} text-[10px] font-black rounded-lg uppercase text-white">${c.tipo_entrada || 'LISTA'}</span>
                            <div class="flex items-center gap-2 border-l border-zinc-800 pl-6 text-white"><span class="text-[8px] text-zinc-500 font-black uppercase tracking-widest text-white">PAGAR:</span><span class="text-xl font-black italic ${corValor}">${valorTexto}</span></div>
                            ${isConviteAniv ? `<div class="flex items-center gap-2 border-l border-zinc-800 pl-6 text-white"><span class="text-xs text-purple-400 font-black uppercase italic tracking-tighter text-white">🎂 Aniv: ${c.aniversariante || ''}</span></div>` : ''}
                        </div>
                    </div>`;
                cont.appendChild(div);
            });
        };
        window.copiarTexto = (t) => { navigator.clipboard.writeText(t.replace(/\D/g, "")).then(() => alert("Copiado!")); };
        window.confirmarCheckin = async (id) => { await updateDoc(doc(db, "lista_eventos", id), { entrou: true, porteiro: operadorLogado, data_entrada: new Date().toISOString() }); };
    </script>
</body>
</html>
