<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Portaria Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow: hidden; }
        .glass { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .client-card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: 0.25s; cursor: pointer; }
        .client-card.entrou { opacity: 0.2 !important; filter: grayscale(1); pointer-events: none; }
        .login-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        input, select { background: #000 !important; border: 1px solid #333 !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: #eab308 !important; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
    </style>
</head>
<body class="flex h-screen">

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg">
        <div class="w-full max-w-sm p-10 glass rounded-[3rem] text-center border-yellow-500/20 border">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">Acesso <span class="text-yellow-500">Portaria</span></h1>
            
            <div class="space-y-4">
                <select id="selectUsuario" class="w-full p-5 rounded-2xl font-bold uppercase text-xs text-center appearance-none">
                    <option value="">Selecione seu Nome</option>
                </select>
                
                <input type="password" id="senhaUsuario" placeholder="SUA SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs">
                
                <button onclick="realizarLogin()" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl tracking-widest active:scale-95 transition-transform mt-4">
                    Entrar no Sistema
                </button>
            </div>
            <p id="erroLogin" class="text-red-500 text-[10px] font-black uppercase mt-6 hidden">Senha incorreta ou usuário não selecionado</p>
        </div>
    </div>

    <div id="interfacePrincipal" class="hidden flex w-full h-full">
        <aside class="w-80 h-full flex flex-col p-6 bg-black/50 border-r border-zinc-900">
            <div class="mb-10 text-white text-center">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-12 mx-auto mb-2">
                <h2 class="text-yellow-500 font-black italic uppercase text-xl tracking-tighter">E-Club</h2>
                <p id="nomeOperador" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">---</p>
            </div>
            <div class="flex-grow overflow-y-auto">
                <h3 class="text-zinc-500 text-[10px] font-black uppercase mb-6 tracking-widest">Eventos Ativos</h3>
                <div id="lista-eventos-sidebar" class="space-y-4"></div>
            </div>
            <button onclick="location.reload()" class="mt-4 text-zinc-600 text-[9px] font-black uppercase hover:text-white transition-colors">Sair / Trocar Usuário</button>
        </aside>

        <main class="flex-grow flex flex-col">
            <header class="p-8 border-b border-zinc-900">
                <div class="max-w-5xl mx-auto flex gap-6 items-center">
                    <input type="text" id="input-busca" oninput="processarPesquisa()" placeholder="PESQUISAR CLIENTE POR NOME OU WHATSAPP..." class="flex-grow p-6 rounded-3xl bg-zinc-900 border border-zinc-800 text-sm font-bold uppercase text-white">
                    <div class="text-right min-w-[120px]">
                        <p id="total-confirmado" class="text-3xl font-black italic leading-none text-green-500">0</p>
                        <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest mt-1">Check-ins Agora</p>
                    </div>
                </div>
            </header>

            <section class="flex-grow p-8 overflow-y-auto">
                <div id="container-resultados" class="max-w-5xl mx-auto grid grid-cols-1 gap-4">
                    <div class="py-40 opacity-20 text-center">
                        <p class="font-black uppercase italic tracking-widest text-sm text-white">Aguardando pesquisa...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let bancoClientes = [];
        let bancoEventos = [];
        let bancoUsuarios = [];
        let operadorAtual = "";

        // --- CARREGAR USUÁRIOS DA DASHBOARD ---
        onSnapshot(collection(db, "configuracoes"), (snap) => {
            const select = document.getElementById('selectUsuario');
            bancoUsuarios = snap.docs.map(d => ({id: d.id, ...d.data()}));
            
            select.innerHTML = '<option value="">Selecione seu Nome</option>';
            bancoUsuarios.forEach(u => {
                select.innerHTML += `<option value="${u.id}">${u.login.toUpperCase()}</option>`;
            });
        });

        // --- LOGIN ---
        window.realizarLogin = () => {
            const userId = document.getElementById('selectUsuario').value;
            const senha = document.getElementById('senhaUsuario').value;
            const erro = document.getElementById('erroLogin');
            
            const user = bancoUsuarios.find(u => u.id === userId);

            if (user && user.senha === senha) {
                operadorAtual = user.login;
                document.getElementById('nomeOperador').innerText = "OPERADOR: " + operadorAtual.toUpperCase();
                document.getElementById('telaLogin').classList.add('hidden');
                document.getElementById('interfacePrincipal').classList.remove('hidden');
                iniciarSistema();
            } else {
                erro.classList.remove('hidden');
            }
        };

        function iniciarSistema() {
            onSnapshot(collection(db, "lista_eventos"), (snap) => {
                bancoClientes = snap.docs.map(d => ({id: d.id, ...d.data()}));
                atualizarContadores();
                processarPesquisa();
            });

            onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snap) => {
                bancoEventos = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderizarSidebar();
            });
        }

        // --- LÓGICA DE PORTARIA ---
        const validarJanela = (dataEv) => {
            const agora = new Date();
            const hr = agora.getHours();
            const hoje = new Date(agora.getTime() - agora.getTimezoneOffset() * 60000).toISOString().split('T')[0];
            return hoje === dataEv ? (hr >= 21 || hr < 5) : false;
        };

        function renderizarSidebar() {
            const cont = document.getElementById('lista-eventos-sidebar');
            cont.innerHTML = '';
            bancoEventos.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                const total = bancoClientes.filter(c => c.evento === ev.nome).length;
                const aberto = validarJanela(ev.data);
                cont.innerHTML += `
                    <div class="p-4 rounded-2xl glass border-l-4 ${aberto ? 'border-l-green-500' : 'border-l-zinc-800 opacity-40'}">
                        <p class="text-[8px] font-black text-zinc-500 uppercase">${ev.data.split('-').reverse().join('/')}</p>
                        <h4 class="text-[11px] font-black uppercase text-white mb-2">${ev.nome}</h4>
                        <div class="flex justify-between items-end">
                            <span class="text-[9px] font-bold text-zinc-600">${aberto ? '🔥 NO AR' : '🔒 FECHADO'}</span>
                            <span class="text-xl font-black italic text-yellow-500 leading-none">${total}</span>
                        </div>
                    </div>`;
            });
        }

        window.processarPesquisa = () => {
            const busca = document.getElementById('input-busca').value.trim().toUpperCase();
            const cont = document.getElementById('container-resultados');
            if (busca.length < 2) return;

            const filtrados = bancoClientes.filter(c => {
                const bate = (c.nome && c.nome.toUpperCase().includes(busca)) || (c.tel && c.tel.includes(busca));
                const evRel = bancoEventos.find(e => e.nome === c.evento);
                return bate && (evRel ? validarJanela(evRel.data) : false);
            });

            cont.innerHTML = filtrados.length === 0 ? '<p class="py-40 text-center font-black uppercase text-zinc-700">Nenhum cliente encontrado</p>' : '';
            filtrados.forEach(c => {
                const div = document.createElement('div');
                div.className = `client-card p-6 rounded-[2rem] flex items-center ${c.entrou ? 'entrou' : ''}`;
                div.innerHTML = `
                    <div class="w-1/4 border-r border-zinc-800 pr-4">
                        <span class="px-3 py-1 bg-zinc-800 text-[10px] font-black rounded-lg uppercase">${c.tipo_entrada || 'LISTA'}</span>
                    </div>
                    <div class="flex-grow px-8">
                        <h3 class="text-lg font-black uppercase italic">${c.nome}</h3>
                        <p class="text-xs text-zinc-500 font-bold">${c.tel || '---'}</p>
                    </div>
                    <div class="w-1/4 text-right">
                        ${c.entrou ? '<span class="text-green-500 font-black italic">✓ OK</span>' : 
                        `<button onclick="confirmar('${c.id}')" class="bg-white text-black px-8 py-3 rounded-xl font-black uppercase text-xs">Check-in</button>`}
                    </div>`;
                cont.appendChild(div);
            });
        };

        window.confirmar = async (id) => {
            await updateDoc(doc(db, "lista_eventos", id), { 
                entrou: true, 
                porteiro: operadorAtual,
                data_entrada: new Date().toISOString() 
            });
        };

        function atualizarContadores() {
            const total = bancoClientes.filter(c => c.entrou).length;
            document.getElementById('total-confirmado').innerText = total;
        }
    </script>
</body>
</html>
