<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Portaria Master</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; }
        .glass-card { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .input-field { background: #0f0f10 !important; border: 1px solid #27272a !important; color: #fff !important; }
        .input-field:focus { border-color: #eab308 !important; outline: none; }
        .btn-gold { background: #eab308; color: #000; font-weight: 900; transition: 0.3s; }
        
        /* TRAVA DE SEGURANÇA */
        #conteudo-sistema { display: none; }
        .item-lista { border-bottom: 1px solid #1a1a1a; transition: 0.3s; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="tela-login" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-6">
        <div class="bg-zinc-900 p-10 w-full max-w-sm text-center border border-zinc-800 rounded-[3.5rem] shadow-2xl">
            <header class="flex justify-center mb-8">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-12 w-auto">
            </header>
            <h2 class="text-yellow-500 font-black uppercase italic mb-6 tracking-widest text-sm">Portaria VIP</h2>
            <div class="space-y-4">
                <input type="text" id="user_login" placeholder="USUÁRIO" class="w-full p-5 rounded-2xl bg-black border border-zinc-800 text-white font-bold text-center uppercase text-xs outline-none focus:border-yellow-500">
                <input type="password" id="user_pass" placeholder="SENHA" class="w-full p-5 rounded-2xl bg-black border border-zinc-800 text-white font-bold text-center uppercase text-xs outline-none focus:border-yellow-500">
                <button id="btnEntrar" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-lg active:scale-95 transition-all">Entrar</button>
            </div>
            <p id="erro-login" class="text-red-500 text-[10px] font-black uppercase mt-4 hidden">Acesso Negado</p>
        </div>
    </div>

    <div id="conteudo-sistema" class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-12">
                <div>
                    <h1 class="text-2xl font-black uppercase italic text-yellow-500 leading-none">Portaria Master</h1>
                    <p class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1">Controle de Listas VIP</p>
                </div>
            </div>
            
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-center min-w-[150px]">
                <p class="text-[8px] font-black text-zinc-500 uppercase">Check-ins Hoje</p>
                <p id="contadorCheckin" class="text-xl font-black text-green-500">0</p>
            </div>
        </header>

        <main class="space-y-6">
            <div class="relative w-full">
                <input type="text" id="buscaLista" placeholder="BUSCAR NOME OU TELEFONE NA LISTA..." class="w-full p-6 rounded-[2rem] input-field text-sm font-bold uppercase pl-16 shadow-2xl" oninput="filtrarLista()">
                <span class="absolute left-6 top-6 opacity-30 text-xl">🔍</span>
            </div>

            <div class="glass-card rounded-[2.5rem] overflow-hidden">
                <div class="p-6 border-b border-zinc-800 bg-zinc-900/30 flex justify-between items-center">
                    <h2 class="text-xs font-black uppercase text-zinc-400 italic">Nomes na Lista</h2>
                    <span id="statusCasa" class="text-[9px] font-black uppercase px-3 py-1 rounded-full">Verificando Horário...</span>
                </div>
                <div id="containerLista" class="divide-y divide-zinc-900 max-h-[700px] overflow-y-auto">
                    </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, getDocs, where, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colLista = collection(db, "lista_eventos");
        let dadosCompletos = [];

        // --- LOGIN ---
        window.autenticar = async () => {
            const user = document.getElementById('user_login').value.trim().toLowerCase();
            const pass = document.getElementById('user_pass').value;
            const btn = document.getElementById('btnEntrar');
            
            btn.disabled = true;
            try {
                const docSnap = await getDoc(doc(db, "configuracoes", user));
                if (docSnap.exists() && docSnap.data().senha === pass) {
                    document.getElementById('tela-login').style.display = 'none';
                    document.getElementById('conteudo-sistema').style.display = 'block';
                    sessionStorage.setItem('eclub_portaria_auth', 'true');
                    inicializarPortaria();
                } else {
                    document.getElementById('erro-login').classList.remove('hidden');
                    btn.disabled = false;
                }
            } catch (e) { alert("Erro ao conectar"); btn.disabled = false; }
        };

        document.getElementById('btnEntrar').onclick = window.autenticar;
        if (sessionStorage.getItem('eclub_portaria_auth') === 'true') {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('conteudo-sistema').style.display = 'block';
            inicializarPortaria();
        }

        // --- SISTEMA ---
        function inicializarPortaria() {
            onSnapshot(colLista, (snap) => {
                dadosCompletos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderizar();
            });
        }

        function obterCorte() {
            const h = new Date();
            if (h.getHours() < 5) {
                const o = new Date(); o.setDate(o.getDate() - 1); o.setHours(21,0,0,0); return o;
            }
            if (h.getHours() >= 21) {
                const o = new Date(); o.setHours(21,0,0,0); return o;
            }
            return new Date(h.getTime() + 86400000);
        }

        function renderizar(filtrados = null) {
            const container = document.getElementById('containerLista');
            const lista = filtrados || dadosCompletos;
            container.innerHTML = '';
            
            const agora = new Date();
            const corte = obterCorte();
            const casaAberta = (agora.getHours() >= 21 || agora.getHours() < 5);
            
            const statusCasa = document.getElementById('statusCasa');
            statusCasa.innerText = casaAberta ? "PORTARIA ABERTA" : "PORTARIA FECHADA (21H)";
            statusCasa.className = casaAberta ? "text-[9px] font-black uppercase px-3 py-1 rounded-full bg-green-500/20 text-green-500" : "text-[9px] font-black uppercase px-3 py-1 rounded-full bg-red-500/20 text-red-500";

            let totalCheckin = 0;

            lista.sort((a,b) => b.data_cadastro - a.data_cadastro).forEach(docData => {
                const u = docData.data_checkin ? docData.data_checkin.toDate() : null;
                const naCasa = u && u >= corte;
                if(naCasa) totalCheckin++;

                const div = document.createElement('div');
                div.className = `item-lista p-6 flex justify-between items-center ${naCasa ? 'bg-green-500/5' : ''}`;
                div.innerHTML = `
                    <div>
                        <h3 class="text-sm font-black uppercase ${naCasa ? 'text-green-500' : 'text-white'}">${docData.nome}</h3>
                        <p class="text-[10px] text-zinc-500 font-bold uppercase">${docData.tipo} | REF: ${docData.promoter || 'DIRETO'}</p>
                        <p class="text-[9px] font-black text-yellow-600 uppercase mt-1 italic">${docData.evento}</p>
                    </div>
                    <div>
                        ${naCasa ? 
                            '<span class="text-green-500 font-black text-[10px] uppercase">DENTRO ✓</span>' : 
                            (casaAberta ? `<button onclick="confirmarEntrada('${docData.id}')" class="bg-green-600 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase">Check-in</button>` : '---')
                        }
                    </div>
                `;
                container.appendChild(div);
            });
            document.getElementById('contadorCheckin').innerText = totalCheckin;
        }

        window.confirmarEntrada = async (id) => {
            await updateDoc(doc(db, "lista_eventos", id), { data_checkin: serverTimestamp() });
        };

        window.filtrarLista = () => {
            const b = document.getElementById('buscaLista').value.toUpperCase();
            const f = dadosCompletos.filter(d => d.nome.includes(b) || (d.tel && d.tel.includes(b)));
            renderizar(f);
        };
    </script>
</body>
</html>
