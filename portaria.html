<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Portaria Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow: hidden; }
        .glass { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .sidebar { border-right: 1px solid #1a1a1a; }
        .client-card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.3s ease; }
        .client-card:hover { border-color: #eab308; background: #111; transform: translateX(5px); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .badge { font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 2px 8px; border-radius: 6px; }
        .badge-casal { background: #eab308; color: #000; }
        .badge-solteiro { background: #3b82f6; color: #fff; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease forwards; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="sidebar w-80 h-full flex flex-col p-6 bg-black/50">
        <div class="mb-10">
            <h2 class="text-yellow-500 font-black italic uppercase text-xl tracking-tighter text-white">E-Club</h2>
            <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Controle de Acesso</p>
        </div>

        <div class="flex-grow overflow-y-auto">
            <h3 class="text-zinc-500 text-[10px] font-black uppercase mb-6 tracking-widest">Eventos da Semana</h3>
            <div id="lista-eventos-sidebar" class="space-y-4">
                </div>
        </div>
    </aside>

    <main class="flex-grow flex flex-col">
        <header class="p-8 border-b border-zinc-900">
            <div class="max-w-4xl mx-auto flex gap-4 items-center">
                <div class="relative flex-grow">
                    <span class="absolute left-5 top-5 opacity-30 text-white">🔍</span>
                    <input type="text" id="input-busca" 
                           placeholder="PESQUISAR NOME OU TELEFONE..." 
                           class="w-full p-5 pl-14 rounded-3xl bg-zinc-900 border border-zinc-800 text-sm font-bold uppercase text-white"
                           oninput="processarPesquisa()">
                </div>
                <div class="text-right">
                    <p id="total-confirmado" class="text-2xl font-black italic leading-none text-white">0</p>
                    <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest">Entradas Hoje</p>
                </div>
            </div>
        </header>

        <section class="flex-grow p-8 overflow-y-auto">
            <div id="container-resultados" class="max-w-4xl mx-auto grid grid-cols-1 gap-3">
                <div id="placeholder-busca" class="h-full flex flex-col items-center justify-center opacity-20 py-40">
                    <p class="font-black uppercase italic tracking-widest text-sm text-white">Aguardando pesquisa...</p>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let bancoClientes = [];
        let bancoEventos = [];

        // ESCUTA TODAS AS RESERVAS (SOMA GLOBAL)
        onSnapshot(collection(db, "lista_eventos"), (snap) => {
            bancoClientes = snap.docs.map(d => ({id: d.id, ...d.data()}));
            atualizarContadorGlobal();
            renderizarSidebar(); // Re-renderiza para atualizar os números na lateral
        });

        // ESCUTA EVENTOS ATIVOS
        onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snap) => {
            bancoEventos = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderizarSidebar();
        });

        function renderizarSidebar() {
            const container = document.getElementById('lista-eventos-sidebar');
            if (!container) return;
            container.innerHTML = '';

            // Ordena eventos por data
            const eventosOrdenados = [...bancoEventos].sort((a,b) => new Date(a.data) - new Date(b.data));

            eventosOrdenados.forEach(ev => {
                // SOMA TODAS AS RESERVAS DE TODOS OS PROMOTERS PARA ESTE EVENTO
                const totalReservasEvento = bancoClientes.filter(c => c.evento === ev.nome).length;

                container.innerHTML += `
                    <div class="p-4 rounded-2xl glass border-l-4 border-l-yellow-500">
                        <p class="text-[8px] font-black text-zinc-500 uppercase mb-1">${ev.data.split('-').reverse().join('/')}</p>
                        <h4 class="text-[11px] font-black uppercase italic text-white leading-tight mb-2">${ev.nome}</h4>
                        <div class="flex justify-between items-end">
                            <span class="text-[9px] font-bold text-zinc-600 uppercase">Total Reservas:</span>
                            <span class="text-xl font-black italic text-yellow-500 leading-none">${totalReservasEvento}</span>
                        </div>
                    </div>
                `;
            });
        }

        window.processarPesquisa = () => {
            const busca = document.getElementById('input-busca').value.trim().toUpperCase();
            const container = document.getElementById('container-resultados');
            if (busca.length < 2) {
                container.innerHTML = '';
                container.innerHTML = '<div class="h-full flex flex-col items-center justify-center opacity-20 py-40"><p class="font-black uppercase italic tracking-widest text-sm text-white">Aguardando pesquisa...</p></div>';
                return;
            }

            const filtrados = bancoClientes.filter(c => 
                (c.nome && c.nome.toUpperCase().includes(busca)) || 
                (c.tel && c.tel.includes(busca)) ||
                (c.telefone && c.telefone.includes(busca))
            );

            filtrados.sort((a,b) => (a.entrou === b.entrou) ? 0 : a.entrou ? 1 : -1);
            renderizarResultados(filtrados);
        };

        function renderizarResultados(lista) {
            const container = document.getElementById('container-resultados');
            container.innerHTML = '';
            if (lista.length === 0) {
                container.innerHTML = `<div class="text-center py-20 font-black uppercase text-zinc-800 italic">Nenhum cliente encontrado</div>`;
                return;
            }

            lista.forEach(c => {
                const badge = c.tipo === 'casal' ? 'badge-casal' : 'badge-solteiro';
                const card = document.createElement('div');
                card.className = `client-card p-5 rounded-3xl flex justify-between items-center animate-in ${c.entrou ? 'opacity-40 grayscale pointer-events-none' : ''}`;
                card.innerHTML = `
                    <div class="flex items-center gap-6">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="badge ${badge}">${c.tipo}</span>
                                <span class="text-[9px] font-black text-zinc-500 uppercase">${c.promoter || 'Direto'}</span>
                            </div>
                            <h3 class="font-black uppercase text-sm tracking-tight text-white">${c.nome}</h3>
                            <p class="text-[10px] text-zinc-500 font-mono tracking-tighter">${c.tel || c.telefone || ''} • ${c.evento}</p>
                        </div>
                    </div>
                    <div>
                        ${c.entrou ? `<span class="text-green-500 font-black uppercase italic text-[10px]">Confirmado ✓</span>` : `<button onclick="confirmarCheckin('${c.id}')" class="bg-white text-black px-8 py-3 rounded-2xl font-black uppercase italic text-xs hover:bg-yellow-500">Check-in</button>`}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.confirmarCheckin = async (id) => {
            try {
                await updateDoc(doc(db, "lista_eventos", id), { entrou: true, data_entrada: new Date().toISOString() });
            } catch (e) { alert("Erro!"); }
        };

        function atualizarContadorGlobal() {
            const total = bancoClientes.filter(c => c.entrou).length;
            document.getElementById('total-confirmado').innerText = total;
        }
    </script>
</body>
</html>
