<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Master Portaria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow: hidden; }
        .glass { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .login-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .client-card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .client-card.entrou { opacity: 0.2 !important; filter: grayscale(1); pointer-events: none; }
        input { background: #000 !important; border: 1px solid #333 !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus { border-color: #eab308 !important; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
        .badge-casal { background: #eab308; color: #000; }
        .badge-solteiro { background: #3b82f6; color: #fff; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .animate-free { animation: pulse-green 1.5s infinite; color: #22c55e; font-weight: 900; }
    </style>
</head>
<body class="flex h-screen">

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg">
        <div class="w-full max-w-sm p-10 glass rounded-[3rem] text-center border-yellow-500/20 border">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">PORTARIA <span class="text-yellow-500">MASTER</span></h1>
            <div class="space-y-4">
                <input type="text" id="inputNomeUsuario" placeholder="LOGIN OPERADOR" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs">
                <div id="areaSenha" class="hidden">
                    <input type="password" id="senhaUsuario" placeholder="SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs mt-2 border-yellow-500/50">
                </div>
                <button onclick="verificarOuLogar()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl mt-4">ACESSAR SISTEMA</button>
            </div>
        </div>
    </div>

    <div id="interfacePrincipal" class="hidden flex w-full h-full">
        <aside class="w-80 h-full flex flex-col p-6 bg-black/50 border-r border-zinc-900">
            <div class="mb-10 text-center text-white">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 mx-auto mb-2">
                <h2 class="text-yellow-500 font-black italic uppercase text-lg tracking-tighter leading-none">E-CLUB</h2>
                <p id="operadorAtivo" class="text-[9px] text-zinc-500 font-bold uppercase mt-4 border border-zinc-800 py-2 rounded-lg italic tracking-widest">OPERADOR: ---</p>
            </div>
            <div class="flex-grow overflow-y-auto">
                <h3 class="text-zinc-600 text-[9px] font-black uppercase mb-4 tracking-[0.2em] border-b border-zinc-900 pb-2">Evento de Hoje</h3>
                <div id="lista-eventos-sidebar" class="space-y-3"></div>
            </div>
            <button onclick="location.reload()" class="mt-6 text-zinc-700 text-[9px] font-black uppercase hover:text-red-500 transition-colors">Sair do Sistema</button>
        </aside>

        <main class="flex-grow flex flex-col">
            <header class="p-8 border-b border-zinc-900 bg-black/20">
                <div class="max-w-5xl mx-auto flex gap-8 items-center">
                    <div class="relative flex-grow">
                        <span class="absolute left-6 top-5 text-zinc-600 text-lg">🔍</span>
                        <input type="text" id="input-busca" oninput="processarPesquisa()" placeholder="BUSCAR NOME OU TELEFONE..." class="w-full p-6 pl-16 rounded-[2rem] text-sm font-bold uppercase text-white shadow-2xl">
                    </div>
                    <div class="text-right border-l border-zinc-800 pl-8 min-w-[140px]">
                        <p id="total-checkins" class="text-5xl font-black italic leading-none text-green-500">0</p>
                        <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest mt-2 italic">Entradas Confirmadas</p>
                    </div>
                </div>
            </header>
            <section class="flex-grow p-8 overflow-y-auto bg-[#030303]">
                <div id="container-resultados" class="max-w-5xl mx-auto"></div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let bancoClientes = []; let bancoEventos = []; let operadorLogado = ""; let stepLogin = 0; let usuarioData = null;

        const getHojeData = () => new Date().toISOString().split('T')[0];

        window.verificarOuLogar = async () => {
            const n = document.getElementById('inputNomeUsuario').value.trim().toLowerCase();
            const s = document.getElementById('senhaUsuario').value.trim();
            if (stepLogin === 0) {
                const docSnap = await getDoc(doc(db, "configuracoes", n));
                if (docSnap.exists()) {
                    usuarioData = docSnap.data();
                    stepLogin = 1;
                    document.getElementById('areaSenha').classList.remove('hidden');
                    document.getElementById('inputNomeUsuario').readOnly = true;
                    document.getElementById('btnAcao').innerText = "AUTENTICAR";
                }
            } else {
                if (usuarioData.senha === s) logarSucesso(n);
                else alert("SENHA INCORRETA");
            }
        };

        function logarSucesso(n) {
            operadorLogado = n;
            document.getElementById('operadorAtivo').innerText = "OPERADOR: " + n.toUpperCase();
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('interfacePrincipal').classList.remove('hidden');
            iniciarEscutas();
        }

        function iniciarEscutas() {
            const hoje = getHojeData();
            // Monitora eventos ativos e sincroniza com a Dashboard
            onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snapEv) => {
                bancoEventos = snapEv.docs.map(d => ({id: d.id, ...d.data()}));
                
                onSnapshot(collection(db, "lista_eventos"), (snapCli) => {
                    bancoClientes = snapCli.docs.map(d => ({id: d.id, ...d.data()}));
                    const chksHoje = bancoClientes.filter(c => c.entrou && c.data_entrada && c.data_entrada.startsWith(hoje)).length;
                    document.getElementById('total-checkins').innerText = chksHoje;
                    processarPesquisa();
                    renderizarSidebar();
                });
            });
        }

        function renderizarSidebar() {
            const cont = document.getElementById('lista-eventos-sidebar');
            cont.innerHTML = '';
            const hoje = getHojeData();
            const eventosHoje = bancoEventos.filter(ev => ev.data === hoje);
            
            if (eventosHoje.length === 0) {
                cont.innerHTML = '<p class="text-[10px] text-zinc-700 italic font-bold">Sem eventos para hoje.</p>';
                return;
            }

            eventosHoje.forEach(ev => {
                const total = bancoClientes.filter(c => c.evento === ev.nome).length;
                cont.innerHTML += `
                    <div class="p-4 rounded-2xl glass border-l-4 border-l-yellow-500 mb-2">
                        <h4 class="text-[11px] font-black uppercase text-white truncate">${ev.nome}</h4>
                        <div class="flex justify-between items-end mt-2">
                            <span class="text-[8px] font-bold text-green-500 animate-pulse tracking-widest">NO AR</span>
                            <span class="text-xl font-black text-yellow-500">${total}</span>
                        </div>
                    </div>`;
            });
        }

        window.processarPesquisa = () => {
            const busca = document.getElementById('input-busca').value.trim().toUpperCase();
            const cont = document.getElementById('container-resultados');
            const hoje = getHojeData();
            if (busca.length < 2) { cont.innerHTML = ''; return; }
            
            const filtrados = bancoClientes.filter(c => {
                const evRelacionado = bancoEventos.find(e => e.nome === c.evento);
                if (!evRelacionado || evRelacionado.data !== hoje) return false;
                const nomeMatch = c.nome && c.nome.toUpperCase().includes(busca);
                const telMatch = (c.tel || c.telefone) && (c.tel || c.telefone).includes(busca);
                return nomeMatch || telMatch;
            });

            cont.innerHTML = filtrados.length === 0 ? '<div class="py-40 text-center font-black uppercase text-zinc-800 italic">Nada encontrado para hoje</div>' : '';
            
            filtrados.sort((a,b) => a.entrou - b.entrou).forEach(c => {
                const ev = bancoEventos.find(e => e.nome === c.evento) || {};
                const isCasal = c.tipo_entrada === "CASAL";
                const v = (c.aniversariante && c.aniversariante !== "") ? (isCasal ? ev.desc_casal : ev.desc_solteiro) : (isCasal ? ev.valor_casal : ev.valor_solteiro);
                const badge = isCasal ? 'badge-casal' : (c.tipo_entrada === "ANIVERSARIANTE" ? 'bg-purple-600 text-white' : 'badge-solteiro');

                const div = document.createElement('div');
                div.className = `client-card p-8 rounded-[2.5rem] mb-4 ${c.entrou ? 'entrou' : ''}`;
                div.innerHTML = `
                    <div class="flex flex-col gap-4 text-white">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <h3 class="text-2xl font-black uppercase italic text-white leading-none">${c.nome}</h3>
                                <p class="text-lg font-bold text-zinc-500 font-mono italic leading-none">${c.tel || c.telefone || ''}</p>
                            </div>
                            <div>
                                ${c.entrou ? '<span class="text-green-500 font-black italic uppercase text-sm tracking-widest bg-green-500/10 px-6 py-3 rounded-xl border border-green-500/20">CONFIRMADO</span>' : `<button onclick="confirmarCheckin('${c.id}')" class="bg-yellow-500 text-black px-12 py-5 rounded-2xl font-black uppercase italic text-sm hover:scale-105 transition-all">LIBERAR AGORA</button>`}
                            </div>
                        </div>
                        <div class="h-[1px] bg-zinc-900/50 w-full"></div>
                        <div class="flex flex-wrap items-center gap-6">
                            <span class="text-[10px] text-zinc-400 font-black uppercase italic tracking-widest">${c.promoter || 'DIRETO'}</span>
                            <span class="px-4 py-1.5 ${badge} text-[10px] font-black rounded-lg uppercase">${c.tipo_entrada || 'LISTA'}</span>
                            <div class="flex items-center gap-3 border-l border-zinc-800 pl-6">
                                <span class="text-[8px] text-zinc-600 font-black uppercase tracking-[0.2em]">VALOR:</span>
                                <span class="text-2xl font-black italic text-yellow-500">R$ ${v || '---'}</span>
                            </div>
                            ${c.aniversariante ? `<div class="flex items-center gap-2 border-l border-zinc-800 pl-6"><span class="text-[10px] text-purple-400 font-black uppercase italic">🎂 ANIV: ${c.aniversariante}</span></div>` : ''}
                        </div>
                    </div>`;
                cont.appendChild(div);
            });
        };

        window.confirmarCheckin = async (id) => {
            await updateDoc(doc(db, "lista_eventos", id), { entrou: true, porteiro: operadorLogado, data_entrada: new Date().toISOString() });
        };
    </script>
</body>
</html>
