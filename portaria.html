<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Portaria (Modo Dev)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow: hidden; }
        .sidebar { border-right: 1px solid #1a1a1a; }
        .glass { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .client-card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.3s ease; }
        .client-card:hover { border-color: #eab308; background: #111; }
        input:focus { border-color: #eab308 !important; outline: none; }
        .badge-casal { background: #eab308; color: #000; padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; }
        .badge-solteiro { background: #3b82f6; color: #fff; padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="sidebar w-80 h-full flex flex-col p-6 bg-black/50">
        <div class="mb-10">
            <h2 class="text-yellow-500 font-black italic uppercase text-xl tracking-tighter">E-Club</h2>
            <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest text-white">Modo Desenvolvimento</p>
        </div>
        <div class="flex-grow overflow-y-auto">
            <h3 class="text-zinc-500 text-[10px] font-black uppercase mb-6 tracking-widest text-white">Eventos Ativos</h3>
            <div id="lista-eventos-sidebar" class="space-y-4"></div>
        </div>
    </aside>

    <main class="flex-grow flex flex-col">
        <header class="p-8 border-b border-zinc-900">
            <div class="max-w-4xl mx-auto flex gap-6 items-center">
                <div class="relative flex-grow">
                    <span class="absolute left-5 top-5 opacity-30 text-white">🔍</span>
                    <input type="text" id="input-busca" 
                           placeholder="PESQUISAR CLIENTE (LIBERADO)..." 
                           class="w-full p-5 pl-14 rounded-3xl bg-zinc-900 border border-zinc-800 text-sm font-bold uppercase text-white"
                           oninput="processarPesquisa()">
                </div>
                <div class="text-right">
                    <p id="total-confirmado" class="text-2xl font-black italic text-white leading-none">0</p>
                    <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest text-white">Total Entradas</p>
                </div>
            </div>
        </header>

        <section class="flex-grow p-8 overflow-y-auto">
            <div id="container-resultados" class="max-w-4xl mx-auto grid grid-cols-1 gap-3 text-center">
                <div id="msg-informativa" class="py-40 opacity-30">
                    <p class="font-black uppercase italic tracking-widest text-sm text-white">Busca liberada para testes</p>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let bancoClientes = [];
        let bancoEventos = [];

        // --- CARREGAMENTO GLOBAL ---
        onSnapshot(collection(db, "lista_eventos"), (snap) => {
            bancoClientes = snap.docs.map(d => ({id: d.id, ...d.data()}));
            atualizarContadorGlobal();
            renderizarSidebar();
        });

        onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snap) => {
            bancoEventos = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderizarSidebar();
        });

        function renderizarSidebar() {
            const container = document.getElementById('lista-eventos-sidebar');
            if(!container) return;
            container.innerHTML = '';
            
            bancoEventos.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                const total = bancoClientes.filter(c => c.evento === ev.nome).length;
                
                container.innerHTML += `
                    <div class="p-4 rounded-2xl glass border-l-4 border-l-yellow-500">
                        <p class="text-[8px] font-black text-zinc-500 uppercase mb-1">${ev.data.split('-').reverse().join('/')}</p>
                        <h4 class="text-[11px] font-black uppercase text-white leading-tight mb-2">${ev.nome}</h4>
                        <div class="flex justify-between items-end">
                            <span class="text-[9px] font-bold text-zinc-600 uppercase tracking-tighter">LISTA ATIVA</span>
                            <span class="text-xl font-black italic text-yellow-500 leading-none">${total}</span>
                        </div>
                    </div>`;
            });
        }

        window.processarPesquisa = () => {
            const busca = document.getElementById('input-busca').value.trim().toUpperCase();
            const container = document.getElementById('container-resultados');

            if (busca.length < 2) {
                container.innerHTML = '<div class="py-40 opacity-30 text-white font-black uppercase italic text-sm">Digite para pesquisar...</div>';
                return;
            }

            // Busca liberada de todos os eventos ativos
            const filtrados = bancoClientes.filter(c => {
                return (c.nome && c.nome.toUpperCase().includes(busca)) || (c.tel && c.tel.includes(busca));
            });

            renderizarResultados(filtrados);
        };

        function renderizarResultados(lista) {
            const container = document.getElementById('container-resultados');
            if (lista.length === 0) {
                container.innerHTML = '<p class="py-40 font-black uppercase text-zinc-800 italic text-white">Nenhum cliente encontrado nas listas ativas.</p>';
                return;
            }

            container.innerHTML = '';
            lista.sort((a,b) => (a.entrou === b.entrou) ? 0 : a.entrou ? 1 : -1).forEach(c => {
                const card = document.createElement('div');
                card.className = `client-card p-5 rounded-3xl flex justify-between items-center ${c.entrou ? 'opacity-40 grayscale pointer-events-none' : ''}`;
                card.innerHTML = `
                    <div class="text-left">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="${c.tipo === 'casal' ? 'badge-casal' : 'badge-solteiro'}">${c.tipo}</span>
                            <span class="text-[9px] font-black text-zinc-500 uppercase">${c.promoter || 'Direto'}</span>
                        </div>
                        <h3 class="font-black uppercase text-sm text-white">${c.nome}</h3>
                        <p class="text-[10px] text-zinc-500 font-mono tracking-tighter">${c.tel || ''} • ${c.evento}</p>
                    </div>
                    <button onclick="confirmarCheckin('${c.id}')" class="bg-white text-black px-8 py-3 rounded-2xl font-black uppercase italic text-xs hover:bg-yellow-500">Check-in</button>
                `;
                container.appendChild(card);
            });
        }

        window.confirmarCheckin = async (id) => {
            await updateDoc(doc(db, "lista_eventos", id), { entrou: true, data_entrada: new Date().toISOString() });
        };

        function atualizarContadorGlobal() {
            const confirmados = bancoClientes.filter(c => c.entrou).length;
            document.getElementById('total-confirmado').innerText = confirmados;
        }
    </script>
</body>
</html>
