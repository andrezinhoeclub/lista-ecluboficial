<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Portaria Inteligente (Modo Dev)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow: hidden; }
        
        /* Layout Sidebar e Glass */
        .sidebar { border-right: 1px solid #1a1a1a; }
        .glass { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Client Cards - Layout Horizontal */
        .client-card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .client-card:hover { border-color: #eab308; background: #111; transform: translateX(5px); }
        
        /* Tipografia de Portaria */
        .nome-cliente { font-size: 1.5rem; line-height: 1; letter-spacing: -0.02em; }
        .tel-cliente { font-size: 1.1rem; color: #a1a1aa; font-family: 'JetBrains+Mono', monospace; }
        .badge-perfil { font-size: 14px; font-weight: 900; padding: 4px 12px; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Badges de Cores */
        .badge-casal { background: #eab308; color: #000; }
        .badge-solteiro { background: #3b82f6; color: #fff; }

        input:focus { border-color: #eab308 !important; outline: none; box-shadow: 0 0 15px rgba(234, 179, 8, 0.1); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease forwards; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="sidebar w-80 h-full flex flex-col p-6 bg-black/50">
        <div class="mb-10">
            <h2 class="text-yellow-500 font-black italic uppercase text-xl tracking-tighter">E-Club</h2>
            <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest text-white">Gestão Portaria (DEV)</p>
        </div>

        <div class="flex-grow overflow-y-auto">
            <h3 class="text-zinc-500 text-[10px] font-black uppercase mb-6 tracking-widest text-white">Eventos Ativos</h3>
            <div id="lista-eventos-sidebar" class="space-y-4">
                </div>
        </div>
    </aside>

    <main class="flex-grow flex flex-col">
        
        <header class="p-8 border-b border-zinc-900">
            <div class="max-w-5xl mx-auto flex gap-6 items-center">
                <div class="relative flex-grow">
                    <span class="absolute left-5 top-5 opacity-30 text-white">🔍</span>
                    <input type="text" id="input-busca" 
                           placeholder="BUSCAR NOME OU TELEFONE (LIBERADO)..." 
                           class="w-full p-6 pl-14 rounded-3xl bg-zinc-900 border border-zinc-800 text-sm font-bold uppercase text-white transition-all"
                           oninput="processarPesquisa()">
                </div>
                <div class="text-right">
                    <p id="total-confirmado" class="text-3xl font-black italic text-white leading-none">0</p>
                    <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest text-white">Check-ins Totais</p>
                </div>
            </div>
        </header>

        <section class="flex-grow p-8 overflow-y-auto">
            <div id="container-resultados" class="max-w-5xl mx-auto grid grid-cols-1 gap-4">
                <div id="placeholder-busca" class="h-full flex flex-col items-center justify-center opacity-20 py-40">
                    <p class="font-black uppercase italic tracking-widest text-sm text-white">Aguardando pesquisa para check-in...</p>
                </div>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let bancoClientes = [];
        let bancoEventos = [];

        // --- CARREGAMENTO GLOBAL (MODO DEV) ---

        onSnapshot(collection(db, "lista_eventos"), (snap) => {
            bancoClientes = snap.docs.map(d => ({id: d.id, ...d.data()}));
            atualizarContadorGlobal();
            renderizarSidebar();
        });

        onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snap) => {
            bancoEventos = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderizarSidebar();
        });

        // --- FUNÇÕES DE INTERFACE ---

        function renderizarSidebar() {
            const container = document.getElementById('lista-eventos-sidebar');
            if(!container) return;
            container.innerHTML = '';

            const eventosOrdenados = [...bancoEventos].sort((a,b) => new Date(a.data) - new Date(b.data));

            eventosOrdenados.forEach(ev => {
                const totalReservas = bancoClientes.filter(c => c.evento === ev.nome).length;
                container.innerHTML += `
                    <div class="p-4 rounded-2xl glass border-l-4 border-l-yellow-500">
                        <p class="text-[8px] font-black text-zinc-500 uppercase mb-1">${ev.data.split('-').reverse().join('/')}</p>
                        <h4 class="text-[11px] font-black uppercase text-white leading-tight mb-2">${ev.nome}</h4>
                        <div class="flex justify-between items-end">
                            <span class="text-[9px] font-bold text-zinc-600 uppercase">Reservas:</span>
                            <span class="text-xl font-black italic text-yellow-500 leading-none">${totalReservas}</span>
                        </div>
                    </div>`;
            });
        }

        window.processarPesquisa = () => {
            const busca = document.getElementById('input-busca').value.trim().toUpperCase();
            const container = document.getElementById('container-resultados');

            if (busca.length < 2) {
                container.innerHTML = '<div class="py-40 opacity-30 text-white font-black uppercase italic text-sm">Digite para pesquisar...</div>';
                return;
            }

            const filtrados = bancoClientes.filter(c => 
                (c.nome && c.nome.toUpperCase().includes(busca)) || 
                (c.tel && c.tel.includes(busca)) ||
                (c.telefone && c.telefone.includes(busca))
            );

            renderizarResultados(filtrados);
        };

        function renderizarResultados(lista) {
            const container = document.getElementById('container-resultados');
            container.innerHTML = '';

            if (lista.length === 0) {
                container.innerHTML = '<p class="py-40 font-black uppercase text-zinc-800 italic text-white text-center">Nenhum cliente encontrado.</p>';
                return;
            }

            lista.sort((a,b) => (a.entrou === b.entrou) ? 0 : a.entrou ? 1 : -1).forEach(c => {
                const badgeColor = c.tipo === 'casal' ? 'badge-casal' : 'badge-solteiro';
                const card = document.createElement('div');
                card.className = `client-card p-6 rounded-[2rem] flex items-center animate-in ${c.entrou ? 'opacity-30 grayscale pointer-events-none' : ''}`;
                
                card.innerHTML = `
                    <div class="w-1/4 flex flex-col items-start border-r border-zinc-800 pr-4">
                        <span class="${badgeColor} badge-perfil mb-2">${c.tipo}</span>
                        <span class="text-[10px] font-black text-zinc-500 uppercase tracking-widest ml-1">Promoter: ${c.promoter || 'Direto'}</span>
                    </div>

                    <div class="flex-grow px-8 flex flex-col justify-center">
                        <h3 class="nome-cliente font-black uppercase italic text-white mb-1">
                            ${c.nome}
                        </h3>
                        <div class="flex items-center gap-4">
                            <span class="tel-cliente font-bold tracking-tighter">${c.tel || c.telefone || '(00) 00000-0000'}</span>
                        </div>
                        <p class="text-[9px] text-zinc-600 font-black uppercase mt-2 tracking-widest italic border-t border-zinc-900 pt-1 w-fit">
                            📅 Evento: ${c.evento}
                        </p>
                    </div>

                    <div class="w-1/4 flex justify-end">
                        ${c.entrou 
                            ? `<span class="text-green-500 font-black uppercase italic text-xs mr-4">Confirmado ✓</span>`
                            : `<button onclick="confirmarCheckin('${c.id}')" class="bg-white text-black px-10 py-4 rounded-2xl font-black uppercase italic text-sm hover:bg-yellow-500 transition-all shadow-xl active:scale-95">Check-in</button>`
                        }
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.confirmarCheckin = async (id) => {
            const docRef = doc(db, "lista_eventos", id);
            try {
                await updateDoc(docRef, { 
                    entrou: true, 
                    data_entrada: new Date().toISOString() 
                });
            } catch (e) {
                alert("Erro ao confirmar entrada!");
            }
        };

        function atualizarContadorGlobal() {
            const confirmados = bancoClientes.filter(c => c.entrou).length;
            document.getElementById('total-confirmado').innerText = confirmados;
        }

    </script>
</body>
</html>
