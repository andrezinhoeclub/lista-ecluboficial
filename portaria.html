<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">PORTARIA | Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow: hidden; }
        .glass { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .login-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        
        .client-card { 
            background: #0d0d0f; 
            border: 1px solid #1a1a1c; 
            border-left: 4px solid #eab308;
            transition: all 0.2s ease;
        }
        .client-card:hover { background: #16161a; border-color: #333; }
        .client-card.entrou { opacity: 0.3 !important; filter: grayscale(1); pointer-events: none; }
        
        input { background: #000 !important; border: 1px solid #333 !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus { border-color: #eab308 !important; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        @keyframes pulse-green { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-online { animation: pulse-green 1.5s infinite; color: #22c55e; font-weight: 900; }
        
        .btn-liberar { background: #eab308; color: #000; transition: all 0.2s; }
        .btn-liberar:hover { background: #fbbf24; transform: translateY(-1px); }
    </style>
</head>
<body class="flex h-screen">

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg">
        <div class="w-full max-w-sm p-10 glass rounded-[3rem] text-center border-yellow-500/20 border shadow-2xl">
            <img id="logo-login" src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8 object-contain">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">PORTARIA <span class="text-yellow-500">MASTER</span></h1>
            <div class="space-y-4">
                <input type="text" id="inputNomeUsuario" placeholder="LOGIN OPERADOR" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs">
                <div id="areaSenha" class="hidden">
                    <input type="password" id="senhaUsuario" placeholder="SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs mt-2 border-yellow-500/50">
                </div>
                <button onclick="verificarOuLogar()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl mt-4">ENTRAR</button>
            </div>
        </div>
    </div>

    <div id="interfacePrincipal" class="hidden flex w-full h-full">
        <aside class="w-72 h-full flex flex-col p-6 bg-black/40 border-r border-zinc-900">
            <div class="mb-10 text-center">
                <img id="logo-sidebar" src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 mx-auto mb-2 object-contain">
                <h2 id="nome-sidebar" class="text-yellow-500 font-black italic uppercase text-lg tracking-tighter">CARREGANDO...</h2>
                <p id="operadorAtivo" class="text-[8px] text-zinc-500 font-bold uppercase mt-4 border border-zinc-800 py-2 rounded-lg tracking-widest italic">---</p>
            </div>
            <div class="flex-grow overflow-y-auto">
                <h3 class="text-zinc-600 text-[8px] font-black uppercase mb-4 tracking-widest border-b border-zinc-900 pb-2">Status Eventos</h3>
                <div id="lista-eventos-sidebar" class="space-y-3"></div>
            </div>
            <button onclick="location.reload()" class="mt-6 text-zinc-700 text-[9px] font-black uppercase hover:text-white transition-colors">Sair</button>
        </aside>

        <main class="flex-grow flex flex-col">
            <header class="p-6 border-b border-zinc-900 bg-black/20">
                <div class="max-w-[1400px] mx-auto flex gap-6 items-center">
                    <div class="relative flex-grow">
                        <span class="absolute left-6 top-5 text-zinc-600">🔍</span>
                        <input type="text" id="input-busca" oninput="processarPesquisa()" placeholder="BUSCAR NOME, TELEFONE OU CPF..." class="w-full p-5 pl-16 rounded-2xl text-sm font-bold uppercase text-white shadow-lg">
                    </div>
                    <div class="text-right border-l border-zinc-800 pl-6 min-w-[120px]">
                        <p id="total-checkins" class="text-4xl font-black italic text-green-500 leading-none">0</p>
                        <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest mt-1">Check-ins</p>
                    </div>
                </div>
            </header>

            <section class="flex-grow p-6 overflow-y-auto bg-[#030303]">
                <div id="alertaModoTeste" class="bg-blue-500/10 border border-blue-500/30 text-blue-400 text-center font-black py-2 rounded-xl text-[10px] uppercase mb-6 hidden">
                    ⚠️ MODO DE TESTE ATIVO - BUSCA LIBERADA PARA TODOS OS EVENTOS
                </div>
                <div id="container-resultados" class="max-w-[1400px] mx-auto space-y-3"></div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", authDomain: "teste-de-reserva.firebaseapp.com", projectId: "teste-de-reserva", storageBucket: "teste-de-reserva.firebasestorage.app", messagingSenderId: "163395694876", appId: "1:163395694876:web:8b1116a0483af951548ad9" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Puxa o Clube do Link (O "Endereço")
        const params = new URLSearchParams(window.location.search);
        const clubeId = params.get('clube');

        let bancoClientes = []; let bancoEventos = []; let operadorLogado = ""; let stepLogin = 0; let usuarioData = null;
        let isModoTeste = false;

        // Troca Logos e Textos Dinamicamente
        if (clubeId) {
            getDoc(doc(db, "clientes_revenda", clubeId)).then(snap => {
                if (snap.exists() && snap.data().ativo) {
                    const dados = snap.data();
                    if(dados.logo_url) {
                        document.getElementById('logo-login').src = dados.logo_url;
