<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Portaria Solteiras</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }
        .glass-card { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .input-field { background: #0f0f10 !important; border: 1px solid #27272a !important; color: #fff !important; }
        .input-field:focus { border-color: #eab308 !important; outline: none; box-shadow: 0 0 15px rgba(234, 179, 8, 0.1); }
        .btn-gold { background: #eab308; color: #000; font-weight: 900; transition: 0.3s; }
        .item-cliente { border-bottom: 1px solid #1a1a1a; transition: 0.3s; }
        .cliente-bloqueada { background: linear-gradient(90deg, rgba(153, 27, 27, 0.4) 0%, rgba(5, 5, 5, 1) 100%) !important; border-left: 6px solid #ef4444 !important; }
        .login-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg">
        <div class="w-full max-w-sm p-10 glass-card rounded-[3rem] text-center border-yellow-500/20 border">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">SOLTEIRAS <span class="text-yellow-500">ACCESS</span></h1>
            <div class="space-y-4">
                <input type="text" id="inputNomeUsuario" placeholder="USUÁRIO" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs input-field">
                <div id="areaSenha" class="hidden">
                    <input type="password" id="senhaUsuario" placeholder="SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs mt-2 border-yellow-500/50 input-field">
                </div>
                <button onclick="verificarOuLogar()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl mt-4 active:scale-95 transition-all">CONTINUAR</button>
            </div>
            <p id="msgErro" class="text-red-500 text-[10px] font-black uppercase mt-6 hidden italic text-center">Acesso negado</p>
        </div>
    </div>

    <div id="conteudo-sistema" class="hidden max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-12">
                <div>
                    <h1 class="text-2xl font-black uppercase italic text-yellow-500 leading-none">VIP Single Ladies</h1>
                    <p id="labelOperador" class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1">---</p>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-center min-w-[120px]">
                    <p class="text-[8px] font-black text-zinc-500 uppercase">Check-ins Hoje</p>
                    <p id="contagemEvento" class="text-xl font-black text-green-500">0</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-center min-w-[120px]">
                    <p class="text-[8px] font-black text-zinc-500 uppercase">Base Ativa (90d)</p>
                    <p id="contadorTotal" class="text-xl font-black text-white">0</p>
                </div>
                <button onclick="location.reload()" class="bg-red-500/10 border border-red-500/20 text-red-500 px-4 rounded-2xl font-black uppercase text-[9px]">Sair</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <aside class="lg:col-span-1">
                <div class="glass-card p-6 rounded-[2.5rem] sticky top-8 border-white/5 shadow-2xl">
                    <h2 class="text-yellow-500 font-black uppercase italic text-sm mb-6">Novo Cadastro</h2>
                    <form id="formSolteira" class="space-y-4">
                        <input type="text" id="nome" placeholder="NOME COM SOBRENOME" class="w-full p-4 rounded-xl input-field font-bold text-xs uppercase" required>
                        <input type="tel" id="tel" placeholder="WHATSAPP (DDD + NÚMERO)" class="w-full p-4 rounded-xl input-field font-bold text-xs" oninput="maskTel(this)" required>
                        <input type="text" id="cpf" placeholder="CPF COMPLETO" class="w-full p-4 rounded-xl input-field font-bold text-xs" oninput="maskCPF(this)" required>
                        <input type="date" id="nascimento" class="w-full p-4 rounded-xl input-field font-bold text-xs uppercase" onchange="updateIdade(this.value)" required>
                        <textarea id="obs" placeholder="OBSERVAÇÕES..." class="w-full p-4 rounded-xl input-field font-bold text-[10px] uppercase h-20 resize-none"></textarea>
                        <button type="submit" id="btnSalvar" class="w-full btn-gold py-5 rounded-2xl uppercase text-xs shadow-xl mt-2 active:scale-95 transition-all">Salvar e Liberar</button>
                    </form>
                </div>
            </aside>

            <main class="lg:col-span-2 space-y-6">
                <div class="relative w-full">
                    <input type="text" id="buscaCliente" placeholder="PESQUISAR: MARIA 6901, NOME, CPF..." class="w-full p-5 rounded-2xl input-field text-sm font-bold uppercase pl-14 shadow-2xl border-white/10" oninput="filtrarClientes()">
                    <span class="absolute left-6 top-5 opacity-30 text-xl text-white">🔍</span>
                </div>
                <div class="glass-card rounded-[2.5rem] overflow-hidden min-h-[400px]">
                    <div id="listaSolteiras" class="divide-y divide-zinc-900"></div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, getDocs, query, where, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "cadastro_solteiras");
        let clientesCache = []; let operadorLogado = ""; let stepLogin = 0; let usuarioData = null;

        window.verificarOuLogar = async () => {
            const n = document.getElementById('inputNomeUsuario').value.trim().toLowerCase();
            const s = document.getElementById('senhaUsuario').value.trim();
            if (stepLogin === 0) {
                const docSnap = await getDoc(doc(db, "configuracoes", n));
                if (docSnap.exists()) {
                    usuarioData = docSnap.data(); stepLogin = 1;
                    document.getElementById('areaSenha').classList.remove('hidden');
                    document.getElementById('inputNomeUsuario').readOnly = true;
                    document.getElementById('btnAcao').innerText = "ENTRAR";
                } else { document.getElementById('msgErro').classList.remove('hidden'); }
            } else {
                if (usuarioData.senha === s) logarSucesso(n);
                else alert("Senha incorreta");
            }
        };

        function logarSucesso(n) {
            operadorLogado = n;
            document.getElementById('labelOperador').innerText = "OPERADOR: " + n.toUpperCase();
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('conteudo-sistema').classList.remove('hidden');
            iniciarEscutas();
            faxina90Dias(); 
        }

        async function faxina90Dias() {
            const limite = new Date();
            limite.setDate(limite.getDate() - 90);
            const snap = await getDocs(colRef);
            snap.forEach(async (d) => {
                const data = d.data();
                if (data.bloqueada === true) return;
                const ultima = data.ultima_visita ? data.ultima_visita.toDate() : null;
                if (!ultima || ultima < limite) await deleteDoc(doc(db, "cadastro_solteiras", d.id));
            });
        }

        function iniciarEscutas() {
            onSnapshot(colRef, (snap) => {
                clientesCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                atualizarContadores(); filtrarClientes();
            });
        }

        window.maskCPF = (i) => {
            let v = i.value.replace(/\D/g,"").substring(0,11);
            v = v.replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d{1,2})$/,"$1-$2");
            i.value = v;
        };
        window.maskTel = (i) => {
            let v = i.value.replace(/\D/g,"").substring(0,11);
            v = v.replace(/^(\d{2})(\d)/g,"($1) $2").replace(/(\d)(\d{4})$/,"$1-$2");
            i.value = v;
        };
        window.updateIdade = (v) => { 
            const hoje = new Date(); const nasc = new Date(v + "T12:00:00");
            let idade = hoje.getFullYear() - nasc.getFullYear();
            if (hoje.getMonth() < nasc.getMonth() || (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate())) idade--;
            document.getElementById('idadeDisplay').innerText = isNaN(idade) ? "--" : idade; 
        };

        function render(dados, isBusca = false) {
            const container = document.getElementById('listaSolteiras');
            const agora = new Date();
            const corte = new Date(); corte.setHours(5, 0, 0, 0); if (agora < corte) corte.setDate(corte.getDate() - 1);

            let paraExibir = isBusca ? dados : dados.filter(c => c.ultima_visita && c.ultima_visita.toDate() >= corte);
            
            if (paraExibir.length === 0) {
                if (isBusca) {
                    container.innerHTML = `
                        <div class="p-20 text-center">
                            <p class="text-red-500 font-black uppercase italic text-sm mb-4 animate-pulse">⚠️ CLIENTE NÃO ENCONTRADA</p>
                            <p class="opacity-50 uppercase font-bold text-[10px]">REALIZE O NOVO CADASTRO AO LADO</p>
                        </div>`;
                } else {
                    container.innerHTML = `<div class="p-20 text-center opacity-30 uppercase font-black text-xs italic">Nenhuma solteira na casa</div>`;
                }
                return;
            }

            container.innerHTML = '';
            paraExibir.sort((a,b) => (b.ultima_visita || 0) - (a.ultima_visita || 0)).forEach(c => {
                const u = c.ultima_visita ? c.ultima_visita.toDate() : null;
                const naCasa = u && u >= corte;
                const bloqueada = c.bloqueada === true;
                const div = document.createElement('div');
                div.className = `item-cliente p-6 flex flex-col md:flex-row justify-between items-center gap-4 ${bloqueada ? 'cliente-bloqueada' : (naCasa ? 'bg-green-500/5' : '')}`;
                div.innerHTML = `
                    <div class="flex-grow">
                        <div class="flex items-center gap-3">
                            <h3 class="text-xl font-black uppercase text-white">${c.nome}</h3>
                            ${bloqueada ? '<span class="bg-red-600 text-white px-3 py-1 rounded-lg text-[10px] font-black">⚠️ BLACKLIST</span>' : ''}
                        </div>
                        <p class="text-[10px] text-zinc-500 font-bold mt-1 uppercase">🆔 ${c.cpf} | 📱 ${c.tel} | Visita: ${u ? u.toLocaleDateString('pt-BR') : '---'}</p>
                    </div>
                    <div class="flex gap-2">
                        ${bloqueada ? '<span class="text-red-500 font-black uppercase px-6 py-4 italic">Proibida</span>' : (naCasa ? '<span class="text-green-500 font-black px-6 py-4">✓</span>' : `<button onclick="checkin('${c.id}')" class="bg-green-600 text-white px-10 py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-green-500">Liberar</button>`)}
                    </div>`;
                container.appendChild(div);
            });
        }

        window.filtrarClientes = () => {
            const b = document.getElementById('buscaCliente').value.toUpperCase().trim();
            if (b.length > 0) {
                const termos = b.split(/\s+/);
                const filtrados = clientesCache.filter(c => {
                    const nomeCli = c.nome.toUpperCase();
                    const cpfCli = c.cpf.replace(/\D/g, "");
                    const telCli = c.tel.replace(/\D/g, "");
                    const tudoJunto = `${nomeCli} ${cpfCli} ${telCli}`;
                    return termos.every(termo => tudoJunto.includes(termo));
                });

                if (filtrados.length === 0) {
                    render([], true);
                    document.getElementById('nome').focus();
                } else {
                    render(filtrados, true);
                }
            } else {
                render(clientesCache, false);
            }
        };

        // --- SUBMIT COM TRAVA DE SEGURANÇA (TRY/FINALLY) ---
        document.getElementById('formSolteira').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            const nome = document.getElementById('nome').value.toUpperCase();
            const telRaw = document.getElementById('tel').value;
            const cpfRaw = document.getElementById('cpf').value;

            const telLimpo = telRaw.replace(/\D/g, "");
            const cpfLimpo = cpfRaw.replace(/\D/g, "");

            if (telLimpo.length < 11) {
                alert("TELEFONE INCOMPLETO!");
                document.getElementById('tel').focus();
                return;
            }

            if (cpfLimpo.length < 11) {
                alert("CPF INCOMPLETO!");
                document.getElementById('cpf').focus();
                return;
            }

            btn.disabled = true;
            btn.innerText = "PROCESSANDO...";

            try {
                const qCpf = query(colRef, where("cpf", "==", cpfRaw));
                const snap = await getDocs(qCpf);
                
                if (!snap.empty) {
                    const ex = snap.docs[0];
                    if(ex.data().bloqueada) alert("BLACKLIST!");
                    else { 
                        await updateDoc(doc(db, "cadastro_solteiras", ex.id), { ultima_visita: serverTimestamp() }); 
                        alert("Check-in ok!"); 
                    }
                } else {
                    await addDoc(colRef, { 
                        nome, 
                        tel: telRaw, 
                        cpf: cpfRaw, 
                        nascimento: document.getElementById('nascimento').value, 
                        obs: document.getElementById('obs').value.toUpperCase(), 
                        ultima_visita: serverTimestamp(), 
                        bloqueada: false 
                    });
                    alert("Cadastrada com sucesso!");
                }
                
                document.getElementById('formSolteira').reset();
                document.getElementById('idadeDisplay').innerText = "--";
                document.getElementById('buscaCliente').value = ""; 
                document.getElementById('buscaCliente').focus(); 

            } catch (error) {
                console.error(error);
                alert("Erro ao salvar! Tente novamente.");
            } finally {
                // ESTA LINHA É A CHAVE: ELA SEMPRE VAI RODAR E DESTRAVAR O BOTÃO
                btn.disabled = false;
                btn.innerText = "Salvar e Liberar";
            }
        });

        window.checkin = async (id) => await updateDoc(doc(db, "cadastro_solteiras", id), { ultima_visita: serverTimestamp() });
        function atualizarContadores() { 
            const agora = new Date(); const corte = new Date(); corte.setHours(5, 0, 0, 0); if (agora < corte) corte.setDate(corte.getDate() - 1);
            document.getElementById('contagemEvento').innerText = clientesCache.filter(c => c.ultima_visita && c.ultima_visita.toDate() >= corte).length;
            document.getElementById('contadorTotal').innerText = clientesCache.length;
        }
    </script>
</body>
</html>
