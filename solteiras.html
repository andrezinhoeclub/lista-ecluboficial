<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Portaria Solteiras</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; }
        .glass-card { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .input-field { background: #0f0f10 !important; border: 1px solid #27272a !important; color: #fff !important; }
        .input-field:focus { border-color: #eab308 !important; outline: none; }
        .btn-gold { background: #eab308; color: #000; font-weight: 900; transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.02); }
        .item-cliente { border-bottom: 1px solid #1a1a1a; transition: 0.3s; }
        .item-cliente:hover { background: rgba(234, 179, 8, 0.05); }
        .bday-anim { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-12">
                <div>
                    <h1 class="text-2xl font-black uppercase italic text-yellow-500 leading-none">VIP Single Ladies</h1>
                    <p class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1">Gestão de Portaria</p>
                </div>
            </div>
            
            <div class="flex gap-4">
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-center min-w-[120px]">
                    <p class="text-[8px] font-black text-zinc-500 uppercase">No Evento Hoje</p>
                    <p id="contagemEvento" class="text-xl font-black text-green-500">0</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-center min-w-[120px]">
                    <p class="text-[8px] font-black text-zinc-500 uppercase">Total na Base</p>
                    <p id="contadorTotal" class="text-xl font-black text-white">0</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <aside class="lg:col-span-1">
                <div class="glass-card p-6 rounded-[2.5rem] sticky top-8">
                    <h2 class="text-yellow-500 font-black uppercase italic text-sm mb-6">Novo Cadastro</h2>
                    <form id="formSolteira" class="space-y-4">
                        <input type="text" id="nome" placeholder="NOME COM SOBRENOME" class="w-full p-4 rounded-xl input-field font-bold text-xs uppercase" required>
                        <input type="tel" id="tel" placeholder="WHATSAPP (00) 00000-0000" class="w-full p-4 rounded-xl input-field font-bold text-xs" oninput="maskTel(this)" required>
                        <input type="text" id="cpf" placeholder="CPF" class="w-full p-4 rounded-xl input-field font-bold text-xs" oninput="maskCPF(this)" required>
                        <div class="flex items-center gap-3">
                            <input type="date" id="nascimento" class="w-full p-4 rounded-xl input-field font-bold text-xs uppercase" onchange="updateIdade(this.value)" required>
                            <div class="bg-zinc-900 px-4 py-3 rounded-xl border border-zinc-800 text-center min-w-[70px]">
                                <p class="text-[7px] font-black text-zinc-500 uppercase">Idade</p>
                                <p id="idadeDisplay" class="text-sm font-black text-yellow-500">--</p>
                            </div>
                        </div>
                        <textarea id="obs" placeholder="OBSERVAÇÕES (OPCIONAL)" class="w-full p-4 rounded-xl input-field font-bold text-[10px] uppercase h-20 resize-none"></textarea>
                        <button type="submit" class="w-full btn-gold py-5 rounded-2xl uppercase text-xs shadow-xl mt-2">Salvar e Confirmar</button>
                    </form>
                </div>
            </aside>

            <main class="lg:col-span-2 space-y-6">
                <div class="relative w-full">
                    <input type="text" id="buscaCliente" placeholder="BUSCAR POR NOME, CPF OU TELEFONE..." class="w-full p-5 rounded-2xl input-field text-sm font-bold uppercase pl-14 shadow-2xl" oninput="filtrarClientes()">
                    <span class="absolute left-6 top-5 opacity-30 text-xl">🔍</span>
                </div>

                <div class="glass-card rounded-[2.5rem] overflow-hidden">
                    <div id="listaSolteiras" class="divide-y divide-zinc-900 max-h-[700px] overflow-y-auto">
                        </div>
                </div>
            </main>
        </div>
    </div>

    <div id="modalEdit" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-md border-yellow-500/30 border-2">
            <h2 class="text-yellow-500 font-black uppercase italic mb-6">Editar Observações</h2>
            <input type="hidden" id="editId">
            <textarea id="editObsField" class="w-full p-4 rounded-xl input-field font-bold text-[11px] uppercase h-40 resize-none mb-6"></textarea>
            <div class="flex gap-4">
                <button onclick="fecharModal()" class="flex-grow bg-zinc-800 py-4 rounded-xl uppercase text-[10px] font-black">Cancelar</button>
                <button onclick="salvarObs()" class="flex-grow btn-gold py-4 rounded-xl uppercase text-[10px] font-black">Salvar Obs</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "cadastro_solteiras");

        let clientesCache = [];

        window.maskCPF = (i) => {
            let v = i.value.replace(/\D/g,"");
            v = v.replace(/(\d{3})(\d)/,"$1.$2");
            v = v.replace(/(\d{3})(\d)/,"$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/,"$1-$2");
            i.value = v;
        };

        window.maskTel = (i) => {
            let v = i.value.replace(/\D/g,"");
            v = v.replace(/^(\d{2})(\d)/g,"($1) $2");
            v = v.replace(/(\d)(\d{4})$/,"$1-$2");
            i.value = v;
        };

        function calcIdade(d) {
            if(!d) return "--";
            const hoje = new Date();
            const nasc = new Date(d + "T12:00:00");
            let idade = hoje.getFullYear() - nasc.getFullYear();
            const m = hoje.getMonth() - nasc.getMonth();
            if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) idade--;
            return idade;
        }

        function ehAniversario(dataNasc) {
            if(!dataNasc) return false;
            const hoje = new Date();
            const nasc = new Date(dataNasc + "T12:00:00");
            return hoje.getDate() === nasc.getDate() && hoje.getMonth() === nasc.getMonth();
        }

        window.updateIdade = (v) => { document.getElementById('idadeDisplay').innerText = calcIdade(v); };

        function obterDataCorteEvento() {
            const agora = new Date();
            const corte = new Date();
            corte.setHours(5, 0, 0, 0); 
            if (agora < corte) corte.setDate(corte.getDate() - 1);
            return corte;
        }

        onSnapshot(colRef, (snap) => {
            clientesCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            atualizarContadores();
            render(clientesCache);
        });

        function atualizarContadores() {
            const dataCorte = obterDataCorteEvento();
            let totalEvento = 0;
            clientesCache.forEach(c => {
                if (c.ultima_visita && c.ultima_visita.toDate() > dataCorte) totalEvento++;
            });
            document.getElementById('contagemEvento').innerText = totalEvento;
            document.getElementById('contadorTotal').innerText = clientesCache.length;
        }

        function render(dados) {
            const container = document.getElementById('listaSolteiras');
            container.innerHTML = dados.length ? '' : '<p class="p-10 text-center text-zinc-600 font-bold uppercase text-[10px]">Sem cadastros localizados</p>';
            const dataCorte = obterDataCorteEvento();

            dados.sort((a,b) => (b.ultima_visita || 0) - (a.ultima_visita || 0)).forEach(c => {
                const idade = calcIdade(c.nascimento);
                const niver = ehAniversario(c.nascimento);
                const uDate = c.ultima_visita ? c.ultima_visita.toDate() : null;
                const estaNoEvento = uDate && uDate > dataCorte;
                
                const div = document.createElement('div');
                div.className = `item-cliente p-6 flex flex-col md:flex-row justify-between items-center gap-4 ${estaNoEvento ? 'bg-green-500/5' : ''}`;
                div.innerHTML = `
                    <div class="flex-grow">
                        <div class="flex items-center flex-wrap gap-2">
                            <h3 class="text-lg font-black uppercase ${estaNoEvento ? 'text-green-400' : 'text-white'}">${c.nome}</h3>
                            <span class="text-lg font-black text-green-500"> — ${c.tel || '(00) 00000-0000'}</span>
                            ${niver ? '<span class="bg-pink-600 text-white text-[9px] font-black px-2 py-1 rounded bday-anim">🎂 ANIVERSARIANTE!</span>' : ''}
                        </div>
                        <div class="flex flex-wrap gap-x-4 gap-y-1 mt-1 opacity-70">
                            <span class="text-[10px] font-bold uppercase text-zinc-300">🎂 ${idade} ANOS</span>
                            <span class="text-[10px] font-bold uppercase text-zinc-300">🆔 ${c.cpf}</span>
                        </div>
                        ${c.obs ? `<p class="bg-yellow-500/10 border border-yellow-500/20 text-yellow-500 text-[10px] font-bold p-3 rounded-xl mt-3 uppercase">⚠️ OBS: ${c.obs}</p>` : ''}
                        <p class="text-[9px] font-black text-yellow-600 uppercase mt-2 tracking-widest italic">
                            ${estaNoEvento ? '● CONFIRMADA NO EVENTO' : 'ÚLTIMA VISITA: ' + (uDate ? uDate.toLocaleDateString('pt-BR') : 'NUNCA')}
                        </p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="abrirModal('${c.id}', \`${c.obs || ''}\`)" class="bg-zinc-800 text-white px-4 py-3 rounded-xl text-[9px] font-black uppercase hover:bg-zinc-700">Obs</button>
                        ${estaNoEvento ? 
                            '<span class="text-green-500 text-[10px] font-black uppercase px-4">NA CASA ✓</span>' : 
                            `<button onclick="checkin('${c.id}')" class="bg-green-600 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-green-500">Check-in</button>`
                        }
                        <button onclick="remover('${c.id}')" class="text-zinc-800 hover:text-red-500 p-2 transition">✕</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        document.getElementById('formSolteira').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(colRef, {
                nome: document.getElementById('nome').value.toUpperCase(),
                tel: document.getElementById('tel').value,
                cpf: document.getElementById('cpf').value,
                nascimento: document.getElementById('nascimento').value,
                obs: document.getElementById('obs').value.toUpperCase(),
                data_cadastro: serverTimestamp(),
                ultima_visita: serverTimestamp() 
            });
            e.target.reset();
            document.getElementById('idadeDisplay').innerText = "--";
        });

        window.checkin = async (id) => { 
            await updateDoc(doc(db, "cadastro_solteiras", id), { ultima_visita: serverTimestamp() }); 
        };

        window.abrirModal = (id, obs) => {
            document.getElementById('editId').value = id;
            document.getElementById('editObsField').value = obs;
            document.getElementById('modalEdit').classList.remove('hidden');
        };

        window.fecharModal = () => document.getElementById('modalEdit').classList.add('hidden');

        window.salvarObs = async () => {
            const id = document.getElementById('editId').value;
            const novaObs = document.getElementById('editObsField').value.toUpperCase();
            await updateDoc(doc(db, "cadastro_solteiras", id), { obs: novaObs });
            fecharModal();
        };

        window.remover = async (id) => {
            if(confirm("Excluir permanentemente?")) await deleteDoc(doc(db, "cadastro_solteiras", id));
        };

        window.filtrarClientes = () => {
            const b = document.getElementById('buscaCliente').value.toUpperCase();
            render(clientesCache.filter(c => c.nome.includes(b) || c.cpf.includes(b) || (c.tel && c.tel.includes(b))));
        };

        setInterval(atualizarContadores, 60000);
    </script>
</body>
</html>
