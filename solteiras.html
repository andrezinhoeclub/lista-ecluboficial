<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Cadastro de Solteiras</title>
    
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; }
        .glass-card { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .input-field { background: #0f0f10 !important; border: 1px solid #27272a !important; color: #fff !important; }
        .input-field:focus { border-color: #eab308 !important; outline: none; }
        .btn-gold { background: #eab308; color: #000; font-weight: 900; transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.02); }
        .item-cliente { border-bottom: 1px solid #1a1a1a; transition: 0.3s; }
        .item-cliente:hover { background: rgba(234, 179, 8, 0.05); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-12">
                <div>
                    <h1 class="text-2xl font-black uppercase italic text-yellow-500 leading-none">VIP Single Ladies</h1>
                    <p class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1">Gestão de Cadastro e Recorrência</p>
                </div>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" id="buscaCliente" placeholder="BUSCAR NOME, CPF OU TEL..." class="w-full p-4 rounded-2xl input-field text-xs font-bold uppercase pl-12" oninput="filtrarClientes()">
                <span class="absolute left-4 top-4 opacity-30">🔍</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <aside class="lg:col-span-1">
                <div class="glass-card p-6 rounded-[2.5rem] sticky top-8">
                    <h2 class="text-yellow-500 font-black uppercase italic text-sm mb-6 tracking-widest">Novo Cadastro</h2>
                    <form id="formSolteira" class="space-y-4">
                        <input type="text" id="nome" placeholder="NOME COM SOBRENOME" class="w-full p-4 rounded-xl input-field font-bold text-xs uppercase" required>
                        <input type="tel" id="tel" placeholder="WHATSAPP (00) 00000-0000" class="w-full p-4 rounded-xl input-field font-bold text-xs" required>
                        <input type="text" id="cpf" placeholder="CPF (SÓ NÚMEROS)" class="w-full p-4 rounded-xl input-field font-bold text-xs" required>
                        
                        <div class="flex items-center gap-3">
                            <input type="date" id="nascimento" class="w-full p-4 rounded-xl input-field font-bold text-xs uppercase" onchange="calcularIdadeVisual(this.value)" required>
                            <div class="bg-zinc-900 px-4 py-3 rounded-xl border border-zinc-800 text-center min-w-[70px]">
                                <p class="text-[7px] font-black text-zinc-500 uppercase">Idade</p>
                                <p id="idadeDisplay" class="text-sm font-black text-yellow-500">--</p>
                            </div>
                        </div>
                        
                        <button type="submit" class="w-full btn-gold py-5 rounded-2xl uppercase text-xs shadow-xl mt-4">Salvar Cadastro</button>
                    </form>
                </div>
            </aside>

            <main class="lg:col-span-2">
                <div class="glass-card rounded-[2.5rem] overflow-hidden">
                    <div class="p-6 border-b border-zinc-800 bg-zinc-900/30 flex justify-between items-center">
                        <h2 class="text-xs font-black uppercase text-zinc-400 tracking-widest italic">Solteiras Cadastradas</h2>
                        <span id="contadorClientes" class="bg-yellow-500 text-black px-3 py-1 rounded-full text-[10px] font-black">0</span>
                    </div>
                    <div id="listaSolteiras" class="divide-y divide-zinc-900 max-h-[600px] overflow-y-auto">
                        </div>
                </div>

                <div class="mt-8">
                    <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8a1td9COH2T" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "cadastro_solteiras");

        let clientesCache = [];

        function calcularIdade(dataNasc) {
            if(!dataNasc) return "--";
            const hoje = new Date();
            const nasc = new Date(dataNasc);
            let idade = hoje.getFullYear() - nasc.getFullYear();
            const m = hoje.getMonth() - nasc.getMonth();
            if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) idade--;
            return idade;
        }

        window.calcularIdadeVisual = (val) => {
            document.getElementById('idadeDisplay').innerText = calcularIdade(val);
        };

        async function executarFaxina() {
            const limite = new Date();
            limite.setDate(limite.getDate() - 90);
            const q = query(colRef);
            const snap = await getDocs(q);
            snap.forEach(async (d) => {
                const data = d.data();
                const ultimaV = data.ultima_visita ? data.ultima_visita.toDate() : data.data_cadastro.toDate();
                if (ultimaV < limite) await deleteDoc(doc(db, "cadastro_solteiras", d.id));
            });
        }
        executarFaxina();

        onSnapshot(colRef, (snap) => {
            clientesCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            document.getElementById('contadorClientes').innerText = clientesCache.length;
            renderizar(clientesCache);
        });

        function renderizar(dados) {
            const container = document.getElementById('listaSolteiras');
            container.innerHTML = dados.length ? '' : '<p class="p-20 text-center text-zinc-700 font-bold uppercase text-xs">Nenhum cadastro localizado</p>';
            
            dados.sort((a,b) => (b.ultima_visita || 0) - (a.ultima_visita || 0)).forEach(c => {
                const idade = calcularIdade(c.nascimento);
                const ultima = c.ultima_visita ? c.ultima_visita.toDate().toLocaleString('pt-BR') : "Sem registros";
                
                const div = document.createElement('div');
                div.className = "item-cliente p-6 flex flex-col md:flex-row justify-between items-center gap-4";
                div.innerHTML = `
                    <div class="flex-grow">
                        <h3 class="text-sm font-black uppercase text-white">${c.nome}</h3>
                        <div class="flex flex-wrap gap-4 mt-1 opacity-50">
                            <span class="text-[10px] font-bold uppercase">🎂 ${idade} ANOS</span>
                            <span class="text-[10px] font-bold uppercase">🆔 ${c.cpf}</span>
                            <span class="text-[10px] font-bold uppercase">📱 ${c.tel}</span>
                        </div>
                        <p class="text-[9px] font-black text-yellow-600 uppercase mt-3 tracking-widest italic">Última Entrada: ${ultima}</p>
                    </div>
                    <button onclick="registrarVisita('${c.id}')" class="bg-green-600 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-green-500 transition shadow-lg">Confirmar Entrada</button>
                    <button onclick="remover('${c.id}')" class="text-zinc-700 hover:text-red-500 p-2 transition">✕</button>
                `;
                container.appendChild(div);
            });
        }

        document.getElementById('formSolteira').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(colRef, {
                nome: document.getElementById('nome').value.toUpperCase(),
                tel: document.getElementById('tel').value,
                cpf: document.getElementById('cpf').value,
                nascimento: document.getElementById('nascimento').value,
                data_cadastro: serverTimestamp(),
                ultima_visita: null
            });
            e.target.reset();
            document.getElementById('idadeDisplay').innerText = "--";
            alert("Cadastro realizado!");
        });

        window.registrarVisita = async (id) => {
            if(confirm("Registrar entrada dessa cliente agora?")) {
                await updateDoc(doc(db, "cadastro_solteiras", id), { ultima_visita: serverTimestamp() });
            }
        };

        window.remover = async (id) => {
            if(confirm("Excluir cadastro permanentemente?")) await deleteDoc(doc(db, "cadastro_solteiras", id));
        };

        window.filtrarClientes = () => {
            const b = document.getElementById('buscaCliente').value.toUpperCase();
            renderizar(clientesCache.filter(c => c.nome.includes(b) || c.cpf.includes(b) || c.tel.includes(b)));
        };
    </script>
</body>
</html>
