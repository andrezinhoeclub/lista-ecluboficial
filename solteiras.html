<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Portaria Solteiras</title>
    
    <meta name="apple-mobile-web-app-title" content="Solteiras E-CLUB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <link rel="apple-touch-icon" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; }
        .glass-card { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .input-field { background: #0f0f10 !important; border: 1px solid #27272a !important; color: #fff !important; }
        .input-field:focus { border-color: #eab308 !important; outline: none; }
        .btn-gold { background: #eab308; color: #000; font-weight: 900; transition: 0.3s; }
        .item-cliente { border-bottom: 1px solid #1a1a1a; transition: 0.3s; }
        .login-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg">
        <div class="w-full max-w-sm p-10 glass-card rounded-[3rem] text-center border-yellow-500/20 border">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">SOLTEIRAS <span class="text-yellow-500">ACCESS</span></h1>
            <div class="space-y-4">
                <input type="text" id="inputNomeUsuario" placeholder="USUÁRIO" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs input-field">
                <div id="areaSenha" class="hidden">
                    <input type="password" id="senhaUsuario" placeholder="SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs mt-2 border-yellow-500/50 input-field">
                </div>
                <button onclick="verificarOuLogar()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl mt-4 active:scale-95 transition-all">CONTINUAR</button>
            </div>
            <p id="msgErro" class="text-red-500 text-[10px] font-black uppercase mt-6 hidden italic text-center">Acesso negado</p>
        </div>
    </div>

    <div id="conteudo-sistema" class="hidden max-w-6xl mx-auto text-white">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-12">
                <div>
                    <h1 class="text-2xl font-black uppercase italic text-yellow-500 leading-none">VIP Single Ladies</h1>
                    <p id="labelOperador" class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1">---</p>
                </div>
            </div>
            
            <div class="flex gap-4">
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-center min-w-[120px]">
                    <p class="text-[8px] font-black text-zinc-500 uppercase">Check-ins Hoje</p>
                    <p id="contagemEvento" class="text-xl font-black text-green-500">0</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-center min-w-[120px]">
                    <p class="text-[8px] font-black text-zinc-500 uppercase">Total na Base</p>
                    <p id="contadorTotal" class="text-xl font-black text-white">0</p>
                </div>
                <button onclick="location.reload()" class="bg-red-500/10 border border-red-500/20 text-red-500 px-4 rounded-2xl font-black uppercase text-[9px]">Sair</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <aside class="lg:col-span-1">
                <div class="glass-card p-6 rounded-[2.5rem] sticky top-8 border-white/5">
                    <h2 class="text-yellow-500 font-black uppercase italic text-sm mb-6">Novo Cadastro</h2>
                    <form id="formSolteira" class="space-y-4">
                        <input type="text" id="nome" placeholder="NOME COM SOBRENOME" class="w-full p-4 rounded-xl input-field font-bold text-xs uppercase" required>
                        <input type="tel" id="tel" placeholder="WHATSAPP" class="w-full p-4 rounded-xl input-field font-bold text-xs" oninput="maskTel(this)" required>
                        <input type="text" id="cpf" placeholder="CPF" class="w-full p-4 rounded-xl input-field font-bold text-xs" oninput="maskCPF(this)" required>
                        <div class="flex items-center gap-3">
                            <input type="date" id="nascimento" class="w-full p-4 rounded-xl input-field font-bold text-xs uppercase" onchange="updateIdade(this.value)" required>
                            <div class="bg-zinc-900 px-4 py-3 rounded-xl border border-zinc-800 text-center min-w-[70px]">
                                <p class="text-[7px] font-black text-zinc-500 uppercase">Idade</p>
                                <p id="idadeDisplay" class="text-sm font-black text-yellow-500">--</p>
                            </div>
                        </div>
                        <textarea id="obs" placeholder="OBSERVAÇÕES (OPCIONAL)" class="w-full p-4 rounded-xl input-field font-bold text-[10px] uppercase h-20 resize-none"></textarea>
                        <button type="submit" id="btnSalvar" class="w-full btn-gold py-5 rounded-2xl uppercase text-xs shadow-xl mt-2 active:scale-95 transition-all">Salvar e Confirmar</button>
                    </form>
                </div>
            </aside>

            <main class="lg:col-span-2 space-y-6">
                <div class="relative w-full">
                    <input type="text" id="buscaCliente" placeholder="PESQUISAR: NOME, CPF OU WHATSAPP..." class="w-full p-5 rounded-2xl input-field text-sm font-bold uppercase pl-14 shadow-2xl border-white/10" oninput="filtrarClientes()">
                    <span class="absolute left-6 top-5 opacity-30 text-xl text-white">🔍</span>
                </div>
                <div class="glass-card rounded-[2.5rem] overflow-hidden min-h-[400px]">
                    <div id="listaSolteiras" class="divide-y divide-zinc-900"></div>
                </div>
            </main>
        </div>
    </div>

    <div id="modalEdit" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-6">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-md border-yellow-500/30 border-2 text-center text-white">
            <h2 class="text-yellow-500 font-black uppercase italic mb-6 tracking-widest text-white">Editar Observações</h2>
            <input type="hidden" id="editId">
            <textarea id="editObsField" class="w-full p-4 rounded-xl input-field font-bold text-[11px] uppercase h-40 resize-none mb-6"></textarea>
            <div class="flex gap-4">
                <button onclick="fecharModal()" class="flex-grow bg-zinc-800 py-4 rounded-xl uppercase text-[10px] font-black">Cancelar</button>
                <button onclick="salvarObs()" class="flex-grow btn-gold py-4 rounded-xl uppercase text-[10px] font-black">Salvar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, query, getDocs, where, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "cadastro_solteiras");
        let clientesCache = [];
        let operadorLogado = "";
        let stepLogin = 0;
        let usuarioData = null;

        // --- LÓGICA DE LOGIN UNIFICADA ---
        window.verificarOuLogar = async () => {
            const n = document.getElementById('inputNomeUsuario').value.trim().toLowerCase();
            const s = document.getElementById('senhaUsuario').value.trim();
            const erroMsg = document.getElementById('msgErro');
            
            if (stepLogin === 0) {
                const docSnap = await getDoc(doc(db, "configuracoes", n));
                if (docSnap.exists()) {
                    usuarioData = docSnap.data();
                    stepLogin = 1;
                    document.getElementById('areaSenha').classList.remove('hidden');
                    document.getElementById('inputNomeUsuario').readOnly = true;
                    document.getElementById('btnAcao').innerText = "ENTRAR";
                    erroMsg.classList.add('hidden');
                } else {
                    erroMsg.classList.remove('hidden');
                }
            } else {
                if (usuarioData.senha === s) {
                    logarSucesso(n);
                } else {
                    alert("Senha incorreta!");
                }
            }
        };

        function logarSucesso(n) {
            operadorLogado = n;
            document.getElementById('labelOperador').innerText = "OPERADOR: " + n.toUpperCase();
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('conteudo-sistema').classList.remove('hidden');
            iniciarEscutas();
        }

        function iniciarEscutas() {
            onSnapshot(colRef, (snap) => {
                clientesCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                atualizarContadores();
                filtrarClientes();
            });
        }

        // --- MÁSCARAS E AUXILIARES ---
        window.maskCPF = (i) => {
            let v = i.value.replace(/\D/g,"").substring(0,11);
            v = v.replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d{1,2})$/,"$1-$2");
            i.value = v;
        };

        window.maskTel = (i) => {
            let v = i.value.replace(/\D/g,"").substring(0,11);
            v = v.replace(/^(\d{2})(\d)/g,"($1) $2").replace(/(\d)(\d{4})$/,"$1-$2");
            i.value = v;
        };

        window.updateIdade = (v) => { 
            const hoje = new Date();
            const nasc = new Date(v + "T12:00:00");
            let idade = hoje.getFullYear() - nasc.getFullYear();
            const m = hoje.getMonth() - nasc.getMonth();
            if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) idade--;
            document.getElementById('idadeDisplay').innerText = isNaN(idade) ? "--" : idade; 
        };

        function obterDataCorteEvento() { 
            const a = new Date(); 
            const c = new Date(); 
            c.setHours(5, 0, 0, 0); 
            if (a < c) c.setDate(c.getDate() - 1); 
            return c; 
        }

        function render(dados, isBusca = false) {
            const container = document.getElementById('listaSolteiras');
            const corte = obterDataCorteEvento();
            
            let paraExibir = dados;
            if (!isBusca) {
                paraExibir = dados.filter(c => {
                    const u = c.ultima_visita ? c.ultima_visita.toDate() : null;
                    return u && u >= corte;
                });
            }

            if (paraExibir.length === 0) {
                const msg = isBusca ? 
                    '<div class="p-20 text-center"><p class="text-red-500 font-black uppercase text-2xl italic mb-2">Cliente Sem Cadastro</p><p class="text-zinc-500 text-[11px] uppercase font-bold text-white text-white">Utilize o formulário ao lado para cadastrar.</p></div>' : 
                    '<div class="p-20 text-center"><p class="text-zinc-700 font-black uppercase text-xs italic text-white text-white text-white">Aguardando pesquisa ou check-ins hoje...</p></div>';
                container.innerHTML = msg;
                return;
            }

            container.innerHTML = '';
            paraExibir.sort((a,b) => (b.ultima_visita || 0) - (a.ultima_visita || 0)).forEach(c => {
                const u = c.ultima_visita ? c.ultima_visita.toDate() : null;
                const naCasa = u && u >= corte;
                
                const div = document.createElement('div');
                div.className = `item-cliente p-6 flex flex-col md:flex-row justify-between items-center gap-4 ${naCasa ? 'bg-green-500/5' : ''}`;
                div.innerHTML = `
                    <div class="flex-grow text-white">
                        <div class="flex items-center flex-wrap gap-2 text-white">
                            <h3 class="text-lg font-black uppercase ${naCasa ? 'text-green-400' : 'text-white'} text-white">${c.nome}</h3>
                            <span class="text-xl font-black text-green-500 font-mono text-white"> — ${c.tel}</span>
                        </div>
                        <p class="text-[10px] text-zinc-500 font-bold mt-1 uppercase text-white">🆔 ${c.cpf} | ÚLTIMA: ${u ? u.toLocaleDateString('pt-BR') : 'NUNCA'}</p>
                        ${c.obs ? `<p class="bg-yellow-500/10 border border-yellow-500/20 text-yellow-500 text-[10px] font-bold p-3 rounded-xl mt-3 uppercase text-white">⚠️ ${c.obs}</p>` : ''}
                    </div>
                    <div class="flex items-center gap-2 text-white">
                        <button onclick="abrirModal('${c.id}', \`${c.obs || ''}\`)" class="bg-zinc-800 text-white px-4 py-3 rounded-xl text-[9px] font-black uppercase hover:bg-zinc-700 text-white">Obs</button>
                        ${naCasa ? '<span class="text-green-500 text-[10px] font-black uppercase px-4 text-white">NA CASA ✓</span>' : `<button onclick="checkin('${c.id}')" class="bg-green-600 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-green-500 shadow-lg shadow-green-900/20 text-white">Liberar</button>`}
                    </div>`;
                container.appendChild(div);
            });
        }

        document.getElementById('formSolteira').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            const nome = document.getElementById('nome').value.trim().toUpperCase();
            const tel = document.getElementById('tel').value.trim();
            const cpf = document.getElementById('cpf').value.trim();

            if(tel.length < 14 || cpf.length < 14) return alert("Telefone ou CPF incompletos!");

            btn.disabled = true;
            btn.innerText = "VERIFICANDO...";

            try {
                const qTel = query(colRef, where("tel", "==", tel));
                const qCpf = query(colRef, where("cpf", "==", cpf));
                const [sTel, sCpf] = await Promise.all([getDocs(qTel), getDocs(qCpf)]);

                if (!sTel.empty || !sCpf.empty) {
                    const docExistente = !sTel.empty ? sTel.docs[0] : sCpf.docs[0];
                    if(confirm(`CLIENTE JÁ CADASTRADA!\nRealizar check-in de hoje?`)) {
                        await updateDoc(doc(db, "cadastro_solteiras", docExistente.id), { ultima_visita: serverTimestamp(), operador_checkin: operadorLogado });
                    }
                } else {
                    await addDoc(colRef, {
                        nome, tel, cpf,
                        nascimento: document.getElementById('nascimento').value,
                        obs: document.getElementById('obs').value.toUpperCase(),
                        ultima_visita: serverTimestamp(),
                        operador_cadastro: operadorLogado
                    });
                    alert("Cadastrada e liberada!");
                }
                document.getElementById('formSolteira').reset();
                document.getElementById('idadeDisplay').innerText = "--";
                document.getElementById('buscaCliente').value = "";
            } catch (err) { alert("Erro ao salvar."); }
            btn.disabled = false;
            btn.innerText = "Salvar e Confirmar";
        });

        window.checkin = async (id) => await updateDoc(doc(db, "cadastro_solteiras", id), { ultima_visita: serverTimestamp(), operador_checkin: operadorLogado });
        window.abrirModal = (id, obs) => { document.getElementById('editId').value = id; document.getElementById('editObsField').value = obs; document.getElementById('modalEdit').classList.remove('hidden'); };
        window.fecharModal = () => document.getElementById('modalEdit').classList.add('hidden');
        window.salvarObs = async () => { await updateDoc(doc(db, "cadastro_solteiras", document.getElementById('editId').value), { obs: document.getElementById('editObsField').value.toUpperCase() }); fecharModal(); };

        function atualizarContadores() {
            const corte = obterDataCorteEvento();
            document.getElementById('contagemEvento').innerText = clientesCache.filter(c => c.ultima_visita && c.ultima_visita.toDate() >= corte).length;
            document.getElementById('contadorTotal').innerText = clientesCache.length;
        }

        window.filtrarClientes = () => {
            const b = document.getElementById('buscaCliente').value.toUpperCase();
            if (b.length > 0) {
                const tLimpo = b.replace(/\D/g, "");
                render(clientesCache.filter(c => {
                    const nMatch = c.nome.includes(b);
                    const cMatch = c.cpf.replace(/\D/g, "").includes(tLimpo);
                    const tMatch = c.tel.replace(/\D/g, "").includes(tLimpo);
                    return nMatch || (tLimpo && (cMatch || tMatch));
                }), true);
            } else {
                render(clientesCache, false);
            }
        };
    </script>
</body>
</html>
