<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Portaria Solteiras</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f4f4f5; color: #18181b; overflow-x: hidden; }
        
        /* NOVO VISUAL DE ALTO CONTRASTE */
        .glass-card { background: #ffffff; border: 1px solid #d4d4d8; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        .input-field { background: #ffffff !important; border: 2px solid #a1a1aa !important; color: #000 !important; font-weight: 900; }
        .input-field:focus { border-color: #eab308 !important; outline: none; box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.3); }
        .input-field::placeholder { color: #71717a; font-weight: bold; }
        
        .btn-gold { background: #eab308; color: #000; font-weight: 900; transition: 0.3s; border: 2px solid #ca8a04; }
        .btn-gold:hover { background: #facc15; }
        
        .card-aniversariante {
            background: linear-gradient(90deg, rgba(254, 240, 138, 0.3) 0%, rgba(233, 213, 255, 0.3) 100%) !important;
            border-left: 6px solid #eab308 !important;
        }

        .item-cliente { border-bottom: 1px solid #e4e4e7; transition: 0.3s; background: #ffffff; }
        .item-cliente:hover { background: #f4f4f5; }
        .cliente-bloqueada { background: #fef2f2 !important; border-left: 6px solid #ef4444 !important; }
        .cliente-checkin-ok { background: #f0fdf4 !important; }
        
        /* TELA DE LOGIN MANTIDA ESCURA PARA ESTILO */
        .login-bg { background: radial-gradient(circle at center, #27272a 0%, #09090b 100%); }
        .login-card { background: #18181b; border: 1px solid #3f3f46; }
        .login-input { background: #000 !important; border: 1px solid #52525b !important; color: #fff !important; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #a1a1aa; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col min-h-screen relative">

    <div class="fixed inset-0 z-[99999] bg-[#050505] flex-col items-center justify-center p-8 text-center flex md:hidden">
        <div class="login-card p-8 rounded-[2.5rem] border border-red-500/30 flex flex-col items-center shadow-[0_0_50px_rgba(239,68,68,0.15)]">
            <span class="text-6xl mb-6">🖥️</span>
            <h1 class="text-xl font-black uppercase italic text-red-500 mb-3 tracking-tighter">Acesso Restrito</h1>
            <p class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest leading-relaxed">O sistema de Portaria deve ser acessado <br><span class="text-white">exclusivamente por um computador</span>.</p>
        </div>
    </div>

    <div id="toast-aviso" class="fixed top-4 left-1/2 -translate-x-1/2 z-[10001] text-white font-black text-[10px] uppercase tracking-widest px-6 py-4 rounded-2xl shadow-2xl transition-all duration-300 transform -translate-y-32 opacity-0 flex items-center gap-3 w-[90%] max-w-sm pointer-events-none border border-white/20">
        <span id="toast-icon" class="text-lg">⚠️</span>
        <span id="toast-msg">Mensagem de erro</span>
    </div>

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg">
        <div class="w-full max-w-sm p-10 login-card rounded-[3rem] text-center border-yellow-500/30 shadow-2xl">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic text-white">SOLTEIRAS <span class="text-yellow-500">ACCESS</span></h1>
            <div class="space-y-4">
                <input type="text" id="inputNomeUsuario" placeholder="USUÁRIO" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs login-input">
                <div id="areaSenha" class="hidden">
                    <input type="password" id="senhaUsuario" placeholder="SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs mt-2 border-yellow-500/50 login-input focus:border-yellow-500">
                </div>
                <button onclick="verificarOuLogar()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl mt-4 active:scale-95 transition-all">ACESSAR SISTEMA</button>
            </div>
        </div>
    </div>

    <div id="conteudo-sistema" class="hidden max-w-6xl mx-auto flex-grow w-full">
        <header class="flex justify-between items-center mb-8 gap-6 bg-white p-4 rounded-3xl border border-zinc-300 shadow-sm">
            <div class="flex items-center gap-4">
                <div class="bg-black rounded-xl p-2"><img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-10"></div>
                <div>
                    <h1 class="text-2xl font-black uppercase italic text-zinc-900 leading-none">VIP Single Ladies</h1>
                    <p id="labelOperador" class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1">---</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-zinc-100 border border-zinc-300 p-3 rounded-2xl text-center min-w-[120px]">
                    <p class="text-[9px] font-black text-zinc-600 uppercase">Check-ins Turno</p>
                    <p id="contagemEvento" class="text-2xl font-black text-green-600 leading-none mt-1">0</p>
                </div>
                <button onclick="location.reload()" class="bg-red-100 border border-red-300 text-red-600 px-4 py-3 rounded-2xl font-black uppercase text-[10px] hover:bg-red-200 transition-colors">Sair</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
            <aside class="lg:col-span-1">
                <div class="glass-card p-6 rounded-[2rem] sticky top-8">
                    <h2 id="tituloForm" class="text-zinc-900 font-black uppercase italic text-sm mb-6 border-b border-zinc-200 pb-2">📋 Cadastro / Entrada</h2>
                    <form id="formSolteira" class="space-y-4">
                        <input type="hidden" id="editId">
                        <input type="text" id="nome" placeholder="NOME COM SOBRENOME" class="w-full p-4 rounded-xl input-field text-sm" required>
                        <input type="tel" id="tel" placeholder="WHATSAPP" class="w-full p-4 rounded-xl input-field text-sm" oninput="maskTel(this)" onblur="validarDuplicidade('tel')" required>
                        <input type="text" id="cpf" placeholder="CPF COMPLETO" class="w-full p-4 rounded-xl input-field text-sm" oninput="maskCPF(this)" onblur="validarDuplicidade('cpf')" required>
                        
                        <div>
                            <label class="text-[10px] font-black text-zinc-500 uppercase ml-2">Data de Nascimento</label>
                            <input type="date" id="nascimento" class="w-full p-4 rounded-xl input-field text-sm uppercase mt-1" onchange="updateIdade(this.value)" required>
                        </div>
                        
                        <div class="bg-zinc-100 p-4 rounded-xl border border-zinc-300 flex justify-between items-center text-zinc-900">
                            <p class="text-[10px] font-black text-zinc-600 uppercase">Idade Calculada</p>
                            <p id="idadeDisplay" class="text-xl font-black text-zinc-900">--</p>
                        </div>
                        
                        <textarea id="obs" placeholder="OBSERVAÇÕES (OPCIONAL)..." class="w-full p-4 rounded-xl input-field text-xs uppercase h-20 resize-none"></textarea>
                        
                        <button type="submit" id="btnSalvar" class="w-full btn-gold py-5 rounded-xl uppercase text-sm shadow-md mt-2 active:scale-95 transition-all">Confirmar e Liberar</button>
                        <button type="button" id="btnCancelarEdicao" onclick="limparFormulario()" class="hidden w-full bg-zinc-200 text-zinc-700 hover:bg-zinc-300 py-3 rounded-xl uppercase text-[10px] font-black mt-2 transition-colors border border-zinc-300">Cancelar Edição</button>
                    </form>
                </div>
            </aside>

            <main class="lg:col-span-2 space-y-6">
                <div class="relative w-full">
                    <input type="text" id="buscaCliente" placeholder="BUSCAR POR NOME, CPF OU TELEFONE..." class="w-full p-5 rounded-2xl input-field text-base font-black uppercase pl-14 shadow-md" oninput="filtrarClientes()">
                    <span class="absolute left-5 top-5 text-xl text-zinc-500">🔍</span>
                </div>
                <div class="glass-card rounded-[2rem] overflow-hidden min-h-[400px]">
                    <div id="listaSolteiras" class="flex flex-col"></div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, serverTimestamp, getDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", authDomain: "teste-de-reserva.firebaseapp.com", projectId: "teste-de-reserva", storageBucket: "teste-de-reserva.firebasestorage.app", messagingSenderId: "163395694876", appId: "1:163395694876:web:8b1116a0483af951548ad9" };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "solteiras");
        let clientesCache = []; let operadorLogado = ""; let stepLogin = 0; let usuarioData = null; let eventoHojeCache = null;

        function normalizarDataNascimento(d) {
            if (!d) return null;
            if (!isNaN(d) && Number(d) > 10000) {
                const excelDate = Number(d);
                const dateObj = new Date(Math.round((excelDate - 25569) * 86400 * 1000));
                const dia = String(dateObj.getUTCDate()).padStart(2, '0');
                const mes = String(dateObj.getUTCMonth() + 1).padStart(2, '0');
                const ano = dateObj.getUTCFullYear();
                return { raw: `${ano}-${mes}-${dia}`, display: `${dia}/${mes}` };
            }
            const s = String(d).trim();
            if (s.includes('/')) {
                const p = s.split('/');
                if (p.length === 3) return { raw: `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}`, display: `${p[0].padStart(2, '0')}/${p[1].padStart(2, '0')}` };
            }
            if (s.includes('-')) {
                const p = s.split('-');
                if (p.length >= 3) return { raw: s.substring(0, 10), display: `${p[2].padStart(2, '0')}/${p[1].padStart(2, '0')}` };
            }
            return null;
        }

        function checkAniversarioSemana(dataNorm) {
            if (!dataNorm || !dataNorm.raw) return false;
            const partes = dataNorm.raw.split('-'); 
            if (partes.length < 3) return false;
            const hoje = new Date(); const diaSemana = hoje.getDay(); const diffParaSegunda = (diaSemana === 0 ? 6 : diaSemana - 1);
            const seg = new Date(hoje); seg.setDate(hoje.getDate() - diffParaSegunda); seg.setHours(0,0,0,0);
            const dom = new Date(seg); dom.setDate(seg.getDate() + 6); dom.setHours(23,59,59,999);
            const niverEsteAno = new Date(hoje.getFullYear(), parseInt(partes[1]) - 1, parseInt(partes[2]), 12, 0, 0);
            return niverEsteAno >= seg && niverEsteAno <= dom;
        }

        window.mostrarAviso = (msg, isSucesso = false) => {
            const toast = document.getElementById('toast-aviso');
            const bgClass = isSucesso ? 'bg-green-600' : 'bg-red-600';
            const shadowClass = isSucesso ? 'shadow-[0_0_20px_rgba(22,163,74,0.3)]' : 'shadow-[0_0_20px_rgba(220,38,38,0.3)]';
            const icon = isSucesso ? '✅' : (msg.includes('ACESSO') ? '👋' : (msg.includes('PROIBIDA') ? '🚨' : '⚠️'));
            toast.className = `fixed top-4 left-1/2 -translate-x-1/2 z-[10001] text-white font-black text-[10px] uppercase tracking-widest px-6 py-4 rounded-2xl transition-all duration-300 transform -translate-y-32 opacity-0 flex items-center gap-3 w-[90%] max-w-sm pointer-events-none border border-white/20 ${bgClass} ${shadowClass}`;
            document.getElementById('toast-icon').innerText = icon;
            document.getElementById('toast-msg').innerText = msg;
            setTimeout(() => { toast.classList.remove('-translate-y-32', 'opacity-0'); toast.classList.add('translate-y-0', 'opacity-100'); }, 10);
            setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('-translate-y-32', 'opacity-0'); }, 4000);
        };

        // NOVA FUNÇÃO: Gera recibo na lista_eventos para o relatório histórico não perder dados.
        async function gerarReciboCheckin(clienteDados) {
            try {
                if(!eventoHojeCache) return; // Se não tem evento hoje, não tem como gerar recibo

                // Verifica se já gerou recibo para essa cliente HOJE para evitar duplo checkin na dashboard
                const qBusca = query(collection(db, "lista_eventos"), 
                    where("evento", "==", eventoHojeCache.nome), 
                    where("tel", "==", clienteDados.tel || '')
                );
                const snapBusca = await getDocs(qBusca);
                
                if (snapBusca.empty) {
                    await addDoc(collection(db, "lista_eventos"), { 
                        nome: clienteDados.nome, 
                        tel: clienteDados.tel || '', 
                        cpf: clienteDados.cpf || '',
                        evento: eventoHojeCache.nome, 
                        tipo_entrada: "SOLTEIRA VIP", 
                        promoter: "PORTARIA VIP", 
                        porteiro: operadorLogado,
                        data_reserva: new Date().toISOString(), 
                        entrou: true, 
                        data_entrada: new Date().toISOString(),
                        pago: false, 
                        metodo: 'portaria', 
                        valor_pago: "FREE"
                    });
                } else {
                    // Se a cliente já fez agendamento pelo site e está entrando agora
                    snapBusca.forEach(async (docEncontrado) => {
                        if(docEncontrado.data().entrou !== true) {
                            await updateDoc(doc(db, "lista_eventos", docEncontrado.id), {
                                entrou: true,
                                data_entrada: new Date().toISOString(),
                                porteiro: operadorLogado
                            });
                        }
                    });
                }
            } catch (e) {
                console.error("Erro ao gerar recibo de solteira", e);
            }
        }

        window.verificarOuLogar = async () => {
            const n = document.getElementById('inputNomeUsuario').value.trim().toLowerCase();
            const s = document.getElementById('senhaUsuario').value.trim();
            const btn = document.getElementById('btnAcao');
            const inputSenha = document.getElementById('senhaUsuario');

            if (stepLogin === 0) {
                if(!n) return mostrarAviso("Digite o seu usuário!");
                btn.innerText = "VERIFICANDO...";
                const docSnap = await getDoc(doc(db, "configuracoes", n));
                if (docSnap.exists()) {
                    usuarioData = docSnap.data(); stepLogin = 1;
                    document.getElementById('areaSenha').classList.remove('hidden');
                    document.getElementById('inputNomeUsuario').readOnly = true;
                    if (!usuarioData.senha) {
                        mostrarAviso("👋 PRIMEIRO ACESSO: Crie sua senha agora!", true);
                        inputSenha.placeholder = "CRIE UMA SENHA (MÍN. 6)";
                        inputSenha.style.borderColor = "#eab308";
                        btn.innerText = "SALVAR SENHA E ENTRAR";
                    } else { btn.innerText = "ENTRAR NO SISTEMA"; }
                } else { mostrarAviso("Operador não autorizado."); btn.innerText = "ACESSAR SISTEMA"; }
            } else {
                if(!s) return mostrarAviso("Digite a sua senha!");
                if (!usuarioData.senha) {
                    if (s.length < 6) return mostrarAviso("Mínimo de 6 caracteres.");
                    btn.innerText = "SALVANDO...";
                    await updateDoc(doc(db, "configuracoes", n), { senha: s, ultimo_login: new Date().toISOString() });
                    usuarioData.senha = s;
                    mostrarAviso("Senha cadastrada com sucesso!", true);
                }
                if (usuarioData.senha === s) {
                    await updateDoc(doc(db, "configuracoes", n), { ultimo_login: new Date().toISOString() });
                    operadorLogado = n;
                    document.getElementById('labelOperador').innerText = "OPERADOR: " + n.toUpperCase();
                    document.getElementById('telaLogin').classList.add('hidden');
                    document.getElementById('conteudo-sistema').classList.remove('hidden');
                    iniciarEscutas();
                } else { mostrarAviso("Senha incorreta."); btn.innerText = "ENTRAR NO SISTEMA"; }
            }
        };

        function iniciarEscutas() {
            // Escuta para descobrir qual o evento de hoje para a Dashboard
            const hojeStr = new Date().toLocaleDateString('en-CA');
            onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true), where("data", "==", hojeStr)), (snap) => {
                if(!snap.empty) eventoHojeCache = snap.docs[0].data();
                else eventoHojeCache = null;
            });

            onSnapshot(colRef, (snap) => {
                clientesCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                atualizarContadores();
                render(clientesCache, false);
            });
        }

        function limparFocarBusca() {
            const campoBusca = document.getElementById('buscaCliente');
            campoBusca.value = '';
            filtrarClientes(); 
            campoBusca.focus(); 
        }

        window.dispararCheckin = async (id) => {
            try {
                await updateDoc(doc(db, "solteiras", id), { ultima_visita: serverTimestamp() });
                
                const clienteData = clientesCache.find(c => c.id === id);
                if(clienteData) await gerarReciboCheckin(clienteData);

                mostrarAviso("Liberada com sucesso!", true);
                limparFocarBusca(); 
            } catch (e) { mostrarAviso("Erro ao liberar a cliente!"); }
        };

        window.bloquearDesbloquear = async (id, acaoBloquear) => {
            try {
                if (acaoBloquear) {
                    const motivo = prompt("Qual o motivo do bloqueio?");
                    if (!motivo) return;
                    await updateDoc(doc(db, "solteiras", id), { bloqueada: true, motivo_bloqueio: motivo.toUpperCase() });
                    mostrarAviso("Cliente bloqueada!", true);
                } else {
                    if (confirm("Tem certeza que deseja DESBLOQUEAR a entrada dessa cliente?")) {
                        await updateDoc(doc(db, "solteiras", id), { bloqueada: false, motivo_bloqueio: "" });
                        mostrarAviso("Cliente desbloqueada!", true);
                    }
                }
            } catch (e) { mostrarAviso("Erro ao executar ação!"); }
        };

        window.prepararEdicao = (id) => {
            const jaExiste = clientesCache.find(c => c.id === id);
            if (!jaExiste) return;
            const dataNascReal = jaExiste.data_nascimento || jaExiste.nascimento;
            const normNasc = normalizarDataNascimento(dataNascReal);
            document.getElementById('editId').value = jaExiste.id; 
            document.getElementById('nome').value = jaExiste.nome; 
            document.getElementById('tel').value = jaExiste.tel || ''; 
            document.getElementById('cpf').value = jaExiste.cpf || ''; 
            document.getElementById('nascimento').value = normNasc ? normNasc.raw : ''; 
            document.getElementById('obs').value = jaExiste.obs || '';
            window.updateIdade(normNasc ? normNasc.raw : null); 
            document.getElementById('btnSalvar').innerText = "ATUALIZAR DADOS"; 
            document.getElementById('btnCancelarEdicao').classList.remove('hidden');
            document.getElementById('tituloForm').scrollIntoView({ behavior: 'smooth' });
        };

        function render(dados, isBusca = false) {
            const container = document.getElementById('listaSolteiras');
            const agora = new Date();
            const corte = new Date(); corte.setHours(5, 0, 0, 0); if (agora < corte) corte.setDate(corte.getDate() - 1);
            let paraExibir = isBusca ? dados : dados.filter(c => c.ultima_visita && typeof c.ultima_visita.toDate === 'function' && c.ultima_visita.toDate() >= corte);
            
            if (paraExibir.length === 0) {
                container.innerHTML = `<div class="p-20 text-center text-zinc-500 font-black text-sm uppercase italic">NENHUM RESULTADO NA TELA</div>`;
                return;
            }
            container.innerHTML = '';
            
            paraExibir.sort((a,b) => {
                let valA = a.ultima_visita && typeof a.ultima_visita.toDate === 'function' ? a.ultima_visita.toDate().getTime() : 0;
                let valB = b.ultima_visita && typeof b.ultima_visita.toDate === 'function' ? b.ultima_visita.toDate().getTime() : 0;
                return valB - valA;
            }).forEach(c => {
                const dataNascReal = c.data_nascimento || c.nascimento;
                const normNasc = normalizarDataNascimento(dataNascReal);
                const isNiver = checkAniversarioSemana(normNasc);
                const niverData = normNasc ? normNasc.display : '--/--';
                
                let textoVisita = '---'; let naCasa = false;
                if (c.ultima_visita) {
                    if (typeof c.ultima_visita.toDate === 'function') {
                        const u = c.ultima_visita.toDate(); naCasa = u >= corte; textoVisita = u.toLocaleDateString('pt-BR');
                    } else if (!isNaN(c.ultima_visita) && Number(c.ultima_visita) > 10000) {
                        const excelDate = Number(c.ultima_visita); const dateObj = new Date(Math.round((excelDate - 25569) * 86400 * 1000));
                        textoVisita = String(dateObj.getUTCDate()).padStart(2, '0') + '/' + String(dateObj.getUTCMonth() + 1).padStart(2, '0') + '/' + dateObj.getUTCFullYear();
                    } else if (typeof c.ultima_visita === 'string' && c.ultima_visita.trim() !== '') {
                        textoVisita = c.ultima_visita;
                    }
                }
                
                const div = document.createElement('div');
                div.className = `item-cliente p-6 flex justify-between items-center ${c.bloqueada ? 'cliente-bloqueada' : (isNiver ? 'card-aniversariante' : (naCasa ? 'cliente-checkin-ok' : ''))}`;
                
                let painelAcao = ''; let infoBloqueio = '';

                if (c.bloqueada) {
                    infoBloqueio = `<div class="mt-3 bg-red-100 p-3 rounded-xl border border-red-300"><span class="text-[9px] font-black uppercase text-red-600 block mb-1">🚨 PROIBIDA A ENTRADA. MOTIVO:</span><span class="text-xs font-bold text-zinc-900">${c.motivo_bloqueio || 'Sem motivo detalhado.'}</span></div>`;
                    painelAcao = `
                    <div class="flex flex-col items-end gap-2">
                        <button onclick="bloquearDesbloquear('${c.id}', false)" class="bg-red-600 text-white hover:bg-red-700 px-6 py-4 rounded-xl text-[10px] font-black uppercase transition-all mb-1 shadow-md">Desbloquear 🔓</button>
                        <button onclick="prepararEdicao('${c.id}')" class="text-blue-600 text-[10px] font-black uppercase hover:text-blue-800 transition-all">Editar ✏️</button>
                    </div>`;
                } else {
                    if (naCasa) {
                        painelAcao = `
                        <div class="flex flex-col items-end gap-2">
                            <span class="text-green-600 text-3xl font-black">✓</span>
                            <div class="flex gap-4 mt-2">
                                <button onclick="prepararEdicao('${c.id}')" class="text-blue-600 text-[10px] font-black uppercase hover:text-blue-800 transition-all">Editar ✏️</button>
                                <button onclick="bloquearDesbloquear('${c.id}', true)" class="text-[10px] font-black uppercase text-red-500 opacity-60 hover:opacity-100 transition-all">Bloquear 🚫</button>
                            </div>
                        </div>`;
                    } else {
                        painelAcao = `
                        <div class="flex flex-col items-end gap-2">
                            <button onclick="dispararCheckin('${c.id}')" class="bg-green-600 text-white px-8 py-4 rounded-xl text-[11px] font-black uppercase hover:bg-green-500 transition-all shadow-[0_4px_10px_rgba(22,163,74,0.3)] w-[130px]">Liberar</button>
                            <div class="flex gap-4 mt-2 w-[130px] justify-center">
                                <button onclick="prepararEdicao('${c.id}')" class="text-blue-600 text-[10px] font-black uppercase hover:text-blue-800 transition-all">Editar ✏️</button>
                                <button onclick="bloquearDesbloquear('${c.id}', true)" class="text-red-500 text-[10px] font-black uppercase opacity-60 hover:opacity-100 transition-all">Bloquear 🚫</button>
                            </div>
                        </div>`;
                    }
                }

                div.innerHTML = `
                    <div class="flex-grow pr-4 w-full">
                        <div class="flex flex-wrap items-center gap-2 mb-2">
                            <h3 class="text-xl font-black uppercase ${c.bloqueada ? 'text-red-600' : 'text-zinc-900'}">${c.nome}</h3>
                            <span class="text-zinc-600 font-bold text-sm bg-zinc-200 px-2 py-0.5 rounded-lg border border-zinc-300">📱 ${c.tel || '---'}</span>
                            ${isNiver && !c.bloqueada ? '<span class="bg-yellow-500 text-black px-2 py-0.5 rounded-lg text-[9px] font-black border border-yellow-600">🎂 ANIVERSARIANTE</span>' : ''}
                        </div>
                        <p class="text-[11px] text-zinc-500 font-bold uppercase mt-1">
                            🆔 <span class="text-zinc-700">${c.cpf || '---'}</span> | 📅 VISITA: <span class="${naCasa ? 'text-green-600 font-black' : 'text-zinc-700'}">${textoVisita}</span> | 🎂 NIVER: <span class="text-zinc-700">${niverData}</span>
                        </p>
                        ${c.obs && !c.bloqueada ? `<p class="mt-3 text-[10px] font-bold text-blue-700 uppercase bg-blue-50 inline-block px-3 py-1 rounded border border-blue-200">📌 ${c.obs}</p>` : ''}
                        ${infoBloqueio}
                    </div>
                    <div class="flex-none text-right">
                        ${painelAcao}
                    </div>`;
                container.appendChild(div);
            });
        }

        window.maskCPF = (i) => { let v = i.value.replace(/\D/g,"").substring(0,11); v = v.replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d{1,2})$/,"$1-$2"); i.value = v; };
        window.maskTel = (i) => { let v = i.value.replace(/\D/g,"").substring(0,11); v = v.replace(/^(\d{2})(\d)/g,"($1) $2").replace(/(\d)(\d{4})$/,"$1-$2"); i.value = v; };
        
        window.updateIdade = (v) => { 
            if(!v) { document.getElementById('idadeDisplay').innerText = "--"; return; } 
            const norm = normalizarDataNascimento(v);
            if (!norm) { document.getElementById('idadeDisplay').innerText = "--"; return; }
            const h = new Date(); const n = new Date(norm.raw + "T12:00:00"); 
            let i = h.getFullYear() - n.getFullYear(); 
            if (h.getMonth() < n.getMonth() || (h.getMonth() === n.getMonth() && h.getDate() < n.getDate())) i--; 
            document.getElementById('idadeDisplay').innerText = isNaN(i) ? "--" : i; 
        };
        
        window.limparFormulario = () => {
            document.getElementById('formSolteira').reset();
            document.getElementById('editId').value = "";
            document.getElementById('btnSalvar').innerText = "Confirmar e Liberar";
            document.getElementById('btnCancelarEdicao').classList.add('hidden');
            document.getElementById('idadeDisplay').innerText = "--";
        };

        window.validarDuplicidade = async (campo) => {
            const input = document.getElementById(campo); const valor = input.value.replace(/\D/g, ""); if (valor.length < 11) return;
            const jaExiste = clientesCache.find(c => (c.cpf || '').replace(/\D/g, "") === valor || (c.tel || '').replace(/\D/g, "") === valor);
            if (jaExiste && document.getElementById('editId').value !== jaExiste.id) {
                if(jaExiste.bloqueada) {
                    mostrarAviso(`🚨 PROIBIDA! Motivo: ${jaExiste.motivo_bloqueio}`);
                    window.limparFormulario(); return;
                }
                if (confirm(`CLIENTE ENCONTRADA: ${jaExiste.nome}\n\nOK: Fazer Check-in (Ela já pagou).\nCANCELAR: Editar dados dela.`)) { 
                    await window.dispararCheckin(jaExiste.id); window.limparFormulario(); 
                } else { window.prepararEdicao(jaExiste.id); }
            }
        };

        document.getElementById('formSolteira').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar'); const idEx = document.getElementById('editId').value;
            btn.disabled = true; btn.innerText = "SALVANDO...";
            try {
                const dados = { nome: document.getElementById('nome').value.toUpperCase(), tel: document.getElementById('tel').value, cpf: document.getElementById('cpf').value, data_nascimento: document.getElementById('nascimento').value, obs: document.getElementById('obs').value.toUpperCase(), ultima_visita: serverTimestamp() };
                if (idEx) {
                    await updateDoc(doc(db, "solteiras", idEx), dados);
                    await gerarReciboCheckin(dados); // Registra no caixa do dia
                    mostrarAviso("Dados atualizados com sucesso!", true);
                } else {
                    const docRefAdd = await addDoc(colRef, { ...dados, bloqueada: false });
                    await gerarReciboCheckin(dados); // Registra no caixa do dia
                    mostrarAviso("Cadastro salvo e liberado!", true);
                }
                window.limparFormulario();
                limparFocarBusca(); 
            } catch (e) { mostrarAviso("Erro ao salvar os dados!"); }
            finally { btn.disabled = false; btn.innerText = idEx ? "ATUALIZAR DADOS" : "Confirmar e Liberar"; }
        });

        window.filtrarClientes = () => {
            const b = document.getElementById('buscaCliente').value.toUpperCase().trim();
            if (b.length > 0) { 
                const t = b.split(/\s+/); 
                render(clientesCache.filter(c => t.every(x => `${c.nome?.toUpperCase() || ''} ${c.cpf || ''} ${c.tel || ''}`.includes(x))), true); 
            } else { render(clientesCache, false); }
        };

        function atualizarContadores() { 
            const agora = new Date(); const corte = new Date(); corte.setHours(5, 0, 0, 0); if (agora < corte) corte.setDate(corte.getDate() - 1);
            const total = clientesCache.filter(c => c.ultima_visita && typeof c.ultima_visita.toDate === 'function' && c.ultima_visita.toDate() >= corte).length;
            document.getElementById('contagemEvento').innerText = total;
        }
    </script>
</body>
</html>
