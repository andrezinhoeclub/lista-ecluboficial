<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Portaria Solteiras</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <link rel="apple-touch-icon" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; }
        .glass-card { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .input-field { background: #0f0f10 !important; border: 1px solid #27272a !important; color: #fff !important; }
        .input-field:focus { border-color: #eab308 !important; outline: none; }
        .btn-gold { background: #eab308; color: #000; font-weight: 900; transition: 0.3s; }
        .item-cliente { border-bottom: 1px solid #1a1a1a; transition: 0.3s; }
        .cliente-bloqueada { background: linear-gradient(90deg, rgba(153, 27, 27, 0.4) 0%, rgba(5, 5, 5, 1) 100%) !important; border-left: 6px solid #ef4444 !important; }
        .login-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg">
        <div class="w-full max-w-sm p-10 glass-card rounded-[3rem] text-center border-yellow-500/20 border">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">SOLTEIRAS <span class="text-yellow-500">ACCESS</span></h1>
            <div class="space-y-4">
                <input type="text" id="inputNomeUsuario" placeholder="USUÁRIO" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs input-field">
                <div id="areaSenha" class="hidden">
                    <input type="password" id="senhaUsuario" placeholder="SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs mt-2 border-yellow-500/50 input-field">
                </div>
                <button onclick="verificarOuLogar()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl mt-4 active:scale-95 transition-all text-white">CONTINUAR</button>
            </div>
            <p id="msgErro" class="text-red-500 text-[10px] font-black uppercase mt-6 hidden italic text-center">Acesso negado</p>
        </div>
    </div>

    <div id="conteudo-sistema" class="hidden max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-12">
                <div>
                    <h1 class="text-2xl font-black uppercase italic text-yellow-500 leading-none">VIP Single Ladies</h1>
                    <p id="labelOperador" class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1">---</p>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-center min-w-[120px]">
                    <p class="text-[8px] font-black text-zinc-500 uppercase">Check-ins Hoje</p>
                    <p id="contagemEvento" class="text-xl font-black text-green-500">0</p>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-center min-w-[120px]">
                    <p class="text-[8px] font-black text-zinc-500 uppercase">Total na Base</p>
                    <p id="contadorTotal" class="text-xl font-black text-white">0</p>
                </div>
                <button onclick="location.reload()" class="bg-red-500/10 border border-red-500/20 text-red-500 px-4 rounded-2xl font-black uppercase text-[9px]">Sair</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <aside class="lg:col-span-1">
                <div class="glass-card p-6 rounded-[2.5rem] sticky top-8 border-white/5">
                    <h2 class="text-yellow-500 font-black uppercase italic text-sm mb-6 text-white">Novo Cadastro</h2>
                    <form id="formSolteira" class="space-y-4">
                        <input type="text" id="nome" placeholder="NOME COM SOBRENOME" class="w-full p-4 rounded-xl input-field font-bold text-xs uppercase" required>
                        <input type="tel" id="tel" placeholder="WHATSAPP" class="w-full p-4 rounded-xl input-field font-bold text-xs" oninput="maskTel(this)" required>
                        <input type="text" id="cpf" placeholder="CPF" class="w-full p-4 rounded-xl input-field font-bold text-xs" oninput="maskCPF(this)" required>
                        <div class="flex items-center gap-3">
                            <input type="date" id="nascimento" class="w-full p-4 rounded-xl input-field font-bold text-xs uppercase" onchange="updateIdade(this.value)" required>
                            <div class="bg-zinc-900 px-4 py-3 rounded-xl border border-zinc-800 text-center min-w-[70px]">
                                <p class="text-[7px] font-black text-zinc-500 uppercase">Idade</p>
                                <p id="idadeDisplay" class="text-sm font-black text-yellow-500">--</p>
                            </div>
                        </div>
                        <textarea id="obs" placeholder="OBSERVAÇÕES (OPCIONAL)" class="w-full p-4 rounded-xl input-field font-bold text-[10px] uppercase h-20 resize-none"></textarea>
                        <button type="submit" id="btnSalvar" class="w-full btn-gold py-5 rounded-2xl uppercase text-xs shadow-xl mt-2 active:scale-95 transition-all text-white">Salvar e Confirmar</button>
                    </form>
                </div>
            </aside>

            <main class="lg:col-span-2 space-y-6">
                <div class="relative w-full">
                    <input type="text" id="buscaCliente" placeholder="PESQUISAR: NOME, CPF OU WHATSAPP..." class="w-full p-5 rounded-2xl input-field text-sm font-bold uppercase pl-14 shadow-2xl border-white/10" oninput="filtrarClientes()">
                    <span class="absolute left-6 top-5 opacity-30 text-xl text-white">🔍</span>
                </div>
                <div class="glass-card rounded-[2.5rem] overflow-hidden min-h-[400px]">
                    <div id="listaSolteiras" class="divide-y divide-zinc-900"></div>
                </div>
            </main>
        </div>
    </div>

    <div id="modalEdit" class="hidden fixed inset-0 bg-black/95 z-[110] flex items-center justify-center p-6 text-white text-white">
        <div class="glass-card p-8 rounded-[3rem] w-full max-w-md border-zinc-800 border-2 text-center text-white text-white text-white text-white text-white text-white">
            <h2 class="text-yellow-500 font-black uppercase italic mb-6 tracking-widest text-sm text-white">Prontuário da Cliente</h2>
            <input type="hidden" id="editId">
            <input type="hidden" id="statusBloqueio">
            <textarea id="editObsField" placeholder="MOTIVO DO BLOQUEIO OU OBSERVAÇÕES..." class="w-full p-6 rounded-2xl input-field font-bold text-xs uppercase h-48 resize-none mb-6 text-white text-white text-white text-white"></textarea>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="fecharModal()" class="bg-zinc-800 py-5 rounded-2xl uppercase text-[10px] font-black text-white text-white text-white text-white">Cancelar</button>
                <button onclick="salvarObs()" class="bg-white text-black py-5 rounded-2xl uppercase text-[10px] font-black">Salvar Obs</button>
            </div>
            
            <div class="mt-4 pt-4 border-t border-zinc-800">
                <button id="btnToggleBloqueio" onclick="toggleBloqueio()" class="w-full py-5 rounded-2xl uppercase text-[11px] font-black transition-all shadow-xl"></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, getDocs, where, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "cadastro_solteiras");
        let clientesCache = []; let operadorLogado = ""; let stepLogin = 0; let usuarioData = null;

        window.verificarOuLogar = async () => {
            const n = document.getElementById('inputNomeUsuario').value.trim().toLowerCase();
            const s = document.getElementById('senhaUsuario').value.trim();
            if (stepLogin === 0) {
                const docSnap = await getDoc(doc(db, "configuracoes", n));
                if (docSnap.exists()) {
                    usuarioData = docSnap.data(); stepLogin = 1;
                    document.getElementById('areaSenha').classList.remove('hidden');
                    document.getElementById('inputNomeUsuario').readOnly = true;
                    document.getElementById('btnAcao').innerText = "ENTRAR";
                } else { document.getElementById('msgErro').classList.remove('hidden'); }
            } else {
                if (usuarioData.senha === s) logarSucesso(n);
                else alert("Senha incorreta");
            }
        };

        function logarSucesso(n) {
            operadorLogado = n;
            document.getElementById('labelOperador').innerText = "OPERADOR: " + n.toUpperCase();
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('conteudo-sistema').classList.remove('hidden');
            iniciarEscutas();
            faxina90Dias(); // Executa faxina ao entrar
        }

        function iniciarEscutas() {
            onSnapshot(colRef, (snap) => {
                clientesCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                atualizarContadores(); filtrarClientes();
            });
        }

        // --- FUNÇÃO DE FAXINA (90 DIAS) ---
        async function faxina90Dias() {
            const limite = new Date();
            limite.setDate(limite.getDate() - 90);
            
            const snap = await getDocs(colRef);
            snap.forEach(async (d) => {
                const data = d.data();
                if (data.bloqueada) return; // Não exclui bloqueadas
                
                const ultima = data.ultima_visita ? data.ultima_visita.toDate() : null;
                if (ultima && ultima < limite) {
                    await deleteDoc(doc(db, "cadastro_solteiras", d.id));
                }
            });
        }

        window.maskCPF = (i) => {
            let v = i.value.replace(/\D/g,"").substring(0,11);
            v = v.replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d{1,2})$/,"$1-$2");
            i.value = v;
        };
        window.maskTel = (i) => {
            let v = i.value.replace(/\D/g,"").substring(0,11);
            v = v.replace(/^(\d{2})(\d)/g,"($1) $2").replace(/(\d)(\d{4})$/,"$1-$2");
            i.value = v;
        };
        window.updateIdade = (v) => { 
            const hoje = new Date(); const nasc = new Date(v + "T12:00:00");
            let idade = hoje.getFullYear() - nasc.getFullYear();
            const m = hoje.getMonth() - nasc.getMonth();
            if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) idade--;
            document.getElementById('idadeDisplay').innerText = isNaN(idade) ? "--" : idade; 
        };

        function obterDataCorteEvento() { 
            const a = new Date(); const c = new Date(); c.setHours(5, 0, 0, 0); 
            if (a < c) c.setDate(c.getDate() - 1); return c; 
        }

        function render(dados, isBusca = false) {
            const container = document.getElementById('listaSolteiras');
            const corte = obterDataCorteEvento();
            let paraExibir = isBusca ? dados : dados.filter(c => {
                const u = c.ultima_visita ? c.ultima_visita.toDate() : null;
                return u && u >= corte;
            });

            if (paraExibir.length === 0) {
                container.innerHTML = `<div class="p-20 text-center opacity-30 uppercase font-black text-xs italic">${isBusca ? 'Cliente Sem Cadastro' : 'Nenhuma solteira na casa agora'}</div>`;
                return;
            }

            container.innerHTML = '';
            paraExibir.sort((a,b) => (b.ultima_visita || 0) - (a.ultima_visita || 0)).forEach(c => {
                const u = c.ultima_visita ? c.ultima_visita.toDate() : null;
                const naCasa = u && u >= corte;
                const bloqueada = c.bloqueada === true;
                
                const div = document.createElement('div');
                div.className = `item-cliente p-6 flex flex-col md:flex-row justify-between items-center gap-4 ${bloqueada ? 'cliente-bloqueada' : (naCasa ? 'bg-green-500/5' : '')}`;
                
                div.innerHTML = `
                    <div class="flex-grow text-white">
                        <div class="flex items-center gap-3">
                            <h3 class="text-xl font-black uppercase ${bloqueada ? 'text-red-200' : (naCasa ? 'text-green-400' : 'text-white')} text-white">${c.nome}</h3>
                            ${bloqueada ? '<span class="bg-red-600 text-white px-3 py-1 rounded-lg text-[10px] font-black animate-pulse">⚠️ BLOQUEADA</span>' : ''}
                        </div>
                        <p class="text-[10px] text-zinc-500 font-bold mt-1 uppercase text-white">
                            🆔 ${c.cpf} | ${c.tel} | 📅 ÚLTIMA VISITA: <span class="${naCasa ? 'text-green-500' : 'text-zinc-300'} font-black">${u ? u.toLocaleDateString('pt-BR') + ' ' + u.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) : 'NUNCA'}</span>
                        </p>
                        ${c.obs ? `<p class="bg-yellow-500/10 border border-yellow-500/20 text-yellow-500 text-[10px] font-bold p-3 rounded-xl mt-3 uppercase">⚠️ OBS: ${c.obs}</p>` : ''}
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="abrirModal('${c.id}', \`${c.obs || ''}\`)" class="bg-zinc-800 text-white px-6 py-4 rounded-2xl text-[9px] font-black uppercase">OBS / BLOQUEIO</button>
                        ${bloqueada ? 
                            '<span class="text-red-500 font-black uppercase px-6 py-4 border border-red-500/30 rounded-2xl bg-red-900/20 italic">Proibida</span>' : 
                            (naCasa ? '<span class="text-green-500 text-[10px] font-black uppercase px-6 py-4">NA CASA ✓</span>' : `<button onclick="checkin('${c.id}')" class="bg-green-600 text-white px-10 py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-green-500">Liberar</button>`)
                        }
                    </div>`;
                container.appendChild(div);
            });
        }

        window.abrirModal = (id, obs) => {
            const c = clientesCache.find(x => x.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('editObsField').value = obs;
            document.getElementById('statusBloqueio').value = c.bloqueada;
            const btnB = document.getElementById('btnToggleBloqueio');
            if(c.bloqueada) {
                btnB.innerText = "DESBLOQUEAR CLIENTE";
                btnB.className = "w-full py-5 rounded-2xl uppercase text-[11px] font-black bg-green-600 text-white shadow-green-900/40";
            } else {
                btnB.innerText = "ATIVAR BLOQUEIO (BLACKLIST)";
                btnB.className = "w-full py-5 rounded-2xl uppercase text-[11px] font-black bg-red-600 text-white shadow-red-900/40";
            }
            document.getElementById('modalEdit').classList.remove('hidden');
        };

        window.fecharModal = () => document.getElementById('modalEdit').classList.add('hidden');

        window.toggleBloqueio = async () => {
            const id = document.getElementById('editId').value;
            const isB = document.getElementById('statusBloqueio').value === 'true';
            const motivo = document.getElementById('editObsField').value;
            if(!isB) {
                if(!motivo) return alert("DIGITE O MOTIVO DO BLOQUEIO NA OBS!");
                if(confirm("CONFIRMA BLOQUEIO?")) await updateDoc(doc(db, "cadastro_solteiras", id), { bloqueada: true, obs: motivo.toUpperCase() });
            } else {
                if(confirm("RETIRAR BLOQUEIO?")) await updateDoc(doc(db, "cadastro_solteiras", id), { bloqueada: false });
            }
            fecharModal();
        };

        window.salvarObs = async () => {
            await updateDoc(doc(db, "cadastro_solteiras", document.getElementById('editId').value), { obs: document.getElementById('editObsField').value.toUpperCase() });
            fecharModal();
        };

        document.getElementById('formSolteira').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            const nome = document.getElementById('nome').value.trim().toUpperCase();
            const tel = document.getElementById('tel').value.trim();
            const cpf = document.getElementById('cpf').value.trim();

            btn.disabled = true; btn.innerText = "VERIFICANDO...";
            const qTel = query(colRef, where("tel", "==", tel));
            const qCpf = query(colRef, where("cpf", "==", cpf));
            const [sTel, sCpf] = await Promise.all([getDocs(qTel), getDocs(qCpf)]);

            if (!sTel.empty || !sCpf.empty) {
                const ex = !sTel.empty ? sTel.docs[0] : sCpf.docs[0];
                if(ex.data().bloqueada) { alert("BLOQUEADA NA BLACKLIST!"); }
                else { await updateDoc(doc(db, "cadastro_solteiras", ex.id), { ultima_visita: serverTimestamp(), operador_checkin: operadorLogado }); alert("Entrada atualizada!"); }
            } else {
                await addDoc(colRef, {
                    nome, tel, cpf, nascimento: document.getElementById('nascimento').value,
                    obs: document.getElementById('obs').value.toUpperCase(),
                    ultima_visita: serverTimestamp(), operador_cadastro: operadorLogado, bloqueada: false
                });
                alert("Nova solteira cadastrada!");
            }
            document.getElementById('formSolteira').reset();
            document.getElementById('idadeDisplay').innerText = "--";
            btn.disabled = false; btn.innerText = "Salvar e Confirmar";
        });

        window.checkin = async (id) => await updateDoc(doc(db, "cadastro_solteiras", id), { ultima_visita: serverTimestamp(), operador_checkin: operadorLogado });

        function atualizarContadores() {
            const corte = obterDataCorteEvento();
            document.getElementById('contagemEvento').innerText = clientesCache.filter(c => c.ultima_visita && c.ultima_visita.toDate() >= corte).length;
            document.getElementById('contadorTotal').innerText = clientesCache.length;
        }

        window.filtrarClientes = () => {
            const b = document.getElementById('buscaCliente').value.toUpperCase();
            if (b.length > 0) {
                const tLimpo = b.replace(/\D/g, "");
                render(clientesCache.filter(c => {
                    const nM = c.nome.includes(b);
                    const cM = c.cpf.replace(/\D/g, "").includes(tLimpo);
                    const tM = c.tel.replace(/\D/g, "").includes(tLimpo);
                    return nM || (tLimpo && (cM || tM));
                }), true);
            } else { render(clientesCache, false); }
        };
    </script>
</body>
</html>
