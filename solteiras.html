<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Portaria Solteiras</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }
        .glass-card { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .input-field { background: #0f0f10 !important; border: 1px solid #27272a !important; color: #fff !important; }
        .input-field:focus { border-color: #eab308 !important; outline: none; box-shadow: 0 0 15px rgba(234, 179, 8, 0.1); }
        .btn-gold { background: #eab308; color: #000; font-weight: 900; transition: 0.3s; }
        
        .card-aniversariante {
            background: linear-gradient(90deg, rgba(234, 179, 8, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%) !important;
            border-left: 6px solid #eab308 !important;
        }

        .item-cliente { border-bottom: 1px solid #1a1a1a; transition: 0.3s; }
        .cliente-bloqueada { background: linear-gradient(90deg, rgba(153, 27, 27, 0.4) 0%, rgba(5, 5, 5, 1) 100%) !important; border-left: 6px solid #ef4444 !important; }
        .login-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col min-h-screen">

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg">
        <div class="w-full max-w-sm p-10 glass-card rounded-[3rem] text-center border-yellow-500/20 border shadow-2xl">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic text-white">SOLTEIRAS <span class="text-yellow-500">ACCESS</span></h1>
            <div class="space-y-4">
                <input type="text" id="inputNomeUsuario" placeholder="USUÁRIO" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs input-field">
                <div id="areaSenha" class="hidden">
                    <input type="password" id="senhaUsuario" placeholder="SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs mt-2 border-yellow-500/50 input-field">
                </div>
                <button onclick="verificarOuLogar()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl mt-4 active:scale-95 transition-all">ACESSAR SISTEMA</button>
            </div>
        </div>
    </div>

    <div id="conteudo-sistema" class="hidden max-w-6xl mx-auto flex-grow w-full">
        <header class="flex justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-12">
                <div>
                    <h1 class="text-2xl font-black uppercase italic text-yellow-500 leading-none">VIP Single Ladies</h1>
                    <p id="labelOperador" class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1">---</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl text-center min-w-[120px]">
                    <p class="text-[8px] font-black text-zinc-500 uppercase">Check-ins Turno</p>
                    <p id="contagemEvento" class="text-xl font-black text-green-500">0</p>
                </div>
                <button onclick="location.reload()" class="bg-red-500/10 border border-red-500/20 text-red-500 px-4 py-2 rounded-2xl font-black uppercase text-[9px]">Sair</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
            <aside class="lg:col-span-1">
                <div class="glass-card p-6 rounded-[2.5rem] sticky top-8 border-white/5 shadow-2xl">
                    <h2 id="tituloForm" class="text-yellow-500 font-black uppercase italic text-sm mb-6">Cadastro / Entrada</h2>
                    <form id="formSolteira" class="space-y-4">
                        <input type="hidden" id="editId">
                        <input type="text" id="nome" placeholder="NOME COM SOBRENOME" class="w-full p-4 rounded-xl input-field font-bold text-xs uppercase" required>
                        <input type="tel" id="tel" placeholder="WHATSAPP" class="w-full p-4 rounded-xl input-field font-bold text-xs" oninput="maskTel(this)" onblur="validarDuplicidade('tel')" required>
                        <input type="text" id="cpf" placeholder="CPF COMPLETO" class="w-full p-4 rounded-xl input-field font-bold text-xs" oninput="maskCPF(this)" onblur="validarDuplicidade('cpf')" required>
                        <input type="date" id="nascimento" class="w-full p-4 rounded-xl input-field font-bold text-xs uppercase" onchange="updateIdade(this.value)" required>
                        <div class="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800/50 flex justify-between items-center text-white"><p class="text-[8px] font-black text-zinc-500 uppercase">Idade</p><p id="idadeDisplay" class="text-lg font-black text-yellow-500">--</p></div>
                        <textarea id="obs" placeholder="OBSERVAÇÕES (OPCIONAL)..." class="w-full p-4 rounded-xl input-field font-bold text-[10px] uppercase h-20 resize-none text-white"></textarea>
                        <button type="submit" id="btnSalvar" class="w-full btn-gold py-5 rounded-2xl uppercase text-xs shadow-xl mt-2 active:scale-95 transition-all">Confirmar e Liberar</button>
                        <button type="button" id="btnCancelarEdicao" onclick="limparFormulario()" class="hidden w-full bg-zinc-800 text-zinc-400 py-3 rounded-2xl uppercase text-[9px] font-black mt-2">Cancelar Edição</button>
                    </form>
                </div>
            </aside>

            <main class="lg:col-span-2 space-y-6">
                <div class="relative w-full"><input type="text" id="buscaCliente" placeholder="BUSCAR POR NOME, CPF OU TELEFONE..." class="w-full p-5 rounded-2xl input-field text-sm font-bold uppercase pl-14 shadow-2xl border-white/10 text-white" oninput="filtrarClientes()"><span class="absolute left-6 top-5 opacity-30 text-xl text-white">🔍</span></div>
                <div class="glass-card rounded-[2.5rem] overflow-hidden min-h-[400px]"><div id="listaSolteiras" class="divide-y divide-zinc-900"></div></div>
            </main>
        </div>
    </div>

    <footer id="rodape-desenvolvedor" class="hidden mt-auto pb-8 pt-4 text-center opacity-40 hover:opacity-100 transition-all">
        <a href="https://www.instagram.com/andrezinhoeclub/" target="_blank" class="inline-flex flex-col items-center justify-center gap-1 group">
            <span class="text-[9px] font-black uppercase tracking-widest text-zinc-500 group-hover:text-yellow-500 transition-colors">⚡ DESENVOLVIDO POR ANDREZINHO E-CLUB</span>
        </a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, getDocs, query, where, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "cadastro_solteiras");
        let clientesCache = []; let operadorLogado = ""; let stepLogin = 0; let usuarioData = null;

        function checkAniversarioSemana(dataNasc) {
            if (!dataNasc) return false;
            const hoje = new Date();
            const nasc = new Date(dataNasc + "T12:00:00");
            const diaSemana = hoje.getDay();
            const diffParaSegunda = (diaSemana === 0 ? 6 : diaSemana - 1);
            const seg = new Date(hoje); seg.setDate(hoje.getDate() - diffParaSegunda); seg.setHours(0,0,0,0);
            const dom = new Date(seg); dom.setDate(seg.getDate() + 6); dom.setHours(23,59,59,999);
            const niverEsteAno = new Date(hoje.getFullYear(), nasc.getMonth(), nasc.getDate(), 12, 0, 0);
            return niverEsteAno >= seg && niverEsteAno <= dom;
        }

        window.verificarOuLogar = async () => {
            const n = document.getElementById('inputNomeUsuario').value.trim().toLowerCase();
            const s = document.getElementById('senhaUsuario').value.trim();
            const btn = document.getElementById('btnAcao');
            if (stepLogin === 0) {
                btn.innerText = "VERIFICANDO...";
                const docSnap = await getDoc(doc(db, "configuracoes", n));
                if (docSnap.exists()) {
                    usuarioData = docSnap.data(); stepLogin = 1;
                    document.getElementById('areaSenha').classList.remove('hidden');
                    document.getElementById('inputNomeUsuario').readOnly = true;
                    btn.innerText = "ENTRAR";
                } else { alert("Não autorizado."); btn.innerText = "ACESSAR"; }
            } else {
                if (usuarioData.senha === s) {
                    operadorLogado = n;
                    document.getElementById('labelOperador').innerText = "OPERADOR: " + n.toUpperCase();
                    document.getElementById('telaLogin').classList.add('hidden');
                    document.getElementById('conteudo-sistema').classList.remove('hidden');
                    document.getElementById('rodape-desenvolvedor').classList.remove('hidden');
                    iniciarEscutas();
                } else { alert("Senha incorreta."); }
            }
        };

        function iniciarEscutas() {
            onSnapshot(colRef, (snap) => {
                clientesCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                atualizarContadores();
                render(clientesCache, false);
            });
        }

        window.dispararCheckin = async (id) => {
            try {
                await updateDoc(doc(db, "cadastro_solteiras", id), { ultima_visita: serverTimestamp() });
                alert("Liberada com sucesso!");
            } catch (e) { alert("Erro ao liberar!"); }
        };

        window.bloquearDesbloquear = async (id, acaoBloquear) => {
            try {
                if (acaoBloquear) {
                    const motivo = prompt("Qual o motivo do bloqueio?");
                    if (!motivo) return;
                    await updateDoc(doc(db, "cadastro_solteiras", id), { bloqueada: true, motivo_bloqueio: motivo.toUpperCase() });
                } else {
                    if (confirm("Tem certeza que deseja DESBLOQUEAR a entrada dessa cliente?")) {
                        await updateDoc(doc(db, "cadastro_solteiras", id), { bloqueada: false, motivo_bloqueio: "" });
                    }
                }
            } catch (e) { alert("Erro ao executar ação!"); }
        };

        window.prepararEdicao = (id) => {
            const jaExiste = clientesCache.find(c => c.id === id);
            if (!jaExiste) return;
            
            document.getElementById('editId').value = jaExiste.id; 
            document.getElementById('nome').value = jaExiste.nome; 
            document.getElementById('tel').value = jaExiste.tel; 
            document.getElementById('cpf').value = jaExiste.cpf; 
            document.getElementById('nascimento').value = jaExiste.nascimento || ''; 
            document.getElementById('obs').value = jaExiste.obs || '';
            
            window.updateIdade(jaExiste.nascimento); 
            document.getElementById('btnSalvar').innerText = "ATUALIZAR DADOS"; 
            document.getElementById('btnCancelarEdicao').classList.remove('hidden');
            
            document.getElementById('tituloForm').scrollIntoView({ behavior: 'smooth' });
        };

        function render(dados, isBusca = false) {
            const container = document.getElementById('listaSolteiras');
            const agora = new Date();
            const corte = new Date(); corte.setHours(5, 0, 0, 0); if (agora < corte) corte.setDate(corte.getDate() - 1);
            
            let paraExibir = isBusca ? dados : dados.filter(c => c.ultima_visita && c.ultima_visita.toDate() >= corte);
            
            if (paraExibir.length === 0) {
                container.innerHTML = `<div class="p-20 text-center opacity-30 font-black text-xs italic">NENHUM RESULTADO</div>`;
                return;
            }
            container.innerHTML = '';
            paraExibir.sort((a,b) => (b.ultima_visita || 0) - (a.ultima_visita || 0)).forEach(c => {
                const isNiver = checkAniversarioSemana(c.nascimento);
                const u = c.ultima_visita ? c.ultima_visita.toDate() : null;
                const naCasa = u && u >= corte;
                const niverData = c.nascimento ? new Date(c.nascimento + "T12:00:00").toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}) : '--/--';
                
                const div = document.createElement('div');
                div.className = `item-cliente p-6 flex justify-between items-center ${c.bloqueada ? 'cliente-bloqueada' : (isNiver ? 'card-aniversariante' : (naCasa ? 'bg-green-500/5' : ''))}`;
                
                let painelAcao = '';
                let infoBloqueio = '';

                if (c.bloqueada) {
                    infoBloqueio = `<div class="mt-3 bg-red-900/40 p-3 rounded-xl border border-red-500/20"><span class="text-[8px] font-black uppercase text-red-400 block mb-1">🚨 PROIBIDA A ENTRADA. MOTIVO:</span><span class="text-xs font-bold text-white">${c.motivo_bloqueio || 'Sem motivo detalhado.'}</span></div>`;
                    painelAcao = `
                    <div class="flex flex-col items-end gap-2">
                        <button onclick="bloquearDesbloquear('${c.id}', false)" class="bg-red-900/50 text-red-500 border border-red-500/30 px-6 py-4 rounded-2xl text-[10px] font-black uppercase transition-all mb-1">Desbloquear 🔓</button>
                        <button onclick="prepararEdicao('${c.id}')" class="text-blue-500 text-[8px] font-black uppercase hover:text-blue-400 transition-all">Editar ✏️</button>
                    </div>`;
                } else {
                    if (naCasa) {
                        painelAcao = `
                        <div class="flex flex-col items-end gap-2">
                            <span class="text-green-500 text-2xl font-black">✓</span>
                            <div class="flex gap-4 mt-1">
                                <button onclick="prepararEdicao('${c.id}')" class="text-blue-500 text-[8px] font-black uppercase hover:text-blue-400 transition-all">Editar ✏️</button>
                                <button onclick="bloquearDesbloquear('${c.id}', true)" class="text-[8px] font-black uppercase text-red-500 opacity-50 hover:opacity-100 transition-all">Bloquear 🚫</button>
                            </div>
                        </div>`;
                    } else {
                        painelAcao = `
                        <div class="flex flex-col items-end gap-2">
                            <button onclick="dispararCheckin('${c.id}')" class="bg-green-600 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase hover:bg-green-500 transition-all shadow-[0_0_15px_rgba(22,163,74,0.3)] w-[120px]">Liberar</button>
                            <div class="flex gap-4 mt-1 w-[120px] justify-center">
                                <button onclick="prepararEdicao('${c.id}')" class="text-blue-500 text-[8px] font-black uppercase hover:text-blue-400 transition-all">Editar ✏️</button>
                                <button onclick="bloquearDesbloquear('${c.id}', true)" class="text-red-500 text-[8px] font-black uppercase opacity-50 hover:opacity-100 transition-all">Bloquear 🚫</button>
                            </div>
                        </div>`;
                    }
                }

                div.innerHTML = `
                    <div class="flex-grow pr-4 w-full">
                        <div class="flex flex-wrap items-center gap-2">
                            <h3 class="text-xl font-black uppercase ${c.bloqueada ? 'text-red-500' : 'text-white'}">${c.nome}</h3>
                            <span class="text-zinc-400 font-bold text-sm">📱 ${c.tel}</span>
                            ${isNiver && !c.bloqueada ? '<span class="bg-yellow-500 text-black px-2 py-0.5 rounded-lg text-[8px] font-black animate-bounce">🎂 ANIVERSARIANTE</span>' : ''}
                        </div>
                        <p class="text-[10px] text-zinc-500 font-bold uppercase mt-1">
                            🆔 ${c.cpf} | 📅 VISITA: <span class="${naCasa ? 'text-green-500 font-black' : 'text-white'}">${u ? u.toLocaleDateString('pt-BR') : '---'}</span> | 🎂 NIVER: <span class="text-yellow-500/70">${niverData}</span>
                        </p>
                        ${c.obs && !c.bloqueada ? `<p class="mt-2 text-[9px] font-bold text-sky-400 uppercase italic">📌 ${c.obs}</p>` : ''}
                        ${infoBloqueio}
                    </div>
                    <div class="flex-none text-right">
                        ${painelAcao}
                    </div>`;
                container.appendChild(div);
            });
        }

        window.maskCPF = (i) => { let v = i.value.replace(/\D/g,"").substring(0,11); v = v.replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d)/,"$1.$2").replace(/(\d{3})(\d{1,2})$/,"$1-$2"); i.value = v; };
        window.maskTel = (i) => { let v = i.value.replace(/\D/g,"").substring(0,11); v = v.replace(/^(\d{2})(\d)/g,"($1) $2").replace(/(\d)(\d{4})$/,"$1-$2"); i.value = v; };
        window.updateIdade = (v) => { const h = new Date(); const n = new Date(v + "T12:00:00"); let i = h.getFullYear() - n.getFullYear(); if (h.getMonth() < n.getMonth() || (h.getMonth() === n.getMonth() && h.getDate() < n.getDate())) i--; document.getElementById('idadeDisplay').innerText = isNaN(i) ? "--" : i; };
        
        window.limparFormulario = () => {
            document.getElementById('formSolteira').reset();
            document.getElementById('editId').value = "";
            document.getElementById('btnSalvar').innerText = "Confirmar e Liberar";
            document.getElementById('btnCancelarEdicao').classList.add('hidden');
            document.getElementById('idadeDisplay').innerText = "--";
        };

        window.validarDuplicidade = async (campo) => {
            const input = document.getElementById(campo); const valor = input.value.replace(/\D/g, ""); if (valor.length < 11) return;
            const jaExiste = clientesCache.find(c => c.cpf.replace(/\D/g, "") === valor || c.tel.replace(/\D/g, "") === valor);
            if (jaExiste && document.getElementById('editId').value !== jaExiste.id) {
                if(jaExiste.bloqueada) {
                    alert(`🚨 ATENÇÃO: Cliente PROIBIDA.\nMotivo: ${jaExiste.motivo_bloqueio}\nConsulte a gerência.`);
                    window.limparFormulario();
                    return;
                }
                if (confirm(`CLIENTE ENCONTRADA: ${jaExiste.nome}\n\nOK: Fazer Check-in (Ela já pagou).\nCANCELAR: Editar dados dela.`)) { 
                    await window.dispararCheckin(jaExiste.id); 
                    window.limparFormulario(); 
                }
                else { 
                    window.prepararEdicao(jaExiste.id);
                }
            }
        };

        document.getElementById('formSolteira').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            const idEx = document.getElementById('editId').value;
            btn.disabled = true;
            btn.innerText = "SALVANDO...";
            try {
                const dados = { nome: document.getElementById('nome').value.toUpperCase(), tel: document.getElementById('tel').value, cpf: document.getElementById('cpf').value, nascimento: document.getElementById('nascimento').value, obs: document.getElementById('obs').value.toUpperCase(), ultima_visita: serverTimestamp() };
                if (idEx) await updateDoc(doc(db, "cadastro_solteiras", idEx), dados);
                else await addDoc(colRef, { ...dados, bloqueada: false });
                alert("Concluído!"); window.limparFormulario();
            } catch (e) { alert("Erro!"); }
            finally { btn.disabled = false; btn.innerText = idEx ? "ATUALIZAR DADOS" : "Confirmar e Liberar"; }
        });

        window.filtrarClientes = () => {
            const b = document.getElementById('buscaCliente').value.toUpperCase().trim();
            if (b.length > 0) { const t = b.split(/\s+/); render(clientesCache.filter(c => t.every(x => `${c.nome.toUpperCase()} ${c.cpf} ${c.tel}`.includes(x))), true); }
            else { render(clientesCache, false); }
        };

        function atualizarContadores() { 
            const agora = new Date(); const corte = new Date(); corte.setHours(5, 0, 0, 0); if (agora < corte) corte.setDate(corte.getDate() - 1);
            const total = clientesCache.filter(c => c.ultima_visita && c.ultima_visita.toDate() >= corte).length;
            document.getElementById('contagemEvento').innerText = total;
        }
    </script>
</body>
</html>
