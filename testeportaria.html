<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Master Portaria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow: hidden; }
        .glass { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .login-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .client-card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .client-card.entrou { opacity: 0.2 !important; filter: grayscale(1); pointer-events: none; }
        input { background: #000 !important; border: 1px solid #333 !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus { border-color: #eab308 !important; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .animate-online { animation: pulse-green 1.5s infinite; color: #22c55e; font-weight: 900; }
        @keyframes pulse-alert { 0% { background-color: rgba(234, 179, 8, 0.1); } 50% { background-color: rgba(234, 179, 8, 0.3); } 100% { background-color: rgba(234, 179, 8, 0.1); } }
        .alert-teste { animation: pulse-alert 2s infinite; border: 1px solid #eab308; color: #eab308; text-align: center; font-weight: 900; font-style: italic; padding: 10px; margin-bottom: 15px; border-radius: 10px; text-transform: uppercase; font-size: 11px; letter-spacing: 2px;}
    </style>
</head>
<body class="flex h-screen">

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg">
        <div class="w-full max-w-sm p-10 glass rounded-[3rem] text-center border-yellow-500/20 border shadow-2xl">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">PORTARIA <span class="text-yellow-500">MASTER</span></h1>
            <div class="space-y-4">
                <input type="text" id="inputNomeUsuario" placeholder="OPERADOR" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs">
                <div id="areaSenha" class="hidden"><input type="password" id="senhaUsuario" placeholder="SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs mt-2 border-yellow-500/50"></div>
                <button onclick="verificarOuLogar()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl mt-4 active:scale-95 transition-all">ENTRAR NO SISTEMA</button>
            </div>
        </div>
    </div>

    <div id="interfacePrincipal" class="hidden flex w-full h-full">
        <aside class="w-80 h-full flex flex-col p-6 bg-black/50 border-r border-zinc-900">
            <div class="mb-10 text-center text-white">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 mx-auto mb-2">
                <h2 class="text-yellow-500 font-black italic uppercase text-lg tracking-tighter leading-none">E-CLUB</h2>
                <p id="operadorAtivo" class="text-[9px] text-zinc-500 font-bold uppercase mt-4 border border-zinc-800 py-2 rounded-lg italic tracking-widest">---</p>
            </div>
            <div class="flex-grow overflow-y-auto">
                <h3 class="text-zinc-600 text-[9px] font-black uppercase mb-4 tracking-[0.2em] border-b border-zinc-900 pb-2">Monitor de Eventos</h3>
                <div id="lista-eventos-sidebar" class="space-y-3"></div>
            </div>
            <button onclick="location.reload()" class="mt-6 text-zinc-700 text-[9px] font-black uppercase hover:text-white transition-colors">Sair</button>
        </aside>

        <main class="flex-grow flex flex-col">
            <header class="p-8 border-b border-zinc-900 bg-black/20 relative">
                <div class="max-w-5xl mx-auto flex gap-8 items-center relative">
                    <div class="relative flex-grow">
                        <span class="absolute left-6 top-5 text-zinc-600">🔍</span>
                        <input type="text" id="input-busca" oninput="processarPesquisa()" placeholder="BUSCAR CLIENTE..." class="w-full p-6 pl-16 rounded-[2rem] text-sm font-bold uppercase text-white shadow-2xl">
                    </div>
                    <div class="text-right border-l border-zinc-800 pl-8 min-w-[140px]">
                        <p id="total-checkins" class="text-5xl font-black italic leading-none text-green-500">0</p>
                        <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest mt-2 italic">Check-ins Turno</p>
                    </div>
                </div>
            </header>

            <section class="flex-grow p-8 overflow-y-auto bg-[#030303] relative">
                <div id="alertaModoTeste" class="alert-teste hidden max-w-5xl mx-auto">⚠️ MODO DE TESTE ATIVO</div>
                <div id="painelRegras" class="max-w-5xl mx-auto mb-10"><div class="glass p-8 rounded-[2.5rem] border-l-4 border-l-yellow-500 bg-yellow-500/5 shadow-2xl"><h3 class="text-yellow-500 font-black uppercase italic text-sm mb-4 tracking-widest">● Regras Operacionais</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="bg-black/40 p-5 rounded-2xl border border-white/5"><p class="text-[8px] text-zinc-500 font-black uppercase mb-2">Turno</p><p class="text-xs font-bold text-white">21:00h às 05:00h</p></div><div class="bg-black/40 p-5 rounded-2xl border border-white/5"><p class="text-[8px] text-zinc-500 font-black uppercase mb-2">Controle</p><p class="text-[10px] text-zinc-300 leading-tight">Liberação apenas para eventos <span class="text-green-500 font-black italic">ONLINE NOW</span>.</p></div></div></div></div>
                <div id="container-resultados" class="max-w-5xl mx-auto"></div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", authDomain: "teste-de-reserva.firebaseapp.com", projectId: "teste-de-reserva", storageBucket: "teste-de-reserva.firebasestorage.app", messagingSenderId: "163395694876", appId: "1:163395694876:web:8b1116a0483af951548ad9" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let bancoClientes = []; let bancoEventos = []; let operadorLogado = ""; let stepLogin = 0; let usuarioData = null; let isModoTeste = false;

        const getStatusTurno = (dt) => {
            if (isModoTeste) return "ONLINE"; 
            const agora = new Date(); const hora = agora.getHours(); const hoje = agora.toLocaleDateString('en-CA');
            const ontemObj = new Date(agora); ontemObj.setDate(ontemObj.getDate() - 1); const ontemISO = ontemObj.toLocaleDateString('en-CA');
            if (hora >= 21 && dt === hoje) return "ONLINE";
            if (hora < 5 && dt === ontemISO) return "ONLINE";
            return dt > hoje ? "RESTRITO" : "ENCERRADO";
        };

        window.verificarOuLogar = async () => {
            const n = document.getElementById('inputNomeUsuario').value.trim().toLowerCase();
            const s = document.getElementById('senhaUsuario').value.trim();
            if (stepLogin === 0) {
                const snap = await getDoc(doc(db, "configuracoes", n));
                if (snap.exists()) { usuarioData = snap.data(); stepLogin = 1; document.getElementById('areaSenha').classList.remove('hidden'); document.getElementById('inputNomeUsuario').readOnly = true; }
                else alert("Não encontrado");
            } else {
                if (usuarioData.senha === s) { operadorLogado = n; document.getElementById('operadorAtivo').innerText = "OPERADOR: " + n.toUpperCase(); document.getElementById('telaLogin').classList.add('hidden'); document.getElementById('interfacePrincipal').classList.remove('hidden'); iniciarEscutas(); }
                else alert("Senha incorreta");
            }
        };

        function iniciarEscutas() {
            onSnapshot(doc(db, "configuracoes", "sistema"), (snap) => { isModoTeste = snap.exists() && snap.data().modo_teste === true; document.getElementById('alertaModoTeste').classList.toggle('hidden', !isModoTeste); });
            onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snapEv) => {
                bancoEventos = snapEv.docs.map(d => ({id: d.id, ...d.data()}));
                onSnapshot(collection(db, "lista_eventos"), (snapCli) => {
                    bancoClientes = snapCli.docs.map(d => ({id: d.id, ...d.data()}));
                    document.getElementById('total-checkins').innerText = bancoClientes.filter(c => c.entrou && c.data_entrada).length;
                    renderizarSidebar(); processarPesquisa();
                });
            });
        }

        function renderizarSidebar() {
            const cont = document.getElementById('lista-eventos-sidebar'); cont.innerHTML = '';
            const ativos = bancoEventos.filter(ev => getStatusTurno(ev.data) !== "ENCERRADO");
            document.getElementById('painelRegras').classList.toggle('hidden', ativos.some(ev => getStatusTurno(ev.data) === "ONLINE"));
            ativos.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                const status = getStatusTurno(ev.data);
                const total = bancoClientes.filter(c => c.evento === ev.nome && (c.metodo !== 'pix_antecipado' || c.pago === true)).length;
                cont.innerHTML += `<div class="p-4 rounded-2xl glass border-l-4 ${status === 'ONLINE' ? 'border-l-green-500' : 'border-l-zinc-800 opacity-60'} mb-2 shadow-lg"><h4 class="text-[10px] font-black uppercase text-white truncate">${ev.nome}</h4><div class="flex justify-between items-end mt-2"><span class="text-[8px] font-bold ${status === 'ONLINE' ? 'animate-online' : 'text-zinc-600'} italic uppercase">${status === 'ONLINE' ? '● ONLINE NOW' : '🔒 RESTRITO'}</span><span class="text-lg font-black text-yellow-500">${total}</span></div></div>`;
            });
        }

        window.processarPesquisa = () => {
            const busca = document.getElementById('input-busca').value.trim().toUpperCase();
            const cont = document.getElementById('container-resultados');
            if (busca.length < 2) { cont.innerHTML = ''; return; }
            const filtrados = bancoClientes.filter(c => {
                const ev = bancoEventos.find(e => e.nome === c.evento);
                if (!ev || getStatusTurno(ev.data) !== "ONLINE") return false;
                return (c.nome && c.nome.toUpperCase().includes(busca)) || (c.tel && c.tel.includes(busca));
            });
            if (filtrados.length === 0) { cont.innerHTML = `<div class="py-40 text-center font-black uppercase text-zinc-800 italic tracking-widest">Nenhum cliente ativo encontrado</div>`; return; }
            cont.innerHTML = '';
            filtrados.forEach(c => {
                const ev = bancoEventos.find(e => e.nome === c.evento) || {};
                let valorExibicao = '---'; let corNome = 'text-white';
                const isCam = (c.tipo_entrada || '').toUpperCase().includes("CAMAROTE");
                const isDono = c.tipo_entrada === "VIP_DONO";
                const isConvidado = c.aniversariante && c.aniversariante.trim() !== "";
                const isCortesia = c.cortesia === true && isCam;
                
                const tipoNorm = (c.tipo_entrada || '').toUpperCase();
                const regexCasal = /\s+E\s+/i;
                let isCasal = tipoNorm.includes("CASAL") || regexCasal.test(c.nome);
                let isSolteiro = !isCasal;

                let tagProm = `<span class="text-[9px] font-black uppercase text-zinc-400 bg-zinc-900 px-3 py-1.5 rounded-md border border-white/5">${c.promoter || 'DIRETO'}</span>`;
                let tTipo = ''; let tExtra = ''; let tPag = '';

                if (isCortesia) {
                    const tipoPorta = c.pagamento_porta || 'SOLTEIRO';
                    const isCasalCort = tipoPorta === 'CASAL';
                    tTipo = `<span class="bg-blue-500/20 text-blue-400 border border-blue-500/30 px-3 py-1.5 rounded-md text-[10px] font-black uppercase">🎁 CORTESIA: ${c.tipo_entrada}</span>`;
                    tExtra = `<span class="${isCasalCort ? 'bg-purple-500/20 text-purple-400' : 'bg-emerald-500/20 text-emerald-400'} border border-white/5 px-3 py-1.5 rounded-md text-[10px] font-black uppercase">${isCasalCort ? '👫 CASAL' : '👤 SOLTEIRO'}</span>`;
                    let vCalc = isCasalCort ? ev.valor_casal : ev.valor_solteiro;
                    valorExibicao = vCalc ? "R$ " + String(vCalc).replace('R$','') : "PORTARIA";
                } else if (isDono) { valorExibicao = "FREE"; corNome = 'text-green-400'; tExtra = `<span class="bg-green-500/20 text-green-400 border border-green-500/30 px-3 py-1.5 rounded-md text-[10px] font-black uppercase">👑 DONO(A) DA FESTA</span>`; }
                else if (isCam) { valorExibicao = c.valor_pago ? "R$ " + c.valor_pago : "PAGO"; tTipo = `<span class="bg-cyan-400 text-black px-4 py-1.5 rounded-md text-[11px] font-black uppercase">💎 ${c.tipo_entrada}</span>`; }
                else {
                    tTipo = isCasal ? `<span class="bg-purple-500/20 text-purple-400 border border-purple-500/30 px-3 py-1.5 rounded-md text-[10px] font-black uppercase">👫 CASAL</span>` : `<span class="bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-3 py-1.5 rounded-md text-[10px] font-black uppercase">👤 SOLTEIRO</span>`;
                    if (isConvidado) { tExtra = `<span class="bg-fuchsia-500/20 text-fuchsia-400 border border-fuchsia-500/30 px-3 py-1.5 rounded-md text-[10px] font-black uppercase">🎉 CONVIDADO DE: ${c.aniversariante}</span>`; let v = isCasal ? ev.desc_casal : ev.desc_solteiro; valorExibicao = v ? "R$ " + String(v).replace('R$','') : "PORTARIA"; }
                    else { let v = c.metodo === "pix_antecipado" ? (c.valor_pago || (isCasal ? ev.ant_casal : ev.ant_solteiro)) : (isCasal ? ev.valor_casal : ev.valor_solteiro); valorExibicao = v ? "R$ " + String(v).replace('R$','') : "PORTARIA"; }
                }

                if (c.metodo === 'pix_antecipado' && c.pago) tPag = `<span class="bg-green-500/10 text-green-400 border border-green-500/30 px-3 py-1.5 rounded-md text-[10px] font-black uppercase">✅ PIX PAGO</span>`;
                else if (!isDono) tPag = `<span class="bg-zinc-800 text-zinc-300 px-3 py-1.5 rounded-md text-[10px] font-black uppercase">PAGA NA PORTA</span>`;

                let bAcao = c.entrou ? '<span class="text-green-500 font-black italic uppercase text-sm bg-green-500/10 px-6 py-3 rounded-xl">CONFIRMADO</span>' : (c.metodo==='pix_antecipado' && !c.pago ? '<span class="text-red-500 font-black italic uppercase text-sm bg-red-500/10 px-6 py-3 rounded-xl animate-pulse">🔴 PIX PENDENTE</span>' : `<button onclick="confirmarCheckin('${c.id}')" class="bg-yellow-500 text-black px-12 py-5 rounded-2xl font-black uppercase italic text-sm shadow-[0_0_20px_rgba(234,179,8,0.4)]">LIBERAR AGORA</button>`);

                const div = document.createElement('div'); div.className = `client-card p-8 rounded-[2.5rem] mb-4 shadow-xl ${c.entrou ? 'entrou' : ''}`;
                div.innerHTML = `<div class="flex flex-col gap-4 text-white"><div class="flex justify-between items-center"><div class="flex items-center gap-4"><h3 class="text-2xl font-black uppercase italic ${corNome} leading-none">${c.nome}</h3><p class="text-lg font-bold text-zinc-400 font-mono italic leading-none">${c.tel || ''}</p></div><div>${bAcao}</div></div><div class="h-[1px] bg-zinc-900/50 w-full"></div><div class="flex justify-between items-center"><div class="flex flex-wrap items-center gap-2">${tagProm}${tTipo}${tExtra}${tPag}</div><div class="flex items-center gap-2 border-l border-zinc-800 pl-4 ml-4 text-right min-w-[120px] justify-end"><span class="text-[8px] text-zinc-600 font-black uppercase tracking-[0.2em]">VALOR</span><span class="text-xl font-black italic ${isDono ? 'text-green-500' : 'text-yellow-500'} leading-none whitespace-nowrap">${valorExibicao}</span></div></div></div>`;
                cont.appendChild(div);
            });
        };

        window.confirmarCheckin = async (id) => { await updateDoc(doc(db, "lista_eventos", id), { entrou: true, porteiro: operadorLogado, data_entrada: new Date().toISOString() }); };
    </script>
</body>
</html>
