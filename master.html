<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABRE A PORTA | Painel Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; }
        .glass-card { background: rgba(18, 18, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 2rem; }
        input, select { background-color: #0c0c0e !important; border: 1px solid #27272a !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus { border-color: #3b82f6 !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <header class="flex flex-col items-center justify-center py-6 border-b border-white/5 mb-8">
            <h1 class="text-3xl font-black uppercase italic tracking-tighter text-blue-500">Abre a Porta <span class="text-white">Master</span></h1>
            <p class="text-zinc-500 font-bold uppercase text-[10px] tracking-widest mt-1">Gestão de Clientes e Licenças</p>
        </header>

        <div class="glass-card p-8 border-l-4 border-l-blue-500">
            <h2 class="text-blue-500 font-black uppercase italic text-xl mb-6">➕ Novo Cliente (Boate/Lounge)</h2>
            <form id="formNovoCliente" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="flex flex-col gap-1">
                    <label class="text-[9px] font-black uppercase text-zinc-500 tracking-widest ml-2">Nome Fantasia</label>
                    <input type="text" id="nome_fantasia" placeholder="Ex: E-Club Oficial" class="p-4 rounded-2xl font-bold uppercase" required>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[9px] font-black uppercase text-zinc-500 tracking-widest ml-2">ID do Link (Sem espaços)</label>
                    <input type="text" id="slug_cliente" placeholder="Ex: eclub" class="p-4 rounded-2xl font-bold lowercase" required>
                </div>
                <div class="flex items-end">
                    <button type="submit" id="btnSalvar" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl uppercase hover:bg-blue-500 transition-all shadow-[0_0_15px_rgba(37,99,235,0.3)]">Cadastrar Cliente</button>
                </div>
            </form>
        </div>

        <div class="glass-card p-8 border-t-4 border-t-zinc-800">
            <h2 class="text-white font-black uppercase italic text-xl mb-6 tracking-tighter">📋 Seus Clientes (Licenças)</h2>
            <div id="grid-clientes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Usando o seu mesmo banco de dados atual
        const firebaseConfig = { apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", authDomain: "teste-de-reserva.firebaseapp.com", projectId: "teste-de-reserva", storageBucket: "teste-de-reserva.appspot.com", messagingSenderId: "163395694876", appId: "1:163395694876:web:8b1116a0483af951548ad9" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let clientes = [];

        // Escuta os clientes no banco
        onSnapshot(collection(db, "clientes_revenda"), (snap) => {
            clientes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderizarClientes();
        });

        // Cadastro de novo cliente
        document.getElementById('formNovoCliente').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.innerText = "Salvando..."; btn.disabled = true;

            const nome = document.getElementById('nome_fantasia').value.trim();
            const slug = document.getElementById('slug_cliente').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');

            try {
                // Salva usando o slug como ID do documento para facilitar a busca depois
                await setDoc(doc(db, "clientes_revenda", slug), {
                    nome_fantasia: nome,
                    slug: slug,
                    ativo: true,
                    data_cadastro: new Date().toISOString()
                });
                e.target.reset();
                alert("Cliente cadastrado com sucesso!");
            } catch (err) {
                alert("Erro ao cadastrar.");
            } finally {
                btn.innerText = "Cadastrar Cliente"; btn.disabled = false;
            }
        });

        // Renderiza os cards dos clientes
        window.renderizarClientes = () => {
            const grid = document.getElementById('grid-clientes');
            if(clientes.length === 0) {
                grid.innerHTML = `<p class="text-zinc-600 text-sm font-bold uppercase italic">Nenhum cliente cadastrado ainda.</p>`;
                return;
            }

            grid.innerHTML = clientes.map(c => {
                const statusTag = c.ativo 
                    ? `<span class="bg-green-500/20 text-green-400 px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest border border-green-500/30">● Ativo</span>` 
                    : `<span class="bg-red-500/20 text-red-400 px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest border border-red-500/30">⛔ Bloqueado</span>`;

                const linkLista = `www.abreaporta.com.br/listas.html?clube=${c.slug}`;

                return `
                <div class="bg-[#0a0a0f] border border-white/5 p-6 rounded-3xl flex flex-col justify-between hover:border-blue-500/30 transition-all">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-lg font-black uppercase text-white tracking-tighter">${c.nome_fantasia}</h3>
                            ${statusTag}
                        </div>
                        
                        <div class="bg-black/50 p-3 rounded-xl border border-zinc-800 mb-4">
                            <p class="text-[8px] font-black uppercase text-zinc-500 mb-1">Link do Cliente:</p>
                            <div class="flex justify-between items-center">
                                <span class="text-[9px] font-mono text-blue-400 truncate mr-2">${linkLista}</span>
                                <button onclick="copiarLink('${linkLista}')" class="text-[10px] font-black bg-white/10 px-2 py-1 rounded text-white hover:bg-white/20">Copiar</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2 mt-4">
                        <button onclick="alternarStatus('${c.id}', ${c.ativo})" class="${c.ativo ? 'bg-red-500/10 text-red-500 border-red-500/30' : 'bg-green-500/10 text-green-500 border-green-500/30'} border py-3 rounded-xl text-[9px] font-black uppercase transition-all hover:brightness-125">
                            ${c.ativo ? 'Bloquear Acesso' : 'Liberar Acesso'}
                        </button>
                        <button class="bg-zinc-800 text-zinc-400 py-3 rounded-xl text-[9px] font-black uppercase hover:bg-zinc-700 transition-all">Editar Dados</button>
                    </div>
                </div>`;
            }).join('');
        };

        window.alternarStatus = async (id, statusAtual) => {
            const acao = statusAtual ? "BLOQUEAR" : "LIBERAR";
            if(confirm(`Deseja realmente ${acao} este cliente?`)) {
                await setDoc(doc(db, "clientes_revenda", id), { ativo: !statusAtual }, { merge: true });
            }
        };

        window.copiarLink = (link) => {
            navigator.clipboard.writeText(link);
            alert("Link copiado para enviar ao cliente!");
        };
    </script>
</body>
</html>
