<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABRE A PORTA | Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; }
        .glass-card { background: rgba(18, 18, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 2rem; }
        input { background-color: #0c0c0e !important; border: 1px solid #27272a !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus { border-color: #3b82f6 !important; }
        .label-mini { font-size: 9px; font-weight: 900; text-transform: uppercase; color: #71717a; margin-left: 0.5rem; letter-spacing: 0.05em; }
        .btn-copy { background: #1e1e26; border: 1px solid #3b82f6; color: #3b82f6; font-size: 8px; font-weight: 900; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }
        .btn-copy:active { background: #3b82f6; color: #fff; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-8">
        
        <header class="flex flex-col items-center justify-center py-6 border-b border-white/5 mb-8">
            <h1 class="text-3xl font-black uppercase italic tracking-tighter text-blue-500">Abre a Porta <span class="text-white">Master</span></h1>
            <p class="text-zinc-500 font-bold uppercase text-[10px] tracking-widest mt-1">Gestão de Revenda e Contratos</p>
        </header>

        <div class="glass-card p-8 border-l-4 border-l-blue-600">
            <h2 id="titulo-form" class="text-white font-black uppercase italic text-xl mb-6">➕ Cadastrar Novo Cliente (SaaS)</h2>
            <form id="formNovoCliente" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <input type="hidden" id="edit_id">
                <div class="flex flex-col gap-1">
                    <label class="label-mini">Razão Social</label>
                    <input type="text" id="razao_social" placeholder="Empresa LTDA" class="p-4 rounded-2xl font-bold" required>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="label-mini">Nome Fantasia</label>
                    <input type="text" id="nome_fantasia" placeholder="Ex: Erotic" class="p-4 rounded-2xl font-bold uppercase" required>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="label-mini">CNPJ</label>
                    <input type="text" id="cnpj_cliente" placeholder="00.000.000/0001-00" class="p-4 rounded-2xl font-bold">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="label-mini">E-mail de Contato</label>
                    <input type="email" id="email_cliente" placeholder="contato@email.com" class="p-4 rounded-2xl font-bold" required>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="label-mini">ID do Link (slug)</label>
                    <input type="text" id="slug_cliente" placeholder="ex: erotic" class="p-4 rounded-2xl font-bold lowercase" required>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="label-mini">Vencimento da Licença</label>
                    <input type="date" id="data_vencimento" class="p-4 rounded-2xl font-bold" required>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="label-mini">Usuário de Acesso</label>
                    <input type="text" id="user_cliente" placeholder="usuario123" class="p-4 rounded-2xl font-bold" required>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="label-mini">Senha Provisória</label>
                    <input type="text" id="pass_cliente" placeholder="mudar123" class="p-4 rounded-2xl font-bold" required>
                </div>
                <div class="lg:col-span-4 mt-4 flex gap-2">
                    <button type="submit" id="btnSalvar" class="flex-1 bg-blue-600 text-white font-black py-5 rounded-2xl uppercase hover:bg-blue-500 transition-all shadow-xl shadow-blue-900/20">Ativar Licença e Gerar Acesso</button>
                    <button type="button" id="btnCancelarEdit" class="hidden bg-zinc-800 text-white font-black px-8 rounded-2xl uppercase text-xs" onclick="resetForm()">Cancelar</button>
                </div>
            </form>
        </div>

        <div class="glass-card p-8">
            <h2 class="text-white font-black uppercase italic text-xl mb-6">📋 Clientes e Status Financeiro</h2>
            <div id="grid-clientes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, setDoc, doc, onSnapshot, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", authDomain: "teste-de-reserva.firebaseapp.com", projectId: "teste-de-reserva", storageBucket: "teste-de-reserva.appspot.com", messagingSenderId: "163395694876", appId: "1:163395694876:web:8b1116a0483af951548ad9" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const base_url = "www.abreaporta.com.br";

        onSnapshot(collection(db, "clientes_revenda"), (snap) => {
            const grid = document.getElementById('grid-clientes');
            const clientes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            grid.innerHTML = clientes.map(c => {
                const hoje = new Date();
                const venc = new Date(c.vencimento);
                const diasRestantes = Math.ceil((venc - hoje) / (1000 * 60 * 60 * 24));
                const estaVencido = diasRestantes < 0;
                
                const link_lista = `${base_url}/listas.html?clube=${c.slug}`;
                const link_login = `${base_url}/login.html?clube=${c.slug}`;

                return `
                <div class="bg-[#0a0a0f] border ${estaVencido ? 'border-red-500/30' : 'border-white/5'} p-6 rounded-3xl flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-lg font-black uppercase text-white">${c.nome_fantasia}</h3>
                            <button onclick="editarCliente('${c.id}')" class="text-blue-500 hover:text-blue-400 text-[10px] font-black uppercase">Editar ✏️</button>
                        </div>
                        
                        <div class="space-y-4 text-[10px] font-bold uppercase italic text-zinc-500 mb-6">
                            <div class="p-3 bg-black/40 rounded-xl border border-white/5 space-y-2">
                                <p class="text-blue-500 text-[8px] mb-1 italic">Link do Instagram (Lista):</p>
                                <div class="flex items-center justify-between gap-2">
                                    <span class="truncate text-white/50">${link_lista}</span>
                                    <button onclick="copyText('${link_lista}')" class="btn-copy">Copiar</button>
                                </div>
                                <p class="text-green-500 text-[8px] mb-1 italic mt-3">Link do Painel (Login):</p>
                                <div class="flex items-center justify-between gap-2">
                                    <span class="truncate text-white/50">${link_login}</span>
                                    <button onclick="copyText('${link_login}')" class="btn-copy">Copiar</button>
                                </div>
                            </div>

                            <p>Razão: <span class="text-white">${c.razao_social || '-'}</span></p>
                            <p>Vencimento: <span class="${estaVencido ? 'text-red-500' : 'text-blue-400'}">${venc.toLocaleDateString('pt-BR')}</span></p>
                            <p>Acesso: <span class="text-white">${c.usuario} / ${c.senha}</span></p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="alternarStatus('${c.id}', ${c.ativo})" class="bg-zinc-800 text-white py-3 rounded-xl text-[9px] font-black uppercase">
                            ${c.ativo ? 'Suspender' : 'Reativar'}
                        </button>
                        <button onclick="excluirCliente('${c.id}')" class="bg-red-900/10 text-red-500 py-3 rounded-xl text-[9px] font-black uppercase">Excluir</button>
                    </div>
                </div>`;
            }).join('');
        });

        window.copyText = (text) => {
            navigator.clipboard.writeText(text);
            alert("Link copiado!");
        };

        document.getElementById('formNovoCliente').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.innerText = "Salvando..."; btn.disabled = true;
            const slug = document.getElementById('slug_cliente').value.toLowerCase().replace(/[^a-z0-9]/g, '');
            try {
                await setDoc(doc(db, "clientes_revenda", slug), {
                    razao_social: document.getElementById('razao_social').value,
                    nome_fantasia: document.getElementById('nome_fantasia').value.toUpperCase(),
                    cnpj: document.getElementById('cnpj_cliente').value,
                    email: document.getElementById('email_cliente').value,
                    slug: slug,
                    vencimento: document.getElementById('data_vencimento').value,
                    usuario: document.getElementById('user_cliente').value,
                    senha: document.getElementById('pass_cliente').value,
                    ativo: true,
                    data_cadastro: new Date().toISOString()
                });
                resetForm();
            } catch (err) { alert("Erro ao salvar."); }
            finally { btn.disabled = false; }
        });

        window.editarCliente = async (id) => {
            const docRef = doc(db, "clientes_revenda", id);
            const snap = await getDoc(docRef);
            if(snap.exists()) {
                const c = snap.data();
                document.getElementById('edit_id').value = id;
                document.getElementById('razao_social').value = c.razao_social || '';
                document.getElementById('nome_fantasia').value = c.nome_fantasia || '';
                document.getElementById('cnpj_cliente').value = c.cnpj || '';
                document.getElementById('email_cliente').value = c.email || '';
                document.getElementById('slug_cliente').value = c.slug || '';
                document.getElementById('slug_cliente').readOnly = true;
                document.getElementById('data_vencimento').value = c.vencimento || '';
                document.getElementById('user_cliente').value = c.usuario || '';
                document.getElementById('pass_cliente').value = c.senha || '';
                document.getElementById('titulo-form').innerText = "📝 Editando: " + c.nome_fantasia;
                document.getElementById('btnSalvar').innerText = "Salvar Alterações";
                document.getElementById('btnCancelarEdit').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        window.resetForm = () => {
            document.getElementById('formNovoCliente').reset();
            document.getElementById('slug_cliente').readOnly = false;
            document.getElementById('titulo-form').innerText = "➕ Cadastrar Novo Cliente (SaaS)";
            document.getElementById('btnSalvar').innerText = "Ativar Licença e Gerar Acesso";
            document.getElementById('btnCancelarEdit').classList.add('hidden');
        };

        window.alternarStatus = async (id, status) => {
            await setDoc(doc(db, "clientes_revenda", id), { ativo: !status }, { merge: true });
        };

        window.excluirCliente = async (id) => {
            if(confirm("Excluir definitivamente?")) await deleteDoc(doc(db, "clientes_revenda", id));
        };
    </script>
</body>
</html>
