<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Area do Promoter ✨</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; min-height: 100vh; margin: 0; overflow-y: auto; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-gradient { background: linear-gradient(135deg, #bf8511 0%, #eab308 100%); color: #000; }
        .purple-gradient { background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%); color: #fff; }
        .card-performance { background: rgba(10, 10, 10, 0.9); border: 1px solid #0099ff; border-radius: 1.5rem; }
        .card-aniv { background: rgba(10, 10, 10, 0.9); border: 1px solid #a855f7; border-radius: 1.5rem; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="telaLogin" class="fixed inset-0 z-[999] bg-[#000] flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass p-10 rounded-[3rem] text-center border-sky-500/20 border shadow-2xl">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-14 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter">PROMOTER <span class="text-sky-400">ACCESS</span></h1>
            <input type="text" id="usuario" placeholder="USUÁRIO" class="w-full p-4 rounded-2xl bg-black border border-zinc-800 text-center font-bold uppercase text-xs mb-4 text-white">
            <div id="campo-senha" class="hidden">
                <input type="password" id="senha" placeholder="SENHA" class="w-full p-4 rounded-2xl bg-black border border-zinc-800 text-center font-bold uppercase text-xs mb-4 text-white">
            </div>
            <button onclick="prosseguirLogin()" id="btnAcao" class="w-full purple-gradient font-black py-4 rounded-2xl uppercase text-xs shadow-xl active:scale-95 transition-all">CONTINUAR</button>
        </div>
    </div>

    <div id="painel" class="hidden max-w-md mx-auto pb-44">
        <header class="flex justify-between items-center mb-8">
            <div>
                <p class="text-sky-400 text-[9px] font-black uppercase tracking-[0.3em] mb-1 italic">E-CLUB OFFICIAL</p>
                <h1 id="nomeHeader" class="text-3xl font-black uppercase italic leading-none">---</h1>
            </div>
            <button onclick="location.reload()" class="bg-red-900/20 text-red-500 border border-red-900/30 px-4 py-2 rounded-xl font-black text-[9px] uppercase italic">Sair</button>
        </header>

        <section id="secaoAniversario" class="hidden mb-10">
            <h3 class="text-[10px] font-black uppercase text-purple-400 mb-3 tracking-[0.2em] italic ml-1">🎂 LISTAS VIP</h3>
            <div id="listaAniversarios" class="space-y-3"></div>
        </section>

        <section class="space-y-4">
            <h3 class="text-[10px] font-black uppercase text-sky-400 mb-3 tracking-[0.2em] italic ml-1">📈 PERFORMANCE REALTIME</h3>
            <div id="listaPerformance" class="space-y-3"></div>
        </section>

        <footer id="navAcoes" class="fixed bottom-0 left-0 w-full p-4 bg-black/60 backdrop-blur-md border-t border-white/5 z-40">
            <div class="max-w-md mx-auto flex gap-2">
                <button onclick="abrirLinkGeral()" class="flex-[2] gold-gradient font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest shadow-xl active:scale-95 transition-all">ABRIR MEU LINK</button>
                <button onclick="copiarLinkGeral()" class="flex-none bg-zinc-800 text-white border border-white/10 px-5 rounded-2xl text-lg flex items-center justify-center">📋</button>
                
                <div class="flex-[2.5] flex gap-2 hidden" id="botoesAniversario">
                    <button onclick="abrirModalAniv()" class="flex-1 purple-gradient font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest shadow-xl">VIP</button>
                    <button onclick="abrirModalCortesia()" class="flex-1 bg-blue-600/20 text-blue-400 border border-blue-500/30 font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest shadow-xl">🎁 CORTESIA</button>
                </div>
            </div>
        </footer>
    </div>

    <div id="modalAniv" class="fixed inset-0 bg-black/95 z-[10000] hidden flex items-center justify-center p-6 text-white">
        <div class="glass max-w-sm w-full p-8 rounded-[2.5rem] border-purple-500/30 border text-center">
            <h2 class="text-xl font-black text-purple-400 uppercase italic mb-6">NOVA LISTA VIP</h2>
            <select id="selEvento" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-white text-xs font-bold uppercase mb-3 outline-none"></select>
            <input type="text" id="nomeAniv" placeholder="NOME DO ANIVERSARIANTE / VIP" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-white font-black uppercase text-xs mb-3 outline-none">
            <input type="tel" id="telAniv" oninput="mask(this)" placeholder="(41) 99999-9999" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-white font-bold text-xs mb-6 outline-none">
            <button onclick="criarLinkAniv()" id="btnGerarVip" class="w-full purple-gradient font-black py-4 rounded-xl uppercase text-xs shadow-xl active:scale-95 transition-all">GERAR LINK E GARANTIR VIP ✨</button>
            <button onclick="fecharModalAniv()" class="w-full text-zinc-600 font-black py-3 uppercase text-[9px] mt-2">FECHAR</button>
        </div>
    </div>

    <div id="modalCortesia" class="fixed inset-0 bg-black/95 z-[10000] hidden flex flex-col items-center justify-center p-6 text-white overflow-y-auto">
        <div class="glass max-w-sm w-full p-8 rounded-[2.5rem] border-blue-500/30 border text-center my-auto">
            <h2 class="text-xl font-black text-blue-400 uppercase italic mb-6">🎁 CORTESIA CAMAROTE</h2>
            <select id="selEventoCortesia" onchange="carregarCamarotesCortesia()" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-white text-xs font-bold uppercase mb-4 outline-none">
                <option value="">SELECIONE O EVENTO</option>
            </select>
            
            <div id="area-mapa-cortesia" class="hidden">
                <div class="w-full h-48 bg-zinc-900 rounded-xl mb-4 border border-white/10 flex items-center justify-center overflow-hidden relative">
                    <span class="text-zinc-500 font-black text-[10px] uppercase absolute tracking-widest z-0">MAPA DO CLUBE</span>
                    <img id="img-mapa-cortesia" src="https://andrezinhoeclub.github.io/lista-ecluboficial/camarotes.png?v=2" class="w-full h-full object-contain relative z-10" onerror="this.onerror=null; this.src='https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png'; this.className='h-20 opacity-30 object-contain relative z-10';">
                </div>

                <div class="grid grid-cols-2 gap-2 mb-6" id="grid-camarotes-cortesia"></div>
                
                <div id="form-cortesia" class="hidden space-y-3 border-t border-white/10 pt-4">
                    <p id="txt-camarote-selecionado" class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-2"></p>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <button id="btn-cort-casal" onclick="selTipoCort('CASAL')" class="bg-black border border-zinc-800 p-3 rounded-xl text-[10px] font-black uppercase text-zinc-400 transition-all">👫 Casal</button>
                        <button id="btn-cort-solteiro" onclick="selTipoCort('SOLTEIRO')" class="bg-black border border-zinc-800 p-3 rounded-xl text-[10px] font-black uppercase text-zinc-400 transition-all">👤 Solteiro</button>
                    </div>
                    <input type="text" id="nomeCortesia" placeholder="NOME DO CLIENTE" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-white font-black uppercase text-xs outline-none">
                    <input type="tel" id="telCortesia" oninput="mask(this)" placeholder="(41) 99999-9999" class="w-full bg-black border border-zinc-800 p-4 rounded-xl text-white font-bold text-xs outline-none">
                    <button onclick="salvarCortesia()" id="btnSalvarCortesia" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase text-xs shadow-xl active:scale-95 transition-all mt-2">CONFIRMAR CORTESIA ✨</button>
                </div>
            </div>
            <button onclick="fecharModalCortesia()" class="w-full text-zinc-600 font-black py-3 uppercase text-[9px] mt-4">FECHAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, getDoc, updateDoc, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", authDomain: "teste-de-reserva.firebaseapp.com", projectId: "teste-de-reserva", storageBucket: "teste-de-reserva.firebasestorage.app", messagingSenderId: "163395694876", appId: "1:163395694876:web:8b1116a0483af951548ad9" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let logado = ""; let reservas = []; let eventos = []; let dadosPromoter = null; let linksAniv = [];
        let camCortesiaSelecionado = null; let tipoCortesiaSelecionado = null;

        window.prosseguirLogin = async () => {
            const u = document.getElementById('usuario').value.trim().toLowerCase();
            const s = document.getElementById('senha').value.trim();
            const btn = document.getElementById('btnAcao');
            const inputSenha = document.getElementById('senha');
            if (!logado) {
                const snap = await getDoc(doc(db, "promoters", u));
                if (snap.exists()) {
                    logado = u; dadosPromoter = snap.data();
                    if (!dadosPromoter.senha) { inputSenha.placeholder = "CADASTRE SUA SENHA"; inputSenha.style.border = "1px solid #a855f7"; }
                    document.getElementById('campo-senha').classList.remove('hidden'); document.getElementById('usuario').readOnly = true;
                    btn.innerText = "ENTRAR NO PAINEL";
                } else { alert("Usuário não encontrado"); }
            } else {
                if (dadosPromoter.senha === s || !dadosPromoter.senha) {
                    if (!dadosPromoter.senha) await updateDoc(doc(db, "promoters", logado), { senha: s });
                    document.getElementById('telaLogin').style.display = 'none'; document.getElementById('painel').classList.remove('hidden');
                    document.getElementById('nomeHeader').innerText = logado.toUpperCase();
                    iniciarSistema();
                } else { alert("Senha incorreta"); }
            }
        };

        function iniciarSistema() {
            const st = (dadosPromoter.tipo || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            const f = new Intl.DateTimeFormat('pt-br', { year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date());
            const hojeLocal = f.split('/').reverse().join('-');

            if (st === "visualizar") {
                document.getElementById('navAcoes').style.display = 'none';
                document.getElementById('painel').classList.remove('pb-44');
                document.getElementById('painel').classList.add('pb-10');
            }
            
            if (st === "aniversario") {
                document.getElementById('secaoAniversario').classList.remove('hidden'); 
                document.getElementById('botoesAniversario').classList.remove('hidden');
                onSnapshot(collection(db, "links_aniversario"), (snap) => {
                    linksAniv = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(l => (l.promoter || '').toLowerCase().trim() === logado);
                    renderAniversarios();
                });
            }

            onSnapshot(collection(db, "lista_eventos"), (snap) => { reservas = snap.docs.map(d => d.data()); renderPerformance(); if (st === "aniversario") renderAniversarios(); });
            onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snap) => { 
                eventos = snap.docs.map(d => d.data()).filter(ev => ev.data >= hojeLocal).sort((a,b) => new Date(a.data) - new Date(b.data)); 
                renderPerformance(); 
            });
        }

        function renderAniversarios() {
            const cont = document.getElementById('listaAniversarios'); if(!cont) return;
            cont.innerHTML = linksAniv.map(l => {
                const count = reservas.filter(r => (r.evento || '').toLowerCase().trim() === (l.festa || '').toLowerCase().trim() && (r.aniversariante || '').toLowerCase().trim() === (l.aniversariante || '').toLowerCase().trim()).length;
                return `<div class="card-aniv p-4 flex justify-between items-center"><div class="text-left"><p class="text-[11px] font-black uppercase italic text-white">${l.aniversariante}</p><p class="text-[7px] text-zinc-500 font-bold uppercase">${l.festa}</p></div><div class="flex items-center gap-3"><div class="text-right"><p class="text-lg font-black text-purple-400 leading-none">${count}</p><p class="text-[6px] text-purple-500 font-black tracking-widest">LISTA</p></div><button onclick="copiarLinkAniv('${l.id}', '${l.aniversariante}')" class="bg-purple-500/20 text-purple-400 px-3 py-1.5 rounded-lg text-[8px] font-black uppercase border border-purple-500/30">Copiar</button></div></div>`;
            }).join('');
        }

        function renderPerformance() {
            const container = document.getElementById('listaPerformance');
            const st = (dadosPromoter.tipo || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            const escondeGeral = (st === 'padrao' || st === 'aniversario');
            const isVisualizador = (st === 'visualizar');

            container.innerHTML = eventos.map(ev => {
                const evNomeLimpo = (ev.nome || '').trim().toLowerCase();
                const minhas = reservas.filter(r => (r.evento || '').trim().toLowerCase() === evNomeLimpo && (r.promoter || '').toLowerCase().trim() === logado).length;
                const camesGeral = reservas.filter(r => (r.evento || '').trim().toLowerCase() === evNomeLimpo && (r.tipo_entrada || '').toUpperCase().includes('CAMAROTE'));
                const geral = reservas.filter(r => (r.evento || '').trim().toLowerCase() === evNomeLimpo).length;
                
                if (isVisualizador) {
                    let luzesCamarotes = '';
                    for(let n=1; n<=8; n++) {
                        const ativo = ev[`cam${n}_ativo`] === true;
                        if (!ativo) { luzesCamarotes += `<div class="w-full py-1 rounded bg-zinc-900/50 flex items-center justify-center text-[7px] text-zinc-600 font-bold border border-white/5">x</div>`; continue; }

                        const resDesseCam = camesGeral.filter(r => (r.tipo_entrada || '').toUpperCase() === `CAMAROTE ${n}`);
                        let statusCam = 'livre';
                        if (resDesseCam.some(r => r.cortesia === true)) statusCam = 'cortesia';
                        else if (resDesseCam.some(r => r.pago === true)) statusCam = 'vendido';
                        else {
                            const pendentes = resDesseCam.filter(r => r.pago === false && !r.cortesia);
                            const temPendente = pendentes.some(r => r.data_reserva && ((new Date() - new Date(r.data_reserva)) / 60000 < 5));
                            if(temPendente) statusCam = 'aguardando';
                        }

                        const cores = { 'cortesia': 'bg-blue-500 shadow-[0_0_8px_#3b82f6]', 'vendido': 'bg-red-500 shadow-[0_0_8px_#ef4444]', 'aguardando': 'bg-yellow-500 animate-pulse', 'livre': 'bg-green-500 shadow-[0_0_8px_#22c55e]' };
                        const cor = cores[statusCam] || cores['livre'];
                        luzesCamarotes += `<div class="w-full py-1 rounded ${cor} flex items-center justify-center text-white text-[8px] font-black">C${n}</div>`;
                    }
                    return `<div class="card-performance p-5 flex flex-col"><div class="flex justify-between items-center mb-4"><div class="text-left"><h4 class="text-[11px] font-black uppercase italic leading-tight text-white">${ev.nome}</h4><p class="text-[8px] text-zinc-500 font-bold mt-1">${ev.data.split('-').reverse().join('/')}</p></div><div class="text-right"><p class="text-2xl font-black text-white leading-none">${geral}</p><p class="text-[6px] text-zinc-400 font-black mt-1 uppercase tracking-widest">Total Reservas</p></div></div><div class="border-t border-white/5 pt-4"><div class="flex justify-between items-center mb-3 px-1"><span class="text-[8px] font-black text-cyan-400 uppercase tracking-widest">💎 Status Camarotes</span></div><div class="grid grid-cols-8 gap-2">${luzesCamarotes}</div></div></div>`;
                } else {
                    const blocoGeralHTML = escondeGeral ? '' : `<div class="border-l border-white/5 pl-6"><p class="text-2xl font-black text-white/20 leading-none">${geral}</p><p class="text-[6px] text-white/10 font-black mt-1 uppercase tracking-widest">Geral</p></div>`;
                    return `<div class="card-performance p-5 flex justify-between items-center"><div class="text-left"><h4 class="text-[11px] font-black uppercase italic leading-tight text-white">${ev.nome}</h4><p class="text-[8px] text-zinc-500 font-bold mt-1">${ev.data.split('-').reverse().join('/')}</p></div><div class="flex gap-6 text-right"><div><p class="text-2xl font-black text-sky-400 leading-none">${minhas}</p><p class="text-[6px] text-sky-500 font-black mt-1 uppercase tracking-widest">Minhas</p></div>${blocoGeralHTML}</div></div>`;
                }
            }).join('');
        }

        window.abrirModalCortesia = () => {
            const sel = document.getElementById('selEventoCortesia');
            if (eventos.length === 0) return alert("Nenhum evento ativo!");
            sel.innerHTML = '<option value="">SELECIONE O EVENTO</option>' + eventos.map(ev => `<option value="${ev.nome}">${ev.nome}</option>`).join('');
            document.getElementById('modalCortesia').classList.remove('hidden');
        };

        window.fecharModalCortesia = () => { document.getElementById('modalCortesia').classList.add('hidden'); camCortesiaSelecionado = null; tipoCortesiaSelecionado = null; };

        window.carregarCamarotesCortesia = () => {
            const nomeEv = document.getElementById('selEventoCortesia').value;
            if (!nomeEv) return;
            const ev = eventos.find(e => e.nome === nomeEv);
            const resEvento = reservas.filter(r => r.evento === nomeEv);
            document.getElementById('area-mapa-cortesia').classList.remove('hidden');
            const grid = document.getElementById('grid-camarotes-cortesia');
            grid.innerHTML = '';
            
            const imgCortesia = document.getElementById('img-mapa-cortesia');
            if (imgCortesia) {
                imgCortesia.className = "w-full h-full object-contain relative z-10";
                let urlC = 'https://andrezinhoeclub.github.io/lista-ecluboficial/camarotes.png?v=2';
                if (ev.url_mapa && ev.url_mapa.trim() !== '') urlC = ev.url_mapa.trim();
                imgCortesia.src = urlC;
            }

            for(let i=1; i<=8; i++) {
                if(ev[`cam${i}_ativo`]) {
                    const resCam = resEvento.filter(r => r.tipo_entrada === `CAMAROTE ${i}`);
                    let status = 'livre'; let classCor = 'border-green-500/50 bg-green-500/10 text-green-400';
                    if (resCam.some(r => r.cortesia)) { status = 'cortesia'; classCor = 'border-blue-500/50 bg-blue-500/10 text-blue-400 opacity-50 cursor-not-allowed'; }
                    else if (resCam.some(r => r.pago)) { status = 'vendido'; classCor = 'border-red-500/50 bg-red-500/10 text-red-400 opacity-50 cursor-not-allowed'; }
                    const onclickAction = status === 'livre' ? `onclick="selecionarCamCortesia(${i})"` : '';
                    grid.innerHTML += `<div ${onclickAction} class="p-3 rounded-xl border flex flex-col items-center justify-center transition-all ${classCor} ${status==='livre'?'cursor-pointer hover:scale-105':''}"><span class="text-[10px] font-black uppercase">Cam 0${i}</span><span class="text-[7px] font-bold uppercase mt-1 opacity-70">${status}</span></div>`;
                }
            }
        };

        window.selecionarCamCortesia = (num) => { camCortesiaSelecionado = num; document.getElementById('txt-camarote-selecionado').innerText = `🎁 SELECIONADO: CAMAROTE 0${num}`; document.getElementById('form-cortesia').classList.remove('hidden'); };
        window.selTipoCort = (t) => { tipoCortesiaSelecionado = t; document.getElementById('btn-cort-casal').className = t==='CASAL'?'bg-blue-600/20 border-blue-500 text-blue-400 border p-3 rounded-xl text-[10px] font-black uppercase':'bg-black border border-zinc-800 p-3 rounded-xl text-[10px] font-black uppercase text-zinc-400'; document.getElementById('btn-cort-solteiro').className = t==='SOLTEIRO'?'bg-blue-600/20 border-blue-500 text-blue-400 border p-3 rounded-xl text-[10px] font-black uppercase':'bg-black border border-zinc-800 p-3 rounded-xl text-[10px] font-black uppercase text-zinc-400'; };

        window.salvarCortesia = async () => {
            if (!camCortesiaSelecionado || !tipoCortesiaSelecionado) return alert("Selecione camarote e tipo!");
            const n = document.getElementById('nomeCortesia').value.trim().toUpperCase();
            const t = document.getElementById('telCortesia').value.trim();
            const f = document.getElementById('selEventoCortesia').value;
            if (!n || t.length < 14) return alert("Preencha tudo!");
            
            const btn = document.getElementById('btnSalvarCortesia'); btn.innerText = "SALVANDO..."; btn.disabled = true;
            try {
                const check = await getDocs(query(collection(db, "lista_eventos"), where("evento", "==", f), where("tipo_entrada", "==", `CAMAROTE ${camCortesiaSelecionado}`)));
                let ocupado = false; check.forEach(d => { if(d.data().pago || d.data().cortesia) ocupado = true; });
                if(ocupado) throw new Error("Ocupado!");
                await addDoc(collection(db, "lista_eventos"), { nome: n, tel: t, evento: f, tipo_entrada: `CAMAROTE ${camCortesiaSelecionado}`, pagamento_porta: tipoCortesiaSelecionado, promoter: logado, cortesia: true, data_reserva: new Date().toISOString(), entrou: false, pago: false, metodo: 'portaria' });
                alert("🎁 Cortesia salva!"); fecharModalCortesia();
            } catch(e) { alert(e.message); } finally { btn.innerText = "CONFIRMAR CORTESIA ✨"; btn.disabled = false; }
        };

        window.abrirLinkGeral = () => { window.open(`https://andrezinhoeclub.github.io/lista-ecluboficial/listas.html?ref=${logado}`, '_blank'); };
        window.copiarLinkGeral = () => { navigator.clipboard.writeText(`https://andrezinhoeclub.github.io/lista-ecluboficial/listas.html?ref=${logado}`).then(() => alert("Copiado!")); };
        window.copiarLinkAniv = (id, n) => { navigator.clipboard.writeText(`*Convite VIP de ${n}* 🍾\nhttps://andrezinhoeclub.github.io/lista-ecluboficial/listas.html?id=${id}`).then(() => alert("Copiado!")); };
        window.abrirModalAniv = () => { const s = document.getElementById('selEvento'); s.innerHTML = eventos.map(ev => `<option value="${ev.nome}">${ev.nome}</option>`).join(''); document.getElementById('modalAniv').classList.remove('hidden'); };
        window.fecharModalAniv = () => document.getElementById('modalAniv').classList.add('hidden');
        window.mask = (i) => { let v = i.value.replace(/\D/g, "").substring(0,11); if(v.length>0) v="("+v; if(v.length>3) v=v.substring(0,3)+") "+v.substring(3); if(v.length>10) v=v.substring(0,10)+"-"+v.substring(10); i.value=v; };
        window.criarLinkAniv = async () => { const f=document.getElementById('selEvento').value; const n=document.getElementById('nomeAniv').value.trim().toUpperCase(); const t=document.getElementById('telAniv').value.trim(); if(!n || t.length<14) return alert("Preencha!"); try { await addDoc(collection(db,"links_aniversario"), {promoter:logado, aniversariante:n, festa:f, criado:new Date().toISOString()}); await addDoc(collection(db,"lista_eventos"), {nome:n, tel:t, evento:f, tipo_entrada:"VIP_DONO", promoter:logado, data_reserva:new Date().toISOString(), entrou:false, pago:false, metodo:'portaria', aniversariante:n}); alert("Lista Criada!"); fecharModalAniv(); } catch(e){alert("Erro!");} finally { document.getElementById('btnGerarVip').innerText = "GERAR LINK E GARANTIR VIP ✨"; document.getElementById('btnGerarVip').disabled = false; } };
    </script>
</body>
</html>
