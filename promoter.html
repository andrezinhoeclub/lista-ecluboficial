<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Promoter Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap');
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #000); background-attachment: fixed; color: #fff; min-height: 100vh; margin: 0; padding: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .blue-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .gold-gradient { background: linear-gradient(135deg, #eab308 0%, #a16207 100%); }
        .purple-gradient { background: linear-gradient(135deg, #9333ea 0%, #3b82f6 100%); }
        .content-wrapper { padding-bottom: 180px; } 
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginPromoter" class="flex flex-col items-center justify-center min-h-[90vh]">
        <div class="w-full max-w-sm glass p-10 rounded-[3rem] text-center border-blue-500/20 border">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">Promoter <span class="text-blue-500">Access</span></h1>
            <div id="step-user">
                <input type="text" id="userPromoter" placeholder="USUÁRIO" class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl outline-none focus:border-blue-500 text-center font-bold uppercase text-xs mb-4 text-white">
                <button onclick="validarUsuario()" class="w-full blue-gradient text-white font-black py-5 rounded-2xl uppercase text-xs shadow-xl tracking-widest transition-all active:scale-95">Continuar</button>
            </div>
            <div id="step-password" class="hidden">
                <input type="password" id="passPromoter" placeholder="SENHA" class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl outline-none focus:border-blue-500 text-center font-bold uppercase text-xs mb-4 text-white">
                <button onclick="entrarComSenha()" id="btnEntrar" class="w-full blue-gradient text-white font-black py-5 rounded-2xl uppercase text-xs shadow-xl tracking-widest transition-all active:scale-95">Entrar</button>
            </div>
            <p id="msgErro" class="text-red-500 text-[10px] font-black uppercase mt-6 hidden">Operador não cadastrado</p>
        </div>
    </div>

    <div id="interfacePrincipal" class="hidden max-w-md mx-auto content-wrapper">
        <header class="flex justify-between items-center mb-10 text-white">
            <div>
                <p class="text-blue-500 text-[10px] font-black uppercase tracking-[0.3em] mb-1">E-Club Oficial</p>
                <h1 id="boasVindas" class="text-3xl font-black uppercase italic leading-none text-white">---</h1>
            </div>
            <button onclick="location.reload()" class="bg-zinc-900/50 p-3 px-5 rounded-2xl text-red-500 font-black text-[10px] border border-red-500/20">Sair</button>
        </header>

        <section class="space-y-8">
            <div id="secaoMeusLinks" class="hidden">
                <h3 class="text-[10px] font-black uppercase text-purple-400 mb-4 tracking-[0.2em] ml-2 italic">Links de Aniversário</h3>
                <div id="listaLinksAniv" class="space-y-3"></div>
            </div>
            <div>
                <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-4 tracking-[0.2em] ml-2 italic text-white">Próximos Eventos</h3>
                <div id="listaEventosPromoter" class="glass rounded-[2.5rem] overflow-hidden text-white"></div>
            </div>
        </section>

        <div id="footerAcoes" class="fixed bottom-0 left-0 w-full p-4 md:p-6 bg-black/90 backdrop-blur-xl border-t border-white/10 z-40">
            <div class="max-w-md mx-auto flex gap-3" id="barraBotoes">
                <button onclick="copiarLinkReservas()" class="flex-grow gold-gradient text-black font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest shadow-xl">Link Geral</button>
            </div>
        </div>
    </div>

    <div id="modalAniversario" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 hidden flex items-center justify-center p-6 text-white text-white">
        <div class="glass max-w-sm w-full p-10 rounded-[3rem] border-yellow-500/30 border text-center">
            <h2 class="text-2xl font-black text-yellow-500 uppercase italic mb-8">Novo Aniversário</h2>
            <div class="text-left space-y-4">
                <select id="selectEventoAniv" class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl text-white outline-none text-xs font-bold uppercase"></select>
                <input type="text" id="nomeAniversariante" placeholder="NOME DO ANIVERSARIANTE" class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl text-white outline-none font-black uppercase text-xs">
            </div>
            <button onclick="gerarLinkAniversario()" id="btnGerar" class="w-full gold-gradient text-black font-black py-6 rounded-2xl uppercase text-xs shadow-xl mt-8 transition-all active:scale-95">Gerar Link Curto</button>
            <button onclick="fecharModalAniv()" class="w-full text-zinc-600 font-black py-4 uppercase text-[9px] mt-2">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, getDoc, getDocs, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentPromoter = "";
        let todasReservasGlobal = [];
        let meusLinksAniversario = [];

        window.validarUsuario = async function() {
            const n = document.getElementById('userPromoter').value.trim().toLowerCase();
            if(!n) return;
            const snap = await getDoc(doc(db, "promoters", n));
            if(snap.exists()) {
                currentPromoter = n;
                document.getElementById('step-user').classList.add('hidden');
                document.getElementById('step-password').classList.remove('hidden');
            } else { document.getElementById('msgErro').classList.remove('hidden'); }
        }

        window.entrarComSenha = async function() {
            const s = document.getElementById('passPromoter').value.trim();
            const snap = await getDoc(doc(db, "promoters", currentPromoter));
            const d = snap.data();
            if(!d.senha || d.senha === s) {
                if(!d.senha) await updateDoc(doc(db, "promoters", currentPromoter), { senha: s });
                carregarPainel(d);
            } else { alert("Senha incorreta"); }
        }

        function carregarPainel(dados) {
            document.getElementById('loginPromoter').classList.add('hidden');
            document.getElementById('interfacePrincipal').classList.remove('hidden');
            document.getElementById('boasVindas').innerText = currentPromoter;

            onSnapshot(collection(db, "lista_eventos"), (snap) => {
                todasReservasGlobal = snap.docs.map(d => d.data());
                renderizarLinks();
                renderizarEventos();
            });

            if(dados.tipo === "aniversario") {
                document.getElementById('secaoMeusLinks').classList.remove('hidden');
                if(!document.getElementById('btnVip')) {
                    const b = document.createElement('button');
                    b.id = 'btnVip'; b.onclick = abrirModalAniv;
                    b.className = "flex-grow purple-gradient text-white font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest shadow-xl transition-all active:scale-95";
                    b.innerHTML = "🎂 Criar Link Curto";
                    document.getElementById('barraBotoes').appendChild(b);
                }
                onSnapshot(query(collection(db, "links_aniversario"), where("promoter", "==", currentPromoter)), (snap) => {
                    meusLinksAniversario = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    renderizarLinks();
                });
            }
        }

        function renderizarLinks() {
            const cont = document.getElementById('listaLinksAniv');
            if(!cont) return;
            cont.innerHTML = '';
            meusLinksAniversario.forEach(link => {
                const qtd = todasReservasGlobal.filter(r => r.evento === link.festa && (r.aniversariante === link.aniversariante || r.nome_aniversariante === link.aniversariante)).length;
                cont.innerHTML += `
                    <div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-purple-500 mb-2">
                        <div class="truncate mr-2 text-white">
                            <p class="text-[10px] font-black text-white uppercase">${link.aniversariante}</p>
                            <p class="text-[7px] text-zinc-500 uppercase truncate">${link.festa}</p>
                        </div>
                        <div class="flex items-center gap-4 text-white">
                            <div class="text-right">
                                <p class="text-[7px] text-purple-400 font-black uppercase">Convidados</p>
                                <p class="text-lg font-black text-white leading-none">${qtd}</p>
                            </div>
                            <button onclick="copiarLinkInteligente('${link.id}', '${link.aniversariante}')" class="bg-purple-500/20 text-purple-400 px-3 py-2 rounded-xl text-[8px] font-black uppercase transition-all active:scale-90">Copiar</button>
                        </div>
                    </div>`;
            });
        }

        function renderizarEventos() {
            onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snap) => {
                const cont = document.getElementById('listaEventosPromoter');
                if(!cont) return;
                cont.innerHTML = '';
                snap.docs.map(d => d.data()).sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                    const ind = todasReservasGlobal.filter(r => r.evento === ev.nome && r.promoter === currentPromoter).length;
                    const ger = todasReservasGlobal.filter(r => r.evento === ev.nome).length;
                    cont.innerHTML += `<div class="p-6 flex justify-between items-center border-b border-white/5"><div><h4 class="text-[12px] font-black uppercase text-white italic leading-tight">${ev.nome}</h4><p class="text-[9px] text-zinc-500 font-bold uppercase mt-1">${ev.data.split('-').reverse().join('/')}</p></div><div class="flex gap-4 text-right"><div><p class="text-[7px] text-blue-400 font-black uppercase mb-1">Minhas</p><p class="text-2xl font-black leading-none text-white">${ind}</p></div><div class="border-l border-white/10 pl-4 text-white"><p class="text-[7px] text-zinc-600 font-black uppercase mb-1">Geral</p><p class="text-2xl font-black text-zinc-400 leading-none">${ger}</p></div></div></div>`;
                });
            });
        }

        window.abrirModalAniv = async () => {
            const s = document.getElementById('selectEventoAniv');
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            s.innerHTML = '';
            snap.forEach(ev => s.innerHTML += `<option value="${ev.data().nome}">${ev.data().nome}</option>`);
            document.getElementById('modalAniversario').classList.remove('hidden');
        }

        window.fecharModalAniv = () => {
            document.getElementById('modalAniversario').classList.add('hidden');
        }

        window.gerarLinkAniversario = async () => {
            const festa = document.getElementById('selectEventoAniv').value;
            const nome = document.getElementById('nomeAniversariante').value.trim().toUpperCase();
            if(!nome) return alert("Digite o nome do aniversariante!");
            
            const btn = document.getElementById('btnGerar');
            btn.disabled = true; 
            btn.innerText = "GRAVANDO...";

            try {
                await addDoc(collection(db, "links_aniversario"), {
                    promoter: currentPromoter,
                    aniversariante: nome,
                    festa: festa,
                    data_criacao: new Date().toISOString()
                });
                alert("Link criado com sucesso!");
                fecharModalAniv();
            } catch (error) {
                console.error(error);
                alert("Erro ao salvar no banco. Tente novamente.");
            } finally {
                btn.disabled = false; 
                btn.innerText = "Gerar Link Curto";
                document.getElementById('nomeAniversariante').value = "";
            }
        }

        window.copiarLinkInteligente = (id, aniversariante) => {
            const url = window.location.origin + window.location.pathname.replace('promoter.html', 'listas.html') + '?id=' + id;
            const textoMensagem = `*Convite VIP: Aniversário de ${aniversariante}* 🎂\n\n*Clique no link abaixo para confirmar seu nome na lista:*\n${url}`;
            navigator.clipboard.writeText(textoMensagem).then(() => alert("Texto para WhatsApp copiado!"));
        }

        window.copiarLinkReservas = () => {
            const url = window.location.origin + window.location.pathname.replace('promoter.html', 'listas.html') + '?ref=' + currentPromoter;
            navigator.clipboard.writeText(url).then(() => alert("Link Geral Copiado!"));
        };
    </script>
</body>
</html>
