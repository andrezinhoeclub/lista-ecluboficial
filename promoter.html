<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Promoter Dashboard</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #000); 
            background-attachment: fixed;
            color: #fff; 
            min-height: 100vh;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .gold-gradient {
            background: linear-gradient(135deg, #eab308 0%, #a16207 100%);
        }

        .blue-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }

        .btn-press { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-press:active { transform: scale(0.95); opacity: 0.9; }

        .stat-card {
            background: rgba(0, 0, 0, 0.4);
            border-left: 2px solid rgba(255, 255, 255, 0.1);
        }

        .event-row {
            transition: background 0.3s;
        }
        .event-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Animação de entrada */
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginPromoter" class="flex flex-col items-center justify-center min-h-[90vh]">
        <div class="w-full max-w-sm glass p-10 rounded-[3rem] text-center fade-in">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-2 text-white uppercase italic tracking-tighter">Promoter <span class="text-blue-500">Access</span></h1>
            <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-8">E-Club Booking System</p>
            
            <div class="space-y-4">
                <input type="text" id="userPromoter" placeholder="DIGITE SEU USUÁRIO" 
                    class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl outline-none focus:border-blue-500 text-center font-bold text-white uppercase text-xs tracking-widest transition-all">
                
                <button onclick="acessarPainel()" id="btnAcessar" 
                    class="w-full blue-gradient text-white font-black py-5 rounded-2xl uppercase text-xs shadow-xl btn-press tracking-widest">
                    Entrar no Painel
                </button>
            </div>
        </div>
    </div>

    <div id="painelDados" class="max-w-md mx-auto hidden fade-in">
        <header class="flex justify-between items-center mb-10">
            <div>
                <p class="text-blue-500 text-[10px] font-black uppercase tracking-[0.3em] mb-1">Welcome Back</p>
                <h1 id="boasVindas" class="text-3xl font-black text-white uppercase italic leading-none">Olá!</h1>
            </div>
            <button onclick="location.reload()" class="glass p-3 px-5 rounded-2xl text-zinc-400 hover:text-white transition font-black text-[10px] uppercase border-red-500/20 text-red-400">
                Sair
            </button>
        </header>

        <section class="space-y-6">
            <div class="flex items-center justify-between px-2">
                <h3 class="text-zinc-500 text-[11px] font-black uppercase tracking-[0.2em]">Agenda da Semana</h3>
                <div class="h-[1px] flex-grow mx-4 bg-zinc-800"></div>
            </div>
            
            <div id="listaEventosPromoter" class="glass rounded-[2.5rem] overflow-hidden">
                </div>

            <div class="pt-6">
                <button onclick="copiarLinkReservas()" class="w-full gold-gradient text-black font-black py-6 rounded-[2rem] uppercase text-[12px] tracking-widest btn-press shadow-[0_10px_30px_-10px_rgba(234,179,8,0.5)] flex flex-col items-center">
                    <div class="flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3" />
                        </svg>
                        COPIAR MEU LINK DE RESERVAS
                    </div>
                    <span class="text-[8px] opacity-70 normal-case font-bold mt-1 tracking-normal">Pronto para enviar aos clientes no WhatsApp</span>
                </button>
            </div>
        </section>

        <footer class="mt-20 text-center mb-10 pb-10">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-10 mx-auto mb-4 opacity-10 grayscale">
            <p class="text-zinc-800 text-[9px] font-black uppercase tracking-[0.5em]">Eclub • Master Control</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentPromoter = "";

        window.acessarPainel = async function() {
            const nome = document.getElementById('userPromoter').value.trim().toLowerCase();
            const btn = document.getElementById('btnAcessar');
            if(!nome) return;

            btn.disabled = true;
            btn.innerText = "VERIFICANDO...";

            try {
                const snapP = await getDoc(doc(db, "promoters", nome));
                if(snapP.exists()) {
                    currentPromoter = nome;
                    document.getElementById('loginPromoter').classList.add('hidden');
                    document.getElementById('painelDados').classList.remove('hidden');
                    document.getElementById('boasVindas').innerText = nome;
                    carregarDados(nome);
                } else {
                    alert("Acesso negado. Verifique seu usuário.");
                    btn.disabled = false;
                    btn.innerText = "Entrar no Painel";
                }
            } catch(e) { alert("Erro de conexão."); btn.disabled = false; }
        }

        async function carregarDados(nomePromoter) {
            const cont = document.getElementById('listaEventosPromoter');
            cont.innerHTML = '<div class="p-16 text-center animate-pulse text-[10px] font-black uppercase text-zinc-600">Sincronizando Banco de Dados...</div>';

            try {
                const hoje = new Date().toLocaleDateString('en-CA');
                const qEventos = query(collection(db, "eventos"), where("ativo", "==", true));
                const snapEventos = await getDocs(qEventos);
                
                const snapReservas = await getDocs(collection(db, "lista_eventos"));
                const todasReservas = [];
                snapReservas.forEach(d => todasReservas.push(d.data()));

                let eventosFiltrados = [];
                snapEventos.forEach(doc => {
                    if(!doc.data().data || doc.data().data >= hoje) eventosFiltrados.push(doc.data());
                });
                eventosFiltrados.sort((a,b) => new Date(a.data) - new Date(b.data));

                if(eventosFiltrados.length === 0) {
                    cont.innerHTML = '<p class="p-20 text-center text-zinc-700 text-[10px] uppercase font-black italic">Nenhuma festa agendada.</p>';
                    return;
                }

                cont.innerHTML = '';
                eventosFiltrados.forEach((ev, index) => {
                    const individual = todasReservas.filter(r => r.evento === ev.nome && r.promoter.toLowerCase() === nomePromoter).length;
                    const geral = todasReservas.filter(r => r.evento === ev.nome).length;
                    const data = ev.data.split('-').reverse().join('/');

                    cont.innerHTML += `
                        <div class="event-row p-6 flex justify-between items-center ${index !== eventosFiltrados.length - 1 ? 'border-b border-white/5' : ''}">
                            <div class="max-w-[180px]">
                                <h4 class="text-[13px] font-black uppercase text-white leading-tight mb-1 italic tracking-tight">${ev.nome}</h4>
                                <div class="flex items-center gap-2">
                                    <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span>
                                    <p class="text-[9px] text-zinc-500 font-bold">${data}</p>
                                </div>
                            </div>
                            <div class="flex gap-6">
                                <div class="text-right">
                                    <p class="text-[7px] text-blue-500 font-black uppercase tracking-widest mb-1">Minhas</p>
                                    <p class="text-2xl font-black text-white leading-none font-mono tracking-tighter">${individual}</p>
                                </div>
                                <div class="text-right border-l border-white/10 pl-5">
                                    <p class="text-[7px] text-zinc-600 font-black uppercase tracking-widest mb-1">Geral</p>
                                    <p class="text-2xl font-black text-zinc-700 leading-none font-mono tracking-tighter">${geral}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch(e) { cont.innerHTML = '<p class="p-10 text-center text-red-500 text-[10px]">ERRO DE SINCRONIZAÇÃO.</p>'; }
        }

        window.copiarLinkReservas = () => {
            const url = window.location.href.split('promoter.html')[0] + 'listas.html?ref=' + currentPromoter;
            navigator.clipboard.writeText(url).then(() => {
                const btn = event.currentTarget;
                const originalText = btn.innerHTML;
                btn.innerHTML = '<span class="text-white">LINK COPIADO!</span>';
                setTimeout(() => { btn.innerHTML = originalText; }, 2000);
            });
        };
    </script>
</body>
</html>
