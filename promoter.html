<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Promoter Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap');
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #000); background-attachment: fixed; color: #fff; min-height: 100vh; margin: 0; padding: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .blue-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .gold-gradient { background: linear-gradient(135deg, #eab308 0%, #a16207 100%); }
        .purple-gradient { background: linear-gradient(135deg, #9333ea 0%, #3b82f6 100%); }
        .text-neon-blue { color: #60a5fa; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); font-family: 'JetBrains Mono', monospace; }
        .text-neon-zinc { color: #e4e4e7; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2); font-family: 'JetBrains Mono', monospace; }
        .content-wrapper { padding-bottom: 180px; } 
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginPromoter" class="flex flex-col items-center justify-center min-h-[90vh]">
        <div class="w-full max-w-sm glass p-10 rounded-[3rem] text-center border-blue-500/20 border text-white">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">Promoter <span class="text-blue-500">Access</span></h1>
            <div id="step-user">
                <input type="text" id="userPromoter" placeholder="DIGITE SEU NOME" class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl outline-none focus:border-blue-500 text-center font-bold uppercase text-xs mb-4 text-white">
                <button onclick="validarUsuario()" class="w-full blue-gradient text-white font-black py-5 rounded-2xl uppercase text-xs shadow-xl tracking-widest active:scale-95 transition-all">Continuar</button>
            </div>
            <div id="step-password" class="hidden">
                <input type="password" id="passPromoter" placeholder="SUA SENHA" class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl outline-none focus:border-blue-500 text-center font-bold uppercase text-xs mb-4 text-white">
                <button onclick="entrarComSenha()" id="btnEntrar" class="w-full blue-gradient text-white font-black py-5 rounded-2xl uppercase text-xs shadow-xl tracking-widest active:scale-95 transition-all">Entrar</button>
            </div>
            <p id="msgErro" class="text-red-500 text-[10px] font-black uppercase mt-6 hidden italic tracking-widest text-center">Usuário não encontrado ou senha inválida</p>
        </div>
    </div>

    <div id="interfacePrincipal" class="hidden max-w-md mx-auto content-wrapper">
        <header class="flex justify-between items-center mb-10">
            <div>
                <p class="text-blue-500 text-[10px] font-black uppercase tracking-[0.3em] mb-1">E-Club Oficial</p>
                <h1 id="boasVindas" class="text-3xl font-black text-white uppercase italic leading-none">---</h1>
            </div>
            <button onclick="location.reload()" class="bg-zinc-900/50 p-3 px-5 rounded-2xl text-red-500 font-black text-[10px] border border-red-500/20">Sair</button>
        </header>

        <section class="space-y-8">
            <div id="secaoMeusLinks" class="hidden">
                <h3 class="text-[10px] font-black uppercase text-purple-400 mb-4 tracking-[0.2em] ml-2 italic">Minhas Listas (Ordem Cronológica)</h3>
                <div id="listaLinksAniv" class="space-y-3"></div>
            </div>

            <div>
                <h3 class="text-[10px] font-black uppercase text-zinc-500 mb-4 tracking-[0.2em] ml-2 italic text-white">Desempenho nos Eventos</h3>
                <div id="listaEventosPromoter" class="glass rounded-[2.5rem] overflow-hidden"></div>
            </div>
        </section>

        <div id="footerAcoes" class="fixed bottom-0 left-0 w-full p-4 md:p-6 bg-black/90 backdrop-blur-xl border-t border-white/10 z-40">
            <div class="max-w-md mx-auto flex gap-3" id="barraBotoes">
                <button onclick="copiarLinkReservas()" class="flex-grow gold-gradient text-black font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest shadow-xl transition-transform active:scale-95">Link Geral de Reservas</button>
            </div>
        </div>
    </div>

    <div id="modalAniversario" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 hidden flex items-center justify-center p-6 text-white text-white">
        <div class="glass max-w-sm w-full p-10 rounded-[3rem] border-yellow-500/30 border text-center text-white">
            <h2 class="text-2xl font-black text-yellow-500 uppercase italic mb-8">Novo Aniversário</h2>
            <div class="text-left space-y-4">
                <select id="selectEventoAniv" class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl text-white outline-none text-xs font-bold uppercase"></select>
                <input type="text" id="nomeAniversariante" placeholder="NOME DO ANIVERSARIANTE" class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl text-white outline-none font-black uppercase text-xs">
            </div>
            <button onclick="gerarLinkAniversario()" class="w-full gold-gradient text-black font-black py-6 rounded-2xl uppercase text-xs shadow-xl mt-8">Gerar e Salvar Link</button>
            <button onclick="fecharModalAniv()" class="w-full text-zinc-600 font-black py-4 uppercase text-[9px] mt-2">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentPromoter = "";
        let userData = null;
        let todasReservasGlobal = [];
        let todosEventosGlobal = [];

        window.validarUsuario = async function() {
            const nomeInput = document.getElementById('userPromoter').value.trim().toLowerCase();
            const docSnap = await getDoc(doc(db, "promoters", nomeInput));
            if(docSnap.exists()) {
                currentPromoter = nomeInput;
                userData = docSnap.data();
                document.getElementById('step-user').classList.add('hidden');
                document.getElementById('step-password').classList.remove('hidden');
            } else { document.getElementById('msgErro').classList.remove('hidden'); }
        }

        window.entrarComSenha = async function() {
            const senha = document.getElementById('passPromoter').value.trim();
            if(!userData.senha || userData.senha === senha) {
                if(!userData.senha) await updateDoc(doc(db, "promoters", currentPromoter), { senha: senha });
                carregarPainel();
            } else { alert("Senha incorreta!"); }
        }

        function carregarPainel() {
            document.getElementById('loginPromoter').classList.add('hidden');
            document.getElementById('interfacePrincipal').classList.remove('hidden');
            document.getElementById('boasVindas').innerText = currentPromoter;

            onSnapshot(collection(db, "eventos"), (snap) => {
                todosEventosGlobal = snap.docs.map(d => d.data());
                renderizarInterface();
            });

            onSnapshot(collection(db, "lista_eventos"), (snap) => {
                todasReservasGlobal = snap.docs.map(d => d.data());
                renderizarInterface();
            });

            if(userData.tipo === "aniversario") {
                document.getElementById('secaoMeusLinks').classList.remove('hidden');
                if(!document.getElementById('btnAnivFix')) {
                    const btnAniv = document.createElement('button');
                    btnAniv.id = 'btnAnivFix'; btnAniv.onclick = abrirModalAniv;
                    btnAniv.className = "flex-grow purple-gradient text-white font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest shadow-xl";
                    btnAniv.innerHTML = "🎂 Criar Link de Aniv.";
                    document.getElementById('barraBotoes').appendChild(btnAniv);
                }
                onSnapshot(query(collection(db, "links_aniversario"), where("promoter", "==", currentPromoter)), (snap) => {
                    renderizarLinksAniv(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
            }
        }

        function renderizarInterface() {
            if (todosEventosGlobal.length > 0) carregarTabelaEventos();
        }

        function carregarTabelaEventos() {
            const cont = document.getElementById('listaEventosPromoter');
            cont.innerHTML = '';
            const eventos = todosEventosGlobal.filter(e => e.ativo).sort((a,b) => new Date(a.data) - new Date(b.data));
            eventos.forEach(ev => {
                const ind = todasReservasGlobal.filter(r => r.evento === ev.nome && (r.promoter || '').toLowerCase() === currentPromoter).length;
                const ger = todasReservasGlobal.filter(r => r.evento === ev.nome).length;
                cont.innerHTML += `<div class="p-6 flex justify-between items-center border-b border-white/5"><div><h4 class="text-[12px] font-black uppercase text-white italic leading-tight">${ev.nome}</h4><p class="text-[9px] text-zinc-500 font-bold uppercase mt-1">${ev.data.split('-').reverse().join('/')}</p></div><div class="flex gap-4 text-right"><div><p class="text-[7px] text-blue-400 font-black uppercase mb-1">Minhas</p><p class="text-2xl font-black text-neon-blue leading-none">${ind}</p></div><div class="border-l border-white/10 pl-4"><p class="text-[7px] text-zinc-600 font-black uppercase mb-1">Geral</p><p class="text-2xl font-black text-neon-zinc leading-none">${ger}</p></div></div></div>`;
            });
        }

        function renderizarLinksAniv(links) {
            const container = document.getElementById('listaLinksAniv');
            const agora = new Date();
            const hojeStr = new Date(agora.getTime() - (agora.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            
            // ORDENAÇÃO CRONOLÓGICA
            const linksOrdenados = links.map(link => {
                const ev = todosEventosGlobal.find(e => e.nome === link.festa);
                return { ...link, dataEvento: ev ? ev.data : '9999-99-99' };
            }).sort((a, b) => new Date(a.dataEvento) - new Date(b.dataEvento));

            container.innerHTML = '';
            linksOrdenados.forEach(link => {
                const evInfo = todosEventosGlobal.find(e => e.nome === link.festa);
                if (evInfo) {
                    const dataFesta = evInfo.data;
                    let mostrar = true;
                    if (dataFesta < hojeStr) {
                        const dataOntem = new Date(); dataOntem.setDate(dataOntem.getDate() - 1);
                        if (!(dataFesta === dataOntem.toISOString().split('T')[0] && agora.getHours() < 5)) mostrar = false;
                    }
                    if (mostrar) {
                        // CONTAGEM PRECISA (Procura em aniversariante ou nome_aniversariante)
                        const qtd = todasReservasGlobal.filter(r => 
                            r.evento === link.festa && 
                            (r.aniversariante === link.aniversariante || r.nome_aniversariante === link.aniversariante)
                        ).length;

                        container.innerHTML += `
                        <div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-purple-500 mb-2">
                            <div class="truncate mr-2">
                                <p class="text-[10px] font-black text-white uppercase">${link.aniversariante}</p>
                                <p class="text-[7px] text-zinc-500 uppercase truncate">${evInfo.data.split('-').reverse().join('/')} - ${link.festa}</p>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="text-right">
                                    <p class="text-[7px] text-purple-400 font-black uppercase">Convidados</p>
                                    <p class="text-lg font-black text-white leading-none">${qtd}</p>
                                </div>
                                <button onclick="navigator.clipboard.writeText('${link.url}'); alert('Copiado!')" class="bg-purple-500/20 text-purple-400 px-3 py-2 rounded-xl text-[8px] font-black uppercase">Copiar</button>
                            </div>
                        </div>`;
                    }
                }
            });
        }

        window.abrirModalAniv = () => {
            const select = document.getElementById('selectEventoAniv');
            select.innerHTML = '';
            todosEventosGlobal.filter(e => e.ativo).sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                select.innerHTML += `<option value="${ev.nome}">${ev.data.split('-').reverse().join('/')} - ${ev.nome}</option>`;
            });
            document.getElementById('modalAniversario').classList.remove('hidden');
        }
        window.fecharModalAniv = () => document.getElementById('modalAniversario').classList.add('hidden');
        
        window.gerarLinkAniversario = async () => {
            const festa = document.getElementById('selectEventoAniv').value;
            const nome = document.getElementById('nomeAniversariante').value.trim().toUpperCase();
            if(!festa || !nome) return alert("Preencha todos os campos!");
            
            const baseUrl = window.location.href.split('promoter.html')[0] + 'listas.html';
            const urlFinal = `${baseUrl}?ref=${currentPromoter}&aniv=${encodeURIComponent(nome)}&festa=${encodeURIComponent(festa)}`;
            
            await setDoc(doc(collection(db, "links_aniversario")), { 
                promoter: currentPromoter, 
                aniversariante: nome, 
                festa: festa, 
                url: urlFinal, 
                data_criacao: new Date().toISOString() 
            });
            fecharModalAniv(); 
            alert("Link Criado e Salvo!");
        }

        window.copiarLinkReservas = () => {
            const url = window.location.href.split('promoter.html')[0] + 'listas.html?ref=' + currentPromoter;
            navigator.clipboard.writeText(url).then(() => alert("Link Geral Copiado!"));
        };
    </script>
</body>
</html>
