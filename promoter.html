<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Promoter Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; }
        .glass-card { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; }
        .login-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        input, select { background: #000 !important; border: 1px solid #333 !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: #eab308 !important; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg">
        <div class="w-full max-w-sm p-10 glass-card text-center border-yellow-500/20 border">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">ACESSO <span class="text-yellow-500">PROMOTER</span></h1>
            <div class="space-y-4">
                <input type="text" id="inputNomePromoter" placeholder="SEU NOME (COMO NA DASHBOARD)" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs">
                <div id="areaSenha" class="hidden">
                    <input type="password" id="senhaPromoter" placeholder="SUA SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs mt-2 border-yellow-500/50">
                </div>
                <button onclick="verificarOuLogar()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl active:scale-95 transition-all mt-4">CONTINUAR</button>
            </div>
            <p id="msgStatus" class="text-blue-400 text-[10px] font-black uppercase mt-6 hidden italic">Primeiro acesso! Defina sua senha acima</p>
            <p id="erroLogin" class="text-red-500 text-[10px] font-black uppercase mt-6 hidden">Nome não cadastrado ou senha incorreta</p>
        </div>
    </div>

    <div id="interfacePrincipal" class="hidden max-w-4xl mx-auto p-6 md:p-10 space-y-10">
        <header class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10">
                <div>
                    <h2 class="text-yellow-500 font-black italic uppercase text-lg leading-none">E-CLUB</h2>
                    <p id="nomeExibicao" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">---</p>
                </div>
            </div>
            <button onclick="location.reload()" class="text-zinc-600 text-[10px] font-black uppercase hover:text-white">Sair</button>
        </header>

        <section class="space-y-6">
            <div class="flex justify-between items-end border-b border-zinc-900 pb-4">
                <h3 class="text-xs font-black uppercase text-purple-500 tracking-widest italic">Minhas Listas de Aniversário</h3>
                <span class="text-[8px] text-zinc-600 font-bold uppercase">Limpeza automática às 05h</span>
            </div>
            <div id="container-links-aniversario" class="space-y-4">
                </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let dadosAniversarios = [];
        let dadosEventos = [];
        let promoterLogado = "";
        let usuarioTemp = null;
        let stepLogin = 0;

        // LOGIN
        window.verificarOuLogar = async () => {
            const nome = document.getElementById('inputNomePromoter').value.trim().toLowerCase();
            const senha = document.getElementById('senhaPromoter').value.trim();
            const areaSenha = document.getElementById('areaSenha');
            const btn = document.getElementById('btnAcao');
            const erro = document.getElementById('erroLogin');

            if (stepLogin === 0) {
                const userDoc = await getDoc(doc(db, "promoters", nome));
                if (userDoc.exists()) {
                    usuarioTemp = userDoc.data();
                    stepLogin = 1;
                    areaSenha.classList.remove('hidden');
                    document.getElementById('inputNomePromoter').readOnly = true;
                    if (!usuarioTemp.senha) {
                        btn.innerText = "CADASTRAR E ENTRAR";
                        document.getElementById('msgStatus').classList.remove('hidden');
                    } else { btn.innerText = "ENTRAR"; }
                } else { erro.classList.remove('hidden'); }
            } else {
                if (usuarioTemp.senha === "" || !usuarioTemp.senha) {
                    await updateDoc(doc(db, "promoters", nome), { senha: senha });
                    logarSucesso(nome);
                } else if (usuarioTemp.senha === senha) {
                    logarSucesso(nome);
                } else { erro.classList.remove('hidden'); }
            }
        };

        function logarSucesso(nome) {
            promoterLogado = nome;
            document.getElementById('nomeExibicao').innerText = "PROMOTER: " + nome.toUpperCase();
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('interfacePrincipal').classList.remove('hidden');
            iniciarEscutas();
        }

        function iniciarEscutas() {
            onSnapshot(collection(db, "eventos"), snap => {
                dadosEventos = snap.docs.map(d => d.data());
                renderizarLinksAniversario();
            });
            onSnapshot(query(collection(db, "links_aniversario"), where("promoter_pai", "==", promoterLogado)), snap => {
                dadosAniversarios = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderizarLinksAniversario();
            });
        }

        function renderizarLinksAniversario() {
            const container = document.getElementById('container-links-aniversario');
            const agora = new Date();
            const horaAtual = agora.getHours();
            const offset = agora.getTimezoneOffset() * 60000;
            const dataHojeStr = new Date(agora.getTime() - offset).toISOString().split('T')[0];
            const ontemObj = new Date(agora.getTime() - offset);
            ontemObj.setDate(ontemObj.getDate() - 1);
            const dataOntemStr = ontemObj.toISOString().split('T')[0];

            const linksValidos = dadosAniversarios.filter(link => {
                const evento = dadosEventos.find(e => e.nome === link.evento);
                if (!evento) return false;

                const dataEvento = evento.data;
                // 1. Futuro
                if (dataEvento > dataHojeStr) return true;
                // 2. Hoje
                if (dataEvento === dataHojeStr) return true;
                // 3. Ontem (Válido até 05h da manhã de hoje)
                if (dataEvento === dataOntemStr) return horaAtual < 5;
                
                return false;
            });

            if (linksValidos.length === 0) {
                container.innerHTML = '<p class="text-zinc-600 text-[10px] uppercase font-bold text-center py-20">Nenhuma lista ativa para seus aniversariantes.</p>';
                return;
            }

            container.innerHTML = linksValidos.map(link => `
                <div class="glass-card p-6 border-l-4 border-purple-500 flex justify-between items-center mb-4">
                    <div>
                        <h3 class="text-white font-black uppercase italic">${link.nome_aniversariante}</h3>
                        <p class="text-[9px] text-zinc-500 font-bold uppercase">${link.evento}</p>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="text-center">
                            <p class="text-[7px] text-zinc-500 font-black uppercase">Convidados</p>
                            <p class="text-xl font-black text-white">${link.total_convidados || 0}</p>
                        </div>
                        <button onclick="copiarLink('${link.id}')" class="bg-zinc-800 text-[10px] font-black px-5 py-3 rounded-xl uppercase hover:bg-white hover:text-black transition-all">Link</button>
                    </div>
                </div>
            `).join('');
        }

        window.copiarLink = (id) => {
            const link = `https://andrezinhoeclub.github.io/lista-ecluboficial/aniversario.html?id=${id}`;
            navigator.clipboard.writeText(link);
            alert("Link da lista copiado!");
        };
    </script>
</body>
</html>
