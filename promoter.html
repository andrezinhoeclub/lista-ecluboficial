<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Portaria Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow: hidden; }
        .glass { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .login-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .client-card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: 0.25s; cursor: pointer; }
        .client-card.entrou { opacity: 0.2 !important; filter: grayscale(1); pointer-events: none; }
        input { background: #000 !important; border: 1px solid #333 !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus { border-color: #eab308 !important; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
        .badge-casal { background: #eab308; color: #000; }
        .badge-solteiro { background: #3b82f6; color: #fff; }
    </style>
</head>
<body class="flex h-screen">

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg">
        <div class="w-full max-w-sm p-10 glass rounded-[3rem] text-center border-yellow-500/20 border">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">ACESSO <span class="text-yellow-500">PORTARIA</span></h1>
            
            <div class="space-y-4">
                <input type="text" id="inputNomeUsuario" placeholder="DIGITE SEU NOME" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs">
                
                <div id="areaSenha" class="hidden">
                    <input type="password" id="senhaUsuario" placeholder="SUA SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs mt-2 border-yellow-500/50">
                </div>
                
                <button onclick="verificarOuLogar()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl active:scale-95 transition-all mt-4">
                    CONTINUAR
                </button>
            </div>

            <p id="msgStatus" class="text-blue-400 text-[10px] font-black uppercase mt-6 hidden italic">Nome localizado! Defina sua senha acima</p>
            <p id="erroLogin" class="text-red-500 text-[10px] font-black uppercase mt-6 hidden tracking-tighter">OPERADOR NÃO CADASTRADO NO SISTEMA</p>
        </div>
    </div>

    <div id="interfacePrincipal" class="hidden flex w-full h-full">
        <aside class="w-80 h-full flex flex-col p-6 bg-black/50 border-r border-zinc-900">
            <div class="mb-10 text-center">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 mx-auto mb-2">
                <h2 class="text-yellow-500 font-black italic uppercase text-lg tracking-tighter">E-CLUB</h2>
                <p id="operadorAtivo" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mt-2 border border-zinc-800 py-1 rounded-lg italic">OPERADOR: ---</p>
            </div>
            <div class="flex-grow overflow-y-auto" id="lista-eventos-sidebar"></div>
            <button onclick="location.reload()" class="mt-6 text-zinc-700 text-[9px] font-black uppercase hover:text-white transition-colors">Trocar Usuário</button>
        </aside>

        <main class="flex-grow flex flex-col">
            <header class="p-8 border-b border-zinc-900 bg-black/20">
                <div class="max-w-5xl mx-auto flex gap-8 items-center">
                    <input type="text" id="input-busca" oninput="processarPesquisa()" placeholder="PESQUISAR CLIENTE..." class="flex-grow p-6 rounded-[2rem] text-sm font-bold uppercase text-white">
                    <div class="text-right border-l border-zinc-800 pl-8 min-w-[120px]">
                        <p id="total-checkins" class="text-4xl font-black italic leading-none text-green-500">0</p>
                        <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest mt-2">Check-ins Noite</p>
                    </div>
                </div>
            </header>
            <section class="flex-grow p-8 overflow-y-auto bg-[#030303]" id="container-resultados">
                <div class="py-40 opacity-10 text-center text-white font-black uppercase italic tracking-[0.5em]">Aguardando Pesquisa</div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let bancoClientes = [];
        let bancoEventos = [];
        let operadorLogado = "";
        let usuarioDocId = ""; 
        let usuarioData = null;
        let stepLogin = 0;

        // FUNÇÃO DE LOGIN ROBUSTA
        window.verificarOuLogar = async () => {
            const nomeInput = document.getElementById('inputNomeUsuario').value.trim().toLowerCase();
            const senhaInput = document.getElementById('senhaUsuario').value.trim();
            const areaSenha = document.getElementById('areaSenha');
            const btn = document.getElementById('btnAcao');
            const erro = document.getElementById('erroLogin');
            const msg = document.getElementById('msgStatus');

            erro.classList.add('hidden');

            if (stepLogin === 0) {
                if (!nomeInput) return;

                // Tenta buscar pelo ID direto (que é o nome em minúsculo)
                const docRef = doc(db, "configuracoes", nomeInput);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    usuarioData = docSnap.data();
                    usuarioDocId = nomeInput;
                    stepLogin = 1;
                    areaSenha.classList.remove('hidden');
                    document.getElementById('inputNomeUsuario').readOnly = true;
                    
                    if (!usuarioData.senha || usuarioData.senha === "") {
                        btn.innerText = "CADASTRAR E ENTRAR";
                        msg.classList.remove('hidden');
                    } else {
                        btn.innerText = "ENTRAR NO SISTEMA";
                    }
                } else {
                    erro.classList.remove('hidden');
                }
            } else {
                if (!senhaInput) return;

                if (!usuarioData.senha || usuarioData.senha === "") {
                    await updateDoc(doc(db, "configuracoes", usuarioDocId), { senha: senhaInput });
                    logarSucesso(usuarioDocId);
                } else if (usuarioData.senha === senhaInput) {
                    logarSucesso(usuarioDocId);
                } else {
                    erro.innerText = "SENHA INCORRETA";
                    erro.classList.remove('hidden');
                }
            }
        };

        function logarSucesso(nome) {
            operadorLogado = nome;
            document.getElementById('operadorAtivo').innerText = "OPERADOR: " + nome.toUpperCase();
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('interfacePrincipal').classList.remove('hidden');
            iniciarEscutas();
        }

        const validarTurno = (dataEvento) => {
            const agora = new Date();
            const hora = agora.getHours();
            const offset = agora.getTimezoneOffset() * 60000;
            const hojeStr = new Date(agora.getTime() - offset).toISOString().split('T')[0];
            const ontemObj = new Date(agora.getTime() - offset);
            ontemObj.setDate(ontemObj.getDate() - 1);
            const ontemStr = ontemObj.toISOString().split('T')[0];

            if (hora >= 21 && hojeStr === dataEvento) return true;
            if (hora < 6 && ontemStr === dataEvento) return true;
            return false;
        };

        function iniciarEscutas() {
            onSnapshot(collection(db, "lista_eventos"), (snap) => {
                bancoClientes = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const total = bancoClientes.filter(c => {
                    const ev = bancoEventos.find(e => e.nome === c.evento);
                    return c.entrou && (ev ? validarTurno(ev.data) : false);
                }).length;
                document.getElementById('total-checkins').innerText = total;
                processarPesquisa();
            });

            onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snap) => {
                bancoEventos = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const cont = document.getElementById('lista-eventos-sidebar');
                cont.innerHTML = '';
                bancoEventos.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                    const aberto = validarTurno(ev.data);
                    const qtd = bancoClientes.filter(c => c.evento === ev.nome).length;
                    cont.innerHTML += `<div class="p-4 rounded-2xl glass border-l-4 ${aberto ? 'border-l-green-500 shadow-[0_0_15px_rgba(34,197,94,0.1)]' : 'border-l-zinc-800 opacity-40'} mb-2">
                        <p class="text-[8px] font-black text-white uppercase">${ev.data.split('-').reverse().join('/')}</p>
                        <h4 class="text-[10px] font-black uppercase text-white truncate">${ev.nome}</h4>
                        <div class="flex justify-between items-end mt-2"><span class="text-[8px] font-bold ${aberto ? 'text-green-500' : 'text-zinc-600'}">${aberto ? '🔥 NO AR' : '🔒 ESPERA'}</span><span class="text-lg font-black text-yellow-500">${qtd}</span></div></div>`;
                });
            });
        }

        window.processarPesquisa = () => {
            const busca = document.getElementById('input-busca').value.trim().toUpperCase();
            const cont = document.getElementById('container-resultados');
            if (busca.length < 2) return;

            const filtrados = bancoClientes.filter(c => {
                const bate = (c.nome && c.nome.toUpperCase().includes(busca)) || (c.tel && c.tel.includes(busca));
                const ev = bancoEventos.find(e => e.nome === c.evento);
                return bate && (ev ? validarTurno(ev.data) : false);
            });

            cont.innerHTML = filtrados.length === 0 ? '<div class="py-40 text-center font-black text-zinc-800">NENHUM REGISTRO NESTE TURNO</div>' : '';
            filtrados.sort((a,b) => (a.entrou === b.entrou) ? a.nome.localeCompare(b.nome) : a.entrou ? 1 : -1).forEach(c => {
                const badge = c.tipo_entrada === 'CASAL' ? 'badge-casal' : 'badge-solteiro';
                const div = document.createElement('div');
                div.className = `client-card p-6 rounded-[2rem] flex items-center mb-2 ${c.entrou ? 'entrou' : ''}`;
                div.innerHTML = `<div class="w-40 border-r border-zinc-900 pr-6"><span class="px-4 py-1.5 ${badge} text-[10px] font-black rounded-lg uppercase block text-center">${c.tipo_entrada || 'LISTA'}</span><p class="text-[8px] font-black text-zinc-600 uppercase mt-2 text-center truncate">REF: ${c.promoter || 'DIRETO'}</p></div>
                    <div class="flex-grow px-10"><h3 class="text-xl font-black uppercase italic text-white">${c.nome}</h3><p class="text-sm font-bold text-zinc-500 font-mono">${c.tel || '---'}</p></div>
                    <div class="w-48 text-right">${c.entrou ? '<span class="text-green-500 font-black italic">CHECK-IN OK ✓</span>' : `<button onclick="confirmar('${c.id}')" class="bg-white text-black px-10 py-4 rounded-2xl font-black uppercase italic text-xs hover:bg-yellow-500">ENTRADA</button>`}</div>`;
                cont.appendChild(div);
            });
        };

        window.confirmar = async (id) => {
            await updateDoc(doc(db, "lista_eventos", id), { entrou: true, porteiro: operadorLogado, data_entrada: new Date().toISOString() });
        };
    </script>
</body>
</html>
