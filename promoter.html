<div id="modalAniversario" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="glass max-w-sm w-full p-8 rounded-[2.5rem] border-yellow-500/30 border">
        <h2 class="text-xl font-black text-yellow-500 uppercase italic mb-6">Configurar Aniversário</h2>
        
        <label class="text-[10px] font-black uppercase text-zinc-500 block mb-2">Selecione o Evento</label>
        <select id="selectEventoAniv" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white mb-4 outline-none focus:border-yellow-500"></select>

        <label class="text-[10px] font-black uppercase text-zinc-500 block mb-2">Nome do Aniversariante</label>
        <input type="text" id="nomeAniversariante" placeholder="Ex: Carol Silva" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-white mb-6 outline-none focus:border-yellow-500 uppercase font-bold">

        <button onclick="gerarLinkAniversario()" class="w-full gold-gradient text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl mb-3">Gerar e Copiar Link</button>
        <button onclick="fecharModalAniv()" class="w-full text-zinc-500 font-black py-2 uppercase text-[10px]">Cancelar</button>
    </div>
</div>

<script type="module">
    // ... (mantenha seus imports e config do firebase)

    let tipoPromoter = "padrao"; // Variável global para controle

    // DENTRO DA FUNÇÃO carregarPainel(), ADICIONE:
    async function carregarPainel() {
        const docSnap = await getDoc(doc(db, "promoters", currentPromoter));
        tipoPromoter = docSnap.data().tipo || "padrao";
        
        document.getElementById('loginPromoter').classList.add('hidden');
        document.getElementById('painelDados').classList.remove('hidden');
        document.getElementById('boasVindas').innerText = currentPromoter;

        // Se for promoter de aniversário, mostra o botão especial
        if(tipoPromoter === "aniversario") {
            const btnAniv = document.createElement('button');
            btnAniv.className = "w-full mb-4 bg-gradient-to-r from-purple-600 to-blue-600 text-white font-black py-5 rounded-[2rem] uppercase text-[11px] tracking-widest shadow-lg flex items-center justify-center gap-2";
            btnAniv.innerHTML = "<span>🎂</span> GERAR LISTA DE ANIVERSÁRIO";
            btnAniv.onclick = abrirModalAniv;
            document.getElementById('listaEventosPromoter').before(btnAniv);
        }

        carregarDados(currentPromoter);
    }

    window.abrirModalAniv = async () => {
        const select = document.getElementById('selectEventoAniv');
        select.innerHTML = '';
        // Puxa os eventos ativos para o select
        const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
        snap.forEach(ev => {
            select.innerHTML += `<option value="${ev.data().nome}">${ev.data().nome}</option>`;
        });
        document.getElementById('modalAniversario').classList.remove('hidden');
    }

    window.fecharModalAniv = () => {
        document.getElementById('modalAniversario').classList.add('hidden');
    }

    window.gerarLinkAniversario = () => {
        const evento = document.getElementById('selectEventoAniv').value;
        const aniversariante = document.getElementById('nomeAniversariante').value.trim();
        
        if(!aniversariante) return alert("Digite o nome do aniversariante!");

        // GERA O LINK ESPECIAL
        // listas.html?ref=NOMEPROMOTER&aniv=NOMEDOANIVERSARIANTE&festa=NOMEDAFESTA
        const baseUrl = window.location.origin + window.location.pathname.replace('promoter.html', 'listas.html');
        const finalUrl = `${baseUrl}?ref=${currentPromoter}&aniv=${encodeURIComponent(aniversariante)}&festa=${encodeURIComponent(evento)}`;

        navigator.clipboard.writeText(finalUrl).then(() => {
            alert("LINK DE ANIVERSÁRIO COPIADO!\nAgora envie para o aniversariante.");
            fecharModalAniv();
        });
    }
</script>
