<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, setDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
        authDomain: "teste-de-reserva.firebaseapp.com",
        projectId: "teste-de-reserva",
        storageBucket: "teste-de-reserva.firebasestorage.app",
        messagingSenderId: "163395694876",
        appId: "1:163395694876:web:8b1116a0483af951548ad9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentPromoter = "";
    let isFirstAccess = false;
    let todasReservasGlobal = [];
    let todosEventosGlobal = []; // Armazenar eventos para conferir datas

    window.validarUsuario = async function() {
        const nomeInput = document.getElementById('userPromoter').value.trim().toLowerCase();
        if(!nomeInput) return;
        const docSnap = await getDoc(doc(db, "promoters", nomeInput));
        if(docSnap.exists()) {
            currentPromoter = nomeInput;
            document.getElementById('step-user').classList.add('hidden');
            document.getElementById('step-password').classList.remove('hidden');
            if(!docSnap.data().senha) isFirstAccess = true;
        } else { document.getElementById('msgErro').classList.remove('hidden'); }
    }

    window.entrarComSenha = async function() {
        const senha = document.getElementById('passPromoter').value.trim();
        const docSnap = await getDoc(doc(db, "promoters", currentPromoter));
        if(isFirstAccess || docSnap.data().senha === senha) {
            if(isFirstAccess) await updateDoc(doc(db, "promoters", currentPromoter), { senha: senha });
            carregarPainel(docSnap.data());
        } else { alert("Senha incorreta"); }
    }

    function carregarPainel(dadosUser) {
        document.getElementById('loginPromoter').classList.add('hidden');
        document.getElementById('painelDados').classList.remove('hidden');
        document.getElementById('boasVindas').innerText = currentPromoter;

        // Escuta global de reservas
        onSnapshot(collection(db, "lista_eventos"), (snap) => {
            todasReservasGlobal = snap.docs.map(d => d.data());
            carregarTabelaEventos();
            if(dadosUser.tipo === "aniversario") atualizarListaLinks();
        });

        // Escuta global de eventos (para saber as datas das listas)
        onSnapshot(collection(db, "eventos"), (snap) => {
            todosEventosGlobal = snap.docs.map(d => d.data());
            if(dadosUser.tipo === "aniversario") atualizarListaLinks();
        });

        if(dadosUser.tipo === "aniversario") {
            document.getElementById('secaoMeusLinks').classList.remove('hidden');
            const btnAniv = document.createElement('button');
            btnAniv.onclick = abrirModalAniv;
            btnAniv.className = "flex-grow purple-gradient text-white font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest shadow-xl transition-transform active:scale-95";
            btnAniv.innerHTML = "🎂 Desconto";
            document.getElementById('barraBotoes').appendChild(btnAniv);
            
            // Escuta específica dos links do promoter
            onSnapshot(query(collection(db, "links_aniversario"), where("promoter", "==", currentPromoter)), () => atualizarListaLinks());
        }
    }

    async function atualizarListaLinks() {
        const snapLinks = await getDocs(query(collection(db, "links_aniversario"), where("promoter", "==", currentPromoter)));
        const container = document.getElementById('listaLinksAniv');
        const agora = new Date();
        const horaAtual = agora.getHours();
        
        // Data de hoje YYYY-MM-DD
        const hojeStr = new Date(agora.getTime() - (agora.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        
        container.innerHTML = '';
        
        snapLinks.forEach(docLink => {
            const link = docLink.data();
            const eventoInfo = todosEventosGlobal.find(e => e.nome === link.festa);
            
            if (eventoInfo) {
                const dataFesta = eventoInfo.data; // YYYY-MM-DD
                
                // LÓGICA DE EXPIRAÇÃO (05H DA MANHÃ)
                let mostrar = true;
                if (dataFesta < hojeStr) {
                    // Se a data é anterior a hoje, só mostra se for antes das 05h da manhã
                    // E se a data for exatamente ONTEM.
                    const dataOntem = new Date();
                    dataOntem.setDate(dataOntem.getDate() - 1);
                    const ontemStr = dataOntem.toISOString().split('T')[0];
                    
                    if (dataFesta === ontemStr && horaAtual < 5) {
                        mostrar = true;
                    } else {
                        mostrar = false;
                    }
                }

                if (mostrar) {
                    const qtdConvidados = todasReservasGlobal.filter(r => 
                        r.tipo === "ANIVERSARIO" && 
                        r.aniversariante === link.aniversariante && 
                        r.evento === link.festa
                    ).length;

                    container.innerHTML += `
                        <div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-purple-500 mb-2">
                            <div class="truncate mr-2">
                                <p class="text-[10px] font-black text-white uppercase">${link.aniversariante}</p>
                                <p class="text-[7px] text-zinc-500 uppercase truncate">${link.festa}</p>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="text-right">
                                    <p class="text-[7px] text-purple-400 font-black uppercase">Convidados</p>
                                    <p class="text-lg font-black text-white leading-none">${qtdConvidados}</p>
                                </div>
                                <button onclick="navigator.clipboard.writeText('${link.url}'); alert('Link Copiado!')" class="bg-purple-500/20 text-purple-400 px-3 py-2 rounded-xl text-[8px] font-black uppercase">Copiar</button>
                            </div>
                        </div>`;
                }
            }
        });
    }

    async function carregarTabelaEventos() {
        const snapEventos = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
        const cont = document.getElementById('listaEventosPromoter');
        cont.innerHTML = '';
        const eventos = snapEventos.docs.map(d => d.data()).sort((a,b) => new Date(a.data) - new Date(b.data));

        eventos.forEach(ev => {
            const ind = todasReservasGlobal.filter(r => r.evento === ev.nome && (r.promoter || '').toLowerCase() === currentPromoter).length;
            const ger = todasReservasGlobal.filter(r => r.evento === ev.nome).length;
            cont.innerHTML += `
                <div class="p-6 flex justify-between items-center border-b border-white/5">
                    <div>
                        <h4 class="text-[12px] font-black uppercase text-white italic leading-tight">${ev.nome}</h4>
                        <p class="text-[9px] text-zinc-500 font-bold uppercase mt-1">${ev.data.split('-').reverse().join('/')}</p>
                    </div>
                    <div class="flex gap-4 text-right">
                        <div>
                            <p class="text-[7px] text-blue-400 font-black uppercase mb-1">Minhas</p>
                            <p class="text-2xl font-black text-neon-blue leading-none">${ind}</p>
                        </div>
                        <div class="border-l border-white/10 pl-4">
                            <p class="text-[7px] text-zinc-600 font-black uppercase mb-1">Geral</p>
                            <p class="text-2xl font-black text-neon-zinc leading-none">${ger}</p>
                        </div>
                    </div>
                </div>`;
        });
    }

    window.abrirModalAniv = async () => {
        const select = document.getElementById('selectEventoAniv');
        const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
        select.innerHTML = '';
        snap.forEach(ev => select.innerHTML += `<option value="${ev.data().nome}">${ev.data().nome}</option>`);
        document.getElementById('modalAniversario').classList.remove('hidden');
    }
    window.fecharModalAniv = () => document.getElementById('modalAniversario').classList.add('hidden');
    
    window.gerarLinkAniversario = async () => {
        const festa = document.getElementById('selectEventoAniv').value;
        const nome = document.getElementById('nomeAniversariante').value.trim().toUpperCase();
        if(!nome) return alert("Digite o nome!");
        
        // Corrigido para pegar a URL base correta
        const baseUrl = window.location.href.split('promoter.html')[0] + 'listas.html';
        const urlFinal = `${baseUrl}?ref=${currentPromoter}&aniv=${encodeURIComponent(nome)}&festa=${encodeURIComponent(festa)}`;
        
        await setDoc(doc(collection(db, "links_aniversario")), { 
            promoter: currentPromoter, 
            aniversariante: nome, 
            festa: festa, 
            url: urlFinal, 
            data_criacao: new Date().toISOString() 
        });
        
        navigator.clipboard.writeText(urlFinal).then(() => { 
            alert("Link Salvo e Copiado!"); 
            fecharModalAniv(); 
        });
    }

    window.copiarLinkReservas = () => {
        const url = window.location.href.split('promoter.html')[0] + 'listas.html?ref=' + currentPromoter;
        navigator.clipboard.writeText(url).then(() => alert("Copiado!"));
    };
</script>
