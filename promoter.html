<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <title>E-CLUB | Lista Oficial ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root {
            --neon-purple: #a855f7;
            --eclub-gold: #eab308;
            --whatsapp-green: #25D366;
            --instagram-pink: #E1306C;
        }
        body { font-family: 'Inter', sans-serif; background: #050508; color: #fff; background-image: radial-gradient(circle at top right, #1a1025 0%, #050508 100%); }
        .festa-card { background: rgba(15, 15, 20, 0.6); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 3.5rem; overflow: hidden; backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); transition: 0.3s; }
        .festa-card:hover { border-color: var(--neon-purple); box-shadow: 0 0 30px rgba(168, 85, 247, 0.15); }
        .btn-lista { background: linear-gradient(135deg, var(--eclub-gold) 0%, #fbbf24 100%); color: #000; font-weight: 900; box-shadow: 0 10px 25px rgba(234, 179, 8, 0.4); }
        .site-input { background: #0f0f15 !important; border: 1px solid #27273a !important; color: #fff !important; }
        .site-input:focus { border-color: var(--neon-purple) !important; }
        .footer-btn-gps { background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); box-shadow: 0 12px 24px rgba(37, 99, 235, 0.4); }
        .icon-insta { color: var(--instagram-pink); filter: drop-shadow(0 0 12px rgba(225, 48, 108, 0.6)); }
        .icon-whats { color: var(--whatsapp-green); filter: drop-shadow(0 0 12px rgba(37, 211, 102, 0.6)); }
        .btn-tipo.active { border-color: var(--neon-purple); background: rgba(168, 85, 247, 0.05); }
    </style>
</head>
<body class="p-6 flex flex-col min-h-screen">

    <div class="max-w-md mx-auto w-full flex-grow">
        <header class="flex justify-center py-12">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 drop-shadow-[0_0_15px_rgba(255,255,255,0.2)]">
        </header>
        <div id="listaEventos" class="space-y-12"></div>
    </div>

    <footer class="max-w-md mx-auto w-full pt-20 pb-12 text-center space-y-14">
        <div class="flex justify-center gap-16">
            <a href="https://instagram.com/andrezinhoeclub" target="_blank" class="flex flex-col items-center gap-3 group">
                <span class="text-5xl icon-insta transition-transform group-hover:scale-110">📸</span>
                <span class="text-[11px] font-black uppercase tracking-[0.2em] text-zinc-300">Instagram</span>
            </a>
            <a href="https://wa.me/5541995040506" target="_blank" class="flex flex-col items-center gap-3 group">
                <span class="text-5xl icon-whats transition-transform group-hover:scale-110">💬</span>
                <span class="text-[11px] font-black uppercase tracking-[0.2em] text-zinc-300">WhatsApp</span>
            </a>
        </div>
        
        <div class="px-2">
            <a href="https://www.google.com/maps/search/?api=1&query=E-Club+Curitiba" target="_blank" class="footer-btn-gps block w-full p-8 rounded-[3rem]">
                <p class="text-white font-black text-sm uppercase tracking-[0.25em] mb-1">📍 LOCALIZAÇÃO E-CLUB</p>
                <p class="text-blue-100 font-bold text-[10px] uppercase italic opacity-90">Abrir no Maps / Waze</p>
            </a>
        </div>
    </footer>

    <div id="modalForm" class="hidden fixed inset-0 z-50 bg-black/95 backdrop-blur-xl flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-[#0d0d14] border border-white/10 p-10 rounded-[4rem] text-center shadow-2xl">
            <h2 id="modal-titulo" class="text-yellow-500 font-black uppercase italic mb-1 tracking-widest text-base">Reserva E-Club</h2>
            <p class="text-zinc-500 text-[10px] font-bold uppercase mb-10">Escolha o tipo e preencha os dados</p>
            <div class="space-y-6 text-left">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <button onclick="setTipo('CASAL')" id="btn-tipo-casal" class="p-6 bg-[#13131c] border border-[#27273a] rounded-[2.5rem] flex flex-col items-center gap-1 transition-all">
                        <span class="text-[10px] font-black uppercase text-zinc-500">👫 Casal</span>
                        <span id="preco-casal-modal" class="font-black text-white text-xs">---</span>
                    </button>
                    <button onclick="setTipo('SOLTEIRO')" id="btn-tipo-solteiro" class="p-6 bg-[#13131c] border border-[#27273a] rounded-[2.5rem] flex flex-col items-center gap-1 transition-all">
                        <span class="text-[10px] font-black uppercase text-zinc-500">👤 Solteiro</span>
                        <span id="preco-solteiro-modal" class="font-black text-white text-xs">---</span>
                    </button>
                </div>
                <div id="campos-cliente" class="space-y-4 opacity-10 pointer-events-none transition-all duration-500">
                    <input type="text" id="nome-cliente" placeholder="NOME COMPLETO" class="w-full site-input p-6 rounded-3xl font-bold text-xs uppercase">
                    <input type="tel" id="tel-cliente" oninput="mascaraTelefone(this)" placeholder="(41) 99999-9999" class="w-full site-input p-6 rounded-3xl font-bold text-xs">
                </div>
                <button onclick="finalizarPedido()" id="btn-confirmar" disabled class="w-full btn-lista py-6 rounded-3xl uppercase text-xs font-black tracking-widest disabled:opacity-5 transition-all">Confirmar Presença ✨</button>
                <button onclick="fecharModal()" class="w-full text-zinc-600 uppercase text-[10px] font-black tracking-widest pt-2">Voltar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        // CAPTURA DO PROMOTER (?ref=nome) OU ANIVERSARIANTE (?id=code)
        let refPromoter = params.get('ref') || ""; 
        let idLinkAniv = params.get('id');
        let nomeAniversarianteVip = "";
        let eventosCache = []; let eventoAtivo = null; let tipoAtivo = '';

        async function carregarPagina() {
            // Se for link de aniversário, busca o nome do aniversariante e do promoter dono do link
            if (idLinkAniv) {
                const snapA = await getDoc(doc(db, "links_aniversario", idLinkAniv));
                if (snapA.exists()) {
                    nomeAniversarianteVip = snapA.data().aniversariante;
                    refPromoter = snapA.data().promoter; // Garante que a reserva vá para o promoter dono do link
                }
            }

            const agora = new Date().toISOString().split('T')[0];
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            eventosCache = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(ev => ev.data >= agora);

            const container = document.getElementById('listaEventos');
            container.innerHTML = '';
            eventosCache.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                const card = document.createElement('div');
                card.className = "festa-card";
                card.innerHTML = `
                    ${ev.imagem ? `<img src="${ev.imagem}" class="w-full h-56 object-cover border-b border-white/5">` : ''}
                    <div class="p-10 text-center">
                        <div class="inline-block px-5 py-1.5 rounded-full bg-purple-500/10 border border-purple-500/20 mb-5">
                            <p class="text-[11px] text-purple-400 font-black uppercase tracking-[0.2em] italic">${ev.data.split('-').reverse().join('/')}</p>
                        </div>
                        <h3 class="text-3xl font-black uppercase italic leading-tight mb-10 tracking-tighter text-white">${ev.nome}</h3>
                        <div class="space-y-4">
                            <button onclick="abrirFluxo('${ev.id}')" class="w-full btn-lista py-6 rounded-[2rem] text-sm italic transition-all">🚀 QUERO MEU NOME NA LISTA</button>
                            <a href="https://wa.me/5541995040506?text=Quero reservar camarote para ${ev.nome}" target="_blank" class="w-full block bg-white/5 border border-white/10 py-5 rounded-[2rem] text-[11px] font-black uppercase italic tracking-widest text-white transition-all hover:border-sky-400">👑 Reservar Camarote</a>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        window.abrirFluxo = (id) => {
            eventoAtivo = eventosCache.find(e => e.id === id);
            const vC = nomeAniversarianteVip ? eventoAtivo.desc_casal : eventoAtivo.valor_casal;
            const vS = nomeAniversarianteVip ? eventoAtivo.desc_solteiro : eventoAtivo.valor_solteiro;
            document.getElementById('modal-titulo').innerText = nomeAniversarianteVip ? '🎉 Lista Especial' : '🔥 Nome na Lista';
            document.getElementById('preco-casal-modal').innerText = vC ? "R$ " + vC : "PORTARIA";
            document.getElementById('preco-solteiro-modal').innerText = vS ? "R$ " + vS : "PORTARIA";
            document.getElementById('modalForm').classList.remove('hidden');
        };

        window.setTipo = (tipo) => {
            tipoAtivo = tipo;
            document.getElementById('btn-tipo-casal').classList.toggle('active', tipo === 'CASAL');
            document.getElementById('btn-tipo-solteiro').classList.toggle('active', tipo === 'SOLTEIRO');
            document.getElementById('campos-cliente').classList.remove('opacity-10', 'pointer-events-none');
            document.getElementById('btn-confirmar').disabled = false;
        };

        window.finalizarPedido = async () => {
            const n = document.getElementById('nome-cliente').value.trim();
            const t = document.getElementById('tel-cliente').value.trim();
            if (!n || t.length < 14) return alert("Preencha nome e celular!");
            const btn = document.getElementById('btn-confirmar');
            btn.innerText = "GRAVANDO..."; btn.disabled = true;
            try {
                await addDoc(collection(db, "lista_eventos"), {
                    nome: n.toUpperCase(), 
                    tel: t, 
                    evento: eventoAtivo.nome,
                    tipo_entrada: tipoAtivo, 
                    categoria: "LISTA",
                    promoter: refPromoter.toUpperCase() || "DIRETO", // AQUI ESTAVA O ERRO, AGORA ELE GRAVA O PROMOTER DA URL
                    aniversariante: nomeAniversarianteVip.toUpperCase(), 
                    data_reserva: new Date().toISOString(), 
                    entrou: false
                });
                alert("SUCESSO! Nome confirmado na lista. 🕺"); 
                location.reload();
            } catch (e) { alert("Erro ao enviar."); btn.disabled = false; }
        };

        window.fecharModal = () => document.getElementById('modalForm').classList.add('hidden');
        window.mascaraTelefone = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v;
            if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            i.value = v;
        };
        carregarPagina();
    </script>
</body>
</html>
