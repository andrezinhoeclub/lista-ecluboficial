<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Promoter Dashboard ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050508; background-image: radial-gradient(circle at top right, #1e1b4b, #050508 100%); color: #fff; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .blue-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.3); }
        .purple-glow { box-shadow: 0 0 20px rgba(168, 85, 247, 0.2); border-color: rgba(168, 85, 247, 0.3); }
        .gold-gradient { background: linear-gradient(135deg, #eab308 0%, #a16207 100%); }
        .purple-gradient { background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%); }
        .content-wrapper { padding-bottom: 140px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginPromoter" class="flex flex-col items-center justify-center min-h-[90vh]">
        <div class="w-full max-w-sm glass p-10 rounded-[3rem] text-center border-blue-500/20 border shadow-2xl">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-16 mx-auto mb-8 drop-shadow-[0_0_10px_rgba(255,255,255,0.2)]">
            <h1 class="text-3xl font-black mb-8 uppercase italic tracking-tighter text-white">Promoter <span class="text-sky-400">Access</span></h1>
            <div id="step-user">
                <input type="text" id="userPromoter" placeholder="NOME DE USUÁRIO" class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl outline-none focus:border-sky-400 text-center font-bold uppercase text-xs mb-4 text-white">
                <button onclick="validarUsuario()" class="w-full bg-sky-500 text-white font-black py-5 rounded-2xl uppercase text-xs shadow-xl tracking-widest active:scale-95 transition-all">Continuar</button>
            </div>
            <div id="step-password" class="hidden text-white">
                <input type="password" id="passPromoter" placeholder="SUA SENHA" class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl outline-none focus:border-purple-500 text-center font-bold uppercase text-xs mb-4 text-white">
                <button onclick="entrarComSenha()" id="btnEntrar" class="w-full purple-gradient text-white font-black py-5 rounded-2xl uppercase text-xs shadow-xl tracking-widest active:scale-95 transition-all">Entrar no Painel</button>
            </div>
            <p id="msgErro" class="text-red-500 text-[10px] font-black uppercase mt-6 hidden italic">⚠️ Acesso Negado</p>
        </div>
    </div>

    <div id="interfacePrincipal" class="hidden max-w-md mx-auto content-wrapper">
        <header class="flex justify-between items-center mb-12 text-white">
            <div>
                <p class="text-sky-400 text-[10px] font-black uppercase tracking-[0.3em] mb-1">E-Club Oficial</p>
                <h1 id="boasVindas" class="text-4xl font-black uppercase italic leading-none text-white">---</h1>
            </div>
            <button onclick="location.reload()" class="bg-red-500/10 p-3 px-6 rounded-2xl text-red-500 font-black text-[10px] border border-red-500/20">Sair</button>
        </header>

        <section class="space-y-10">
            <div id="secaoMeusLinks" class="hidden">
                <h3 class="text-[11px] font-black uppercase text-purple-400 mb-4 tracking-[0.2em] ml-2 italic">🎂 Seus Links VIP</h3>
                <div id="listaLinksAniv" class="space-y-4"></div>
            </div>
            
            <div>
                <h3 class="text-[11px] font-black uppercase text-sky-400 mb-4 tracking-[0.2em] ml-2 italic">📈 Performance em Eventos</h3>
                <div id="listaEventosPromoter" class="space-y-4 text-white">
                    <p class="text-center py-10 text-zinc-700 font-black uppercase text-[10px] italic">Carregando performance...</p>
                </div>
            </div>
        </section>

        <div id="footerAcoes" class="fixed bottom-0 left-0 w-full p-6 bg-black/80 backdrop-blur-2xl border-t border-white/5 z-40 text-white">
            <div class="max-w-md mx-auto flex gap-4" id="barraBotoes">
                <button onclick="copiarLinkReservas()" class="flex-grow gold-gradient text-black font-black py-5 rounded-2xl uppercase text-[11px] tracking-widest shadow-lg active:scale-95 transition-all">Link Geral</button>
            </div>
        </div>
    </div>

    <div id="modalAniversario" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-50 hidden flex items-center justify-center p-6 text-white text-white text-white">
        <div class="glass max-w-sm w-full p-10 rounded-[3.5rem] border-purple-500/30 border text-center shadow-2xl">
            <h2 class="text-2xl font-black text-purple-400 uppercase italic mb-8">Novo Aniversariante</h2>
            <div class="text-left space-y-4">
                <select id="selectEventoAniv" class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-white text-xs font-bold uppercase"></select>
                <input type="text" id="nomeAniversariante" placeholder="NOME DO ANIVERSARIANTE" class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-white font-black uppercase text-xs">
                <input type="tel" id="telAniversariante" oninput="mascaraTelefone(this)" placeholder="CELULAR (41) 99999-9999" class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-white font-black uppercase text-xs">
            </div>
            <button onclick="gerarLinkAniversario()" id="btnGerar" class="w-full purple-gradient text-white font-black py-6 rounded-2xl uppercase text-xs shadow-xl mt-8 transition-all active:scale-95">Criar Link VIP ✨</button>
            <button onclick="fecharModalAniv()" class="w-full text-zinc-600 font-black py-4 uppercase text-[9px] mt-2">Fechar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, getDoc, getDocs, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentPromoter = "";
        let todasReservasGlobal = [];
        let eventosAtivos = [];

        window.validarUsuario = async function() {
            const n = document.getElementById('userPromoter').value.trim().toLowerCase();
            if(!n) return;
            const snap = await getDoc(doc(db, "promoters", n));
            if(snap.exists()) {
                currentPromoter = n;
                document.getElementById('step-user').classList.add('hidden');
                document.getElementById('step-password').classList.remove('hidden');
            } else { document.getElementById('msgErro').classList.remove('hidden'); }
        }

        window.entrarComSenha = async function() {
            const s = document.getElementById('passPromoter').value.trim();
            const snap = await getDoc(doc(db, "promoters", currentPromoter));
            const d = snap.data();
            if(!d.senha || d.senha === s) {
                if(!d.senha) await updateDoc(doc(db, "promoters", currentPromoter), { senha: s });
                carregarPainel(d);
            } else { alert("Senha incorreta"); }
        }

        function carregarPainel(dados) {
            document.getElementById('loginPromoter').classList.add('hidden');
            document.getElementById('interfacePrincipal').classList.remove('hidden');
            document.getElementById('boasVindas').innerText = currentPromoter.toUpperCase();

            // ESCUTA RESERVAS
            onSnapshot(collection(db, "lista_eventos"), (snap) => {
                todasReservasGlobal = snap.docs.map(d => d.data());
                renderizarInterface();
            });

            // ESCUTA EVENTOS
            onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snap) => {
                eventosAtivos = snap.docs.map(d => d.data()).sort((a,b) => new Date(a.data) - new Date(b.data));
                renderizarInterface();
            });

            if(dados.tipo === "aniversario") {
                document.getElementById('secaoMeusLinks').classList.remove('hidden');
                if(!document.getElementById('btnVip')) {
                    const b = document.createElement('button');
                    b.id = 'btnVip'; b.onclick = abrirModalAniv;
                    b.className = "flex-grow purple-gradient text-white font-black py-5 rounded-2xl uppercase text-[11px] tracking-widest shadow-xl transition-all active:scale-95";
                    b.innerHTML = "🎂 Criar Link VIP";
                    document.getElementById('barraBotoes').appendChild(b);
                }
                
                onSnapshot(collection(db, "links_aniversario"), (snap) => {
                    const meusLinks = snap.docs.map(d => ({id: d.id, ...d.data()}))
                        .filter(l => l.promoter.toLowerCase() === currentPromoter.toLowerCase());
                    renderizarLinks(meusLinks);
                });
            }
        }

        function renderizarInterface() {
            const cont = document.getElementById('listaEventosPromoter');
            if(!cont || eventosAtivos.length === 0) return;
            cont.innerHTML = '';
            
            eventosAtivos.forEach(ev => {
                const ind = todasReservasGlobal.filter(r => r.evento === ev.nome && (r.promoter || '').toLowerCase() === currentPromoter.toLowerCase()).length;
                const ger = todasReservasGlobal.filter(r => r.evento === ev.nome).length;
                
                cont.innerHTML += `
                    <div class="glass p-6 rounded-[2.5rem] border-l-4 border-l-sky-500 blue-glow flex justify-between items-center text-white">
                        <div>
                            <h4 class="text-[13px] font-black uppercase text-white italic leading-tight text-white">${ev.nome}</h4>
                            <p class="text-[9px] text-zinc-500 font-bold uppercase mt-2 italic">${ev.data.split('-').reverse().join('/')}</p>
                        </div>
                        <div class="flex gap-5 text-right text-white">
                            <div><p class="text-2xl font-black text-sky-400 leading-none">${ind}</p><p class="text-[7px] text-sky-500 font-black uppercase mt-1">MINHAS</p></div>
                            <div class="border-l border-white/5 pl-5"><p class="text-2xl font-black text-white leading-none">${ger}</p><p class="text-[7px] text-zinc-600 font-black uppercase mt-1">GERAL</p></div>
                        </div>
                    </div>`;
            });
        }

        function renderizarLinks(links) {
            const cont = document.getElementById('listaLinksAniv');
            if(!cont) return;
            cont.innerHTML = links.length === 0 ? '<p class="text-[9px] text-zinc-600 uppercase italic ml-2">Nenhum link criado.</p>' : '';
            links.forEach(link => {
                const qtd = todasReservasGlobal.filter(r => r.evento === link.festa && (r.aniversariante === link.aniversariante)).length;
                cont.innerHTML += `
                    <div class="glass p-5 rounded-[2rem] flex justify-between items-center border-l-4 border-l-purple-500 purple-glow text-white">
                        <div class="truncate mr-4"><p class="text-[11px] font-black text-white uppercase italic text-white">${link.aniversariante}</p><p class="text-[8px] text-zinc-500 uppercase truncate font-bold mt-1">${link.festa}</p></div>
                        <div class="flex items-center gap-4 text-white">
                            <div class="text-right"><p class="text-[14px] font-black text-white leading-none">${qtd}</p><p class="text-[7px] text-purple-400 font-black uppercase mt-1">LISTA</p></div>
                            <button onclick="copiarLinkInteligente('${link.id}', '${link.aniversariante}')" class="bg-purple-500/20 text-purple-400 px-4 py-2 rounded-xl text-[9px] font-black uppercase active:scale-90 border border-purple-500/30">Copiar</button>
                        </div>
                    </div>`;
            });
        }

        window.copiarLinkInteligente = (id, aniv) => {
            const url = window.location.origin + window.location.pathname.replace('promoter.html', 'listas.html') + '?id=' + id;
            navigator.clipboard.writeText(`*Convite VIP: Aniversário de ${aniv}* 🎂\n\nConfirme seu nome na lista oficial aqui:\n${url}`).then(() => alert("Texto copiado!"));
        };

        window.copiarLinkReservas = () => {
            const url = window.location.origin + window.location.pathname.replace('promoter.html', 'listas.html') + '?ref=' + currentPromoter;
            navigator.clipboard.writeText(url).then(() => alert("Link Geral Copiado!"));
        };

        window.abrirModalAniv = () => {
            const s = document.getElementById('selectEventoAniv');
            s.innerHTML = eventosAtivos.map(ev => `<option value="${ev.nome}">${ev.data.split('-').reverse().slice(0, 2).join('/')} - ${ev.nome}</option>`).join('');
            document.getElementById('modalAniversario').classList.remove('hidden');
        };

        window.fecharModalAniv = () => document.getElementById('modalAniversario').classList.add('hidden');

        window.gerarLinkAniversario = async () => {
            const festa = document.getElementById('selectEventoAniv').value;
            const nome = document.getElementById('nomeAniversariante').value.trim().toUpperCase();
            const tel = document.getElementById('telAniversariante').value.trim();
            if(!nome || tel.length < 14) return alert("Preencha nome e celular!");
            try {
                await addDoc(collection(db, "links_aniversario"), { promoter: currentPromoter, aniversariante: nome, festa: festa, data_criacao: new Date().toISOString() });
                await addDoc(collection(db, "lista_eventos"), { nome: nome, tel: tel, evento: festa, tipo_entrada: "ANIVERSARIANTE", promoter: currentPromoter, aniversariante: nome, entrou: false, data_reserva: new Date().toISOString() });
                fecharModalAniv(); alert("Link VIP Criado!");
            } catch (e) { alert("Erro."); }
        };

        window.mascaraTelefone = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v;
            if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            i.value = v;
        };
    </script>
</body>
</html>
