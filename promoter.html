<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Promoter Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap');
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #000); background-attachment: fixed; color: #fff; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .blue-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .text-neon-blue { color: #60a5fa; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); font-family: 'JetBrains Mono', monospace; }
        .text-neon-zinc { color: #e4e4e7; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2); font-family: 'JetBrains Mono', monospace; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginPromoter" class="flex flex-col items-center justify-center min-h-[90vh]">
        <div class="w-full max-w-sm glass p-10 rounded-[3rem] text-center fade-in border-blue-500/20 border">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 text-white uppercase italic">Acesso Promoter</h1>
            <input type="text" id="userPromoter" placeholder="DIGITE SEU USUÁRIO" class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl outline-none focus:border-blue-500 text-center font-bold text-white uppercase text-xs tracking-widest mb-4">
            <button onclick="acessarPainel()" id="btnAcessar" class="w-full blue-gradient text-white font-black py-5 rounded-2xl uppercase text-xs shadow-xl tracking-widest">Validar Acesso</button>
            <p id="msgErro" class="text-red-500 text-[10px] font-black uppercase mt-4 hidden">Acesso Negado: Usuário Inexistente</p>
        </div>
    </div>

    <div id="painelDados" class="max-w-md mx-auto hidden fade-in">
        <header class="flex justify-between items-center mb-10">
            <div>
                <p class="text-blue-500 text-[10px] font-black uppercase tracking-[0.3em] mb-1">Painel Oficial</p>
                <h1 id="boasVindas" class="text-3xl font-black text-white uppercase italic leading-none">---</h1>
            </div>
            <button onclick="sair()" class="bg-zinc-900/50 p-3 px-5 rounded-2xl text-red-500 font-black text-[10px] uppercase border border-red-500/20">Sair</button>
        </header>
        <div id="listaEventosPromoter" class="glass rounded-[2.5rem] overflow-hidden"></div>
        <div class="pt-10">
            <button onclick="copiarLinkReservas()" class="w-full bg-yellow-500 text-black font-black py-7 rounded-[2.5rem] uppercase text-[12px] tracking-widest shadow-2xl">COPIAR MEU LINK DE RESERVAS</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentPromoter = "";

        window.acessarPainel = async function() {
            const nomeInput = document.getElementById('userPromoter').value.trim().toLowerCase();
            const btn = document.getElementById('btnAcessar');
            const erro = document.getElementById('msgErro');
            
            if(!nomeInput) return;
            erro.classList.add('hidden');
            btn.disabled = true;
            btn.innerText = "BLOQUEANDO ACESSOS...";

            try {
                // ESTRATÉGIA DE BLOQUEIO TOTAL
                const snapP = await getDocs(collection(db, "promoters"));
                let listaDeNomesOficiais = [];
                
                // Criamos uma lista real do que está no banco AGORA
                snapP.forEach(doc => {
                    listaDeNomesOficiais.push(doc.id.toLowerCase());
                });

                console.log("Promoters autorizados:", listaDeNomesOficiais);

                // Verificamos se o nome digitado está DENTRO da lista oficial
                if(listaDeNomesOficiais.includes(nomeInput)) {
                    currentPromoter = nomeInput;
                    document.getElementById('loginPromoter').classList.add('hidden');
                    document.getElementById('painelDados').classList.remove('hidden');
                    document.getElementById('boasVindas').innerText = nomeInput;
                    carregarDados(nomeInput);
                } else {
                    // SE NÃO ESTIVER NA LISTA, É ERRO NA CERTA
                    erro.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerText = "Validar Acesso";
                    document.getElementById('userPromoter').value = "";
                }
            } catch(e) { 
                alert("Erro ao validar."); 
                btn.disabled = false;
            }
        }

        async function carregarDados(nomePromoter) {
            const cont = document.getElementById('listaEventosPromoter');
            cont.innerHTML = '<div class="p-16 text-center animate-pulse text-[10px] font-black text-zinc-600 text-white">LENDO DADOS...</div>';
            
            const hoje = new Date().toLocaleDateString('en-CA');
            const snapEventos = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            const snapReservas = await getDocs(collection(db, "lista_eventos"));
            
            let todasReservas = [];
            snapReservas.forEach(d => todasReservas.push(d.data()));

            let eventosFiltrados = [];
            snapEventos.forEach(doc => {
                if(!doc.data().data || doc.data().data >= hoje) eventosFiltrados.push(doc.data());
            });
            eventosFiltrados.sort((a,b) => new Date(a.data) - new Date(b.data));

            cont.innerHTML = '';
            eventosFiltrados.forEach((ev, idx) => {
                const individual = todasReservas.filter(r => r.evento === ev.nome && r.promoter.toLowerCase() === nomePromoter).length;
                const geral = todasReservas.filter(r => r.evento === ev.nome).length;
                const data = ev.data.split('-').reverse().join('/');

                cont.innerHTML += `
                    <div class="p-6 flex justify-between items-center ${idx !== eventosFiltrados.length - 1 ? 'border-b border-white/5' : ''}">
                        <div>
                            <h4 class="text-[13px] font-black uppercase text-white leading-tight italic">${ev.nome}</h4>
                            <p class="text-[9px] text-zinc-500 font-bold uppercase">${data}</p>
                        </div>
                        <div class="flex gap-6">
                            <div class="text-right">
                                <p class="text-[7px] text-blue-400 font-black uppercase mb-1">Minhas</p>
                                <p class="text-3xl font-black text-neon-blue leading-none">${individual}</p>
                            </div>
                            <div class="text-right border-l border-white/10 pl-5">
                                <p class="text-[7px] text-zinc-500 font-black uppercase mb-1">Geral</p>
                                <p class="text-3xl font-black text-neon-zinc leading-none">${geral}</p>
                            </div>
                        </div>
                    </div>`;
            });
        }

        window.copiarLinkReservas = () => {
            const url = window.location.href.split('promoter.html')[0] + 'listas.html?ref=' + currentPromoter;
            navigator.clipboard.writeText(url).then(() => alert("Copiado!"));
        };

        window.sair = () => { location.reload(); };
    </script>
</body>
</html>
