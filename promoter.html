<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Promoter Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; min-height: 100vh; }
        .glass-card { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; }
        .login-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        input { background: #000 !important; border: 1px solid #333 !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus { border-color: #eab308 !important; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg">
        <div class="w-full max-w-sm p-10 glass-card text-center border-yellow-500/20 border">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">PROMOTER <span class="text-yellow-500">ACCESS</span></h1>
            <div class="space-y-4">
                <input type="text" id="inputNomePromoter" placeholder="SEU NOME" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs">
                <div id="areaSenha" class="hidden">
                    <input type="password" id="senhaPromoter" placeholder="SUA SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs mt-2 border-yellow-500/50">
                </div>
                <button onclick="verificarOuLogar()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl active:scale-95 transition-all mt-4">CONTINUAR</button>
            </div>
            <p id="msgStatus" class="text-blue-400 text-[10px] font-black uppercase mt-6 hidden italic">Defina sua senha de acesso</p>
            <p id="erroLogin" class="text-red-500 text-[10px] font-black uppercase mt-6 hidden">Operador não cadastrado ou senha incorreta</p>
        </div>
    </div>

    <div id="interfacePrincipal" class="hidden max-w-4xl mx-auto p-6 md:p-10 space-y-10">
        <header class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10">
                <div>
                    <h2 class="text-yellow-500 font-black italic uppercase text-lg leading-none">E-CLUB</h2>
                    <p id="nomeExibicao" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">---</p>
                </div>
            </div>
            <button onclick="location.reload()" class="text-zinc-600 text-[10px] font-black uppercase hover:text-white transition-colors">Sair</button>
        </header>

        <section class="space-y-6">
            <div class="flex justify-between items-end border-b border-zinc-900 pb-4">
                <h3 class="text-xs font-black uppercase text-purple-500 tracking-widest italic leading-none">Minhas Listas de Aniversário</h3>
                <span class="text-[8px] text-zinc-600 font-bold uppercase leading-none">Limpeza: Pós-evento às 05h</span>
            </div>
            <div id="container-links-aniversario" class="space-y-4">
                <p class="text-zinc-700 text-[10px] font-black uppercase text-center py-20 italic animate-pulse">Carregando listas...</p>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let dadosAniversarios = [];
        let dadosEventos = [];
        let promoterLogado = "";
        let stepLogin = 0;
        let usuarioTemp = null;

        window.verificarOuLogar = async () => {
            const nomeInput = document.getElementById('inputNomePromoter').value.trim().toLowerCase();
            const senhaInput = document.getElementById('senhaPromoter').value.trim();
            const areaSenha = document.getElementById('areaSenha');
            const btn = document.getElementById('btnAcao');
            const erro = document.getElementById('erroLogin');

            erro.classList.add('hidden');

            if (stepLogin === 0) {
                if (!nomeInput) return;
                const docSnap = await getDoc(doc(db, "promoters", nomeInput));
                if (docSnap.exists()) {
                    usuarioTemp = docSnap.data();
                    stepLogin = 1;
                    areaSenha.classList.remove('hidden');
                    document.getElementById('inputNomePromoter').readOnly = true;
                    if (!usuarioTemp.senha) {
                        btn.innerText = "CADASTRAR E ENTRAR";
                        document.getElementById('msgStatus').classList.remove('hidden');
                    } else {
                        btn.innerText = "ENTRAR NO SISTEMA";
                    }
                } else {
                    erro.innerText = "PROMOTER NÃO CADASTRADO";
                    erro.classList.remove('hidden');
                }
            } else {
                if (!senhaInput) return;
                if (!usuarioTemp.senha) {
                    await updateDoc(doc(db, "promoters", nomeInput), { senha: senhaInput });
                    logarSucesso(nomeInput);
                } else if (usuarioTemp.senha === senhaInput) {
                    logarSucesso(nomeInput);
                } else {
                    erro.innerText = "SENHA INCORRETA";
                    erro.classList.remove('hidden');
                }
            }
        };

        function logarSucesso(nome) {
            promoterLogado = nome;
            document.getElementById('nomeExibicao').innerText = "PROMOTER: " + nome.toUpperCase();
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('interfacePrincipal').classList.remove('hidden');
            iniciarEscutas();
        }

        function iniciarEscutas() {
            // Carrega eventos primeiro
            onSnapshot(collection(db, "eventos"), snapEv => {
                dadosEventos = snapEv.docs.map(d => d.data());
                
                // Só carrega as listas depois que temos os eventos para filtrar
                onSnapshot(query(collection(db, "links_aniversario"), where("promoter_pai", "==", promoterLogado)), snapLinks => {
                    dadosAniversarios = snapLinks.docs.map(d => ({id: d.id, ...d.data()}));
                    renderizarInterface();
                });
            });
        }

        function renderizarInterface() {
            const container = document.getElementById('container-links-aniversario');
            const agora = new Date();
            const hora = agora.getHours();
            
            const hojeData = new Date();
            hojeData.setHours(0,0,0,0);
            
            const ontemData = new Date(hojeData);
            ontemData.setDate(ontemData.getDate() - 1);

            const linksFiltrados = dadosAniversarios.filter(link => {
                const evento = dadosEventos.find(e => e.nome === link.evento);
                if (!evento) return true; // Se o evento sumiu da db, mantém por segurança

                const dataEv = new Date(evento.data + "T12:00:00");
                dataEv.setHours(0,0,0,0);

                // REGRA: Se o evento é HOJE ou no FUTURO, mostra.
                if (dataEv.getTime() >= hojeData.getTime()) return true;

                // REGRA MADRUGADA: Se o evento foi ONTEM e agora é antes das 05h, mostra.
                if (dataEv.getTime() === ontemData.getTime() && hora < 5) return true;

                return false;
            });

            if (linksFiltrados.length === 0) {
                container.innerHTML = `<p class="text-zinc-700 text-[10px] font-black uppercase text-center py-20 italic">Nenhuma lista ativa no momento.</p>`;
                return;
            }

            container.innerHTML = linksFiltrados.map(link => `
                <div class="glass-card p-6 border-l-4 border-purple-500 flex justify-between items-center">
                    <div class="flex-grow pr-4">
                        <h3 class="text-white font-black uppercase italic text-sm md:text-base leading-none mb-2">${link.nome_aniversariante}</h3>
                        <p class="text-[9px] text-zinc-500 font-bold uppercase truncate max-w-[180px] md:max-w-md">${link.evento}</p>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="text-center min-w-[60px]">
                            <p class="text-[7px] text-zinc-600 font-black uppercase mb-1">Convidados</p>
                            <p class="text-xl font-black text-white leading-none">${link.total_convidados || 0}</p>
                        </div>
                        <button onclick="copiarLink('${link.id}')" class="bg-zinc-800 text-[10px] font-black px-6 py-3 rounded-xl uppercase hover:bg-white hover:text-black transition-all">Copiar</button>
                    </div>
                </div>
            `).join('');
        }

        window.copiarLink = (id) => {
            const url = `https://andrezinhoeclub.github.io/lista-ecluboficial/aniversario.html?id=${id}`;
            navigator.clipboard.writeText(url).then(() => {
                alert("Link copiado com sucesso!");
            });
        };
    </script>
</body>
</html>
