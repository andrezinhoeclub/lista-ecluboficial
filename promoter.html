<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Portaria Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; overflow: hidden; }
        .glass { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .login-bg { background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .client-card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .client-card:not(.entrou):hover { border-color: #eab308; background: #111; transform: translateX(8px); box-shadow: -10px 0 20px -10px #eab308; }
        .client-card.entrou { opacity: 0.2 !important; filter: grayscale(1); pointer-events: none; }
        input { background: #000 !important; border: 1px solid #333 !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus { border-color: #eab308 !important; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
        .badge-casal { background: #eab308; color: #000; }
        .badge-solteiro { background: #3b82f6; color: #fff; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <div id="telaLogin" class="fixed inset-0 z-[100] flex items-center justify-center login-bg">
        <div class="w-full max-w-sm p-10 glass rounded-[3rem] text-center border-yellow-500/20 border">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-white">ACESSO <span class="text-yellow-500">PORTARIA</span></h1>
            
            <div class="space-y-4">
                <input type="text" id="inputNomeUsuario" placeholder="DIGITE SEU NOME" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs">
                <div id="areaSenha" class="hidden">
                    <input type="password" id="senhaUsuario" placeholder="SUA SENHA" class="w-full p-5 rounded-2xl text-center font-bold uppercase text-xs mt-2 border-yellow-500/50">
                </div>
                <button onclick="verificarOuLogar()" id="btnAcao" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-xs shadow-xl active:scale-95 transition-all mt-4">
                    CONTINUAR
                </button>
            </div>
            <p id="msgStatus" class="text-blue-400 text-[10px] font-black uppercase mt-6 hidden italic">Nome localizado! Defina sua senha acima</p>
            <p id="erroLogin" class="text-red-500 text-[10px] font-black uppercase mt-6 hidden tracking-tighter"></p>
        </div>
    </div>

    <div id="interfacePrincipal" class="hidden flex w-full h-full">
        <aside class="w-80 h-full flex flex-col p-6 bg-black/50 border-r border-zinc-900">
            <div class="mb-10 text-center">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 mx-auto mb-2">
                <h2 class="text-yellow-500 font-black italic uppercase text-lg tracking-tighter leading-none">E-CLUB</h2>
                <p id="operadorAtivo" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mt-2 border border-zinc-800 py-1 rounded-lg italic">OPERADOR: ---</p>
            </div>
            <div class="flex-grow overflow-y-auto">
                <h3 class="text-zinc-600 text-[9px] font-black uppercase mb-4 tracking-[0.2em]">Eventos do Turno</h3>
                <div id="lista-eventos-sidebar" class="space-y-3"></div>
            </div>
            <button onclick="location.reload()" class="mt-6 text-zinc-700 text-[9px] font-black uppercase hover:text-white transition-colors">Sair / Trocar Usuário</button>
        </aside>

        <main class="flex-grow flex flex-col">
            <header class="p-8 border-b border-zinc-900 bg-black/20">
                <div class="max-w-5xl mx-auto flex gap-8 items-center">
                    <div class="relative flex-grow">
                        <span class="absolute left-6 top-5 text-zinc-600">🔍</span>
                        <input type="text" id="input-busca" oninput="processarPesquisa()" 
                               placeholder="PESQUISAR CLIENTE POR NOME OU TELEFONE..." 
                               class="w-full p-6 pl-14 rounded-[2rem] text-sm font-bold uppercase text-white">
                    </div>
                    <div class="text-right border-l border-zinc-800 pl-8 min-w-[120px]">
                        <p id="total-checkins" class="text-4xl font-black italic leading-none text-green-500">0</p>
                        <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest mt-2">Check-ins Turno</p>
                    </div>
                </div>
            </header>
            <section class="flex-grow p-8 overflow-y-auto bg-[#030303]">
                <div id="container-resultados" class="max-w-5xl mx-auto grid grid-cols-1 gap-4">
                    <div class="py-40 opacity-10 text-center text-white font-black uppercase italic tracking-[0.5em]">Aguardando Pesquisa</div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let bancoClientes = [];
        let bancoEventos = [];
        let operadorLogado = "";
        let usuarioTemp = null;
        let stepLogin = 0;

        // LÓGICA DE HORÁRIO NOTURNO (21H ÀS 05H)
        const validarJanela = (dataEvento) => {
            const agora = new Date();
            const hora = agora.getHours();
            const offset = agora.getTimezoneOffset() * 60000;
            const dataHoje = new Date(agora.getTime() - offset).toISOString().split('T')[0];
            
            const ontemObj = new Date(agora.getTime() - offset);
            ontemObj.setDate(ontemObj.getDate() - 1);
            const dataOntem = ontemObj.toISOString().split('T')[0];

            if (hora >= 21 && dataHoje === dataEvento) return true;
            if (hora < 5 && dataOntem === dataEvento) return true;
            return false;
        };

        window.verificarOuLogar = async () => {
            const nomeDigitado = document.getElementById('inputNomeUsuario').value.trim().toLowerCase();
            const senhaDigitada = document.getElementById('senhaUsuario').value.trim();
            const areaSenha = document.getElementById('areaSenha');
            const btn = document.getElementById('btnAcao');
            const erro = document.getElementById('erroLogin');
            const msg = document.getElementById('msgStatus');

            erro.classList.add('hidden');

            if (stepLogin === 0) {
                if (!nomeDigitado) return;
                // Busca o documento no Firestore
                const userDoc = await getDoc(doc(db, "configuracoes", nomeDigitado));

                if (userDoc.exists()) {
                    usuarioTemp = userDoc.data();
                    stepLogin = 1;
                    areaSenha.classList.remove('hidden');
                    document.getElementById('inputNomeUsuario').readOnly = true;
                    if (!usuarioTemp.senha || usuarioTemp.senha === "") {
                        btn.innerText = "CADASTRAR E ENTRAR";
                        msg.classList.remove('hidden');
                    } else {
                        btn.innerText = "ENTRAR NO SISTEMA";
                    }
                } else {
                    erro.innerText = "OPERADOR NÃO CADASTRADO NO SISTEMA";
                    erro.classList.remove('hidden');
                }
            } else {
                if (!senhaDigitada) return;
                if (!usuarioTemp.senha || usuarioTemp.senha === "") {
                    await updateDoc(doc(db, "configuracoes", nomeDigitado), { senha: senhaDigitada });
                    logarSucesso(nomeDigitado);
                } else if (usuarioTemp.senha === senhaDigitada) {
                    logarSucesso(nomeDigitado);
                } else {
                    erro.innerText = "SENHA INCORRETA";
                    erro.classList.remove('hidden');
                }
            }
        };

        function logarSucesso(nome) {
            operadorLogado = nome;
            document.getElementById('operadorAtivo').innerText = "OPERADOR: " + nome.toUpperCase();
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('interfacePrincipal').classList.remove('hidden');
            iniciarEscutasPortaria();
        }

        function iniciarEscutasPortaria() {
            onSnapshot(collection(db, "lista_eventos"), (snap) => {
                bancoClientes = snap.docs.map(d => ({id: d.id, ...d.data()}));
                // Conta apenas check-ins dos eventos que estão na janela correta de horário
                const totalTurno = bancoClientes.filter(c => {
                    const ev = bancoEventos.find(e => e.nome === c.evento);
                    return c.entrou && (ev ? validarJanela(ev.data) : false);
                }).length;
                document.getElementById('total-checkins').innerText = totalTurno;
                processarPesquisa();
            });
            onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snap) => {
                bancoEventos = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderizarSidebar();
            });
        }

        function renderizarSidebar() {
            const cont = document.getElementById('lista-eventos-sidebar');
            cont.innerHTML = '';
            bancoEventos.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                const totalReservas = bancoClientes.filter(c => c.evento === ev.nome).length;
                const aberto = validarJanela(ev.data);
                cont.innerHTML += `
                    <div class="p-4 rounded-2xl glass border-l-4 ${aberto ? 'border-l-green-500 shadow-[0_0_15px_rgba(34,197,94,0.1)]' : 'border-l-zinc-800 opacity-40'}">
                        <p class="text-[8px] font-black text-zinc-500 uppercase">${ev.data.split('-').reverse().join('/')}</p>
                        <h4 class="text-[10px] font-black uppercase text-white leading-tight mb-2 truncate">${ev.nome}</h4>
                        <div class="flex justify-between items-end">
                            <span class="text-[8px] font-bold text-zinc-600">${aberto ? '🔥 NO AR' : '🔒 AGUARDANDO'}</span>
                            <span class="text-lg font-black italic text-yellow-500 leading-none">${totalReservas}</span>
                        </div>
                    </div>`;
            });
        }

        window.processarPesquisa = () => {
            const busca = document.getElementById('input-busca').value.trim().toUpperCase();
            const cont = document.getElementById('container-resultados');
            if (busca.length < 2) {
                cont.innerHTML = '<div class="py-40 opacity-10 text-center text-white font-black uppercase italic tracking-[0.5em]">Aguardando Pesquisa</div>';
                return;
            }
            const filtrados = bancoClientes.filter(c => {
                const termo = (c.nome && c.nome.toUpperCase().includes(busca)) || (c.tel && c.tel.includes(busca));
                const evMatch = bancoEventos.find(e => e.nome === c.evento);
                return termo && (evMatch ? validarJanela(evMatch.data) : false);
            });
            
            cont.innerHTML = filtrados.length === 0 ? '<div class="py-40 text-center font-black uppercase text-zinc-800 italic">Nenhum registro encontrado para este turno</div>' : '';
            
            filtrados.sort((a,b) => (a.entrou === b.entrou) ? a.nome.localeCompare(b.nome) : a.entrou ? 1 : -1).forEach(c => {
                const typeColor = c.tipo_entrada === 'CASAL' ? 'badge-casal' : 'badge-solteiro';
                const div = document.createElement('div');
                div.className = `client-card p-6 rounded-[2rem] flex items-center mb-2 ${c.entrou ? 'entrou' : ''}`;
                div.innerHTML = `
                    <div class="w-40 border-r border-zinc-900 pr-6">
                        <span class="px-4 py-1.5 ${typeColor} text-[10px] font-black rounded-lg uppercase block text-center">${c.tipo_entrada || 'LISTA'}</span>
                        <p class="text-[8px] font-black text-zinc-600 uppercase mt-2 text-center truncate">REF: ${c.promoter || 'DIRETO'}</p>
                    </div>
                    <div class="flex-grow px-10">
                        <h3 class="text-xl font-black uppercase italic text-white">${c.nome}</h3>
                        <p class="text-sm font-bold text-zinc-500 font-mono tracking-tighter">${c.tel || c.telefone || '---'}</p>
                    </div>
                    <div class="w-48 text-right">
                        ${c.entrou 
                            ? '<span class="text-green-500 font-black italic uppercase text-xs tracking-widest">Confirmado ✓</span>' 
                            : `<button onclick="confirmarCheckin('${c.id}')" class="bg-white text-black px-10 py-4 rounded-2xl font-black uppercase italic text-xs hover:bg-yellow-500 transition-all">CHECK-IN</button>`}
                    </div>`;
                cont.appendChild(div);
            });
        };

        window.confirmarCheckin = async (id) => {
            await updateDoc(doc(db, "lista_eventos", id), { 
                entrou: true, 
                porteiro: operadorLogado, 
                data_entrada: new Date().toISOString() 
            });
        };
    </script>
</body>
</html>
