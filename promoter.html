<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Promoter Dashboard ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050508; color: #fff; min-height: 100vh; margin: 0; }
        #telaLogin { position: fixed; inset: 0; z-index: 9999; background: #050508; display: flex; align-items: center; justify-content: center; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .blue-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .gold-gradient { background: linear-gradient(135deg, #eab308 0%, #a16207 100%); }
        .purple-gradient { background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%); }
        .content-wrapper { padding-bottom: 140px; }
        input { background: rgba(0,0,0,0.5) !important; color: white !important; border: 1px solid #333 !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="telaLogin">
        <div class="w-full max-w-sm glass p-10 rounded-[3rem] text-center border-sky-500/20 border shadow-2xl">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16 mx-auto mb-8">
            <h1 class="text-3xl font-black mb-8 uppercase italic tracking-tighter">PROMOTER <span class="text-sky-400">ACCESS</span></h1>
            <div id="fluxo-login">
                <input type="text" id="usuario" placeholder="DIGITE SEU USUÁRIO" class="w-full p-5 rounded-2xl outline-none text-center font-bold uppercase text-xs mb-4">
                <div id="campo-senha" class="hidden">
                    <input type="password" id="senha" placeholder="DIGITE SUA SENHA" class="w-full p-5 rounded-2xl outline-none text-center font-bold uppercase text-xs mb-4 border-purple-500/50">
                </div>
                <button onclick="prosseguirLogin()" id="btnAcao" class="w-full purple-gradient text-white font-black py-5 rounded-2xl uppercase text-xs shadow-xl tracking-widest active:scale-95 transition-all">CONTINUAR</button>
            </div>
            <p id="erro" class="text-red-500 text-[10px] font-black uppercase mt-6 hidden">⚠️ ACESSO NEGADO</p>
        </div>
    </div>

    <div id="painel" class="hidden max-w-md mx-auto pb-32">
        <header class="flex justify-between items-center mb-12">
            <div>
                <p class="text-sky-400 text-[10px] font-black uppercase tracking-[0.3em] mb-1">E-Club Oficial</p>
                <h1 id="nomePromoterHeader" class="text-4xl font-black uppercase italic leading-none">---</h1>
            </div>
            <button onclick="location.reload()" class="bg-red-500/10 p-3 px-6 rounded-2xl text-red-500 font-black text-[10px] border border-red-500/20">Sair</button>
        </header>

        <div id="secaoAniversario" class="hidden mb-12">
            <h3 class="text-[11px] font-black uppercase text-purple-400 mb-4 tracking-[0.2em] italic">🎂 Links de Aniversário</h3>
            <div id="listaAniversarios" class="space-y-4"></div>
        </div>
        
        <div>
            <h3 class="text-[11px] font-black uppercase text-sky-400 mb-4 tracking-[0.2em] ml-2 italic">📈 Performance em Eventos</h3>
            <div id="listaPerformance" class="space-y-4"></div>
        </div>

        <div class="fixed bottom-0 left-0 w-full p-6 bg-black/90 backdrop-blur-xl border-t border-white/5 z-40">
            <div class="max-w-md mx-auto flex gap-3">
                <div class="flex-grow flex gap-2">
                    <button onclick="abrirLinkGeral()" class="flex-grow gold-gradient text-black font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest shadow-xl active:scale-95 transition-all">ABRIR MEU LINK</button>
                    <button onclick="copiarLinkGeral()" class="gold-gradient text-black font-black px-5 rounded-2xl shadow-xl active:scale-95 transition-all text-lg" title="Copiar Link">📋</button>
                </div>
                <button id="btnCriarLink" onclick="abrirModalAniv()" class="hidden flex-grow purple-gradient text-white font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest shadow-xl active:scale-95 transition-all">NOVO ANIV</button>
            </div>
        </div>
    </div>

    <div id="modalAniv" class="fixed inset-0 bg-black/95 z-[10000] hidden flex items-center justify-center p-6">
        <div class="glass max-w-sm w-full p-10 rounded-[3.5rem] border-purple-500/30 border text-center">
            <h2 class="text-2xl font-black text-purple-400 uppercase italic mb-8">Novo Aniversariante</h2>
            <select id="selEvento" class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-white text-xs font-bold uppercase mb-4"></select>
            <input type="text" id="nomeAniv" placeholder="NOME DO ANIVERSARIANTE" class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-white font-black uppercase text-xs mb-4">
            <input type="tel" id="telAniv" oninput="mask(this)" placeholder="(41) 99999-9999" class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-white font-black uppercase text-xs mb-8">
            <button onclick="criarLinkAniv()" class="w-full purple-gradient text-white font-black py-6 rounded-2xl uppercase text-xs shadow-xl">GERAR LINK VIP ✨</button>
            <button onclick="fecharModalAniv()" class="w-full text-zinc-600 font-black py-4 uppercase text-[9px] mt-2">FECHAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, getDoc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let logado = ""; let reservas = []; let eventos = []; let statsPromoter = null;

        window.prosseguirLogin = async () => {
            const u = document.getElementById('usuario').value.trim().toLowerCase();
            const s = document.getElementById('senha').value.trim();
            const erro = document.getElementById('erro');
            const btn = document.getElementById('btnAcao');
            
            if (!logado) {
                btn.innerText = "VERIFICANDO...";
                try {
                    const snap = await getDoc(doc(db, "promoters", u));
                    if (snap.exists()) {
                        logado = u;
                        statsPromoter = snap.data();
                        document.getElementById('campo-senha').classList.remove('hidden');
                        document.getElementById('usuario').readOnly = true;
                        btn.innerText = "ENTRAR NO PAINEL";
                        erro.classList.add('hidden');
                    } else { 
                        erro.classList.remove('hidden');
                        btn.innerText = "CONTINUAR";
                    }
                } catch (e) {
                    alert("Erro de conexão. Tente novamente.");
                    btn.innerText = "CONTINUAR";
                }
            } else {
                if (statsPromoter.senha === s || !statsPromoter.senha) {
                    btn.innerText = "ENTRANDO...";
                    if (!statsPromoter.senha) {
                        try { await updateDoc(doc(db, "promoters", logado), { senha: s }); } catch (e) {}
                    }
                    document.getElementById('telaLogin').style.display = 'none';
                    document.getElementById('painel').classList.remove('hidden');
                    document.getElementById('nomePromoterHeader').innerText = logado;
                    iniciarSistema();
                } else { alert("Senha incorreta"); }
            }
        };

        function iniciarSistema() {
            if (statsPromoter.tipo === "aniversario") {
                document.getElementById('secaoAniversario').classList.remove('hidden');
                document.getElementById('btnCriarLink').classList.remove('hidden');
                
                onSnapshot(collection(db, "links_aniversario"), (snap) => {
                    const links = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(l => l.promoter.toLowerCase() === logado);
                    document.getElementById('listaAniversarios').innerHTML = links.map(l => {
                        const count = reservas.filter(r => r.evento === l.festa && (r.aniversariante || '').toLowerCase() === l.aniversariante.toLowerCase()).length;
                        return `<div class="glass p-5 rounded-[2rem] flex justify-between items-center border-l-4 border-purple-500 shadow-xl mb-4">
                            <div class="text-left"><p class="text-[11px] font-black uppercase italic">${l.aniversariante}</p><p class="text-[8px] text-zinc-500 font-bold mt-1">${l.festa}</p></div>
                            <div class="flex items-center gap-4"><div class="text-right"><p class="text-lg font-black leading-none">${count}</p><p class="text-[7px] text-purple-400 font-black mt-1">LISTA</p></div>
                            <button onclick="copyAniv('${l.id}', '${l.aniversariante}')" class="bg-purple-500/20 text-purple-400 px-4 py-2 rounded-xl text-[9px] font-black uppercase border border-purple-500/30">Copiar</button></div>
                        </div>`;
                    }).join('');
                });
            }

            onSnapshot(collection(db, "lista_eventos"), (snap) => {
                reservas = snap.docs.map(d => d.data());
                renderPerformance();
            });

            onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snap) => {
                eventos = snap.docs.map(d => d.data()).sort((a,b) => new Date(a.data) - new Date(b.data));
                renderPerformance();
            });
        }

        function renderPerformance() {
            document.getElementById('listaPerformance').innerHTML = eventos.map(ev => {
                const ind = reservas.filter(r => r.evento === ev.nome && (r.promoter || '').toLowerCase().trim() === logado.toLowerCase().trim()).length;
                const ger = reservas.filter(r => r.evento === ev.nome).length;
                return `<div class="glass p-6 rounded-[2.5rem] border-l-4 border-sky-500 flex justify-between items-center mb-4">
                    <div class="text-left text-white"><h4 class="text-[13px] font-black uppercase italic leading-tight">${ev.nome}</h4><p class="text-[9px] text-zinc-500 font-bold mt-2">${ev.data.split('-').reverse().join('/')}</p></div>
                    <div class="flex gap-5 text-right"><div><p class="text-2xl font-black text-sky-400 leading-none">${ind}</p><p class="text-[7px] text-sky-500 font-black mt-1">MINHAS</p></div>
                    <div class="border-l border-white/5 pl-5"><p class="text-2xl font-black text-white leading-none">${ger}</p><p class="text-[7px] text-zinc-600 font-black mt-1">GERAL</p></div></div>
                </div>`;
            }).join('');
        }

        window.abrirLinkGeral = () => {
            const url = window.location.origin + window.location.pathname.replace('promoter.html', 'listas.html') + '?ref=' + logado;
            window.open(url, '_blank');
        };

        window.copiarLinkGeral = () => {
            const url = window.location.origin + window.location.pathname.replace('promoter.html', 'listas.html') + '?ref=' + logado;
            navigator.clipboard.writeText(url).then(() => alert("Link Geral Copiado!"));
        };

        // NOVA FUNÇÃO DE COPIAR ANIVERSÁRIO (EXATAMENTE COMO SUA IMAGEM)
        window.copyAniv = (id, n) => {
            const url = window.location.origin + window.location.pathname.replace('promoter.html', 'listas.html') + '?id=' + id;
            const msg = `*Convite VIP: Aniversário de ${n}* 🎂\n\nClique no link abaixo para confirmar seu nome na lista:\n${url}`;
            navigator.clipboard.writeText(msg).then(() => alert("Mensagem VIP Copiada!"));
        };

        window.abrirModalAniv = () => {
            document.getElementById('selEvento').innerHTML = eventos.map(ev => `<option value="${ev.nome}">${ev.nome}</option>`).join('');
            document.getElementById('modalAniv').classList.remove('hidden');
        };

        window.fecharModalAniv = () => {
            document.getElementById('modalAniv').classList.add('hidden');
        };

        window.criarLinkAniv = async () => {
            const f = document.getElementById('selEvento').value;
            const n = document.getElementById('nomeAniv').value.trim().toUpperCase();
            const t = document.getElementById('telAniv').value.trim();
            if (!n || t.length < 14) return alert("Preencha corretamente!");
            await addDoc(collection(db, "links_aniversario"), { promoter: logado, aniversariante: n, festa: f, criado: new Date().toISOString() });
            await addDoc(collection(db, "lista_eventos"), { nome: n, tel: t, evento: f, tipo_entrada: "ANIVERSARIANTE", promoter: logado, aniversariante: n, entrou: false, data_reserva: new Date().toISOString() });
            fecharModalAniv(); alert("Link Criado!");
        };

        window.mask = (i) => {
            let v = i.value.replace(/\D/g, "").substring(0, 11);
            if (v.length > 0) v = "(" + v;
            if (v.length > 3) v = v.substring(0, 3) + ") " + v.substring(3);
            if (v.length > 10) v = v.substring(0, 10) + "-" + v.substring(10);
            i.value = v;
        };
    </script>
</body>
</html>
