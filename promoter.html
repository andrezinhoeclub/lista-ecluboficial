<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Promoter Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@800&display=swap');
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #000); background-attachment: fixed; color: #fff; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .blue-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .gold-gradient { background: linear-gradient(135deg, #eab308 0%, #a16207 100%); }
        .purple-gradient { background: linear-gradient(135deg, #9333ea 0%, #3b82f6 100%); }
        .text-neon-blue { color: #60a5fa; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); font-family: 'JetBrains Mono', monospace; }
        .text-neon-zinc { color: #e4e4e7; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2); font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="p-4 md:p-8 pb-32"> <div id="loginPromoter" class="flex flex-col items-center justify-center min-h-[90vh]">
        <div class="w-full max-w-sm glass p-10 rounded-[3rem] text-center border-blue-500/20 border">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-16 mx-auto mb-8">
            <h1 class="text-2xl font-black mb-8 text-white uppercase italic tracking-tighter">Promoter <span class="text-blue-500">Access</span></h1>
            
            <div id="step-user">
                <input type="text" id="userPromoter" placeholder="USUÁRIO" class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl outline-none focus:border-blue-500 text-center font-bold text-white uppercase text-xs mb-4">
                <button onclick="validarUsuario()" class="w-full blue-gradient text-white font-black py-5 rounded-2xl uppercase text-xs shadow-xl tracking-widest">Continuar</button>
            </div>

            <div id="step-password" class="hidden">
                <p id="labelSenha" class="text-[10px] text-zinc-400 uppercase font-black mb-4 tracking-widest text-white">Senha de Acesso</p>
                <input type="password" id="passPromoter" placeholder="****" class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl outline-none focus:border-blue-500 text-center font-bold text-white uppercase text-xs mb-4">
                <button onclick="entrarComSenha()" id="btnEntrar" class="w-full blue-gradient text-white font-black py-5 rounded-2xl uppercase text-xs shadow-xl tracking-widest">Entrar</button>
            </div>
            <p id="msgErro" class="text-red-500 text-[10px] font-black uppercase mt-4 hidden">Erro na validação</p>
        </div>
    </div>

    <div id="painelDados" class="max-w-md mx-auto hidden">
        <header class="flex justify-between items-center mb-10">
            <div>
                <p class="text-blue-500 text-[10px] font-black uppercase tracking-[0.3em] mb-1">E-Club Oficial</p>
                <h1 id="boasVindas" class="text-3xl font-black text-white uppercase italic leading-none">---</h1>
            </div>
            <button onclick="location.reload()" class="bg-zinc-900/50 p-3 px-5 rounded-2xl text-red-500 font-black text-[10px] border border-red-500/20">Sair</button>
        </header>

        <section class="space-y-6">
            <div id="listaEventosPromoter" class="glass rounded-[2.5rem] overflow-hidden"></div>
        </section>

        <div id="footerAcoes" class="fixed bottom-0 left-0 w-full p-4 md:p-6 bg-black/80 backdrop-blur-xl border-t border-white/5 z-40">
            <div class="max-w-md mx-auto flex gap-3" id="barraBotoes">
                <button onclick="copiarLinkReservas()" class="flex-grow gold-gradient text-black font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest shadow-xl transition-transform active:scale-95">
                    Link Reservas
                </button>
                </div>
        </div>
    </div>

    <div id="modalAniversario" class="fixed inset-0 bg-black/95 backdrop-blur-md z-50 hidden flex items-center justify-center p-6">
        <div class="glass max-w-sm w-full p-10 rounded-[3rem] border-yellow-500/30 border text-center">
            <h2 class="text-2xl font-black text-yellow-500 uppercase italic mb-2 leading-none">Aniversário</h2>
            <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mb-8">Gerar lista de convidados</p>
            
            <div class="text-left space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-zinc-500 ml-2">Selecione o Evento</label>
                    <select id="selectEventoAniv" class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl text-white outline-none focus:border-yellow-500 text-xs font-bold uppercase mt-1"></select>
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-zinc-500 ml-2">Nome do Aniversariante</label>
                    <input type="text" id="nomeAniversariante" placeholder="NOME DO CLIENTE" class="w-full bg-black/50 border border-zinc-800 p-5 rounded-2xl text-white outline-none focus:border-yellow-500 font-black uppercase text-xs mt-1">
                </div>
            </div>

            <button onclick="gerarLinkAniversario()" class="w-full gold-gradient text-black font-black py-6 rounded-2xl uppercase text-xs shadow-xl mt-8 tracking-widest">Copiar Link do Aniv</button>
            <button onclick="fecharModalAniv()" class="w-full text-zinc-600 font-black py-4 uppercase text-[9px] mt-2">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentPromoter = "";
        let isFirstAccess = false;

        window.validarUsuario = async function() {
            const nomeInput = document.getElementById('userPromoter').value.trim().toLowerCase();
            const erro = document.getElementById('msgErro');
            if(!nomeInput) return;
            erro.classList.add('hidden');

            try {
                const docSnap = await getDoc(doc(db, "promoters", nomeInput));
                if(docSnap.exists()) {
                    currentPromoter = nomeInput;
                    const dados = docSnap.data();
                    document.getElementById('step-user').classList.add('hidden');
                    document.getElementById('step-password').classList.remove('hidden');

                    if(!dados.senha) {
                        isFirstAccess = true;
                        document.getElementById('labelSenha').innerText = "CRIE SUA SENHA:";
                        document.getElementById('btnEntrar').innerText = "Cadastrar e Entrar";
                    }
                } else {
                    erro.innerText = "Usuário não localizado";
                    erro.classList.remove('hidden');
                }
            } catch(e) { console.error(e); }
        }

        window.entrarComSenha = async function() {
            const senha = document.getElementById('passPromoter').value.trim();
            const erro = document.getElementById('msgErro');
            if(!senha) return;

            try {
                const docRef = doc(db, "promoters", currentPromoter);
                const docSnap = await getDoc(docRef);
                const dados = docSnap.data();

                if(isFirstAccess) {
                    await updateDoc(docRef, { senha: senha });
                    carregarPainel(dados);
                } else if(dados.senha === senha) {
                    carregarPainel(dados);
                } else {
                    erro.innerText = "Senha incorreta";
                    erro.classList.remove('hidden');
                }
            } catch(e) { console.error(e); }
        }

        async function carregarPainel(dadosUser) {
            document.getElementById('loginPromoter').classList.add('hidden');
            document.getElementById('painelDados').classList.remove('hidden');
            document.getElementById('boasVindas').innerText = currentPromoter;

            if(dadosUser.tipo === "aniversario") {
                const btnAniv = document.createElement('button');
                btnAniv.onclick = abrirModalAniv;
                btnAniv.className = "flex-grow purple-gradient text-white font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest shadow-xl transition-transform active:scale-95";
                btnAniv.innerHTML = "🎂 Desconto";
                document.getElementById('barraBotoes').appendChild(btnAniv);
            }

            carregarDados(currentPromoter);
        }

        window.abrirModalAniv = async () => {
            const select = document.getElementById('selectEventoAniv');
            select.innerHTML = '<option>Carregando...</option>';
            document.getElementById('modalAniversario').classList.remove('hidden');
            
            const snap = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            select.innerHTML = '';
            snap.forEach(ev => {
                select.innerHTML += `<option value="${ev.data().nome}">${ev.data().nome}</option>`;
            });
        }

        window.fecharModalAniv = () => document.getElementById('modalAniversario').classList.add('hidden');

        window.gerarLinkAniversario = () => {
            const evento = document.getElementById('selectEventoAniv').value;
            const aniversariante = document.getElementById('nomeAniversariante').value.trim();
            if(!aniversariante) return alert("Digite o nome do aniversariante!");

            const baseUrl = window.location.origin + window.location.pathname.replace('promoter.html', 'listas.html');
            const finalUrl = `${baseUrl}?ref=${currentPromoter}&aniv=${encodeURIComponent(aniversariante)}&festa=${encodeURIComponent(evento)}`;

            navigator.clipboard.writeText(finalUrl).then(() => {
                alert("Link de Aniversário Copiado!");
                fecharModalAniv();
            });
        }

        async function carregarDados(nomePromoter) {
            const cont = document.getElementById('listaEventosPromoter');
            cont.innerHTML = '<div class="p-16 text-center text-[10px] font-black uppercase text-zinc-600 tracking-widest">Sincronizando...</div>';
            
            const hoje = new Date().toLocaleDateString('en-CA');
            const snapEventos = await getDocs(query(collection(db, "eventos"), where("ativo", "==", true)));
            const snapReservas = await getDocs(collection(db, "lista_eventos"));
            
            let todasReservas = [];
            snapReservas.forEach(d => todasReservas.push(d.data()));

            let eventosFiltrados = [];
            snapEventos.forEach(doc => {
                if(!doc.data().data || doc.data().data >= hoje) eventosFiltrados.push(doc.data());
            });
            eventosFiltrados.sort((a,b) => new Date(a.data) - new Date(b.data));

            cont.innerHTML = '';
            eventosFiltrados.forEach((ev, idx) => {
                const individual = todasReservas.filter(r => r.evento === ev.nome && (r.promoter || "").toLowerCase() === nomePromoter).length;
                const geral = todasReservas.filter(r => r.evento === ev.nome).length;
                const data = ev.data.split('-').reverse().join('/');

                cont.innerHTML += `
                    <div class="p-6 flex justify-between items-center ${idx !== eventosFiltrados.length - 1 ? 'border-b border-white/5' : ''}">
                        <div>
                            <h4 class="text-[12px] font-black uppercase text-white leading-tight italic">${ev.nome}</h4>
                            <p class="text-[9px] text-zinc-500 font-bold uppercase">${data}</p>
                        </div>
                        <div class="flex gap-4 text-right">
                            <div>
                                <p class="text-[7px] text-blue-400 font-black uppercase mb-1">Minhas</p>
                                <p class="text-2xl font-black text-neon-blue leading-none">${individual}</p>
                            </div>
                            <div class="border-l border-white/10 pl-4">
                                <p class="text-[7px] text-zinc-600 font-black uppercase mb-1">Geral</p>
                                <p class="text-2xl font-black text-neon-zinc leading-none">${geral}</p>
                            </div>
                        </div>
                    </div>`;
            });
        }

        window.copiarLinkReservas = () => {
            const url = window.location.origin + window.location.pathname.replace('promoter.html', 'listas.html') + '?ref=' + currentPromoter;
            navigator.clipboard.writeText(url).then(() => alert("Link de Reservas Copiado!"));
        };
    </script>
</body>
</html>
