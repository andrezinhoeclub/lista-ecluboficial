<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Painel da Promoter</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; }
        .glass-card { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-blue { background: #3b82f6; color: #fff; font-weight: 900; transition: 0.3s; }
        .btn-blue:hover { transform: scale(1.02); background: #2563eb; }
        .festa-row { border-bottom: 1px solid #1a1a1a; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginPromoter" class="flex flex-col items-center justify-center min-h-[80vh]">
        <div class="w-full max-w-sm glass-card p-10 rounded-[3rem] text-center shadow-2xl">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-12 mx-auto mb-6">
            <h1 class="text-xl font-black mb-6 text-blue-500 uppercase italic">Acesso Promoter</h1>
            <input type="text" id="userPromoter" placeholder="DIGITE SEU USUÁRIO" class="w-full bg-black border border-zinc-800 p-5 rounded-2xl mb-6 outline-none focus:border-blue-500 text-center font-bold text-white uppercase text-xs">
            <button onclick="acessarPainel()" id="btnAcessar" class="w-full btn-blue py-5 rounded-2xl uppercase text-xs shadow-lg">Entrar no Painel</button>
        </div>
    </div>

    <div id="painelDados" class="max-w-md mx-auto hidden">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 id="boasVindas" class="text-2xl font-black text-blue-500 uppercase italic leading-none">Olá</h1>
                <p class="text-zinc-500 text-[9px] uppercase font-black mt-1 tracking-widest">Controle de links e metas</p>
            </div>
            <button onclick="location.reload()" class="bg-zinc-900 p-3 rounded-xl text-zinc-500 hover:text-white transition">SAIR</button>
        </header>

        <div class="grid grid-cols-1 gap-3 mb-10">
            <button onclick="copiarLinkReservas()" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest btn-action shadow-lg flex flex-col items-center">
                <span>Copiar Link de Reservas</span>
                <span class="text-[8px] opacity-60 normal-case font-bold mt-1">(Link para enviar aos clientes)</span>
            </button>
            <button onclick="copiarLinkPainel()" class="w-full bg-zinc-800 text-white font-black py-4 rounded-2xl uppercase text-[9px] tracking-widest border border-zinc-700">
                Copiar Link deste Painel
            </button>
        </div>

        <h3 class="text-zinc-500 text-[10px] font-black uppercase mb-4 tracking-widest italic border-b border-zinc-900 pb-2">Eventos da Semana</h3>
        
        <div id="listaEventosPromoter" class="glass-card rounded-[2rem] overflow-hidden">
            </div>

        <footer class="mt-20 text-center border-t border-zinc-900 pt-10 mb-10">
            <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" alt="Logo" class="h-8 mx-auto mb-4 opacity-20">
            <p class="text-zinc-700 text-[8px] uppercase font-black tracking-widest italic">Eclub Master Control v3.0</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentPromoter = "";

        window.acessarPainel = async function() {
            const nome = document.getElementById('userPromoter').value.trim().toLowerCase();
            const btn = document.getElementById('btnAcessar');
            if(!nome) return alert("Digite seu usuário!");

            btn.disabled = true;
            btn.innerText = "CARREGANDO...";

            try {
                const snapP = await getDoc(doc(db, "promoters", nome));
                if(snapP.exists()) {
                    currentPromoter = nome;
                    document.getElementById('loginPromoter').classList.add('hidden');
                    document.getElementById('painelDados').classList.remove('hidden');
                    document.getElementById('boasVindas').innerText = `Olá, ${nome}!`;
                    carregarDados(nome);
                } else {
                    alert("Usuário não autorizado.");
                    btn.disabled = false;
                    btn.innerText = "Entrar";
                }
            } catch(e) { alert("Erro de conexão."); btn.disabled = false; }
        }

        async function carregarDados(nomePromoter) {
            const cont = document.getElementById('listaEventosPromoter');
            cont.innerHTML = '<div class="p-10 text-center animate-pulse text-[10px] font-black uppercase text-zinc-600">Sincronizando...</div>';

            try {
                const hoje = new Date().toLocaleDateString('en-CA');
                const qEventos = query(collection(db, "eventos"), where("ativo", "==", true));
                const snapEventos = await getDocs(qEventos);
                const snapReservas = await getDocs(collection(db, "lista_eventos"));
                const todasReservas = [];
                snapReservas.forEach(d => todasReservas.push(d.data()));

                let eventosFiltrados = [];
                snapEventos.forEach(doc => {
                    if(!doc.data().data || doc.data().data >= hoje) eventosFiltrados.push(doc.data());
                });
                eventosFiltrados.sort((a,b) => new Date(a.data) - new Date(b.data));

                if(eventosFiltrados.length === 0) {
                    cont.innerHTML = '<p class="p-10 text-center text-zinc-500 text-[10px] uppercase font-black">Sem eventos ativos.</p>';
                    return;
                }

                cont.innerHTML = '';
                eventosFiltrados.forEach(ev => {
                    const individual = todasReservas.filter(r => r.evento === ev.nome && r.promoter.toLowerCase() === nomePromoter).length;
                    const geral = todasReservas.filter(r => r.evento === ev.nome).length;
                    const data = ev.data.split('-').reverse().join('/');

                    cont.innerHTML += `
                        <div class="festa-row p-5 flex justify-between items-center bg-zinc-900/40">
                            <div>
                                <h4 class="text-xs font-black uppercase text-white leading-none mb-1">${ev.nome}</h4>
                                <p class="text-[8px] text-zinc-500 font-bold uppercase">${data}</p>
                            </div>
                            <div class="flex gap-4">
                                <div class="text-center">
                                    <p class="text-[7px] text-blue-500 font-black uppercase">Minhas</p>
                                    <p class="text-lg font-black text-white leading-none">${individual}</p>
                                </div>
                                <div class="text-center border-l border-zinc-800 pl-4">
                                    <p class="text-[7px] text-zinc-600 font-black uppercase">Geral</p>
                                    <p class="text-lg font-black text-zinc-600 leading-none">${geral}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch(e) { cont.innerHTML = '<p class="p-10 text-center text-red-500 text-[10px]">ERRO.</p>'; }
        }

        window.copiarLinkReservas = () => {
            const url = window.location.href.split('promoter.html')[0] + 'listas.html?ref=' + currentPromoter;
            navigator.clipboard.writeText(url);
            alert("Link de Reservas copiado!");
        };

        window.copiarLinkPainel = () => {
            navigator.clipboard.writeText(window.location.href);
            alert("Link do seu Painel copiado!");
        };
    </script>
</body>
</html>
