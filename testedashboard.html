<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Central de Comando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050508; color: #fff; overflow-x: hidden; }
        
        .sidebar { background: #0c0c0e; border-right: 1px solid #1f1f23; transition: 0.3s; }
        .nav-link { color: #666; transition: 0.3s; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-radius: 12px; font-weight: 600; font-size: 13px; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.05); }
        
        /* Dashboard Icons Grid */
        .module-card { background: #111114; border: 1px solid #1f1f23; border-radius: 24px; padding: 24px; transition: 0.3s; text-align: center; cursor: pointer; }
        .module-card:hover { border-color: var(--accent); transform: translateY(-5px); background: rgba(255,255,255,0.02); }
        .icon-box { width: 50px; height: 50px; margin: 0 auto 12px; display: flex; items-center justify-content: center; font-size: 24px; border-radius: 16px; background: rgba(255,255,255,0.03); }

        /* Calendar Grid */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #111114; border: 1px solid #1f1f23; border-radius: 24px; overflow: hidden; }
        .calendar-day { min-height: 100px; border: 0.5px solid #1f1f23; padding: 8px; position: relative; }
        .day-header { background: #0c0c0e; padding: 12px; text-align: center; font-size: 10px; font-weight: 900; color: #444; border: 0.5px solid #1f1f23; text-transform: uppercase; }
        .event-tag { background: #27272a; color: #fff; font-size: 9px; padding: 4px 8px; border-radius: 6px; margin-top: 4px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .day-num { font-size: 11px; font-weight: 900; color: #333; }
        .today .day-num { color: var(--accent); }

        :root { --accent: #eab308; }
        .text-accent { color: var(--accent); }
        .bg-accent { background-color: var(--accent); }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="sidebar w-64 hidden lg:flex flex-col p-6 fixed inset-y-0 z-50">
        <div class="mb-10 px-4">
            <img id="club-logo" src="" class="h-10 mb-2">
            <p id="club-name" class="text-[9px] font-black uppercase tracking-widest text-accent italic">---</p>
        </div>
        <nav class="space-y-1 flex-grow">
            <div onclick="showSection('dash')" id="link-dash" class="nav-link active"><span>📊</span> Dashboard</div>
            <div onclick="showSection('eventos')" id="link-eventos" class="nav-link"><span>📅</span> Eventos</div>
            <div onclick="showSection('listas')" id="link-listas" class="nav-link"><span>📝</span> Listas Oficiais</div>
            <div class="nav-link"><span>👥</span> Comissários</div>
            <div class="nav-link"><span>💰</span> Carteira</div>
        </nav>
        <div class="pt-6 border-t border-white/5">
            <div class="nav-link text-red-500"><span>🚪</span> Sair</div>
        </div>
    </aside>

    <main class="flex-grow lg:ml-64 p-6 lg:p-10">
        
        <section id="section-dash" class="space-y-10">
            <header>
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Painel de Controle</h2>
                <p class="text-zinc-500 text-sm">Selecione um módulo para gerir a sua balada.</p>
            </header>

            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <div onclick="showSection('eventos')" class="module-card">
                    <div class="icon-box">📅</div>
                    <p class="text-xs font-black uppercase">Eventos</p>
                </div>
                <div class="module-card">
                    <div class="icon-box">👥</div>
                    <p class="text-xs font-black uppercase">Usuários</p>
                </div>
                <div class="module-card">
                    <div class="icon-box">📣</div>
                    <p class="text-xs font-black uppercase">Comissários</p>
                </div>
                <div onclick="showSection('listas')" class="module-card">
                    <div class="icon-box">📝</div>
                    <p class="text-xs font-black uppercase">Listas</p>
                </div>
                <div class="module-card">
                    <div class="icon-box">🛋️</div>
                    <p class="text-xs font-black uppercase">Espaços</p>
                </div>
                <div class="module-card">
                    <div class="icon-box">💹</div>
                    <p class="text-xs font-black uppercase">Relatórios</p>
                </div>
                <div class="module-card">
                    <div class="icon-box">💳</div>
                    <p class="text-xs font-black uppercase">Carteira</p>
                </div>
                <div class="module-card">
                    <div class="icon-box">✉️</div>
                    <p class="text-xs font-black uppercase">Sugestões</p>
                </div>
            </div>
        </section>

        <section id="section-eventos" class="hidden space-y-8">
            <header class="flex justify-between items-center">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Calendário</h2>
                <button class="bg-accent text-black font-black px-6 py-3 rounded-2xl text-xs uppercase shadow-lg shadow-yellow-500/10">+ Criar Evento</button>
            </header>

            <div class="calendar-grid">
                <div class="day-header">Dom</div><div class="day-header">Seg</div><div class="day-header">Ter</div>
                <div class="day-header">Qua</div><div class="day-header">Qui</div><div class="day-header">Sex</div><div class="day-header">Sáb</div>
                <div id="calendar-body" class="contents"></div>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const clubID = params.get('club') || 'eclub';

        // Branding Dinâmico
        const config = {
            'eclub': { nome: 'E-CLUB', cor: '#eab308', logo: 'https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png' },
            'baladateste': { nome: 'TESTE CLUB', cor: '#00f5d4', logo: 'https://cdn-icons-png.flaticon.com/512/3843/3843517.png' }
        };
        const current = config[clubID] || config['eclub'];
        document.documentElement.style.setProperty('--accent', current.cor);
        document.getElementById('club-name').innerText = current.nome;
        document.getElementById('club-logo').src = current.logo;

        // Alternar Seções
        window.showSection = (name) => {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`section-${name}`).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`link-${name}`)?.classList.add('active');
            if(name === 'eventos') renderCalendar();
        };

        // Gerar Calendário
        async function renderCalendar() {
            const body = document.getElementById('calendar-body');
            body.innerHTML = '';
            const hoje = new Date();
            const primeiroDia = new Date(hoje.getFullYear(), hoje.getMonth(), 1).getDay();
            const diasNoMes = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0).getDate();

            // Espaços vazios
            for(let i=0; i<primeiroDia; i++) body.innerHTML += `<div class="calendar-day bg-black/20"></div>`;

            // Dias do mês
            for(let d=1; d<=diasNoMes; d++) {
                const dataFormatada = `${hoje.getFullYear()}-${(hoje.getMonth()+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                body.innerHTML += `<div class="calendar-day" id="day-${dataFormatada}"><span class="day-num">${d}</span></div>`;
            }

            // Buscar eventos no Firebase para este clube
            const q = query(collection(db, "eventos"), where("clubID", "==", clubID));
            const snap = await getDocs(q);
            snap.forEach(doc => {
                const ev = doc.data();
                const dayEl = document.getElementById(`day-${ev.data}`);
                if(dayEl) {
                    dayEl.innerHTML += `<div class="event-tag">${ev.nome}</div>`;
                }
            });
        }
    </script>
</body>
</html>
