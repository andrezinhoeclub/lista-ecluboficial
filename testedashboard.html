<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Area do Promoter</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000; 
            color: #fff; 
            overflow-x: hidden;
        }

        /* Estilo dos Cards de Performance */
        .card-evento {
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid #0099ff;
            border-radius: 2.5rem;
            box-shadow: 0 0 25px rgba(0, 153, 255, 0.15);
            transition: 0.3s;
        }

        /* Botão Dourado Premium */
        .btn-gold {
            background: linear-gradient(135deg, #bf8511 0%, #eab308 100%);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 20px rgba(191, 133, 17, 0.3);
        }

        .btn-gold:active {
            transform: scale(0.95);
        }

        /* Scroll Customizado */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #0099ff; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12 pb-32">

    <div class="max-w-xl mx-auto space-y-10">
        
        <header class="flex justify-between items-start">
            <div>
                <p class="text-[#0099ff] font-black uppercase text-[10px] tracking-[0.2em] mb-1 italic">E-CLUB OFFICIAL</p>
                <h1 id="nome-promoter" class="text-5xl font-black italic uppercase tracking-tighter leading-none">---</h1>
            </div>
            <button onclick="sair()" class="bg-red-900/20 text-red-500 border border-red-900/30 px-6 py-2 rounded-2xl font-black text-[10px] uppercase italic">Sair</button>
        </header>

        <section class="space-y-6">
            <div class="flex items-center gap-3">
                <span class="w-8 h-[2px] bg-blue-500"></span>
                <h2 class="text-blue-400 font-black italic uppercase text-xs tracking-widest">
                    📈 PERFORMANCE REALTIME
                </h2>
            </div>
            
            <div id="lista-eventos" class="space-y-4">
                <div class="animate-pulse text-zinc-800 font-black text-center py-10 uppercase italic">Sincronizando dados...</div>
            </div>
        </section>

    </div>

    <footer id="footer-acoes" class="fixed bottom-0 left-0 w-full p-5 flex gap-3 bg-black/90 backdrop-blur-xl border-t border-white/5 hidden">
        <button id="btn-abrir-link" class="flex-grow btn-gold py-6 rounded-[2rem] text-sm font-black shadow-2xl">
            ABRIR MEU LINK
        </button>
        <button id="btn-copiar" class="btn-gold px-8 rounded-[2rem] shadow-2xl flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2" />
            </svg>
        </button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Recupera o login do promoter
        const loginSalvo = localStorage.getItem('promoter_login') || new URLSearchParams(window.location.search).get('user');

        if (!loginSalvo) {
            window.location.href = 'login.html'; // Redireciona se não houver login
        }

        // --- MONITORAMENTO DE STATUS E DADOS EM TEMPO REAL ---
        onSnapshot(doc(db, "promoters", loginSalvo.toLowerCase()), (snap) => {
            if (snap.exists()) {
                const dados = snap.data();
                document.getElementById('nome-promoter').innerText = dados.nome;

                const footer = document.getElementById('footer-acoes');
                
                // TRAVA MASTER: Se for 'visualizar', remove os botões da tela
                if (dados.tipo === 'visualizar') {
                    footer.classList.add('hidden'); 
                } else {
                    footer.classList.remove('hidden');
                    configurarLinks(dados);
                }

                carregarPerformance(dados.nome);
            } else {
                alert("Promoter não encontrado!");
            }
        });

        async function carregarPerformance(nomePromoter) {
            const container = document.getElementById('lista-eventos');
            
            // Busca Eventos e Reservas
            const qEventos = query(collection(db, "eventos"), where("ativo", "==", true));
            const snapEv = await getDocs(qEventos);
            
            const qReservas = query(collection(db, "lista_eventos"));
            const snapRes = await getDocs(qReservas);
            const todasReservas = snapRes.docs.map(d => d.data());

            if (snapEv.empty) {
                container.innerHTML = '<p class="text-zinc-600 font-bold text-center py-10 uppercase italic">Nenhum evento ativo no momento.</p>';
                return;
            }

            container.innerHTML = snapEv.docs.map(docEv => {
                const ev = docEv.data();
                const minhas = todasReservas.filter(r => r.evento === ev.nome && r.promoter.toUpperCase() === nomePromoter.toUpperCase()).length;
                const totalGeral = todasReservas.filter(r => r.evento === ev.nome).length;

                return `
                <div class="card-evento p-8 flex justify-between items-center">
                    <div class="space-y-1">
                        <h3 class="text-2xl font-black uppercase italic tracking-tighter leading-tight">${ev.nome}</h3>
                        <p class="text-zinc-500 font-bold text-[10px] uppercase tracking-widest">${ev.data.split('-').reverse().join('/')}</p>
                    </div>
                    <div class="flex gap-8 items-center border-l border-white/5 pl-8">
                        <div class="text-center">
                            <p class="text-3xl font-black text-blue-400 leading-none">${minhas}</p>
                            <p class="text-[8px] font-black text-blue-400/50 uppercase tracking-widest mt-2">MINHAS</p>
                        </div>
                        <div class="text-center">
                            <p class="text-3xl font-black text-white/20 leading-none">${totalGeral}</p>
                            <p class="text-[8px] font-black text-white/10 uppercase tracking-widest mt-2">GERAL</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function configurarLinks(dados) {
            const meuLink = `https://andrezinhoeclub.github.io/lista-ecluboficial/?p=${dados.nome.toLowerCase()}`;
            
            document.getElementById('btn-abrir-link').onclick = () => window.open(meuLink, '_blank');
            document.getElementById('btn-copiar').onclick = () => {
                navigator.clipboard.writeText(meuLink);
                alert("LINK COPIADO COM SUCESSO!");
            };
        }

        window.sair = () => {
            localStorage.removeItem('promoter_login');
            window.location.reload();
        };

    </script>
</body>
</html>
