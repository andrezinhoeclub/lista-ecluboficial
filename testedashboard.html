<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESTE DASHBOARD | E-CLUB</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; }
        .glass-card { background: rgba(18, 18, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 2.5rem; }
        .btn-menu { background: #18181b; border: 1px solid #27272a; transition: 0.3s; color: #71717a; }
        .btn-menu.active { background: #eab308; color: #000; font-weight: 800; border-color: #fbbf24; box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
        .btn-menu.active-danger { background: #ef4444; color: #fff; font-weight: 800; border-color: #f87171; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
        .scroll-x { display: flex; overflow-x: auto; gap: 1rem; padding: 10px 5px 20px 5px; scroll-behavior: smooth; }
        .scroll-x::-webkit-scrollbar { height: 6px; }
        .scroll-x::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
        .event-bubble { flex: 0 0 auto; width: 280px; background: #0c0c0e; border: 1px solid #1a1a1c; border-radius: 2rem; transition: 0.3s; }
        input, select, textarea { background-color: #0c0c0e !important; border: 1px solid #27272a !important; color: white !important; outline: none; transition: 0.3s; }
        .mini-capa { width: 100%; height: 80px; object-fit: cover; border-bottom: 1px solid #1a1a1c; opacity: 0.6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 w-auto">
                <div>
                    <h1 class="text-2xl font-black uppercase italic tracking-tighter text-yellow-500 leading-none">TESTE CENTER</h1>
                    <p class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1 italic text-white">AMBIENTE DE TESTE PIX</p>
                </div>
            </div>
            <nav class="flex bg-zinc-900/50 p-1.5 rounded-2xl border border-zinc-800 overflow-x-auto">
                <button onclick="trocarAba('aba-festas', this, 'normal')" class="btn-menu active px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap">Eventos</button>
                <button onclick="trocarAba('aba-equipe', this, 'normal')" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap">Equipe</button>
                <button onclick="trocarAba('aba-config', this, 'danger')" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap text-red-500">Ajustes</button>
            </nav>
        </header>

        <section id="aba-festas" class="space-y-8 text-white">
            <div class="glass-card p-8 border-l-4 border-l-blue-500">
                <h2 class="text-blue-500 font-black uppercase italic text-xl mb-8 tracking-tighter text-white">Configurar Evento (Teste PIX)</h2>
                <form id="formEvento" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="hidden" id="edit_evento_id">
                    <input type="text" id="nome_festa" placeholder="Nome do Evento" class="p-4 rounded-2xl font-bold md:col-span-3 text-white" required>
                    <input type="date" id="data_festa" class="p-4 rounded-2xl font-bold uppercase text-xs text-white" required>
                    
                    <input type="text" id="valor_casal" placeholder="Casal R$" class="p-4 rounded-2xl font-bold text-white">
                    <input type="text" id="valor_solteiro" placeholder="Solteiro R$" class="p-4 rounded-2xl font-bold text-white">
                    <input type="text" id="desc_casal" placeholder="Casal Aniv R$" class="p-4 rounded-2xl font-bold text-purple-400">
                    <input type="text" id="desc_solteiro" placeholder="Solteiro Aniv R$" class="p-4 rounded-2xl font-bold text-purple-400">
                    
                    <input type="url" id="link_pag_casal" placeholder="Link Mercado Pago (Casal)" class="md:col-span-2 p-4 rounded-2xl font-bold text-yellow-500 border-yellow-500/20">
                    <input type="url" id="link_pag_solteiro" placeholder="Link Mercado Pago (Solteiro)" class="md:col-span-2 p-4 rounded-2xl font-bold text-yellow-500 border-yellow-500/20">
                    
                    <input type="url" id="url_banner" placeholder="URL da Capa" class="md:col-span-4 p-4 rounded-2xl font-bold text-white">
                    <button type="submit" class="md:col-span-4 bg-blue-600 text-white font-black py-5 rounded-3xl uppercase text-sm hover:bg-blue-500 transition-all">Salvar Evento com Links</button>
                </form>
            </div>
            <div id="grid-eventos-config" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="aba-equipe" class="hidden space-y-12 text-white">
             <div id="lista-promoters" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <section id="aba-config" class="hidden space-y-8 text-white">
            <div class="glass-card p-8 border-l-4 border-l-red-500">
                <h2 class="text-red-500 font-black uppercase italic text-xl mb-8 tracking-tighter">Modo Teste Portaria</h2>
                <button id="btnModoTeste" onclick="toggleModoTeste()" class="w-full bg-blue-600 text-white text-[11px] font-black py-4 rounded-xl uppercase hover:bg-blue-500 transition-all tracking-widest">🔓 LIBERAR TESTE</button>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, setDoc, addDoc, updateDoc, getDocs, query, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let dadosEventos = []; let modoTesteAtivo = false;

        window.trocarAba = (id, btn, type) => { 
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); 
            document.querySelectorAll('.btn-menu').forEach(x => { x.classList.remove('active'); x.classList.remove('active-danger'); }); 
            document.getElementById(id).classList.remove('hidden'); 
            if (type === 'danger') btn.classList.add('active-danger'); else btn.classList.add('active'); 
        };

        onSnapshot(collection(db, "eventos"), snap => { 
            dadosEventos = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderizarGridConfig();
        });

        function renderizarGridConfig() {
            const grid = document.getElementById('grid-eventos-config');
            grid.innerHTML = dadosEventos.map(ev => `
                <div class="glass-card p-5">
                    <h4 class="text-xs font-black uppercase text-white truncate mb-4">${ev.nome}</h4>
                    <p class="text-[9px] text-zinc-500 mb-4">Link Casal: ${ev.link_pag_casal ? '✅' : '❌'} | Link Solteiro: ${ev.link_pag_solteiro ? '✅' : '❌'}</p>
                    <button onclick="prepararEdicaoEvento('${ev.id}')" class="text-blue-500 font-bold text-[9px] uppercase">Editar Links</button>
                </div>`).join('');
        }

        window.prepararEdicaoEvento = (id) => {
            const ev = dadosEventos.find(e => e.id === id);
            document.getElementById('edit_evento_id').value = ev.id;
            document.getElementById('nome_festa').value = ev.nome;
            document.getElementById('data_festa').value = ev.data;
            document.getElementById('valor_casal').value = ev.valor_casal || "";
            document.getElementById('valor_solteiro').value = ev.valor_solteiro || "";
            document.getElementById('desc_casal').value = ev.desc_casal || "";
            document.getElementById('desc_solteiro').value = ev.desc_solteiro || "";
            document.getElementById('url_banner').value = ev.imagem || "";
            document.getElementById('link_pag_casal').value = ev.link_pag_casal || "";
            document.getElementById('link_pag_solteiro').value = ev.link_pag_solteiro || "";
        };

        document.getElementById('formEvento').addEventListener('submit', async e => {
            e.preventDefault(); const id = document.getElementById('edit_evento_id').value;
            const d = { 
                nome: document.getElementById('nome_festa').value, 
                data: document.getElementById('data_festa').value, 
                valor_casal: document.getElementById('valor_casal').value, 
                valor_solteiro: document.getElementById('valor_solteiro').value, 
                desc_casal: document.getElementById('desc_casal').value, 
                desc_solteiro: document.getElementById('desc_solteiro').value, 
                imagem: document.getElementById('url_banner').value,
                link_pag_casal: document.getElementById('link_pag_casal').value, 
                link_pag_solteiro: document.getElementById('link_pag_solteiro').value, 
                ativo: true 
            };
            if(id) await updateDoc(doc(db, "eventos", id), d); else await addDoc(collection(db, "eventos"), d);
            e.target.reset(); alert("Festa Atualizada!");
        });
    </script>
</body>
</html>
