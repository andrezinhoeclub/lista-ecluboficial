<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB MASTER | Command Center</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; }
        .glass-card { background: rgba(18, 18, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 2.5rem; }
        .btn-menu { background: #18181b; border: 1px solid #27272a; transition: 0.3s; color: #71717a; }
        .btn-menu.active { background: #eab308; color: #000; font-weight: 800; border-color: #fbbf24; box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
        .btn-menu.active-danger { background: #ef4444; color: #fff; font-weight: 800; border-color: #f87171; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
        .scroll-x { display: flex; overflow-x: auto; gap: 1rem; padding: 10px 5px 20px 5px; scroll-behavior: smooth; }
        .scroll-x::-webkit-scrollbar { height: 6px; }
        .scroll-x::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
        .event-bubble { flex: 0 0 auto; width: 280px; background: #0c0c0e; border: 1px solid #1a1a1c; border-radius: 2rem; transition: 0.3s; }
        input, select, textarea { background-color: #0c0c0e !important; border: 1px solid #27272a !important; color: white !important; outline: none; transition: 0.3s; }
        .mini-capa { width: 100%; height: 80px; object-fit: cover; border-bottom: 1px solid #1a1a1c; opacity: 0.6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 w-auto">
                <div>
                    <h1 class="text-2xl font-black uppercase italic tracking-tighter text-yellow-500 leading-none">Command Center</h1>
                    <p class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1 italic text-white">E-CLUB MANAGEMENT</p>
                </div>
            </div>
            <nav class="flex bg-zinc-900/50 p-1.5 rounded-2xl border border-zinc-800 overflow-x-auto">
                <button onclick="trocarAba('aba-relatorios', this, 'normal')" class="btn-menu active px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap">Relatórios</button>
                <button onclick="trocarAba('aba-festas', this, 'normal')" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap">Eventos</button>
                <button onclick="trocarAba('aba-equipe', this, 'normal')" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap">Equipe</button>
                <button onclick="trocarAba('aba-aniversarios', this, 'normal')" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap text-purple-400">Listas</button>
                <button onclick="trocarAba('aba-config', this, 'danger')" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap text-red-500">Ajustes</button>
            </nav>
        </header>

        <section id="aba-relatorios" class="space-y-8">
            <div class="glass-card p-8">
                <h2 class="text-xs font-black uppercase text-yellow-500 italic mb-6 tracking-widest">Performance por Evento</h2>
                <div id="container-bolhas" class="scroll-x"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="glass-card p-8 border-t-4 border-t-yellow-500 text-center text-white">
                    <h2 class="text-xs font-black uppercase text-yellow-500 italic mb-8 tracking-widest">🏆 Pódio de Reservas</h2>
                    <div id="lista-ranking-reservas" class="space-y-4 text-left"></div>
                </div>
                <div class="glass-card p-8 border-t-4 border-t-green-500 text-center text-white">
                    <h2 class="text-xs font-black uppercase text-green-500 italic mb-8 tracking-widest">🔥 Pódio de Check-ins</h2>
                    <div id="lista-ranking-checkins" class="space-y-4 text-left"></div>
                </div>
                <div class="flex flex-col gap-8">
                    <div class="glass-card p-8 border-t-4 border-t-blue-600">
                        <h2 class="text-[10px] font-black uppercase text-blue-400 mb-4 tracking-widest">Relatório Rápido</h2>
                        <select id="filtro-promoter-excel" class="w-full p-3 rounded-xl text-[10px] font-black uppercase mb-4 text-white" onchange="gerarListaCheckins()"></select>
                        <textarea id="output-excel" readonly class="w-full h-40 rounded-2xl p-4 text-[11px] font-mono text-zinc-400 mb-4" placeholder="Dados para exportação..."></textarea>
                        <button onclick="copiarOutput()" class="w-full bg-zinc-800 text-[10px] font-black py-3 rounded-xl uppercase hover:bg-white hover:text-black transition-all mb-2">Copiar Lista</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="aba-festas" class="hidden space-y-8 text-white">
            <div class="glass-card p-8 border-l-4 border-l-blue-500">
                <h2 class="text-blue-500 font-black uppercase italic text-xl mb-8 tracking-tighter text-white">Configurar Evento</h2>
                <form id="formEvento" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="hidden" id="edit_evento_id">
                    <input type="text" id="nome_festa" placeholder="Nome do Evento" class="p-4 rounded-2xl font-bold md:col-span-3 text-white" required>
                    <input type="date" id="data_festa" class="p-4 rounded-2xl font-bold uppercase text-xs text-white" required>
                    <input type="text" id="valor_casal" placeholder="Casal R$" class="p-4 rounded-2xl font-bold text-white">
                    <input type="text" id="valor_solteiro" placeholder="Solteiro R$" class="p-4 rounded-2xl font-bold text-white">
                    <input type="text" id="desc_casal" placeholder="Casal Aniv R$" class="p-4 rounded-2xl font-bold text-purple-400">
                    <input type="text" id="desc_solteiro" placeholder="Solteiro Aniv R$" class="p-4 rounded-2xl font-bold text-purple-400">
                    <input type="url" id="url_banner" placeholder="URL da Capa" class="md:col-span-4 p-4 rounded-2xl font-bold text-white">
                    <button type="submit" class="md:col-span-4 bg-blue-600 text-white font-black py-5 rounded-3xl uppercase text-sm hover:bg-blue-500 transition-all">Salvar Evento</button>
                </form>
            </div>
            <div id="grid-eventos-config" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="aba-equipe" class="hidden space-y-12 text-white">
            <div class="glass-card p-8 border-l-4 border-l-yellow-500">
                <h2 class="text-yellow-500 font-black uppercase italic text-xl mb-8 tracking-tighter text-white">Gestão de Promoters</h2>
                <form id="formPromoter" class="flex flex-col md:flex-row gap-3 mb-10 text-white">
                    <input type="text" id="nome_promoter" placeholder="NOME DO PROMOTER" class="flex-grow p-4 rounded-2xl font-bold text-sm text-white" required>
                    <select id="tipo_promoter" class="p-4 rounded-2xl font-bold text-xs text-white">
                        <option value="padrao">LISTA PADRÃO</option>
                        <option value="aniversario">LISTA ANIVERSÁRIO (VIP)</option>
                        <option value="visualizar">APENAS VISUALIZAR</option>
                    </select>
                    <button type="submit" class="bg-yellow-600 px-10 py-4 rounded-2xl font-black uppercase text-xs text-black transition-all hover:bg-yellow-500 text-white">Adicionar</button>
                </form>
                <div id="lista-promoters" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
            <div class="glass-card p-8 border-l-4 border-l-green-500">
                <h2 class="text-green-500 font-black uppercase italic text-xl mb-8 tracking-tighter text-white">Gestão de Portaria</h2>
                <form id="formPortaria" class="flex flex-col md:flex-row gap-3 mb-10 text-white">
                    <input type="text" id="login_portaria" placeholder="NOME DO OPERADOR" class="flex-grow p-4 rounded-2xl font-bold text-sm text-white" required>
                    <button type="submit" class="bg-green-600 px-10 py-4 rounded-2xl font-black uppercase text-xs text-white hover:bg-green-500 transition-all text-white">Cadastrar</button>
                </form>
                <div id="lista-portaria" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 text-white"></div>
            </div>
        </section>

        <section id="aba-aniversarios" class="hidden space-y-8 text-white">...</section>
        <section id="aba-config" class="hidden space-y-8 text-white">...</section>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, setDoc, addDoc, updateDoc, getDocs, query, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let dadosReservas = []; let dadosEventos = []; let dadosPromoters = []; let dadosAniv = [];
        let modoTesteAtivo = false;

        window.trocarAba = (id, btn, type) => { 
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); 
            document.querySelectorAll('.btn-menu').forEach(x => {
                x.classList.remove('active');
                x.classList.remove('active-danger');
            }); 
            document.getElementById(id).classList.remove('hidden'); 
            if (type === 'danger') btn.classList.add('active-danger');
            else btn.classList.add('active'); 
        };

        onSnapshot(collection(db, "lista_eventos"), snap => { 
            dadosReservas = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderizarRelatorios();
        });

        onSnapshot(collection(db, "eventos"), snap => { 
            dadosEventos = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderizarRelatorios();
            renderizarGridConfig();
        });

        onSnapshot(collection(db, "promoters"), snap => { 
            dadosPromoters = snap.docs.map(d => ({id: d.id, ...d.data()})); 
            renderizarEquipe();
            document.getElementById('filtro-promoter-excel').innerHTML = '<option value="">Filtrar Promoter</option>' + dadosPromoters.map(p => `<option value="${p.id.toUpperCase()}">${p.nome || p.id}</option>`).join('');
        });

        // --- RENDERIZAR EQUIPE (ADICIONADO O STATUS VISUALIZAR) ---
        function renderizarEquipe() {
            document.getElementById('lista-promoters').innerHTML = dadosPromoters.map(p => {
                let tipoLabel = 'LISTA PADRÃO';
                let corBorda = 'border-l-yellow-500';
                
                if (p.tipo === 'aniversario') {
                    tipoLabel = 'LISTA ANIVERSÁRIO (VIP)';
                } else if (p.tipo === 'visualizar') {
                    tipoLabel = 'APENAS VISUALIZAR';
                    corBorda = 'border-l-blue-500';
                }

                const senhaVisivel = p.senha ? p.senha : 'NÃO CADASTRADA';
                return `
                <div class="glass-card p-6 flex flex-col gap-2 mb-2 border-l-4 ${corBorda}">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-xs font-black uppercase text-white">${p.nome || p.id}</p>
                            <p class="text-[9px] text-yellow-500 font-bold mt-1 italic">SENHA: ${senhaVisivel}</p>
                            <p class="text-[8px] text-zinc-500 font-black mt-1 uppercase">${tipoLabel}</p>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="editarPromoter('${p.id}', '${p.tipo}')" class="text-blue-400 text-[10px] font-black uppercase">Editar</button>
                            <button onclick="removerItem('promoters', '${p.id}')" class="text-red-500 text-[10px] font-black uppercase">✕</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // --- EDITAR PROMOTER (INCLUINDO OPÇÃO VISUALIZAR) ---
        window.editarPromoter = async (id, tipoAtual) => {
            const op = prompt(`⚙️ EDITAR PROMOTER: ${id.toUpperCase()}\n\n1 - LISTA PADRÃO\n2 - LISTA ANIVERSÁRIO\n3 - APENAS VISUALIZAR\n4 - ALTERAR SENHA\n\nDigite a opção (1, 2, 3 ou 4):`);
            if (!op) return;
            let updates = {};
            if (op === '1') updates.tipo = 'padrao';
            if (op === '2') updates.tipo = 'aniversario';
            if (op === '3') updates.tipo = 'visualizar';
            if (op === '4') {
                const s = prompt("Nova senha:");
                if (s) updates.senha = s.trim();
            }
            if (Object.keys(updates).length > 0) await updateDoc(doc(db, "promoters", id), updates);
        };

        // ... O restante das suas funções de Relatórios, Eventos e Remoção continuam exatamente iguais ...

        document.getElementById('formPromoter').addEventListener('submit', async e => {
            e.preventDefault(); 
            const n = document.getElementById('nome_promoter').value.trim(); 
            const t = document.getElementById('tipo_promoter').value;
            await setDoc(doc(db, "promoters", n.toLowerCase()), { nome: n, tipo: t, ativo: true }, { merge: true });
            e.target.reset();
        });

        window.removerItem = async (c, i) => { if(confirm("Apagar?")) await deleteDoc(doc(db, c, i)); };
        
        // (As funções renderizarRelatorios e renderizarGridConfig que você já tinha no original devem ser mantidas aqui)
    </script>
</body>
</html>
