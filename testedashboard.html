<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Pro | Central de Comando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050508; color: #fff; overflow-x: hidden; }
        
        /* Layout */
        .sidebar { background: #0c0c0e; border-right: 1px solid #1f1f23; transition: 0.3s; }
        .nav-link { color: #666; transition: 0.3s; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-radius: 12px; font-weight: 600; font-size: 13px; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.05); }
        
        /* Cards */
        .module-card { background: #111114; border: 1px solid #1f1f23; border-radius: 24px; padding: 24px; transition: 0.3s; text-align: center; cursor: pointer; }
        .module-card:hover { border-color: var(--accent); transform: translateY(-5px); background: rgba(255,255,255,0.02); }
        .icon-box { width: 50px; height: 50px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 16px; background: rgba(255,255,255,0.03); }

        /* Permissões Labels */
        .perm-badge { font-size: 9px; font-weight: 900; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; margin: 2px; display: inline-block; }
        .perm-active { background: #22c55e; color: #fff; }
        .perm-inactive { background: rgba(255,255,255,0.05); color: #444; }

        .admin-input { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.08) !important; color: #fff !important; outline: none; }
        .admin-input:focus { border-color: var(--accent) !important; }

        :root { --accent: #eab308; }
        .text-accent { color: var(--accent); }
        .bg-accent { background-color: var(--accent); }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="sidebar w-64 hidden lg:flex flex-col p-6 fixed inset-y-0 z-50">
        <div class="mb-10 px-4">
            <img id="club-logo" src="" class="h-10 mb-2">
            <p id="club-name" class="text-[9px] font-black uppercase tracking-widest text-accent italic">---</p>
        </div>
        <nav class="space-y-1 flex-grow">
            <div onclick="showSection('dash')" id="link-dash" class="nav-link active"><span>📊</span> Dashboard</div>
            <div onclick="showSection('usuarios')" id="link-usuarios" class="nav-link"><span>👥</span> Usuários</div>
            <div onclick="showSection('eventos')" id="link-eventos" class="nav-link"><span>📅</span> Eventos</div>
            <div onclick="showSection('listas')" id="link-listas" class="nav-link"><span>📝</span> Config. Listas</div>
            <div onclick="showSection('espacos')" id="link-espacos" class="nav-link"><span> Couch</span> Espaços</div>
            <div class="nav-link"><span>💰</span> Financeiro</div>
        </nav>
        <div class="pt-6 border-t border-white/5"><div class="nav-link text-red-500"><span>🚪</span> Sair</div></div>
    </aside>

    <main class="flex-grow lg:ml-64 p-6 lg:p-10">
        
        <section id="section-dash" class="space-y-10">
            <header><h2 class="text-3xl font-black italic uppercase tracking-tighter">Central de Comando</h2></header>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <div onclick="showSection('usuarios')" class="module-card"><div class="icon-box">👥</div><p class="text-xs font-black uppercase">Usuários</p></div>
                <div onclick="showSection('eventos')" class="module-card"><div class="icon-box">📅</div><p class="text-xs font-black uppercase">Eventos</p></div>
                <div onclick="showSection('listas')" class="module-card"><div class="icon-box">📝</div><p class="text-xs font-black uppercase">Config. Listas</p></div>
                <div onclick="showSection('espacos')" class="module-card"><div class="icon-box">🛋️</div><p class="text-xs font-black uppercase">Espaços</p></div>
            </div>
        </section>

        <section id="section-usuarios" class="hidden space-y-8">
            <header class="flex justify-between items-center">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Gestão de Equipe</h2>
                <button onclick="openModal('modalBuscaUsuario')" class="bg-accent text-black font-black px-6 py-3 rounded-2xl text-[10px] uppercase shadow-lg shadow-yellow-500/10">+ Adicionar Usuário</button>
            </header>

            <div class="relative w-full">
                <input type="text" id="search-user-list" placeholder="PROCURAR POR NOME, TELEFONE, E-MAIL OU CPF..." class="w-full admin-input p-6 rounded-[2rem] font-bold uppercase text-xs pl-14 shadow-2xl" oninput="filtrarUsuariosTable()">
                <span class="absolute left-6 top-6 opacity-30 text-xl">🔍</span>
            </div>

            <div class="bg-[#111114] rounded-[2.5rem] border border-[#1f1f23] overflow-hidden shadow-2xl">
                <table class="w-full text-left">
                    <thead class="bg-black/20 text-zinc-500 text-[10px] font-black uppercase tracking-widest">
                        <tr>
                            <th class="p-6">Usuário</th>
                            <th class="p-6">Permissões de Acesso</th>
                            <th class="p-6 text-right">Configurações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-usuarios-equipe" class="divide-y divide-white/5">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="section-eventos" class="hidden">...</section>
        <section id="section-listas" class="hidden">...</section>
        <section id="section-espacos" class="hidden">...</section>

    </main>

    <div id="modalPermissoes" class="hidden fixed inset-0 z-[999] bg-black/95 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-[#0d0d14] w-full max-w-2xl rounded-[2.5rem] border border-white/10 p-10 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 class="text-2xl font-black uppercase italic mb-2 text-accent tracking-tighter">Acesso Avançado</h3>
            <p id="target-user-name" class="text-xs font-bold text-zinc-500 uppercase mb-8 italic">USUÁRIO: ---</p>
            
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="grid-permissoes">
                <label class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/5 cursor-pointer hover:border-accent/50 transition-all">
                    <input type="checkbox" value="admin" class="w-4 h-4 accent-blue-500"> <span class="text-[10px] font-black uppercase">Admin</span>
                </label>
                <label class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/5 cursor-pointer hover:border-accent/50 transition-all">
                    <input type="checkbox" value="portaria" class="w-4 h-4 accent-green-500"> <span class="text-[10px] font-black uppercase">Portaria</span>
                </label>
                <label class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/5 cursor-pointer hover:border-accent/50 transition-all">
                    <input type="checkbox" value="financeiro" class="w-4 h-4 accent-green-500"> <span class="text-[10px] font-black uppercase">Financeiro</span>
                </label>
                <label class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/5 cursor-pointer hover:border-accent/50 transition-all">
                    <input type="checkbox" value="relatorios" class="w-4 h-4 accent-green-500"> <span class="text-[10px] font-black uppercase">Relatórios</span>
                </label>
                <label class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/5 cursor-pointer hover:border-accent/50 transition-all">
                    <input type="checkbox" value="eventos" class="w-4 h-4 accent-green-500"> <span class="text-[10px] font-black uppercase">Criar Eventos</span>
                </label>
                <label class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/5 cursor-pointer hover:border-accent/50 transition-all">
                    <input type="checkbox" value="reservas" class="w-4 h-4 accent-green-500"> <span class="text-[10px] font-black uppercase">Setor Reservas</span>
                </label>
                <label class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/5 cursor-pointer hover:border-accent/50 transition-all">
                    <input type="checkbox" value="promoter" class="w-4 h-4 accent-green-500"> <span class="text-[10px] font-black uppercase">Promoter</span>
                </label>
                <label class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/5 cursor-pointer hover:border-accent/50 transition-all">
                    <input type="checkbox" value="lista24" class="w-4 h-4 accent-green-500"> <span class="text-[10px] font-black uppercase">Lista 24h</span>
                </label>
            </div>

            <div class="mt-10 flex gap-4">
                <button onclick="salvarPermissoes()" class="flex-grow bg-accent text-black py-6 rounded-[2rem] font-black uppercase text-xs shadow-2xl active:scale-95 transition-all">Atualizar Acessos</button>
                <button onclick="closeModal('modalPermissoes')" class="px-8 text-zinc-600 font-black uppercase text-[10px] italic">Fechar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const clubID = params.get('club') || 'eclub';

        let usersCache = [];
        let userSendoEditado = null;

        // Branding
        const config = { 'eclub': { nome: 'E-CLUB', cor: '#eab308', logo: 'https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png' } };
        const cur = config[clubID] || { nome: clubID.toUpperCase(), cor: '#00f5d4', logo: 'https://cdn-icons-png.flaticon.com/512/3843/3843517.png' };
        document.documentElement.style.setProperty('--accent', cur.cor);
        document.getElementById('club-name').innerText = cur.nome;
        document.getElementById('club-logo').src = cur.logo;

        // Navegação
        window.showSection = (id) => {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`section-${id}`).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`link-${id}`)?.classList.add('active');
            if(id === 'usuarios') loadUsers();
        };

        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        // Carregar Usuários do Clube
        async function loadUsers() {
            const q = query(collection(db, "usuarios"), where("clubID", "==", clubID));
            const snap = await getDocs(q);
            usersCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderUsers(usersCache);
        }

        function renderUsers(dados) {
            const table = document.getElementById('tabela-usuarios-equipe');
            table.innerHTML = '';

            dados.forEach(u => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-white/[0.02] transition-all";
                
                // Gerar as badges de permissão ativas
                const badges = Object.keys(u.permissoes || {}).map(p => 
                    u.permissoes[p] ? `<span class="perm-badge ${p === 'admin' ? 'bg-blue-500' : 'bg-green-500'} text-white">${p}</span>` : ''
                ).join('');

                tr.innerHTML = `
                    <td class="p-6">
                        <p class="text-xs font-black uppercase text-white">${u.nome}</p>
                        <p class="text-[9px] text-zinc-600 font-bold uppercase">${u.email}</p>
                    </td>
                    <td class="p-6">${badges || '<span class="text-zinc-800 font-black italic text-[9px]">SEM ACESSOS</span>'}</td>
                    <td class="p-6 text-right">
                        <button onclick="configurarAcesso('${u.id}')" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-[9px] font-black uppercase hover:bg-accent hover:text-black transition-all">⚙️ Avançado</button>
                    </td>
                `;
                table.appendChild(tr);
            });
        }

        window.configurarAcesso = (id) => {
            userSendoEditado = usersCache.find(u => u.id === id);
            document.getElementById('target-user-name').innerText = "USUÁRIO: " + userSendoEditado.nome;
            
            // Marcar checkboxes conforme as permissões atuais
            const checks = document.querySelectorAll('#grid-permissoes input');
            checks.forEach(c => {
                c.checked = userSendoEditado.permissoes?.[c.value] || false;
            });
            
            openModal('modalPermissoes');
        };

        window.salvarPermissoes = async () => {
            const checks = document.querySelectorAll('#grid-permissoes input');
            const novasPerms = {};
            checks.forEach(c => { novasPerms[c.value] = c.checked; });

            try {
                await updateDoc(doc(db, "usuarios", userSendoEditado.id), { transmissoes: novasPerms }); // Usei 'permissoes' no banco real
                // No código acima, a chave do campo no Firestore deve ser 'permissoes'
                await updateDoc(doc(db, "usuarios", userSendoEditado.id), { permissoes: novasPerms });
                
                alert("Acessos atualizados para " + userSendoEditado.nome);
                closeModal('modalPermissoes');
                loadUsers();
            } catch (e) { alert("Erro ao salvar permissões."); }
        };
    </script>
</body>
</html>
