<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABRE A PORTA | Painel do Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; }
        .glass-card { background: rgba(18, 18, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 1.5rem; }
        input, select { background-color: #0c0c0e !important; border: 1px solid #27272a !important; color: white !important; outline: none; }
        input:focus { border-color: #3b82f6 !important; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loading" class="fixed inset-0 bg-black flex items-center justify-center z-50">
        <p class="animate-pulse font-black italic uppercase text-blue-500">Carregando Painel...</p>
    </div>

    <div id="main-content" class="max-w-6xl mx-auto hidden space-y-8">
        
        <header class="flex flex-col md:flex-row justify-between items-center bg-zinc-900/50 p-6 rounded-3xl border border-white/5">
            <div class="flex items-center gap-4">
                <img id="client-logo" src="" class="h-12 w-12 rounded-full object-cover border-2 border-blue-500">
                <div>
                    <h1 id="client-name" class="text-xl font-black uppercase italic leading-none">NOME DO CLUBE</h1>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-1">Painel Administrativo</p>
                </div>
            </div>
            <div class="mt-4 md:mt-0 flex gap-2">
                <button onclick="location.reload()" class="bg-zinc-800 p-3 rounded-xl hover:bg-zinc-700 transition-all">🔄</button>
                <a id="btn-ver-lista" target="_blank" class="bg-blue-600 text-white font-black px-6 py-3 rounded-xl uppercase text-xs hover:bg-blue-500 transition-all">Ver Minha Lista</a>
            </div>
        </header>

        <div class="flex gap-8 border-b border-white/5 px-2">
            <button class="pb-4 font-black uppercase italic text-xs tracking-widest tab-active">Gerenciar Eventos</button>
            <button class="pb-4 font-black uppercase italic text-xs tracking-widest text-zinc-600">Ver Reservas</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="glass-card p-6 h-fit">
                <h2 class="text-white font-black uppercase italic mb-6">➕ Novo Evento</h2>
                <form id="formEvento" class="space-y-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-black uppercase text-zinc-500 ml-2">Título da Festa</label>
                        <input type="text" id="nome_evento" placeholder="EX: NOITE DA NOSTALGIA" class="p-4 rounded-xl font-bold uppercase" required>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-black uppercase text-zinc-500 ml-2">Link da Imagem (Banner)</label>
                        <input type="url" id="img_evento" placeholder="https://..." class="p-4 rounded-xl text-xs" required>
                    </div>
                    <button type="submit" id="btnSalvar" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase text-sm mt-2 hover:bg-blue-500 shadow-lg shadow-blue-900/20">Publicar Evento</button>
                </form>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <h2 class="text-white font-black uppercase italic">📅 Seus Eventos Publicados</h2>
                <div id="grid-eventos" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", authDomain: "teste-de-reserva.firebaseapp.com", projectId: "teste-de-reserva", storageBucket: "teste-de-reserva.appspot.com", messagingSenderId: "163395694876", appId: "1:163395694876:web:8b1116a0483af951548ad9" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const clubeId = params.get('clube');

        async function iniciarPainel() {
            if (!clubeId) {
                alert("Erro: ID do cliente não fornecido.");
                return;
            }

            const docRef = doc(db, "clientes_revenda", clubeId);
            const snap = await getDoc(docRef);

            if (snap.exists() && snap.data().ativo) {
                const dados = snap.data();
                document.getElementById('client-name').innerText = dados.nome_fantasia;
                document.getElementById('client-logo').src = dados.logo_url || 'https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png';
                document.getElementById('btn-ver-lista').href = `listas.html?clube=${clubeId}`;
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                
                carregarEventos();
            } else {
                document.body.innerHTML = "<div class='p-20 text-center font-black uppercase'>Acesso Negado ou Licença Expirada.</div>";
            }
        }

        function carregarEventos() {
            const q = query(collection(db, "eventos"), where("clube_id", "==", clubeId));
            onSnapshot(q, (snap) => {
                const grid = document.getElementById('grid-eventos');
                if(snap.empty) {
                    grid.innerHTML = "<p class='text-zinc-600 text-xs font-bold uppercase'>Nenhum evento cadastrado.</p>";
                    return;
                }

                grid.innerHTML = snap.docs.map(d => {
                    const ev = d.data();
                    return `
                    <div class="glass-card overflow-hidden flex flex-col">
                        <img src="${ev.imagem}" class="h-32 w-full object-cover opacity-50">
                        <div class="p-5 flex flex-col justify-between flex-grow">
                            <h3 class="font-black uppercase italic text-sm mb-4">${ev.nome}</h3>
                            <div class="flex gap-2">
                                <button onclick="toggleEvento('${d.id}', ${ev.ativo})" class="flex-1 py-2 rounded-lg text-[9px] font-black uppercase border ${ev.ativo ? 'border-green-500/50 text-green-500' : 'border-red-500/50 text-red-500'}">
                                    ${ev.ativo ? 'Ativo' : 'Pausado'}
                                </button>
                                <button onclick="excluirEvento('${d.id}')" class="bg-zinc-800 p-2 rounded-lg text-[9px] font-black uppercase">Excluir</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            });
        }

        document.getElementById('formEvento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.disabled = true; btn.innerText = "Publicando...";

            try {
                await addDoc(collection(db, "eventos"), {
                    clube_id: clubeId,
                    nome: document.getElementById('nome_evento').value.toUpperCase(),
                    imagem: document.getElementById('img_evento').value,
                    ativo: true,
                    data_criacao: new Date().toISOString()
                });
                e.target.reset();
            } catch (err) {
                alert("Erro ao salvar.");
            } finally {
                btn.disabled = false; btn.innerText = "Publicar Evento";
            }
        });

        window.toggleEvento = async (id, status) => {
            await updateDoc(doc(db, "eventos", id), { ativo: !status });
        };

        window.excluirEvento = async (id) => {
            if(confirm("Deseja apagar este evento?")) await deleteDoc(doc(db, "eventos", id));
        };

        iniciarPainel();
    </script>
</body>
</html>
