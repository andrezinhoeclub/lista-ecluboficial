<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Manager | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #334155; }
        
        .sidebar { background: #1e293b; }
        .nav-link { color: #94a3b8; transition: 0.3s; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-radius: 12px; font-weight: 600; font-size: 13px; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.1); }

        .glass-panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .admin-input { background: #fff !important; border: 1px solid #e2e8f0 !important; color: #1e293b !important; outline: none; transition: 0.3s; }
        .admin-input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        /* Estilo do Calendário Light */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #fff; border: 1px solid #e2e8f0; border-radius: 1rem; overflow: hidden; }
        .calendar-day { min-height: 100px; border: 0.5px solid #f1f5f9; padding: 10px; position: relative; }
        .day-header { background: #f8fafc; padding: 12px; text-align: center; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; }
        .event-tag { background: #334155; color: #fff; font-size: 9px; padding: 4px 8px; border-radius: 6px; margin-top: 5px; font-weight: 700; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="sidebar w-64 hidden lg:flex flex-col p-6 fixed inset-y-0 z-50">
        <div class="mb-10 px-4 flex flex-col items-center">
            <img id="club-logo" src="" class="h-12 mb-2 object-contain">
            <p id="club-name" class="text-[10px] font-extrabold uppercase text-blue-400">ADMIN CENTRAL</p>
        </div>
        <nav class="space-y-1 flex-grow">
            <div onclick="showSection('dash')" class="nav-link active"><span>🏠</span> Dashboard</div>
            <div onclick="showSection('eventos')" class="nav-link"><span>📅</span> Eventos</div>
            <div onclick="showSection('listas')" class="nav-link"><span>📝</span> Config. Listas</div>
        </nav>
    </aside>

    <main class="flex-grow lg:ml-64 p-6 lg:p-12">
        <section id="section-dash" class="space-y-10">
            <h2 class="text-3xl font-extrabold text-slate-800">Olá, <span id="club-title-display">---</span></h2>
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-6">
                <div onclick="showSection('eventos')" class="glass-panel p-8 text-center cursor-pointer hover:border-blue-500 transition-all">
                    <span class="text-3xl block mb-2">📅</span>
                    <p class="text-xs font-extrabold uppercase text-slate-500">Eventos</p>
                </div>
            </div>
        </section>

        <section id="section-eventos" class="hidden space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-extrabold text-slate-800 italic">Calendário</h2>
                <button onclick="document.getElementById('modalEvento').classList.remove('hidden')" class="bg-blue-600 text-white px-6 py-3 rounded-xl text-xs font-extrabold uppercase">+ Novo Evento</button>
            </div>
            <div class="calendar-grid">
                <div class="day-header">Dom</div><div class="day-header">Seg</div><div class="day-header">Ter</div><div class="day-header">Qua</div><div class="day-header">Qui</div><div class="day-header">Sex</div><div class="day-header">Sáb</div>
                <div id="calendar-body" class="contents"></div>
            </div>
        </section>
    </main>

    <div id="modalEvento" class="hidden fixed inset-0 z-[999] bg-slate-900/70 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-10 shadow-2xl">
            <h3 class="text-xl font-extrabold text-slate-800 mb-8 uppercase italic">Novo Evento</h3>
            <form id="formEvento" class="space-y-5">
                <input type="text" id="ev-nome" placeholder="NOME DO EVENTO" class="w-full admin-input p-4 rounded-xl font-bold uppercase text-xs" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="ev-data" class="w-full admin-input p-4 rounded-xl font-bold text-xs" required>
                    <input type="time" id="ev-hora" class="w-full admin-input p-4 rounded-xl font-bold text-xs" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-extrabold text-slate-400 uppercase">Banner do Evento</label>
                    <input type="file" id="ev-file" accept="image/*" class="hidden" onchange="document.getElementById('lb-ev').innerText = this.files[0].name">
                    <label for="ev-file" class="flex flex-col items-center justify-center p-6 border-2 border-dashed border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50">
                        <span class="text-xl mb-1">📸</span>
                        <span id="lb-ev" class="text-[9px] font-extrabold text-slate-500 uppercase">Escolher Foto</span>
                    </label>
                </div>
                <textarea id="ev-info" placeholder="DESCRIÇÃO / ATRAÇÕES" class="w-full admin-input p-4 rounded-xl font-bold text-[10px] h-20 uppercase resize-none"></textarea>
                <div class="flex gap-4 pt-4">
                    <button type="submit" id="btnSalvar" class="flex-grow bg-blue-600 text-white py-5 rounded-2xl font-extrabold uppercase text-xs">Salvar Evento</button>
                    <button type="button" onclick="document.getElementById('modalEvento').classList.add('hidden')" class="px-6 text-slate-400 font-extrabold text-[10px] uppercase">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const params = new URLSearchParams(window.location.search);
        const clubID = params.get('club') || 'eclub';

        // Branding
        document.getElementById('club-name').innerText = clubID.toUpperCase();
        document.getElementById('club-title-display').innerText = clubID.toUpperCase();

        window.showSection = (id) => {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`section-${id}`).classList.remove('hidden');
            if(id === 'eventos') loadCalendar();
        };

        // SALVAMENTO BLINDADO (Try-Catch-Finally)
        document.getElementById('formEvento').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            const file = document.getElementById('ev-file').files[0];
            
            btn.innerText = "PROCESSANDO...";
            btn.disabled = true;

            try {
                let url = "";
                if (file) {
                    // Upload com timeout manual para não travar
                    const storageRef = ref(storage, `${clubID}/eventos/${Date.now()}_${file.name}`);
                    const snapshot = await uploadBytes(storageRef, file);
                    url = await getDownloadURL(snapshot.ref);
                }

                await addDoc(collection(db, "eventos"), {
                    nome: document.getElementById('ev-nome').value.toUpperCase(),
                    data: document.getElementById('ev-data').value,
                    hora: document.getElementById('ev-hora').value,
                    info: document.getElementById('ev-info').value.toUpperCase(),
                    imagem: url,
                    clubID: clubID,
                    ativa: true,
                    criadoEm: serverTimestamp()
                });

                alert("Sucesso!");
                location.reload();

            } catch (error) {
                console.error(error);
                alert("ERRO: O upload falhou. Verifique as 'Rules' do Storage no seu Firebase.");
            } finally {
                // ISSO AQUI DESTRAVA O BOTÃO SEMPRE
                btn.innerText = "Salvar Evento";
                btn.disabled = false;
            }
        };

        async function loadCalendar() {
            const b = document.getElementById('calendar-body'); b.innerHTML = '';
            const h = new Date(); const f = new Date(h.getFullYear(), h.getMonth(), 1).getDay(); const l = new Date(h.getFullYear(), h.getMonth()+1, 0).getDate();
            for(let i=0; i<f; i++) b.innerHTML += `<div class="calendar-day bg-slate-50/50"></div>`;
            for(let d=1; d<=l; d++) {
                const day = `${h.getFullYear()}-${(h.getMonth()+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                b.innerHTML += `<div class="calendar-day" id="day-${day}"><span class="day-num">${d}</span></div>`;
            }
            const q = query(collection(db, "eventos"), where("clubID", "==", clubID));
            const s = await getDocs(q);
            s.forEach(doc => { const ev = doc.data(); const el = document.getElementById(`day-${ev.data}`); if(el) el.innerHTML += `<div class="event-tag">${ev.nome}</div>`; });
        }

        showSection('dash');
    </script>
</body>
</html>
