<section id="section-listas" class="hidden space-y-8">
    <header class="flex justify-between items-center">
        <div>
            <h2 class="text-3xl font-black italic uppercase tracking-tighter">Configuração de Listas</h2>
            <p class="text-zinc-500 text-sm font-medium">Defina valores e obrigatoriedades para cada tipo de acesso.</p>
        </div>
        <button onclick="abrirModalLista()" class="bg-accent text-black font-black px-6 py-3 rounded-2xl text-xs uppercase shadow-lg shadow-yellow-500/10">+ Criar Nova Regra</button>
    </header>

    <div class="bg-[#111114] rounded-[2.5rem] border border-[#1f1f23] overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-black/20 text-zinc-500 text-[10px] font-black uppercase tracking-widest">
                <tr>
                    <th class="p-6">Tipo de Acesso</th>
                    <th class="p-6">Exige</th>
                    <th class="p-6">Gênero</th>
                    <th class="p-6">Valores</th>
                    <th class="p-6 text-right">Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-regras-lista" class="divide-y divide-white/5">
                </tbody>
        </table>
    </div>
</section>

<div id="modalRegraLista" class="hidden fixed inset-0 z-[999] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-[#0d0d14] w-full max-w-2xl rounded-[3rem] border border-white/10 overflow-hidden shadow-2xl">
        <div class="p-8 border-b border-white/5 flex justify-between items-center">
            <h3 class="font-black uppercase italic tracking-tighter text-xl text-accent">Configurar Regra de Acesso</h3>
            <button onclick="fecharModalLista()" class="text-zinc-500 hover:text-white">✕</button>
        </div>
        
        <form id="formRegraLista" class="p-8 space-y-8">
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase text-zinc-500">Título da Lista (Ex: Casal Aniversário Sexta)</label>
                <input type="text" id="regra-nome" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-accent font-bold uppercase text-white" placeholder="NOME DA LISTA (FREE, BÔNUS, CONSUMO)" required>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <p class="text-[10px] font-black uppercase text-zinc-500">Gêneros Permitidos</p>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="check-fem" class="hidden peer">
                            <div class="px-4 py-2 rounded-full bg-white/5 border border-white/10 peer-checked:bg-pink-500 peer-checked:border-pink-500 text-[10px] font-black uppercase transition-all">♀ Feminino</div>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" id="check-masc" class="hidden peer">
                            <div class="px-4 py-2 rounded-full bg-white/5 border border-white/10 peer-checked:bg-blue-500 peer-checked:border-blue-500 text-[10px] font-black uppercase transition-all">♂ Masculino</div>
                        </label>
                    </div>
                </div>

                <div class="space-y-3">
                    <p class="text-[10px] font-black uppercase text-zinc-500">Campos Obrigatórios</p>
                    <div class="grid grid-cols-1 gap-2">
                        <label class="flex items-center gap-3 text-xs font-bold text-zinc-400"><input type="checkbox" id="req-cpf" class="accent-accent"> 🪪 CPF (Bloqueia duplicados)</label>
                        <label class="flex items-center gap-3 text-xs font-bold text-zinc-400"><input type="checkbox" id="req-tel" class="accent-accent"> 📱 Celular</label>
                        <label class="flex items-center gap-3 text-xs font-bold text-zinc-400"><input type="checkbox" id="req-nasc" class="accent-accent"> 🎂 Data de Nascimento</label>
                        <label class="flex items-center gap-3 text-xs font-bold text-zinc-400"><input type="checkbox" id="req-email" class="accent-accent"> 📧 E-mail</label>
                        <label class="flex items-center gap-3 text-xs font-bold text-zinc-400"><input type="checkbox" id="req-rg" class="accent-accent"> 🆔 RG</label>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 pt-6 border-t border-white/5">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-zinc-500">Valor Casal</label>
                    <input type="text" id="regra-v-casal" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl font-bold text-white outline-none" placeholder="R$ 120,00">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-zinc-500">Valor Solteiro</label>
                    <input type="text" id="regra-v-solteiro" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl font-bold text-white outline-none" placeholder="R$ 170,00">
                </div>
            </div>

            <button type="submit" class="w-full bg-accent text-black py-6 rounded-[2rem] font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Salvar Configuração de Lista</button>
        </form>
    </div>
</div>

<script type="module">
    // ... (Mantém o código anterior de Firebase) ...

    window.abrirModalLista = () => document.getElementById('modalRegraLista').classList.remove('hidden');
    window.fecharModalLista = () => document.getElementById('modalRegraLista').classList.add('hidden');

    // Lógica para Salvar a Regra no Firebase
    document.getElementById('formRegraLista').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.innerText = "SALVANDO..."; btn.disabled = true;

        const regra = {
            nome: document.getElementById('regra-nome').value.toUpperCase(),
            valorCasal: document.getElementById('regra-v-casal').value,
            valorSolteiro: document.getElementById('regra-v-solteiro').value,
            exige: {
                cpf: document.getElementById('req-cpf').checked,
                tel: document.getElementById('req-tel').checked,
                nascimento: document.getElementById('req-nasc').checked,
                email: document.getElementById('req-email').checked,
                rg: document.getElementById('req-rg').checked
            },
            generos: {
                fem: document.getElementById('check-fem').checked,
                masc: document.getElementById('check-masc').checked
            },
            clubID: clubID,
            ativa: true
        };

        try {
            await addDoc(collection(db, "config_listas"), regra);
            alert("Regra de lista criada com sucesso!");
            location.reload();
        } catch (err) { alert("Erro ao salvar."); btn.disabled = false; }
    });

    // Função para carregar a tabela (Chamar no showSection('listas'))
    async function carregarRegrasLista() {
        const q = query(collection(db, "config_listas"), where("clubID", "==", clubID));
        const snap = await getDocs(q);
        const container = document.getElementById('tabela-regras-lista');
        container.innerHTML = '';

        snap.forEach(doc => {
            const r = doc.data();
            const exibeExige = Object.keys(r.exige).filter(k => r.exige[k]).map(k => k.toUpperCase()).join(', ');
            
            container.innerHTML += `
                <tr class="hover:bg-white/[0.02] transition-all">
                    <td class="p-6"><span class="font-bold text-white">${r.nome}</span></td>
                    <td class="p-6 text-[10px] font-bold text-zinc-500">${exibeExige || 'NADA'}</td>
                    <td class="p-6">
                        <div class="flex gap-1">
                            ${r.generos.fem ? '<span class="bg-pink-500/20 text-pink-500 px-2 py-1 rounded-md text-[8px] font-black uppercase">Feminino</span>' : ''}
                            ${r.generos.masc ? '<span class="bg-blue-500/20 text-blue-500 px-2 py-1 rounded-md text-[8px] font-black uppercase">Masculino</span>' : ''}
                        </div>
                    </td>
                    <td class="p-6 text-xs font-black text-accent italic">C: ${r.valorCasal} | S: ${r.valorSolteiro}</td>
                    <td class="p-6 text-right">
                        <button class="text-zinc-600 hover:text-white font-black text-[10px] uppercase">Ações ▾</button>
                    </td>
                </tr>
            `;
        });
    }
</script>
