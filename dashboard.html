<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB MASTER | Command Center</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; }
        .glass-card { background: rgba(18, 18, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 2.5rem; }
        .btn-menu { background: #18181b; border: 1px solid #27272a; transition: 0.3s; color: #71717a; }
        .btn-menu.active { background: #eab308; color: #000; font-weight: 800; border-color: #fbbf24; box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
        .scroll-x { display: flex; overflow-x: auto; gap: 1rem; padding: 10px 5px 20px 5px; scroll-behavior: smooth; }
        .scroll-x::-webkit-scrollbar { height: 6px; }
        .scroll-x::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
        .event-bubble { flex: 0 0 auto; width: 280px; background: #0c0c0e; border: 1px solid #1a1a1c; border-radius: 2rem; transition: 0.3s; }
        input, select, textarea { background-color: #0c0c0e !important; border: 1px solid #27272a !important; color: white !important; outline: none; transition: 0.3s; }
        .mini-capa { width: 100%; height: 80px; object-fit: cover; border-bottom: 1px solid #1a1a1c; opacity: 0.6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 w-auto">
                <div>
                    <h1 class="text-2xl font-black uppercase italic tracking-tighter text-yellow-500 leading-none">Command Center</h1>
                    <p class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1 italic text-white">E-CLUB MANAGEMENT</p>
                </div>
            </div>
            <nav class="flex bg-zinc-900/50 p-1.5 rounded-2xl border border-zinc-800 overflow-x-auto">
                <button onclick="trocarAba('aba-relatorios', this)" class="btn-menu active px-6 py-2.5 rounded-xl text-[10px] uppercase font-black">Relatórios</button>
                <button onclick="trocarAba('aba-festas', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black">Eventos</button>
                <button onclick="trocarAba('aba-equipe', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black">Equipe</button>
                <button onclick="trocarAba('aba-aniversarios', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black text-purple-400">Aniversariantes</button>
            </nav>
        </header>

        <section id="aba-relatorios" class="space-y-8">
            <div class="glass-card p-8">
                <h2 class="text-xs font-black uppercase text-yellow-500 italic mb-6 tracking-widest">Performance por Evento</h2>
                <div id="container-bolhas" class="scroll-x"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="glass-card p-8 border-t-4 border-t-yellow-500 text-center">
                    <h2 class="text-xs font-black uppercase text-yellow-500 italic mb-8 tracking-widest">🏆 Pódio de Reservas</h2>
                    <div id="lista-ranking-reservas" class="space-y-4 text-left"></div>
                </div>
                <div class="glass-card p-8 border-t-4 border-t-green-500 text-center">
                    <h2 class="text-xs font-black uppercase text-green-500 italic mb-8 tracking-widest">🔥 Pódio de Check-ins</h2>
                    <div id="lista-ranking-checkins" class="space-y-4 text-left"></div>
                </div>
                <div class="glass-card p-8 border-t-4 border-t-blue-600">
                    <select id="filtro-promoter-excel" class="w-full p-3 rounded-xl text-[10px] font-black uppercase mb-4" onchange="gerarListaCheckins()"></select>
                    <textarea id="output-excel" readonly class="w-full h-64 rounded-2xl p-4 text-[11px] font-mono text-zinc-400 mb-4" placeholder="Lista para Excel..."></textarea>
                    <button onclick="copiarOutput()" class="w-full bg-zinc-800 text-[10px] font-black py-3 rounded-xl uppercase hover:bg-white hover:text-black">Copiar Tudo</button>
                </div>
            </div>
        </section>

        <section id="aba-festas" class="hidden space-y-8">
            <div class="glass-card p-8 border-l-4 border-l-blue-500">
                <h2 class="text-blue-500 font-black uppercase italic text-xl mb-8 tracking-tighter">Configurar Evento</h2>
                <form id="formEvento" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="hidden" id="edit_evento_id">
                    <input type="text" id="nome_festa" placeholder="Nome do Evento" class="p-4 rounded-2xl font-bold md:col-span-3" required>
                    <input type="date" id="data_festa" class="p-4 rounded-2xl font-bold uppercase text-xs" required>
                    <input type="text" id="valor_casal" placeholder="Casal R$" class="p-4 rounded-2xl font-bold">
                    <input type="text" id="valor_solteiro" placeholder="Solteiro R$" class="p-4 rounded-2xl font-bold">
                    <input type="text" id="desc_casal" placeholder="Casal Aniv R$" class="p-4 rounded-2xl font-bold text-purple-400">
                    <input type="text" id="desc_solteiro" placeholder="Solteiro Aniv R$" class="p-4 rounded-2xl font-bold text-purple-400">
                    <input type="url" id="url_banner" placeholder="URL da Capa" class="md:col-span-4 p-4 rounded-2xl font-bold">
                    <button type="submit" class="md:col-span-4 bg-blue-600 text-white font-black py-5 rounded-3xl uppercase text-sm">Salvar Evento</button>
                </form>
            </div>
            <div id="grid-eventos-config" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="aba-equipe" class="hidden space-y-12">
            <div class="glass-card p-8 border-l-4 border-l-yellow-500">
                <h2 class="text-yellow-500 font-black uppercase italic text-xl mb-8 tracking-tighter">Gestão de Promoters</h2>
                <form id="formPromoter" class="flex flex-col md:flex-row gap-3 mb-10">
                    <input type="hidden" id="edit_promoter_id">
                    <input type="text" id="nome_promoter" placeholder="NOME DO PROMOTER" class="flex-grow p-4 rounded-2xl font-bold text-sm" required>
                    <select id="tipo_promoter" class="p-4 rounded-2xl font-bold text-xs">
                        <option value="padrao">LISTA PADRÃO</option>
                        <option value="aniversario">LISTA ANIVERSÁRIO (VIP)</option>
                    </select>
                    <button type="submit" class="bg-yellow-600 px-10 py-4 rounded-2xl font-black uppercase text-xs text-black transition-all hover:bg-yellow-500 text-white">Salvar</button>
                </form>
                <div id="lista-promoters" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
            <div class="glass-card p-8 border-l-4 border-l-green-500">
                <h2 class="text-green-500 font-black uppercase italic text-xl mb-8 tracking-tighter">Gestão de Portaria</h2>
                <form id="formPortaria" class="flex flex-col md:flex-row gap-3 mb-10">
                    <input type="text" id="login_portaria" placeholder="NOME DO OPERADOR" class="flex-grow p-4 rounded-2xl font-bold text-sm" required>
                    <button type="submit" class="bg-green-600 px-10 py-4 rounded-2xl font-black uppercase text-xs text-white">Cadastrar</button>
                </form>
                <div id="lista-portaria" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
        </section>

        <section id="aba-aniversarios" class="hidden space-y-8">
            <div class="glass-card p-8 border-l-4 border-l-purple-500">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-purple-500 font-black uppercase italic text-xl tracking-tighter">Listas Criadas</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-[10px] text-zinc-500 font-black uppercase border-b border-white/5">
                                <th class="pb-4 pl-4">Aniversariante</th>
                                <th class="pb-4">Evento</th>
                                <th class="pb-4">Promoter</th>
                                <th class="pb-4 text-center">Reservas</th>
                                <th class="pb-4 text-right pr-4">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-aniversarios-body" class="text-white"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, setDoc, addDoc, updateDoc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let dadosReservas = []; let dadosEventos = []; let dadosPromoters = []; let dadosAniv = [];

        window.trocarAba = (id, b) => { 
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); 
            document.querySelectorAll('.btn-menu').forEach(x => x.classList.remove('active')); 
            document.getElementById(id).classList.remove('hidden'); b.classList.add('active'); 
        };

        // ESCUTAS EM TEMPO REAL
        onSnapshot(collection(db, "lista_eventos"), snap => { 
            dadosReservas = snap.docs.map(d => d.data());
            renderizarRelatorios();
            renderizarAniversarios();
        });

        onSnapshot(collection(db, "eventos"), snap => { 
            dadosEventos = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderizarRelatorios();
            renderizarGridConfig();
            renderizarAniversarios();
        });

        onSnapshot(collection(db, "promoters"), snap => { 
            dadosPromoters = snap.docs.map(d => ({id: d.id, ...d.data()})); 
            renderizarPromoters();
            document.getElementById('filtro-promoter-excel').innerHTML = '<option value="">Filtrar Promoter</option>' + dadosPromoters.map(p => `<option value="${p.id.toUpperCase()}">${p.nome || p.id}</option>`).join('');
        });

        onSnapshot(collection(db, "configuracoes"), snap => {
            document.getElementById('lista-portaria').innerHTML = snap.docs.map(d => ({id: d.id, ...d.data()})).map(l => `
                <div class="glass-card p-6 border-l-4 border-l-green-500 flex justify-between items-center">
                    <div><p class="text-xs font-black uppercase text-white">${l.login}</p><p class="text-[9px] text-yellow-500 font-bold mt-1 italic">SENHA: ${l.senha || 'Não Definida'}</p></div>
                    <button onclick="removerItem('configuracoes', '${l.id}')" class="text-red-500 font-black">✕</button>
                </div>`).join('');
        });

        onSnapshot(collection(db, "links_aniversario"), snap => {
            dadosAniv = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderizarAniversarios();
        });

        // RENDER RELATÓRIOS (BOLHAS E PÓDIOS)
        function renderizarRelatorios() {
            // Performance Horizontal
            const evOrd = [...dadosEventos].filter(e => e.ativo).sort((a,b) => new Date(a.data) - new Date(b.data));
            document.getElementById('container-bolhas').innerHTML = evOrd.map(ev => {
                const res = dadosReservas.filter(r => r.evento === ev.nome).length;
                const chk = dadosReservas.filter(r => r.evento === ev.nome && r.entrou).length;
                return `<div class="event-bubble p-6"><p class="text-[9px] font-black text-yellow-500 uppercase mb-1">${ev.data.split('-').reverse().join('/')}</p><h4 class="text-sm font-black uppercase text-white mb-6 h-10 overflow-hidden leading-tight">${ev.nome}</h4><div class="flex justify-between border-t border-white/5 pt-4"><div class="text-center"><p class="text-[7px] text-zinc-500 uppercase font-black">Reservas</p><p class="text-lg font-black">${res}</p></div><div class="text-center"><p class="text-[7px] text-zinc-500 uppercase font-black">Entrou</p><p class="text-lg font-black text-green-500">${chk}</p></div><div class="text-center"><p class="text-[7px] text-zinc-500 uppercase font-black">Conv.</p><p class="text-lg font-black text-blue-500">${res > 0 ? Math.round((chk/res)*100) : 0}%</p></div></div></div>`;
            }).join('');

            // Ranking
            const stats = {};
            dadosReservas.forEach(r => {
                const p = (r.promoter || 'DIRETO').toUpperCase();
                if(!stats[p]) stats[p] = { res: 0, chk: 0 };
                stats[p].res++; if(r.entrou) stats[p].chk++;
            });
            const medals = ['🥇', '🥈', '🥉'];
            document.getElementById('lista-ranking-reservas').innerHTML = Object.entries(stats).sort((a,b) => b[1].res - a[1].res).slice(0,5).map(([n, d], i) => `<div class="bg-black/40 p-4 rounded-2xl flex justify-between items-center border border-white/5"><div><span class="mr-2">${medals[i] || '👤'}</span><span class="text-[10px] font-black uppercase text-white">${n}</span></div><p class="text-xl font-black text-yellow-500">${d.res}</p></div>`).join('');
            document.getElementById('lista-ranking-checkins').innerHTML = Object.entries(stats).sort((a,b) => b[1].chk - a[1].chk).slice(0,5).map(([n, d], i) => `<div class="bg-black/40 p-4 rounded-2xl flex justify-between items-center border border-white/5"><div><span class="mr-2">${medals[i] || '👤'}</span><span class="text-[10px] font-black uppercase text-white">${n}</span></div><p class="text-xl font-black text-green-500">${d.chk}</p></div>`).join('');
        }

        // RENDER ANIVERSÁRIOS
        function renderizarAniversarios() {
            const tbody = document.getElementById('tabela-aniversarios-body');
            if(!tbody) return;
            tbody.innerHTML = dadosAniv.map(link => {
                const qtd = dadosReservas.filter(r => r.tipo === "ANIVERSARIO" && r.aniversariante === link.aniversariante && r.evento === link.festa).length;
                return `<tr class="border-b border-white/5 hover:bg-white/5 transition-all group"><td class="py-5 pl-4 font-black uppercase italic text-sm text-purple-400">${link.aniversariante}</td><td class="py-5 text-[10px] font-bold uppercase text-zinc-400">${link.festa}</td><td class="py-5 text-[10px] font-black uppercase text-white">${link.promoter}</td><td class="py-5 text-center font-black text-xl italic">${qtd}</td><td class="py-5 text-right pr-4"><button onclick="removerItem('links_aniversario', '${link.id}')" class="text-red-500 text-[10px] font-black uppercase hover:underline">Remover</button></td></tr>`;
            }).join('');
        }

        // FUNÇÕES CRUD
        function renderizarGridConfig() {
            document.getElementById('grid-eventos-config').innerHTML = dadosEventos.filter(e => e.ativo).sort((a,b) => new Date(a.data) - new Date(b.data)).map(ev => `
                <div class="event-card-config flex flex-col" onclick="prepararEdicaoEvento('${ev.id}')">
                    <img src="${ev.imagem || ''}" class="mini-capa bg-zinc-900">
                    <div class="p-5"><p class="text-[9px] font-black text-yellow-500 uppercase">${ev.data.split('-').reverse().join('/')}</p><h4 class="text-xs font-black uppercase mt-1 text-white truncate">${ev.nome}</h4><button onclick="event.stopPropagation(); removerItem('eventos', '${ev.id}')" class="text-red-500 font-bold mt-4 text-[9px] uppercase hover:underline">REMOVER</button></div>
                </div>`).join('');
        }

        function renderizarPromoters() {
            document.getElementById('lista-promoters').innerHTML = dadosPromoters.map(p => `
                <div class="glass-card p-6 border-l-4 ${p.tipo === 'aniversario' ? 'border-purple-500' : 'border-blue-500'} flex justify-between items-center">
                    <div><p class="text-xs font-black uppercase text-white">${p.nome || p.id}</p><p class="text-[10px] text-yellow-500 font-bold uppercase mt-1 italic">SENHA: ${p.senha || 'NÃO DEFINIDA'}</p></div>
                    <div class="flex gap-4"><button onclick="prepararEdicaoPromoter('${p.id}')" class="text-blue-500 text-[10px] font-black">EDITAR</button><button onclick="removerItem('promoters', '${p.id}')" class="text-red-500 font-black">✕</button></div>
                </div>`).join('');
        }

        document.getElementById('formEvento').addEventListener('submit', async e => {
            e.preventDefault(); const id = document.getElementById('edit_evento_id').value;
            const d = { nome: document.getElementById('nome_festa').value, data: document.getElementById('data_festa').value, valor_casal: document.getElementById('valor_casal').value, valor_solteiro: document.getElementById('valor_solteiro').value, desc_casal: document.getElementById('desc_casal').value, desc_solteiro: document.getElementById('desc_solteiro').value, imagem: document.getElementById('url_banner').value, ativo: true };
            if(id) await updateDoc(doc(db, "eventos", id), d); else await addDoc(collection(db, "eventos"), d);
            e.target.reset(); document.getElementById('edit_evento_id').value = "";
        });

        document.getElementById('formPromoter').addEventListener('submit', async e => {
            e.preventDefault(); const n = document.getElementById('nome_promoter').value.trim(); const t = document.getElementById('tipo_promoter').value;
            await setDoc(doc(db, "promoters", n.toLowerCase()), { nome: n, tipo: t, ativo: true }, { merge: true });
            e.target.reset();
        });

        document.getElementById('formPortaria').addEventListener('submit', async e => {
            e.preventDefault(); const login = document.getElementById('login_portaria').value.trim().toLowerCase();
            await setDoc(doc(db, "configuracoes", login), { login: login, senha: "" }, { merge: true });
            e.target.reset(); alert("Cadastrado! Senha será criada no primeiro acesso.");
        });

        window.removerItem = async (c, i) => { if(confirm("Remover permanentemente?")) await deleteDoc(doc(db, c, i)); };
        
        window.prepararEdicaoPromoter = async (id) => {
            const snap = await getDoc(doc(db, "promoters", id));
            if (snap.exists()) {
                document.getElementById('nome_promoter').value = snap.data().nome;
                document.getElementById('tipo_promoter').value = snap.data().tipo;
                document.getElementById('edit_promoter_id').value = id;
            }
        };

        window.prepararEdicaoEvento = (id) => {
            const ev = dadosEventos.find(e => e.id === id);
            document.getElementById('edit_evento_id').value = ev.id;
            document.getElementById('nome_festa').value = ev.nome;
            document.getElementById('data_festa').value = ev.data;
            document.getElementById('valor_casal').value = ev.valor_casal || "";
            document.getElementById('valor_solteiro').value = ev.valor_solteiro || "";
            document.getElementById('desc_casal').value = ev.desc_casal || "";
            document.getElementById('desc_solteiro').value = ev.desc_solteiro || "";
            document.getElementById('url_banner').value = ev.imagem || "";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.gerarListaCheckins = () => {
            const p = document.getElementById('filtro-promoter-excel').value;
            if(!p) return;
            const lista = dadosReservas.filter(r => (r.promoter || '').toUpperCase() === p && r.entrou);
            let t = "NOME\tTELEFONE\tEVENTO\n";
            lista.forEach(r => t += `${r.nome}\t${r.telefone || r.tel || '---'}\t${r.evento}\n`);
            document.getElementById('output-excel').value = lista.length > 0 ? t : "Sem entradas.";
        };
        window.copiarOutput = () => { document.getElementById('output-excel').select(); document.execCommand('copy'); alert("Copiado!"); };
    </script>
</body>
</html>
