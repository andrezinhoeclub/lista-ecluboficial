<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Command Center</title>
    <link id="page-icon" rel="icon" type="image/png" href="">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        :root { --cor-cliente: #eab308; }
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; overflow-x: hidden; }
        .glass-card { background: rgba(18, 18, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 2.5rem; }
        .theme-txt { color: var(--cor-cliente) !important; }
        .theme-bg { background-color: var(--cor-cliente) !important; color: #000 !important; }
        .btn-menu { background: #18181b; border: 1px solid #27272a; transition: 0.3s; color: #71717a; }
        .btn-menu.active { background: var(--cor-cliente); color: #000; font-weight: 800; border-color: var(--cor-cliente); box-shadow: 0 0 20px rgba(var(--cor-cliente), 0.2); }
        .scroll-x { display: flex; overflow-x: auto; gap: 1rem; padding: 10px 5px 20px 5px; scroll-behavior: smooth; }
        .scroll-x::-webkit-scrollbar { height: 6px; }
        .scroll-x::-webkit-scrollbar-thumb { background: var(--cor-cliente); border-radius: 10px; }
        .event-bubble { flex: 0 0 auto; width: 340px; background: #0c0c0e; border: 1px solid #1a1a1c; border-radius: 2rem; }
        input, select, textarea { background-color: #0c0c0e !important; border: 1px solid #27272a !important; color: white !important; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--cor-cliente) !important; }
        .mini-capa { width: 100%; height: 100px; object-fit: cover; border-radius: 1.5rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="p-4 md:p-8 hidden" id="main-body">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img id="client-logo" src="" class="h-10 w-auto object-contain hidden">
                <div>
                    <h1 class="text-2xl font-black uppercase italic tracking-tighter theme-txt leading-none">Command Center</h1>
                    <p id="client-name" class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1 italic">MANAGEMENT</p>
                </div>
            </div>
            <nav class="flex bg-zinc-900/50 p-1.5 rounded-2xl border border-zinc-800 overflow-x-auto">
                <button onclick="trocarAba('aba-relatorios', this, 'normal')" class="btn-menu active px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap">Relatórios</button>
                <button onclick="trocarAba('aba-festas', this, 'normal')" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap">Eventos</button>
                <button onclick="trocarAba('aba-equipe', this, 'normal')" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap">Equipe</button>
                <button onclick="trocarAba('aba-aniversarios', this, 'normal')" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap text-cyan-400">Listas/Cams</button>
                <button onclick="trocarAba('aba-config', this, 'danger')" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap text-red-500">Ajustes</button>
            </nav>
        </header>

        <section id="aba-festas" class="hidden space-y-8">
            <div class="glass-card p-8 border-l-4 border-l-blue-500">
                <h2 class="text-blue-500 font-black uppercase italic text-xl mb-8 tracking-tighter">Configurar Evento & Camarotes</h2>
                <form id="formEvento" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="hidden" id="edit_evento_id">
                    <input type="hidden" id="url_imagem_atual">
                    
                    <input type="text" id="nome_festa" placeholder="NOME DO EVENTO" class="p-4 rounded-2xl font-bold md:col-span-3" required>
                    <input type="date" id="data_festa" class="p-4 rounded-2xl font-bold uppercase text-xs" required>
                    
                    <div class="md:col-span-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="valor_casal" placeholder="CASAL PORTARIA R$" class="p-4 rounded-2xl font-bold">
                        <input type="text" id="valor_solteiro" placeholder="SOLTEIRO PORTARIA R$" class="p-4 rounded-2xl font-bold">
                    </div>

                    <div class="md:col-span-4 bg-zinc-900/40 p-6 rounded-[2rem] border border-white/5">
                        <label class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-4 block ml-2">🖼️ Capa do Evento (Upload)</label>
                        <input type="file" id="upload_capa" accept="image/*" class="w-full text-xs text-zinc-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-[10px] file:font-black file:uppercase file:bg-blue-600 file:text-white hover:file:bg-blue-500 cursor-pointer">
                    </div>

                    <div class="md:col-span-4 bg-cyan-900/10 p-6 rounded-[2rem] border border-cyan-500/20 mb-4">
                        <div class="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-4 ml-2">💎 Configuração de Camarotes</div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="grid-camarotes-inputs"></div>
                    </div>

                    <button type="submit" id="btnSalvarEvento" class="md:col-span-4 bg-blue-600 text-white font-black py-5 rounded-3xl uppercase text-sm hover:bg-blue-500 transition-all">Salvar Evento Completo</button>
                </form>
            </div>
            <div id="grid-eventos-config" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="aba-relatorios" class="space-y-8">
            <div class="glass-card p-8"><div id="container-bolhas" class="scroll-x"></div></div>
        </section>
        <section id="aba-equipe" class="hidden"></section>
        <section id="aba-aniversarios" class="hidden"></section>
        <section id="aba-config" class="hidden"></section>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, setDoc, addDoc, updateDoc, getDocs, query, where, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", authDomain: "teste-de-reserva.firebaseapp.com", projectId: "teste-de-reserva", storageBucket: "teste-de-reserva.firebasestorage.app", messagingSenderId: "163395694876", appId: "1:163395694876:web:8b1116a0483af951548ad9" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const params = new URLSearchParams(window.location.search);
        const clubeId = params.get('clube');
        
        let dadosEventos = [];

        // CARREGA IDENTIDADE VISUAL
        async function carregarIdentidade() {
            if (!clubeId) return;
            const snap = await getDoc(doc(db, "clientes_revenda", clubeId));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('page-title').innerText = d.nome_fantasia;
                document.getElementById('client-name').innerText = d.nome_fantasia + " MANAGEMENT";
                if(d.logo_url) { document.getElementById('client-logo').src = d.logo_url; document.getElementById('client-logo').classList.remove('hidden'); }
                if(d.cor_primaria) document.documentElement.style.setProperty('--cor-cliente', d.cor_primaria);
                document.getElementById('main-body').classList.remove('hidden');
                iniciarEscutas();
            }
        }

        // INPUTS CAMAROTES
        const gridCamarotes = document.getElementById('grid-camarotes-inputs');
        for(let i=1; i<=8; i++) {
            gridCamarotes.innerHTML += `<div class="bg-black/30 p-3 rounded-2xl border border-white/5 flex flex-col items-center gap-2">
                <label class="flex items-center gap-2 w-full cursor-pointer justify-center"><input type="checkbox" id="cam${i}_ativo" class="w-4 h-4 accent-cyan-400"><span class="text-[10px] font-black uppercase text-zinc-400">Cam 0${i}</span></label>
                <input type="text" id="v_cam${i}" placeholder="R$" class="w-full p-2 rounded-xl text-center text-xs font-bold bg-[#0c0c0e] border border-zinc-800 text-cyan-400 outline-none">
            </div>`;
        }

        function iniciarEscutas() {
            onSnapshot(query(collection(db, "eventos"), where("clube_id", "==", clubeId)), snap => {
                dadosEventos = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderGridConfig();
            });
        }

        // SALVAR EVENTO COM UPLOAD
        document.getElementById('formEvento').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvarEvento');
            btn.innerText = "SUBINDO IMAGEM E SALVANDO..."; btn.disabled = true;

            const id = document.getElementById('edit_evento_id').value;
            const arquivo = document.getElementById('upload_capa').files[0];
            let urlFinal = document.getElementById('url_imagem_atual').value;

            try {
                if (arquivo) {
                    const storageRef = ref(storage, `eventos/${clubeId}/${Date.now()}_${arquivo.name}`);
                    await uploadBytes(storageRef, arquivo);
                    urlFinal = await getDownloadURL(storageRef);
                }

                const d = {
                    clube_id: clubeId,
                    nome: document.getElementById('nome_festa').value,
                    data: document.getElementById('data_festa').value,
                    valor_casal: document.getElementById('valor_casal').value,
                    valor_solteiro: document.getElementById('valor_solteiro').value,
                    imagem: urlFinal,
                    ativo: true
                };

                for(let i=1; i<=8; i++) {
                    d[`cam${i}_ativo`] = document.getElementById(`cam${i}_ativo`).checked;
                    d[`v_cam${i}`] = document.getElementById(`v_cam${i}`).value;
                }

                if(id) await updateDoc(doc(db, "eventos", id), d);
                else await addDoc(collection(db, "eventos"), d);

                e.target.reset(); document.getElementById('edit_evento_id').value = "";
                alert("Evento Salvo!");
            } catch(err) { alert("Erro ao salvar."); }
            finally { btn.innerText = "Salvar Evento Completo"; btn.disabled = false; }
        });

        // DELETAR EVENTO E IMAGEM
        window.removerItem = async (colecao, id) => {
            if(!confirm("TEM CERTEZA? Isso vai apagar o evento e a imagem do servidor!")) return;
            const ev = dadosEventos.find(e => e.id === id);
            
            try {
                // APAGA A IMAGEM DO STORAGE SE EXISTIR
                if (ev.imagem && ev.imagem.includes("firebasestorage")) {
                    const imagemRef = ref(storage, ev.imagem);
                    await deleteObject(imagemRef).catch(e => console.log("Imagem não encontrada no servidor"));
                }
                
                await deleteDoc(doc(db, colecao, id));
                alert("Excluído com sucesso!");
            } catch (e) { alert("Erro ao excluir."); }
        };

        window.renderGridConfig = () => {
            const grid = document.getElementById('grid-eventos-config'); if(!grid) return;
            grid.innerHTML = dadosEventos.sort((a,b) => new Date(a.data) - new Date(b.data)).map(ev => `
                <div class="glass-card overflow-hidden border border-white/5 p-5">
                    <img src="${ev.imagem || ''}" class="mini-capa bg-zinc-900">
                    <div class="flex justify-between mb-2">
                        <p class="text-[9px] font-black theme-txt uppercase">${ev.data.split('-').reverse().join('/')}</p>
                    </div>
                    <h4 class="text-xs font-black uppercase text-white truncate mb-4">${ev.nome}</h4>
                    <div class="flex justify-between">
                        <button onclick="prepararEdicaoEvento('${ev.id}')" class="text-blue-500 font-bold text-[9px] uppercase">Editar</button>
                        <button onclick="removerItem('eventos', '${ev.id}')" class="text-red-500 font-bold text-[9px] uppercase">Excluir Tudo</button>
                    </div>
                </div>`).join('');
        };

        window.prepararEdicaoEvento = (id) => {
            const ev = dadosEventos.find(e => e.id === id);
            document.getElementById('edit_evento_id').value = ev.id;
            document.getElementById('url_imagem_atual').value = ev.imagem || "";
            document.getElementById('nome_festa').value = ev.nome;
            document.getElementById('data_festa').value = ev.data;
            document.getElementById('valor_casal').value = ev.valor_casal || "";
            document.getElementById('valor_solteiro').value = ev.valor_solteiro || "";
            for(let i=1; i<=8; i++) {
                document.getElementById(`cam${i}_ativo`).checked = ev[`cam${i}_ativo`] || false;
                document.getElementById(`v_cam${i}`).value = ev[`v_cam${i}`] || "";
            }
        };

        window.trocarAba = (id, btn) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.btn-menu').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            btn.classList.add('active');
        };

        carregarIdentidade();
    </script>
</body>
</html>
