<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB MASTER | Command Center</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; }
        .glass-card { background: rgba(18, 18, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 2.5rem; }
        .btn-menu { background: #18181b; border: 1px solid #27272a; transition: 0.3s; color: #71717a; }
        .btn-menu.active { background: #eab308; color: #000; font-weight: 800; border-color: #fbbf24; box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
        .scroll-x { display: flex; overflow-x: auto; gap: 1rem; padding: 10px 5px 20px 5px; scroll-behavior: smooth; }
        .scroll-x::-webkit-scrollbar { height: 6px; }
        .scroll-x::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
        .event-bubble { flex: 0 0 auto; width: 280px; background: #0c0c0e; border: 1px solid #1a1a1c; border-radius: 2rem; transition: 0.3s; }
        input, select, textarea { background-color: #0c0c0e !important; border: 1px solid #27272a !important; color: white !important; outline: none; transition: 0.3s; }
        .mini-capa { width: 100%; height: 80px; object-fit: cover; border-bottom: 1px solid #1a1a1c; opacity: 0.6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 w-auto">
                <div>
                    <h1 class="text-2xl font-black uppercase italic tracking-tighter text-yellow-500 leading-none">Command Center</h1>
                    <p class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1 italic">E-CLUB MANAGEMENT</p>
                </div>
            </div>
            <nav class="flex bg-zinc-900/50 p-1.5 rounded-2xl border border-zinc-800 overflow-x-auto">
                <button onclick="trocarAba('aba-relatorios', this)" class="btn-menu active px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap">Relatórios</button>
                <button onclick="trocarAba('aba-festas', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap">Eventos</button>
                <button onclick="trocarAba('aba-equipe', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap">Equipe</button>
                <button onclick="trocarAba('aba-aniversarios', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap text-purple-400">Listas</button>
            </nav>
        </header>

        <section id="aba-relatorios" class="space-y-8">
            <div class="glass-card p-8 text-white">
                <h2 class="text-xs font-black uppercase text-yellow-500 italic mb-6 tracking-widest">Performance por Evento</h2>
                <div id="container-bolhas" class="scroll-x"></div>
            </div>
            </section>

        <section id="aba-festas" class="hidden space-y-8 text-white">
            <div class="glass-card p-8 border-l-4 border-l-blue-500">
                <h2 class="text-blue-500 font-black uppercase italic text-xl mb-8 tracking-tighter text-white">Configurar Evento</h2>
                <form id="formEvento" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="hidden" id="edit_evento_id">
                    <input type="text" id="nome_festa" placeholder="Nome do Evento" class="p-4 rounded-2xl font-bold md:col-span-3 text-white" required>
                    <input type="date" id="data_festa" class="p-4 rounded-2xl font-bold uppercase text-xs text-white" required>
                    <input type="text" id="valor_casal" placeholder="Casal R$" class="p-4 rounded-2xl font-bold text-white">
                    <input type="text" id="valor_solteiro" placeholder="Solteiro R$" class="p-4 rounded-2xl font-bold text-white">
                    <input type="text" id="desc_casal" placeholder="Casal Aniv R$" class="p-4 rounded-2xl font-bold text-purple-400">
                    <input type="text" id="desc_solteiro" placeholder="Solteiro Aniv R$" class="p-4 rounded-2xl font-bold text-purple-400">
                    <input type="url" id="url_banner" placeholder="URL da Capa" class="md:col-span-4 p-4 rounded-2xl font-bold text-white">
                    <button type="submit" class="md:col-span-4 bg-blue-600 text-white font-black py-5 rounded-3xl uppercase text-sm hover:bg-blue-500 transition-all">Salvar / Atualizar Evento</button>
                </form>
            </div>
            <div id="grid-eventos-config" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, setDoc, addDoc, updateDoc, getDocs, query, where, orderBy, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let dadosReservas = []; let dadosEventos = [];

        window.trocarAba = (id, b) => { 
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); 
            document.querySelectorAll('.btn-menu').forEach(x => x.classList.remove('active')); 
            document.getElementById(id).classList.remove('hidden'); b.classList.add('active'); 
        };

        // Monitoramento Global
        onSnapshot(collection(db, "eventos"), snap => { 
            dadosEventos = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderizarGridConfig(); // Mostrará o dia 18 aqui
            renderizarRelatorios();
        });

        onSnapshot(collection(db, "lista_eventos"), snap => { 
            dadosReservas = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderizarRelatorios();
        });

        function renderizarGridConfig() {
            // MOSTRA TODOS OS EVENTOS DO BANCO (Varredura Total)
            const cont = document.getElementById('grid-eventos-config');
            if(!cont) return;
            
            // Ordena pela data mais recente
            const listaOrdenada = [...dadosEventos].sort((a,b) => new Date(b.data) - new Date(a.data));
            
            cont.innerHTML = listaOrdenada.map(ev => `
                <div class="glass-card overflow-hidden border border-white/5 hover:border-yellow-500/50 transition-all cursor-pointer" onclick="prepararEdicaoEvento('${ev.id}')">
                    <img src="${ev.imagem || ''}" class="mini-capa bg-zinc-900">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-2">
                            <p class="text-[9px] font-black text-yellow-500 uppercase tracking-widest">${ev.data.split('-').reverse().join('/')}</p>
                            <span class="${ev.ativo ? 'text-green-500' : 'text-red-500'} text-[8px] font-black uppercase tracking-widest">${ev.ativo ? '● Ativo' : '○ Inativo'}</span>
                        </div>
                        <h4 class="text-xs font-black uppercase text-white truncate mb-4">${ev.nome}</h4>
                        <div class="flex justify-between gap-2">
                            <button onclick="event.stopPropagation(); prepararEdicaoEvento('${ev.id}')" class="text-[9px] font-black uppercase text-blue-400 hover:text-white">Editar</button>
                            <button onclick="event.stopPropagation(); removerItem('eventos', '${ev.id}')" class="text-[9px] font-black uppercase text-red-500 hover:text-white">Excluir</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function renderizarRelatorios() {
            const contBolhas = document.getElementById('container-bolhas');
            if(!contBolhas) return;

            // No relatório mostramos apenas os que você marcou como ATIVO
            const ativos = dadosEventos.filter(e => e.ativo).sort((a,b) => new Date(a.data) - new Date(b.data));
            
            contBolhas.innerHTML = ativos.map(ev => {
                const res = dadosReservas.filter(r => r.evento === ev.nome).length;
                const chk = dadosReservas.filter(r => r.evento === ev.nome && r.entrou).length;
                return `
                <div class="event-bubble p-6">
                    <p class="text-[9px] font-black text-yellow-500 uppercase mb-1 italic">${ev.data.split('-').reverse().join('/')}</p>
                    <h4 class="text-sm font-black uppercase text-white mb-6 h-10 overflow-hidden leading-tight">${ev.nome}</h4>
                    <div class="flex justify-between border-t border-white/5 pt-4">
                        <div class="text-center"><p class="text-[7px] text-zinc-500 uppercase font-black">Reservas</p><p class="text-lg font-black text-white">${res}</p></div>
                        <div class="text-center"><p class="text-[7px] text-zinc-500 uppercase font-black">Entrou</p><p class="text-lg font-black text-green-500">${chk}</p></div>
                        <div class="text-center"><p class="text-[7px] text-zinc-500 uppercase font-black">Conv.</p><p class="text-lg font-black text-blue-500">${res > 0 ? Math.round((chk/res)*100) : 0}%</p></div>
                    </div>
                </div>`;
            }).join('');
        }

        window.prepararEdicaoEvento = (id) => {
            const ev = dadosEventos.find(e => e.id === id);
            if(!ev) return;
            document.getElementById('edit_evento_id').value = ev.id;
            document.getElementById('nome_festa').value = ev.nome;
            document.getElementById('data_festa').value = ev.data;
            document.getElementById('valor_casal').value = ev.valor_casal || "";
            document.getElementById('valor_solteiro').value = ev.valor_solteiro || "";
            document.getElementById('desc_casal').value = ev.desc_casal || "";
            document.getElementById('desc_solteiro').value = ev.desc_solteiro || "";
            document.getElementById('url_banner').value = ev.imagem || "";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        document.getElementById('formEvento').addEventListener('submit', async e => {
            e.preventDefault();
            const id = document.getElementById('edit_evento_id').value;
            const payload = {
                nome: document.getElementById('nome_festa').value,
                data: document.getElementById('data_festa').value,
                valor_casal: document.getElementById('valor_casal').value,
                valor_solteiro: document.getElementById('valor_solteiro').value,
                desc_casal: document.getElementById('desc_casal').value,
                desc_solteiro: document.getElementById('desc_solteiro').value,
                imagem: document.getElementById('url_banner').value,
                ativo: true
            };
            if(id) await updateDoc(doc(db, "eventos", id), payload); 
            else await addDoc(collection(db, "eventos"), payload);
            e.target.reset();
            document.getElementById('edit_evento_id').value = "";
        });

        window.removerItem = async (c, i) => { if(confirm("Deseja realmente excluir este evento?")) await deleteDoc(doc(db, c, i)); };

    </script>
</body>
</html>
