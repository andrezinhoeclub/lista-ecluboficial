<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB MASTER | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; }
        .glass-card { background: rgba(18, 18, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 2rem; }
        .stat-card { transition: transform 0.3s ease; border-left: 4px solid #eab308; }
        .btn-menu { background: #18181b; border: 1px solid #27272a; transition: 0.3s; }
        .btn-menu.active { background: #eab308; color: #000; font-weight: 800; border-color: #fbbf24; box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
        
        input, select { background-color: #09090b !important; border: 1px solid #27272a !important; color: #ffffff !important; transition: 0.3s; }
        input:focus { border-color: #eab308 !important; outline: none; box-shadow: 0 0 10px rgba(234, 179, 8, 0.1); }
        
        .promoter-card { background: linear-gradient(145deg, #0f0f10 0%, #050505 100%); border: 1px solid #1a1a1c; transition: 0.3s; }
        .promoter-card:hover { border-color: #3b82f6; transform: translateY(-2px); }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-black uppercase italic tracking-tighter text-yellow-500">Master Dashboard</h1>
                <p class="text-zinc-500 font-bold uppercase text-[10px] tracking-widest">Controle de Operações E-CLUB</p>
            </div>
            <nav class="flex bg-zinc-900/50 p-1.5 rounded-2xl border border-zinc-800">
                <button onclick="trocarAba('aba-inteligencia', this)" class="btn-menu active px-6 py-2.5 rounded-xl text-[10px] uppercase">Inteligência</button>
                <button onclick="trocarAba('aba-festas', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase">Eventos</button>
                <button onclick="trocarAba('aba-equipe', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase">Equipe & Acesso</button>
            </nav>
        </header>

        <section id="aba-inteligencia" class="space-y-8">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass-card p-6 stat-card"><span class="text-[9px] font-black uppercase text-zinc-500">Reservas Totais</span><p id="total-reservas" class="text-3xl font-black italic">0</p></div>
                <div class="glass-card p-6 stat-card border-l-green-500"><span class="text-[9px] font-black uppercase text-zinc-500">Total Check-ins</span><p id="total-entradas" class="text-3xl font-black italic text-green-500">0</p></div>
                <div class="glass-card p-6 stat-card border-l-blue-500"><span class="text-[9px] font-black uppercase text-zinc-500">Melhor Evento</span><p id="melhor-evento" class="text-sm font-black uppercase truncate text-blue-400">---</p></div>
                <div class="glass-card p-6 stat-card border-l-purple-500"><span class="text-[9px] font-black uppercase text-zinc-500">Conversão Geral</span><p id="conversao-geral" class="text-3xl font-black italic text-purple-400">0%</p></div>
            </div>
            <div class="glass-card p-8"><div id="grid-eventos" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card p-8"><h2 class="text-xs font-black uppercase mb-6 border-b border-zinc-800 pb-4 text-blue-500 italic">Ranking de Performance</h2><div id="lista-ranking-promoters" class="space-y-4"></div></div>
                <div class="glass-card p-8">
                    <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4"><h2 class="text-xs font-black uppercase text-green-500 italic">Cruzamento de Dados</h2></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <select id="rel-filtro-evento" class="p-4 rounded-xl text-[10px] uppercase font-black" onchange="gerarRelatorioCruzado()"></select>
                        <select id="rel-filtro-promoter" class="p-4 rounded-xl text-[10px] uppercase font-black" onchange="gerarRelatorioCruzado()"></select>
                    </div>
                    <div id="resultado-cruzado" class="bg-black/60 rounded-3xl p-8 text-center border border-zinc-800"><p id="num-cruzado" class="text-6xl font-black text-white italic my-2">0</p></div>
                </div>
            </div>
        </section>

        <section id="aba-festas" class="hidden space-y-8">
             <div class="glass-card p-8">
                <h2 class="text-blue-500 font-black uppercase italic text-lg mb-8 tracking-tighter">Gerenciar Agenda</h2>
                <form id="formEvento" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <input type="text" id="nome_festa" placeholder="Nome da Festa" class="p-4 rounded-2xl font-bold md:col-span-2 text-white" required>
                    <input type="date" id="data_festa" class="p-4 rounded-2xl font-bold text-white" required>
                    <button type="submit" class="md:col-span-3 bg-blue-600 text-white font-black py-5 rounded-2xl uppercase text-sm hover:bg-blue-700 transition">Publicar Novo Evento</button>
                </form>
            </div>
            <div id="lista-eventos-ativos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="aba-equipe" class="hidden space-y-8">
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <div class="lg:col-span-2 space-y-6">
                    <div class="glass-card p-8 border-l-4 border-l-blue-500">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-blue-500 font-black uppercase italic text-xl tracking-tighter">Promoters (Listas VIP)</h2>
                            <span class="bg-blue-900/20 text-blue-400 text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Gestão Ativa</span>
                        </div>
                        <form id="formPromoter" class="flex flex-col md:flex-row gap-3 mb-8">
                            <input type="text" id="nome_promoter" placeholder="Nome do Promoter" class="flex-grow p-4 rounded-2xl font-bold text-sm" required>
                            <button type="submit" class="bg-blue-600 px-10 py-4 rounded-2xl font-black uppercase text-xs text-white hover:bg-blue-700 transition shadow-lg shadow-blue-900/20">Adicionar à Equipe</button>
                        </form>
                        <div id="lista-promoters" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[600px] overflow-y-auto pr-2">
                            </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="glass-card p-6 border-l-4 border-l-yellow-500">
                        <h2 class="text-yellow-500 font-black uppercase italic text-sm mb-6 tracking-tight">Criar Acesso Portaria</h2>
                        <form id="formAcessoPortaria" class="space-y-3">
                            <input type="text" id="login_portaria" placeholder="Usuário" class="w-full p-4 rounded-xl font-bold text-white text-xs" required>
                            <input type="text" id="senha_portaria" placeholder="Senha" class="w-full p-4 rounded-xl font-bold text-white text-xs" required>
                            <button type="submit" class="w-full bg-yellow-600 text-black font-black py-4 rounded-xl uppercase text-[10px] hover:bg-yellow-500 transition">Gerar Acesso</button>
                        </form>
                    </div>

                    <div class="glass-card p-6 border-l-4 border-l-zinc-500">
                        <h2 class="text-zinc-400 font-black uppercase italic text-sm mb-6 tracking-tight">Acessos da Noite</h2>
                        <div id="lista-logins-portaria" class="space-y-3">
                            </div>
                    </div>
                </div>

            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, deleteDoc, setDoc, getDoc, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let dadosReservas = []; let dadosEventos = []; let dadosEquipe = [];

        window.trocarAba = (id, b) => { 
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); 
            document.querySelectorAll('.btn-menu').forEach(x => x.classList.remove('active')); 
            document.getElementById(id).classList.remove('hidden'); 
            b.classList.add('active'); 
        };

        onSnapshot(collection(db, "lista_eventos"), snap => { dadosReservas = snap.docs.map(d => ({id: d.id, ...d.data()})); atualizarInterfaceInteligencia(); });
        onSnapshot(collection(db, "eventos"), snap => { dadosEventos = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(e => e.ativo); renderizarEventos(); atualizarInterfaceInteligencia(); });
        onSnapshot(collection(db, "equipe"), snap => { dadosEquipe = snap.docs.map(d => ({id: d.id, ...d.data()})); renderizarPromoters(); atualizarInterfaceInteligencia(); });
        onSnapshot(collection(db, "configuracoes"), snap => renderizarLogins(snap.docs.map(d => ({id: d.id, ...d.data()}))));

        function atualizarInterfaceInteligencia() {
            const ent = dadosReservas.filter(r => r.entrou).length;
            document.getElementById('total-reservas').innerText = dadosReservas.length;
            document.getElementById('total-entradas').innerText = ent;
            document.getElementById('conversao-geral').innerText = dadosReservas.length > 0 ? Math.round((ent / dadosReservas.length) * 100) + "%" : "0%";

            document.getElementById('grid-eventos').innerHTML = dadosEventos.map(ev => {
                const res = dadosReservas.filter(r => r.evento === ev.nome);
                return `<div class="bg-zinc-900/40 border border-zinc-800 p-6 rounded-3xl"><h4 class="text-sm font-black uppercase text-white mb-4 truncate">${ev.nome}</h4><div class="flex justify-between items-end"><div><p class="text-[9px] font-bold uppercase text-zinc-500">Reservas</p><p class="text-2xl font-black">${res.length}</p></div><div class="text-right"><p class="text-[9px] font-bold uppercase text-green-500">Entrou</p><p class="text-2xl font-black text-green-500">${res.filter(r => r.entrou).length}</p></div></div></div>`;
            }).join('');

            const statsP = {};
            dadosReservas.forEach(r => { const n = (r.promoter || "DIRETO").trim().toUpperCase(); statsP[n] = (statsP[n] || 0) + 1; });
            document.getElementById('lista-ranking-promoters').innerHTML = Object.entries(statsP).sort((a,b)=>b[1]-a[1]).map(([n,s], i) => `<div class="flex justify-between items-center p-4 bg-zinc-900/40 rounded-2xl border border-zinc-800"><div><p class="text-[11px] font-black uppercase text-white">${i+1}º ${n}</p><p class="text-2xl font-black text-yellow-500">${s}</p></div></div>`).join('');
            
            document.getElementById('rel-filtro-evento').innerHTML = '<option value="">Evento</option>' + dadosEventos.map(e => `<option value="${e.nome}">${e.nome}</option>`).join('');
            document.getElementById('rel-filtro-promoter').innerHTML = '<option value="">Promoter</option>' + [...new Set([...dadosEquipe.map(p => p.nome.trim().toUpperCase()), "DIRETO"])].sort().map(n => `<option value="${n}">${n}</option>`).join('');
        }

        window.gerarRelatorioCruzado = () => {
            const ev = document.getElementById('rel-filtro-evento').value;
            const pr = document.getElementById('rel-filtro-promoter').value;
            let res = dadosReservas.filter(r => r.entrou);
            if(ev) res = res.filter(r => r.evento === ev);
            if(pr) res = res.filter(r => (r.promoter || "DIRETO").trim().toUpperCase() === pr);
            document.getElementById('num-cruzado').innerText = res.length;
        };

        // ACESSOS PORTARIA
        document.getElementById('formAcessoPortaria').addEventListener('submit', async e => {
            e.preventDefault();
            const login = document.getElementById('login_portaria').value.trim().toLowerCase();
            const senha = document.getElementById('senha_portaria').value;
            await setDoc(doc(db, "configuracoes", login), { login, senha });
            e.target.reset();
        });

        function renderizarLogins(logins) {
            document.getElementById('lista-logins-portaria').innerHTML = logins.map(l => `
                <div class="bg-black/60 p-4 rounded-2xl flex justify-between items-center border border-zinc-800">
                    <div>
                        <p class="text-[10px] font-black uppercase text-white">USER: ${l.login}</p>
                        <p class="text-[10px] font-bold text-yellow-500">PASS: ${l.senha}</p>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="editarLogin('${l.login}')" class="text-zinc-500 hover:text-white transition">✏️</button>
                        <button onclick="removerItem('configuracoes', '${l.id}')" class="text-zinc-500 hover:text-red-500 transition ml-2">✕</button>
                    </div>
                </div>`).join('');
        }
        window.editarLogin = async (l) => { const s = await getDoc(doc(db, "configuracoes", l)); if(s.exists()){ const d = s.data(); document.getElementById('login_portaria').value = d.login; document.getElementById('senha_portaria').value = d.senha; } };

        // PROMOTERS RENDER
        function renderizarPromoters() {
            const b = "https://andrezinhoeclub.github.io/lista-ecluboficial/index.html?ref=";
            document.getElementById('lista-promoters').innerHTML = dadosEquipe.map(p => `
                <div class="promoter-card p-4 rounded-2xl flex justify-between items-center">
                    <div><p class="text-xs font-black uppercase text-white tracking-tighter">${p.nome}</p></div>
                    <div class="flex gap-2">
                        <button onclick="navigator.clipboard.writeText('${b + encodeURIComponent(p.nome)}'); alert('Link Copiado!')" class="bg-blue-600/10 text-blue-500 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase hover:bg-blue-600 hover:text-white transition">Copiar Link</button>
                        <button onclick="removerItem('equipe', '${p.id}')" class="bg-red-600/10 text-red-500 px-3 py-1.5 rounded-lg text-[9px] font-black transition hover:bg-red-600 hover:text-white">✕</button>
                    </div>
                </div>`).join('');
        }

        function renderizarEventos() { 
            document.getElementById('lista-eventos-ativos').innerHTML = dadosEventos.map(ev => `<div class="bg-zinc-900 p-4 rounded-2xl flex justify-between items-center border border-zinc-800"><span class="font-black uppercase text-[10px] text-white">${ev.nome}</span><button onclick="removerItem('eventos', '${ev.id}')" class="text-red-500 bg-red-900/10 px-4 py-2 rounded-xl text-[10px] font-black hover:bg-red-600 hover:text-white transition">X</button></div>`).join(''); 
        }
        
        document.getElementById('formEvento').addEventListener('submit', async e => { e.preventDefault(); await addDoc(collection(db, "eventos"), { nome: document.getElementById('nome_festa').value, data: document.getElementById('data_festa').value, ativo: true }); e.target.reset(); });
        document.getElementById('formPromoter').addEventListener('submit', async e => { e.preventDefault(); await addDoc(collection(db, "equipe"), { nome: document.getElementById('nome_promoter').value }); e.target.reset(); });
        window.removerItem = async (c, i) => { if(confirm("Remover?")) await deleteDoc(doc(db, c, i)); };
    </script>
</body>
</html>
