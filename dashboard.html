<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB MASTER | Reports & Data</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; }
        .glass-card { background: rgba(18, 18, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 2rem; }
        .btn-menu { background: #18181b; border: 1px solid #27272a; transition: 0.3s; color: #71717a; }
        .btn-menu.active { background: #eab308; color: #000; font-weight: 800; border-color: #fbbf24; box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
        
        /* Tabela de Eventos Modernos */
        .row-event { background: linear-gradient(90deg, rgba(255,255,255,0.01) 0%, rgba(255,255,255,0.03) 100%); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .row-event:hover { border-color: #eab308; background: rgba(234, 179, 8, 0.05); }
        
        .badge-count { background: #111; border: 1px solid #27272a; padding: 2px 8px; border-radius: 6px; font-family: monospace; }
        
        /* Pódio */
        .rank-1 { border-left: 4px solid #eab308; background: linear-gradient(90deg, rgba(234, 179, 8, 0.1) 0%, transparent 100%); }
        .rank-2 { border-left: 4px solid #a1a1aa; }
        .rank-3 { border-left: 4px solid #92400e; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #eab308; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 w-auto">
                <div>
                    <h1 class="text-2xl font-black uppercase italic tracking-tighter text-yellow-500 leading-none">Command Center</h1>
                    <p class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1 italic">Reports & Analytics</p>
                </div>
            </div>
            <nav class="flex bg-zinc-900/50 p-1.5 rounded-2xl border border-zinc-800">
                <button onclick="trocarAba('aba-relatorios', this)" class="btn-menu active px-6 py-2.5 rounded-xl text-[10px] uppercase font-black">Relatórios</button>
                <button onclick="trocarAba('aba-festas', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black">Eventos</button>
                <button onclick="trocarAba('aba-equipe', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black">Equipe</button>
            </nav>
        </header>

        <section id="aba-relatorios" class="space-y-8">
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                
                <div class="glass-card p-8">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-xs font-black uppercase text-yellow-500 italic tracking-widest">Agenda de Performance</h2>
                        <span class="text-[9px] font-bold text-zinc-500 uppercase">Ordenado por Data</span>
                    </div>
                    <div id="container-agenda-performance" class="space-y-3">
                        </div>
                </div>

                <div class="glass-card p-8">
                    <h2 class="text-xs font-black uppercase text-yellow-500 italic tracking-widest mb-8">Ranking Geral Promoters</h2>
                    <div id="container-ranking-promoters" class="space-y-3">
                        </div>
                </div>

            </div>

            <div class="glass-card p-8 border-t-4 border-t-green-600">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                    <div>
                        <h2 class="text-xs font-black uppercase text-green-500 italic tracking-widest">Extração de Dados (Excel)</h2>
                        <p class="text-[9px] text-zinc-500 font-bold uppercase mt-1">Selecione para gerar a lista de cópia rápida</p>
                    </div>
                    <div class="flex gap-2">
                        <select id="select-export-evento" class="bg-black border border-zinc-800 p-2 rounded-xl text-[10px] font-black uppercase outline-none focus:border-green-500"></select>
                        <button onclick="gerarListaExcel()" class="bg-green-600 text-black font-black px-6 py-2 rounded-xl text-[10px] uppercase hover:bg-green-500 transition-colors">Gerar Lista</button>
                    </div>
                </div>
                
                <div class="relative">
                    <textarea id="output-excel" readonly class="w-full h-48 bg-black/50 border border-zinc-900 rounded-2xl p-4 text-[11px] font-mono text-zinc-400 outline-none focus:border-green-800" placeholder="A lista de nomes e telefones aparecerá aqui..."></textarea>
                    <button onclick="copiarOutput()" class="absolute top-4 right-4 bg-zinc-800 text-[9px] font-black px-3 py-1 rounded-md uppercase hover:bg-white hover:text-black transition-all">Copiar Tudo</button>
                </div>
            </div>

        </section>

        <section id="aba-festas" class="hidden space-y-8">
             <div class="glass-card p-8 border-l-4 border-l-blue-500">
                <h2 id="titulo-form-evento" class="text-blue-500 font-black uppercase italic text-xl mb-8 tracking-tighter">Configurar Evento</h2>
                <form id="formEvento" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="hidden" id="edit_evento_id">
                    <input type="text" id="nome_festa" placeholder="Nome do Evento" class="p-4 rounded-2xl font-bold md:col-span-3 text-white" required>
                    <input type="date" id="data_festa" class="p-4 rounded-2xl font-bold text-white uppercase text-xs" required>
                    <input type="text" id="valor_casal" placeholder="Casal Normal" class="p-4 rounded-2xl font-bold text-white">
                    <input type="text" id="valor_solteiro" placeholder="Solteiro Normal" class="p-4 rounded-2xl font-bold text-white">
                    <input type="text" id="desc_casal" placeholder="Casal Aniv." class="p-4 rounded-2xl font-bold text-purple-400">
                    <input type="text" id="desc_solteiro" placeholder="Solteiro Aniv." class="p-4 rounded-2xl font-bold text-purple-400">
                    <input type="url" id="url_banner" placeholder="Link do Banner" class="md:col-span-3 p-4 rounded-2xl font-bold text-white">
                    <button type="submit" class="md:col-span-4 bg-blue-600 text-white font-black py-5 rounded-3xl uppercase text-sm">Salvar Evento</button>
                </form>
            </div>
            <div id="grid-eventos-ativos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="aba-equipe" class="hidden space-y-12">
            <div class="glass-card p-8 border-l-4 border-l-yellow-500">
                <h2 id="titulo-form-promoter" class="text-yellow-500 font-black uppercase italic text-xl mb-8 tracking-tighter">Gestão de Promoters</h2>
                <form id="formPromoter" class="flex flex-col md:flex-row gap-3 mb-10">
                    <input type="hidden" id="edit_promoter_id">
                    <input type="text" id="nome_promoter" placeholder="Nome do Promoter" class="flex-grow p-4 rounded-2xl font-bold text-sm" required>
                    <select id="tipo_promoter" class="p-4 rounded-2xl font-bold text-xs text-white">
                        <option value="padrao">Padrão</option>
                        <option value="aniversario">Aniversário (VIP)</option>
                    </select>
                    <button type="submit" id="btn-submit-promoter" class="bg-yellow-600 px-10 py-4 rounded-2xl font-black uppercase text-xs text-black">Salvar</button>
                </form>
                <div id="lista-promoters" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card p-8 border-l-4 border-l-green-500">
                    <h2 class="text-green-500 font-black uppercase italic text-xl mb-8 tracking-tighter">Acessos da Portaria</h2>
                    <form id="formPortaria" class="flex flex-col gap-4">
                        <input type="text" id="login_portaria" placeholder="Usuário Portaria" class="p-4 rounded-2xl font-bold text-sm" required>
                        <input type="text" id="senha_portaria" placeholder="Senha" class="p-4 rounded-2xl font-bold text-sm" required>
                        <button type="submit" class="bg-green-600 text-white font-black py-4 rounded-2xl uppercase text-xs">Criar Acesso</button>
                    </form>
                </div>
                <div id="lista-acessos-portaria" class="space-y-4"></div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, setDoc, addDoc, updateDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let dadosReservas = []; let dadosEventos = []; let dadosPromoters = [];

        window.trocarAba = (id, b) => { 
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); 
            document.querySelectorAll('.btn-menu').forEach(x => x.classList.remove('active')); 
            document.getElementById(id).classList.remove('hidden'); 
            b.classList.add('active'); 
        };

        // SNAPSHOTS
        onSnapshot(query(collection(db, "lista_eventos"), orderBy("data_reserva", "desc")), snap => { 
            dadosReservas = snap.docs.map(d => ({id: d.id, ...d.data()})); 
            renderizarRelatorios(); 
        });
        onSnapshot(collection(db, "eventos"), snap => { 
            dadosEventos = snap.docs.map(d => ({id: d.id, ...d.data()})); 
            renderizarRelatorios();
            renderizarEventos(); 
            // Atualiza select de export
            const sel = document.getElementById('select-export-evento');
            sel.innerHTML = '<option value="">Selecione o Evento</option>' + dadosEventos.filter(e => e.ativo).map(e => `<option value="${e.nome}">${e.nome}</option>`).join('');
        });
        onSnapshot(collection(db, "promoters"), snap => { 
            dadosPromoters = snap.docs.map(d => ({id: d.id, ...d.data()})); 
            renderizarPromoters(); 
        });
        onSnapshot(collection(db, "configuracoes"), snap => {
            renderizarPortaria(snap.docs.map(d => ({id: d.id, ...d.data()})));
        });

        function renderizarRelatorios() {
            // 1. AGENDA CRONOLÓGICA (Menor para Maior)
            const agendaCont = document.getElementById('container-agenda-performance');
            const eventosFiltrados = dadosEventos.filter(e => e.ativo).sort((a,b) => new Date(a.data) - new Date(b.data));
            
            agendaCont.innerHTML = eventosFiltrados.map(ev => {
                const totalR = dadosReservas.filter(r => r.evento === ev.nome).length;
                const totalC = dadosReservas.filter(r => r.evento === ev.nome && r.entrou).length;
                return `
                <div class="row-event p-4 rounded-2xl flex justify-between items-center">
                    <div>
                        <p class="text-[8px] font-black text-yellow-500 uppercase">${ev.data.split('-').reverse().join('/')}</p>
                        <h4 class="text-xs font-black uppercase text-white">${ev.nome}</h4>
                    </div>
                    <div class="flex gap-6 text-right">
                        <div><p class="text-[7px] text-zinc-500 uppercase font-bold">Reservas</p><p class="text-sm font-black text-white">${totalR}</p></div>
                        <div><p class="text-[7px] text-zinc-500 uppercase font-bold">Check-ins</p><p class="text-sm font-black text-green-500">${totalC}</p></div>
                    </div>
                </div>`;
            }).join('');

            // 2. RANKING PROMOTERS
            const rankingCont = document.getElementById('container-ranking-promoters');
            const stats = {};
            dadosReservas.forEach(r => {
                const p = (r.promoter || 'DIRETO').toUpperCase();
                if(!stats[p]) stats[p] = { res: 0, chk: 0 };
                stats[p].res++;
                if(r.entrou) stats[p].chk++;
            });

            const rankingSort = Object.entries(stats).sort((a,b) => b[1].res - a[1].res);
            
            rankingCont.innerHTML = rankingSort.map(([name, data], i) => {
                let medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '👤';
                let rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
                return `
                <div class="p-4 rounded-xl row-event ${rankClass} flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <span class="text-lg">${medal}</span>
                        <div>
                            <p class="text-[10px] font-black text-white uppercase">${name}</p>
                            <p class="text-[7px] text-zinc-500 font-bold uppercase italic">Check-ins: ${data.chk}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[7px] text-zinc-500 uppercase font-bold">Total Reservas</p>
                        <p class="text-lg font-black text-yellow-500">${data.res}</p>
                    </div>
                </div>`;
            }).join('');
        }

        window.gerarListaExcel = () => {
            const eventoNome = document.getElementById('select-export-evento').value;
            if(!eventoNome) return alert("Selecione um evento!");
            
            // Filtra quem FEZ CHECKIN no evento selecionado
            const filtrados = dadosReservas.filter(r => r.evento === eventoNome && r.entrou);
            
            if(filtrados.length === 0) {
                document.getElementById('output-excel').value = "Nenhum check-in realizado para este evento.";
                return;
            }

            // Formata: NOME [TAB] TELEFONE [TAB] PROMOTER
            let output = "NOME\tTELEFONE\tPROMOTER\n";
            filtrados.forEach(r => {
                output += `${r.nome}\t${r.telefone || r.tel || '---'}\t${(r.promoter || 'DIRETO').toUpperCase()}\n`;
            });

            document.getElementById('output-excel').value = output;
        };

        window.copiarOutput = () => {
            const area = document.getElementById('output-excel');
            area.select();
            document.execCommand('copy');
            alert("Lista copiada! Agora é só colar no Excel.");
        };

        // MANTENDO FUNÇÕES DE EVENTOS E EQUIPE ORIGINAIS
        function renderizarEventos() {
            document.getElementById('grid-eventos-ativos').innerHTML = dadosEventos.filter(e => e.ativo).map(ev => `
                <div class="event-card p-6 rounded-[2rem]" onclick="prepararEdicaoEvento('${ev.id}')">
                    <p class="text-[10px] font-black text-yellow-500 uppercase">${ev.data.split('-').reverse().join('/')}</p>
                    <h4 class="text-lg font-black text-white mt-1 uppercase">${ev.nome}</h4>
                    <button onclick="event.stopPropagation(); removerItem('eventos', '${ev.id}')" class="text-red-500 font-black mt-4 text-[10px]">REMOVER</button>
                </div>`).join('');
        }

        function renderizarPromoters() {
            document.getElementById('lista-promoters').innerHTML = dadosPromoters.map(p => `
                <div class="glass-card p-6 border-l-4 ${p.tipo === 'aniversario' ? 'border-purple-500' : 'border-blue-500'} flex justify-between items-center">
                    <div><p class="text-xs font-black text-white uppercase">${p.nome || p.id}</p><p class="text-[9px] text-zinc-500 font-bold uppercase">${p.tipo}</p></div>
                    <div class="flex gap-4"><button onclick="prepararEdicaoPromoter('${p.id}')" class="text-blue-500 text-[10px] font-black">EDITAR</button><button onclick="removerItem('promoters', '${p.id}')" class="text-red-500 font-black">✕</button></div>
                </div>`).join('');
        }

        function renderizarPortaria(logins) {
            document.getElementById('lista-acessos-portaria').innerHTML = logins.map(l => `
                <div class="glass-card p-4 flex justify-between items-center">
                    <div><p class="text-xs font-black text-white uppercase">${l.login}</p><p class="text-xs font-bold text-yellow-500">${l.senha}</p></div>
                    <button onclick="removerItem('configuracoes', '${l.id}')" class="text-red-500 font-black">✕</button>
                </div>`).join('');
        }

        document.getElementById('formEvento').addEventListener('submit', async e => {
            e.preventDefault();
            const id = document.getElementById('edit_evento_id').value;
            const dados = { nome: document.getElementById('nome_festa').value, data: document.getElementById('data_festa').value, valor_casal: document.getElementById('valor_casal').value, valor_solteiro: document.getElementById('valor_solteiro').value, desc_casal: document.getElementById('desc_casal').value, desc_solteiro: document.getElementById('desc_solteiro').value, imagem: document.getElementById('url_banner').value, ativo: true };
            if(id) await updateDoc(doc(db, "eventos", id), dados); else await addDoc(collection(db, "eventos"), dados);
            e.target.reset(); document.getElementById('edit_evento_id').value = "";
        });

        document.getElementById('formPromoter').addEventListener('submit', async e => {
            e.preventDefault();
            const nome = document.getElementById('nome_promoter').value.trim();
            const tipo = document.getElementById('tipo_promoter').value;
            await setDoc(doc(db, "promoters", nome.toLowerCase()), { nome: nome, tipo: tipo, ativo: true }, { merge: true });
            e.target.reset(); document.getElementById('edit_promoter_id').value = "";
        });

        document.getElementById('formPortaria').addEventListener('submit', async e => {
            e.preventDefault();
            const login = document.getElementById('login_portaria').value.trim().toLowerCase();
            await setDoc(doc(db, "configuracoes", login), { login: login, senha: document.getElementById('senha_portaria').value });
            e.target.reset();
        });

        window.prepararEdicaoPromoter = (id) => {
            const p = dadosPromoters.find(item => item.id === id);
            document.getElementById('edit_promoter_id').value = p.id;
            document.getElementById('nome_promoter').value = p.nome;
            document.getElementById('tipo_promoter').value = p.tipo;
            document.getElementById('titulo-form-promoter').innerText = "Editando: " + p.nome;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.prepararEdicaoEvento = (id) => {
            const ev = dadosEventos.find(e => e.id === id);
            document.getElementById('edit_evento_id').value = ev.id;
            document.getElementById('nome_festa').value = ev.nome;
            document.getElementById('data_festa').value = ev.data;
            document.getElementById('valor_casal').value = ev.valor_casal || "";
            document.getElementById('valor_solteiro').value = ev.valor_solteiro || "";
            document.getElementById('desc_casal').value = ev.desc_casal || "";
            document.getElementById('desc_solteiro').value = ev.desc_solteiro || "";
            document.getElementById('url_banner').value = ev.imagem || "";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.removerItem = async (c, i) => { if(confirm("Remover?")) await deleteDoc(doc(db, c, i)); };

    </script>
</body>
</html>
