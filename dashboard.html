<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Master - Eclub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white font-sans min-h-screen p-4">

    <div id="loginAdmin" class="flex flex-col items-center justify-center min-h-[80vh]">
        <div class="w-full max-w-sm bg-zinc-800 p-8 rounded-3xl border border-zinc-700 shadow-2xl text-center text-zinc-100">
            <h1 class="text-2xl font-bold mb-6 text-yellow-500 uppercase italic">Eclub Master</h1>
            <input type="text" id="userAdmin" placeholder="Usuário" class="w-full bg-zinc-700 border border-zinc-600 p-3 rounded-xl mb-4 outline-none">
            <input type="password" id="passAdmin" placeholder="Senha" class="w-full bg-zinc-700 border border-zinc-600 p-3 rounded-xl mb-6 outline-none">
            <button onclick="loginMaster()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl uppercase">Entrar</button>
        </div>
    </div>

    <div id="painelMaster" class="max-w-4xl mx-auto hidden">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 bg-zinc-800 p-6 rounded-2xl border border-zinc-700 gap-4">
            <h1 class="text-2xl font-black text-yellow-500 uppercase italic">Gestão Eclub</h1>
            <div class="flex flex-wrap justify-center gap-2">
                <button onclick="abaAtiva('relatorios')" class="bg-zinc-700 px-3 py-2 rounded-lg text-[10px] font-bold uppercase">Relatórios</button>
                <button onclick="abaAtiva('eventos')" class="bg-zinc-700 px-3 py-2 rounded-lg text-[10px] font-bold uppercase">Festas</button>
                <button onclick="abaAtiva('promoters')" class="bg-blue-600 px-3 py-2 rounded-lg text-[10px] font-bold uppercase">Promoters</button>
                <button onclick="location.reload()" class="bg-red-600/20 text-red-500 px-3 py-2 rounded-lg text-[10px] font-bold uppercase italic">Sair</button>
            </div>
        </header>

        <div id="abaRelatorios" class="space-y-6">
            <div class="grid grid-cols-3 gap-4 text-center">
                <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700"><p class="text-[9px] text-zinc-500 uppercase">Lista</p><p id="totalLista" class="text-2xl font-black">0</p></div>
                <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700"><p class="text-[9px] text-green-500 uppercase">Entraram</p><p id="totalEntradas" class="text-2xl font-black text-green-500">0</p></div>
                <div class="bg-zinc-800 p-4 rounded-xl border border-zinc-700"><p class="text-[9px] text-blue-500 uppercase">Conv.</p><p id="conversao" class="text-2xl font-black text-blue-500">0%</p></div>
            </div>
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <h2 class="text-lg font-bold mb-4">Ranking de Presenças</h2>
                <div id="listaPromotersRelatorio" class="space-y-2"></div>
            </div>
        </div>

        <div id="abaEventos" class="hidden space-y-6">
            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700">
                <h2 class="text-lg font-bold mb-4 text-blue-400">Novo Evento</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="evNome" placeholder="Nome da Festa" class="bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-sm outline-none">
                    <input type="date" id="evData" class="bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-sm outline-none">
                    <input type="time" id="evHora" class="bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-sm outline-none" value="22:00">
                    <input type="text" id="evImagem" placeholder="URL do Banner" class="bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-sm outline-none">
                    <input type="text" id="evPrecoCasal" placeholder="Valor Casal" class="bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-sm outline-none font-bold text-yellow-500">
                    <input type="text" id="evPrecoSolteiro" placeholder="Valor Solteiro" class="bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-sm outline-none font-bold text-yellow-500">
                </div>
                <button onclick="criarEvento()" class="w-full mt-4 bg-blue-600 text-white font-black py-3 rounded-xl uppercase">Publicar Festa</button>
            </div>
            <div id="listaEventosAtivos" class="space-y-2"></div>
        </div>

        <div id="abaPromoters" class="hidden space-y-6">
            <div class="bg-zinc-800 p-8 rounded-3xl border border-zinc-700 shadow-xl text-center">
                <h2 class="text-xl font-black text-blue-400 mb-6 uppercase">Gestão da Equipe</h2>
                <div class="flex flex-col md:flex-row gap-3 max-w-md mx-auto">
                    <input type="text" id="nomeNovoPromoter" placeholder="Nome (Ex: fabi)" class="flex-1 bg-zinc-900 border border-zinc-700 p-4 rounded-2xl outline-none focus:border-blue-500 text-center font-bold">
                    <button onclick="cadastrarPromoter()" class="bg-blue-600 hover:bg-blue-700 text-white font-black px-8 py-4 rounded-2xl uppercase text-xs">Adicionar</button>
                </div>
            </div>

            <div class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 shadow-xl">
                <h2 class="text-xs font-black text-zinc-500 uppercase mb-4 tracking-widest">Promoters Ativos & Links</h2>
                <div id="gridPromoters" class="grid grid-cols-1 gap-3">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let listaGeral = [];

        window.loginMaster = async function() {
            const u = document.getElementById('userAdmin').value.trim();
            const p = document.getElementById('passAdmin').value.trim();
            try {
                const snap = await getDoc(doc(db, "usuarios", u));
                if(snap.exists() && String(snap.data().senha) === String(p) && snap.data().nivel === "master") {
                    document.getElementById('loginAdmin').classList.add('hidden');
                    document.getElementById('painelMaster').classList.remove('hidden');
                    carregarRelatorios();
                    carregarEventosGerencia();
                    carregarPromoters();
                } else { alert("Acesso Negado!"); }
            } catch(e) { alert("Erro!"); }
        }

        window.abaAtiva = (aba) => {
            ['abaRelatorios', 'abaEventos', 'abaPromoters'].forEach(id => document.getElementById(id).classList.toggle('hidden', id !== 'aba' + aba.charAt(0).toUpperCase() + aba.slice(1)));
        }

        // --- GESTÃO DE PROMOTERS ---
        window.cadastrarPromoter = async () => {
            const nome = document.getElementById('nomeNovoPromoter').value.trim().toLowerCase();
            if(!nome) return alert("Digite o nome!");
            try {
                await setDoc(doc(db, "promoters", nome), { ativo: true });
                document.getElementById('nomeNovoPromoter').value = "";
                carregarPromoters();
                alert("Promoter cadastrada e link gerado!");
            } catch(e) { alert("Erro ao cadastrar."); }
        }

        async function carregarPromoters() {
            const snap = await getDocs(collection(db, "promoters"));
            const cont = document.getElementById('gridPromoters');
            const urlBase = window.location.href.replace('dashboard.html', 'index.html');
            cont.innerHTML = '';
            snap.forEach(d => {
                const nome = d.id;
                const link = `${urlBase}?ref=${nome}`;
                cont.innerHTML += `
                    <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-700 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="text-left w-full">
                            <p class="font-black text-blue-400 uppercase text-sm">${nome}</p>
                            <p class="text-[9px] text-zinc-500 truncate max-w-[250px]">${link}</p>
                        </div>
                        <div class="flex gap-2 w-full md:w-auto">
                            <button onclick="copiarLink('${link}')" class="bg-zinc-800 text-[10px] px-4 py-2 rounded-lg font-bold border border-zinc-600 flex-1 md:flex-none">COPIAR LINK</button>
                            <button onclick="removerPromoter('${nome}')" class="bg-red-900/20 text-red-500 text-[10px] px-4 py-2 rounded-lg font-bold flex-1 md:flex-none">REMOVER</button>
                        </div>
                    </div>`;
            });
        }

        window.copiarLink = (link) => {
            navigator.clipboard.writeText(link);
            alert("Copiado!");
        }

        window.removerPromoter = async (nome) => {
            if(confirm(`Desativar ${nome}? O link dela parará de funcionar.`)) {
                await deleteDoc(doc(db, "promoters", nome));
                carregarPromoters();
            }
        }

        // --- EVENTOS (Com Memória) ---
        document.getElementById('evData').addEventListener('change', async (e) => {
            const dataVal = e.target.value;
            if(!dataVal) return;
            const dias = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
            const diaTexto = dias[new Date(dataVal + "T00:00:00").getDay()];
            const snap = await getDocs(collection(db, "eventos"));
            let mEv = null; let uD = "";
            snap.forEach(doc => {
                const ev = doc.data();
                const evDia = dias[new Date(ev.data + "T00:00:00").getDay()];
                if(evDia === diaTexto && ev.data > uD) { uD = ev.data; mEv = ev; }
            });
            if(mEv) {
                document.getElementById('evPrecoCasal').value = mEv.valor_casal;
                document.getElementById('evPrecoSolteiro').value = mEv.valor_solteiro;
            }
        });

        window.criarEvento = async () => {
            const n = document.getElementById('evNome').value;
            const d = document.getElementById('evData').value;
            if(!n || !d) return alert("Faltam dados!");
            await setDoc(doc(db, "eventos", n), { 
                nome: n, data: d, hora: document.getElementById('evHora').value, 
                imagem: document.getElementById('evImagem').value, 
                valor_casal: document.getElementById('evPrecoCasal').value, 
                valor_solteiro: document.getElementById('evPrecoSolteiro').value, 
                ativo: true 
            });
            alert("Sucesso!"); carregarEventosGerencia();
        }

        async function carregarEventosGerencia() {
            const snap = await getDocs(collection(db, "eventos"));
            const cont = document.getElementById('listaEventosAtivos');
            cont.innerHTML = '';
            snap.forEach(d => {
                const ev = d.data();
                cont.innerHTML += `<div class="bg-zinc-900 p-3 rounded-xl border border-zinc-700 flex justify-between items-center text-[11px]"><span>${ev.nome} (${ev.data})</span><button onclick="excluirEvento('${d.id}')" class="text-red-500">EXCLUIR</button></div>`;
            });
        }

        window.excluirEvento = async (id) => { if(confirm("Remover?")) { await deleteDoc(doc(db, "eventos", id)); carregarEventosGerencia(); } }

        // --- RELATÓRIOS ---
        async function carregarRelatorios() {
            const snap = await getDocs(collection(db, "lista_eventos"));
            listaGeral = []; snap.forEach(d => listaGeral.push(d.data()));
            document.getElementById('totalLista').innerText = listaGeral.length;
            const ent = listaGeral.filter(d => d.entrou).length;
            document.getElementById('totalEntradas').innerText = ent;
            document.getElementById('conversao').innerText = (listaGeral.length > 0 ? (ent / listaGeral.length * 100).toFixed(1) : 0) + "%";

            const pMap = {};
            listaGeral.forEach(d => { const p = d.promoter || "Direto"; pMap[p] = (pMap[p] || 0) + (d.entrou ? 1 : 0); });
            const pCont = document.getElementById('listaPromotersRelatorio');
            pCont.innerHTML = '';
            Object.keys(pMap).sort((a,b) => pMap[b] - pMap[a]).forEach(p => {
                pCont.innerHTML += `<div class="flex justify-between p-3 bg-zinc-900 rounded-xl border border-zinc-700/50 text-[11px] font-bold"><span class="text-yellow-500 uppercase">${p}</span><span>${pMap[p]} PRESENÇAS</span></div>`;
            });
        }
    </script>
</body>
</html>
