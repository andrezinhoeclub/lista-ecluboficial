<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Eclub - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-glass { background: #18181b; border: 1px solid #27272a; }
        input, select { background: #09090b !important; border: 1px solid #27272a !important; color: white !important; transition: all 0.3s ease; }
        input:focus, select:focus { border-color: #eab308 !important; outline: none; }
        .btn-nav { background: #3f3f46; color: white; font-weight: 900; transition: all 0.2s; }
        .btn-nav.active { background: #eab308; color: black; }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen p-6 text-xs">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black uppercase italic text-yellow-500 tracking-tighter">Gestão Eclub</h1>
            <nav class="flex space-x-2">
                <button onclick="trocarAba('aba-relatorios', this)" class="btn-nav active px-4 py-2 rounded-xl text-[10px] uppercase">Relatórios</button>
                <button onclick="trocarAba('aba-festas', this)" class="btn-nav px-4 py-2 rounded-xl text-[10px] uppercase">Festas</button>
                <button onclick="trocarAba('aba-equipe', this)" class="btn-nav px-4 py-2 rounded-xl text-[10px] uppercase">Equipe</button>
                <button onclick="window.location.href='index.html'" class="bg-red-900/50 text-red-500 px-4 py-2 rounded-xl text-[10px] uppercase font-black">Sair</button>
            </nav>
        </header>

        <section id="aba-relatorios" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="card-glass p-8 rounded-[2.5rem] text-center border-b-4 border-b-blue-500">
                    <p class="text-[10px] text-zinc-500 font-black uppercase mb-2 tracking-widest">Total Geral Reservas</p>
                    <p id="res-total" class="text-4xl font-black italic text-white">0</p>
                </div>
                <div class="card-glass p-8 rounded-[2.5rem] text-center border-b-4 border-b-yellow-500">
                    <p class="text-[10px] text-zinc-500 font-black uppercase mb-2 tracking-widest">Check-ins Realizados</p>
                    <p id="res-checkin-total" class="text-4xl font-black italic text-white">0</p>
                </div>
                <div class="card-glass p-8 rounded-[2.5rem] text-center border-b-4 border-b-green-500">
                    <p class="text-[10px] text-zinc-500 font-black uppercase mb-2 tracking-widest">Taxa de Conversão</p>
                    <p id="res-conversao" class="text-4xl font-black italic text-white">0%</p>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-8">
                <div class="card-glass p-8 rounded-[2.5rem]">
                    <h3 class="text-xs font-black uppercase tracking-widest mb-6 border-b border-zinc-800 pb-4 italic text-yellow-500">Reservas por Evento (Tempo Real)</h3>
                    <div id="container-reservas-evento" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="card-glass p-8 rounded-[2.5rem]">
                    <h3 class="text-xs font-black uppercase tracking-widest mb-6 border-b border-zinc-800 pb-4 italic text-blue-500">Ranking: Promoters</h3>
                    <div id="ranking-container" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
                </div>
                <div class="card-glass p-8 rounded-[2.5rem]">
                    <h3 class="text-xs font-black uppercase tracking-widest mb-6 border-b border-zinc-800 pb-4 italic text-green-500">Auditoria de Check-ins</h3>
                    <select id="filtro-promoter-checkin" class="w-full p-4 rounded-xl mb-6 font-bold text-xs uppercase" onchange="window.filtrarClientesCheckin()">
                        <option value="">Selecione um Promoter</option>
                    </select>
                    <div id="lista-clientes-checkin" class="max-h-[300px] overflow-y-auto pr-2 bg-black/20 rounded-xl p-4 font-mono text-[11px] select-all"></div>
                </div>
            </div>
        </section>

        <section id="aba-festas" class="hidden space-y-8">
            <div class="card-glass p-8 rounded-[2.5rem]">
                <h2 id="titulo-form" class="text-blue-500 font-black uppercase italic text-lg mb-8 tracking-widest">Novo Evento</h2>
                <form id="formEvento" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="hidden" id="edit_id">
                    <input type="text" id="nome_festa" placeholder="Nome da Festa" class="p-4 rounded-2xl font-bold" required>
                    <input type="date" id="data_festa" class="p-4 rounded-2xl font-bold" required>
                    <input type="time" id="hora_inicio" class="p-4 rounded-2xl font-bold" value="22:00">
                    <input type="url" id="url_banner" placeholder="URL do Banner" class="p-4 rounded-2xl font-bold" required>
                    <input type="text" id="valor_casal" placeholder="Valor Casal" class="p-4 rounded-2xl font-bold text-center">
                    <input type="text" id="valor_solteiro" placeholder="Valor Solteiro" class="p-4 rounded-2xl font-bold text-center">
                    <button type="submit" id="btnPublicar" class="col-span-1 md:col-span-2 bg-blue-600 text-white font-black py-5 rounded-2xl uppercase text-sm tracking-widest">Publicar Festa</button>
                </form>
            </div>
            <div id="lista-eventos-ativos" class="space-y-3"></div>
        </section>

        <section id="aba-equipe" class="hidden">
            <div class="card-glass p-8 rounded-[2.5rem]">
                <h2 class="text-green-500 font-black uppercase italic text-lg mb-8 tracking-widest">Gerenciar Equipe</h2>
                <form id="formEquipe" class="flex gap-4 mb-10">
                    <input type="text" id="nome_promoter" placeholder="Nome do Promoter" class="flex-grow p-4 rounded-2xl font-bold" required>
                    <button type="submit" class="bg-green-600 px-10 rounded-2xl font-black uppercase text-xs text-white">Salvar</button>
                </form>
                <div id="lista-promoters" class="space-y-3"></div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let todasReservasGlobal = [];
        let eventosAtivosGlobal = [];

        window.trocarAba = (id, botao) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            botao.classList.add('active');
        };

        // ESCUTA EVENTOS ATIVOS
        onSnapshot(query(collection(db, "eventos"), where("ativo", "==", true)), (snap) => {
            eventosAtivosGlobal = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderizarRelatorioPorEvento();
            renderizarListaEventos();
        });

        // ESCUTA TODAS AS RESERVAS
        onSnapshot(collection(db, "lista_eventos"), (snap) => {
            todasReservasGlobal = snap.docs.map(d => d.data());
            renderizarRelatorioGeral();
            renderizarRelatorioPorEvento();
        });

        function renderizarRelatorioGeral() {
            let total = todasReservasGlobal.length;
            let checkins = todasReservasGlobal.filter(r => r.entrou).length;
            document.getElementById('res-total').innerText = total;
            document.getElementById('res-checkin-total').innerText = checkins;
            document.getElementById('res-conversao').innerText = (total > 0 ? Math.round((checkins / total) * 100) : 0) + '%';
            
            // Ranking Promoters
            const rankingContainer = document.getElementById('ranking-container');
            rankingContainer.innerHTML = '';
            let ranking = {};
            todasReservasGlobal.forEach(r => {
                ranking[r.promoter] = (ranking[r.promoter] || 0) + 1;
            });
            Object.entries(ranking).sort((a,b) => b[1]-a[1]).forEach(([nome, qtd]) => {
                rankingContainer.innerHTML += `<div class="flex justify-between p-3 bg-black/20 rounded-xl border border-zinc-800">
                    <span class="uppercase font-black">${nome}</span>
                    <span class="text-yellow-500 font-black">${qtd}</span>
                </div>`;
            });
        }

        // NOVO: Renderiza o card de reservas por evento
        function renderizarRelatorioPorEvento() {
            const container = document.getElementById('container-reservas-evento');
            container.innerHTML = '';

            eventosAtivosGlobal.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(ev => {
                const totalEvento = todasReservasGlobal.filter(r => r.evento === ev.nome).length;
                
                container.innerHTML += `
                    <div class="bg-black/40 border border-zinc-800 p-6 rounded-3xl flex flex-col items-center justify-center text-center">
                        <p class="text-[9px] text-zinc-500 font-black uppercase mb-1 tracking-tighter">${ev.data.split('-').reverse().join('/')}</p>
                        <h4 class="text-sm font-black uppercase italic mb-3 text-white truncate w-full">${ev.nome}</h4>
                        <div class="bg-yellow-500 text-black px-6 py-2 rounded-full font-black text-xl italic shadow-lg">
                            ${totalEvento}
                        </div>
                        <p class="text-[8px] text-zinc-400 font-black uppercase mt-2">Reservas na Lista</p>
                    </div>
                `;
            });
        }

        // FUNÇÕES DE EQUIPE E FESTAS (MANTIDAS)
        function renderizarListaEventos() {
            const container = document.getElementById('lista-eventos-ativos');
            container.innerHTML = '';
            eventosAtivosGlobal.forEach(ev => {
                container.innerHTML += `<div class="bg-black/40 p-4 rounded-2xl border border-zinc-800 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <img src="${ev.imagem}" class="w-10 h-10 rounded-lg object-cover">
                        <div><h4 class="font-black uppercase text-[10px]">${ev.nome}</h4><p class="text-yellow-500 text-[8px]">${ev.data}</p></div>
                    </div>
                    <button onclick="removerEvento('${ev.id}')" class="bg-red-900/20 text-red-500 p-2 rounded-xl text-[8px] font-black uppercase">Excluir</button>
                </div>`;
            });
        }

        window.removerEvento = async (id) => { if(confirm("Desativar?")) await updateDoc(doc(db, "eventos", id), { ativo: false }); };

        document.getElementById('formEvento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dados = {
                nome: document.getElementById('nome_festa').value,
                data: document.getElementById('data_festa').value,
                imagem: document.getElementById('url_banner').value,
                valor_casal: document.getElementById('valor_casal').value,
                valor_solteiro: document.getElementById('valor_solteiro').value,
                ativo: true
            };
            await addDoc(collection(db, "eventos"), dados);
            alert("Sucesso!");
            e.target.reset();
        });

    </script>
</body>
</html>
