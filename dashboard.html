<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB MASTER | Command Center</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; }
        .glass-card { background: rgba(18, 18, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 2rem; }
        .stat-card { transition: transform 0.3s ease; border-left: 4px solid #eab308; }
        .btn-menu { background: #18181b; border: 1px solid #27272a; transition: 0.3s; color: #71717a; }
        .btn-menu.active { background: #eab308; color: #000; font-weight: 800; border-color: #fbbf24; box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
        input, select { background-color: #09090b !important; border: 1px solid #27272a !important; color: #ffffff !important; transition: 0.3s; }
        input:focus, select:focus { border-color: #eab308 !important; outline: none; }
        .event-card { background: linear-gradient(145deg, #0f0f10 0%, #050505 100%); border: 1px solid #1a1a1c; transition: 0.3s; cursor: pointer; }
        .event-card:hover { border-color: #eab308; transform: translateY(-3px); }
        .aniv-badge { background: rgba(147, 51, 234, 0.2); color: #c084fc; border: 1px solid rgba(147, 51, 234, 0.3); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 w-auto">
                <div>
                    <h1 class="text-2xl font-black uppercase italic tracking-tighter text-yellow-500 leading-none">Command Center</h1>
                    <p class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1 italic">E-CLUB MANAGEMENT</p>
                </div>
            </div>
            <nav class="flex bg-zinc-900/50 p-1.5 rounded-2xl border border-zinc-800">
                <button onclick="trocarAba('aba-inteligencia', this)" class="btn-menu active px-6 py-2.5 rounded-xl text-[10px] uppercase font-black">Inteligência</button>
                <button onclick="trocarAba('aba-festas', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black">Eventos</button>
                <button onclick="trocarAba('aba-equipe', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black">Promoters</button>
            </nav>
        </header>

        <section id="aba-inteligencia" class="space-y-8">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass-card p-6 stat-card"><span class="text-[9px] font-black uppercase text-zinc-500">Reservas Totais</span><p id="total-reservas" class="text-3xl font-black italic text-white">0</p></div>
                <div class="glass-card p-6 stat-card border-l-green-500"><span class="text-[9px] font-black uppercase text-zinc-500">Total Entradas</span><p id="total-entradas" class="text-3xl font-black italic text-green-500">0</p></div>
                <div class="glass-card p-6 stat-card border-l-purple-500"><span class="text-[9px] font-black uppercase text-zinc-500">Conversão</span><p id="conversao-geral" class="text-3xl font-black italic text-purple-400">0%</p></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 glass-card p-8">
                    <h2 class="text-xs font-black uppercase mb-6 border-b border-zinc-800 pb-4 text-yellow-500 italic">Ranking Promoters</h2>
                    <div id="lista-ranking-promoters" class="space-y-4"></div>
                </div>
                <div class="lg:col-span-2 glass-card p-8">
                    <h2 class="text-xs font-black uppercase mb-6 border-b border-zinc-800 pb-4 text-blue-500 italic text-white">Monitor de Reservas (Tempo Real)</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-[11px] font-bold uppercase">
                            <thead class="text-zinc-500 border-b border-zinc-800">
                                <tr>
                                    <th class="py-3">Nome</th>
                                    <th class="py-3">Tipo</th>
                                    <th class="py-3">Promoter</th>
                                    <th class="py-3">Lista</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-reservas-realtime" class="divide-y divide-zinc-900"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>

        <section id="aba-festas" class="hidden space-y-8">
             <div class="glass-card p-8 border-l-4 border-l-blue-500">
                <h2 id="titulo-form-evento" class="text-blue-500 font-black uppercase italic text-xl mb-8 tracking-tighter">Configurar Evento</h2>
                <form id="formEvento" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="hidden" id="edit_evento_id">
                    <input type="text" id="nome_festa" placeholder="Nome do Evento" class="p-4 rounded-2xl font-bold md:col-span-3 text-white" required>
                    <input type="date" id="data_festa" class="p-4 rounded-2xl font-bold text-white uppercase text-xs" required>
                    
                    <p class="md:col-span-4 text-[10px] font-black text-zinc-600 uppercase tracking-widest mt-4">Valores Normais</p>
                    <input type="text" id="valor_casal" placeholder="Casal Normal" class="p-4 rounded-2xl font-bold text-white">
                    <input type="text" id="valor_solteiro" placeholder="Solteiro Normal" class="p-4 rounded-2xl font-bold text-white">
                    
                    <p class="md:col-span-4 text-[10px] font-black text-purple-600 uppercase tracking-widest mt-4">Valores Desconto (Aniversário)</p>
                    <input type="text" id="desc_casal" placeholder="Casal Aniv." class="p-4 rounded-2xl font-bold text-purple-400 border-purple-900/50">
                    <input type="text" id="desc_solteiro" placeholder="Solteiro Aniv." class="p-4 rounded-2xl font-bold text-purple-400 border-purple-900/50">
                    
                    <input type="url" id="url_banner" placeholder="Link do Banner (Imagem)" class="md:col-span-3 p-4 rounded-2xl font-bold text-white">
                    <input type="time" id="hora_encerramento" class="p-4 rounded-2xl font-bold text-white text-xs">
                    
                    <button type="submit" id="btn-submit-evento" class="md:col-span-4 bg-blue-600 text-white font-black py-5 rounded-3xl uppercase text-sm">Publicar Evento</button>
                </form>
            </div>
            <div id="lista-eventos-ativos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="aba-equipe" class="hidden space-y-8">
            <div class="glass-card p-8 border-l-4 border-l-yellow-500">
                <h2 id="titulo-form-promoter" class="text-yellow-500 font-black uppercase italic text-xl mb-8 tracking-tighter">Gestão de Promoters</h2>
                <form id="formPromoter" class="flex flex-col md:flex-row gap-3 mb-10">
                    <input type="hidden" id="edit_promoter_id">
                    <input type="text" id="nome_promoter" placeholder="Nome do Promoter" class="flex-grow p-4 rounded-2xl font-bold text-sm" required>
                    <select id="tipo_promoter" class="p-4 rounded-2xl font-bold text-xs">
                        <option value="padrao">Padrão</option>
                        <option value="aniversario">Aniversário (VIP)</option>
                    </select>
                    <button type="submit" id="btn-submit-promoter" class="bg-yellow-600 px-10 py-4 rounded-2xl font-black uppercase text-xs text-black">Salvar</button>
                </form>
                <div id="lista-promoters" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, setDoc, addDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let dadosReservas = []; let dadosEventos = []; let dadosPromoters = [];

        window.trocarAba = (id, b) => { 
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); 
            document.querySelectorAll('.btn-menu').forEach(x => x.classList.remove('active')); 
            document.getElementById(id).classList.remove('hidden'); 
            b.classList.add('active'); 
        };

        onSnapshot(query(collection(db, "lista_eventos"), orderBy("data_reserva", "desc")), snap => { 
            dadosReservas = snap.docs.map(d => ({id: d.id, ...d.data()})); 
            atualizarInterfaceInteligencia(); 
        });
        onSnapshot(collection(db, "eventos"), snap => { 
            dadosEventos = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(e => e.ativo); 
            renderizarEventos(); 
        });
        onSnapshot(collection(db, "promoters"), snap => { 
            dadosPromoters = snap.docs.map(d => ({id: d.id, ...d.data()})); 
            renderizarPromoters(); 
        });

        function atualizarInterfaceInteligencia() {
            const ent = dadosReservas.filter(r => r.entrou).length;
            document.getElementById('total-reservas').innerText = dadosReservas.length;
            document.getElementById('total-entradas').innerText = ent;
            document.getElementById('conversao-geral').innerText = dadosReservas.length > 0 ? Math.round((ent / dadosReservas.length) * 100) + "%" : "0%";

            document.getElementById('tabela-reservas-realtime').innerHTML = dadosReservas.slice(0, 15).map(r => `
                <tr class="text-white">
                    <td class="py-4 font-black">${r.nome}</td>
                    <td class="py-4 text-[9px] text-zinc-400">${r.tipo_entrada || '---'}</td>
                    <td class="py-4 text-blue-400">${r.promoter || 'DIRETO'}</td>
                    <td class="py-4 italic">
                        ${r.tipo_lista === 'ANIVERSARIO' ? `<span class="px-2 py-1 aniv-badge rounded-lg text-[8px]">🎂 ${r.aniversariante}</span>` : 'NORMAL'}
                    </td>
                </tr>
            `).join('');

            const statsP = {};
            dadosReservas.forEach(r => { const n = (r.promoter || "DIRETO").trim().toUpperCase(); statsP[n] = (statsP[n] || 0) + 1; });
            document.getElementById('lista-ranking-promoters').innerHTML = Object.entries(statsP).sort((a,b)=>b[1]-a[1]).map(([n,s], i) => `
                <div class="flex justify-between items-center p-4 bg-zinc-900/40 rounded-2xl">
                    <p class="text-[11px] font-black uppercase text-white">${i+1}º ${n}</p>
                    <p class="text-xl font-black text-yellow-500">${s}</p>
                </div>
            `).join('');
        }

        function renderizarEventos() {
            document.getElementById('lista-eventos-ativos').innerHTML = dadosEventos.map(ev => `
                <div class="event-card p-6 rounded-[2rem] flex flex-col gap-4 relative" onclick="prepararEdicaoEvento('${ev.id}')">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[10px] font-black text-yellow-500 uppercase tracking-widest">${ev.data.split('-').reverse().join('/')}</p>
                            <h4 class="text-lg font-black uppercase text-white leading-tight mt-1">${ev.nome}</h4>
                        </div>
                        <button onclick="event.stopPropagation(); removerItem('eventos', '${ev.id}')" class="text-red-500 font-black">✕</button>
                    </div>
                </div>`).join('');
        }

        function renderizarPromoters() {
            document.getElementById('lista-promoters').innerHTML = dadosPromoters.map(p => `
                <div class="glass-card p-6 border-l-4 ${p.tipo === 'aniversario' ? 'border-purple-500' : 'border-blue-500'} relative">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-xs font-black uppercase text-white">${p.nome || p.id}</p>
                            <p class="text-[9px] text-zinc-500 uppercase font-bold">${p.tipo === 'aniversario' ? '🎂 ANIVERSÁRIO' : 'PADRÃO'}</p>
                            <p class="text-[9px] text-yellow-500 mt-2 font-black uppercase">Senha: ${p.senha || '---'}</p>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button onclick="prepararEdicaoPromoter('${p.id}')" class="text-blue-500 text-xs">Editar</button>
                            <button onclick="removerItem('promoters', '${p.id}')" class="text-red-500 text-xs">✕</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('formEvento').addEventListener('submit', async e => {
            e.preventDefault();
            const id = document.getElementById('edit_evento_id').value;
            const dados = { 
                nome: document.getElementById('nome_festa').value, 
                data: document.getElementById('data_festa').value, 
                valor_casal: document.getElementById('valor_casal').value, 
                valor_solteiro: document.getElementById('valor_solteiro').value,
                desc_casal: document.getElementById('desc_casal').value,
                desc_solteiro: document.getElementById('desc_solteiro').value,
                imagem: document.getElementById('url_banner').value,
                encerramento: document.getElementById('hora_encerramento').value,
                ativo: true 
            };
            if(id) { await updateDoc(doc(db, "eventos", id), dados); } 
            else { await addDoc(collection(db, "eventos"), dados); }
            e.target.reset(); document.getElementById('edit_evento_id').value = "";
            document.getElementById('titulo-form-evento').innerText = "Configurar Evento";
        });

        document.getElementById('formPromoter').addEventListener('submit', async e => {
            e.preventDefault();
            const nomeRaw = document.getElementById('nome_promoter').value.trim();
            const tipo = document.getElementById('tipo_promoter').value;
            const idExistente = document.getElementById('edit_promoter_id').value;
            
            await setDoc(doc(db, "promoters", nomeRaw.toLowerCase()), { nome: nomeRaw, tipo: tipo, ativo: true }, { merge: true });
            
            e.target.reset();
            document.getElementById('edit_promoter_id').value = "";
            document.getElementById('titulo-form-promoter').innerText = "Gestão de Promoters";
        });

        window.prepararEdicaoPromoter = (id) => {
            const p = dadosPromoters.find(item => item.id === id);
            document.getElementById('edit_promoter_id').value = p.id;
            document.getElementById('nome_promoter').value = p.nome;
            document.getElementById('tipo_promoter').value = p.tipo;
            document.getElementById('titulo-form-promoter').innerText = "Editando: " + p.nome;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.prepararEdicaoEvento = (id) => {
            const ev = dadosEventos.find(e => e.id === id);
            document.getElementById('edit_evento_id').value = ev.id;
            document.getElementById('nome_festa').value = ev.nome;
            document.getElementById('data_festa').value = ev.data;
            document.getElementById('valor_casal').value = ev.valor_casal || "";
            document.getElementById('valor_solteiro').value = ev.valor_solteiro || "";
            document.getElementById('desc_casal').value = ev.desc_casal || "";
            document.getElementById('desc_solteiro').value = ev.desc_solteiro || "";
            document.getElementById('url_banner').value = ev.imagem || "";
            document.getElementById('hora_encerramento').value = ev.encerramento || "";
            document.getElementById('titulo-form-evento').innerText = "Editando Festa";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.removerItem = async (c, i) => { if(confirm("Remover?")) await deleteDoc(doc(db, c, i)); };
    </script>
</body>
</html>
