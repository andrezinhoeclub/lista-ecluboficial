<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Master - Eclub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white font-sans min-h-screen p-4">

    <div id="loginAdmin" class="flex flex-col items-center justify-center min-h-[80vh]">
        <div class="w-full max-w-sm bg-zinc-800 p-8 rounded-3xl border border-zinc-700 shadow-2xl text-center">
            <img src="https://raw.githubusercontent.com/andrezinhoeclub/lista-ecluboficial/main/logo-erotic.png" class="h-12 mx-auto mb-6">
            <h1 class="text-2xl font-bold mb-6 text-yellow-500 uppercase tracking-tighter">Gestão Master</h1>
            <input type="text" id="userAdmin" placeholder="Usuário Master" class="w-full bg-zinc-700 border border-zinc-600 p-3 rounded-xl mb-4 text-white outline-none focus:border-yellow-500">
            <input type="password" id="passAdmin" placeholder="Senha" class="w-full bg-zinc-700 border border-zinc-600 p-3 rounded-xl mb-6 text-white outline-none focus:border-yellow-500">
            <button onclick="loginMaster()" id="btnAcessar" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black py-4 rounded-xl transition uppercase">Acessar Relatórios</button>
            <p id="erro" class="text-red-500 text-xs mt-4 hidden">Acesso negado!</p>
        </div>
    </div>

    <div id="painelMaster" class="max-w-4xl mx-auto hidden">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 bg-zinc-800 p-6 rounded-2xl border border-zinc-700 gap-4">
            <div>
                <h1 class="text-2xl font-black text-yellow-500 uppercase italic leading-none">Eclub Analytics</h1>
                <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest mt-1">Gestão Completa de Eventos</p>
            </div>
            <div class="flex gap-2">
                <button onclick="abaAtiva('relatorios')" class="bg-zinc-700 hover:bg-zinc-600 px-4 py-2 rounded-lg text-xs font-bold transition uppercase">Relatórios</button>
                <button onclick="abaAtiva('eventos')" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-xs font-bold transition uppercase">Criar Festas</button>
                <button onclick="location.reload()" class="bg-red-600/20 text-red-500 px-4 py-2 rounded-lg text-xs font-bold transition uppercase">Sair</button>
            </div>
        </header>

        <div id="abaRelatorios" class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
                <div class="bg-zinc-800 p-6 rounded-2xl border border-zinc-700 shadow-lg">
                    <p class="text-zinc-500 text-[10px] uppercase font-black mb-1">Total na Lista</p>
                    <p id="totalLista" class="text-4xl font-black">0</p>
                </div>
                <div class="bg-zinc-800 p-6 rounded-2xl border border-zinc-700 shadow-lg border-b-green-500">
                    <p class="text-zinc-500 text-[10px] uppercase font-black mb-1 text-green-500">Presentes</p>
                    <p id="totalEntradas" class="text-4xl font-black text-green-500">0</p>
                </div>
                <div class="bg-zinc-800 p-6 rounded-2xl border border-zinc-700 shadow-lg border-b-blue-500">
                    <p class="text-zinc-500 text-[10px] uppercase font-black mb-1 text-blue-500">Conversão</p>
                    <p id="conversao" class="text-4xl font-black text-blue-500">0%</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <section class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 shadow-xl">
                    <h2 class="text-lg font-bold mb-4">🏆 Ranking Promoters</h2>
                    <div id="listaPromoters" class="space-y-3"></div>
                </section>
                <section class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 shadow-xl">
                    <h2 class="text-lg font-bold mb-2 text-yellow-500">📱 Contatos (Check-in)</h2>
                    <div class="flex gap-2 mb-4">
                        <select id="filtroPromoter" class="flex-1 bg-zinc-900 border border-zinc-700 p-2 rounded-lg text-xs text-white outline-none"></select>
                        <button onclick="puxarContatos()" class="bg-yellow-500 text-black px-4 py-2 rounded-lg font-black text-[10px] uppercase">Filtrar</button>
                    </div>
                    <div id="tabelaContatos" class="bg-zinc-900 rounded-xl p-3 max-h-60 overflow-y-auto font-mono text-[10px] hidden"></div>
                </section>
            </div>
            
            <div class="bg-red-900/10 border border-red-900/30 p-6 rounded-3xl text-center">
                <button onclick="limparBaseDados()" id="btnLimpar" class="text-red-500 text-xs font-black uppercase hover:underline">Limpar Banco de Clientes</button>
            </div>
        </div>

        <div id="abaEventos" class="hidden space-y-8">
            <section class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 shadow-xl">
                <h2 class="text-lg font-bold mb-6 text-blue-500 uppercase italic">Novo Evento</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="evNome" placeholder="Nome da Festa (Ex: Sábado Swing)" class="bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-sm outline-none focus:border-blue-500">
                    <input type="date" id="evData" class="bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-sm outline-none focus:border-blue-500">
                    <input type="time" id="evHora" class="bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-sm outline-none focus:border-blue-500" value="22:00">
                    <input type="text" id="evImagem" placeholder="Link do Banner (URL)" class="bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-sm outline-none focus:border-blue-500">
                    <input type="text" id="evPrecoCasal" placeholder="Valor Casal (Ex: R$ 100 consumíveis)" class="bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-sm outline-none focus:border-blue-500">
                    <input type="text" id="evPrecoSolteiro" placeholder="Valor Solteiro (Ex: Masc 80 | Fem 30)" class="bg-zinc-900 border border-zinc-700 p-3 rounded-xl text-sm outline-none focus:border-blue-500">
                </div>
                <button onclick="criarEvento()" id="btnCriarEv" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl transition uppercase shadow-lg">Publicar Evento no Site</button>
            </section>

            <section class="bg-zinc-800 p-6 rounded-3xl border border-zinc-700 shadow-xl">
                <h2 class="text-lg font-bold mb-4 uppercase text-zinc-400 text-xs tracking-widest">Eventos Ativos</h2>
                <div id="listaEventosAtivos" class="space-y-3"></div>
            </section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, deleteDoc, addDoc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let listaGeral = [];

        window.loginMaster = async function() {
            const u = document.getElementById('userAdmin').value.trim();
            const p = document.getElementById('passAdmin').value.trim();
            try {
                const snap = await getDoc(doc(db, "usuarios", u));
                if(snap.exists() && String(snap.data().senha) === String(p) && snap.data().nivel === "master") {
                    document.getElementById('loginAdmin').classList.add('hidden');
                    document.getElementById('painelMaster').classList.remove('hidden');
                    carregarRelatorios();
                    carregarEventosGerencia();
                } else { alert("Acesso Negado"); }
            } catch(e) { alert("Erro de conexão"); }
        }

        window.abaAtiva = (aba) => {
            document.getElementById('abaRelatorios').classList.toggle('hidden', aba !== 'relatorios');
            document.getElementById('abaEventos').classList.toggle('hidden', aba !== 'eventos');
        }

        // --- GESTÃO DE RELATÓRIOS ---
        async function carregarRelatorios() {
            const snap = await getDocs(collection(db, "lista_eventos"));
            listaGeral = []; snap.forEach(d => listaGeral.push(d.data()));
            document.getElementById('totalLista').innerText = listaGeral.length;
            const ent = listaGeral.filter(d => d.entrou).length;
            document.getElementById('totalEntradas').innerText = ent;
            document.getElementById('conversao').innerText = (listaGeral.length > 0 ? (ent / listaGeral.length * 100).toFixed(1) : 0) + "%";

            const promoters = [...new Set(listaGeral.map(d => d.promoter || "Direto"))];
            const sel = document.getElementById('filtroPromoter');
            sel.innerHTML = '<option value="">Promoter...</option>';
            promoters.forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);

            const pMap = {};
            listaGeral.forEach(d => {
                const p = d.promoter || "Direto";
                pMap[p] = (pMap[p] || 0) + (d.entrou ? 1 : 0);
            });
            const pCont = document.getElementById('listaPromoters');
            pCont.innerHTML = '';
            Object.keys(pMap).sort((a,b) => pMap[b] - pMap[a]).forEach(p => {
                pCont.innerHTML += `<div class="flex justify-between p-3 bg-zinc-900 rounded-xl border border-zinc-700/50 text-xs font-bold"><span class="text-yellow-500">${p}</span><span>${pMap[p]} PRESENÇAS</span></div>`;
            });
        }

        window.puxarContatos = () => {
            const p = document.getElementById('filtroPromoter').value;
            const res = document.getElementById('tabelaContatos');
            const filtrados = listaGeral.filter(d => (d.promoter || "Direto") === p && d.entrou);
            res.classList.remove('hidden');
            res.innerHTML = filtrados.length ? filtrados.map(c => `<div class="flex justify-between border-b border-zinc-800 py-1"><span>${c.nome}</span><span class="text-yellow-500">${c.telefone}</span></div>`).join('') : 'Ninguém entrou.';
        }

        // --- GESTÃO DE EVENTOS ---
        async function carregarEventosGerencia() {
            const snap = await getDocs(collection(db, "eventos"));
            const cont = document.getElementById('listaEventosAtivos');
            cont.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                cont.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-zinc-900 rounded-2xl border border-zinc-700/50">
                        <div>
                            <p class="font-black text-sm uppercase text-white">${data.nome}</p>
                            <p class="text-[10px] text-zinc-500 font-bold italic">${data.data} às ${data.hora}</p>
                        </div>
                        <button onclick="excluirEvento('${d.id}')" class="text-red-500 text-[10px] font-black hover:underline uppercase">Excluir</button>
                    </div>`;
            });
        }

        window.criarEvento = async () => {
            const nome = document.getElementById('evNome').value;
            const data = document.getElementById('evData').value;
            const hora = document.getElementById('evHora').value;
            const imagem = document.getElementById('evImagem').value;
            const valor_casal = document.getElementById('evPrecoCasal').value;
            const valor_solteiro = document.getElementById('evPrecoSolteiro').value;

            if(!nome || !data) return alert("Preencha Nome e Data!");
            
            document.getElementById('btnCriarEv').innerText = "PUBLICANDO...";
            try {
                // Usando o nome como ID para facilitar
                await setDoc(doc(db, "eventos", nome), {
                    nome, data, hora, imagem, valor_casal, valor_solteiro, ativo: true
                });
                alert("✅ Evento publicado com sucesso!");
                location.reload();
            } catch(e) { alert("Erro ao criar!"); }
        }

        window.excluirEvento = async (id) => {
            if(confirm("Deseja remover este evento do site?")) {
                await deleteDoc(doc(db, "eventos", id));
                carregarEventosGerencia();
            }
        }

        window.limparBaseDados = async function() {
            if(confirm("LIMPANDO TODOS OS CLIENTES?") && prompt("Digite EXCLUIR") === "EXCLUIR") {
                const snap = await getDocs(collection(db, "lista_eventos"));
                snap.forEach(async d => await deleteDoc(doc(db, "lista_eventos", d.id)));
                alert("Limpo!"); carregarRelatorios();
            }
        }
    </script>
</body>
</html>
