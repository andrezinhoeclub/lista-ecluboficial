<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB MASTER | Dashboard Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; }
        .glass-card { background: rgba(18, 18, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 1.5rem; }
        .btn-menu { background: #18181b; border: 1px solid #27272a; transition: 0.3s; }
        .btn-menu.active { background: #eab308; color: #000; font-weight: 800; border-color: #fbbf24; }
        input, select { background-color: #09090b !important; border: 1px solid #27272a !important; color: #ffffff !important; }
        input:focus, select:focus { border-color: #eab308 !important; outline: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-black uppercase italic tracking-tighter text-yellow-500">Master Dashboard</h1>
                <p class="text-zinc-500 font-bold uppercase text-[10px] tracking-widest text-white">Administração E-CLUB</p>
            </div>
            <nav class="flex bg-zinc-900/50 p-1.5 rounded-2xl border border-zinc-800">
                <button onclick="trocarAba('aba-inteligencia', this)" class="btn-menu active px-6 py-2.5 rounded-xl text-[10px] uppercase">Inteligência</button>
                <button onclick="trocarAba('aba-festas', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase">Eventos</button>
                <button onclick="trocarAba('aba-equipe', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase">Equipe & Acesso</button>
            </nav>
        </header>

        <section id="aba-inteligencia" class="space-y-8">
            <div class="glass-card p-10 text-center">
                <p class="text-zinc-500 uppercase font-black text-xs tracking-widest">Selecione as abas acima para gerenciar os dados</p>
            </div>
        </section>

        <section id="aba-festas" class="hidden space-y-8">
            <div class="glass-card p-10 text-center">
                <p class="text-zinc-500 uppercase font-black text-xs tracking-widest">Área de Gerenciamento de Festas</p>
            </div>
        </section>

        <section id="aba-equipe" class="hidden space-y-10">
            
            <div class="glass-card p-8 border-l-4 border-l-yellow-500">
                <h2 class="text-yellow-500 font-black uppercase italic text-lg mb-6 tracking-tight">Segurança: Acesso à Portaria</h2>
                <form id="formAcessoPortaria" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="login_portaria" placeholder="Login da Portaria" class="p-4 rounded-2xl font-bold text-white text-sm" required>
                    <input type="password" id="senha_portaria" placeholder="Senha da Portaria" class="p-4 rounded-2xl font-bold text-white text-sm" required>
                    <button type="submit" class="bg-yellow-600 text-black font-black py-4 rounded-2xl uppercase text-xs hover:bg-yellow-500 transition">Atualizar Senha</button>
                </form>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card p-8 border-l-4 border-l-blue-500">
                    <h2 class="text-blue-500 font-black uppercase italic text-lg mb-6">Promoters (Listas VIP)</h2>
                    <form id="formPromoter" class="flex gap-2 mb-6">
                        <input type="text" id="nome_promoter" placeholder="Nome do Promoter" class="flex-grow p-4 rounded-2xl font-bold text-sm" required>
                        <button type="submit" class="bg-blue-600 px-6 rounded-2xl font-black uppercase text-xs text-white">Add</button>
                    </form>
                    <div id="lista-promoters" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                        </div>
                </div>

                <div class="glass-card p-8 border-l-4 border-l-green-500">
                    <h2 class="text-green-500 font-black uppercase italic text-lg mb-6">Staff (Por Setor)</h2>
                    <form id="formStaff" class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-6">
                        <input type="text" id="nome_staff" placeholder="Nome do Funcionário" class="p-4 rounded-2xl font-bold text-sm" required>
                        <select id="setor_staff" class="p-4 rounded-2xl font-bold text-sm text-white" required>
                            <option value="">Selecione o Setor</option>
                            <option value="Bar">Bar</option>
                            <option value="Caixa">Caixa</option>
                            <option value="Segurança">Segurança</option>
                            <option value="Cozinha">Cozinha</option>
                            <option value="Limpeza">Limpeza</option>
                            <option value="Gerência">Gerência</option>
                        </select>
                        <button type="submit" class="md:col-span-2 bg-green-600 py-4 rounded-2xl font-black uppercase text-xs text-white mt-2">Cadastrar Staff</button>
                    </form>
                    <div id="lista-staff" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                        </div>
                </div>
            </div>

        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, setDoc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.trocarAba = (id, botao) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.btn-menu').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            botao.classList.add('active');
        };

        // --- GESTÃO DE ACESSO PORTARIA ---
        document.getElementById('formAcessoPortaria').addEventListener('submit', async (e) => {
            e.preventDefault();
            const login = document.getElementById('login_portaria').value;
            const senha = document.getElementById('senha_portaria').value;
            try {
                await setDoc(doc(db, "configuracoes", "portaria"), { login, senha });
                alert("Acesso Portaria Atualizado!");
            } catch (err) { alert("Erro ao salvar."); }
        });

        // Carrega login atual para exibir no campo
        const carregarAcesso = async () => {
            const snap = await getDoc(doc(db, "configuracoes", "portaria"));
            if (snap.exists()) {
                document.getElementById('login_portaria').value = snap.data().login;
            }
        };
        carregarAcesso();

        // --- GESTÃO DE PROMOTERS ---
        onSnapshot(collection(db, "equipe"), (snap) => {
            const container = document.getElementById('lista-promoters');
            container.innerHTML = '';
            const baseUrl = "https://andrezinhoeclub.github.io/lista-ecluboficial/index.html?ref=";
            
            snap.docs.forEach(d => {
                const p = d.data();
                const link = baseUrl + encodeURIComponent(p.nome);
                container.innerHTML += `
                    <div class="bg-zinc-900/50 p-4 rounded-2xl flex justify-between items-center border border-zinc-800">
                        <div>
                            <p class="text-xs font-black uppercase text-white">${p.nome}</p>
                            <p class="text-[8px] text-zinc-500 uppercase tracking-widest mt-1">Lista VIP</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="navigator.clipboard.writeText('${link}'); alert('Link Copiado!')" class="bg-zinc-800 p-2 rounded-lg text-[8px] font-black text-yellow-500 uppercase">Copiar Link</button>
                            <button onclick="removerItem('equipe', '${d.id}')" class="text-red-900 bg-red-900/10 p-2 rounded-lg text-xs font-bold">X</button>
                        </div>
                    </div>`;
            });
        });

        document.getElementById('formPromoter').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "equipe"), { nome: document.getElementById('nome_promoter').value });
            e.target.reset();
        });

        // --- GESTÃO DE STAFF (FUNCIONÁRIOS) ---
        onSnapshot(collection(db, "staff"), (snap) => {
            const container = document.getElementById('lista-staff');
            container.innerHTML = '';
            
            snap.docs.forEach(d => {
                const s = d.data();
                container.innerHTML += `
                    <div class="bg-zinc-900/50 p-4 rounded-2xl flex justify-between items-center border border-zinc-800">
                        <div>
                            <p class="text-xs font-black uppercase text-white">${s.nome}</p>
                            <p class="text-[8px] text-green-500 font-black uppercase tracking-widest mt-1">Setor: ${s.setor}</p>
                        </div>
                        <button onclick="removerItem('staff', '${d.id}')" class="text-red-900 bg-red-900/10 p-2 rounded-lg text-xs font-bold">X</button>
                    </div>`;
            });
        });

        document.getElementById('formStaff').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "staff"), { 
                nome: document.getElementById('nome_staff').value,
                setor: document.getElementById('setor_staff').value 
            });
            e.target.reset();
        });

        // Função Global para Deletar
        window.removerItem = async (col, id) => {
            if(confirm("Deseja remover este registro?")) {
                await deleteDoc(doc(db, col, id));
            }
        };

    </script>
</body>
</html>
