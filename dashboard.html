<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB MASTER | Command Center</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; }
        .glass-card { background: rgba(18, 18, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 2.5rem; }
        .btn-menu { background: #18181b; border: 1px solid #27272a; transition: 0.3s; color: #71717a; }
        .btn-menu.active { background: #eab308; color: #000; font-weight: 800; border-color: #fbbf24; box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
        
        /* Bolhas de Eventos */
        .event-bubble { background: #0c0c0e; border: 1px solid #1a1a1c; border-radius: 2rem; min-width: 260px; transition: 0.3s; }
        .event-bubble:hover { border-color: #eab308; transform: translateY(-5px); }
        
        /* Estilo Scroll Horizontal */
        .scroll-x { display: flex; overflow-x: auto; gap: 1.5rem; padding-bottom: 1rem; }
        .scroll-x::-webkit-scrollbar { height: 4px; }
        .scroll-x::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }

        input, select { background-color: #0c0c0e !important; border: 1px solid #27272a !important; color: white !important; outline: none; }
        input:focus, select:focus { border-color: #eab308; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-10 w-auto">
                <div>
                    <h1 class="text-2xl font-black uppercase italic tracking-tighter text-yellow-500 leading-none">Command Center</h1>
                    <p class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1 italic">E-CLUB MANAGEMENT</p>
                </div>
            </div>
            <nav class="flex bg-zinc-900/50 p-1.5 rounded-2xl border border-zinc-800">
                <button onclick="trocarAba('aba-relatorios', this)" class="btn-menu active px-6 py-2.5 rounded-xl text-[10px] uppercase font-black">Relatórios</button>
                <button onclick="trocarAba('aba-festas', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black">Eventos</button>
                <button onclick="trocarAba('aba-equipe', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black">Equipe</button>
            </nav>
        </header>

        <section id="aba-relatorios" class="space-y-8">
            
            <div class="glass-card p-8">
                <h2 class="text-xs font-black uppercase text-yellow-500 italic mb-8 tracking-widest">Performance por Evento</h2>
                <div id="container-bolhas" class="scroll-x">
                    </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <div class="lg:col-span-1 glass-card p-8">
                    <h2 class="text-xs font-black uppercase text-yellow-500 italic mb-8">Pódio Promoters</h2>
                    <div id="lista-ranking-podio" class="space-y-4">
                        </div>
                </div>

                <div class="lg:col-span-2 glass-card p-8 border-t-4 border-t-blue-600">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xs font-black uppercase text-blue-500 italic">Histórico de Check-ins por Promoter</h2>
                        <select id="filtro-promoter-excel" class="p-3 rounded-xl text-[10px] font-black uppercase" onchange="gerarListaCheckins()">
                            <option value="">Escolha um Promoter</option>
                        </select>
                    </div>
                    
                    <div class="relative">
                        <textarea id="output-excel" readonly class="w-full h-64 bg-black/40 border border-zinc-900 rounded-2xl p-4 text-[11px] font-mono text-zinc-400 outline-none" placeholder="Selecione um promoter acima para extrair a lista de clientes..."></textarea>
                        <button onclick="copiarOutput()" class="absolute top-4 right-4 bg-zinc-800 text-[9px] font-black px-4 py-2 rounded-xl uppercase hover:bg-white hover:text-black transition-all">Copiar para Excel</button>
                    </div>
                </div>

            </div>

        </section>

        <section id="aba-festas" class="hidden">...</section>
        <section id="aba-equipe" class="hidden">...</section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let dadosReservas = []; let dadosEventos = []; let dadosPromoters = [];

        window.trocarAba = (id, b) => { 
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); 
            document.querySelectorAll('.btn-menu').forEach(x => x.classList.remove('active')); 
            document.getElementById(id).classList.remove('hidden'); 
            b.classList.add('active'); 
        };

        // ESCUTAS
        onSnapshot(query(collection(db, "lista_eventos"), orderBy("data_reserva", "desc")), snap => { 
            dadosReservas = snap.docs.map(d => ({id: d.id, ...d.data()})); 
            renderizarRelatorios(); 
        });
        
        onSnapshot(collection(db, "eventos"), snap => { 
            dadosEventos = snap.docs.map(d => ({id: d.id, ...d.data()})); 
            renderizarRelatorios(); 
        });

        onSnapshot(collection(db, "promoters"), snap => { 
            dadosPromoters = snap.docs.map(d => ({id: d.id, ...d.data()})); 
            const sel = document.getElementById('filtro-promoter-excel');
            sel.innerHTML = '<option value="">Escolha um Promoter</option>' + dadosPromoters.map(p => `<option value="${p.id.toUpperCase()}">${p.nome || p.id}</option>`).join('');
        });

        function renderizarRelatorios() {
            // 1. BOLHAS DE EVENTOS (CRONOLÓGICO)
            const bolhasCont = document.getElementById('container-bolhas');
            const eventosFiltrados = dadosEventos.filter(e => e.ativo).sort((a,b) => new Date(a.data) - new Date(b.data));
            
            bolhasCont.innerHTML = eventosFiltrados.map(ev => {
                const res = dadosReservas.filter(r => r.evento === ev.nome).length;
                const chk = dadosReservas.filter(r => r.evento === ev.nome && r.entrou).length;
                return `
                <div class="event-bubble p-6 flex-shrink-0">
                    <p class="text-[9px] font-black text-yellow-500 uppercase tracking-widest mb-1">${ev.data.split('-').reverse().join('/')}</p>
                    <h4 class="text-sm font-black uppercase text-white mb-6 leading-tight h-10 overflow-hidden">${ev.nome}</h4>
                    <div class="flex justify-between border-t border-white/5 pt-4">
                        <div class="text-center"><p class="text-[7px] text-zinc-500 uppercase font-black">Reservas</p><p class="text-xl font-black text-white">${res}</p></div>
                        <div class="text-center"><p class="text-[7px] text-zinc-500 uppercase font-black">Check-ins</p><p class="text-xl font-black text-green-500">${chk}</p></div>
                        <div class="text-center"><p class="text-[7px] text-zinc-500 uppercase font-black">Conv.</p><p class="text-xl font-black text-blue-500">${res > 0 ? Math.round((chk/res)*100) : 0}%</p></div>
                    </div>
                </div>`;
            }).join('');

            // 2. RANKING PROMOTERS
            const stats = {};
            dadosReservas.forEach(r => {
                const p = (r.promoter || 'DIRETO').toUpperCase();
                if(!stats[p]) stats[p] = { res: 0, chk: 0 };
                stats[p].res++;
                if(r.entrou) stats[p].chk++;
            });

            const rankingSort = Object.entries(stats).sort((a,b) => b[1].res - a[1].res);
            const medalhas = ['🥇', '🥈', '🥉'];
            
            document.getElementById('lista-ranking-podio').innerHTML = rankingSort.map(([name, data], i) => `
                <div class="bg-black/40 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                    <div class="flex items-center gap-3">
                        <span class="text-lg">${medalhas[i] || '👤'}</span>
                        <div>
                            <p class="text-[10px] font-black text-white uppercase">${name}</p>
                            <p class="text-[7px] text-zinc-500 font-bold uppercase italic">Check-ins: ${data.chk}</p>
                        </div>
                    </div>
                    <p class="text-xl font-black text-yellow-500">${data.res}</p>
                </div>`).join('');
        }

        window.gerarListaCheckins = () => {
            const promoterAlvo = document.getElementById('filtro-promoter-excel').value;
            const area = document.getElementById('output-excel');
            if(!promoterAlvo) { area.value = ""; return; }

            // Filtra quem fez check-in com esse promoter em QUALQUER evento
            const lista = dadosReservas.filter(r => (r.promoter || '').toUpperCase() === promoterAlvo && r.entrou);
            
            if(lista.length === 0) { area.value = "Nenhum check-in encontrado para este promoter."; return; }

            let texto = "NOME\tTELEFONE\tEVENTO\n";
            lista.forEach(r => {
                texto += `${r.nome}\t${r.telefone || r.tel || '---'}\t${r.evento}\n`;
            });
            area.value = texto;
        };

        window.copiarOutput = () => {
            const area = document.getElementById('output-excel');
            if(!area.value) return;
            area.select();
            document.execCommand('copy');
            alert("Lista copiada! Cole no Excel.");
        };

    </script>
</body>
</html>
