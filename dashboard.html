<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-CLUB | Dashboard Administrativa</title>
    <link rel="icon" type="image/png" href="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; }
        .glass { background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .input-adm { background: #0f0f10 !important; border: 1px solid #27272a !important; color: #fff !important; }
        .input-adm:focus { border-color: #eab308 !important; outline: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto space-y-10">
        
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 glass p-8 rounded-[3rem]">
            <div class="flex items-center gap-4">
                <img src="https://andrezinhoeclub.github.io/lista-ecluboficial/logo.png" class="h-16">
                <div>
                    <h1 class="text-3xl font-black uppercase italic italic text-yellow-500">Dashboard</h1>
                    <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.3em]">Gestão Master E-CLUB</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="window.open('portaria_clientes.html')" class="bg-zinc-800 hover:bg-zinc-700 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase transition-all">Portaria Clientes</button>
                <button onclick="window.open('solteiras.html')" class="bg-zinc-800 hover:bg-zinc-700 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase transition-all">Portaria Solteiras</button>
            </div>
        </header>

        <!-- SEÇÃO: AUDITORIA DE RESERVAS (NOVIDADE) -->
        <section class="bg-zinc-900 border border-zinc-800 rounded-[3rem] overflow-hidden shadow-2xl">
            <div class="p-8 border-b border-zinc-800 flex justify-between items-center bg-black/20">
                <div>
                    <h2 class="text-xl font-black uppercase italic text-white leading-none">Monitor de Reservas Live</h2>
                    <p class="text-[9px] text-zinc-500 font-bold uppercase mt-2 tracking-widest">Acompanhe quem está entrando na lista e por qual promoter</p>
                </div>
                <div class="bg-green-500/10 border border-green-500/20 px-4 py-2 rounded-xl">
                    <span class="text-[10px] font-black text-green-500 uppercase animate-pulse">● Monitoramento Ativo</span>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-zinc-800/50">
                            <th class="p-5 text-[9px] font-black uppercase text-zinc-400">Data/Hora</th>
                            <th class="p-5 text-[9px] font-black uppercase text-zinc-400">Cliente / Telefone</th>
                            <th class="p-5 text-[9px] font-black uppercase text-zinc-400">Evento</th>
                            <th class="p-5 text-[9px] font-black uppercase text-zinc-400">Promoter / Origem</th>
                            <th class="p-5 text-[9px] font-black uppercase text-zinc-400">Status Entrada</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-auditoria" class="divide-y divide-zinc-800">
                        <!-- Conteúdo carregado via JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- (Aqui continuariam as outras seções da sua Dashboard, como Gestão de Eventos e Cadastro de Promoters) -->

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Sua Configuração do Firebase
        const firebaseConfig = { 
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", 
            authDomain: "teste-de-reserva.firebaseapp.com", 
            projectId: "teste-de-reserva", 
            storageBucket: "teste-de-reserva.firebasestorage.app", 
            messagingSenderId: "163395694876", 
            appId: "1:163395694876:web:8b1116a0483af951548ad9" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- LÓGICA DO MONITOR DE AUDITORIA ---
        const tabelaAuditoria = document.getElementById('tabela-auditoria');
        const qAuditoria = query(collection(db, "lista_eventos"), orderBy("data_reserva", "desc"), limit(15));

        onSnapshot(qAuditoria, (snapshot) => {
            tabelaAuditoria.innerHTML = '';
            
            if (snapshot.empty) {
                tabelaAuditoria.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-zinc-600 font-bold uppercase text-xs">Nenhuma reserva encontrada recentemente</td></tr>';
                return;
            }

            snapshot.forEach((doc) => {
                const r = doc.data();
                
                // Formatação de Data amigável
                const dataObj = new Date(r.data_reserva);
                const dataFormatada = dataObj.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}) + ' - ' + 
                                      dataObj.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});

                const row = `
                    <tr class="hover:bg-white/5 transition-colors border-l-2 border-transparent hover:border-l-yellow-500">
                        <td class="p-5 font-mono text-[10px] text-zinc-400">${dataFormatada}</td>
                        <td class="p-5">
                            <p class="text-xs font-black text-white uppercase">${r.nome}</p>
                            <p class="text-[9px] text-zinc-500 font-bold">${r.tel || '---'}</p>
                        </td>
                        <td class="p-5">
                            <span class="text-[10px] font-bold text-zinc-300 uppercase bg-zinc-800 px-3 py-1 rounded-lg">${r.evento}</span>
                        </td>
                        <td class="p-5">
                            <div class="flex flex-col gap-1">
                                <span class="w-max px-3 py-1 rounded-md bg-yellow-500/10 border border-yellow-500/20 text-yellow-500 text-[9px] font-black uppercase">
                                    👤 ${r.promoter || 'SITE DIRETO'}
                                </span>
                                ${r.aniversariante ? `<span class="text-[8px] text-fuchsia-400 font-bold uppercase italic ml-1">🎂 Convite: ${r.aniversariante}</span>` : ''}
                            </div>
                        </td>
                        <td class="p-5">
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] font-black uppercase ${r.entrou ? 'text-green-500' : 'text-zinc-600'}">
                                    ${r.entrou ? '✓ Check-in Realizado' : '○ Aguardando'}
                                </span>
                                ${r.porteiro ? `<span class="text-[8px] text-zinc-500 italic lowercase">(por: ${r.porteiro})</span>` : ''}
                            </div>
                        </td>
                    </tr>
                `;
                tabelaAuditoria.innerHTML += row;
            });
        });

    </script>
</body>
</html>
