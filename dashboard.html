<section id="aba-equipe" class="hidden space-y-8">
    <div class="glass-card p-8 border-l-4 border-l-yellow-500">
        <h2 id="titulo-form-promoter" class="text-yellow-500 font-black uppercase italic text-xl mb-8 tracking-tighter">Gestão de Promoters</h2>
        <form id="formPromoter" class="flex flex-col md:flex-row gap-3 mb-8">
            <input type="hidden" id="edit_promoter_id">
            <input type="text" id="nome_promoter" placeholder="Nome do Promoter" class="flex-grow p-4 rounded-2xl font-bold text-sm" required>
            <select id="tipo_promoter" class="p-4 rounded-2xl font-bold text-xs">
                <option value="padrao">Padrão</option>
                <option value="aniversario">Aniversário (VIP)</option>
            </select>
            <button type="submit" id="btn-submit-promoter" class="bg-yellow-600 px-10 py-4 rounded-2xl font-black uppercase text-xs text-black btn-action">Salvar</button>
        </form>
        <div id="lista-promoters" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>
</section>

<script type="module">
    // ... (Mantenha as importações e config do Firebase iguais)

    // Função para Renderizar Promoters com Botão de Edição
    function renderizarPromoters() {
        document.getElementById('lista-promoters').innerHTML = dadosPromoters.map(p => `
            <div class="glass-card p-5 border-l-4 ${p.tipo === 'aniversario' ? 'border-purple-500' : 'border-blue-500'} relative group">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-xs font-black uppercase text-white">${p.nome || p.id}</p>
                        <p class="text-[9px] text-zinc-500 uppercase font-bold">${p.tipo === 'aniversario' ? '🎂 ANIVERSÁRIO' : 'PADRÃO'}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="prepararEdicaoPromoter('${p.id}')" class="text-blue-500 hover:text-blue-400 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                            </svg>
                        </button>
                        <button onclick="removerItem('promoters', '${p.id}')" class="text-red-600 hover:text-red-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                </div>
                <p class="text-[9px] text-yellow-500 mt-2 font-black uppercase tracking-widest">Senha: ${p.senha || '---'}</p>
            </div>
        `).join('');
    }

    // Função para carregar os dados no formulário de edição
    window.prepararEdicaoPromoter = (id) => {
        const p = dadosPromoters.find(item => item.id === id);
        if (!p) return;

        document.getElementById('edit_promoter_id').value = p.id;
        document.getElementById('nome_promoter').value = p.nome;
        document.getElementById('tipo_promoter').value = p.tipo;
        
        document.getElementById('titulo-form-promoter').innerText = "Editando Promoter: " + p.nome;
        document.getElementById('btn-submit-promoter').innerText = "Atualizar Cadastro";
        
        // Scroll para o formulário
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    // Ajuste no Submit do Formulário de Promoter
    document.getElementById('formPromoter').addEventListener('submit', async e => {
        e.preventDefault();
        const idExistente = document.getElementById('edit_promoter_id').value;
        const nomeRaw = document.getElementById('nome_promoter').value.trim();
        const tipo = document.getElementById('tipo_promoter').value;

        try {
            // Usamos o nome (id) como referência para manter a consistência
            await setDoc(doc(db, "promoters", nomeRaw.toLowerCase()), { 
                nome: nomeRaw, 
                tipo: tipo, 
                ativo: true 
            }, { merge: true }); // Merge garante que não apague outros campos como a senha se já existir

            // Reseta o formulário
            e.target.reset();
            document.getElementById('edit_promoter_id').value = "";
            document.getElementById('titulo-form-promoter').innerText = "Gestão de Promoters";
            document.getElementById('btn-submit-promoter').innerText = "Adicionar";
            
        } catch (error) {
            console.error("Erro ao salvar promoter:", error);
            alert("Erro ao salvar.");
        }
    });

    // ... (Mantenha o restante das funções de eventos e snapshots)
</script>
