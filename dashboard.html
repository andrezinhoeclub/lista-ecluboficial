<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Eclub - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-glass { background: #18181b; border: 1px solid #27272a; }
        input, select { background: #09090b !important; border: 1px solid #27272a !important; color: white !important; transition: all 0.3s ease; }
        input:focus { border-color: #eab308 !important; outline: none; }
        .btn-nav { background: #3f3f46; color: white; font-weight: 900; transition: all 0.2s; }
        .btn-nav.active { background: #eab308; color: black; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen p-6">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black uppercase italic text-yellow-500 tracking-tighter">Gestão Eclub</h1>
            <nav class="flex space-x-2">
                <button onclick="abrirAba('aba-relatorios')" id="nav-relatorios" class="btn-nav px-4 py-2 rounded-xl text-[10px] uppercase active">Relatórios</button>
                <button onclick="abrirAba('aba-festas')" id="nav-festas" class="btn-nav px-4 py-2 rounded-xl text-[10px] uppercase">Festas</button>
                <button onclick="abrirAba('aba-equipe')" id="nav-equipe" class="btn-nav px-4 py-2 rounded-xl text-[10px] uppercase">Equipe</button>
                <button onclick="window.location.href='index.html'" class="bg-red-900/50 text-red-500 px-4 py-2 rounded-xl text-[10px] uppercase font-black">Sair</button>
            </nav>
        </header>

        <section id="aba-relatorios" class="fade-in">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div class="card-glass p-6 rounded-[2rem] text-center border-t-2 border-yellow-500">
                    <p class="text-[10px] text-zinc-500 font-black uppercase mb-1">Total Reservas</p>
                    <p id="dash-total" class="text-3xl font-black italic">0</p>
                </div>
                <div class="card-glass p-6 rounded-[2rem] text-center">
                    <p class="text-[10px] text-zinc-500 font-black uppercase mb-1">Casais</p>
                    <p id="dash-casais" class="text-3xl font-black italic text-yellow-500">0</p>
                </div>
                <div class="card-glass p-6 rounded-[2rem] text-center">
                    <p class="text-[10px] text-zinc-500 font-black uppercase mb-1">Solteiros</p>
                    <p id="dash-solteiros" class="text-3xl font-black italic">0</p>
                </div>
            </div>
            <div class="card-glass p-8 rounded-[2.5rem]">
                <h3 class="text-xs font-black uppercase tracking-widest mb-6 border-b border-zinc-800 pb-4 italic">Performance de Promoters</h3>
                <div id="lista-ranking" class="space-y-4">
                    </div>
            </div>
        </section>

        <section id="aba-festas" class="hidden fade-in">
            <div class="card-glass p-8 rounded-[2.5rem]">
                <h2 class="text-blue-500 font-black uppercase italic text-lg mb-8 tracking-widest">Novo Evento</h2>
                <form id="formEvento" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="nome_festa" placeholder="Nome da Festa" class="p-4 rounded-2xl font-bold" required>
                    <input type="date" id="data_festa" class="p-4 rounded-2xl font-bold" required onchange="document.getElementById('data_fim').value = this.value">
                    <input type="time" id="hora_inicio" class="p-4 rounded-2xl font-bold" value="22:00" required>
                    <input type="url" id="url_banner" placeholder="URL do Banner" class="p-4 rounded-2xl font-bold" required>
                    <input type="text" id="valor_casal" placeholder="Valor Casal" class="p-4 rounded-2xl font-bold text-center">
                    <input type="text" id="valor_solteiro" placeholder="Valor Solteiro" class="p-4 rounded-2xl font-bold text-center">
                    
                    <div class="col-span-1 md:col-span-2 bg-black/40 p-6 rounded-[2rem] border border-dashed border-zinc-800">
                        <label class="text-[10px] font-black uppercase text-yellow-500 ml-2">Encerrar Lista Automático em:</label>
                        <div class="grid grid-cols-2 gap-4 mt-3">
                            <input type="date" id="data_fim" class="p-4 rounded-xl font-bold" required>
                            <input type="time" id="hora_fim" class="p-4 rounded-xl font-bold" value="23:59" required>
                        </div>
                    </div>
                    <button type="submit" id="btnPublicar" class="col-span-1 md:col-span-2 bg-blue-600 text-white font-black py-5 rounded-2xl uppercase text-sm tracking-widest">Publicar Festa no Site</button>
                </form>
            </div>
        </section>

        <section id="aba-equipe" class="hidden fade-in">
            <div class="card-glass p-8 rounded-[2.5rem]">
                <h2 class="text-green-500 font-black uppercase italic text-lg mb-8 tracking-widest">Gerenciar Equipe</h2>
                <form id="formPromoter" class="flex gap-4 mb-10">
                    <input type="text" id="nome_promoter" placeholder="Nome do Promoter" class="flex-grow p-4 rounded-2xl font-bold" required>
                    <button type="submit" class="bg-green-600 px-8 rounded-2xl font-black uppercase text-xs">Adicionar</button>
                </form>
                <div id="lista-equipe" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    </div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
            authDomain: "teste-de-reserva.firebaseapp.com",
            projectId: "teste-de-reserva",
            storageBucket: "teste-de-reserva.firebasestorage.app",
            messagingSenderId: "163395694876",
            appId: "1:163395694876:web:8b1116a0483af951548ad9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // NAVEGAÇÃO ENTRE ABAS
        window.abrirAba = (abaId) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            document.getElementById(abaId).classList.remove('hidden');
            document.getElementById('nav-' + abaId.split('-')[1]).classList.add('active');
        };

        // LÓGICA DE RELATÓRIOS
        onSnapshot(collection(db, "lista_eventos"), (snap) => {
            let t = 0, c = 0, s = 0, ranking = {};
            snap.forEach(d => {
                const r = d.data(); t++;
                if(r.tipo === 'casal') c++; else s++;
                ranking[r.promoter] = (ranking[r.promoter] || 0) + 1;
            });
            document.getElementById('dash-total').innerText = t;
            document.getElementById('dash-casais').innerText = c;
            document.getElementById('dash-solteiros').innerText = s;
            
            const rankDiv = document.getElementById('lista-ranking');
            rankDiv.innerHTML = '';
            Object.entries(ranking).sort((a,b) => b[1]-a[1]).forEach(([nome, qtd]) => {
                const perc = Math.round((qtd/t)*100);
                rankDiv.innerHTML += `<div class="flex justify-between items-center bg-black/20 p-4 rounded-xl">
                    <span class="font-black uppercase text-xs">${nome}</span>
                    <span class="text-yellow-500 font-black">${qtd} (${perc}%)</span>
                </div>`;
            });
        });

        // SALVAR EVENTO (TRAVA)
        document.getElementById('formEvento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dataFechamentoStr = `${document.getElementById('data_fim').value}T${document.getElementById('hora_fim').value}`;
            await addDoc(collection(db, "eventos"), {
                nome: document.getElementById('nome_festa').value,
                data: document.getElementById('data_festa').value,
                hora: document.getElementById('hora_inicio').value,
                imagem: document.getElementById('url_banner').value,
                valor_casal: document.getElementById('valor_casal').value,
                valor_solteiro: document.getElementById('valor_solteiro').value,
                data_encerramento: dataFechamentoStr,
                ativo: true, criado_em: new Date()
            });
            alert("Festa Publicada!");
            abrirAba('aba-relatorios');
        });

        // LÓGICA DE EQUIPE SIMPLIFICADA
        document.getElementById('formPromoter').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "equipe"), { 
                nome: document.getElementById('nome_promoter').value,
                ativo: true 
            });
            document.getElementById('formPromoter').reset();
        });

        onSnapshot(collection(db, "equipe"), (snap) => {
            const div = document.getElementById('lista-equipe');
            div.innerHTML = '';
            snap.forEach(d => {
                div.innerHTML += `<div class="bg-zinc-900 p-4 rounded-xl text-center text-[10px] font-black uppercase border border-zinc-800">${d.data().nome}</div>`;
            });
        });
    </script>
</body>
</html>
