<section id="aba-relatorios" class="space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="card-glass p-8 rounded-[2.5rem] text-center border-b-4 border-b-blue-500">
            <p class="text-[10px] text-zinc-500 font-black uppercase mb-2">Total Geral Reservas</p>
            <p id="res-total" class="text-4xl font-black italic">0</p>
        </div>
        <div class="card-glass p-8 rounded-[2.5rem] text-center border-b-4 border-b-yellow-500">
            <p class="text-[10px] text-zinc-500 font-black uppercase mb-2">Check-ins Realizados</p>
            <p id="res-checkin-total" class="text-4xl font-black italic text-yellow-500">0</p>
        </div>
        <div class="card-glass p-8 rounded-[2.5rem] text-center border-b-4 border-b-green-500">
            <p class="text-[10px] text-zinc-500 font-black uppercase mb-2">Taxa de Conversão</p>
            <p id="res-conversao" class="text-4xl font-black italic text-green-500">0%</p>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="card-glass p-8 rounded-[2.5rem]">
            <h3 class="text-xs font-black uppercase tracking-widest mb-6 border-b border-zinc-800 pb-4 italic text-blue-500">Ranking: Eventos em Aberto</h3>
            <div id="ranking-container" class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                </div>
        </div>

        <div class="card-glass p-8 rounded-[2.5rem]">
            <h3 class="text-xs font-black uppercase tracking-widest mb-6 border-b border-zinc-800 pb-4 italic text-green-500">Auditoria de Check-ins</h3>
            
            <select id="filtro-promoter-checkin" class="w-full p-4 rounded-xl mb-6 font-bold text-xs uppercase outline-none border border-zinc-800 bg-black text-white" onchange="filtrarClientesCheckin()">
                <option value="">Selecione um Promoter</option>
            </select>

            <div id="lista-clientes-checkin" class="space-y-3 max-h-[300px] overflow-y-auto pr-2">
                <p class="text-[10px] text-zinc-600 uppercase text-center py-10 font-bold">Selecione um promoter acima para ver quem entrou</p>
            </div>
        </div>
    </div>
</section>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g",
        authDomain: "teste-de-reserva.firebaseapp.com",
        projectId: "teste-de-reserva",
        storageBucket: "teste-de-reserva.firebasestorage.app",
        messagingSenderId: "163395694876",
        appId: "1:163395694876:web:8b1116a0483af951548ad9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let todasReservasGlobal = [];

    // CARREGAR DADOS DOS RELATÓRIOS
    onSnapshot(collection(db, "lista_eventos"), (snap) => {
        todasReservasGlobal = [];
        let total = 0, checkins = 0;
        let rankingPromoters = {};
        const hoje = new Date().toISOString().split('T')[0];

        snap.forEach(d => {
            const r = d.data();
            todasReservasGlobal.push(r);
            
            total++;
            if(r.entrou) checkins++;

            // Só entra no Ranking de "Eventos em Aberto" se a data for hoje ou futura
            // Obs: r.data_evento deve estar no formato YYYY-MM-DD vindo do banco
            if(r.evento_data >= hoje || !r.evento_data) {
                rankingPromoters[r.promoter] = (rankingPromoters[r.promoter] || 0) + 1;
            }
        });

        // Atualiza Métricas
        document.getElementById('res-total').innerText = total;
        document.getElementById('res-checkin-total').innerText = checkins;
        const conv = total > 0 ? Math.round((checkins / total) * 100) : 0;
        document.getElementById('res-conversao').innerText = conv + '%';
        
        // Atualiza Ranking Promoters (Eventos em Aberto)
        const containerRank = document.getElementById('ranking-container');
        containerRank.innerHTML = '';
        Object.entries(rankingPromoters).sort((a,b) => b[1]-a[1]).forEach(([nome, qtd]) => {
            containerRank.innerHTML += `
                <div class="flex justify-between items-center bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                    <span class="font-black uppercase text-[10px] tracking-widest text-zinc-300">${nome}</span>
                    <span class="bg-blue-900/30 text-blue-400 px-3 py-1 rounded-lg font-black text-xs">${qtd} reserv.</span>
                </div>`;
        });
        
        // Atualiza o Select de Promoters para o Filtro de Check-in
        const select = document.getElementById('filtro-promoter-checkin');
        const promotersUnicos = [...new Set(todasReservasGlobal.map(r => r.promoter))].sort();
        const valorAtual = select.value;
        select.innerHTML = '<option value="">Selecione um Promoter</option>';
        promotersUnicos.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p; opt.innerText = p.toUpperCase();
            select.appendChild(opt);
        });
        select.value = valorAtual;
        
        // Se já tiver um promoter selecionado, atualiza a lista dele
        if(valorAtual) filtrarClientesCheckin();
    });

    // FUNÇÃO PARA FILTRAR CLIENTES QUE FIZERAM CHECK-IN
    window.filtrarClientesCheckin = () => {
        const promoterAlvo = document.getElementById('filtro-promoter-checkin').value;
        const listaDiv = document.getElementById('lista-clientes-checkin');
        
        if(!promoterAlvo) {
            listaDiv.innerHTML = '<p class="text-[10px] text-zinc-600 uppercase text-center py-10 font-bold">Selecione um promoter acima</p>';
            return;
        }

        const filtrados = todasReservasGlobal.filter(r => r.promoter === promoterAlvo && r.entrou === true);

        if(filtrados.length === 0) {
            listaDiv.innerHTML = '<p class="text-[10px] text-zinc-500 uppercase text-center py-10 font-bold italic">Nenhum check-in confirmado para este promoter.</p>';
            return;
        }

        listaDiv.innerHTML = '';
        filtrados.forEach(c => {
            listaDiv.innerHTML += `
                <div class="bg-black p-4 rounded-xl border border-zinc-800 flex flex-col">
                    <span class="text-[10px] font-black uppercase text-white tracking-widest">${c.nome}</span>
                    <span class="text-[9px] text-zinc-500 font-bold">${c.telefone}</span>
                    <span class="text-[8px] text-green-500 font-black uppercase mt-1">● Entrou no evento: ${c.evento}</span>
                </div>`;
        });
    }

    // ... (restante das suas funções de trocarAba, salvarEvento e equipe permanecem iguais)
</script>
