<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; }
        .glass-card { background: rgba(18, 18, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 1.5rem; }
        input, select { background-color: #0c0c0e !important; border: 1px solid #27272a !important; color: white !important; outline: none; }
        input:focus { border-color: var(--cor-cliente) !important; }
        .btn-copy { background: #1e1e26; border: 1px solid var(--cor-cliente); color: var(--cor-cliente); font-size: 8px; font-weight: 900; padding: 6px 10px; border-radius: 6px; text-transform: uppercase; }
        .btn-copy:active { background: var(--cor-cliente); color: #fff; }
    </style>
</head>
<body class="p-4 md:p-8 hidden" id="main-body">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <header class="flex flex-col md:flex-row justify-between items-center bg-zinc-900/50 p-6 rounded-3xl border border-white/5 relative overflow-hidden">
            <div class="absolute left-0 top-0 w-2 h-full" id="tarja-cor" style="background-color: #3b82f6;"></div>
            <div class="flex items-center gap-4">
                <img id="client-logo" src="" class="h-14 w-14 rounded-xl object-contain bg-black border border-white/10 hidden">
                <div>
                    <h1 id="client-name" class="text-2xl font-black uppercase italic tracking-tighter">Carregando...</h1>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-1">Painel Gerencial</p>
                </div>
            </div>
            <div class="mt-4 md:mt-0 flex gap-2">
                <button onclick="sair()" class="bg-red-900/20 text-red-500 font-black px-6 py-3 rounded-xl uppercase text-xs transition-all hover:bg-red-900/40">Sair do Painel</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="glass-card p-6 h-fit space-y-4">
                <h2 class="text-white font-black uppercase italic mb-4">🔗 Links da Operação</h2>
                
                <div class="p-4 bg-black/40 rounded-xl border border-white/5">
                    <p class="text-[9px] font-black uppercase text-zinc-500 mb-2">Público (Instagram)</p>
                    <div class="flex gap-2"><input type="text" id="link-lista" readonly class="w-full text-[10px] p-2 rounded-lg text-zinc-400 bg-zinc-900 border border-transparent"><button onclick="copiarLink('link-lista')" class="btn-copy">Copiar</button></div>
                </div>

                <div class="p-4 bg-black/40 rounded-xl border border-white/5">
                    <p class="text-[9px] font-black uppercase text-zinc-500 mb-2">Portaria / Check-in</p>
                    <div class="flex gap-2"><input type="text" id="link-portaria" readonly class="w-full text-[10px] p-2 rounded-lg text-zinc-400 bg-zinc-900 border border-transparent"><button onclick="copiarLink('link-portaria')" class="btn-copy">Copiar</button></div>
                </div>

                <div class="p-4 bg-black/40 rounded-xl border border-white/5">
                    <p class="text-[9px] font-black uppercase text-zinc-500 mb-2">Promoters</p>
                    <div class="flex gap-2"><input type="text" id="link-promoter" readonly class="w-full text-[10px] p-2 rounded-lg text-zinc-400 bg-zinc-900 border border-transparent"><button onclick="copiarLink('link-promoter')" class="btn-copy">Copiar</button></div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass-card p-6">
                    <h2 class="text-white font-black uppercase italic mb-6">➕ Criar Novo Evento</h2>
                    <form id="formEvento" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="flex flex-col gap-1">
                            <label class="text-[9px] font-black uppercase text-zinc-500 ml-2">Título da Festa</label>
                            <input type="text" id="nome_evento" placeholder="EX: NOITE VIP" class="p-4 rounded-xl font-bold uppercase" required>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[9px] font-black uppercase text-zinc-500 ml-2">Link do Banner (URL)</label>
                            <input type="url" id="img_evento" placeholder="https://..." class="p-4 rounded-xl text-xs" required>
                        </div>
                        <div class="md:col-span-2">
                            <button type="submit" id="btnSalvar" class="w-full text-white font-black py-4 rounded-xl uppercase text-sm mt-2 transition-all shadow-lg" style="background-color: var(--cor-cliente)">Publicar Evento</button>
                        </div>
                    </form>
                </div>

                <h2 class="text-white font-black uppercase italic mt-8">📅 Eventos Ativos</h2>
                <div id="grid-eventos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", 
            authDomain: "teste-de-reserva.firebaseapp.com", 
            projectId: "teste-de-reserva", 
            storageBucket: "teste-de-reserva.firebasestorage.app", 
            messagingSenderId: "163395694876", 
            appId: "1:163395694876:web:8b1116a0483af951548ad9" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const clubeId = params.get('clube');
        
        // ENDEREÇO OFICIAL FIXADO AQUI 👇
        const baseUrl = "https://www.abreaporta.com.br";

        async function iniciarPainel() {
            if (!clubeId) { 
                document.body.innerHTML = "<h1 class='text-center mt-20 text-red-500 font-black text-2xl uppercase'>Acesso Negado</h1>"; 
                document.getElementById('main-body').classList.remove('hidden'); 
                return; 
            }

            const snap = await getDoc(doc(db, "clientes_revenda", clubeId));
            if (snap.exists() && snap.data().ativo) {
                const dados = snap.data();
                document.getElementById('client-name').innerText = dados.nome_fantasia;
                
                if(dados.logo_url) {
                    const img = document.getElementById('client-logo');
                    img.src = dados.logo_url; img.classList.remove('hidden');
                }

                if(dados.cor_primaria) {
                    document.documentElement.style.setProperty('--cor-cliente', dados.cor_primaria);
                    document.getElementById('tarja-cor').style.backgroundColor = dados.cor_primaria;
                } else {
                    document.documentElement.style.setProperty('--cor-cliente', '#3b82f6'); // Azul Padrão
                }

                // GERA OS LINKS RÁPIDOS COM O ENDEREÇO OFICIAL
                document.getElementById('link-lista').value = `${baseUrl}/listas.html?clube=${clubeId}`;
                document.getElementById('link-portaria').value = `${baseUrl}/portaria.html?clube=${clubeId}`;
                document.getElementById('link-promoter').value = `${baseUrl}/promoter.html?clube=${clubeId}`;

                document.getElementById('main-body').classList.remove('hidden');
                carregarEventos();
            } else {
                document.body.innerHTML = "<div class='p-20 text-center text-red-500 font-black uppercase text-2xl'>Licença Expirada ou Suspensa.</div>";
                document.getElementById('main-body').classList.remove('hidden'); 
            }
        }

        function carregarEventos() {
            const q = query(collection(db, "eventos"), where("clube_id", "==", clubeId));
            onSnapshot(q, (snap) => {
                const grid = document.getElementById('grid-eventos');
                if(snap.empty) { grid.innerHTML = "<p class='text-zinc-600 text-xs font-bold uppercase'>Nenhum evento criado.</p>"; return; }

                grid.innerHTML = snap.docs.map(d => {
                    const ev = d.data();
                    return `
                    <div class="glass-card overflow-hidden flex flex-col relative border-l-4" style="border-left-color: ${ev.ativo ? 'var(--cor-cliente)' : '#3f3f46'}">
                        <img src="${ev.imagem || 'https://via.placeholder.com/300x100'}" class="h-24 w-full object-cover opacity-50">
                        <div class="p-4 flex flex-col justify-between flex-grow">
                            <h3 class="font-black uppercase italic text-sm mb-4 text-white">${ev.nome}</h3>
                            <div class="flex gap-2">
                                <button onclick="toggleEvento('${d.id}', ${ev.ativo})" class="flex-1 py-2 rounded-lg text-[9px] font-black uppercase border ${ev.ativo ? 'border-green-500/50 text-green-500' : 'border-zinc-500/50 text-zinc-500'}">
                                    ${ev.ativo ? '🟢 Ativo' : '⚪ Pausado'}
                                </button>
                                <button onclick="excluirEvento('${d.id}')" class="bg-red-900/20 text-red-500 p-2 rounded-lg text-[9px] font-black uppercase">Excluir</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            });
        }

        document.getElementById('formEvento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.disabled = true; btn.innerText = "Salvando...";

            try {
                await addDoc(collection(db, "eventos"), {
                    clube_id: clubeId, // CARIMBO DO CLIENTE
                    nome: document.getElementById('nome_evento').value.toUpperCase(),
                    imagem: document.getElementById('img_evento').value,
                    ativo: true,
                    data_criacao: new Date().toISOString()
                });
                e.target.reset();
            } catch (err) { alert("Erro ao criar evento."); } 
            finally { btn.disabled = false; btn.innerText = "Publicar Evento"; }
        });

        window.toggleEvento = async (id, status) => { await updateDoc(doc(db, "eventos", id), { ativo: !status }); };
        window.excluirEvento = async (id) => { if(confirm("Apagar evento?")) await deleteDoc(doc(db, "eventos", id)); };
        
        window.copiarLink = (id) => { 
            const c = document.getElementById(id); 
            c.select(); 
            document.execCommand('copy'); 
            alert("Link copiado com sucesso!"); 
        };
        
        window.sair = () => { window.location.href = "login.html"; };

        iniciarPainel();
    </script>
</body>
</html>
