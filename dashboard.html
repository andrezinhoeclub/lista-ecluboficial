<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Command Center</title>
    <link id="page-icon" rel="icon" type="image/png" href="">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        :root { --cor-cliente: #eab308; }
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; overflow-x: hidden; }
        .glass-card { background: rgba(18, 18, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border-radius: 2.5rem; }
        .theme-txt { color: var(--cor-cliente) !important; }
        .theme-bg { background-color: var(--cor-cliente) !important; color: #000 !important; }
        .btn-menu { background: #18181b; border: 1px solid #27272a; transition: 0.3s; color: #71717a; }
        .btn-menu.active { background: var(--cor-cliente); color: #000; font-weight: 800; border-color: var(--cor-cliente); box-shadow: 0 0 20px rgba(var(--cor-cliente), 0.2); }
        .scroll-x { display: flex; overflow-x: auto; gap: 1rem; padding: 10px 5px 20px 5px; scroll-behavior: smooth; }
        .scroll-x::-webkit-scrollbar { height: 6px; }
        .scroll-x::-webkit-scrollbar-thumb { background: var(--cor-cliente); border-radius: 10px; }
        .event-bubble { flex: 0 0 auto; width: 340px; background: #0c0c0e; border: 1px solid #1a1a1c; border-radius: 2rem; transition: 0.3s; }
        input, select, textarea { background-color: #0c0c0e !important; border: 1px solid #27272a !important; color: white !important; outline: none; transition: 0.3s; cursor: pointer; }
        input:focus { border-color: var(--cor-cliente) !important; }
        .mini-capa { width: 100%; height: 100px; object-fit: cover; border-radius: 1.5rem; margin-bottom: 1rem; opacity: 0.8; }
        
        /* Estilização para forçar o ícone do calendário a aparecer melhor */
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            padding: 5px;
        }
    </style>
</head>
<body class="p-4 md:p-8 hidden" id="main-body">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img id="client-logo" src="" class="h-10 w-auto object-contain hidden">
                <div>
                    <h1 class="text-2xl font-black uppercase italic tracking-tighter theme-txt leading-none">Command Center</h1>
                    <p id="client-name" class="text-zinc-500 font-bold uppercase text-[9px] tracking-widest mt-1 italic">MANAGEMENT</p>
                </div>
            </div>
            <nav class="flex bg-zinc-900/50 p-1.5 rounded-2xl border border-zinc-800 overflow-x-auto">
                <button onclick="trocarAba('aba-relatorios', this)" class="btn-menu active px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap">Relatórios</button>
                <button onclick="trocarAba('aba-festas', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap">Eventos</button>
                <button onclick="trocarAba('aba-equipe', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap">Equipe</button>
                <button onclick="trocarAba('aba-aniversarios', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap text-cyan-400">Listas/Cams</button>
                <button onclick="trocarAba('aba-config', this)" class="btn-menu px-6 py-2.5 rounded-xl text-[10px] uppercase font-black whitespace-nowrap text-red-500">Ajustes</button>
            </nav>
        </header>

        <section id="aba-relatorios" class="space-y-8">
            <div class="glass-card p-8">
                <h2 class="text-xs font-black uppercase theme-txt italic mb-6 tracking-widest">Performance e Financeiro</h2>
                <div id="container-bolhas" class="scroll-x"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="glass-card p-8 border-t-4 theme-border text-center">
                    <h2 class="text-xs font-black uppercase theme-txt italic mb-8 tracking-widest">🏆 Pódio de Reservas</h2>
                    <div id="lista-ranking-reservas" class="space-y-4 text-left"></div>
                </div>
                <div class="glass-card p-8 border-t-4 border-t-green-500 text-center">
                    <h2 class="text-xs font-black uppercase text-green-500 italic mb-8 tracking-widest">🔥 Pódio de Check-ins</h2>
                    <div id="lista-ranking-checkins" class="space-y-4 text-left"></div>
                </div>
                <div class="glass-card p-8 border-t-4 border-t-blue-600 flex flex-col">
                    <h2 class="text-[10px] font-black uppercase text-blue-400 mb-4 tracking-widest">Exportar Dados</h2>
                    <select id="filtro-promoter-excel" class="w-full bg-[#0a0a0f] border border-zinc-800 p-3 rounded-xl text-[10px] font-black uppercase mb-4 text-white outline-none"></select>
                    <textarea id="output-excel" readonly class="w-full h-40 rounded-2xl p-4 text-[10px] font-mono text-zinc-300 mb-4 bg-[#0a0a0f] border-zinc-800" placeholder="Relatórios gerenciais..."></textarea>
                    <button onclick="gerarRelatorioGerencial()" class="w-full theme-bg font-black py-4 rounded-xl uppercase text-xs shadow-lg mb-2">Gerar Relatório</button>
                </div>
            </div>
        </section>

        <section id="aba-festas" class="hidden space-y-8">
            <div class="glass-card p-8 border-l-4 border-l-blue-500">
                <h2 class="text-blue-500 font-black uppercase italic text-xl mb-8 tracking-tighter">Configurar Evento & Camarotes</h2>
                <form id="formEvento" class="grid grid-cols-1 md:grid-cols-6 gap-4">
                    <input type="hidden" id="edit_evento_id">
                    <input type="hidden" id="url_imagem_atual">
                    
                    <input type="text" id="nome_festa" placeholder="NOME DO EVENTO" class="p-4 rounded-2xl font-bold md:col-span-3" required>
                    
                    <div class="md:col-span-2 flex flex-col gap-1">
                        <label class="text-[8px] font-black text-zinc-500 ml-2 uppercase tracking-widest">Escolha a Data</label>
                        <input type="date" id="data_festa" onclick="this.showPicker()" class="p-4 rounded-2xl font-bold uppercase text-xs w-full border-blue-500/20" required>
                    </div>

                    <div class="md:col-span-1 flex flex-col gap-1">
                        <label class="text-[8px] font-black text-blue-400 ml-2 uppercase tracking-widest">Horário</label>
                        <input type="time" id="hora_inicio" onclick="this.showPicker()" class="p-4 rounded-2xl font-bold uppercase text-xs w-full" required>
                    </div>
                    
                    <div class="md:col-span-3 grid grid-cols-2 gap-4">
                        <input type="text" id="valor_casal" placeholder="CASAL PORTARIA R$" class="p-4 rounded-2xl font-bold">
                        <input type="text" id="valor_solteiro" placeholder="SOLTEIRO PORTARIA R$" class="p-4 rounded-2xl font-bold">
                    </div>
                    <div class="md:col-span-3 grid grid-cols-2 gap-4">
                        <input type="text" id="desc_casal" placeholder="CASAL ANIVERSÁRIO R$" class="p-4 rounded-2xl font-bold text-cyan-400">
                        <input type="text" id="desc_solteiro" placeholder="SOLTEIRO ANIVERSÁRIO R$" class="p-4 rounded-2xl font-bold text-cyan-400">
                    </div>

                    <div class="md:col-span-6 bg-zinc-900/40 p-6 rounded-[2rem] border border-white/5">
                        <label class="text-[10px] font-black theme-txt uppercase tracking-widest mb-4 block ml-2">🖼️ Capa do Evento (Upload)</label>
                        <input type="file" id="upload_capa" accept="image/*" class="w-full text-xs text-zinc-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-[10px] file:font-black file:uppercase file:bg-blue-600 file:text-white hover:file:bg-blue-500 cursor-pointer">
                    </div>

                    <div class="md:col-span-6 bg-cyan-900/10 p-6 rounded-[2rem] border border-cyan-500/20 mb-4">
                        <div class="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-4 ml-2">💎 Configuração de Camarotes</div>
                        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-4" id="grid-camarotes-inputs"></div>
                    </div>

                    <button type="submit" id="btnSalvarEvento" class="md:col-span-6 bg-blue-600 text-white font-black py-5 rounded-3xl uppercase text-sm hover:bg-blue-500 transition-all shadow-xl">Salvar Evento Completo</button>
                </form>
            </div>
            <div id="grid-eventos-config" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="aba-equipe" class="hidden space-y-12"></section>
        <section id="aba-aniversarios" class="hidden space-y-8"></section>
        <section id="aba-config" class="hidden space-y-8"></section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, setDoc, addDoc, updateDoc, getDocs, query, where, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyCxakv-aI8XvFYOLRS_pKxgR3sjMnTQo8g", authDomain: "teste-de-reserva.firebaseapp.com", projectId: "teste-de-reserva", storageBucket: "teste-de-reserva.firebasestorage.app", messagingSenderId: "163395694876", appId: "1:163395694876:web:8b1116a0483af951548ad9" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const params = new URLSearchParams(window.location.search);
        const clubeId = params.get('clube');
        
        let dadosReservas = []; let dadosEventos = []; let dadosPromoters = []; let dadosAniv = [];

        async function carregarIdentidade() {
            if (!clubeId) return;
            const snap = await getDoc(doc(db, "clientes_revenda", clubeId));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('page-title').innerText = d.nome_fantasia;
                document.getElementById('client-name').innerText = d.nome_fantasia + " MANAGEMENT";
                if(d.logo_url) { document.getElementById('client-logo').src = d.logo_url; document.getElementById('client-logo').classList.remove('hidden'); }
                if(d.cor_primaria) document.documentElement.style.setProperty('--cor-cliente', d.cor_primaria);
                document.getElementById('main-body').classList.remove('hidden');
                iniciarEscutas();
            }
        }

        const gridCamarotes = document.getElementById('grid-camarotes-inputs');
        for(let i=1; i<=8; i++) {
            gridCamarotes.innerHTML += `<div class="bg-black/30 p-2 rounded-xl border border-white/5 flex flex-col items-center gap-1">
                <label class="flex items-center gap-1 w-full cursor-pointer justify-center"><input type="checkbox" id="cam${i}_ativo" class="w-3 h-3 accent-cyan-400"><span class="text-[9px] font-black uppercase text-zinc-500">C${i}</span></label>
                <input type="text" id="v_cam${i}" placeholder="R$" class="w-full p-1 rounded-lg text-center text-[10px] font-bold bg-black border border-zinc-800 text-cyan-400 outline-none">
            </div>`;
        }

        function iniciarEscutas() {
            onSnapshot(query(collection(db, "eventos"), where("clube_id", "==", clubeId)), snap => {
                dadosEventos = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderRelatorios(); renderGridConfig();
            });
            onSnapshot(query(collection(db, "lista_eventos"), where("clube_id", "==", clubeId)), snap => {
                dadosReservas = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderRelatorios(); renderCamarotesVendidos();
            });
        }

        window.trocarAba = (id, btn) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.btn-menu').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            btn.classList.add('active');
        };

        function renderRelatorios() {
            const container = document.getElementById('container-bolhas'); if(!container) return;
            const hojeLocal = new Date().toLocaleDateString('en-CA');
            const ativos = dadosEventos.filter(e => e.ativo && e.data >= hojeLocal).sort((a,b) => new Date(a.data) - new Date(b.data));
            container.innerHTML = ativos.map(ev => {
                const evNomeLimpo = (ev.nome || '').trim().toLowerCase();
                const validas = dadosReservas.filter(r => (r.evento || '').trim().toLowerCase() === evNomeLimpo && (r.metodo !== 'pix_antecipado' || r.pago === true));
                return `<div class="event-bubble p-6 flex flex-col justify-between"><div><p class="text-[9px] font-black theme-txt uppercase italic mb-4">${ev.data.split('-').reverse().join('/')} às ${ev.hora || '22:00'}</p><h4 class="text-sm font-black uppercase text-white mb-4 leading-tight">${ev.nome}</h4></div><div class="flex justify-between border-t border-white/5 pt-4 text-center"><div><p class="text-[7px] text-zinc-500 uppercase font-black">Reservas</p><p class="text-lg font-black text-white">${validas.length}</p></div><div><p class="text-[7px] text-zinc-500 uppercase font-black">Check-ins</p><p class="text-lg font-black text-green-500">${validas.filter(r => r.entrou).length}</p></div></div></div>`;
            }).join('');
        }

        document.getElementById('formEvento').addEventListener('submit', async e => {
            e.preventDefault(); const btn = document.getElementById('btnSalvarEvento'); btn.innerText = "SALVANDO..."; btn.disabled = true;
            const id = document.getElementById('edit_evento_id').value; const arquivo = document.getElementById('upload_capa').files[0]; let urlFinal = document.getElementById('url_imagem_atual').value;
            try {
                if (arquivo) { const storageRef = ref(storage, `eventos/${clubeId}/${Date.now()}_${arquivo.name}`); await uploadBytes(storageRef, arquivo); urlFinal = await getDownloadURL(storageRef); }
                const d = { 
                    clube_id: clubeId, 
                    nome: document.getElementById('nome_festa').value, 
                    data: document.getElementById('data_festa').value, 
                    hora: document.getElementById('hora_inicio').value, 
                    valor_casal: document.getElementById('valor_casal').value, 
                    valor_solteiro: document.getElementById('valor_solteiro').value, 
                    imagem: urlFinal, 
                    ativo: true 
                };
                for(let i=1; i<=8; i++) { d[`cam${i}_ativo`] = document.getElementById(`cam${i}_ativo`).checked; d[`v_cam${i}`] = document.getElementById(`v_cam${i}`).value; }
                if(id) await updateDoc(doc(db, "eventos", id), d); else await addDoc(collection(db, "eventos"), d);
                e.target.reset(); document.getElementById('edit_evento_id').value = ""; alert("Sucesso!");
            } catch(err) { alert("Erro ao salvar."); } finally { btn.innerText = "Salvar Evento Completo"; btn.disabled = false; }
        });

        window.renderGridConfig = () => {
            document.getElementById('grid-eventos-config').innerHTML = dadosEventos.map(ev => `
                <div class="glass-card overflow-hidden p-5 border border-white/5">
                    <img src="${ev.imagem || ''}" class="mini-capa bg-zinc-900">
                    <p class="text-[9px] font-black theme-txt uppercase mb-1">${ev.data.split('-').reverse().join('/')} - ${ev.hora || '--:--'}</p>
                    <h4 class="text-xs font-black uppercase text-white truncate mb-4">${ev.nome}</h4>
                    <div class="flex justify-between"><button onclick="prepararEdicaoEvento('${ev.id}')" class="text-blue-500 font-bold text-[9px] uppercase">Editar</button><button onclick="removerItem('eventos', '${ev.id}')" class="text-red-500 font-bold text-[9px] uppercase">Excluir</button></div>
                </div>`).join('');
        };

        window.prepararEdicaoEvento = (id) => {
            const ev = dadosEventos.find(e => e.id === id);
            document.getElementById('edit_evento_id').value = ev.id;
            document.getElementById('nome_festa').value = ev.nome;
            document.getElementById('data_festa').value = ev.data;
            document.getElementById('hora_inicio').value = ev.hora || "";
            document.getElementById('valor_casal').value = ev.valor_casal || "";
            document.getElementById('valor_solteiro').value = ev.valor_solteiro || "";
            document.getElementById('url_imagem_atual').value = ev.imagem || "";
            for(let i=1; i<=8; i++) {
                document.getElementById(`cam${i}_ativo`).checked = ev[`cam${i}_ativo`] || false;
                document.getElementById(`v_cam${i}`).value = ev[`v_cam${i}`] || "";
            }
        };

        carregarIdentidade();
    </script>
</body>
</html>
